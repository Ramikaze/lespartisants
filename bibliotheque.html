<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080f26;color:#ffffff;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg stroke='%23c9a84c' stroke-width='0.4' opacity='0.06'%3E%3Cpolygon points='40,3 74,22 74,58 40,77 6,58 6,22'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.wrap{text-align:center;padding:40px;max-width:480px;position:relative;z-index:1}
.icon{font-size:4rem;margin-bottom:24px;filter:drop-shadow(0 0 20px rgba(212,175,55,0.3))}
.title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;color:#d4af37;margin-bottom:12px}
.desc{color:#5a6480;font-size:0.95rem;line-height:1.7;margin-bottom:32px}
.badge{display:inline-block;padding:8px 20px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:20px;font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:.1em;text-transform:uppercase;color:#d4af37}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📚</div>
  <div class="title">Bibliothèque</div>
  <p class="desc">La bibliothèque islamique chiite — textes fondamentaux, ouvrages de jurisprudence, théologie et spiritualité. Ressources en cours de préparation.</p>
  <span class="badge">Contenu à venir</span>
</div>

<style id="injected-light-theme">
[data-theme="light"] body{background:#d4b895!important;color:#3e2723!important}
[data-theme="light"] *{border-color:rgba(141,85,36,0.12)!important}
[data-theme="light"] .header,.sidebar,.search-panel,.nav-footer{background:rgba(206,178,142,0.97)!important}
[data-theme="light"] .header-title,.sidebar-header h2{color:#8d5524!important}
[data-theme="light"] .content-area{background:#d4b895!important}
[data-theme="light"] .chapter-content,.chapter-text,.chapter-text p{color:#3e2723!important}
[data-theme="light"] .question-block{background:rgba(200,172,136,0.5)!important}
[data-theme="light"] .question-text{color:#3e2723!important}
[data-theme="light"] .section-heading{color:#8d5524!important}
[data-theme="light"] .reponse-label{color:#8d5524!important}
[data-theme="light"] .sidebar{background:rgba(206,178,142,0.97)!important}
[data-theme="light"] .sidebar-item{border-color:rgba(141,85,36,0.08)!important}
[data-theme="light"] .sidebar-item:hover,.sidebar-item.active{background:rgba(141,85,36,0.08)!important}
[data-theme="light"] .sidebar-tab.active{color:#8d5524!important;border-bottom-color:#8d5524!important}
[data-theme="light"] .home-screen{background:#d4b895!important}
[data-theme="light"] .home-title,.home-subtitle,.home-desc{color:#3e2723!important}
[data-theme="light"] .home-start{background:#8d5524!important}
[data-theme="light"] .home-toc{background:rgba(220,194,158,0.8)!important;border-color:rgba(141,85,36,0.12)!important}
[data-theme="light"] .home-toc-title{color:#8d5524!important}
[data-theme="light"] .home-toc-item{border-color:rgba(141,85,36,0.08)!important;color:#3e2723!important}
[data-theme="light"] .home-toc-item:hover{background:rgba(141,85,36,0.06)!important}
[data-theme="light"] .note-banner{background:rgba(141,85,36,0.06)!important;border-left-color:#8d5524!important}
[data-theme="light"] .search-input-wrap{background:rgba(200,172,136,0.6)!important}
[data-theme="light"] .search-input{color:#3e2723!important}
[data-theme="light"] .nav-btn{color:#8d5524!important;border-color:rgba(141,85,36,0.2)!important}
[data-theme="light"] .nav-btn:hover{background:rgba(141,85,36,0.08)!important}
[data-theme="light"] .nav-progress{color:#5d4037!important}
[data-theme="light"] .footnote{color:#5d4037!important}
[data-theme="light"] .fn-ref a,.fn-back,.fn-back-num{color:#8d5524!important}
[data-theme="light"] .download-section{background:rgba(220,194,158,0.6)!important;border-color:rgba(141,85,36,0.12)!important}
[data-theme="light"] .header-btn{color:#3e2723!important}
[data-theme="light"] .sidebar-item-title{color:#3e2723!important}
[data-theme="light"] .sidebar-item-num{color:#8d5524!important}
[data-theme="light"] ::-webkit-scrollbar-track{background:#d4b895!important}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(141,85,36,0.25)!important}
</style>
<!-- Theme listener: receives theme from parent portal -->
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    var t = e.data.theme;
    document.documentElement.setAttribute('data-theme', t);
    document.body.setAttribute('data-theme', t === 'light' ? '' : 'dark');
    // Also try calling the module's own theme function
    try { if (typeof setTheme === 'function') setTheme(t); } catch(ex) {}
    try { if (typeof S !== 'undefined' && S.th !== undefined) { S.th = t === 'light' ? 'light' : 'dark'; document.body.setAttribute('data-theme', S.th); } } catch(ex) {}
    // Force canvas/render update
    try { window.dispatchEvent(new Event('resize')); } catch(ex) {}
  }
});
try {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.body.setAttribute('data-theme', '');
    try { if (typeof S !== 'undefined') { S.th = 'light'; document.body.setAttribute('data-theme', 'light'); } } catch(ex) {}
  }
} catch(e) {}
</script>
</body>
</html>
