<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#080f26;color:#ffffff;font-family:'EB Garamond',Georgia,serif}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(8,15,38,0.95);border-bottom:1px solid rgba(212,175,55,0.2);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;backdrop-filter:blur(12px)}
.header-title{font-family:'Cinzel',serif;font-size:15px;color:#d4af37;font-weight:600;flex:1;letter-spacing:.04em}
.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#9aa3b8;white-space:nowrap}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ZOOM CONTROLS */
.zoom-bar{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:100}
.z-btn{width:36px;height:36px;background:rgba(16,28,64,0.9);border:1px solid rgba(212,175,55,0.25);color:#d4af37;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.z-btn:hover{background:rgba(212,175,55,0.15);border-color:#d4af37}
.z-info{text-align:center;font-family:'Cinzel',serif;font-size:10px;color:#5a6480}

/* CANVAS */
#tree-container{position:fixed;inset:52px 0 0;cursor:grab;overflow:hidden}
#tree-container:active{cursor:grabbing}
#tree-svg{position:absolute;top:0;left:0;user-select:none}

/* DETAIL PANEL */
.dp-overlay{position:fixed;inset:0;background:rgba(8,15,38,0.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.dp-overlay.open{opacity:1;pointer-events:all}
.dp{position:fixed;top:52px;right:-440px;bottom:0;width:440px;background:#111f36;border-left:1px solid rgba(212,175,55,0.2);z-index:300;overflow-y:auto;transition:right .35s cubic-bezier(.4,0,.2,1);padding:28px 20px;box-shadow:-10px 0 40px rgba(0,0,0,0.5)}
.dp.open{right:0}
@media(max-width:600px){
  .dp{top:auto;right:0;left:0;bottom:-100%;width:100%;max-height:75vh;border-left:none;border-top:1px solid rgba(212,175,55,0.3);border-radius:18px 18px 0 0;padding:20px 16px 32px;transition:bottom .35s cubic-bezier(.4,0,.2,1)}
  .dp.open{bottom:0;right:0}
  .dp-close{top:10px;right:10px}
  .dp-overlay.open{opacity:1;pointer-events:all}
}
.dp-close{position:absolute;top:14px;right:14px;background:#1a2e4a;border:1px solid rgba(212,175,55,0.2);color:#9aa3b8;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.dp-close:hover{background:#f87171;color:#fff;border-color:#f87171}
.dp-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.dp-name{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:#ffffff;line-height:1.25;margin-bottom:4px}
.dp-arabic{font-size:1.1rem;color:#d4af37;opacity:.75;direction:rtl;margin-bottom:12px}
.dp-dates{font-size:.85rem;color:#d4af37;opacity:.6;margin-bottom:16px}
.dp-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:#d4af37;display:block;margin:16px 0 6px}
.dp-desc{font-size:.92rem;color:#9aa3b8;line-height:1.7}
.dp-titles{display:flex;flex-wrap:wrap;gap:6px}
.dp-title-tag{background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.2);color:#d4af37;padding:3px 10px;border-radius:12px;font-size:.78rem}
.dp-rels{display:flex;flex-direction:column;gap:6px}
.dp-rel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);padding:8px 12px;border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.dp-rel:hover{background:rgba(212,175,55,.08);border-color:rgba(212,175,55,.2)}
.dp-rel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dp-rel-name{font-family:'Cinzel',serif;font-size:.8rem;flex:1}
.dp-rel-type{font-size:.72rem;color:#5a6480}
</style>

  {f:'baqir', t:'sadiq', type:'parent'},
  {f:'sadiq', t:'kazim', type:'parent'},
  {f:'kazim', t:'rida', type:'parent'},
  {f:'kazim', t:'fatima_masuma', type:'parent'},
  {f:'rida', t:'jawad', type:'parent'},
  {f:'jawad', t:'hadi', type:'parent'},
  {f:'hadi', t:'askari', type:'parent'},
  {f:'askari', t:'mahdi', type:'parent'},
  // Companion ties (dotted)
  {f:'ali', t:'salman', type:'companion'},
  {f:'ali', t:'ammar', type:'companion'},
  {f:'ali', t:'abu_dharr', type:'companion'},
  {f:'ali', t:'miqdad', type:'companion'},
  {f:'ali', t:'hudhayfa', type:'companion'},
  {f:'ali', t:'ibn_masud', type:'companion'},
  {f:'ali', t:'abu_said', type:'companion'},
  {f:'ali', t:'khuzaima', type:'companion'},
];

/* ═══════════════════════════════════════
   COLORS
═══════════════════════════════════════ */
const COLORS = {
  infaillible: '#d4af37',
  infaillible_bg: 'rgba(212,175,55,0.12)',
  infaillible_border: 'rgba(212,175,55,0.5)',
  infaillible_related: '#e8c066',
  family: '#7eb8fa',
  family_bg: 'rgba(126,184,250,0.08)',
  family_border: 'rgba(126,184,250,0.3)',
  ancestor: '#94a3b8',
  ancestor_bg: 'rgba(148,163,184,0.06)',
  ancestor_border: 'rgba(148,163,184,0.25)',
  mother: '#c084fc',
  mother_bg: 'rgba(192,132,252,0.06)',
  mother_border: 'rgba(192,132,252,0.2)',
  companion: '#4ade80',
  companion_bg: 'rgba(74,222,128,0.06)',
  companion_border: 'rgba(74,222,128,0.2)',
};

/* Build maps */
const NODE_MAP = {};
NODES.forEach(n => { NODE_MAP[n.id] = n; n.rels = []; });
EDGES.forEach(e => {
  if (NODE_MAP[e.f] && NODE_MAP[e.t]) {
    NODE_MAP[e.f].rels.push({id: e.t, type: e.type === 'parent' ? 'Enfant' : e.type === 'spouse' ? 'Époux/Épouse' : 'Compagnon fidèle'});
    NODE_MAP[e.t].rels.push({id: e.f, type: e.type === 'parent' ? 'Parent' : e.type === 'spouse' ? 'Époux/Épouse' : 'Lié à'});
  }
});

/* ═══════════════════════════════════════
   SVG RENDERING
═══════════════════════════════════════ */
const SVG_W = 1500, SVG_H = 2500;
const NODE_H = 70;
const svg = document.getElementById('tree-svg');
svg.setAttribute('width', SVG_W);
svg.setAttribute('height', SVG_H);
svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);

const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

// Glow filter
['gold','blue','green'].forEach((name, i) => {
  const colors = ['#d4af37','#7eb8fa','#4ade80'];
  const f = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
  f.setAttribute('id', `glow-${name}`);
  f.setAttribute('x','-20%'); f.setAttribute('y','-20%');
  f.setAttribute('width','140%'); f.setAttribute('height','140%');
  const blur = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
  blur.setAttribute('stdDeviation','3');
  blur.setAttribute('in','SourceGraphic');
  blur.setAttribute('result','blur');
  const merge = document.createElementNS('http://www.w3.org/2000/svg', 'feMerge');
  const mn1 = document.createElementNS('http://www.w3.org/2000/svg', 'feMergeNode');
  mn1.setAttribute('in','blur');
  const mn2 = document.createElementNS('http://www.w3.org/2000/svg', 'feMergeNode');
  mn2.setAttribute('in','SourceGraphic');
  merge.appendChild(mn1); merge.appendChild(mn2);
  f.appendChild(blur); f.appendChild(merge);
  defs.appendChild(f);
});
svg.appendChild(defs);

// Background
const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
bg.setAttribute('width', SVG_W); bg.setAttribute('height', SVG_H);
bg.setAttribute('fill', '#080f26');
svg.appendChild(bg);

// Edges layer
const edgeG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
svg.appendChild(edgeG);

// Nodes layer
const nodeG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
svg.appendChild(nodeG);

function getNodeColor(n) {
  if (n.type === 'infaillible') return COLORS.infaillible;
  if (n.type === 'infaillible_related') return COLORS.infaillible_related;
  if (n.type === 'family') return COLORS.family;
  if (n.type === 'ancestor') return COLORS.ancestor;
  if (n.type === 'mother') return COLORS.mother;
  if (n.type === 'companion') return COLORS.companion;
  return '#94a3b8';
}

function getNodeBg(n) {
  if (n.type === 'infaillible') return COLORS.infaillible_bg;
  if (n.type === 'family') return COLORS.family_bg;
  if (n.type === 'ancestor') return COLORS.ancestor_bg;
  if (n.type === 'mother') return COLORS.mother_bg;
  if (n.type === 'companion') return COLORS.companion_bg;
  return 'rgba(148,163,184,0.06)';
}

function getNodeBorder(n) {
  if (n.type === 'infaillible') return COLORS.infaillible_border;
  if (n.type === 'family') return COLORS.family_border;
  if (n.type === 'ancestor') return COLORS.ancestor_border;
  if (n.type === 'mother') return COLORS.mother_border;
  if (n.type === 'companion') return COLORS.companion_border;
  return 'rgba(148,163,184,0.25)';
}

// Draw edges
EDGES.forEach(e => {
  const a = NODE_MAP[e.f], b = NODE_MAP[e.t];
  if (!a || !b) return;
  const ax = a.x + a.w/2, ay = a.y + NODE_H;
  const bx = b.x + b.w/2, by = b.y;

  if (e.type === 'companion') {
    // Dotted line from Ali to companions (horizontal-ish)
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    path.setAttribute('x1', ax); path.setAttribute('y1', a.y + NODE_H/2);
    path.setAttribute('x2', bx); path.setAttribute('y2', b.y + NODE_H/2);
    path.setAttribute('stroke', 'rgba(74,222,128,0.15)');
    path.setAttribute('stroke-width', '1');
    path.setAttribute('stroke-dasharray', '4,4');
    edgeG.appendChild(path);
    return;
  }

  if (e.type === 'spouse') {
    // Dashed line between spouses
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    path.setAttribute('x1', a.x + a.w); path.setAttribute('y1', a.y + NODE_H/2);
    path.setAttribute('x2', b.x); path.setAttribute('y2', b.y + NODE_H/2);
    path.setAttribute('stroke', 'rgba(212,175,55,0.3)');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-dasharray', '6,3');
    edgeG.appendChild(path);
    return;
  }

  // Parent edge — smooth bezier
  const my = (ay + by) / 2;
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const d = `M${ax},${ay} C${ax},${my} ${bx},${my} ${bx},${by}`;
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');

  const color = getNodeColor(a);
  const opacity = (a.type === 'infaillible' || b.type === 'infaillible') ? '0.35' : '0.18';
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', (a.type === 'infaillible' && b.type === 'infaillible') ? '2' : '1.2');
  path.setAttribute('stroke-opacity', opacity);
  edgeG.appendChild(path);
});

// Draw nodes
NODES.forEach(n => {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('cursor', 'pointer');
  g.setAttribute('data-id', n.id);

  const color = getNodeColor(n);
  const bg = getNodeBg(n);
  const border = getNodeBorder(n);
  const isInfaillible = n.type === 'infaillible';

  // Shadow/glow for infaillibles
  if (isInfaillible) {
    const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    shadow.setAttribute('x', n.x - 2); shadow.setAttribute('y', n.y - 2);
    shadow.setAttribute('width', n.w + 4); shadow.setAttribute('height', NODE_H + 4);
    shadow.setAttribute('rx', '10');
    shadow.setAttribute('fill', 'none');
    shadow.setAttribute('stroke', color);
    shadow.setAttribute('stroke-width', '1');
    shadow.setAttribute('stroke-opacity', '0.2');
    shadow.setAttribute('filter', 'url(#glow-gold)');
    g.appendChild(shadow);
  }

  // Main rect
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', n.x); rect.setAttribute('y', n.y);
  rect.setAttribute('width', n.w); rect.setAttribute('height', NODE_H);
  rect.setAttribute('rx', '8');
  rect.setAttribute('fill', bg);
  rect.setAttribute('stroke', border);
  rect.setAttribute('stroke-width', isInfaillible ? '1.5' : '1');
  g.appendChild(rect);

  // Imam number badge
  if (n.num !== undefined && n.num !== null) {
    const badge = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    badge.setAttribute('x', n.x + n.w - 28);
    badge.setAttribute('y', n.y + 5);
    badge.setAttribute('width', '24');
    badge.setAttribute('height', '18');
    badge.setAttribute('rx', '4');
    badge.setAttribute('fill', color);
    badge.setAttribute('fill-opacity', '0.25');
    g.appendChild(badge);

    const numText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    numText.setAttribute('x', n.x + n.w - 16);
    numText.setAttribute('y', n.y + 16);
    numText.setAttribute('text-anchor', 'middle');
    numText.setAttribute('font-family', 'Cinzel, serif');
    numText.setAttribute('font-size', '9');
    numText.setAttribute('font-weight', '700');
    numText.setAttribute('fill', color);
    numText.textContent = n.num === 'ن' ? 'ن' : n.num === 'ف' ? 'ف' : n.num + 'e';
    g.appendChild(numText);
  }

  // Name
  const nameText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  nameText.setAttribute('x', n.x + 8);
  nameText.setAttribute('y', n.y + 24);
  nameText.setAttribute('font-family', 'Cinzel, serif');
  nameText.setAttribute('font-size', isInfaillible ? '12' : '10');
  nameText.setAttribute('font-weight', isInfaillible ? '600' : '400');
  nameText.setAttribute('fill', color);
  // Truncate name for display
  const dispName = n.name.length > 22 ? n.name.substring(0, 21) + '…' : n.name;
  nameText.textContent = dispName;
  g.appendChild(nameText);

  // Arabic
  if (n.ar) {
    const clipId = 'clip-ar-' + n.id;
    const cp = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
    cp.setAttribute('id', clipId);
    const cpR = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    cpR.setAttribute('x', n.x + 4);
    cpR.setAttribute('y', n.y + 33);
    cpR.setAttribute('width', n.w - 8);
    cpR.setAttribute('height', 24);
    cp.appendChild(cpR);
    defs.appendChild(cp);
    const arText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    arText.setAttribute('x', n.x + n.w - 8);
    arText.setAttribute('y', n.y + 50);
    arText.setAttribute('text-anchor', 'start');
    arText.setAttribute('font-family', 'Scheherazade New, serif');
    arText.setAttribute('font-size', '12');
    arText.setAttribute('fill', color);
    arText.setAttribute('fill-opacity', '0.7');
    arText.setAttribute('direction', 'rtl');
    arText.setAttribute('clip-path', 'url(#' + clipId + ')');
    arText.textContent = n.ar;
    g.appendChild(arText);
  }

  // Dates
  if (n.dates) {
    const dText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    dText.setAttribute('x', n.x + 8);
    dText.setAttribute('y', n.y + 62);
    dText.setAttribute('font-family', 'serif');
    dText.setAttribute('font-size', '8.5');
    dText.setAttribute('fill', color);
    dText.setAttribute('fill-opacity', '0.45');
    dText.textContent = n.dates;
    g.appendChild(dText);
  }

  // Hover
  g.addEventListener('mouseenter', () => {
    rect.setAttribute('fill-opacity', '1.5');
    rect.setAttribute('stroke-width', isInfaillible ? '2' : '1.5');
  });
  g.addEventListener('mouseleave', () => {
    rect.setAttribute('fill-opacity', '1');
    rect.setAttribute('stroke-width', isInfaillible ? '1.5' : '1');
  });
  g.addEventListener('click', (e) => {
    e.stopPropagation();
    openDetail(n.id);
  });

  nodeG.appendChild(g);
});

// Section labels
function addLabel(text, x, y, color) {
  const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('font-family', 'Cinzel, serif');
  t.setAttribute('font-size', '10');
  t.setAttribute('letter-spacing', '2');
  t.setAttribute('text-transform', 'uppercase');
  t.setAttribute('fill', color || '#5a6480');
  t.setAttribute('fill-opacity', '0.6');
  t.textContent = text.toUpperCase();
  nodeG.appendChild(t);
}

addLabel('COMPAGNONS D\'EXCEPTION', 30, 460, '#4ade80');
addLabel('AHL AL-BAYT', 380, 50, '#d4af37');

/* ═══════════════════════════════════════
   PAN / ZOOM
═══════════════════════════════════════ */
const container = document.getElementById('tree-container');
const isMobile = window.innerWidth < 600;
let scale = isMobile ? 0.28 : 0.45, panX = isMobile ? 10 : 20, panY = isMobile ? 0 : -20;
let isDragging = false, lastX = 0, lastY = 0;
let velX = 0, velY = 0, lastMX = 0, lastMY = 0, lastT = 0;
let momentum = null;

function updateTransform() {
  svg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  svg.style.transformOrigin = '0 0';
  document.getElementById('z-pct').textContent = Math.round(scale * 100) + '%';
}
updateTransform();

function stopMomentum() { if (momentum) { cancelAnimationFrame(momentum); momentum = null; } }

container.addEventListener('mousedown', e => {
  stopMomentum();
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  lastMX = e.clientX; lastMY = e.clientY;
  lastT = Date.now();
  velX = 0; velY = 0;
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  if (Math.abs(velX) > 1 || Math.abs(velY) > 1) {
    (function glide() {
      velX *= 0.92; velY *= 0.92;
      panX += velX; panY += velY;
      updateTransform();
      if (Math.abs(velX) > 0.5 || Math.abs(velY) > 0.5) momentum = requestAnimationFrame(glide);
    })();
  }
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const now = Date.now(), dt = Math.max(now - lastT, 1);
  velX = (e.clientX - lastMX) / dt * 14;
  velY = (e.clientY - lastMY) / dt * 14;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  lastMX = e.clientX; lastMY = e.clientY; lastT = now;
  updateTransform();
});

container.addEventListener('wheel', e => {
  e.preventDefault();
  stopMomentum();
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY > 0 ? 0.88 : 1.14;
  const newScale = Math.min(3, Math.max(0.15, scale * factor));
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  updateTransform();
}, { passive: false });

// Touch
let touches = [];
container.addEventListener('touchstart', e => {
  stopMomentum();
  touches = Array.from(e.touches);
  lastX = touches[0].clientX; lastY = touches[0].clientY;
  velX = 0; velY = 0;
}, { passive: true });
container.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
    panX += dx; panY += dy;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    velX = dx * 0.7; velY = dy * 0.7;
    updateTransform();
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (touches.length >= 2) {
      const d0 = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
      const f = d / d0;
      scale = Math.min(3, Math.max(0.15, scale * f));
      updateTransform();
    }
    touches = Array.from(e.touches);
  }
}, { passive: true });
container.addEventListener('touchend', () => {
  if (Math.abs(velX) > 1 || Math.abs(velY) > 1) {
    (function glide() {
      velX *= 0.93; velY *= 0.93;
      panX += velX; panY += velY;
      updateTransform();
      if (Math.abs(velX) > 0.3 || Math.abs(velY) > 0.3) momentum = requestAnimationFrame(glide);
    })();
  }
}, { passive: true });

// Zoom buttons
document.getElementById('z-in').addEventListener('click', () => {
  scale = Math.min(3, scale * 1.25);
  updateTransform();
});
document.getElementById('z-out').addEventListener('click', () => {
  scale = Math.max(0.15, scale * 0.8);
  updateTransform();
});
document.getElementById('z-fit').addEventListener('click', () => {
  const cw = container.clientWidth, ch = container.clientHeight;
  scale = Math.min(cw / SVG_W, ch / SVG_H) * 0.95;
  panX = (cw - SVG_W * scale) / 2;
  panY = (ch - SVG_H * scale) / 2;
  updateTransform();
});

/* ═══════════════════════════════════════
   DETAIL PANEL
═══════════════════════════════════════ */
function openDetail(id) {
  const n = NODE_MAP[id];
  if (!n) return;
  const color = getNodeColor(n);

  const typeLabels = {infaillible:'Infaillible',family:'Famille',ancestor:'Ancêtre',mother:'Mère',companion:'Compagnon',infaillible_related:'Ahl al-Bayt'};
  const typeLabel = typeLabels[n.type] || n.type;

  const rels = (n.rels || []).map(r => {
    const rn = NODE_MAP[r.id];
    if (!rn) return '';
    const rc = getNodeColor(rn);
    return `<div class="dp-rel" onclick="openDetail('${rn.id}')">
      <div class="dp-rel-dot" style="background:${rc}"></div>
      <div class="dp-rel-name">${rn.name}</div>
      <div class="dp-rel-type">${r.type}</div>
    </div>`;
  }).filter(Boolean).join('');

  const titles = (n.titles || []).map(t => `<span class="dp-title-tag">${t}</span>`).join('');

  document.getElementById('dp-content').innerHTML = `
    <span class="dp-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${typeLabel}${n.num ? ' · ' + n.num + (n.num === 'ن' || n.num === 'ف' ? '' : 'er Imam') : ''}</span>
    <div class="dp-name">${n.name}</div>
    ${n.ar ? `<div class="dp-arabic">${n.ar}</div>` : ''}
    ${n.dates ? `<div class="dp-dates">&#128197; ${n.dates}</div>` : ''}
    <span class="dp-label">Description</span>
    <p class="dp-desc">${n.desc || '–'}</p>
    ${titles ? `<span class="dp-label">Titres &amp; Surnoms</span><div class="dp-titles">${titles}</div>` : ''}
    ${rels ? `<span class="dp-label">Relations</span><div class="dp-rels">${rels}</div>` : ''}
  `;

  document.getElementById('dp').classList.add('open');
  document.getElementById('dp-overlay').classList.add('open');
}

document.getElementById('dp-close').addEventListener('click', closeDetail);
document.getElementById('dp-overlay').addEventListener('click', closeDetail);
function closeDetail() {
  document.getElementById('dp').classList.remove('open');
  document.getElementById('dp-overlay').classList.remove('open');
}
</script>

<!-- Theme listener: receives theme from parent portal -->
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    var t = e.data.theme;
    document.documentElement.setAttribute('data-theme', t);
    document.body.setAttribute('data-theme', t === 'light' ? '' : 'dark');
    // Also try calling the module's own theme function
    try { if (typeof setTheme === 'function') setTheme(t); } catch(ex) {}
    try { if (typeof S !== 'undefined' && S.th !== undefined) { S.th = t === 'light' ? 'light' : 'dark'; document.body.setAttribute('data-theme', S.th); } } catch(ex) {}
    // Force canvas/render update
    try { window.dispatchEvent(new Event('resize')); } catch(ex) {}
    // Update SVG background for theme
    try {
      var svgBg = document.querySelector('#tree-svg > rect');
      if (svgBg) svgBg.setAttribute('fill', t === 'light' ? '#fbf1d7' : '#080f26');
    } catch(ex) {}
  }
});
try {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.body.setAttribute('data-theme', '');
    try { if (typeof S !== 'undefined') { S.th = 'light'; document.body.setAttribute('data-theme', 'light'); } } catch(ex) {}
  }
} catch(e) {}
// Set SVG bg for light mode on load
try {
  if (localStorage.getItem('theme') === 'light') {
    var svgBg2 = document.querySelector('#tree-svg > rect');
    if (svgBg2) svgBg2.setAttribute('fill', '#fbf1d7');
  }
} catch(e2) {}
</script>
