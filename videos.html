<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070c18;color:#e8e2d0;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg stroke='%23c9a84c' stroke-width='0.4' opacity='0.06'%3E%3Cpolygon points='40,3 74,22 74,58 40,77 6,58 6,22'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.wrap{text-align:center;padding:40px;max-width:480px;position:relative;z-index:1}
.icon{font-size:4rem;margin-bottom:24px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.3))}
.title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;color:#c9a84c;margin-bottom:12px}
.desc{color:#5a6480;font-size:0.95rem;line-height:1.7;margin-bottom:32px}
.badge{display:inline-block;padding:8px 20px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:20px;font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:.1em;text-transform:uppercase;color:#c9a84c}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🎬</div>
  <div class="title">Vidéos</div>
  <p class="desc">Conférences, documentaires et enseignements en vidéo sur l'islam chiite, l'histoire de l'Ahl al-Bayt et la spiritualité islamique.</p>
  <span class="badge">Contenu à venir</span>
</div>
</body>
</html>
