<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Du'ā & Ziyāra</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070c18;color:#e8e2d0;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}
.app{display:flex;height:100%}

/* ══ SIDEBAR ══ */
.sidebar{
  width:240px;flex-shrink:0;height:100%;
  background:#0a1020;border-right:1px solid rgba(201,168,76,0.12);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{width:0}
.sb-header{
  padding:16px 14px 12px;border-bottom:1px solid rgba(201,168,76,0.1);
  flex-shrink:0;
}
.sb-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#c9a84c;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.sb-sub{font-size:10px;color:#3a4560;margin-top:2px;white-space:nowrap}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15)}

/* Theme group */
.sb-group{margin-bottom:4px}
.sb-theme{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;cursor:pointer;
  font-size:12px;font-weight:600;color:#9aa3b8;
  transition:all .18s;white-space:nowrap;
  border-left:2px solid transparent;
}
.sb-theme:hover{color:#c9a84c;background:rgba(201,168,76,0.05)}
.sb-theme.open{color:#c9a84c;border-left-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06)}
.sb-theme-icon{font-size:14px;flex-shrink:0}
.sb-theme-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.sb-chevron{font-size:9px;transition:transform .2s;flex-shrink:0;color:#c9a84c;opacity:.6}
.sb-theme.open .sb-chevron{transform:rotate(90deg)}

/* Sub-items */
.sb-items{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.sb-items.open{max-height:600px}
.sb-item{
  display:block;padding:7px 14px 7px 36px;
  font-size:11.5px;color:#6b7280;cursor:pointer;
  transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-left:2px solid transparent;
}
.sb-item:hover{color:#c9a84c;background:rgba(201,168,76,0.04)}
.sb-item.active{color:#c9a84c;font-weight:600;background:rgba(201,168,76,0.08);border-left-color:#c9a84c}

/* ══ TOGGLE BUTTON ══ */
.sb-toggle{
  position:absolute;top:50%;left:240px;transform:translateY(-50%);
  width:18px;height:48px;background:#0d1828;border:1px solid rgba(201,168,76,0.2);
  border-left:none;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#c9a84c;z-index:50;transition:left .3s;
}
.sb-toggle:hover{background:rgba(201,168,76,0.12)}
.sidebar.collapsed~.sb-toggle{left:0}

/* ══ MAIN CONTENT ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;gap:16px;
}
.welcome-icon{font-size:48px;opacity:.4}
.welcome-title{font-family:'Cinzel',serif;font-size:16px;color:#c9a84c;font-weight:600;opacity:.7}
.welcome-hint{font-size:12px;color:#3a4560;line-height:1.6}

/* Content panel */
.content{
  flex:1;overflow-y:auto;padding:20px 24px 40px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent;
  animation:fadeIn .25s ease;
}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.content.hidden{display:none}
.welcome.hidden{display:none}

/* ══ CONTENT ELEMENTS ══ */
.c-source{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#c9a84c;opacity:.5;font-family:'Cinzel',serif;margin-bottom:4px}
.c-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#e8e2d0;line-height:1.3;margin-bottom:6px}
.c-subtitle{font-size:13px;color:#9aa3b8;font-style:italic;line-height:1.6;margin-bottom:16px;padding-left:2px}
.c-divider{height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.25),transparent);margin-bottom:18px}

/* Intro */
.c-intro{
  font-size:12.5px;color:#9aa3b8;font-style:italic;line-height:1.7;
  padding:10px 14px;border-left:2px solid rgba(201,168,76,0.3);
  background:rgba(201,168,76,0.03);border-radius:0 8px 8px 0;margin-bottom:16px;
}
/* Salawat */
.c-salawat{
  text-align:center;padding:8px;margin:6px 0;
  font-size:11px;color:#c9a84c;opacity:.45;letter-spacing:.1em;
  text-transform:uppercase;font-family:'Cinzel',serif;
}
/* Verse */
.c-verse{display:flex;gap:12px;margin-bottom:12px;padding:11px 13px;border-radius:9px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);transition:background .2s}
.c-verse:hover{background:rgba(201,168,76,0.04);border-color:rgba(201,168,76,0.1)}
.c-vnum{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:#c9a84c;margin-top:2px}
.c-vtext{font-size:13.5px;line-height:1.82;color:#cec6b0}
/* Instruction */
.c-instruction{font-size:12px;color:#c9a84c;font-weight:600;margin:14px 0 8px;padding:6px 12px;background:rgba(201,168,76,0.06);border-radius:6px;border:1px solid rgba(201,168,76,0.15)}
/* Prose */
.c-prose p{font-size:13.5px;line-height:1.85;color:#cec6b0;margin-bottom:11px}
.c-prose p:last-child{margin-bottom:0}

/* Ziyara style — slightly more solemn */
.c-zv{display:flex;gap:12px;margin-bottom:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.015);border-left:2px solid rgba(201,168,76,0.2)}
.c-zv-text{font-size:13.5px;line-height:1.82;color:#cec6b0}
.c-zv-ar{font-family:'Amiri',serif,sans-serif;font-size:14px;color:#c9a84c;opacity:.75;direction:rtl;margin-top:4px;font-style:italic}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-title">🤲 Du'ā & Ziyāra</div>
      <div class="sb-sub">As-Ṣaḥīfa as-Sajjādiyya</div>
    </div>
    <div class="sb-scroll" id="sb-scroll"></div>
  </div>

  <!-- TOGGLE -->
  <div class="sb-toggle" id="sb-toggle">›</div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤲</div>
      <div class="welcome-title">Du'ā & Ziyāra</div>
      <div class="welcome-hint">Sélectionne une invocation<br>dans le menu à gauche</div>
    </div>
    <div class="content hidden" id="content"></div>
  </div>

</div>

<script>

var DATA = {
  themes: [
    {
      id: 'sahifa',
      label: 'As-Ṣaḥīfa as-Sajjādiyya',
      icon: '📖',
      items: [
        { id: 'inv7',      label: 'Invocation 7',        emoji: '7️⃣' },
        { id: 'dimanche',  label: 'Invocation du Dimanche', emoji: '☀️' },
        { id: 'lundi',     label: 'Invocation du Lundi',  emoji: '🌙' },

        { id: 'mercredi',  label: 'Invocation du Mercredi', emoji: '💚' },
        { id: 'jeudi',     label: 'Invocation du Jeudi',  emoji: '🟡' },
        { id: 'vendredi',  label: 'Invocation du Vendredi', emoji: '⭐' },
        { id: 'samedi',    label: 'Invocation du Samedi', emoji: '🌿' },
        { id: 'makarem',   label: 'Mâkarem al-Akhlāq',   emoji: '🌸' },

        { id: 'z-hussain', label: 'Ziyara Imam al-Ḥusayn', emoji: '🩸' },
        { id: 'z-warith',  label: 'Ziyārat Wārith',        emoji: '🩸' },
        { id: 'z-ashura',  label: 'Ziyara \'Āshūrā',       emoji: '🕊️' },
      ]
    }
  ],

  invocations: {

    inv7: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation 7',
      subtitle: 'Pour des tâches préoccupantes, pour l\'infortune et les moments de détresse',
      body: [
        {t:'salawat'},
        {t:'v',n:1,  tx:'Ô Toi par Qui ne se dénouent les nœuds de l\'infortune ! Ô Toi par Qui le tranchant des ennuis est émoussé ! Ô Toi par Qui est sollicitée l\'issue réconfortante du soulagement !'},
        {t:'v',n:2,  tx:'Par le Pouvoir de Qui les difficultés tenaces sont résolues ; par la Bienveillance de Qui les moyens sont existants ; par l\'Autorité de Qui le décret est immuable ; et par la Volonté de Qui tout s\'y conforme et procède.'},
        {t:'v',n:3,  tx:'Par Ta Volonté ils appliquent Ton ordonnance sans entendre Ta voix, et par Ta Volonté ils obtempèrent à Tes interdits sans se sentir sous Ta contrainte.'},
        {t:'v',n:4,  tx:'Tu es le secours que l\'on invoque dans les difficultés et l\'abri sûr de ceux qui sont dans l\'effroi ; aucune détresse ne peut être repoussée excepté celle que Tu repousses ; aucune n\'est réfutée excepté celle que Tu réfutes.'},
        {t:'v',n:5,  tx:'Sur moi est venu, Mon Seigneur, un fardeau dont le poids m\'a accablé et sur moi est tombée une surcharge lourde à porter.'},
        {t:'v',n:6,  tx:'Par Ton Pouvoir Tu l\'as fait descendre sur moi et par Ton autorité Tu l\'as dirigé vers moi.'},
        {t:'v',n:7,  tx:'Personne ne peut éloigner ce que Tu apportes ; personne ne peut détourner ce que Tu as orienté ; personne ne peut ouvrir ce que Tu as clos ; personne ne peut obstruer ce que Tu as ouvert ; personne ne peut rendre accessible ce que Tu as rendu inabordable ; personne ne peut aider celui que Tu as abandonné.'},
        {t:'v',n:8,  tx:'Que Tes Bénédictions soient sur Mohammed et sur sa Famille, par Ta Bienveillance ouvre pour moi, Mon Seigneur, la porte du soulagement, par Ta Puissance brise l\'autorité de l\'inquiétude, étends la grâce de Ton regard sur ma complainte, fais-moi goûter la douceur du salut que j\'invoque, prodigue-moi Ta Miséricorde ainsi qu\'un soulagement réparateur et par Toi qu\'il soit notifié à mon égard une voie rapide de sortie !'},
        {t:'v',n:9,  tx:'Ne me fais pas craindre d\'être préoccupé au point d\'en oublier Tes obligations et d\'agir en conformité avec Tes ordonnances.'},
        {t:'v',n:10, tx:'Ma résistance a été entravée, Mon Seigneur, par ce qui m\'est arrivé, et je suis couvert d\'inquiétude par la charge de ce qui m\'a atteint, certes Tu as la capacité de démanteler ce qui m\'a affligé et de désagréger ce qui s\'est abattu sur moi. Par Ta Permission que je sois libéré de tout cela. Ô Le Maître de la Puissance du Trône.'},
        {t:'salawat'},
      ]
    },

    dimanche: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation du Dimanche',
      subtitle: null,
      body: [
        {t:'intro', tx:'Au Nom de Dieu, le Clément, le Très Miséricordieux'},
        {t:'salawat'},
        {t:'v',n:1, tx:'Au Nom de Dieu ! Celui de Qui je n\'attends que La Grâce ; de Qui je ne crains que Sa Justice ; ne prenant appui que sur Sa Parole ; ne me rattachant qu\'à Son Lien !'},
        {t:'v',n:2, tx:'En Toi, je cherche refuge — Ô Le Possesseur du Pardon et de La Satisfaction —, contre l\'injustice et la tyrannie ; contre les vicissitudes du temps ; contre la succession des peines ; contre les calamités du destin ; contre l\'échéance de mon terme survenant sans y être préparé et sans détenir des provisions.'},
        {t:'v',n:3, tx:'En Toi, je cherche la Guidance vers ce qui est vertueux et ce qui élève.'},
        {t:'v',n:4, tx:'En Toi, je cherche le secours par qui s\'opère le succès et la prospérité.'},
        {t:'v',n:5, tx:'C\'est Toi que j\'implore de me vêtir de la parure du bien-être, de sa plénitude, et d\'être recouvert totalement du Salut et de sa continuité. Je cherche refuge auprès de Toi, ô mon Seigneur, contre les séductions des démons ; je me place sous la protection de Ta Souveraineté contre la tyrannie des puissants. Aussi, agrée mes prières et mes jeûnes passés ; fasse que mon lendemain et ce qui viendra après soient meilleurs que ce qui fait mon heure présente et mon aujourd\'hui ! Fasse que je sois honoré parmi mon clan et mon peuple ; protège-moi dans mon état d\'éveil et de sommeil ! Car, Tu es L\'Excellent Gardien et Tu es Le Plus Miséricordieux de ceux qui font miséricorde !'},
        {t:'v',n:6, tx:'Ô mon Dieu ! Je me déclare innocent face à Toi, en ce jour qui est le mien et pour tous les dimanches qui le suivront, d\'associationnisme et d\'athéisme ; je consacre en toute sincérité mon invocation à Toi ; je demeure dans l\'attente d\'être exaucé.'},
        {t:'v',n:7, tx:'Aussi, bénis Mohammed et les Gens de la Famille de Mohammed, l\'Excellent de parmi Tes créatures, celui qui appelle à Ta Vérité ; rends-moi puissant par Ta Puissance, qui est hors d\'atteinte de toute défaillance ; protège-moi par Ton Œil qui ne sommeille jamais ; scelle ma destinée par ma dévotion envers Toi et ma vie par Ton Pardon. En vérité, Tu es Celui Qui pardonne, Le Très Miséricordieux !'},
        {t:'salawat'},
      ]
    },

    lundi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation du Lundi',
      subtitle: null,
      body: [
        {t:'intro', tx:'Au Nom de Dieu, le Clément, le Très Miséricordieux'},
        {t:'salawat'},
        {t:'v',n:1, tx:'Louange à Dieu ! Celui Qui n\'a pris personne à témoin lorsqu\'IL a créé les cieux et la terre ; Qui n\'a pris aucun assistant lorsqu\'IL a fait exister les âmes !'},
        {t:'v',n:2, tx:'IL n\'a pas d\'associé avec Sa Divinité ; IL n\'a pas d\'équivalent dans Son Unicité !'},
        {t:'v',n:3, tx:'Les langues demeurent muettes pour Le décrire ; les intellects sont impuissants à saisir la connaissance de Son Essence ; les oppresseurs se font modestes face à Sa Majesté ; les visages s\'humilient par crainte de Lui ; toutes choses puissantes se résignent face à Sa Toute-Puissance !'},
        {t:'v',n:4, tx:'À Toi La Louange répétée et ininterrompue, harmonieuse, continue et faite avec discipline.'},
        {t:'v',n:5, tx:'Que Ses Bénédictions soient éternellement sur Son Messager ; que Sa Paix soit à jamais sur lui.'},
        {t:'v',n:6, tx:'Ô mon Dieu ! Fasse que le début de ce jour qui est le mien soit marqué de la félicité ; et que sa fin soit marquée par le succès. Je cherche refuge auprès de Toi contre un jour dont le début est marqué par la frayeur ; dont le milieu est marqué par l\'inquiétude ; et dont la fin est marquée par la douleur !'},
        {t:'v',n:7, tx:'Ô mon Dieu ! J\'implore Ton Pardon pour tout vœu que j\'ai formulé, pour toute promesse que j\'ai faite, pour tout engagement que j\'ai pris et que je n\'ai pas respectés envers Toi.'},
        {t:'v',n:8, tx:'Je T\'implore de me pardonner les injustices commises envers Tes Serviteurs ; au cas où il y aurait un serviteur de parmi Tes Serviteurs ou une servante de parmi Tes Servantes ayant déposé une plainte contre moi pour avoir manqué de respect à sa personne, à sa renommée, à ses biens, à son épouse et à ses enfants, ou pour avoir fait preuve de médisance à son égard, ou pour l\'avoir traité avec partialité, ou passion, ou arrogance, ou emportement, ou hypocrisie, ou sectarisme que ce soit en son absence ou en sa présence, de son vivant ou après sa mort, car ce sont des injustices que ma main est incapable de réparer, et mon pouvoir trop faible à dédommager ou à annuler ma redevance envers lui.'},
        {t:'v',n:9, tx:'Je T\'implore ! Ô Celui Qui détient toutes les réponses aux requêtes, exaucées par Sa Volonté et se précipitant vers Sa Décision, de bénir Mohammed et les Gens de la Famille de Mohammed, rends-le satisfait de moi de la façon dont Tu décideras, et accorde-moi une Miséricorde venant de Toi ! Pardonner, ne diminue en rien en Toi ; accorder n\'est pas un manque pour Toi ! Ô Le Plus Miséricordieux de ceux qui font miséricorde !'},
        {t:'v',n:10, tx:'Ô mon Dieu ! Accorde-moi en ce deuxième jour de la semaine deux faveurs venant de Toi : Le Bonheur de T\'obéir dès son commencement ; et la Faveur de Ton Pardon à sa fin ! Ô Celui Qui est Dieu ! Aucun ne peut pardonner les actes coupables autre que Lui !'},
        {t:'salawat'},
      ]
    },

    mardi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation du Mardi',
      subtitle: null,
      body: [
        {t:'intro', tx:'Au Nom de Dieu, le Clément, le Très Miséricordieux'},
        {t:'salawat'},
        {t:'v',n:1, tx:'Louange à Dieu ! La louange Lui est due, tel qu\'Il en est digne. Une louange qui n\'a pas de fin !'},
        {t:'v',n:2, tx:'Je cherche refuge auprès de Lui contre le mal de mon âme. L\'âme est instigatrice du mal à moins que mon Seigneur ne fasse miséricorde.'},
        {t:'v',n:3, tx:'Je cherche refuge auprès de Lui contre le mal de Satan, qui se plaît à ajouter un acte coupable à mon acte coupable.'},
        {t:'v',n:4, tx:'Je cherche protection en Lui contre tout oppresseur pervers, contre tout souverain injuste et contre tout ennemi dominateur.'},
        {t:'v',n:5, tx:'Ô mon Dieu ! Fais que je sois au nombre de Tes armées, car Ton armée sera victorieuse ! Fais-moi entrer dans Ton parti, car dans Ton parti se trouvent les gagnants. Installe-moi parmi Tes amis, car Tes amis n\'éprouveront plus aucune crainte et ne seront pas affligés.'},
        {t:'v',n:6, tx:'Ô mon Dieu ! Fais que ma religion soit parfaite pour moi, car elle est le lien protecteur de mon existence. Fais que ma vie ultime soit excellente, car elle est la demeure de mon repos éternel, le refuge qui me soustrait au voisinage des hommes médiocres ! Fais que l\'existence soit pour moi une acquisition de tout ce qui est bien et que la mort soit pour moi un repos loin de tout ce qui est mal !'},
        {t:'v',n:7, tx:'Ô mon Dieu ! Bénis Mohammed, le Sceau des Prophètes et l\'achèvement du nombre de Tes Messagers, ainsi que les gens de sa famille, les très vertueux, les très purs, puis ses compagnons distingués. Accorde-moi, en ce troisième jour de la semaine, trois choses :'},
        {t:'v',n:8, tx:'Ne laisse aucun de mes actes coupables sans lui accorder Ton pardon, ni aucune affliction sans l\'avoir dissipée, ni aucun ennemi sans l\'avoir repoussé ! Tout cela réalisé au Nom de Dieu, le plus sublime des Noms. Au Nom de Dieu ! Seigneur de la Terre et du Ciel !'},
        {t:'v',n:9, tx:'Je cherche à repousser loin de moi tout ce qui est malheur, dont le premier est Ton courroux ; je cherche à attirer à moi tout ce qui est aimé, dont le début est Ta satisfaction !'},
        {t:'v',n:10, tx:'Aussi, fais que Ton ultime bienfait envers moi soit Ton pardon ! Ô Maître de la bienveillance !'},
        {t:'salawat'},
      ]
    },

    mercredi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation du Mercredi',
      subtitle: null,
      body: [
        {t:'intro', tx:'Au Nom de Dieu, le Clément, le Très Miséricordieux'},
        {t:'salawat'},
        {t:'v',n:1, tx:'Louange à Dieu ! C\'est Lui Qui a établi pour vous la nuit comme un vêtement ; le sommeil comme un repos. Il a établi le jour comme une résurrection.'},
        {t:'v',n:2, tx:'À Toi appartient La Louange ! Tu m\'as tiré de mon sommeil, si Tu l\'avais désiré Tu l\'aurais fait éternel ; une Louange continuelle et à jamais ininterrompue, dont les créatures ne peuvent en faire le compte !'},
        {t:'v',n:3, tx:'Ô mon Dieu ! À Toi appartient La Louange ! Tu as créé ; Tu as formé harmonieusement ; Tu as ordonné ; Tu as décrété ; Tu as donné la mort ; Tu as donné la vie ; Tu as donné la maladie ; Tu as donné la guérison ; Tu as donné l\'aisance ; Tu as donné l\'affliction ; Tu T\'es assis sur le Trône et Tu détiens La Souveraineté !'},
        {t:'v',n:4, tx:'Je T\'implore de l\'imploration de celui dont le moyen s\'est affaibli ; dont le prétexte est épuisé ; dont la fin est proche ; dont l\'espérance en cette vie immédiate s\'est dissipée ; dont le besoin en Ta Miséricorde s\'est amplifié ; dont le remords s\'est accentué à cause de son insouciance ; dont les déviations et les faux pas sont nombreux ; dont le repentir est sincèrement dédié à Ta Face.'},
        {t:'v',n:5, tx:'Aussi, bénis Mohammed, le Sceau des Prophètes, ainsi que les Gens de sa Famille, les Excellents, les Purs ; accorde-moi l\'Intercession de Mohammed ; que Dieu le bénisse ainsi que les Gens de sa Famille, ne me prive pas de sa compagnie ! En vérité, Tu es Le Plus Miséricordieux de ceux qui font miséricorde !'},
        {t:'v',n:6, tx:'Ô mon Dieu ! Décrète en ma faveur, en ce quatrième jour de la semaine, quatre choses : fasse que ma force soit employée à l\'obéissance envers Toi ; fasse que mon ardeur soit occupée à T\'adorer ; fasse que mon désir soit celui d\'obtenir Ta Récompense ; fasse que mon renoncement soit au sujet de ce qui implique sur moi la douleur de Ton Châtiment ! Tu es Bienveillant envers celui que Tu choisis !'},
        {t:'salawat'},
      ]
    },

    jeudi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation du Jeudi',
      subtitle: null,
      body: [
        {t:'intro', tx:'Au Nom de Dieu, le Clément, le Très Miséricordieux'},
        {t:'salawat'},
        {t:'v',n:1, tx:'Louange à Dieu ! Qui dissipe les ténèbres de la nuit par Sa Puissance ; Qui suscite la clarté du jour par Sa Miséricorde. IL m\'a enveloppé de la lumière du jour et m\'a accordé son bienfait.'},
        {t:'v',n:2, tx:'Ô mon Dieu ! De la même manière que Tu m\'as épargné en ce jour, épargne-moi pour ses semblables, bénis le Prophète Mohammed et les Gens de sa Famille, ne me tourmente pas en ce jour ni durant les nuits ni durant les jours suivants en m\'abandonnant à commettre des actes interdits et à me couvrir d\'actes coupables ; accorde-moi ses bienfaits ; le Bien qui est en lui et le Bien de toutes choses après lui ; écarte-moi de son Mal, le Mal qui est en lui et le Mal de toutes choses après lui !'},
        {t:'v',n:3, tx:'Ô mon Dieu ! Par le Pacte de Protection de l\'Islam, je sollicite la Demande de Recours envers Toi ! Par la Sainteté du Coran je prends appui sur Toi ! Par Mohammed, l\'Élu, que Dieu le bénisse ainsi que les Gens de sa Famille, je sollicite l\'Intercession auprès de Toi ! Ô mon Dieu ! Reconnais mon Pacte de Protection en vertu duquel j\'ose espérer l\'exaucement de ma requête. Ô Le Plus Miséricordieux de ceux qui font miséricorde !'},
        {t:'v',n:4, tx:'Ô mon Dieu ! Décrète en ma faveur, en ce cinquième jour de la semaine, cinq choses que seule Ta Générosité est capable d\'accorder et Ta Grâce de dispenser : une bonne santé qui me donnera la force de persévérer dans l\'obéissance envers Toi ; une pratique adorative par laquelle je mériterai l\'abondance de Ta Récompense ; une situation aisée faite de Tes Moyens licites de subsistance ; une protection venant de Toi dans toutes situations de crainte ; et un refuge dans Ta Citadelle contre les assauts des tourments et des soucis !'},
        {t:'v',n:5, tx:'Bénis Mohammed et les Gens de sa Famille ; fasse que ma Demande de Recours d\'Intercession du Prophète me soit favorable au Jour de la Résurrection ! En vérité, Tu es Le Plus Miséricordieux de ceux qui font miséricorde !'},
        {t:'salawat'},
      ]
    },

    vendredi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation du Vendredi',
      subtitle: null,
      body: [
        {t:'intro', tx:'Au Nom de Dieu, le Clément, le Très Miséricordieux'},
        {t:'v',n:1, tx:'Louange à Dieu ! Celui qui fut avant la création et la manifestation de toute vie ; Celui qui demeurera après la disparition de toutes choses : l\'Omniscient, qui n\'oublie pas celui qui Le remémore ; qui ne rabaisse pas celui qui fait preuve de gratitude envers Lui ; qui ne déçoit pas celui qui L\'invoque ; qui ne délaisse pas l\'espérance de celui qui espère en Lui.'},
        {t:'v',n:2, tx:'Ô mon Dieu ! Je Te prends à témoin — et Tu suffis comme Témoin —, je prends à témoin tous Tes anges, les habitants de Tes cieux, les Archanges porteurs de Ton Trône, les Prophètes et les Messagers envoyés par Toi, ainsi que toutes les sortes de créatures que Tu as créées ; je témoigne que Tu es Dieu ; il n\'y a de Dieu que Toi ; l\'Unique ; sans associé avec Toi ni d\'égal à Toi ; il n\'y a ni contradiction dans Ta parole ni modification. Et que Mohammed — que Dieu le bénisse ainsi que les Gens de sa Famille — est Ton serviteur et Ton messager.'},
        {t:'v',n:3, tx:'Ô mon Dieu ! Affermis en moi Ta religion tant que Tu me maintiendras en vie. Ne dévie pas mon cœur après m\'avoir dirigé ; accorde-moi une miséricorde venant de Toi. Tu es le Suprême Donateur. Bénis Mohammed et les Gens de la Famille de Mohammed ; fais de moi l\'un de ses suivants et de ses partisans ; mets-moi au nombre de ceux qui sont dans ses rangs ; accorde-moi la réussite dans l\'accomplissement des obligations religieuses du Vendredi. Tu es le Tout-Puissant, le Sage.'},
      ]
    },

    samedi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Invocation du Samedi',
      subtitle: null,
      body: [
        {t:'intro', tx:'Au Nom de Dieu, le Clément, le Très Miséricordieux'},
        {t:'salawat'},
        {t:'v',n:1, tx:'Au Nom de Dieu ! La Parole de ceux qui se placent sous la Protection de Dieu ! La Devise de ceux qui cherchent ardemment Sa Protection ! Je cherche refuge en Dieu — Le Très Exalté soit-IL — contre l\'injustice de l\'injuste, contre les pièges des envieux, contre l\'oppression des oppresseurs ; Et je Le loue de La Louange placée au-dessus de toutes les louanges des louangeurs !'},
        {t:'v',n:2, tx:'Ô mon Dieu ! Tu es L\'Unique sans associé, Le Roi sans avoir été intronisé ! Nul ne saurait s\'opposer à Toi dans Ton Jugement ; nul ne saurait Te contester dans Ta Souveraineté !'},
        {t:'v',n:3, tx:'Je T\'implore de bénir Mohammed et les Gens de sa Famille, Ton Serviteur et Ton Messager ; Inspire-moi le remerciement de Tes Bienfaits par lequel j\'atteindrai le plus haut degré de Ta Satisfaction ; Accorde-moi l\'aide à des fins de T\'obéir, de persister dans l\'Adoration qui T\'est due, et ainsi mériter Ta Récompense par Ta Grâce Bienveillante. Fais preuve de Miséricorde à mon égard et protège-moi contre les actes de désobéissance envers Toi aussi longtemps que Tu me maintiendras en vie ; Élargis ma poitrine par Ton Livre, délivre-moi de mon fardeau par sa lecture ; Accorde-moi la perfection dans ma Religion et dans mon âme. Ô Le Plus Miséricordieux de ceux qui font miséricorde !'},
        {t:'salawat'},
      ]
    },

    makarem: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Mâkarem al-Akhlāq',
      subtitle: 'L\'invocation des actes nobles de la morale',
      prose: true,
      body: [
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais atteindre ma foi la plus parfaite des fois, rends ma certitude la meilleure des certitudes, fais aboutir mon intention à la meilleure des intentions, mon action à la meilleure des actions.',
        'Mon Dieu, parfais mon intention par Ta Grâce, rectifie ma certitude par ce que Tu possèdes, réforme ce qui est corrompu en moi par Ton Pouvoir.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, suffis-moi dans ce qui occupe toute mon attention, emploie-moi dans des actions à propos desquelles Tu m\'interrogeras demain, consacre mes jours à ce pour quoi Tu m\'as créé, enrichis-moi, étends sur moi Tes ressources et ne m\'éprouve pas par l\'ingratitude ou par le regard des autres ou par l\'attente, honore-moi et ne me mets pas à l\'épreuve de l\'arrogance, asservis-moi à Toi et ne laisse pas corrompre mon adoration à Ton égard par la fatuité, mets-moi en permanence au bon service des gens et ne le fais pas s\'annuler par le rappel du bienfait, accorde-moi une morale sublime et préserve-moi de la vantardise.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, ne m\'élève pas d\'un degré auprès des gens sans m\'abaisser d\'un degré semblable en moi-même, ne m\'accorde pas une gloire apparente sans susciter en moi-même une humilité intérieure d\'une égale valeur.',
        'Mon Dieu, prie sur Mohammed et sur la famille de Mohammed, fais-moi jouir d\'une juste direction que je ne substituerai pas, d\'une voie droite dont je ne dévierai pas, et d\'une intention bien juste dont je ne douterai pas.',
        'Laisse-moi vivre aussi longtemps que ma vie sera vouée à l\'obéissance envers Toi, et si ma vie devenait un foyer pour Satan, alors rappelle-moi auprès de Toi avant que Ton Abomination ne m\'atteigne ou que Ta Colère ne s\'abatte sur moi.',
        'Mon Dieu, ne laisse pas en moi un trait honteux sans le réformer, ni un défaut blâmable sans le corriger, ni une morale incomplète sans la parachever.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, remplace l\'animosité des gens vindicatifs à mon égard par l\'amour, la jalousie des gens qui convoitent par l\'amitié, la suspicion des gens de bonne conduite par la confiance, l\'inimitié des parents les plus proches par l\'attachement, l\'ingratitude des consanguins par la bienfaisance, la défection des proches par l\'assistance, l\'amour des flatteurs par la correction du tendre ami, la répulsion de ceux qui me fréquentent par le noble commerce, l\'amertume de la peur des oppresseurs par la douceur de la sécurité.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, assure-moi une force contre celui qui m\'a opprimé, un argument contre celui qui m\'a cherché querelle, une victoire sur celui qui s\'est entêté contre moi, octroie-moi un stratagème contre celui qui m\'a trompé, un pouvoir sur celui qui m\'a persécuté, un démenti contre celui qui m\'a incriminé à tort, un salut contre celui qui m\'a menacé, fais-moi parvenir à obéir à celui qui m\'a dirigé sur le droit chemin et à suivre celui qui m\'a guidé dans la bonne voie.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais-moi réussir à conseiller celui qui m\'a dupé, à rétribuer par la bonté celui qui m\'a délaissé, à récompenser par la générosité celui qui m\'a privé, à compenser celui qui s\'est séparé de moi en établissant des liens avec lui, à contrecarrer celui qui a médit sur moi en disant du bien de lui, à faire preuve de gratitude pour tout bienfait dont j\'ai fait l\'objet, à fermer les yeux sur toute malfaisance dont j\'ai été victime.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, pare-moi de la parure des gens saints, revêts-moi de l\'ornement des gens pieux, en répandant la justice, en retenant la colère, en éteignant les feux de l\'inimitié, en regroupant les gens désunis, en résolvant les discordes, en diffusant les bienfaits, en dissimulant les défauts, en ayant un naturel doux, une attitude humble, une bonne conduite, une paisible quiétude, une compagnie agréable, en devançant les autres vers la vertu, en choisissant de préférence la prévenance, en abandonnant les reproches et les bonnes grâces envers ceux qui ne les méritent pas, en disant la vérité même si elle est difficile.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, accorde-moi Ta subsistance la plus abondante lorsque j\'aurai vieilli, Ta force la plus grande quand je serai fatigué. Ne m\'éprouve pas par la paresse qui m\'empêcherait de T\'adorer, ni par l\'aveuglement qui m\'égarerait de Ta voie, ni par l\'exposition à ce qui est contraire à Ton amour, ni par la compagnie de celui qui s\'est séparé de Toi, ni par la séparation de celui qui s\'est joint à Toi.',
        'Mon Dieu, fais que je combatte par Toi en cas de nécessité, que je Te sollicite en cas de besoin, que je T\'implore en cas de pauvreté, et ne m\'induis pas en erreur en me laissant demander de l\'aide à autre que Toi si je suis dans la nécessité.',
        'Mon Dieu, fais que tout ce que Satan introduit dans mon cœur en envie, en suspicion et en jalousie soit une occasion pour rappeler Ta grandeur, méditer sur Ta puissance et organiser la riposte contre Ton ennemi.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais qu\'on ne m\'opprime pas alors que Tu as la capacité de me défendre, que je n\'oppresse personne alors que Tu peux me retenir, que je ne m\'égare pas alors que Tu as la possibilité de me guider, que je ne tombe pas dans la misère alors que mon opulence vient de Toi, que je ne devienne pas orgueilleux alors que ma richesse vient de chez Toi.',
        'Mon Dieu, c\'est auprès de Ton pardon que je me suis rendu, c\'est à Ton absolution que j\'ai aspiré, c\'est Ton indulgence qui m\'a manqué, c\'est à Ta faveur que je me suis fié, alors qu\'il n\'y a rien en moi qui impliquerait Ton pardon et rien au niveau de mes actes qui me le ferait mériter. Et après m\'être jugé moi-même, il ne me reste que Ta faveur. Alors prie sur Mohammed et sur sa famille et couvre-moi de Ta faveur.',
        'Mon Dieu, fais-moi prononcer des mots justes, inspire-moi la piété, fais-moi obtenir ce qui est le plus pur et emploie-moi dans ce qui Te satisfait le plus. Mon Dieu, fais-moi emprunter la voie la plus exemplaire, fais-moi mourir et vivre selon Ta religion.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais-moi jouir de la pondération, place-moi au nombre des gens justes, des guides de la bonne direction, des serviteurs saints, accorde-moi la réussite lors de la Résurrection et le salut lors de l\'examen des actes.',
        'Mon Dieu, prends de mon âme pour Toi-même ce qui la sauverait, laisse-moi en moi-même ce qui la réformerait, car mon âme est perdue à moins que Tu ne l\'empêches de faire des fautes. Mon Dieu, Tu es mon refuge quand je suis affligé, Tu es mon asile quand je suis démuni, et c\'est auprès de Toi que je cherche secours quand je suis dans la détresse.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, éloigne tout mal de moi par Ta bonté, nourris-moi par Ta grâce, réforme-moi par Ta générosité, guéris-moi par Ta bonne œuvre, mets-moi sous Ta protection, couvre-moi de Ta satisfaction, assiste-moi dans le choix de la plus juste des affaires quand elles s\'embrouillent, de la plus pure des actions quand elles se confondent, de la plus satisfaisante des doctrines quand elles sont contradictoires.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, couronne-moi de la suffisance, impose-moi une allégeance honorable, octroie-moi une guidance sincère, ne m\'éprouve pas par l\'abondance. Accorde-moi la bonne aisance, ne rends pas ma vie laborieuse et pénible, ne repousse pas ma supplication, car je ne T\'attribue aucun rival ni égal à Toi dans mes supplications.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, empêche-moi de me livrer au gaspillage, protège mes moyens de subsistance de la détérioration, augmente mes possessions par la bénédiction s\'y trouvant, fais-moi atteindre la voie de la guidance à la piété dans tout ce que je dépense. Mon Dieu, prie sur Mohammed et sur sa famille, épargne-moi la peine du gain, pourvois-moi en moyens de subsistance sans compter, afin de ne pas me détourner de Ton adoration par la recherche de ces moyens.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, sauve-moi la face par l\'aisance, ne m\'abaisse pas par le don parcimonieux, car j\'aurais à demander mes moyens d\'existence à ceux qui les reçoivent de Toi, à mendier auprès de Tes méchantes créatures, alors que Tu es, à l\'exclusion d\'eux, le Maître du don et de l\'obstruction.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, attire mon attention sur Ton évocation durant les moments d\'insouciance, emploie-moi dans l\'obéissance à Toi les jours passés sur terre, fais-moi suivre une voie facile vers Ton amour et parfait par lui pour moi le bien de ce monde et de l\'au-delà.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, de la meilleure façon que Tu n\'aies prié sur quiconque de Tes créatures avant lui, et que Tu pries encore sur quiconque après lui, accorde-nous un Bienfait dans ce monde et un Bienfait dans l\'Autre, et préserve-moi, par Ta Miséricorde, du Châtiment du Feu.',
      ]
    },

    'z-hussain': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyara Imam al-Ḥusayn',
      subtitle: 'Visite pieuse à l\'Imam al-Ḥusayn ibn \'Alī (p)',
      body: [
        {t:'zv', tx:'Que la paix soit sur toi, ô fils du Messager de Dieu,', ar:'Assalâmo \'alayka yâ bna rasûli-l-lâhi'},
        {t:'zv', tx:'Que la paix soit sur toi, Ô fils du Prince des croyants.', ar:'As-salâmo \'alayka yâ bna amira-l-mominin'},
        {t:'zv', tx:'Que la paix soit sur toi, Ô fils de la Véridique, de la pure Fatimah, la première dame des femmes du monde !', ar:'As-Salamo \'Alayka yâ bna-s-siddiqati at-tahirati fâtimata sayyedati niçâ-il-\'âlamin'},
        {t:'zv', tx:'Que la paix soit sur toi, ô maître Abû Abdellah ainsi que la Miséricorde de Dieu et Sa Bénédiction !', ar:'As-slâmo alayka yâ mawlâya wa rahmato-llahi wa barakâtuhu'},
        {t:'zv', tx:'J\'atteste que tu as accompli la prière, que tu as donné la Zakat (l\'aumône),', ar:'Ashhadu annaka qad aqmata-s-slâta wa âtayta-z-zakâta'},
        {t:'zv', tx:'Que tu as ordonné le bien et interdit le mal,', ar:'wa amarta bi-l-ma\'rufi wa nahayta \'ani-l-munkari'},
        {t:'zv', tx:'Que tu as récité le livre d\'une juste lecture,', ar:'wa talawta-l-kitâba haqqan tilâwatihi'},
        {t:'zv', tx:'Que tu as lutté pour Dieu, le juste Combat.', ar:'wa jâhadta fi-Llah, haqqan jihâdihi'},
        {t:'zv', tx:'Que tu as patienté devant le mal aux côtés de Dieu jusqu\'à ce que la certitude t\'ait atteint,', ar:'wa sabarta \'ala-l-adha fi janbihi muhtasibann hattâ atâka-l-yaqinu'},
        {t:'zv', tx:'J\'atteste que ceux qui t\'ont désobéi, t\'ont combattu, t\'ont tué, sont maudits de la langue même du prophète, l\'illettré.', ar:'Ashhadu anna-l-ladhîna khâlafûka wa hârabûka wa-l-ladhîna qatalûka, mal\'ûnina \'ala lisâni-n-nabiyyi-l-ummiyyi'},
        {t:'zv', tx:'Que Dieu Maudisse ceux qui ont été injustes à votre encontre, des premiers aux derniers et qu\'Il augmente leur douloureux châtiment.', ar:'la\'ana-llâhu azh-zhâlimina lakum mina-l-awwalîna wa-l-âkhirîna'},
        {t:'zv', tx:'Ô mon maître, Ô fils du Messager de Dieu, je suis connaissant de tes droits, allié de tes alliés, hostile à ceux qui te sont hostiles,', ar:'Yâ mawlâya yâ\'bna rasûli-llâhi, Inni \'ârifann bi-haqqika, muwâliyann li-aw-liyâ\'ika'},
        {t:'zv', tx:'Clairvoyant de la bonne voie sur laquelle tu es, connaissant l\'égarement de ceux qui se sont opposés à toi, aussi intercède pour moi auprès de Dieu.', ar:'Mustabsirann bi-l-hudâ al-ladhî anta \'alayhi, fa-ashfa\' lî \'inda rabbika'},
        {t:'zv', tx:'Que la paix soit sur toi, ô Argument de Dieu sur Sa Terre et dans Son Ciel !', ar:'As-salâmu \'alayka yâ hujjatu-llâhi fî ardihi wa samâ\'ihi'},
        {t:'zv', tx:'Que Dieu prie sur ton bon esprit et ton corps pur, et que la paix soit sur toi, ô mon Maître, ainsi que la Miséricorde de Dieu et Ses Bénédictions !', ar:'Salla-llâhu \'ala rûhika at-tayyiba wa jaçadika, wa rahmatu-llâhi wa barakâtuhu'},
        {t:'instruction', tx:'Après la visite (Ziyārat), il est recommandé d\'accomplir deux rak\'ats et les offrir à l\'Imam al-Ḥusayn (p). À la fin de la prière, dire :'},
        {t:'zv', tx:'Ô mon Dieu, j\'offre ces deux rak\'ats que je viens d\'accomplir à mon Maître l\'Imam Al-Hussein (p).', ar:'Allâhomma inni çallayto hâtayni ar-rek\'atayni hadiyatann minni ilâ sayyidi wa malâya abâ abdillâhi-l-Hussein'},
      ]
    },

    'z-warith': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyārat Wārith',
      subtitle: 'Ziyārat al-Imam al-Ḥusayn (p) — Se diriger vers Karbalā\'',
      body: [
        {t:'instruction', tx:'Formuler l\'intention (Niyyah) : « Je récite Ziyārat al-Imam Ḥusayn (as) Qurbatan ilallāh ». Se diriger vers la direction du Mausolée de l\'Imam Ḥusayn vers Karbalā\' en Iraq.'},
        {t:'zv', tx:'Allāhumma ṣalli \'alā Muḥammad wa āle Muḥammad', ar:'اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّد'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'Adam, l\'Élu d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ آدَمَ صَفِيِّ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Noé (Nūḥ), le Prophète d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ نُوحٍ نَبِيِّ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'Ibrāhīm (Abraham), l\'Ami privilégié d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ إِبْرَاهِيمَ خَلِيلِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Moussa (Moïse), Interlocuteur d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ مُوسَى كَلِيمِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de \'Isā (Jésus), l\'Esprit d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ عِيسَى رُوحِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Moḥammad, le Bien-aimé d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ مُحَمَّدٍ حَبِيبِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de \'Alī, le Commandeur des Croyants, le Waliy d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ عَلِيٍّ أَمِيرِ الْمُؤْمِنِينَ'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'al-Ḥasan, le martyr, le petit-fils du Messager d\'Allah !'},
        {t:'zv', tx:'Paix sur toi, o fils du Messager d\'Allah ! Paix sur toi, o fils de Fāṭimah al-Zahrā\', la Maîtresse des femmes des mondes !'},
        {t:'zv', tx:'Paix sur toi, o Abū \'Abdullāh al-Ḥusayn ! Paix sur toi, O élu d\'Allah et fils de Son élu !'},
        {t:'zv', tx:'Paix sur toi, o Vengeance d\'Allah et fils de Sa Vengeance ! Paix sur toi, o vengeance et revendicateur de vengeance !'},
        {t:'zv', tx:'Paix sur toi, o Imam guidant et pur, ainsi que sur les âmes qui se sont rendues dans ton enclos, qui reposent dans ton voisinage, et qui sont venues avec tes visiteurs en pèlerins !'},
        {t:'zv', tx:'Paix sur toi, de ma part, tant que je vivrai et tant que demeureront la nuit et le jour, car ta perte est un grand malheur et un préjudice grave pour les Croyants, les Musulmans, et pour tous les habitants du Ciel et de la terre. Ainsi, nous sommes à Dieu et à Lui nous retournerons !'},
        {t:'zv', tx:'Que la Prière d\'Allah, Ses Bénédictions et Ses Salutations soient sur toi, sur tes parents purs, bons et nobles, et sur leurs descendants bons-guides et bien-guidés !'},
        {t:'zv', tx:'Ô mon Maître ! Ô Abū Abdullāh al-Ḥusayn ! Je suis l\'hôte d\'Allah et ton hôte, le voisin d\'Allah et ton voisin ; or tout hôte et tout voisin a droit à un geste d\'hospitalité, et mon droit sur toi à présent est que tu demandes à Allah de m\'accorder la libération de mon cou de l\'Enfer ! Il est celui qui entend la prière, Il est Proche et Il est celui qui exauce !'},
        {t:'zv', tx:'Allāhumma ṣalli \'alā Muḥammad wa āle Muḥammad', ar:'اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّد'},
      ]
    },

    'z-ashura': {
      source: 'Ziyāra — Visites pieuses',

// ══ BUILD SIDEBAR ══
var sbScroll = document.getElementById('sb-scroll');
var activeItemId = null;

DATA.themes.forEach(function(theme) {
  var group = document.createElement('div');
  group.className = 'sb-group';

  var themeBtn = document.createElement('div');
  themeBtn.className = 'sb-theme';
  themeBtn.innerHTML = '<span class="sb-theme-icon">'+theme.icon+'</span><span class="sb-theme-label">'+theme.label+'</span><span class="sb-chevron">›</span>';

  var itemsDiv = document.createElement('div');
  itemsDiv.className = 'sb-items';

  theme.items.forEach(function(item) {
    var el = document.createElement('div');
    el.className = 'sb-item';
    el.textContent = item.emoji + ' ' + item.label;
    el.addEventListener('click', function() {
      document.querySelectorAll('.sb-item').forEach(function(i){ i.classList.remove('active'); });
      el.classList.add('active');
      showInvocation(item.id);
    });
    itemsDiv.appendChild(el);
  });

  themeBtn.addEventListener('click', function() {
    var isOpen = itemsDiv.classList.contains('open');
    // Close all
    document.querySelectorAll('.sb-items').forEach(function(d){ d.classList.remove('open'); });
    document.querySelectorAll('.sb-theme').forEach(function(t){ t.classList.remove('open'); });
    if(!isOpen) {
      itemsDiv.classList.add('open');
      themeBtn.classList.add('open');
    }
  });

  group.appendChild(themeBtn);
  group.appendChild(itemsDiv);
  sbScroll.appendChild(group);
});

// ══ SIDEBAR TOGGLE ══
var sidebar = document.getElementById('sidebar');
var toggle = document.getElementById('sb-toggle');
var sidebarOpen = true;
toggle.addEventListener('click', function(){
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('collapsed', !sidebarOpen);
  toggle.textContent = sidebarOpen ? '‹' : '›';
  toggle.style.left = sidebarOpen ? '240px' : '0';
});

// ══ RENDER INVOCATION ══
function showInvocation(id) {
  var data = DATA.invocations[id];
  if(!data) return;

  var welcome = document.getElementById('welcome');
  var content = document.getElementById('content');
  welcome.classList.add('hidden');
  content.classList.remove('hidden');

  var html = '';
  html += '<div class="c-source">'+data.source+'</div>';
  html += '<div class="c-title">'+data.title+'</div>';
  if(data.subtitle) html += '<div class="c-subtitle">'+data.subtitle+'</div>';
  html += '<div class="c-divider"></div>';

  if(data.prose) {
    html += '<div class="c-prose">';
    data.body.forEach(function(p){ html += '<p>'+p+'</p>'; });
    html += '</div>';
  } else {
    data.body.forEach(function(v){
      if(v.t === 'salawat') {
        html += '<div class="c-salawat">— Ṣalawāt —</div>';
      } else if(v.t === 'intro') {
        html += '<div class="c-intro">'+v.tx+'</div>';
      } else if(v.t === 'instruction') {
        html += '<div class="c-instruction">'+v.tx+'</div>';
      } else if(v.t === 'v') {
        html += '<div class="c-verse"><div class="c-vnum">'+v.n+'</div><div class="c-vtext">'+v.tx+'</div></div>';
      } else if(v.t === 'zv') {
        html += '<div class="c-zv"><div class="c-zv-text">'+v.tx+(v.ar?'<div class="c-zv-ar">'+v.ar+'</div>':'')+'</div></div>';
      }
    });
  }

  content.innerHTML = html;
  content.scrollTop = 0;
  // Trigger animation
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = '';
}
</script>

<script>

    if (e.data.theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  }
});
