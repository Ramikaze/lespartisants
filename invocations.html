        {t:'tri', ar:"حَتَّى يَسْعَدُوا بِي وَأَسْعَدَ بِهِمْ", tr:"hattâ yas ‘adû bi wa as’ada bihim", fr:"de sorte qu’ils soient heureux par moi et moi par eux!"},
        {t:'tri', ar:"آمِينَ رَبَّ الْعَالَمِينَ", tr:"âmîna rabba al’âlamîna", fr:"Amen, Ô Seigneur des mondes!"},
        {t:'salawat'},
      ]
    },
    's27': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "27. Pour les Gens des Frontières",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour ceux qui défendent les frontières",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ لأهْلِ الثغُورِ", tr:"", fr:"La vingt septième supplication: pour ceux qui défendent les frontières"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et sa Famille!"},
        {t:'tri', ar:"وَحَصِّنْ ثُغُورَ الْمُسْلِمِينَ بِعِزَّتِكَ", tr:"wa haşşin thughûra almuslimîna bi’ izzatika", fr:"Fortifie les frontières des musulmans de par Ton Pouvoir,"},
        {t:'tri', ar:"وَأَيِّدْ حُمَاتَهَا بِقُوَّتِكَ", tr:"wa ayyid humâtahâ biquwwatika", fr:"Veille sur les défenseurs, de par Ta Pussance,"},
        {t:'tri', ar:"وَأَسْبِغْ عَطَايَاهُمْ مِنْ جِدَتِكَ", tr:"wa asbigh ‘atâyâhum min jidatika", fr:"et abonde Ta Richesse."},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et sa Famille!!"},
        {t:'tri', ar:"وَكَثِّرْ عِدَّتَهُمْ", tr:"wa kaththir ‘iddatahum", fr:"Augmente leur nombre,"},
        {t:'tri', ar:"وَاشْحَذْ أَسْلِحَتَهُمْ", tr:"wachhadh aslihatahum", fr:"aiguise les lames de leurs armes,"},
        {t:'tri', ar:"وَاحْرُسْ حَوْزَتَهُمُ", tr:"wahrus hawzatahum", fr:"protège leur centre d’activité,"},
        {t:'tri', ar:"وَامْنَعْ حَوْمَتَهُمْ", tr:"wamna » » hawmatahum", fr:"défends leur milieu,"},
        {t:'tri', ar:"وَأَلِّفْ جَمْعَهُمْ", tr:"wa allif jam’ahum", fr:"unifie leur foule nombreuse,"},
        {t:'tri', ar:"وَدَبِّرْ أَمْرَهُمْ", tr:"wa dbbir amrahum", fr:"arrange leurs affaires Toi-même,"},
        {t:'tri', ar:"وَوَاتِرْ بَيْنَ مِيَرِهِمْ", tr:"wa wâtir bayna mîrihim", fr:"Envoie-leur continuellement du ravitaillement,"},
        {t:'tri', ar:"وَتَوَحَّدْ بِكِفَايَةِ مُؤَنِهِمْ", tr:"wa tawahhad bikifâyati mû’anihim", fr:"et fais-en sorte que leurs provisions leur suffisent, enlève toute difficulté de leur chemin,"},
        {t:'tri', ar:"وَاعْضُدْهُمْ بِالنَّصْرِ", tr:"wa dud-hum binnaşri", fr:"supporte et fortifie-les avec des victoires,"},
        {t:'tri', ar:"وَأَعِنْهُمْ بِالصَّبْرِ", tr:"wa a inhum bişşabri", fr:"Aide-les avec patience,"},
        {t:'tri', ar:"وَالْطُفْ لَهُمْ فِي الْمَكْرِ", tr:"waltuf lahum filmakri", fr:"et donne-leur subtilité contre les ruses de l’ennemi!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et sa Famille!"},
        {t:'tri', ar:"وَعَرِّفْهُمْ مَا يَجْهَلُونَ", tr:"wa ‘arrifhum mâ yajhalûna", fr:"Fais-leur connaître ce qu’ils ignorent,"},
        {t:'tri', ar:"وَعَلَّمْهُمْ مَا لاَ يَعْلَمُونَ", tr:"wa ‘allimhum mâ lâ ya ‘lamûna", fr:"apprends-leur ce qu’ils ne savent pas,"},
        {t:'tri', ar:"وَبَصِّرْهُمْ مَا لَا يُبْصِرُونَ", tr:"wa başşirhum mâ lâ yubşirûna", fr:"et fais-leur voir ce qu’ils ne peuvent voir ou deviner"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa alihi", fr:"Ô Dieu! Bénis Mohammad et sa Famille!"},
        {t:'tri', ar:"وَأَنْسِهِمْ عِنْدَ لِقَائِهِمُ الْعَدُوَّ", tr:"wa ansihim ‘inda liqâ’ihim al’ aduwwa", fr:"Fais-en sorte qu’au moment de rencontrer l’ennemi,"},
        {t:'tri', ar:"ذِكْرَ دُنْيَاهُمُ الْخَدَّاعَةِ الْغَرُورِ", tr:"dhikra dunyâhum alkhaddâ’ati algharûri", fr:"ils puissent oublier le souvenir de leur monde trompeur,"},
        {t:'tri', ar:"وَامْحُ عَنْ قُلُوبِهِمْ خَطَرَاتِ الْمَالِ الْفَتُونِ", tr:"wamhû ‘an qulûbihim khatarâti almâli alfatûni", fr:"et plein d’illusions séductrices; efface de leurs coeurs, les tentations attirantes pour avoir des possessions matérielles,"},
        {t:'tri', ar:"وَاجْعَلِ الْجَنَّةَ نَصْبَ أَعْيُنِهِمْ", tr:"waj al aljannata naşba a yunihim", fr:"et place le Jardin de Paradis devant leurs yeux,"},
        {t:'tri', ar:"وَلَوِّحْ مِنْهَا لأَبْصَارِهِمْ", tr:"wa lawwih minhâ li-abşârihim", fr:"et fais apparaître devant leurs yeux,"},
        {t:'tri', ar:"مَا أَعْدَدْتَ فِيهَا مِنْ مَسَاكِنِ الْخُلْدِ", tr:"mâ a’dadta fihâ min masâkini alkhuldi", fr:"la part que Tu leur as préparés: des lieux éternels,"},
        {t:'tri', ar:"وَمَنَازِلِ الْكَرَامَةِ", tr:"wa manâzili alkarâmati", fr:"des palais d’honneur,"},
        {t:'tri', ar:"وَالْحُورِ الْحِسَانِ", tr:"walhûri alhisâni", fr:"des Houris (créatures angéliques) séduisantes et belles,"},
        {t:'tri', ar:"وَالأَنْهَارِ الْمُطَّرِدَةِ بِأَنْوَاعِ الأَشْرِبَةِ", tr:"walanhâri almutțaridati bi- anwâ’ I al-achribati", fr:"des rivières qui coulent avec toutes sortes de boissons,"},
        {t:'tri', ar:"وَالأَشْجَارِ الْمُتَدَلِّیَةِ بِصُنُوفِ الثَّمَرِ", tr:"wal-achjâri almutadalliyati bişunûfi aththamari", fr:"des arbres qui se courbent tout bas avec toutes sortes de fruits,"},
        {t:'tri', ar:"حَتَّى لاَ يَهُمَّ أَحَدٌ مِنْهُمْ بِالإِدْبَارِ", tr:"hatta la yahumma ahadun minhum bil-idbâri", fr:"de peur qu’aucun d’entre eux ne songe à tourner son dos,"},
        {t:'tri', ar:"وَلَا يُحَدِّثَ نَفْسَهُ عَنْ قِرْنِهِ بِفرَارٍ", tr:"wa lâ yuhadditha nafsahû ‘an qirnihî bifirârin", fr:"ou bien suggérer à lui-même de prendre la fuite."},
        {t:'tri', ar:"اللَّهُمَّ افْلُلْ بِذَلِكَ عَدُوَّهُمْ", tr:"allâhumma uflul bidhâlika ‘aduwwahum", fr:"Ô Dieu! Écrase leurs ennemis par cela même, tranche leurs poigns puissants,"},
        {t:'tri', ar:"وَأَقْلِمْ عَنْهُمْ أَظْفَارَهُمْ", tr:"wa aqlim ‘anhum azfârahum", fr:"de sorte qu’ils ne puissent les atteindre,"},
        {t:'tri', ar:"وَفَرِّقْ بَيْنَهُمْ وَبَيْنَ أَسْلِحَتِهِمْ", tr:"wa farriq baynahum wa bayna aslihatihim", fr:"Sépare-les de leurs armes,"},
        {t:'tri', ar:"وَاخْلَعْ وَثَائِقَ أَفْئِدَتِهِمْ", tr:"wakhla wathâ’iqa af’idatihim", fr:"dénoue (déchire) les liens de leurs coeurs,"},
        {t:'tri', ar:"وَبَاعِدْ بَيْنَهُمْ وَبَيْنَ أَزْوِدَتِهِمْ", tr:"wa bâ’id baynahum wa bayna azwidatihim", fr:"Garde-les éloignés de leurs réserves de provisions,"},
        {t:'tri', ar:"وَحَيِّرْهُمْ فِي سُبُلِهِمْ", tr:"wa hayyirhum fi subulihim", fr:"Désoriente-les dans leurs chemins,"},
        {t:'tri', ar:"وَضَلِّلْهُمْ عَنْ وَجْهِهِمْ", tr:"wa dallilhum ‘an wajhihim", fr:"Déroute-les de leurs directions,"},
        {t:'tri', ar:"وَاقْطَعْ عَنْهُمُ الْمَدَدَ", tr:"waqta »anhum almadada", fr:"Coupe-leur les liens de toute aide,"},
        {t:'tri', ar:"وَانْقُصْ مِنْهُمُ الْعَدَدَ", tr:"wanquş minhum al’adada", fr:"réduis leur nombre,"},
        {t:'tri', ar:"وَامْلأ أَفْئِدَتَهُمُ الرُّعْبَ", tr:"wamla’ af’idatahum arru ba", fr:"remplis leur coeur de terreur,"},
        {t:'tri', ar:"وَاقْبِضْ أَيْدِيَهُمْ عَنِ الْبَسْطِ", tr:"waqbid aydiyahum ‘an albasți", fr:"empêche leurs mains de s’étendre,"},
        {t:'tri', ar:"وَاخْزِمَ السِنَتَهُمْ عَنِ النُّطْقِ", tr:"wakhzim alsinatahum ‘an annuțai", fr:"muselle leurs gueules pour qu’ils ne puissent plus proférer quoique ce soit,"},
        {t:'tri', ar:"وَشَرِّدْ بِهِمْ مَنْ خَلْفَهُمْ", tr:"wa charrid bihim man khalfahum", fr:"de sorte que ceux qui étaient restés en arrière se dispersent, et dégrade-les pour"},
        {t:'tri', ar:"وَتَكِّلْ بِهِمْ مَنْ وَرَاءَهُمْ", tr:"wa nakkil bihim man warâ’ahum", fr:"que ceux qui se trouvent au devant reçoivent une bonne leçon,"},
        {t:'tri', ar:"وَاقْطَعْ بِخِزْيِهِمْ أَطْمَاعَ مَنْ بَعْدَهُمْ", tr:"waqța » » bikhizyihim ațmâ’a man ba dahum", fr:"et que leur soit infligés une humiliation!"},
        {t:'tri', ar:"اَللَّهُمَّ عَقَّمْ أَرْحَامَ نِسَائِهِمْ", tr:"allâhumma ‘aqqim arhâma nisâ’ihim", fr:"Ô Dieu! Rends stériles l’utérus de leurs femmes,"},
        {t:'tri', ar:"وَيَبِّسْ أَصْلاَبَ رِجَالِهِمْ", tr:"wa yabbis aşlâba rijâlihim", fr:"taris les reins de leurs hommes"},
        {t:'tri', ar:"وَاقْطَعْ نَسْلَ دَوَابِّهِمْ وَأَنْعَامِهِمْ", tr:"waqt’ a nasla dawâbbihim wa an’âmihim", fr:"réduis leurs bétails,"},
        {t:'tri', ar:"لاَ تَأْذَنْ لِسَمَائِهِمْ فِي قَطْرٍ", tr:"la ta dhan lisamâ’ihim fi qatrin", fr:"et ne permets pas à leur ciel de verser la pluie,"},
        {t:'tri', ar:"وَلَاَ لأَرْضِهِمْ فِي نَبَاتٍ", tr:"wa lâ li-ardihim fi nabâtin", fr:"et leurs terres de pousser (croître)"},
        {t:'tri', ar:"اَللّهُمَّ وَقَوِّ بِذَلِكَ مَحَالَّ أَهْلِ الإِسْلاَمِ", tr:"allâhumma wa qawwi bidhâlika mihâla ahli al- islâmi", fr:"O Dieu! De par tout cela, renforce les prouesses (les territoires – le rang – la situation) des partisans de l’Islam!"},
        {t:'tri', ar:"وَحَصِّنْ بِهِ دِيَارَهُمْ", tr:"wa haşşin bihî diyârahum", fr:"fortifie leurs territoires,"},
        {t:'tri', ar:"وَثَمِّرْ بِهِ أَمْوَالَهُمْ", tr:"wa thammir bihi amwâlahum", fr:"fructifie leurs propriétés,"},
        {t:'tri', ar:"وَفَرِّغْهُمْ عَنْ مُحَارَبَتِهِمْ لِعِبَادَتِكَ", tr:"wa farrighhum ‘an muhârabatihim li’ibâdatika", fr:"et fais disparaître de leurs coeurs, toute inquiétude des batailles et des guerres, pour qu’ils puissent T’adorer en toute quiétude,"},
        {t:'tri', ar:"وَعَنْ مُنَابَذَتِهِمْ لِلْخَلْوَةِ بِكَ", tr:"wa an munâbadhatihim lilkhalwati bika", fr:"et d’être seuls avec Toi,"},
        {t:'tri', ar:"حَتَّى لاَ يُعْبَدَ فِي بِقَاعِ الأَرْضِ غَيْرُكَ", tr:"hattâ lâ yu’ bada fi biqâ’i al-ardi ghayruka", fr:"de sorte que personne ne puisse être adorée dans toutes les régions de la terre excepté Toi Seul,"},
        {t:'tri', ar:"وَلَا تُعَفَّرَ لأَحَدٍ مِنْهُمْ جَبْهَةٌ دُونَكَ", tr:"wa lâ tu’affara li-ahadin minhum jabhatun dûnaka", fr:"et que le front d’aucun d’entre eux ne soit frotté dans la poussière, excepté pour Toi"},
        {t:'tri', ar:"اَللَّهُمَّ اغْزُ بِكُلِّ نَاحِيَةٍ مِنَ الْمُسْلِمِينَ", tr:"allâhumma ughzu bikulli nâhiyatin min almuslimina", fr:"Ô Dieu! Envoie les Musulmans de toutes les régions"},
        {t:'tri', ar:"عَلَى مَنْ بِإِزَائِهِمْ مِنَ الْمُشْرِكِينَ", tr:"alâ man bi- izâ’ihim min almuchrikina", fr:"guerroyer contre les idolâtres qui leur font face!"},
        {t:'tri', ar:"وَأَمْدِدْهُمْ بِمَلائِكَةٍ مِنْ عِنْدِكَ مُرْدِفِينَ", tr:"wa amdid-hum bimalâ’ikatin min ‘ indika murdifîna", fr:"Aide-les avec la présence des Tes Anges en rangs bien arrangés,"},
        {t:'tri', ar:"حَتَى يَكْشِفُوهُمْ إِلَى مُنْقَطَعِ التُّرَابِ", tr:"hattâ yakchifûhum ilâ munqața i atturâbi", fr:"jusqu’à ce que les idolâtres soient chassés jusqu’au"},
        {t:'tri', ar:"قَتْلاً فِي أَرْضِكَ وَأَسْراً", tr:"qatlan fi ardika wa asran", fr:"confins du monde, tués sur Ta terre ou pris en captivité;"},
        {t:'tri', ar:"أَوْ يُقِرُّوا بِأَنَّكَ أَنْتَ اللَّهُ", tr:"aw yuqirrû bi- annaka anta allâhû", fr:"ou bien jusqu’à ce qu’ils admettent que Tu es Dieu,"},
        {t:'tri', ar:"اَلَّذِي لَا إِلَهَ إِلاَّ أَنْتَ", tr:"alladhi lâ ilâha illâ anta", fr:"et qu’il n’existe d’autres dieux que Toi,"},
        {t:'tri', ar:"وَحْدَكَ لاَ شَرِيكَ لَكَ", tr:"wahdaka lâ charika laka", fr:"que Tu es Seul, et sans aucun associé!"},
        {t:'tri', ar:"اللَّهُمَّ وَاعْمُمْ بِذَلِكَ أَعْدَاءَكَ فِي أَقْطَارِ الْبِلَادِ", tr:"allâhumma wa’mum bidhâlika a’ dâ’aka fi aqtâri albilâdi", fr:"Ô Dieu! Inclus ce destin pour tous les ennemis, dans toutes les régions mondiales,"},
        {t:'tri', ar:"مِنَ الْهِنْدِ وَالرُّومِ وَالْتُّرْكِ وَالْخَزَرِ", tr:"min alhindi wa arrûmi wa atturki walkhazari", fr:"que ce soit pour les Indiens les Byzantins, les Turcs, les habitants de la Caspienne,"},
        {t:'tri', ar:"وَالْحَبَشِ وَالنُّوبَةِ وَالزَّنْجِ وَالسَّقَالِبَةِ وَالدِّيَالِمَةِ", tr:"walhabachi wa annûbati wa azzinji wa assaqâlibati wa addayalimati", fr:"les Abyssiniens, les Nubiens, les Zanghis, les Slaves, les Daylamiles,"},
        {t:'tri', ar:"وَسَائِرِ أُمَمِ الشِّرْكِ الَّذِينَ تَخْفَى أسْمَاؤُهُمْ وَصِفَاتُهُمْ", tr:"wa sá’iri umami achchirki alladhina takhfâ asmâ’uhum wa șifâtuhum", fr:"et le reste des nations qui suivent la tradition de l’idolâtrie, ceux dont les noms et attributs nous sont cachés,"},
        {t:'tri', ar:"وَقَدْ أَحْصَيْتَهُمْ بِمَعْرِفَتِكَ", tr:"wa qad ahşaytahum bima’rifatika", fr:"mais que Tu les comptes de par Ta Connaissance,"},
        {t:'tri', ar:"وَأَشْرَفْتَ عَلَيْهِمْ بِقُدْرَتِكَ", tr:"wa achrafta ‘alayhim biqudratika", fr:"et surveilles de par Ton Pouvoir!"},
        {t:'tri', ar:"اَللَّهُمَّ أشغَلِ الْمُشْرِكِينَ بِالْمُشْرِكِينَ", tr:"allâhumma achghal almuchrikîna bilmuchrikîna", fr:"Ô Dieu! Occupe les idolâtres par d’autres idolâtres,"},
        {t:'tri', ar:"عَنْ تَنَاولِ أَطْرَافِ الْمُسلِمِينَ", tr:"an tanâwuli atrâfi almuslimîna", fr:"pour qu’ils ne puissent atteindre les frontières des Musulmans, et qu’ils soient réduits"},
        {t:'tri', ar:"وَخُذْهُمْ بِالنَّقْصِ عَنْ تَنَقُّصِهِمْ", tr:"wa khudh-hum binnaqsi ‘an tanaqquşihim", fr:"à néant, et barre-les par la dispersion, de sorte qu’ils ne puissent se mobiliser contre les Musulmans et par une séparation,"},
        {t:'tri', ar:"وَثَبِّطْهُمْ بِالْفُرْقَةِ عَنِ الإحْتِشَادِ عَلَيْهِمْ", tr:"wa thabbithum bilfurqati ‘an alihtichâdi ‘alayhim", fr:"Empêche-les de former une sorte d’unité pour qu’ils ne puissent agir contre les Musulmans,"},
        {t:'tri', ar:"اَللَّهُمَّ أَخْلِ قُلُوبَهُمْ مِنَ الأَمَنَةِ", tr:"allâhumma akhli qulübahum min al-amanati", fr:"Ô Dieu! vide leur coeur de toute sécurité,"},
        {t:'tri', ar:"وَأَبْدَانَهُمْ مِنَ القُوَّةِ", tr:"wa abdânahum min alquwwati", fr:"et leurs corps de toute force,"},
        {t:'tri', ar:"وَأَذْهِلْ قُلُوبَهُمْ عَنِ الإحْتِيَالِ", tr:"wa adh-hil qulûbahum ‘an alihtiyâli", fr:"et qu’ils soient ivres pour penser à des stratagèmes!"},
        {t:'tri', ar:"وَأَوْهِنْ أَرْكَانَهُمْ عَنْ مُنَازَلَةِ الرِّجَالِ", tr:"wa awhin arkânahum ‘an munâzalati arrijâli", fr:"Fais-en sorte que leurs membres soient trop faibles pour se battre avec les hommes,"},
        {t:'tri', ar:"وَجَبِّنْهُمْ عَنْ مُقَارَعَةِ الأَبْطَالِ", tr:"wa jabbinhum ‘an muqâra ‘ati al- abtâli", fr:"et empêche-les de sorte qu’ils ne puissent combattre avec les héros,"},
        {t:'tri', ar:"وَابْعَثْ عَلَيْهِمْ جُنْدا مِنْ مَلاَئِكَتِكَ", tr:"wab’ath alayhim jundan min malâ’ikatika", fr:"et envoie une de Tes Troupes Angéliques contre leurs manœuvres"},
        {t:'tri', ar:"بِبَأْسٍ مِنْ بَأْسِكَ كَفِعْلِكَ يَوْمَ بَدْرٍ", tr:"biba’sin min ba’sika kafi lika yawma badrin", fr:"avec Ta Sévérité: comme Tu l’as fais pendant la journée de la bataille de «  »Badr » »,"},
        {t:'tri', ar:"تَقْطَعُ بِهِ دَابِرَهُمْ", tr:"taqța u bihi dâbirahum", fr:"de sorte que Tu puisses les déraciner,"},
        {t:'tri', ar:"وَتَحْصُدُ بِهِ شَوْكَتَهُمْ", tr:"wa tahşudu bihî chawkatahum", fr:"moissonner leurs années,"},
        {t:'tri', ar:"وَتُفَرِّقُ بِهِ عَدَدَهُمْ", tr:"wa tufarriqu bihî ‘adadahum", fr:"et disperser leur nombre!"},
        {t:'tri', ar:"اَللَّهُمَّ وَامْزُجْ مِيَاهَهُمْ بِالْوَبَاءِ", tr:"allâhumma wamzuj miyâhahum bilwabâ’i", fr:"Ô Dieu! mélange l’eau potable qu’ils utilisent avec le choléra,"},
        {t:'tri', ar:"وَأَطْعِمَتَهُمْ بِالأَدْوَاءِ", tr:"wa aț’ imatahum bil-adwâ’i", fr:"et leurs nourritures avec des maladies diverses."},
        {t:'tri', ar:"وَارْمِ بِلاَدَهُمْ بِالْخُسُوفِ", tr:"warmi bilâdahum bilkhusûfi", fr:"Fais engloutir par la terre leurs villes,"},
        {t:'tri', ar:"وَأَلِحَّ عَلَيْهَا بِالْقُذُوفِ", tr:"wa alihha ‘alayhâ bilqudhûfi", fr:"Harasse-les avec la lapidation,"},
        {t:'tri', ar:"وَافْرَعْهَا بِالْمُحُولِ", tr:"wafra hâ bilmuhûli", fr:"Gêne-les avec la sécheresse et la famine,"},
        {t:'tri', ar:"وَاجْعَلْ مِيَرَهُمْ فِي أَحَصِّ أَرْضِكَ وَأَبْعَدِهَا عَنْهُمْ", tr:"waj al miyarahum fi ahaşşi ardika wa ab’adihâ ‘anhum", fr:"installe leurs provisions dans les parts les plus impropices, loin de toute abondance de Ta terre, et hors de leur atteinte,"},
        {t:'tri', ar:"وَامْنَعْ حُصُونَهَا مِنْهُمْ", tr:"wamna’ huşûnahâ minhum", fr:"Eloigne-les des forteresses de cette terre,"},
        {t:'tri', ar:"أَصِبْهُمْ بِالْجُوعِ الْمُقِيمِ وَالسُّقْمِ الأَلِيمِ", tr:"aşibhum biljû i almuqimi wassuqmi al-alimi", fr:"et frappe-les sans cesse d’une faim continuelle et des maladies douloureuses!"},
        {t:'tri', ar:"اللَّهُمَّ وَأَيُّمَا غَازٍ غَزَاهُمْ مِنْ أَهْلِ مِلَّتِكَ", tr:"allâhumma wa ayyumâ ghâzin ghazâhum min ahli millatika", fr:"Ô Dieu! Si un combattant de Ton peuple se bat contre eux,"},
        {t:'tri', ar:"أَوْ مُجَاهِدٍ جَاهَدَهُمْ مِنْ أَتَبَاعِ سُنَّتِكَ", tr:"aw mujâhidin jâhadahum min atbâ’i sunnatika", fr:"ou bien un soldat de l’armeé des fidèles qui suivent Tes prescriptions guerroie"},
        {t:'tri', ar:"لِيَكُونَ دِينُكَ الْأَعْلَى", tr:"liyakina dînuka al- a’lâ", fr:"contre eux, de sorte que Ta Religion soit supérieure,"},
        {t:'tri', ar:"وَحِزْبُكَ الْأَقْوَى", tr:"wa hizbuka al- aqwâ", fr:"et Ton Parti devienne le plus fort,"},
        {t:'tri', ar:"وَحَظُّكَ الأَوْفَى", tr:"wa hazzuka al- awfâ", fr:"et Ta Part la plus complète,"},
        {t:'tri', ar:"فَلَقِّهِ الْيُسْرَ وَهَیِّئْ لَهُ الْأَمْرَ", tr:"falaqqihi alyusra wa hayyi’ lahu al-amra", fr:"alors augmente et facilite ses affaires,"},
        {t:'tri', ar:"وَتَوَلَّهُ بِالنُّجْحِ", tr:"wa tawallahû binnujhi", fr:"sois attentif à ses moindres désirs en lui octroyant succès, sélectionne ses"},
        {t:'tri', ar:"وَتَخَيَّرْ لَهُ الأَصْحَابَ", tr:"wa takhayyar lahu al-ashaba", fr:"compagnons d’armes pour lui, fortifie son dos,"},
        {t:'tri', ar:"وَاسْتَقْوِ لَهُ الظَّهْرَ", tr:"wastaqwi lahu azzahra", fr:"augmente sa subsistance,"},
        {t:'tri', ar:"وَأَسْبِغْ عَلَيْهِ فِي النَّفَقَةِ", tr:"wa asbigh ‘alayhî finnafaqati", fr:"Accorde-lui enjouement"},
        {t:'tri', ar:"وَمَتِّعْهُ بِالنَّشَاطِ", tr:"wa matti hu binnachâți", fr:"et plaisir par une vitalité joyeuse,"},
        {t:'tri', ar:"وَاطْفِ عَنْهُ حَرَارَةَ الشَّوْقِ", tr:"watfi ‘anhû harârata achchawai", fr:"refroidis pour lui la chaleur de l’envie,"},
        {t:'tri', ar:"وَأَجِرْهُ مِنْ غَمِّ الْوَحْشَةِ", tr:"wa ajirhu min ghammi alwahchati", fr:"Sauve-le de la tristesse de la solitude,"},
        {t:'tri', ar:"وَأَنْسِهِ ذِكْرَ الأَهْلِ وَالْوَلَدِ", tr:"wa ansihî dhikra al-ahli walwalada", fr:"Fais-lui oublier le souvenir de sa femme et de ses enfants,"},
        {t:'tri', ar:"وَآثُرْ لَهُ حُسْنَ النِّيَّةِ", tr:"wa âthur lahû husna anniyyati", fr:"Guide-le vers une bonne volonté, et dirige ses intentions vers la droiture,"},
        {t:'tri', ar:"وَتَوَلَّهُ بِالْعَافِيَةِ", tr:"wa tawallahû bil ‘âfiyati", fr:"et occupe-Toi de lui en lui, procurant aise et bien-être;"},
        {t:'tri', ar:"وَأَصْحِبْهُ السَّلاَمَةَ", tr:"wa aşhibhu assalâmata", fr:"transforme la bonne santé en son compagnon intime,"},
        {t:'tri', ar:"وَأَعْفِهِ مِنَ الْجُبْنِ", tr:"wa a fihi min aljubni", fr:"Soulage-le de toute crainte,"},
        {t:'tri', ar:"وَأَلْهِمْهُ الْجُرْأَةَ", tr:"wa alhimhu aljur’ata", fr:"Inspire-le d’audace et de courage,"},
        {t:'tri', ar:"وَارْزُقْهُ الشِّدَّةَ", tr:"warzuqhu achchiddata", fr:"Accorde-lui la force,"},
        {t:'tri', ar:"وَأَيِّدْهُ بِالنُّصْرَةِ", tr:"wa ayyid-hu binnuşrati", fr:"Supporte-le avec Ton Aide,"},
        {t:'tri', ar:"وَعَلِّمْهُ السِّيَرَ وَالسُّنَنَ", tr:"wa ‘allimhu assiyara wassunana", fr:"Apprends-lui la bonne conduite, et des leçons pour qu’il puisse suivre les normes traditionnelles du Prophète (Sunna)"},
        {t:'tri', ar:"وَسَدِّدْهُ فِي الْحُكْمِ", tr:"wa saddid-hu filhukmi", fr:"Rends-le juste et droit dans son jugement,"},
        {t:'tri', ar:"وَاعْزِلْ عَنْهُ الرِّيَاءَ", tr:"wa zil ‘anhu arriyâ’a", fr:"éloigne de lui toute hypocrisie,"},
        {t:'tri', ar:"وَخَلِّصْهُ مِنَ السُّمْعَةِ", tr:"wa khallişhû min assum’ati", fr:"purifie-le de toute inclination à la célébrité,"},
        {t:'tri', ar:"وَاجْعَلْ فِكْرَهُ وَذِكْرَهُ", tr:"waj’al fikrahû wadhikrahû", fr:"et fais-en sorte que sa pensée et son souvenir,"},
        {t:'tri', ar:"وَظَعْنَهُ وَإِقَامَتَهُ فِيكَ وَلَكَ", tr:"waza nahû wa iqâmatahû fika wa laka", fr:"son départ et son séjour se résument en Toi et pour Toi!"},
        {t:'tri', ar:"فَإِذَا صَافَّ عَدُوَّكَ وَعَدُوَّهُ", tr:"fa idhâ sâffa ‘aduwwaka wa ‘aduwwahû", fr:"Et quand Il se trouve nez à nez avec Ton ennemi,"},
        {t:'tri', ar:"فَقَلِّلْهُمْ فِي عَيْنِهِ", tr:"faqallilhum fi ‘aynihi", fr:"diminue à ses yeux leur nombre,"},
        {t:'tri', ar:"وصَغِّرْ شَأْنَهُمْ فِي قَلْبِهِ", tr:"wa şaghghir cha’nahum fi qalbihi", fr:"minimise leur importance dans son coeur,"},
        {t:'tri', ar:"وَأَدِلْ لَهُ مِنْهُمْ", tr:"wa adil lahû minhum", fr:"Donne-lui une chance pour vaincre ses ennemis,"},
        {t:'tri', ar:"وَلَاَ تُدِلْهُمْ مِنْهُ", tr:"wa la tudilhum minhu", fr:"et non une chance à eux de le vaincre!"},
        {t:'tri', ar:"فَإِنْ خَتَمْتَ لَهُ بِالسَّعَادَةِ", tr:"fa in khatamta lahû bissa ‘âdati", fr:"Mais si Tu as scellé sa vie avec la félicité,"},
        {t:'tri', ar:"وَقَضَيْتَ لَهُ بِالشَّهَادَةِ", tr:"wa qadayta lahû bichchahâdati", fr:"et as décrété le martyre pour lui,"},
        {t:'tri', ar:"فَبَعْدَ أَنْ يَجْتَاحَ عَدُوَّكَ بِالْقَتْلِ", tr:"faba da an yajtâha ‘aduwwaka bilqatli", fr:"en ce cas, permets au moins qu’il extermine Tes ennemis"},
        {t:'tri', ar:"وَبَعْدَ أَنْ يَجْهَدَ بِهِمُ الأَسْرُ", tr:"wa ba da an yajhada bihim (u) al-asra", fr:"dont la captivité les avaient affligés,"},
        {t:'tri', ar:"وَبَعْدَ أَنْ تَأْمَنَ أطْرَافُ الْمُسْلِمِينَ", tr:"wa ba da an ta’mana atrâfu almuslimina", fr:"après que les frontières des Musulmans fussent en sécurité,"},
        {t:'tri', ar:"وَبَعْدَ أنْ يُوَلِّیَ عَدُوُّكَ مُدْبِرِينَ", tr:"wa ba da an yuwalliya ‘aduwwuka mudbirina", fr:"et que Ton ennemi eût tourné son dos et se fût enfui!"},
        {t:'tri', ar:"اللَّهُمَّ وَأَيُمَا مُسْلِمٍ خَلَفَ غَازِياً", tr:"allâhumma wa ayyumå muslimin khalafa ghâziyan", fr:"Ô Dieu! Et si un Musulman devrait prendre en charge la famille restante d’un guerrier,"},
        {t:'tri', ar:"أَوْ مُرَابِطاً فِي دَارِه", tr:"aw murâbițan fi dârihi", fr:"ou bien d’un soldat absent dans son pays,"},
        {t:'tri', ar:"أَوْ تَعَهَّدَ خَالِفِيهِ فِي غَيْبَتِهِ", tr:"aw ta ahhada khâlifihi fi ghaybatihi", fr:"et de prendre soin de ceux qu’il a laissé en arrière,"},
        {t:'tri', ar:"أَوْ أَعَانَهُ بِطَائِفَةٍ مِنْ مَالِهِ", tr:"aw a ânahû bițâ’ifatin min mâlihi", fr:"et de l’aider avec une portion de son argent,"},
        {t:'tri', ar:"أَوْ أَمَدَّهُ بِعَتَادٍ", tr:"aw amaddahû bi atâdin", fr:"de l’assister avec des munitions,"},
        {t:'tri', ar:"أَوْ شَحَذَهُ عَلَى جِهَادٍ", tr:"aw chahadhahû ‘ alâ jihâdin", fr:"de l’encourager pour le combat,"},
        {t:'tri', ar:"أَوْ أَتْبَعَهُ فِي وَجْهِهِ دَعْوَةً", tr:"aw atba ahû fi wajhihî da ‘watan", fr:"de prier pour lui et sa sauvegarde,"},
        {t:'tri', ar:"أَوْ رَعَى لَهُ مِنْ وَرَائِهِ حُرْمَةً", tr:"aw ra â lahû min warâ’ihi hurmatan", fr:"ou bien de sauvegarder son honneur pendant son absence,"},
        {t:'tri', ar:"فَأَجْرِ لَهُ مِثْلَ أَجْرِهِ وَزْناً بِوَزْنٍ", tr:"fa ajri lahû mithla ajrihi waznan biwaznin", fr:"récompense ce Musulman d’égal en égal, avec la récompense de ce gauérrier ou de ce soldat,"},
        {t:'tri', ar:"وَمِثْلاً بِمِثْلٍ", tr:"wa mithlan bimithlin", fr:"mesure pour mesure,"},
        {t:'tri', ar:"وَعَوِّضْهُ مِنْ فِعْلِهِ عِوَضاً حَاضِراً", tr:"wa ‘awwidhu min", fr:"et récompense-le pour son action avec une"},
        {t:'tri', ar:"يَتَعَجَّلُ بِهِ نَفْعَ مَا قَدَّمَ", tr:"fi’lihî ‘iwadana hâdiran yata ajjalu bihî naf a mâ qaddama", fr:"compensation immédiate, par laquelle il recevra rapidement le profit de ce qu’il avait envoyé,"},
        {t:'tri', ar:"وَسُرُورَ مَا أَتَى بِهِ", tr:"wa surûra mâ atâ bihî", fr:"et la joie qu’il avait produite,"},
        {t:'tri', ar:"إِلَى أَنْ يَنْتَهِيَ بِهِ الْوَقْتُ إِلَى مَا أَجْرَيْتَ لَهُ مِنْ فَضْلِكَ", tr:"ilâ an yantahiya bihilwaqtu ilâ mâ ajrayta lahû min fadlika", fr:"jusqu’à ce qu’au dernier moment il soit conduit vers la Grâce que Tu lui as accordé,"},
        {t:'tri', ar:"وَأَعْدَدْتَ لَهُ مِنْ كَرَامَتِكَ", tr:"wa a dadta lahû min karâmatika", fr:"et la Générosité que Tu lui as préparé"},
        {t:'tri', ar:"اللَّهُمَّ وَأَيُّمَا مُسْلِمٍ أَهَمَّهُ أَمْرُ الإِسْلاَمِ", tr:"allâhumma wa ayyuma muslimin ahammahû amrul- islâmi", fr:"Ô Dieu! Et si l’affaire de Islam a préoccupé un Musulman,"},
        {t:'tri', ar:"وَأَحْزَنَهُ تَحَزُّبُ أَهْلِ الشِّرْكِ عَلَيْهِمْ", tr:"wa ahzanahû tahazzubu ahli achchirki ‘alayhim", fr:"et l’alliance des idolâtres contre l’Islam l’a attristé,"},
        {t:'tri', ar:"فَنَوَى غَزْواً أَوْ هَمَّ بِجِهَادٍ", tr:"fanawâ ghazwan aw hamma bijihâdin", fr:"de sorte qu’il veuille partir au combat, et se prépare à entrer dans la guerre sainte,"},
        {t:'tri', ar:"فَقَعَدَ بِهِ ضَعْفٌ", tr:"faqa ada bihî da fun", fr:"mais que la fragilité l’empêche,"},
        {t:'tri', ar:"أَوْ أَبْطَأَتْ بِهِ فَاقَةٌ", tr:"aw abta’at bihî fâqatun", fr:"ou bien la pauvreté l’a ralenti,"},
        {t:'tri', ar:"أوْ أَخَّرَهُ عَنْهُ حَادِثٌ", tr:"aw akhkharahû ‘anhû hâdithun", fr:"ou bien un évènement l’a retardé,"},
        {t:'tri', ar:"أوْ عَرَضَ لَهُ دُونَ إِرَادَتِهِ مَانِعٌ", tr:"aw ‘arada lahû dûna irâdatihî mâni’ un", fr:"ou bien un obstacle s’est produit contre sa volonté,"},
        {t:'tri', ar:"فَاكْتُبِ اسْمَهُ فِي الْعَابِدِينَ", tr:"faktub ismahû fil ‘âbidîna", fr:"écris son nom parmi les pieux,"},
        {t:'tri', ar:"وَأَوْجِبْ لَهُ ثَوَابَ الْمُجَاهِدِينَ", tr:"wa awjib lahû thawâba almujâhidîna", fr:"et décrète pour lui la part de récompense des combattants,"},
        {t:'tri', ar:"وَاجْعَلْهُ فِي نِظَامِ الشُّهَدَاءِ وَالصَّالِحِينَ", tr:"waj’alhu fi nizâmi achchuhada’i waşşâlihîna", fr:"et place-le parmi les rangs des martyrs et des vertueux!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ عَبْدِكَ وَرَسُولِكَ وَآلِ مُحَمَّدٍ", tr:"allâhumma șalli ‘alâ muhammadin • abdika wa rasûlika wa âli muhammadin", fr:"Ô Dieu! Bénis Mohammad, Ton Serviteur et Ton Envoyé, et la Famille de Mohammad,"},
        {t:'tri', ar:"صَلاَةً عَالِيَةً عَلَى الصَّلَوَاتِ", tr:"șalâtan ‘âliyatan ‘alâ aşşalawâti", fr:"avec une bénédiction bien plus supérieure que toutes les autres bénédictions,"},
        {t:'tri', ar:"مُشْرِفَةً فَوْقَ التَّحِيَّاتِ", tr:"muchrifatan fawqa attahiyyâti", fr:"s’élevant au-dessus de toutes les autres salutations!"},
        {t:'tri', ar:"صَلاَةً لاَ يَنْتَهِي مَدَدُهَا", tr:"șalâtan la yantahî madaduhâ", fr:"Une bénédiction dont la fin n’est jamais atteinte,"},
        {t:'tri', ar:"وَلَا يَنْقَطِعُ عَدَدُهَا", tr:"wa lâ yangați u adaduhâ", fr:"et dont le nombre n’est jamais tranché,"},
        {t:'tri', ar:"كَأَتَمِّ مَا مَضَى مِنْ صَلَوَاتِكَ عَلَى أَحَدٍ مِنْ أَوْلِيَائِكَ", tr:"ka’atammi mâ mada min şalawâtika ‘alâ ahadin min awliyâ’ika", fr:"comme la plus parfaite de Tes bénédictions qui a été passée à n’importe lequel de Tes amis,"},
        {t:'tri', ar:"إِنَّكَ الْمَنَّانُ الْحَمِيدُ", tr:"innaka almannânu alhamîdu", fr:"Tu es la Bonté même, Plein de louanges,"},
        {t:'tri', ar:"اَلْمُبْدِئُ الْمُعِيدُ", tr:"almubdi’u almu’îdu", fr:"l’Originateur qui reprend de nouveau,"},
        {t:'tri', ar:"اَلْفَعَّالُ لِمَا تُرِيدُ.", tr:"alfa  »âlu limâ turidu", fr:"et Tu accomplis ce que Tu, désires."},
        {t:'salawat'},
      ]
    },
    's28': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "28. En Implorant Secours",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation en implorant secours et refuge à Dieu",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السّلامُ مُتفزِّعاً إِلى اللّهِ عزّ وجلّ", tr:"", fr:"La vingt huitième supplication: en implorant secours et refuge à Dieu"},
        {t:'tri', ar:"اللّهُمَّ إِنِّي أَخْلَصْتُ بِانْقِطَاعِي إِلَيْكَ", tr:"allâhumma innî akhlaştu binqițâ’î ilayka", fr:"Ô Dieu! Je me suis purifié sincèrement pour Toi, en coupant tout lien avec tout ce qui n’était pas Toi."},
        {t:'tri', ar:"وَأَقْبَلْتُ بِكُلِّي عَلِيكَ", tr:"wa aqbaltu bikulli ‘alayka", fr:"Je T’ai approché avec toute mon âme."},
        {t:'tri', ar:"وَصَرَفْتُ وَجْهِي عَمَّنْ يَحْتَاجُ إِلَى رِفْدِكَ", tr:"wa șaraftu wajhi ‘amman yahtâju ilâ rifdika", fr:"J’ai détourné mon visage de tous ceux ayant besoin de Ton Support,"},
        {t:'tri', ar:"وَقَلَبْتُ مَسْأَلَتِي عَمَّنْ لَمْ يَسْتَغْنِ عَنْ فَضْلِكَ", tr:"wa qalabtu mas’alati amman lam yastaghni ‘an fadlika", fr:"J’ai cessé de demander quoique ce soit de qui ne pourrait se passer de Ta Grâce."},
        {t:'tri', ar:"وَرَأَيْتُ أَنَّ طَلَبَ الْمُحْتَاجِ إِلَى الْمُحْتَاجِ", tr:"wa ra’aytu anna țalaba almuhtâji ilâ almuhtâji", fr:"Je me suis aperçu qu’une demande de la part d’un nécessiteux à un autre nécessiteux,"},
        {t:'tri', ar:"سَفَةٌ مِنْ رَأْيِهِ وَضَلَّةٌ مِنْ عَقْلِهِ", tr:"safahun min ra’yihî wa dallatun min ‘aqlihi", fr:"est pure folie et perte de raison!"},
        {t:'tri', ar:"فَكَمْ قَدْ رَأَيْتُ يَا إِلَهِي مِنْ أُنَاسٍ", tr:"fakam qad ra’aytu ya ilâhî min unâsin", fr:"Combien de gens ai-je vus mon Dieu,"},
        {t:'tri', ar:"طَلَبُوا العِزَّ بِغَيْرِكَ فَذَلُّوا", tr:"țalabû al’izza bighayrika fadhallu", fr:"qui cherchèrent T’honneur, par autre que Toi, et qui en furent humiliés!"},
        {t:'tri', ar:"وَرَامُوا الثَّرْوَةَ مِنْ سِوَاكَ فَافْتَقَرُوا", tr:"wa râmû aththarwata min siwâka faftaqarû", fr:"Des gens qui avaient l’intention d’obtenir la fortune d’un autre que Toi, et devinrent pauvres et qui entamèrent à monter les escaliers en pente de la société,"},
        {t:'tri', ar:"وَحَاوَلُوا الإرْتِفَاعَ فَاتَّضَعُوا", tr:"wa hâwalû al- irtifâ a fattada û", fr:"et tombèrent du haut en bas, en observant des gens cités ci-dessus,"},
        {t:'tri', ar:"فَصَحَّ بِمُعَايَنَةِ أَمْثَالِهِمْ حَازِمٌ وَفَّقَهُ اعْتِبَارُهُ", tr:"faşahha bimu’âyanati amthâlihim hâzimun waffaqahû i’ tibâruhu", fr:"cela est une leçon bonne et correcte pour l’homme prudent, et en faisant attention à ces choses,"},
        {t:'tri', ar:"وَأَرْشَدَهُ إِلَى طَرِيقِ صَوَابِهِ اِخْتِيَارُهُ", tr:"wa archadahû ilâ țariqi şawâbihî ikhtiyâruhu", fr:"et en choisissant le meilleur chemin, il pourrait rencontrer le succès;"},
        {t:'tri', ar:"فَأَنْتَ يَا مَوَلَايَ", tr:"fa’anta ya mawlâya", fr:"Ainsi, c’est à Toi Ô Seigneur"},
        {t:'tri', ar:"دُونَ كُلِّ مَسْئُولٍ مَوْضِعُ مَسْأَلَتِي", tr:"dûna kulli mas’ûlin mawdi’u mas’alati", fr:"et non à l’autrui que je dépose ma requête, et c’est Toi et non l’autrui, qui répond sà ma supplication et ma demande!"},
        {t:'tri', ar:"وَدُونَ كُلِّ مَطْلُوبٍ إِلَيْهِ وَلِيُّ حَاجَتِي", tr:"wa dûna kulli mațlübin ilayhi walyyu hâjati", fr:"Tu es Le Seul Destinataire spécial vers lequel j’envoie mon appel,"},
        {t:'tri', ar:"أَنْتَ الْمَخْصُوصُ قَبْلَ كُلِّ مَدْعُوِّ بِدَعْوَتِي", tr:"anta almakhşůşu qabla kulli mad uwwin bida wati", fr:"et Tu viens au devant de tous ceux à qui sont faits des appels."},
        {t:'tri', ar:"لَاَ يَشْرَكُكَ أَحَدٌ فِي رَجَائِي", tr:"lâ yachrakuka ahadun fi rajâ’î", fr:"Personne n’est associé avec Toi dans mon espoir,"},
        {t:'tri', ar:"وَلَا يَتَّفِقُ أَحَدٌ مَعَكَ فِي دُعَائِي", tr:"wa lâ yattafiqu ahadun ma’aka fi du â’î", fr:"personne ne suit avec Toi dans ma supplication,"},
        {t:'tri', ar:"وَلَا يَنْظِمُهُ وَإِيَّاكَ نِدَائِي", tr:"wa lâ yanzimuhû wa iyyâka nidâ’î", fr:"et personne n’est inclue dans cette supplication avec Toi, car c’est à Toi que je fais cet appel!"},
        {t:'tri', ar:"لَكَ يَا إِلَهِي وَحْدَانِيَّةُ الْعَدَدِ", tr:"laka ya ilâhî wahdâniyyatu al’adadi", fr:"C’est à Toi qu’appartient mon Dieu, «  »l’Unité des nombres » » (Tu es l’Unique dont aucune autre chiffre ne Te suit),"},
        {t:'tri', ar:"وَمَلَكَةُ الْقُدْرَةِ الصَّمَدِ", tr:"wa malakatu alqudrati aşşamadi", fr:"la Propriété du Pouvoir Éternel,"},
        {t:'tri', ar:"وفَضِيلَةُ الْحَوْلِ وَالْقُوَّةِ", tr:"wa fadilatu alhawli walquwwati", fr:"et l’excellence de la force et la puissance,"},
        {t:'tri', ar:"وَدَرَجَةُ الْعُلُوِّ وَالرِّفْعَةِ", tr:"wa darajatu al’uluwwi warrif ati", fr:"et le degré de la sublimation et l’élévation"},
        {t:'tri', ar:"وَمَنْ سِوَاكَ مَرْحُومٌ فِي عُمْرِهِ", tr:"wa man siwâka marhûmun fi ‘umrihi", fr:"Toute personne, à Part Toi, est pitoyable durant sa vie,"},
        {t:'tri', ar:"مَغْلُوبٌ عَلَى أَمْرِهِ", tr:"maghlûbun ‘alâ amrihi", fr:"impuissante dans ses affaires,"},
        {t:'tri', ar:"مَقْهُورٌ عَلَى شَأْنِهِ", tr:"maghûrun ‘alâ cha nihi", fr:"vaincue dans les situations qu’elle se trouve,"},
        {t:'tri', ar:"مُخْتَلِفُ الْحَالاَتِ", tr:"mukhtalifu alhâlâti", fr:"diverse et capricieuse dans ses états,"},
        {t:'tri', ar:"مُتَنَقِّلٌ فِي الصِّفَاتِ", tr:"mutanaqqilun fi aşşifâti", fr:"et constamment changeante dans ses attributs."},
        {t:'tri', ar:"فَتَعَالَيْتَ عَنِ الأَشْبَاهِ وَالْأَضْدَادِ", tr:"fata âlayta «  »an al- achbâhi wal-addâdi", fr:"Ainsi, Tu es Le plus Exalté, et Supérieur à toute ressemblance et opposition envers Toi"},
        {t:'tri', ar:"وَتَكَبَّرْتَ عَنِ الأَمْثَالِ وَالأَنْدَادِ", tr:"wa takabbarta ‘an al-amthâli wal- andâdi", fr:"Tu es Magnifique, et au-dessus de toute similitude et de toute rivalité!"},
        {t:'tri', ar:"فَسُبْحَانَكَ لا إِلَهَ إِلَّا أَنْتَ.", tr:"fasubhânaka lâ ilâha illâ anta", fr:"Gloire à Toi! Il n’y aucun Dieu sauf Toi!"},
        {t:'salawat'},
      ]
    },
    's29': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "29. provisions restreintes",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation quand sa provision lui devenait restreignante",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السّلامُ إذا قُتِّر عليْهِ الرِّزْقُ", tr:"", fr:"La vingt neuvième supplication: quand sa provision lui devenait restreignante"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّكَ ابتَلَيْتَنَا فِي أَرْزَاقِنَا بِسُوءِ الظَّنِّ", tr:"allâhumma innaka ibtalaytana fi arzâqinâ bisû’i azzanni", fr:"Ô Dieu! Tu nous as éprouvés avec la méfiance et le soupçon envers nos subsistances,"},
        {t:'tri', ar:"وَفِي آجَالِنَا بِطُولِ الأَمَلِ", tr:"wa fi âjâlinâ bițûli al-amali", fr:"et l’attente dans notre vie,"},
        {t:'tri', ar:"حتَّى الْتَمَسْنَا أَرْزَاقَكَ مِنْ عِنْدِ الْمَرْزُوقِينَ", tr:"hattâ iltamasnâ arzâqaka min ‘indi almarzûqîna", fr:"jusqu’à ce que nous suppliâmes ceux qui étaient pourvus, pour nos provisions,"},
        {t:'tri', ar:"وَطَمِعْنَا بِآمَالِنَا فِي أَعْمَارِ الْمُعَمَّرِينَ", tr:"wa tami nâ bi- âmâlinâ fi a’mâri almu ammarina", fr:"et enviâmes dans nos souhaits, la longue durée de la vie des vieillards!"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis donc Mohammad et toute sa Famille,"},
        {t:'tri', ar:"وَهَبْ لَنَا يَقِيناً صَادِقًا", tr:"wa hab lanâ yaqînan şâdiqan", fr:"Accorde-nous une véritable certitude,"},
        {t:'tri', ar:"تَكْفِينَا بِهِ مِنْ مَئُونَةِ الطَّلَبِ", tr:"takfina bihî min ma’unati attalabi", fr:"qui nous préserve de la souffrance de gagner le pain quotidien,"},
        {t:'tri', ar:"وَأَلْهِمْنَا ثِقَةً خَالِصَةً", tr:"wa alhimnâ thiqatan khâlişatan", fr:"et inspire-nous une confiance"},
        {t:'tri', ar:"تُعْفِينَا بِهَا مِنْ شِدَّةِ النَّصَبِ", tr:"tu fînâ bihâ min chiddati annașabi", fr:"pure qui nous décharge de la peine de l’effort."},
        {t:'tri', ar:"وَاجْعَلَ مَا صَرَّحْتَ بِهِ مِنْ عِدَتِكَ فِي وَحْيِكَ", tr:"waj al mâ șarrahta bihî min ‘idatika fi wahyika", fr:"Laisse Ta claire Promesse dans Ta Révélation"},
        {t:'tri', ar:"وَأَتْبَعْتَهُ مِنْ قَسَمِكَ فِي كِتَابِكَ", tr:"wa atba’tahû min qasamika fi kitâbika", fr:"et que Tu as fait suivre par Ton Serment dans Ton Livre,"},
        {t:'tri', ar:"قَاطِعاً لاهْتِمَامِنَا بِالرِّزْقِ الَّذِي تَكَفَّلْتَ بِهِ", tr:"qâti an lihtimâminâ birrizqi alladhi takaffalta bihi", fr:"et qui nous persuade au sujet de la subsistance pour laquelle Tu T’es nommé Responsable,"},
        {t:'tri', ar:"وَحَسْماً لِلاشْتِغَالِ بِمَا ضَمِنْتَ الْكِفَايَةَ لَهُ", tr:"wa hasman lilichtighâli bimâ daminta alkifâyata lahu", fr:"et anéantis nos préoccupations pour une affaire dont Tu T’es porté garant de sa"},
        {t:'tri', ar:"فَقُلْتَ وَقَوْلُكَ الْحَقُّ الأَصْدَقُ", tr:"faqulta wa qawluka alhaqqu al-aşdaqu", fr:"suffisance. Car en vérité Tu as dit -et Ta Parole est la plus véridique vérité!-et Tu as promis (donné Ton Serment)"},
        {t:'tri', ar:"وَأَقْسَمْتَ وَقَسَمُكَ الأَبَرُّ الأَوْفَى:", tr:"wa aqsamta waqasamuka al- abarru al-awfâ", fr:"-et Ton Serment est le plus accompli et le plus satisfaisant!:"},
        {t:'tri', ar:"(وَفِي السَّمَاءِ رِزْقُكُمْ وَمَا تُوعَدُونَ)", tr:"wafi assamâ’i rizqukum wa mâ tû adûna", fr:"«  »il y a dans le ciel, les biens qui vous sont destinés et tout ce que vous avez été promis! » »"},
        {t:'tri', ar:"ثُمَّ قُلْتَ:", tr:"thumma quita", fr:"Ensuite Tu as dit:"},
        {t:'tri', ar:"( فَوَرَبِّ السَّمَاءِ وَالأَرْضِ إِنَّهُ لَحَقُّ مِثْلَ مَا أَنَّكُمْ تَنْطِقُونَ).", tr:"fawarabbi assamâ’i wal-ardi innahû lahaqqun mithla mâ annakum tanțiqûna", fr:"«  »Donc par le Seigneur du ciel et de la terre, c’est là une vérité, comme le fait que vous parlez! » »"},
        {t:'salawat'},
      ]
    },
    's30': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "30. Remboursement des Dettes",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour demander de l’aide pour payer les dettes",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الْمعُونةِ على قضاءِ الدّيْنِ", tr:"", fr:"La trentième supplication: pour demander de l’aide pour payer les dettes"},
        {t:'tri', ar:"اللّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَهَبْ لِيَ الْعَافِيَةَ مِنْ دَيْنٍ تُخْلِقُ بِهِ وَجْهِي", tr:"wa hab lî al’âfiyata min daynin tukhliqu bihî wajhî", fr:"et libère-moi d’une dette qui me fasse perdre la face"},
        {t:'tri', ar:"وَيَحَارُ فِيهِ ذِهْنِي", tr:"wa yahâru fihî dhihni", fr:"et me déshonore, qui confuse mon esprit,"},
        {t:'tri', ar:"وَيَتَشَعَّبُ لَهُ فِكْرِي", tr:"wa yatacha’abu lahû fikri", fr:"disperse mes pensées,"},
        {t:'tri', ar:"وَيَطُولُ بِمُمَارَسَتِهِ شُغْلِي", tr:"wa yațûlu bimumârasatihî chughli", fr:"et prolonge ma préoccupation à l’examiner!"},
        {t:'tri', ar:"وَأَعُوذُ بكَ يَا رَبِّ مِنْ هَمِّ الدَّيْنِ وَفِكْرِهِ", tr:"wa a ‘ûdhu bika yâ rabbi min hammi addayni wa fikrihi", fr:"Je cherche refuge en Toi, mon Seigneur, de l’inquiétude,"},
        {t:'tri', ar:"وَشُغْلِ الدَّيْنِ وَسَهَرِهِ", tr:"wa chughli addayni wa saharihi", fr:"de la pensée et de l’insomnie due à la dette,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"fașalli ‘alâ muhammadin wa âlihi", fr:"bénis donc Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَعِذْنِي مِنْهُ", tr:"wa a idhni minhu", fr:"Préserve et protège-moi de la dette!"},
        {t:'tri', ar:"وَأَسْتَجِيرُ بِكَ يَا رَبِّ", tr:"wa astajiru bika ya rabbi", fr:"Et je Te supplie de m’abriter, mon Seigneur,"},
        {t:'tri', ar:"مِنْ ذِلَّتِهِ فِي الْحَيَاةِ", tr:"min dhillatihi filhayâti", fr:"de l’humiliation durant ma vie"},
        {t:'tri', ar:"وَمِنْ تَبِعَتِهِ بَعْدَ الْوَفَاةِ", tr:"wa min tabi atihî ba da alwafâti", fr:"et de ses conséquences tragiques après la mort,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"bénis donc Mohammad et toute sa Famille,"},
        {t:'tri', ar:"وَأَجِرْنِي مِنْهُ بِوُسْعٍ فَاضِلٍ", tr:"wa ajirnî minhu biwus in fâdilin", fr:"et accorde-moi un abri de tout cela, par une pleine abondance,"},
        {t:'tri', ar:"أَوْ كَفَافٍ وَاصِلٍ", tr:"aw kafâfin wâşilin", fr:"ou bien une suffisance continuelle."},
        {t:'tri', ar:"اَللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاحْجُبْنِي عَنِ السَّرَفِ وَالإزْدِيَادِ", tr:"wahjubni ‘an assarafi walizdiyâdi", fr:"Empêche-moi de tout abus et excès,"},
        {t:'tri', ar:"وَقَوِّمْنِي بِالْبَذْلِ وَالإِقْتِصَادِ", tr:"wa qawwimni bilbadhli waliqtişâdi", fr:"dirige-moi vers la modération, dans laquelle"},
        {t:'tri', ar:"وَعَلِّمْنِي حُسْنَ التَّقْدِيرِ", tr:"wa ‘allimni husna attaqdîri", fr:"je puisse dépenser modérément"},
        {t:'tri', ar:"وَاقْبِضْنِي بِلُطْفِكَ عَنِ التَّبْذِيرِ", tr:"waqbidni bilutfika ‘an attabdhîri", fr:"et d’être généreux en même temps,"},
        {t:'tri', ar:"وَأَجْرِ مِنْ أَسْبَابِ الْحَلالِ أَرْزَاقِي", tr:"wa ajri min asbâbi alhalâli arzâqi", fr:"et apprends-moi un sens équitable de mesure,"},
        {t:'tri', ar:"وَوَجِّهْ فِي أَبْوَابِ الْبِرِّ إِنْفَاقِي", tr:"wa wajjih fi abwâbi albirri infâqi", fr:"Retiens-moi de par Ta Grâce! de toute prodigalité (dilapidation)"},
        {t:'tri', ar:"وَازْوِ عَنِّي مِنَ الْمَالِ مَا يُحْدِثُ لِي مَخْيَلَةً", tr:"wazwi ‘anni min almâli mâ yuhdithu li makhyalatan", fr:"Fais venir mes subsistances par des moyens purs et légitimes, et dirige mes dépenses vers les voies de la charité et du bienfait,"},
        {t:'tri', ar:"أَوْ تَأَدِّياً إِلَى بَغْيٍ", tr:"aw ta’addiyan ilâ baghyin", fr:"éloigne de moi toute possession qui m’apportera l’orgueil,"},
        {t:'tri', ar:"أَوْ مَا أَتَعَقَّبُ مِنْهُ طُغْيَاناً", tr:"aw mâ ata aqqabu minhû tughyânan", fr:"et me conduira à l’insolence, ou bien conduira mes pas à la rébellion et l’ingratitude!"},
        {t:'tri', ar:"اَللَّهُمَّ حَبِّبْ إِلَيَّ صُحْبَةَ الْفُقَرَاءِ", tr:"allâhumma habbib ilayya şuhbata alfuqara’i", fr:"Ô Dieu! Fais-moi aimer et apprécier la compagnie des pauvres,"},
        {t:'tri', ar:"وَأَعِنِّي عَلَى صُحْبَتِهِمْ بِحُسْنِ الصَّبْرِ", tr:"wa a’inni ‘alâ şuhbatihim bihusni aşşabri", fr:"et aide-moi à devenir leur compagnon avec une excellente patience!"},
        {t:'tri', ar:"وَمَا زَوَيْتَ عَنِّي مِنْ مَتَاعِ الدُّنْيَا الْفَانِيَةِ", tr:"wa mâ zawayta ‘annî min matâ’i addunya alfâniyati", fr:"Et puis de tout ce que tu m’as privé de biens dans ce monde périssable,"},
        {t:'tri', ar:"فَاذْخَرْهُ لِي فِي خَزَائِنِكَ الْبَاقِيَةِ", tr:"fadhkharhu lî fi khazâ’inika albâqiyah", fr:"réserve-les pour moi dans Tes réservoirs durables et impérissables!"},
        {t:'tri', ar:"وَاجْعَلْ مَا خَوَّلْتَنِي مِنْ حُطَامِهَا", tr:"waj’al mâ khawwaltani min hutâmihâ", fr:"Des choses insignifiantes de ce monde, que Tu m’as accordé et aussi de ces biens terrestres,"},
        {t:'tri', ar:"وَعَجَّلْتَ لِي مِنْ مَتَاعِهَا بُلْغَةً إِلَى جِوَارِكَ", tr:"wa ‘ajjalta lî min matâ ihâ bulghatan ilâ jiwârika", fr:"que Tu m’as accordé si rapidement, fais apparaître une voie pour arriver à Ton Voisinage,"},
        {t:'tri', ar:"وَوُصْلَةً إِلَى قُرْبِكَ", tr:"wa wuşlatan ila qurbika", fr:"un lien vers Ton Rapprochement,"},
        {t:'tri', ar:"وَذَرِيعَةً إِلَى جَنَّتِكَ", tr:"wa dhari’atan ilâ jannatika", fr:"et un moyen d’arriver à Ton Jardin de Paradis!"},
        {t:'tri', ar:"إِنَّكَ ذُو الْفَضْلِ العَظِيمِ", tr:"innaka dhû alfadli al’azîmi", fr:"Car en vérité, Tu es Le Possesseur de la Grâce abondante,"},
        {t:'tri', ar:"وَأَنْتَ الْجَوَادُ الكَرِيمُ.", tr:"wa anta aljawâdu alkarimu", fr:"et Tu es Munificent et Généreux!"},
        {t:'salawat'},
      ]
    },
    's31': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "31. Le Repentir",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour le repentir sincère",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عَليْهِ السَّلامُ فِي ذِكْرِ التَّوْبَةِ وطلبِها", tr:"", fr:"La trente et unième supplication: pour la demande du repentir"},
        {t:'tri', ar:"اللَّهُمَّ يَا مَنْ لاَ يَصِفُهُ نَعْتُ الْوَاصِفِينَ", tr:"allâhumma ya man lâ yaşifuhu na tu alwâșifina", fr:"Ô Dieu! Ô Celui dont la description de ceux qui Le décrivent n’arrive point à Le décrire !"},
        {t:'tri', ar:"وَيَا مَنْ لاَ يُجَاوِزُهُ رَجَاءُ الرَّاجِينَ", tr:"wa yã man lâ yujâwizuhu rajâ’u arrâjina", fr:"Ô celui dont l’espoir de ceux qui espèrent ne peut Le dépasser!"},
        {t:'tri', ar:"وَيَا مَنْ لاَ يَضِيعُ لَدَيْهِ أَجْرُ الْمُحْسِنِينَ", tr:"wa yã man lâ yadi u ladayhi ajru almuhsinîna", fr:"Ô Celui pour qui la récompense des bienfaiteurs ne peut rester ignorée!"},
        {t:'tri', ar:"وَيَا مَنْ هُوَ مُنْتَهَى خَوْفِ الْعَابِدِينَ", tr:"wa ya man huwa muntahâ khawfi al’âbidina", fr:"Ô Celui par qui se résume le plus haut degré de crainte des adorateurs."},
        {t:'tri', ar:"وَيَا مَنْ هُوَ غَايَةُ خَشْيَةِ الْمُتَّقِينَ", tr:"wa yâ man huwa ghâyatu khachyati almuttaqina", fr:"Ô Celui qui est l’ultime limite de la crainte des vertueux!"},
        {t:'tri', ar:"هَذَا مَقَامُ مَنْ تَدَاوَلَتْهُ أَيْدِي الذُّنُوبِ", tr:"hadhâ maqâmu man tadâwalat-hu aydi adhdhunûbi", fr:"Ceci est la position de celui dont les péchés se sont joués de lui,"},
        {t:'tri', ar:"وَقَادَتْهُ أَزِمَّةُ الْخَطَايَا", tr:"wa qâdat-hu azimmatu alkhațâyâ", fr:"et dont le contrôle de sa volonté est entre les mains des méfaits,"},
        {t:'tri', ar:"وَاسْتَحْوَذَ عَلَيْهِ الشَّيْطَانُ", tr:"wastahwadha ‘alayhi achchaytânu", fr:"et qui est dominé par Satan!"},
        {t:'tri', ar:"فَقَصَّرَ عَمَّا أَمَرْتَ بِهِ تَفْرِيطاً", tr:"faqaşșara ‘ammâ amarta bihi tafrițan", fr:"Il manqua à ses devoirs et envers ce qui Tu lui avais ordonné de faire, par une négligence excessive,"},
        {t:'tri', ar:"وَتَعَاطَی مَا نَهَيْتَ عَنْهُ تَغْرِيراً", tr:"wa ta âtâ mâ nahayta ‘anhu ta zîran", fr:"et a commis par sa morgue et sa vanité, tout ce qui Tu avais défendu,"},
        {t:'tri', ar:"كَالْجَاهِلِ بِقُدْرَتِكَ عَلِيهِ", tr:"kaljâhili biqudratika ‘alayhi", fr:"comme celui qui ignore Ton Pouvoir sur lui-même,"},
        {t:'tri', ar:"أَوْ كَالْمُنْكِرِ فَضْلَ إِحْسَانِكَ إِلَیْهِ", tr:"aw kalmunkiri fadla ihsânika ilayhi", fr:"ou bien comme celui qui nie la Grâce de Ton Bienfait envers lui-même,"},
        {t:'tri', ar:"حَتَّى إِذَا انْفَتَحَ لَهُ بَصَرُ الْهُدَى", tr:"hatta idhâ infataha lahu başaru alhuda", fr:"jusqu’au moment où l’œil du droit chemin s’ouvre pour lui,"},
        {t:'tri', ar:"وَتَقَشَّعَتْ عَنْهُ سَحَائِبُ الْعَمَى", tr:"wa taqachcha at ‘anhu sahâ’ibu al’amâ", fr:"et les nuages de la cécité se dispersent,"},
        {t:'tri', ar:"أَحْصَى مَا ظَلَمَ بِهِ نَفْسَهُ", tr:"ahsâ mâ zalama bihi nafsahu", fr:"et il commence à compter les dégâts avec lesquels il s’est fait du tort,"},
        {t:'tri', ar:"وَفَكَّرَ فِيمَا خَالَفَ بِهِ رَبَّهُ", tr:"wa fakkara fimâ khâlafa fihi rabbahu", fr:"et de réfléchir sur les points auxquels il s’était opposé à son Seigneur."},
        {t:'tri', ar:"فَرَأَى كَبِيرَ عِصْيَانِهِ كَبِيراً", tr:"fara’â kabîra ‘işyânihi kabîran", fr:"et alors il voit son immense désobéissance, aussi immense que possible,"},
        {t:'tri', ar:"وَجَلِيلَ مُخَالَفَتِهِ جَلِيلاً", tr:"wa jalila mukhâlafatihi jalilan", fr:"et sa grande opposition, aussi immense que possible!"},
        {t:'tri', ar:"فَأَقْبَلَ نَحْوَكَ مُؤَمِّلاً لَكَ", tr:"fa aqbala nahwaka mu’ammilan laka", fr:"Et de par la confiance qu’il en Ta Grâce,"},
        {t:'tri', ar:"مُسْتَحْيِياً مِنْكَ", tr:"mustahyiyân minka", fr:"il a dirigé cupidement, et avec une sincérité"},
        {t:'tri', ar:"وَوَجَّهَ رَغْبَتَهُ إِلَيْكَ ثِقَةً بِكَ", tr:"wa wajjaha raghbatahu ilayka thiqatan bika", fr:"ses intentions et ses espérances vers Toi."},
        {t:'tri', ar:"فَأَمَّكَ بِطَمَعِهِ يَقِيناً", tr:"fa ammaka bițab’ihi yaqînAN", fr:"Ainsi, à l’apogée de son désir ardent,"},
        {t:'tri', ar:"وَقَصَدَكَ بِخَوْفِهِ إِخْلَاصاً", tr:"wa qaşadaka bikhawfihi ikhlâşan", fr:"il vient directement verse Toi, en toute sincérité."},
        {t:'tri', ar:"قَدْ خَلاَ طَمَعُهُ مِنْ كُلِّ مَطْمُوعٍ فِيهِ غَيْرِكَ", tr:"qad khala țama uhu min kulli mațmû in fîhi ghayruka", fr:"son désir intense est vide de tout objet de désir sauf de Toi, et il n’attend que Toi,"},
        {t:'tri', ar:"وَأَفْرَجَ رَوْعُهُ مِنْ كُلِّ مَحْذُورٍ مِنْهُ سِوَاكَ", tr:"wa afraja raw ahu min kulli mahdhûrin minhu siwâka", fr:"et il s’est calmé de toute anxiété, sauf de celle qui dépend de Toi!"},
        {t:'tri', ar:"فَمَثَلَ بَيْنَ يَدَيْكَ مُتَضَرِّعًا", tr:"famathula bayna yadayka mutadarri an", fr:"Ainsi suppliant, il se présente devant Toi ses yeux tournés vers le bas, en toute humiliation,"},
        {t:'tri', ar:"وَغَمَّضَ بَصَرَهُ إِلَى الأَرْضِ مُتَخَشِّعًا", tr:"wa ghammada başarahu ilâ al-ardi mutakhachchi’an", fr:"et Sa tête baissée devant Ta Gloire, en pure soumission ;"},
        {t:'tri', ar:"وَطَأْطَأَ رَأْسَهُ لِعِزَّتِكَ مُتَذَلِّلاً", tr:"wa ța’ța’a ra’sahu li’ izzatika mutadhallilan", fr:"Il Te révèle en toute modestie ses secrets qui Tu en es bien plus que lui, au courant ;"},
        {t:'tri', ar:"وَأَبَثَّكَ مِنْ سِرِّهِ مَا أَنْتَ أعْلَمُ بِهِ مِنْهُ خُضُوعاً", tr:"wa abaththaka min sirrihi mâ anta a lamu bihi minhu khudû an", fr:"Il énumère en toute humilité les péchés dont Tu en es bien mieux informé qui lui ;"},
        {t:'tri', ar:"وَعَدَّدَ مِنْ ذُنُوبِهِ مَا أَنْتَ أَحْصَى لَهَا خُشُوعاً", tr:"wa ‘addada min dhunûbihi mâ anta ahsâ lahâ khuchû an", fr:"Il Te demande du secours devant l’énorme faute qu’il a commise et dont Tu en possèdes le Savoir,"},
        {t:'tri', ar:"وَاسْتَغَاثَ بِكَ مِنْ عَظِيمِ مَا وَقَعَ بِهِ فِي عِلْمِكَ", tr:"wastaghâtha bika min ‘azîmi mâ waqa’a bihi fi ‘ilmika", fr:"et pour les abominables faits qui Pont ainsi"},
        {t:'tri', ar:"وَقَبِيحِ مَا فَضَحَهُ فِي حُكْمِكَ", tr:"wa qabîhi mâ fadahahu fi hukmika", fr:"disgrâcié et déshonoré en Ton Jugement:"},
        {t:'tri', ar:"مِنْ ذُنُوبٍ أَدْبَرَتْ لَذَّاتُهَا فَذَهَبَتْ", tr:"min dhunûbin adbarat ladhdhâtuhâ fadhahabat", fr:"des péchés dont les plaisirs lui ont tourné leur dos et disparu,"},
        {t:'tri', ar:"وَأَقَامَتْ تَبِعَاتُهَا فَلَزِمَتْ", tr:"wa aqâmat tabi âtuhâ falazimat", fr:"et dont les retombées (conséquences) sont restées et ne bougent pas d’un pouce…"},
        {t:'tri', ar:"لَاَ يُنْكِرُ يَا إِلَهِي عَدْلَكَ إِنْ عَاقَبْتَهُ", tr:"lâ yunkiru ya ilahi ‘adlaka in ‘âqabtahu", fr:"Il n’osera nier Ta Justice, Ô mon Dieu, si Tu décides à le punir,"},
        {t:'tri', ar:"وَلَا يَسْتَعْظِمُ عَفْوَكَ إِنْ عَفَوْتَ عَنْهُ وَرَحِمْتَهُ", tr:"wa la yasta şimu ‘afwaka ‘anhu in ‘afawta ‘anhu wa rahimtahu", fr:"ni considérer Ton Pardon grandiose, si Tu le pardonnes et lui montres Ta Miséricorde,"},
        {t:'tri', ar:"لأَنَّكَ الرَّبُّ الْكَرِيمُ", tr:"li-annaka arrabbu alkarimu", fr:"car Tu es véritablement le Seigneur Généreux"},
        {t:'tri', ar:"اَلَّذِي لَا يَتَعَاظَمُهُ غُفْرَانُ الذَّنْبِ الْعَظِيمِ", tr:"alladhi lâ yata’âzamuhu ghufrânu adhdhanbi al’azîmi", fr:"pour qui l’absolution des grands péchés, ne lui est rien"},
        {t:'tri', ar:"اللَّهُمَّ فَهَا أَنَا ذَا قَدْ جِئْتُكَ مُطِيعاً لأَمْرِكَ", tr:"allâhumma fahâ ana dhâ qad ji’tuka muți an li’amrika", fr:"Ô Dieu! Ainsi me voilà: Je suis venu à Toi, en obéissant à Ta Commande,"},
        {t:'tri', ar:"فِيمَا أَمَرْتَ بِهِ مِنَ الدُّعَاءِ", tr:"fîmâ amarta bihi min addu’â’i", fr:"(Car Tu as commandé laction de supplier)"},
        {t:'tri', ar:"مُتَنَجِّزاً وَعْدَكَ", tr:"mutanajjizan wa’daka", fr:"et en demandant que Tu exauces Ta Promesse,"},
        {t:'tri', ar:"فِيمَا وَعَدْتَ بِهِ مِنَ الإِجَابَةِ", tr:"fîmâ wa’adta bihi min al-ijâbati", fr:"(Car Tu as promis de répondre):"},
        {t:'tri', ar:"إِذْ تَقُولُ:", tr:"idh taqûlu", fr:"Tu as dit:"},
        {t:'tri', ar:"(اُدْعُونِي أَسْتَجِبْ لَكُمْ)", tr:"ud’ ûnî astajib lakum", fr:"«  »Suppliez moi et je vous répondrai! » »"},
        {t:'tri', ar:"اللَّهُمَّ فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma faşalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَلْقَنِي بِمَغْفِرَتِكَ كَمَا لَقِيتُكَ بِإِقْرَارِي", tr:"walqani bimaghfiratika kamâ lagîtuka bi’iqrâri", fr:"Réponds à ma demande avec Ton Absolution, comme je T’ai répondu avec ma confession,"},
        {t:'tri', ar:"وَارْفَعْنِي عَنْ مَصَارِعِ الذُّنُوبِ", tr:"warfa ni ‘an maşâri i adhdhunûbi", fr:"relève-moi des infirmités fatales des péchés,"},
        {t:'tri', ar:"كَمَا وَضَعْتُ لَكَ نَفْسِي", tr:"kamâ wada’tu laka nafsi", fr:"comme je me suis agenouillé (je me suis avili) devant Toi,"},
        {t:'tri', ar:"وَاسْتُرْنِي بِسِتْرِكَ", tr:"wasturni bisitrika", fr:"et enveloppe moi (couvre moi) dans Ta Protection,"},
        {t:'tri', ar:"كَمَا تَأَنَّيْتَنِي عَن الإِنْتِقَامِ مِنِّي", tr:"kamâ ta’annaytanî ‘an al-intiqâmi minni", fr:"comme Tu n’as pas montré de hâte à Te venger de moi!"},
        {t:'tri', ar:"اَللَّهُمَّ وَثَبِّتْ فِي طَاعَتِكَ نِيَّتِي", tr:"allahumma wa thabbit fi tâ ‘atika niyyati", fr:"Ô Dieu! Fais-en sorte que mon intention de T’obéir,"},
        {t:'tri', ar:"وَأَحْكِمْ فِي عِبَادَتِكَ بَصِيرَتِي", tr:"wa ahkim fi ‘ibâdatika başîrati", fr:"fortifie mon intuition en T’adorant,"},
        {t:'tri', ar:"وَوَفِّقْنِي مِنَ الأَعْمَالِ لِمَا تَغْسِلُ بِهِ دَنَسَ الْخَطَايَا عَنِّي", tr:"wa waffiqnî ilâ al-a mâli mâ taghsilu bihi danasa alkhațâyâ ‘annî", fr:"et accorde-moi les succès des travaux qui effaceront à jamais la souillure des offenses diverses, et au moment de mourir,"},
        {t:'tri', ar:"وَتَوَفَّنِي عَلَى مِلَّتِكَ وَمِلَّةِ نَبِيِّكَ مُحَمَّدٍ عَلَيْهِ السَّلاَمُ إِذَا تَوَفَّيْتَنِي", tr:"wa tawaffani ‘alâ millatika wa millati nabiyyika muhammadin ‘alayhi assalâmu idhâ tawaffaytani", fr:"fais-en sorte que je meure dans la croyance de Ton Prophète Mohammad (Que la paix soit avec lui!)"},
        {t:'tri', ar:"اَللّهُمَّ إِنِّي أَتُوبُ إِلَيْكَ فِي مَقَامِي هَذَا", tr:"allâhumma innî atûbu ilayka fi maqâmî hadhâ", fr:"Ô Dieu! Je repens à Toi, dans ma position actuelle de tous mes péchés,"},
        {t:'tri', ar:"مِنْ كَبَائِرِ ذُنُوبِي وَصَغَائِرِهَا", tr:"min kabâ’iri dhunûbi wa sagh irihâ", fr:"grands et petits,"},
        {t:'tri', ar:"وَبَوَاطِنِ سَيِّئَاتِي وَظَوَاهِرِهَا", tr:"wa bawâțini sayyi’âti wa zawâhirihâ", fr:"de mes mauvaises actions, internes et externes,"},
        {t:'tri', ar:"وَسَوَالِفِ زَلاّتِي وَحَوَادِثِهَا", tr:"wa sawâlifi zallâti wa hawâdithihâ", fr:"de mes négligences, passées et récentes,"},
        {t:'tri', ar:"تَوْبَةَ مَنْ لاَ يُحَدِّثُ نَفْسَهُ بِمَعْصِيَةٍ", tr:"tawbata man lâ yuhaddithu nafsahu bima’şiyatin", fr:"avec le sincère repentir de celui qui ne se dit pas qu’il pourrait de nouveau désobéir,"},
        {t:'tri', ar:"وَلَا يُضْمِرُ أَنْ يَعُودَ فِي خَطِيئَةٍ", tr:"wa lâ yudmiru an ya’ûda fi khați’atin", fr:"ou bien de penser en cachette qu’il pourrait recommencer à commettre et à revenir à l’un de ses anciens méfaits."},
        {t:'tri', ar:"وَقَدْ قُلْتَ يَا إِلَهِي فِي مُحْكَمِ كِتَابِكَ", tr:"wa qad qulta ya ilahî fi muhkami kitâbika", fr:"Tu as dit mon Dieu, dans les lettres de Ton Livre,"},
        {t:'tri', ar:"إِنَّكَ تَقْبَلُ التَّوْبَةَ عَنْ عِبَادِكَ", tr:"innaka taqbalu attawbata ‘an ‘ibâdika", fr:"que Tu acceptes le repentir de Tes serviteurs,"},
        {t:'tri', ar:"وَتَعْفُو عَنِ السَّيِّئَاتِ", tr:"wa ta fû ‘an assayyi’âti", fr:"et pardonnes les mauvaises actions,"},
        {t:'tri', ar:"وَتُحِبُّ التَّوَّابِينَ", tr:"wa tuhibbu attawwâbîna", fr:"et que Tu aimes les repentants…"},
        {t:'tri', ar:"فَاقْبَلْ تَوْبَتِي كَمَا وَعَدْتَ", tr:"faqbal tawbati kamâ wa’adta", fr:"Accepte donc mon repentir, comme Tu l’avais promis,"},
        {t:'tri', ar:"وَاعْفُ عَنْ سَيِّئَاتِي كَمَا ضَمِنْتَ", tr:"wa’fu ‘an sayyi’âtî kamâ daminta", fr:"pardonne mes mauvaises actions comme Tu l’avais garantis,"},
        {t:'tri', ar:"وَأَوْجِبْ لِي مَحَبَّتَكَ كَمَا شَرَطْتَ", tr:"wa awjib lí mahabbataka kamâ charațta", fr:"et consolide Ton Amour dans mon cœur, comme Tu l’avais conditionné!"},
        {t:'tri', ar:"وَلَكَ يَا رَبِّ شَرْطِي أَنْ لاَ أَعُودَ فِي مَكْرُوهِكَ", tr:"wa laka yå rabbi charți an lâ a’ûda fi makrûhika", fr:"C’est à Toi qu’appartient ma promesse mon Seigneur, de sorte que je m’engage à ne plus répéter ce qui Te déplaît,"},
        {t:'tri', ar:"وَضَمَانِي أَنْ لا أَرْجعَ فِي مَذْمُومِكَ", tr:"wa damâni an lâ arji a fi madhmûmika", fr:"et je Te donne ma garantie que je ne retournerai point vers Tes Interdits,"},
        {t:'tri', ar:"وَعَهْدِي أَنْ أَهْجُرَ جَمِيعَ مَعَاصِيكَ", tr:"wa ‘ahdi an ahjura jamî’ a ma âșika", fr:"et Te donne mon engagement à m’éloigner de toute action de désobéissance envers Toi."},
        {t:'tri', ar:"اَللَّهُمَّ إِنَّكَ أَعْلَمُ بِمَا عَمِلْتُ", tr:"allâhumma innaka a’lamu bimâ ‘amiltu", fr:"Ô Dieu! Tu sais mieux que personne ce que Jai commis,"},
        {t:'tri', ar:"فَاغْفِرْ لِي مَا عَلِمْتَ", tr:"faghfir li mâ alimta", fr:"pardonne-moi donc tout ce que Tu sais de moi,"},
        {t:'tri', ar:"وَاصْرِفْنِي بِقُدْرَتِكَ إِلَى مَا أَحْبَبْتَ", tr:"waşrifni biqudratika ilâ mâ ahbabta", fr:"et de par Ton pouvoir, détourne moi vers ce qui Te plaît le plus!"},
        {t:'tri', ar:"اَللَّهُمَّ وَعَلَيَّ تَبِعَاتٌ قَدْ حَفِظتُهُنَّ", tr:"allâhumma wa ‘alayya tabi âtun qad hafiztuhunna", fr:"O Dieu! Il existe sur mon dos des exigences que j’ai préservées dans ma mémoire,"},
        {t:'tri', ar:"وَتَبِعَاتٌ قَدْ نَسِيتُهُنَّ", tr:"wa tabi âtun qad nasîtuhunna", fr:"et aussi des réclamations que j’ai oubliées, pendant qu’elles restent toutes intactes,"},
        {t:'tri', ar:"وَكُلَّهُنَّ بِعَيْنِكَ الَّتِي لَاَ تَنَامُ", tr:"wa kulluhunna bi’aynika allati lâ tanâmu", fr:"sous Ton Œil qui ne dort jamais,"},
        {t:'tri', ar:"وَعِلْمِكَ الَّذِي لَا يَنْسَى", tr:"wa ‘ilmika alladhi lâ yansâ", fr:"et dans Ta Connaissance qui n’oublie jamais!"},
        {t:'tri', ar:"فَعَوِّضْ مِنْهَا أَهْلَهَا", tr:"fa ‘awwid minhâ ahlahâ", fr:"Ainsi compense tous ceux à qui je suis en dette,"},
        {t:'tri', ar:"وَاحْطُطْ عَنِّي وِزْرَهَا", tr:"wahtut ‘anni wizrahâ", fr:"enlève son fardeau de ma personne,"},
        {t:'tri', ar:"وَخَفِّفْ عَنِّي ثِقْلَهَا", tr:"wa khaffif ‘anni thiqlahâ", fr:"diminue son poids de moi,"},
        {t:'tri', ar:"وَاعْصِمْنِي مِنْ أَنْ أُقَارِفَ مِثْلَهَا", tr:"wa’şimni min an uqârifa mithlahâ", fr:"et préserve-moi de commettre de nouveau des actes similaires!"},
        {t:'tri', ar:"اللَّهُمَّ وَإِنَّهُ لا وَفَاءَ لِي بِالتَّوْبَةِ إِلاَّ بِعِصْمَتِكَ", tr:"allâhumma wa innahu lâ wafâ’a lî bittawbati illâ bi’işmatika", fr:"Ô Dieu! Cependant je ne pourrais jamais, Ô jamais! rester fidèle à mon repentir sans Ton Aide"},
        {t:'tri', ar:"وَلَاَ اسْتِمْسَاكَ بِي عَنِ الْخَطَايَا إِلَّا عَنْ قُوَّتِكَ", tr:"walastimsâka bi ‘an alkhatâyâ illâ ‘an quwwatika", fr:"et Tu Préservation envers moi, et rien ne m’empêche de commettre des offenses sauf Ta Force!"},
        {t:'tri', ar:"فَقَوِّنِي بِقُوَّةٍ كَافِيَةٍ", tr:"faqawwini biquwwatin kâfiyatin", fr:"fortifie-moi donc avec une force suffisante,"},
        {t:'tri', ar:"وَتَوَلَّنِي بِعِصْمَةٍ مَانِعَةٍ", tr:"wa tawallani bi işmatin mâni’atin", fr:"et prends soin de moi, avec une préservation résistante!"},
        {t:'tri', ar:"اَللَّهُمَّ أَيُّمَا عَبْدٍ تَابَ إِلَيْكَ", tr:"allâhumma ayyumâ ‘abdin tâba ilayka", fr:"Ô Dieu! Si jamais un de Tes serviteurs se repent à Toi,"},
        {t:'tri', ar:"وَهُوَ فِي عِلْمِ الْغَيْبِ عِنْدَكَ فَاسِخٌ لِتَوْبَتِهِ", tr:"wa huwa fi ‘ilmi alghaybi ‘indaka fâsikhun litawbatihi", fr:"pendant que par Ta Connaissance intime de l’invisible, Tu sais qu’il résiliera son repentir,"},
        {t:'tri', ar:"وَعَائِدٌ فِي ذَنْبِهِ وَخَطِيئَتِهِ", tr:"wa ‘â’idun fi dhanbihi wa khatf’atihi", fr:"et retournera vers sa pêche et son offense,"},
        {t:'tri', ar:"فَإِنِّي أَعُوذُ بِكَ أَنْ أَكُونَ كَذَلِكَ", tr:"fa inni a’ûdhu bika an akûna kadhâlika", fr:"en ce cas, je cherche refuge en Toi pour ne pas lui ressembler!"},
        {t:'tri', ar:"فَاجْعَلْ تَوْبَتِي هذِهِ تَوْبَةً لاَ أَحْتَاجُ بَعْدَهَا إِلَى تَوْبَةٍ", tr:"faj’al tawbati hadhihî lâ ahtâju ba dahâ ilâ tawbatin", fr:"Ainsi, accepte ce même repentir… un repentir après lequel je n’aurais plus besoin d’aucun!"},
        {t:'tri', ar:"تَوْبَةً مُوجِبَةً لِمَحْوِ مَا سَلَفَ", tr:"tawbatan mûjibatan limahwi mâ salafa", fr:"Un repentir qui exigera un effacement complet de ce qui s’est passé,"},
        {t:'tri', ar:"وَالسَّلاَمَةِ فِيمَا بَقِيَ", tr:"wassalâmati fimâ baqiya", fr:"et qui amènera la sauvegarde dans ce qui reste!"},
        {t:'tri', ar:"اللَّهُمَّ إِنِّي أَعْتَذِرُ إِلَيْكَ مِنْ جَهْلِي", tr:"allahumma inni a’tadhiru ilayka min jahli", fr:"Ô Dieu! Je Te demande pardon pour mon ignorance,"},
        {t:'tri', ar:"وَأَسْتَوْهِبُكَ سُوءَ فِعْلِي", tr:"wa astawhibuka sû’a fi lî", fr:"et d’accorder Ton Indulgence pour mes méfaits,"},
        {t:'tri', ar:"فَاضْمُمْنِي إِلَى كَنَفِ رَحْمَتِكَ تَطَوُّلاً", tr:"fâdmumni ilâ kanafi rahmatika tațawwulan", fr:"protége-moi dans l’abri de Ta Miséricorde, de par Ta Grâce!"},
        {t:'tri', ar:"وَاسْتُرْنِي بِسِتْرِ عَافِيَتِكَ تَفَضُّلاً", tr:"wasturni bisitri ‘ âfiyatika tafaddulan", fr:"et enveloppe moi avec la tunique de Ton bien-être, de par Ta Grâce!"},
        {t:'tri', ar:"اَللَّهُمَّ وَإِنِّي أَتُوبُ إِلَيْكَ مِنْ كُلِّ مَا خَالَفَ إِرَادَتَكَ", tr:"allâhumma wa innî atûbu ilayka min kulli mâ khâlafa irâdataka", fr:"Ô Dieu! Je repens de tout ce qui s’oppose à Ta Volonté,"},
        {t:'tri', ar:"أَوْ زَالَ عَنْ مَحَبَّتِكَ", tr:"aw zâla ‘an mahabbatika", fr:"ou bien qui est éloigne de Ton Amour,"},
        {t:'tri', ar:"مِنْ خَطَرَاتِ قَلْبِي", tr:"min khatarâti qalbî", fr:"que ce soit: les pensées de mon cœur,"},
        {t:'tri', ar:"وَلَحَظَاتِ عَيْنِي", tr:"wa lahazâti ‘aynî", fr:"les regards de mon œil,"},
        {t:'tri', ar:"وَحِكَايَاتِ لِسَانِي", tr:"wa hikâyâti lisânî", fr:"les récits de ma langue,"},
        {t:'tri', ar:"تَوْبَةً تَسْلَمُ بِهَا كُلُّ جَارِحَةٍ عَلَى حِيَالِهَا مِنْ تَبِعَاتِكَ", tr:"tawbatan taslamu bihâ kullu jârihatin ‘alâ hiyâlihâ min tabi âtika", fr:"avec un repentir par lequel chaque membre à lui seul restera sain et sauf avec Toi de toute mauvaise conséquence,"},
        {t:'tri', ar:"وَتَأْمَنُ مِمَّا يَخَافُ الْمُعْتَدُونَ مِنْ ألِيمِ سَطَوَاتِكَ", tr:"wa ta’manu mimmâ yakhâfu almu ‘tadûna min alîmi sațawâtika", fr:"et restera en sécurité de Tes Vigueurs douloureuses et dont les transgresseurs en ont tellement peur!"},
        {t:'tri', ar:"اَللَّهُمَّ فَارْحَمْ وَحْدَتِي بَيْنَ يَدَيْكَ", tr:"allâhumma farham wahdati bayna yadayka", fr:"Enfin, Ô Dieu! Aie pitié de moi qui suis resté tout seul devant Toi,"},
        {t:'tri', ar:"وَوَجِيبَ قَلْبِي مِنْ خَشْيَتِكَ", tr:"wa wajiba qalbi min khachyatika", fr:"avec un cœur battant à se rompre, par crainte de Toi,"},
        {t:'tri', ar:"وَاضْطِرَابَ أَرْكَانِي مِنْ هَيْبَتِكَ", tr:"wadțirâba arkânî min haybatika", fr:"et des membres tremblants, par peur de Toi!"},
        {t:'tri', ar:"فَقَدْ أَقَامَتْنِي يَا رَبِّ ذُنُوبِي مَقَامَ الْخِزْي بِفِنَائِكَ", tr:"faqad aqâmatni ya rabbi dhunûbi maqâma alkhizyi bifinâ’ika", fr:"Mon Dieu! mes péchés m’ont fait rester dans cette position de dégradation et de déshonneur devant Ton Seuil…!"},
        {t:'tri', ar:"فَإِنْ سَكَتُّ لَمْ يَنْطِقْ عَنِّي أَحَدٌ", tr:"fa in sakattu lam yanția ‘annî ahadun", fr:"Si je reste silencieux, personne ne parle pour moi,"},
        {t:'tri', ar:"وَإِنْ شَفَعْتُ فَلَسْتُ بِأَهْلِ الشَّفَاعَةِ", tr:"wa in chafa tu falastu bi-ahli achchafâ ati", fr:"et si je cherche un intercesseur, je me rends compte que je ne suis point digne d’intercession…"},
        {t:'tri', ar:"اَللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَشَفِّعْ فِي خَطَايَايَ كَرَمَكَ", tr:"wa chaffi fi khatâyâya karamaka", fr:"Fais-en sorte que Ta Générosité intercède pour mes offenses,"},
        {t:'tri', ar:"وَعُدْ عَلَى سَيِّئَاتِي بِعَفْوِكَ", tr:"wa ‘ud ‘alâ sayyi’âti bi’ afwika", fr:"et de par Ton Pardon, fais disparaître mes mauvaises actions,"},
        {t:'tri', ar:"وَلَاَ تَجْزِنِي جَزَائِي مِنْ عُقُوبَتِكَ", tr:"wa lâ tajzini jazâ’î min ‘uqûbatika", fr:"et ne me récompense pas par une punition qui est ce que je mérite,"},
        {t:'tri', ar:"وَابْسُط عَلَيَّ طَوْلَكَ", tr:"wabsut ‘alayya țawlaka", fr:"étends Ta Clémence sur ma personne,"},
        {t:'tri', ar:"وَجَلِّلْنِي بِسِتْرِكَ", tr:"wa jallilni bisitrika", fr:"enveloppe-moi dans Ta Protection,"},
        {t:'tri', ar:"وَافْعَلْ بِي فِعْلَ عَزِيزٍ", tr:"waf al bi fi’la ‘azîzin", fr:"fais avec moi ce que fait un homme puissant:"},
        {t:'tri', ar:"تَضَرَّعَ إِلَيْهِ عَبْدٌ ذَلِيلٌ فَرَحِمَهُ", tr:"tadarra’ a ilayhi ‘abdun dhalîlun farahimahu", fr:"quand un vil esclave lui supplie, et que cet homme lui montre sa pitié,"},
        {t:'tri', ar:"أَوْ غَنِيٍّ تَعَرَّضَ لَهُ عَبْدٌ فَقِيرٌ فَنَعَشَهُ", tr:"aw ghaniyyin ta’arrada lahu ‘abdun faqirun fana achahu", fr:"ou bien ce que fait un homme riche, quand un pauvre mendiant se soumet à lui et il le fait élever à la richesse!"},
        {t:'tri', ar:"اَللَّهُمَّ لَا خَفِيرَ لِي مِنْكَ", tr:"allâhumma lâ khafira lî minka", fr:"Ô Dieu! je n’ai pas de gardien protecteur contre Toi,"},
        {t:'tri', ar:"فَلْيَخْفُرْنِي عِزُّكَ", tr:"falyakhfirni ‘izzuka", fr:"laisse donc Ta puissance devenir mon gardien protecteur !"},
        {t:'tri', ar:"وَلَاَ شَفِيعَ لِي إِلَيْكَ", tr:"wa lâ chafi’a lî ilayka", fr:"Je n’ai pas d’intercesseur devant Toi,"},
        {t:'tri', ar:"فَلْيَشْفَعْ لِي فَضْلُكَ", tr:"falyachfa » » lî fadluka", fr:"laisse donc Ta Grâce devenir mon intercesseur!"},
        {t:'tri', ar:"وَقَدْ أَوْجَلَتْنِي خَطَايَايَ", tr:"wa gad awjalatni khatâyâya", fr:"Mes offenses me font trembler d’effroi,"},
        {t:'tri', ar:"فَلْيُؤْمِنِي عَفْوُكَ", tr:"falyu’minni ‘afwuka", fr:"et Ton Pardon me procure la sécurité!"},
        {t:'tri', ar:"فَمَا كُلُّ مَا نَطَقْتُ بِهِ عَنْ جَهْلٍ مِنِّي بِسُوءِ أَثَرِي", tr:"famâ kullu mâ națaqtu bihi ‘an jahlin minnî bisû’i athari", fr:"Pas toutes les choses que j’ai dites, ne remontent de l’ignorance de mes horribles méfaits,"},
        {t:'tri', ar:"وَلَاَ نِسْيَانٍ لِمَا سَبَقَ مِنْ ذَمِيمِ فِعْلِي", tr:"wa là nisyânin lima sabaqa min dhamîmi fi’lî", fr:"ou bien de mon oubli pour mes actions blâmant, et pleines de reproches dans le passé,"},
        {t:'tri', ar:"وَلكِنْ لِتَسْمَعَ سَمَاؤُكَ وَمَنْ فِيهَا", tr:"lakin litasma » » samâ’uka wa man fihâ", fr:"mais pour que Ton Ciel et ceux qui y séjournent,"},
        {t:'tri', ar:"وَأَرْضُكَ وَمَنْ عَلَيْهَا", tr:"wa arduka wa man ‘alayhâ", fr:"et Ta terra et ceux qui y vivent,"},
        {t:'tri', ar:"مَا أَظَهَرْتُ لَكَ مِنَ النَّدَمِ", tr:"mâ azhartu laka min annadami", fr:"puissent entendre clairement le remord que j’ai professé à Toi,"},
        {t:'tri', ar:"وَلَجَأْتُ إِلَيْكَ فِيهِ مِنَ التَّوْبَةِ", tr:"wa laja’tu ilayka fihi min attawbati", fr:"et le repentir par lequel j’ai cherché refuge chez Toi!"},
        {t:'tri', ar:"فَلَعَلَّ بَعْضَهُمْ بِرَحْمَتِكَ يَرْحَمُنِي مِنْ سُوءِ مَوْقِفِي", tr:"fala alla ba dahum birahmatika yarhamuni min sû’i mawaifi", fr:"Ainsi, peut-être l’an d’eux, de par Ta Grâce, montrera sa pitié envers ma terrible situation,"},
        {t:'tri', ar:"أَوْ تُدْرِكُهُ الرِّقَّةُ عَلَيَّ لِسُوءِ حَالِي", tr:"aw tudrikuhu arriqqatu ‘alayya bisû’i hâli", fr:"ou bien sera touché par la tendresse en face de mon état piteux et pitoyable!"},
        {t:'tri', ar:"فَيَنَالَنِي مِنْهُ بِدَعْوَةٍ هِيَ أَسْمَعُ لَدَيْكَ مِنْ دُعَائِي", tr:"fayanâlani minhu bida watin hiya asma’u ladayka min du’â’î", fr:"Ensuite il se pourrait qu’une supplication surgisse de sa part pour ma personne, que Tu écouteras plus que la supplication que je T’ai faite!"},
        {t:'tri', ar:"أَوْ شَفَاعَةٍ أَوْكَدُ عِنْدَكَ مِنْ شَفَاعَتِي", tr:"aw chafâ atin awkadu ‘indaka min chafâ ati", fr:"Ou bien il se pourrait qu’une intercession surgisse pour ma personne, qui serait plus certaine et plus acceptable pour Toi que ma propre intercession,"},
        {t:'tri', ar:"تَكُونُ بِهَا نَجَاتِي مِنْ غَضَبِكَ وَفَوْزِي بِرِضَاكَ", tr:"takûnu bihâ najâtî min ghadabika wa fawzî biridâka", fr:"par laquelle s’ensuit ma sauvegarde contre Ta Colère, et Ta Satisfaction assure ma délivrance!"},
        {t:'tri', ar:"اللَّهُمَّ إِنْ يَكُنِ النَّدَمُ تَوْبَةً إلَيْكَ فَأَنَا أَنْدَمُ النَّادِمِينَ", tr:"allâhumma in yakun annadamu tawbatan ilayka fa ana andamu annâdimîna", fr:"Ô Dieu! Si le remord, est un repentir vers Toi, en ce cas, je suis le plus repentant des contrits,"},
        {t:'tri', ar:"وَإِنْ يَكُنِ التَّرْكُ لِمَعْصِيَتِكَ إِنَابَةً فَأَنَا أَوَّلُ الْمُنِیبِينَ", tr:"wa in yakun attarku lima’ şiyatika inâbatan fa ana awwalu almunîbîna", fr:"et si l’abandon de la désobéissance, est une repentance et un retour vers Toi, en cessas, je suis le premier parmi ceux qui se retournent!"},
        {t:'tri', ar:"وَإِنْ يَكْنِ الإسْتِغْفَارُ حِطَّةً لِلذَّنُوبِ فَإِنِّي لَكَ مِنَ الْمُسْتَغْفِرِينَ", tr:"wa in yakun alistighfâru hittatan lidhdhunûbi fa innî laka min almustaghfirîna", fr:"Si le fait de supplier Ton Pardon, efface les péchés, en ce cas, je suis un de ceux qui Te prient et demandent Ton Pardon!"},
        {t:'tri', ar:"اللَّهُمَّ فَكَمَا أَمَرْتَ بِالتَّوْبَةِ وَضَمِنْتَ الْقَبُولَ", tr:"allâhumma fakamâ amarta bittawbati wa daminta alqabûla", fr:"Ô Dieu! Comme Tu as réinventé le repentir, et as garanti son acceptation,"},
        {t:'tri', ar:"وَحَثَنْتَ عَلَى الدُّعَاءِ وَوَعَدْتَ الإِجَابَةَ", tr:"wa hathathta ‘alâ addu a’i wa wa’adta al-ijâbata", fr:"comme Tu as encouragé la supplication, et as promis d’y répondre,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"bénis donc Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاقْبَلْ تَوْبَتِي", tr:"waqbal tawbati", fr:"Accepte mon repentir,"},
        {t:'tri', ar:"وَلَا تَرْجِعْنِي مَرْجِعَ الْخَيْبَةِ مِنْ رَحْمَتِكَ", tr:"wa lâ tarji ni marji a alkhaybati min rahmatika", fr:"et ne me fais pas retourner au rang des désespérés, et privés de Ta Grâce et de Ta Pitié!"},
        {t:'tri', ar:"إِنَّكَ أَنْتَ التَّوَّابُ عَلَى الْمُذْنِبِينَ", tr:"innaka anta attawwâbu ‘alâ almudhnibina", fr:"Car c’est Toi Seul qui accepte les repentirs des pécheurs,"},
        {t:'tri', ar:"وَالرَّحِيمُ لِلْخَاطِئِينَ الْمُنِيبِينَ", tr:"wa arrahimu lilkhâți’îna almunîbina", fr:"Tout Compatissant envers les offenseurs qui reviennent verse Toi!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ كَمَا هَدَيْتَنَا بِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi kamâ hadaytanâ bihi", fr:"Ô Dieu! bénis Mohammad et toute sa Famille! Comme Tu nous as guidées par lui,"},
        {t:'tri', ar:"وَصَلّ عَلَى مُحَمَّدٍ وَآلِهِ كَمَا اسْتَنْقَذْتَنَا بِهِ", tr:"wa șalli ‘alâ muhammadin wa âlihi kamâ istanqadhtanâ bihi", fr:"or Bénis Mohammad et toute sa Famille! Comme Tu nous as sauvées par lui,"},
        {t:'tri', ar:"وَصَلَ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"wa șalli ‘alâ muhammadin wa âlihi", fr:"or Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"صَلاَةً تَشْفَعُ لَنَا يَوْمَ الْقِيَامَةِ وَيَوْمَ الْفَاقَةِ إِلَيْكَ", tr:"șalâtan tachfa’u lanâ yawma algiyâmati wa yawma alfâqati ilayka", fr:"avec une bénédiction qui intercédera pour nous, au Jour de la Résurrection, qui est le jour où on en aura le plus de besoin envers Toi!"},
        {t:'tri', ar:"إِنَّكَ عَلَى كُلِّ شَيءٍ قَدِيرٌ", tr:"innaka ‘alâ kulli chay’in qadîrun", fr:"Tu es Le plus Puissant sur toutes les choses"},
        {t:'tri', ar:"وَهُوَ عَلَيْكَ يَسِيرٌ.", tr:"wa huwa ‘alayka yasîrun", fr:"et cela est incontestablement facile pour Toi!"},
        {t:'salawat'},
      ]
    },
    's32': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "32. Prière de la nuit",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation de Zayn al-ʿĀbidīn après la prière de la nuit",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السّلامُ بعْد الْفراغِ مِنْ صلاةِ اللِّيْلِ لِنفْسِهِ فِي الإِغْتِرَافِ بِالذَّنْبِ", tr:"", fr:"La trente deuxième supplication: en confessant aux péchés après la prière du soir"},
        {t:'tri', ar:"اللَّهُمَّ يَا ذَا الْمُلْكِ الْمُتَأَبِّدِ بِالْخُلُودِ", tr:"allâhumma ya dhâ almulki almuta’abbidi bilkhulûdi", fr:"Ô Dieu! Ô Possesseur du Royaume qui est éternel dans sa perpétuité,"},
        {t:'tri', ar:"وَالسُّلْطَانِ الْمُمْتَنِعِ بِغَيْرِ جُنُودٍ وَلَاَ أَعْوَانٍ", tr:"wa assultâni almumtani i bighayri junûdin wa lâ a ‘wânin", fr:"Ô Possesseur du Règne invincible qui est sans aucune armeé ou aides!"},
        {t:'tri', ar:"وَالْعِزِّ الْبَاقِي عَلَى مَرِّ الدُّهُورِ", tr:"wal’izzi albâqi ‘alâ marri adduhûri", fr:"Ô Possesseur du Pouvoir durable, depuis des e’ons passés,"},
        {t:'tri', ar:"وَخَوَالِي الأَعْوَامِ", tr:"wa khawâlî al- a’wâmi", fr:"depuis des années passées,"},
        {t:'tri', ar:"وَمَوَاضِي الأَزْمَانِ وَالأَيَّامِ عَزَّ سُلْطَانُكَ", tr:"wa mawâdi al- azmâni wal-ayyâmi ‘azza sultânuka", fr:"depuis des temps et des jours passés! Ton Règne est en vérité puissant"},
        {t:'tri', ar:"عِزاً لاَ حَدَّ لَهُ بِأَوَّلِيَّةٍ", tr:"izzan lâ hadda lahû bi- awwaliyyatin", fr:"avec un pouvoir qui ne se définit point par un commencement,"},
        {t:'tri', ar:"وَلَا مُنْتَهَى لَهُ بِآخَرِيَّةٍ", tr:"wa lâ muntahâ lahû bi- âkhariyyatin", fr:"ne se termine point par une fin."},
        {t:'tri', ar:"وَاسْتَعْلَى مُلْكُكَ", tr:"wasta ‘lâ mulkuka", fr:"Ton Royaume s’élève au-dessus de tout, et possède"},
        {t:'tri', ar:"عُلُوّاً سَقَطَتِ الأَشْيَاءُ دُونَ بُلُوغِ أَمَدِهِ", tr:"uluwwan saqațat al-achyấ’u dûna bulûghi amadihi", fr:"une domination tellement sublime et élevée, que toute chose se renverse devant elle, sans que jamais personne ne puisse arriver à son apogée!"},
        {t:'tri', ar:"وَلَا يَبْلُغُ أَدْنَى مَا اسْتَأْثَرْتَ بِهِ مِنْ ذَلِكَ أَقْصَى نَعْتِ النَّاعِتِينَ", tr:"wa lâ yablughu adna masta tharta bihî min dhâlika aqșâ na’ti annâ itîna", fr:"La plus haute louange et description de ceux qui Te décrivent, ne peuvent atteindre à la moindre description des attributs que Tu as gardés pour Toi-même!"},
        {t:'tri', ar:"ضَلَّتْ فِيكَ الصِّّفَاتُ", tr:"dallat fika aşşifâtu", fr:"Tous les attributs dépeints pour Toi se perdent,"},
        {t:'tri', ar:"وَتَفَسَّخَتْ دُونَكَ النُّعُوتُ", tr:"wa tafassakhat dûnaka annu’ûtu", fr:"toute description s’affaisse devant Ton Essence"},
        {t:'tri', ar:"وَحَارَتْ فِي كِبْرِيَائِكَ لَطَائِفُ الأَوْهَامِ", tr:"wa hârat fi kibriyâ’ika lațâ’ifu al-awhâmi", fr:"et la plus subtile des imaginations est étourdie par Ta Magnificence!"},
        {t:'tri', ar:"كَذَلِكَ أَنْتَ اللَّهُ الأَوَّلُ فِي أَوَّلِيَّتِكَ", tr:"kadhâlika anta allâhu al-awwalu fi awwaliyyatika", fr:"Ainsi Tu es, Ô Dieu! Le Premier dans Ton Éternité (commencement)"},
        {t:'tri', ar:"وَعَلَى ذَلِكَ أَنْتَ دَائِمٌ لَا تَزُولُ", tr:"wa ‘alâ dhâlika anta dâ’imun lâ tazâlu", fr:"et par conséquent, Tu es Le Perpétuel (L’Éternel) qui ne disparaît point!"},
        {t:'tri', ar:"وَأَنَا الْعَبْدُ الضَّعِيفُ عَمَلاً", tr:"wa ana al’abdu adda ‘îfu ‘amalan", fr:"Mais je suis un esclave, maigre"},
        {t:'tri', ar:"الْجَسِيمُ أَمَلاً", tr:"aljasîmu amalan", fr:"et faible dans ses actions."},
        {t:'tri', ar:"خَرَجَتْ مِنْ يَدِي أَسْبَابُ الْوُصُلَاَتِ", tr:"kharajat min yadi asbâbu alwușulâti", fr:"Les liens qui me lient à Toi, sont en dehors de mes mains,"},
        {t:'tri', ar:"إلاَّ مَا وَصَلَهُ رَحْمَتُكَ", tr:"illâ mâ waşalahû rahmatuka", fr:"excepté ce qui lie Ta Grâce;"},
        {t:'tri', ar:"وَتَقَطَّعَتْ عَنِّي عِصَمُ الآمَالِ", tr:"wa taqațța at ‘annî ‘işamu al- âmâli", fr:"Les liens de mes espoirs sont coupés,"},
        {t:'tri', ar:"إِلا مَا أَنَا مُعْتَصِمٌ بِهِ مِنْ عَفْوِكَ", tr:"illâ mâ ana mu taşimun bihî min ‘afwika", fr:"excepté ceux qui me joignent à Ton Indulgence."},
        {t:'tri', ar:"قَلَّ عِنْدِي مَا أعْتَدَّ بِهِ طَاعَتِكَ", tr:"qalla ‘indi mâ a’taddu bihî min țâ’ atika", fr:"Mon obéissance envers Toi, et dont je compte sur elle est bien peu,"},
        {t:'tri', ar:"وَكَثُرَ عَلَيَّ مَا أَبُوءُ بِهِ مِنْ مَعْصِيَتِكَ", tr:"wa kathura ‘alayya mâ abû’u bihi min ma’șiyatika", fr:"et la désobéissance envers Toi, dont je porte le fardeau est bien grande!"},
        {t:'tri', ar:"وَلَنْ يَضِيقَ عَلَيْكَ عَفْوٌ عَنْ عَبْدِكَ وَإِنْ أَسَاءَ", tr:"wa lan yadiqa ‘alayka ‘afwun ‘an ‘abdika wa in asấ’a", fr:"Mais pardonner Ton esclave, même s’il a commis bien des péchés, ne pourrait encombrer Ton Indulgence!"},
        {t:'tri', ar:"فَاعْفُ عَنِّي", tr:"fa’fu ‘anni", fr:"Pardonne moi!"},
        {t:'tri', ar:"اَللَّهُمَّ وَقَدْ أَشْرَفَ عَلَى خَفَايَا الأَعْمَالِ عِلْمُكَ", tr:"allâhumma waqad achrafa ‘alâ khafâyâ al-a’mâli ‘ilmuka", fr:"Ô Dieu! Ta profonde Connaissance veille sur les faits cachés,"},
        {t:'tri', ar:"وَانْكَشَفَ كُلُّ مَسْتُورٍ دُونَ خُبْرِكَ", tr:"wankachafa kullu mastûrin dûna khubrika", fr:"et toute chose couverte est exposée devant Ta fine Conscience,"},
        {t:'tri', ar:"وَلَاَ تَنْطَوِي عَنْكَ دَقَائِقُ الأُمُورِ", tr:"wa lâ tanțawî ‘anka daqâ’iqu al- umûri", fr:"et les affaires très délicates ne Te sont en aucune façon voilées,"},
        {t:'tri', ar:"وَلَا تَعْزُبُ عَنْكَ غَيِّبَاتُ السَّرَائِرِ", tr:"wa lâ ta zubu ‘anka ghayyibâtu assara’iri", fr:"et les pensées très intimes ne Te restent point cachées!"},
        {t:'tri', ar:"وَقَدِ اسْتَحْوَذَ عَلَيَّ عَدُوُّكَ", tr:"wa qad istahwadha ‘alayya ‘aduwwuka", fr:"Mais Ton ennemi qui Te demanda un délai pour m’égarer,"},
        {t:'tri', ar:"اَلَّذِي اسْتَنْظَرَكَ لِغَوَايَتِي فَأَنْظَرْتَهُ", tr:"alladhi istanzaraka lighiwâyati fa anzartahu", fr:"et dont Tu lui accordas, m’a conquis"},
        {t:'tri', ar:"وَاسْتَمْهَلَكَ إِلَى يَوْمِ الدِّينِ لإِضْلاَلِي فَأَمْهَلْتَهُ", tr:"wastamhalaka ila yawmi addîni li- idlâlî fa amhaltahu", fr:"et il Te demanda un sursis jusqu’au Jugement dernier et Tu lui accordas!"},
        {t:'tri', ar:"فَأَوْقَعَنِي", tr:"fa awqa ani", fr:"Ainsi il pût me jeter à bas,"},
        {t:'tri', ar:"وَقَدْ هَرَبْتُ إِلَيْكَ مِنْ صَغَائِرِ ذُنُوبِ مُوبِقَةٍ", tr:"wa qad harabtu ilayka min şaghâ’iri dhunûbin mübiqatin", fr:"même si je m’étais enfui vers Toi de mes petits péchés ruineux (désastreux)"},
        {t:'tri', ar:"وَكَبَائِرِ أَعْمَالٍ مُرْدِيَةٍ", tr:"wa kabâ’iri a’mâlin murdiyatin", fr:"et aussi des grandes actions mortelles,"},
        {t:'tri', ar:"حَتَّى إِذَا قَارَفْتُ مَعْصِيَتَكَ", tr:"hattâ idhâ qâraftu ma’şiyataka", fr:"jusqu’à ce que je commis des péchés pour Te désobéir,"},
        {t:'tri', ar:"وَاسْتَوْجَبْتُ بِسُوءِ سَعْیِي سَخْطَتَكَ", tr:"wastawjabtu bisû’i sa’yî sakhațataka", fr:"et méritai Ta juste Colère, par mes mauvaises actions,"},
        {t:'tri', ar:"فَتَلَ عَنِّي عِذَارَ غَدْرِهِ", tr:"fatala ‘anni ‘ idhâra ghadrihi", fr:"« et alors il détourna la bride de ses tricheries (fourberies) de ma personne,"},
        {t:'tri', ar:"وَتَلَقَّانِي بِكَلِمَةِ كَفْرِهِ", tr:"wa talaqqâni bikalimati kufrihi", fr:"me rencontra avec sa parole d’ingratitude,"},
        {t:'tri', ar:"وَتَوَلَّى الْبَرَاءَةَ مِنِّي", tr:"wa tawalla albarâ’ata minni", fr:"s’employa à ne rien avoir avec moi, »"},
        {t:'tri', ar:"وَأَدْبَرَ مُوَلِّياً عَنِّي", tr:"wa adbara muwalliyan ‘anni", fr:"tourna son dos pour prendre la fuite de moi,"},
        {t:'tri', ar:"فَأَصْحَرَنِي لِغَضَبِكَ فَرِيداً", tr:"fa asharani lighadabika faridan", fr:"et me jeta seul, dans le désert de Ta Colère,"},
        {t:'tri', ar:"وَأَخْرَجَنِي إِلَى فِنَاءِ نَقِمَتِكَ طَرِيداً", tr:"wa akhrajani ilâ fina’i naqimatika taridan", fr:"et me renvoya comme un proscrit, sur le seuil de Ta Vengeance."},
        {t:'tri', ar:"لاَ شَفِيعٌ يَشْفَعُ لِي إِلَيْكِ", tr:"lâ chafi un yachfa’u lî ilayka", fr:"Il n’existe aucun intercesseur pour intercéder pour moi devant Toi!"},
