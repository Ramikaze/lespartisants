        {t:'tri', ar:"وَلَاَ يُؤْمِنُ إِلاَّ غَالِبٌ عَلَى مَغْلُوبِ", tr:"wa lâ yu’minu illâ ghâlibun ‘alâ maghlübin", fr:"Et personne ne pourrait rassurer un vaincu, à part son conquérant,"},
        {t:'tri', ar:"وَلَا يُعِينُ إِلاَّا طَالِبٌ عَلَى مَطَلُوبِ", tr:"wa lâ yu ‘înu illâ tâlibun ‘alâ mațlubin", fr:"Et personne ne pourrait secourir un recherché, à part celui qui le suit."},
        {t:'tri', ar:"وَبِيَدِكَ يَا إِلَهِي جَمِيعُ ذَلِكَ السَّبَبِ", tr:"wa biyadika ya ilâhî jamî’ u dhâlika assababi", fr:"Mon Dieu, dans Ta Main se trouve le lien de tout cela,"},
        {t:'tri', ar:"وَإِلَيْكَ الْمَفَرُّ وَالْمَهْرَبُ", tr:"wa ilayka almafarru walmahrabu", fr:"et vers Toi se trouvent le refuge et l’évasion,"},
        {t:'tri', ar:"فَصَلٌ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"alors bénis Mohammad et toute sa Famille"},
        {t:'tri', ar:"وَأَجِرْ هَرَبِي وَأَنْجِحْ مَطَلَبِي", tr:"wa ajir harabi wa anjih mațlabi", fr:"Donne-moi un refuge dans ma fuite, et exauce ma requête"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّكَ إِنْ صَرَفْتَ عَنِّي وَجْهَكَ الْكَرِيمَ", tr:"allâhumma innaka in sarafta «  »anni wajhaka alkarima", fr:"Ô Dieu! Si Tu détournes Ton noble Regard de moi,"},
        {t:'tri', ar:"أَوْ مَنَعْتَنِي فَضْلَكَ الْجَسِيمَ", tr:"aw mana’tani fadlaka aljasîma", fr:"et refuses Ton immense Grâce de moi,"},
        {t:'tri', ar:"أَوْ حَظَرْتَ عَلَيَّ رِزْقَكَ", tr:"aw hazarta ‘alayya rizqaka", fr:"et m’interdis Ta Provision,"},
        {t:'tri', ar:"أَوْ قَطَعْتَ عَنِّي سَبَبَكَ", tr:"aw qața ta ‘anni sababaka", fr:"ou bien découpes Ta Faveur de ma personne,"},
        {t:'tri', ar:"لَمْ أَجِدِ السَّبِيلَ إِلَى شَيءٍ مِنْ أَمَلِي غَيْرَكَ", tr:"lam ajid assabila ilâ chay’in min amali ghayraka", fr:"Je ne trouverai aucun moyen pour atteindre mes souhaits sauf par Toi,"},
        {t:'tri', ar:"وَلَمْ أَقْدِرْ عَلَى مَا عِنْدَكَ بِمَعُونَةِ سِوَاكَ", tr:"wa lam aqdir ‘alâ mâ ‘indaka bima ‘ûnati siwâka", fr:"ni d’avoir à ma portée ce qui est chez Toi, par l’aide d’autrui,"},
        {t:'tri', ar:"فَإِنِي عَبْدُكَ وَفِي قَبْضَتِكَ", tr:"fa innî ‘abduka wa fi qabdatika", fr:"car je suis en vérité Ton esclave, soumis à Ton Pouvoir"},
        {t:'tri', ar:"نَاصِيَتِي بِيَدِكَ", tr:"nâșiyati biyadika", fr:"et entre Tes mains."},
        {t:'tri', ar:"لاَ أَمْرَ لِي مَعَ أَمْرِكَ", tr:"lâ amra lî ma’a amrika", fr:"Je n’ai aucun choix à côté de Ton Choix."},
        {t:'tri', ar:"مَاضٍ فِيَّ حُكْمُكَ", tr:"mâdin fiyya hukmuka", fr:"Ta Commande envers moi est accomplie,"},
        {t:'tri', ar:"عَدْلٌ فِيَّ قَضَاؤُكَ", tr:"adlun fiyya qadâ’uka", fr:"et Ton décret envers moi est équitable!"},
        {t:'tri', ar:"وَلَاَ قُوَّةَ لِي عَلَى الْخُرُوجِ مِنْ سُلْطَانِكَ", tr:"wa lâ quwwata lî ‘alâ alkhurûji min sultânika", fr:"Je n’ai pas la force de sortir de Ton Autorité,"},
        {t:'tri', ar:"وَلَا أَسْتَطِيعُ مُجَاوَزَةَ قُدْرَتِكَ", tr:"wa lâ astațiu mujâwazata qudratika", fr:"et je ne suis point capable de dépasser Ton Pouvoir."},
        {t:'tri', ar:"وَلَا أَسْتَمِيلُ هَوَاكَ", tr:"wa lâ astamîlu hawâka", fr:"Je ne puis gagner Ton affection,"},
        {t:'tri', ar:"وَلَاَ أَبْلُغُ رِضَاكَ", tr:"wa la ablughu ridâka", fr:"ou bien d’atteindre ce qui est chez Toi,"},
        {t:'tri', ar:"وَلَاَ أَنَالُ مَا عِنْدَكَ إلاَّ بِطَاعَتِكَ وَبِفَضْلِ رَحْمَتِكَ", tr:"wa lâ anâlu mâ ‘indaka illâ bițâ ‘atika wa bifadli rahmatika", fr:"que par l’obéissance envers Toi, et par la grâce de Ta Miséricorde."},
        {t:'tri', ar:"إِلَهِي أَصْبَحْتُ وَأَمْسَيْتُ عَبْداً دَاخِراً لَكَ", tr:"ilâhî aşbahtu wa amsaytu ‘ abdan dâkhiran laka", fr:"Mon Dieu! Je me lève le matin, et entre dans la soirée en tant que Ton vil esclave."},
        {t:'tri', ar:"لَاَ أَمْلِكُ لِنَفْسِي نَفْعاً وَلاَ ضَرّاً إِلاَّ بِكَ", tr:"lâ amliku linafsi naf’an wa lâ darran illâ bika", fr:"Je ne possède aucun gain ou dommage, que par Toi"},
        {t:'tri', ar:"أَشْهَدُ بِذَلِكَ عَلَى نَفْسِي", tr:"ach-hadu bidhâlika ‘alâ nafsî", fr:"Je donne témoignage pour cela contre moi-même,"},
        {t:'tri', ar:"وَأَعْتَرِفُ بِضَعْفِ قُوَّتِي وَقِلَّةِ حِيلتِي", tr:"wa a tarifu bida fi quwwati wa qillati hilati", fr:"et je confesse à la fragilité de mon pouvoir, et la médiocrité de mes moyens (expédients)"},
        {t:'tri', ar:"فَأَنْجِزْ لِي مَا وَعَدْتَنِي", tr:"fa anjiz li mâ wa’adtani", fr:"Par conséquent, accomplis ce que Tu m’avais promis,"},
        {t:'tri', ar:"وَتَمِّمْ لِي مَا آتَيْتَنِي", tr:"wa tammim lî mâ âtaytani", fr:"et complète pour moi ce que Tu m’avais accordé,"},
        {t:'tri', ar:"فَإِنِّي عَبْدُكَ الْمِسْكِينُ الْمُسْتَكِينُ", tr:"fa inni ‘abduk almiskinu almustakînu", fr:"car je suis Ton esclave misérable, humble,"},
        {t:'tri', ar:"الضَّعِيفُ الضَّرِيرُ", tr:"adda’îfu addarîru", fr:"fragile, en détresse,"},
        {t:'tri', ar:"الذَّلِيلُ الْحَقِيرُ", tr:"adhdhalilu alhaqiru", fr:"humilier, vil,"},
        {t:'tri', ar:"الْمَهِينُ الْفَقِيرُ", tr:"almahînu alfaqiru", fr:"méprisé, pauvre,"},
        {t:'tri', ar:"الْخَائِفُ الْمُسْتَجِيرُ", tr:"alkhâ’ifu almustajîru", fr:"effrayé, et cherchant refuge!"},
        {t:'tri', ar:"اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَلَاَ تَجْعَلْنِي نَاسِياً لِذِكْرِكَ فِيمَا أَوْلَيْتَنِي", tr:"wa lâ taj’ alni nâsiyan lidhikrika fimâ awlaytani", fr:"Et ne me laisse pas oublier de me souvenir de Toi, pour tout ce que Tu m’as généreusement accordé,"},
        {t:'tri', ar:"وَلَاَ غَافِلاً لإِحْسَانِكَ فِيمَا أَبْلَيْتَنِي", tr:"wa lâ ghâfilan li- ihsânika fimâ ablaytani", fr:"ne me laisse pas rester indifférent envers Tes Bienfaits,"},
        {t:'tri', ar:"وَلَاَ آيِساً مِنْ إجَابَتِكَ لِي وَإِنْ أَبْطَأَتْ عَنِّي", tr:"wa lâ âyisan min ijâbatika li wa in abța’at ‘anni", fr:"ou me désespérer de l’acceptation de mes prières par Toi,"},
        {t:'tri', ar:"فِي سَرَّاءَ كُنْتُ أوْ ضَرَّاءَ", tr:"fi sarrâ’a kuntu aw darrâ’a", fr:"que je sois dans la prospérité ou l’adversité,"},
        {t:'tri', ar:"أوْ شِدَّةٍ أوْ رَخَاءٍ", tr:"aw chiddatin aw rakhâ’in", fr:"dans la difficulté ou l’aise,"},
        {t:'tri', ar:"أَوْ عَافِيَةٍ أَوْ بَلاَءِ", tr:"aw ‘âfiyatin aw bala’in", fr:"dans le bien-être ou l’affliction,"},
        {t:'tri', ar:"أَوْ بُؤْسٍ أَوْ نَعْمَاءَ", tr:"aw bu’sin aw na’mấ’a", fr:"dans la misère ou le confort,"},
        {t:'tri', ar:"أَوْ جِدَةٍ أَوْ لأْوَاءَ", tr:"aw jidatin aw la wấ’a", fr:"dans la bonne fortune ou la détresse,"},
        {t:'tri', ar:"أَوْ فَقَرٍ أَوْ غِنًى", tr:"aw fagrin aw ghinan", fr:"dans la pauvreté ou la richesse"},
        {t:'tri', ar:"اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma salli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْعَلْ ثَنَائِي عَلَيْكَ وَمَدْحِي إِيَّاكَ", tr:"waj al thanâ’î ‘alayka wa madhî iyyâka", fr:"Laisse-moi Te louer, T’exalter,"},
        {t:'tri', ar:"وَحَمْدِي لَكَ فِي كُلِّ حَالاتِي", tr:"wa hamdi laka fi kulli hâlâti", fr:"et faire Ton éloge dans tous mes états,"},
        {t:'tri', ar:"حَتَّى لاَ أَفْرَحَ بِمَا آتَيْتَنِي مِنَ الدُّنْيَا", tr:"hattâ lâ afraha bimâ âtaytani min addunyâ", fr:"de sorte que je ne puisse me réjouir de ce que Tu m’as accordé de profits dans ce bas monde,"},
        {t:'tri', ar:"وَلَا أَحْزَنَ عَلَى مَا مَنَعْتَنِي فِيهَا", tr:"mâ mana’tani fihâ", fr:"ni de m’attrister sur les wa lâ ahzana ‘alâ choses que Tu m’as refusé!"},
        {t:'tri', ar:"وَأَشْعِرْ قَلْبِي تَقْوَاكَ", tr:"wa ach’ir qalbi taqwâka", fr:"Enveloppe mon coeur avec une crainte révérentielle pour Toi,"},
        {t:'tri', ar:"وَاسْتَعْمِلْ بَدَنِي فِيمَا تَقْبَلُهُ مِنِّي", tr:"wasta’mil badani fimâ taqbaluhû minni", fr:"emploie mon corps dans ce que Tu acceptes de moi,"},
        {t:'tri', ar:"وَاشْغَلَ بِطَاعَتِكَ نَفْسِي عَنْ كُلِّ مَا يَرِدُ عَلَيَّ", tr:"wa achghil bițâ atika nafsî ‘an kulli mâ yaridu ‘alayya", fr:"Empêche-moi de m’occuper de toute pensée et de tout souvenir personnel,"},
        {t:'tri', ar:"حَتَّى لاَ أُحِبَّ شَيْئاً مِنْ سُخْطِكَ", tr:"hattâ lâ uhibba chay’an min sukhțika", fr:"de soirte que je ne puisse aimer rien qui Te soit déplaisant,"},
        {t:'tri', ar:"وَلَاَ أسْخَطَ شَيْئاً مِنْ رِضَاكَ", tr:"wa lâ askhața chay’an min ridâka", fr:"et de me fâcher de tout ce qui Te plaise"},
        {t:'tri', ar:"اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَفَرِّغْ قَلْبِي لِمَحَبَّتِكَ", tr:"wa farrigh qalbi limahabbatika", fr:"restreint mon coeur pour l’amour de Toi,"},
        {t:'tri', ar:"وَاشْغَلَهُ بِذِكْرِكَ", tr:"wa achghilhû bidhikrika", fr:"et occupe-le en se souvenant de Toi,"},
        {t:'tri', ar:"وَانْعَشْهُ بِخَوْفِكَ وَبِالْوَجَلِ مِنْكَ", tr:"wa an’ich-hû bikhawfika wa bilwajali minka", fr:"Anime-le de peur et de crainte de Toi,"},
        {t:'tri', ar:"وَقَوِّهِ بِالرَّغْبَةِ إِلَيْكَ", tr:"wa qawwihî birraghbati ilayka", fr:"Fortifie-le pour accueillir Ton Affection,"},
        {t:'tri', ar:"وَأَمِلْهُ إِلَى طَاعَتِكَ", tr:"wa amilhû ilâ țâ’ atika", fr:"Incline-le à Ton Obéissance,"},
        {t:'tri', ar:"وَاجْرِ بِهِ فِي أَحَبِّ السُّبُلِ إِلَيْكَ", tr:"wa ajri bihî fi ahabbi assubuli ilayka", fr:"Dirige-le dans la voie qui T’est la plus aimée,"},
        {t:'tri', ar:"وَذَلِّلْهُ بالرَّغْبَةِ فِيمَا عِنْدَكَ أَيَّامَ حَيَاتِي كُلِّهَا", tr:"wa dhallilhû birraghbati fimâ ‘indaka ayyâma hayâti kullihâ", fr:"et rends-le soumis par le désir qui réside avec Toi, pour tous les jours de ma vie!"},
        {t:'tri', ar:"وَاجْعَلْ تَقْوَاكَ مِنَ الدُّنْيَا زَادِي", tr:"waj’al taqwâka min addunyâ zâdî", fr:"Fais-en sorte que ma provision dans ce monde, soit une crainte révérentielle de Toi,"},
        {t:'tri', ar:"وَإِلَى رَحْمَتِكَ رِحْلَتِي", tr:"wa ilâ rahmatika riblati", fr:"et que mon départ s’accomplisse vers Ta Grâce,"},
        {t:'tri', ar:"وَفِي مَرْضَاتِكَ مَدْخَلِي", tr:"wa fi mardâtika madkhali", fr:"et mon arrivée dans Ta Satisfaction!"},
        {t:'tri', ar:"وَاجْعَلْ فِي جَنَّتِكَ مَثْوَايَ", tr:"waj al fi jannatika mathwâya", fr:"Loge-moi dans Ton Paradis,"},
        {t:'tri', ar:"وَهَبْ لِي قُوَّةً أَحْتَمِلُ بِهَا جَمِيعَ مَرْضَاتِكَ", tr:"wa hab li quwwatan ahtamilu bihâ jamî’ a mardâtika", fr:"Donne-moi le pouvoir par lequel je puisse porter le fardeau de tout ce qui Te plaît,"},
        {t:'tri', ar:"وَاجْعَلْ فِرَارِي إِلَيْكَ", tr:"waj’al firârî ilayka", fr:"Fais-en sorte que mon évasion soit vers Toi!"},
        {t:'tri', ar:"وَرَغْبَتِي فِيمَا عِنْدَكَ", tr:"wa raghbati fimâ ‘indaka", fr:"Accorde-moi le désir de ce qui est avec Toi,"},
        {t:'tri', ar:"وَأَلْبِسْ قَلْبِي الْوَحْشَةَ مِنْ شِرَارِ خَلْقِكَ", tr:"wa albis qalbi alwahchata min chirâri khalqika", fr:"vêtis mon coeur dans T’éloignement de tout mal parmi Tes créatures,"},
        {t:'tri', ar:"وَهَبْ لِيَ الأُنْسَ بِكَ", tr:"wa hab li al-unsa bika", fr:"et procure-moi une intimé avec Toi,"},
        {t:'tri', ar:"وَبِأَوْلِيَائِكَ وَأَهْلِ طَاعَتِكَ", tr:"wa bi-awliyâ’ika wa ahli tâ’ atika", fr:"Tes amis, et ceux qui T’obéissent!"},
        {t:'tri', ar:"وَلَا تَجْعَلْ لِفَاجِرٍ وَلَاَ كَافِرٍ عَلَيَّ مِنَّةً", tr:"wa lâ taj’ al lifâjirin wa lâ kâfirin ‘alayya minnatan", fr:"Ne désigne par pour moi la faveur d’une personne méchante"},
        {t:'tri', ar:"وَلَاَ لَهُ عِنْدِي يَداً", tr:"wa lâ lahû ‘indî yadan", fr:"ou non croyante,"},
        {t:'tri', ar:"وَلَا بِي إِلَيْهِمْ حَاجَةً", tr:"wa lâ bi ilayhim hâjatan", fr:"ou bien que j’aie à la remercier pour cela!"},
        {t:'tri', ar:"بَلِ اجْعَلْ سُكُونَ قَلْبِي وَأُنْسَ نَفْسِي", tr:"bal ij’al sukûna qalbi wa unsa nafsî", fr:"En fait, fais-en sorte que le calme de mon cœur et le confort de mon âme,"},
        {t:'tri', ar:"وَاسْتِغْنَائِي وَكِفَايَتِي بِكَ وَبِخِيَارِ خَلْقِكَ", tr:"wastighna’i wa kifâyatî bika wa bikhiyâri khalqika", fr:"mon indépendence et ma suffisance, résident en Toi et chez les meilleurs parmi Tes créatures!"},
        {t:'tri', ar:"اللَّهُمَّ صَلّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْعَلْنِي لَهُمْ قَرِيناً", tr:"waj alni lahum qarinan", fr:"joigne-moi à eux,"},
        {t:'tri', ar:"وَاجْعَلْنِي لَهُمْ نَصِيراً", tr:"waj’ alni lahum naşiran", fr:"fais-en sorte que je puisse les assister,"},
        {t:'tri', ar:"وَامْنُنْ عَلَيَّ بِشَوْقٍ إِلَيْكَ", tr:"wamnun ‘alayya bichawqin ilayka", fr:"et accorde-moi la grâce et l’obligeance de Te désirer ardemment,"},
        {t:'tri', ar:"وَبِالْعَمَلِ لَكَ بِمَا تُحِبُّ وَتَرْضَى", tr:"wa bil ‘amali laka bimâ tuhibbu wa tardâ", fr:"et faire pour Toi ce que Tu aimes et approuves!"},
        {t:'tri', ar:"إِنَّكَ عَلَى كُلَّ شَيءٍ قَدِيرٌ", tr:"innaka ‘alâ kulli chay’in qadirun", fr:"Car en vérité Tu es Puissant sur toute chose,"},
        {t:'tri', ar:"وَذَلِكَ عَلَيْكَ يَسِيرٌ.", tr:"wa dhâlika ‘alayka yasîrun", fr:"Et cela est véritablement facile pour Toi!"},
        {t:'salawat'},
      ]
    },
    's22': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "22. Dans les difficultés",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pendant la difficulté, l’effort et les affaires troublées et troublantes",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السّلامُ عِنْد الشِّدّةِ والْجهدِ وتعسُّرِ الأمُورِ", tr:"", fr:"La vingt deuxième supplication: pendant la difficulté, l’effort et les affaires troublées et troublantes"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّكَ كَلَّفْتَنِي مِنْ نَفْسِي", tr:"allâhumma innak kallaftani min nafsî", fr:"Ô Dieu! Tu m’as chargé de la mission de correction et d’amélioration de mon âme,"},
        {t:'tri', ar:"مَا أَنْتَ أَمْلَكُ بِهِ مِنِّي", tr:"mâ anta amlaku bihi minni", fr:"quand Toi-même en es bien plus Puissant que moi !"},
        {t:'tri', ar:"وَقُدْرَتُكَ عَلَيْهِ وَعَلَيَّ أَغْلَبُ مِنْ قُدْرَتِي", tr:"wa qudratuka ‘alayhî wa ‘alayya aghlabu min qudrati", fr:"Ton Pouvoir sur cette mission et sur moi est plus puissante que mon pouvoir,"},
        {t:'tri', ar:"فَأَعْطِنِي مِنْ نَفْسِي مَا يُرْضِيكَ عَنِي", tr:"fa a tini min nafsi mâ yurdika ‘annî", fr:"Accorde-moi donc tout ce qui Te donnera satisfaction,"},
        {t:'tri', ar:"وَخُذْ لِنَفْسِكَ رِضَاهَا مِنْ نَفْسِي فِي عَافِيَةٍ", tr:"wa khudh linafsika ridâhâ min nafsi fi ‘âfiyatin", fr:"et prends pour Ton Bon Plaisir tout ce qui Te plaira, sans que mon bien-être en soit atteinte!"},
        {t:'tri', ar:"اللَّهُمَّ لا طَاقَةَ لِي بِالْجَهْدِ", tr:"allâhumma lâ țâqata lî biljahdi", fr:"Ô Dieu! Je n’ai aucune endurance pour l’effort,"},
        {t:'tri', ar:"وَلَا صَبْرَ لِي عَلَى الْبَلاَءِ", tr:"wa lâ șabra lî ‘alâ albalâ’i", fr:"aucune patience dans l’afliction,"},
        {t:'tri', ar:"وَلَاَ قُوَّةَ لِي عَلَى الْفَقْرِ", tr:"wa lâ quwwata lî ‘alâ alfagri", fr:"aucune force pour supporter la pauvreté"},
        {t:'tri', ar:"فَلاَ تَحْظُرْ عَلَيَّ رِزْقِي", tr:"falâ tahzur ‘alayya riząî", fr:"Ne me prive donc point de ma provision,"},
        {t:'tri', ar:"وَلَاَ تَكِلْنِي إِلَى خَلْقِكَ", tr:"wa lâ takilnî ilâ khalqika", fr:"et ne me confie pas à Tes créatures,"},
        {t:'tri', ar:"بَلْ تَفَرَّدْ بِحَاجَتِي", tr:"bal tafarrad bihâjati", fr:"mais Toi seul prens le soin de mo1,"},
        {t:'tri', ar:"وَتَوَلَّ كِفَايَتِي", tr:"wa tawalla kifâyatî", fr:"et Toi seul prends soin de me satisfaire"},
        {t:'tri', ar:"وَانْظُرْ إِلَيَّ", tr:"wanzur ilayya", fr:"Veille sur moi,"},
        {t:'tri', ar:"وَانْظَُرْ لِي فِي جَمِيعِ أُمُورِي", tr:"wanzur lî fi jamî i umûri", fr:"et dans toutes les affaires prends soin de moi,"},
        {t:'tri', ar:"فَإِنَّكَ إِنْ وَكَلْتَنِي إِلَى نَفْسِي عَجَزْتُ عَنْهَا", tr:"fa innaka in wakaltanî ilâ nafsî ‘ajaztu ‘anhâ", fr:"car si Tu me laisses à mon sort, l’y serai incapable devant moi,"},
        {t:'tri', ar:"وَلَمْ أُقِمْ مَا فِيهِ مَصْلَحَتُهَا", tr:"wa lam uqim mâ fîhî maşlahatuhâ", fr:"et je ne pourrais administrer convenablement mes intérêts"},
        {t:'tri', ar:"وَإِنْ وَكَلْتَنِي إِلَى خَلْقِكَ تَجَهَّمُونِي", tr:"wa in wakaltani ilâ khalqika tajahhamûni", fr:"Si Tu me laisses au soin de Tes créatures, ils fronceront leurs sourcils devant moi,"},
        {t:'tri', ar:"وَإِنْ أَلْجَأْتَنِي إِلَى قَرَابَتِي حَرَمُونِي", tr:"wa in alja’tani ilâ qarâbatî haramûnî", fr:"et si Tu m’obliges à recourrir à mes parents, ils refuseront de faire quoique ce soit pour moi,"},
        {t:'tri', ar:"وَإِنْ أَعْطَوَا أَعْطَوْا قَلِيلاً نَكِداً", tr:"wa in a’țaw a’țaw qalîlan nakidan", fr:"et me priveront de tout… Et s’ils me donnent quelque chose wa in a’taw a taw avec une mauvaise humeur, ce sera très peu, et ce faisant,"},
        {t:'tri', ar:"وَمَنّوا عَلَيَّ طَوِيلاً", tr:"wa mannû ‘alayya țawilan", fr:"Ils me rendent leur obligé,"},
        {t:'tri', ar:"وَذَمُّوا كَثِيراً", tr:"wa dhammû kathîran", fr:"en me le reprochant beaucoup."},
        {t:'tri', ar:"فَبِفَضْلِكَ اللَّهُمَّ فَأَغْنِنِي", tr:"fabifadlika allâhumma faghnini", fr:"Donc, de par Ta Grâce, Ô Dieu ! Libère-moi de tout besoin"},
        {t:'tri', ar:"وَبِعَظَمَتِكَ فَأَنْعِشْنِي", tr:"wa bi azamatika fo an ‘ichni", fr:"de par Ta Grandeur, élève-moi"},
        {t:'tri', ar:"وَبِسَعَتِكَ فَابْسُط يَدِي", tr:"wa bisa’atika fabsut yadi", fr:"de par Ta généreuse Largesse, ouvre-moi la main"},
        {t:'tri', ar:"وَبِمَا عِنْدَكَ فَاكْفِنِي", tr:"wa bimâ ‘indaka fakfini", fr:"et avec ce qui est chez Toi, et subviens à mon besoin!"},
        {t:'tri', ar:"اللَّهُمَّ صَلّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihii", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille !"},
        {t:'tri', ar:"وَخَلِّصْنِي مِنَ الْحَسَدِ", tr:"wa khallişni min alhasadi", fr:"Débarrasse-moi de toute envie,"},
        {t:'tri', ar:"وَاحْصُرْنِي عَنِ الذَّنُوبِ", tr:"wahşurni ‘an adhdhunûbi", fr:"Encercle-moi contre les péchés,"},
        {t:'tri', ar:"وَوَرِّعْنِي عَنِ الْمَحَارِمِ", tr:"wa warri’nî ‘an almahârimi", fr:"Fais-en sorte que je m’abstienne de tous les actes défendus,"},
        {t:'tri', ar:"وَلَاَ تُجَرَّئْنِي عَلَى الْمَعَاصِي", tr:"wa lâ tujarri’ni ‘alâ alma âși", fr:"ne me procure pas l’audace de commettre des péchés,"},
        {t:'tri', ar:"وَاجْعَلْ هَوَايَ عِنْدَكَ", tr:"waj’al hawâya ‘indaka", fr:"Accorde-moi l’amour pour ce qui est avec Toi,"},
        {t:'tri', ar:"وَرِضَايَ فِيمَا يَرِدُ عَلَيَّ مِنْكَ", tr:"wa ridâya fimâ yaridu ‘alayya minka", fr:"et satisfaction de tout ce qui me vient de Ta Part!"},
        {t:'tri', ar:"وَبَارِكَ لِي فِيمَا رَزَقْتَنِي وَفِيمَا خَوَّلْتَنِي", tr:"wa bârik lî fimâ razaqtani wafîmâ khawwaltani", fr:"Bénis tout ce que Tu me procures, tout ce que Tu m’octroies,"},
        {t:'tri', ar:"وَفِيمَا أَنْعَمْتَ بِهِ عَلَيَّ", tr:"wa fimâ an’amta bihî ‘alayya", fr:"et tout ce par lequel, Tu m’accordes Ta Faveur,"},
        {t:'tri', ar:"وَاجْعَلْنِي فِي كُلّ حَالاَتِي مَحْفُوظاً مَكْلُوءاً", tr:"waj’alni fi kulli hâlâti mahfûzan maklû’an", fr:"et dans toute condition, veille sur moi, de sorte que je sois sauvegardé,"},
        {t:'tri', ar:"مَسْتُوراً مَمْنُوعاً مُعَاذاً مُجَاراً", tr:"mastûran mamnû an mu âdhan mujâran", fr:"protégé et dissimulé dans Ton Refuge."},
        {t:'tri', ar:"اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille"},
        {t:'tri', ar:"وَاقْضِ عَنِّي كُلَّ مَا أَلْزَمْتَنِيهِ", tr:"wagdi ‘anni kulla mâ alzamtanîhi", fr:"Laisse-moi accomplir toutes les choses que Tu m’as enjoignè de faire,"},
        {t:'tri', ar:"وَفَرَضْتَهُ عَلَيَّ لَكَ", tr:"wa faradtahû ‘alayya laka", fr:"ou bien me les as rendus obligatoires envers Toi,"},
        {t:'tri', ar:"فِي وَجْهِ مِنْ وُجُوهِ طَاعَتِكَ", tr:"fi wajhin min wujûhi țâ’atika", fr:"dans une de Tes Voies d’obéissance,"},
        {t:'tri', ar:"أَوْ لِخَلْقٍ مِنْ خَلْقِكَ", tr:"aw likhalqin min khalqika", fr:"ou bien envers une de Tes créatures,"},
        {t:'tri', ar:"وَإِنْ ضَعُفَ عَنْ ذَلِكَ بَدَنِي", tr:"wa in da’ufa ‘an dhâlika badanî", fr:"même si mon corps serait trop fragile pour cela,"},
        {t:'tri', ar:"وَوَهَنَتْ عَنْهُ قُوَّتِي", tr:"wa wahanat ‘anhû quwwati", fr:"ma force trop faible,"},
        {t:'tri', ar:"وَلَمْ تَنَلْهُ مَقْدُرَتِي", tr:"wa lam tanalhû maqdurati", fr:"mon pouvoir incapable de l’accomplir,"},
        {t:'tri', ar:"وَلَمْ يَسَعْهُ مَالِي وَلَاَ ذَاتُ يَدِي", tr:"wa lam yasa’hû mâli wa lâ dhâtu yadi", fr:"et mes possessions et tout ce que J’ai,"},
        {t:'tri', ar:"ذَكَرْتُهُ أَوْ نَسِيتُهُ", tr:"dhakartuhû aw nasîtuhu", fr:"seraient insuffisants que je m’en souvienne ou l’oublie complètement."},
        {t:'tri', ar:"هُوَ يَا رَبِّ مِمَّا قَدْ أَحْصَيْتَهُ عَلَيَّ", tr:"huwa yå rabbi mimmâ qad ahşaytahû ‘alayya", fr:"Cela mon Dieu, est parmi ce que Tu as laissé sur mon compte,"},
        {t:'tri', ar:"وَأَغْفَلْتُهُ أَنَا مِنْ نَفْسِي", tr:"wa aghfaltuhû ana min nafsi", fr:"pendant que j’y étais moi-même indifférent."},
        {t:'tri', ar:"فَأَدِّهِ عَنِّي مِنْ جَزِيلِ عَطِيَّتِكَ", tr:"fa addihî ‘anni min jazîli ‘ațiyyatika", fr:"Je Te supplie de les honorer Toi-même par Ta généreuse"},
        {t:'tri', ar:"وَكَبِيرِ مَا عِنْدَكَ", tr:"wa kabîri mâ ‘indaka", fr:"Donation et l’abondance qui se trouve en Toi,"},
        {t:'tri', ar:"فَإِنَّكَ وَاسِعٌ كَرِيم", tr:"fa innaka wâsi’ un karimun", fr:"car Tu es Infini, Illimité, Généreux!"},
        {t:'tri', ar:"حَتَّى لاَ يَبْقَى عَلَيَّ شَيءٌ مِنْهُ", tr:"hattâ lâ yabqâ ‘alayya chay’un minhu", fr:"de sorte que rien de cela ne reste contre moi,"},
        {t:'tri', ar:"تُرِيدُ أَنْ تُقَاصَّنِي بِهِ مِنْ حَسَنَاتِي", tr:"turidu an tugassanı bihi min hasanâtî", fr:"de peur que Tu ne réduises mes bonnes actions,"},
        {t:'tri', ar:"أَوْ تُضَاعِفَ بِهِ مِنْ سَيِّئَاتِي", tr:"aw tudâ’ ifa bihî min sayyi’âtî", fr:"ou bien d’ajouter à mes mauvaises actions,"},
        {t:'tri', ar:"يَوْمَ أَلْقَاكَ يَا رَبِّ", tr:"yawma alqâka ya rabbi", fr:"le jour où je Te rencontrerai, Ô Seigneur!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa alihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَارْزُقْنِي الرَّغْبَةَ فِي الْعَمَلِ لَكَ لآخِرَتِي", tr:"warzuqni arraghbata fil ‘amali laka li’âkhirati", fr:"Accorde-moi le désir de Te servir pour mon Salut,"},
        {t:'tri', ar:"حَتَّى أَعْرِفَ صِدْقَ ذَلِكَ مِنْ قَلْبِي", tr:"hattâ a ‘rifa șidqa dhâlika min qalbî", fr:"de sorte que je puisse connaître la véracité (l’authenticité) de ce désir dans mon coeur,"},
        {t:'tri', ar:"وَحَتَّى يَكُونَ الْغَالِبُ عَلَيَّ الزُّهْدَ فِي دُنْيَايَ", tr:"wa hattâ yakûna alghâlibu ‘alayya azzuhda fi dunyâya", fr:"et d’être dominé par la dévotion, pendant mon séjour dans ce monde-ci,"},
        {t:'tri', ar:"وَحَتَّى أَعْمَلَ الْحَسَنَاتِ شَوْقًا", tr:"wa hattâ a mala alhasanâti chawqan", fr:"d’accomplir de bonnes actions avec un désir ardent,"},
        {t:'tri', ar:"وَآمَنَ مِنَ السَّيِّئَاتِ فَرَقاً وَخَوْفًا", tr:"wa âmana mina assayyi’âti faraqan wa khawfan", fr:"et de rester sain et sauf de toute mauvaise action, par la peur et la crainte!"},
        {t:'tri', ar:"وَهَبْ لِي نُوراً", tr:"wa hab lî nûran", fr:"Et offre-moi une lumière"},
        {t:'tri', ar:"أمْشِي بِهِ فِي النَّاسِ", tr:"amchi bihi finnâsi", fr:"pour que je puisse marcher parmi les gens,"},
        {t:'tri', ar:"وَأَهْتَدِي بِهِ فِي الظُّلُمَاتِ", tr:"wa ahtadi bihi fizzulumâti", fr:"et être guidé dans les ténèbres,"},
        {t:'tri', ar:"وَأَسْتَضِيءُ بِهِ مِنَ الشَّكِّ وَالشُّبُهَاتِ", tr:"wa astadí’u bihî mina achchakki wachchubuhâti", fr:"et obtenir la clarté dans le doute et l’incertitude."},
        {t:'tri', ar:"اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allahumma salli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَارْزُقْنِي خَوْفَ غَمِّ الْوَعِيدِ", tr:"warzuqni khawfa ghammi alwa’îdi", fr:"Accorde-moi le chagrin et la crainte de Tes Menaces,"},
        {t:'tri', ar:"وَشَوْقَ ثَوَابِ الْمَوْعُودِ", tr:"wa chawqa thawâbi almaw’ûdi", fr:"et un désir intense pour une récompense promise,"},
        {t:'tri', ar:"حَتَّى أَجِدَ لَذَّةَ مَا أَدْعُوكَ لَهُ", tr:"hattâ ajida ladhdhata mâ ad’ûka lahu", fr:"de sorte que je puisse comprendre le plaisir de ce que je Te supplie,"},
        {t:'tri', ar:"وَكَأُبَةَ مَا أَسْتَجِيرُ بِكَ مِنْهُ", tr:"wa ka’bata mâ astajiru bika minhu", fr:"et la tristesse de ce que je cherche refuge en Toi."},
        {t:'tri', ar:"اللَّهُمَّ قَدْ تَعْلَمُ مَا يُصْلِحُنِي", tr:"allâhumma qad ta ‘lamu mâ yuşlihuni", fr:"Ô Dieu! Tu sais très bien ce qui réparera mes affaires"},
        {t:'tri', ar:"مِنْ أَمْرِ دُنْيَايَ وَآخِرَتِي", tr:"min amri dunyâya wa âkhiratî", fr:"dans ce monde-ci et le monde d’après,"},
        {t:'tri', ar:"فَكُنْ بِحَوَائِجِي حَفِيّاً", tr:"fakun bihawa’iji hafiyyan", fr:"Sois donc toujours Grácieux envers mes besoins"},
        {t:'tri', ar:"اللَّهُمَّ صَلْ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ", tr:"allâhumma șalli ‘alâ muhammadin wa âli muhammadin", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَارْزُقْنِي الْحَقَّ عِنْدَ تَقْصِيرِي", tr:"warzuqni alhaqqa ‘inda taqșîri", fr:"Accorde-moi le fait de reconnaître ma négligence"},
        {t:'tri', ar:"فِي الشُّكْرِ لَكَ بِمَا أَنْعَمْتَ عَلَيَّ", tr:"fi achchukri laka bimâ an’amta ‘alayya", fr:"quand je ne Te remercie point suffisamment pour ce que Tu m’as favorisé"},
        {t:'tri', ar:"فِي الْيُسْرِ وَالْعُسْرِ", tr:"filyusri wal’usri", fr:"dans l’aise et la difficulté,"},
        {t:'tri', ar:"وَالصِّحَّةِ وَالسَّقَمِ", tr:"waşsihhati wassaqami", fr:"et dans la santé et la maladie,"},
        {t:'tri', ar:"حَتَّى أَتَعَرَّفَ مِنْ نَفْسِي رَوْحَ الرِّضَا", tr:"hattâ ata ‘arrafa min nafsi rawha arridâ", fr:"pour que j’y puisse trouver la satisfaction et la quiétude,"},
        {t:'tri', ar:"وَطُمَأْنِينَةَ النَّفْسِ مِنِّي", tr:"wa tuma’nînata annafsi minni", fr:"et la sérénité de l’âme"},
        {t:'tri', ar:"بِمَا يَجِبُ لَكَ فِيمَا يَحْدُثُ", tr:"bimâ yajibu laka fimâ yahduthu", fr:"dans ce qui est nécessaire pour mon comportement dans n’importe quels états que je puisse m’y trouver:"},
        {t:'tri', ar:"فِي حَالِ الْخَوْفِ وَالأَمْنِ", tr:"fi hâli alkhawfi wal-amni", fr:"à l’état de la terreur et la sécurité,"},
        {t:'tri', ar:"وَالرِّضَا وَالسُّخْطِ", tr:"warridâ wassukhți", fr:"au temps de la satisfaction"},
        {t:'tri', ar:"وَالضُّرِّ وَالنَّفْعِ", tr:"waddurri wannaf’i", fr:"et de la colère, et au temps de la perte et du gain;"},
        {t:'tri', ar:"اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَارْزُقْنِي سَلاَمَةَ الصَّدْرِ مِنَ الْحَسَدِ", tr:"warzuqni salâmata aşşadri min alhasadi", fr:"Accorde-moi un coeur pur de toute envie,"},
        {t:'tri', ar:"حَتَّى لاَ أَحْسُدَ أَحَداً مِنْ خَلْقِكَ", tr:"hattâ lâ ahsuda ahadan min khalqika", fr:"de sorte que je n’envie aucune de Tes créatures"},
        {t:'tri', ar:"عَلَى شَيءٍ مِنْ فَضْلِكَ", tr:"alâ chay’in min fadlika", fr:"pour aucune de Tes Grâces;"},
        {t:'tri', ar:"وَحَتَّى لاَ أَرَى نِعْمَةً مِنْ نِعَمِكَ", tr:"wa hattâ lâ arâ ni’ matan min ni’amika", fr:"Et que je ne voie aucune de Tes Faveurs"},
        {t:'tri', ar:"عَلَى أَحَدٍ مِنْ خَلْقِكَ", tr:"alâ ahadin min khalqika", fr:"envers aucune de Tes créatures"},
        {t:'tri', ar:"فِي دِينٍ أَوْ دُنْيَا", tr:"fi dînin aw dunya", fr:"que ce soit dans la voie morale ou dans la vie matérielle,"},
        {t:'tri', ar:"أَوْ عَافِيَةٍ أَوْ تَقْوَى", tr:"aw ‘âfiyatin aw taqwa", fr:"dans le bien-être ou la terreur révérentielle,"},
        {t:'tri', ar:"أَوْ سَعَةٍ أَوْ رَخَاءٍ", tr:"aw sa atin aw rakhâ’in", fr:"dans la plénitude ou le confort,"},
        {t:'tri', ar:"إِلاَّ رَجَوْتُ لِنَفْسِي أَفْضَلَ ذَلِكَ", tr:"illâ rajawtu linafsi afdala dhâlika", fr:"sauf qu’en tous ces cas, je puisse espérer le meilleur de Toi,"},
        {t:'tri', ar:"بِكَ وَمِنْكَ وَحْدَكَ لاَ شَرِيكَ لَكَ", tr:"ika wa minki wahdaka lâ charîki laka", fr:"et de Toi Seul, qui n’as aucun associé!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"O Dieu! Bénis Mohammad et toute sa Famille !"},
        {t:'tri', ar:"وَارْزُقْنِي التَّحَفُّظَ مِنَ الْخَطَايَا", tr:"warzuqni attahaffuza min alkhațâyâ", fr:"Accorde-moi l’abstinence de tout péché,"},
        {t:'tri', ar:"وَالإحْتِرَاسَ مِنَ الزَّلَلِ", tr:"walihtirâsa min azzalali", fr:"et le fait d’éviter les erreurs et les négligences,"},
        {t:'tri', ar:"فِي الدُّنْيَا وَالآخِرَةِ", tr:"fiddunya wal- âkhirati", fr:"dans ce monde-ci et le monde à venir,"},
        {t:'tri', ar:"فِي حَالِ الرِّضَا وَالْغَضَبِ", tr:"fi hâli arridâ walghadabi", fr:"à l’état de la satisfaction et de la colère,"},
        {t:'tri', ar:"حَتَّى أَكُونَ بِمَا يَرِدُ عَلَيَّ مِنْهُمَا بِمَنْزِلَةٍ سَوَاءٍ", tr:"hattâ akûna bimâ yaridu ‘alayya minhumâ bimanzilatin sawa’in", fr:"de sorte que je puisse rester indifférent envers tout ce qui m’arrive dans ces deux états;"},
        {t:'tri', ar:"عَامِلاً بطَاعَتِكَ", tr:"âmilan bițâ’ atika", fr:"Travailler avec acharnement en voie à Ton Obéissance,"},
        {t:'tri', ar:"مُؤْثِراً لِرِضَاكَ عَلَى مَا سِوَاهُمَا", tr:"mu’thiran liridâka ‘alâ mâ siwâhumâ", fr:"et préférer cela et Ton Bon Plaisir sur toutes les autres choses,"},
        {t:'tri', ar:"فِي الأَوْلِيَاءِ وَالأَعْدَاءِ", tr:"fil-awliyâ’i wal- a dâi", fr:"et pour mes amis et pour mes ennemis!"},
        {t:'tri', ar:"حَتَّى يَأْمَنَ عَدُوِّي مِنْ ظُلْمِي وَجَوْرِي", tr:"hattâ ya’mana aduwwi min zulmi wa jawri", fr:"Ainsi mon ennemi pourrait rester en sécurité de mes méfaits et de mes injustices,"},
        {t:'tri', ar:"وَيَيْأَسَ وَلِیِّي مِنْ مَيْلِي وَانْحِطَاطِ هَوَايَ", tr:"wa yay’asa waliyyi min mayli wa inhitâti hawâya", fr:"et mon ami pourrait se désespérer de mes inclinations et la tournure qu’a prise mon affection."},
        {t:'tri', ar:"وَاجْعَلْنِي مِمَّنْ يَدْعُوكَ مُخْلِصا فِي الرَّخَاءِ", tr:"waj’ alni mimman yad’ûka mukhlişan fi arrakhâ’i", fr:"Fais-moi un de ceux qui Te supplieront avec sincérité dans les temps d’aise,"},
        {t:'tri', ar:"دُعَاءَ الْمُخْلِصِينَ الْمُضْطَرِّينَ لَكَ فِي الدُّعَاءِ", tr:"du’ấ’a almukhlişina almudțarrina laka fi addu’â’i", fr:"avec la supplication de ceux qui Te supplient avec sincérité en cas de détresse"},
        {t:'tri', ar:"إِنَّكَ حَمِيدٌ مَجِيدٌ.", tr:"innaka hamîdun majidun", fr:"Car en vérité Tu es Louable et Glorieux."},
        {t:'salawat'},
      ]
    },
    's23': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "23. Pour le Bien-être",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour demander le bien-être et le remerciement (rendre grâce) pour celui-ci",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السّلامُ إذا سأل اللّٰه الْعافِية وشُكْرها", tr:"", fr:"La vingt troisième supplication: quand II demandait à Dieu pour le Bien-être et Le remerciait (rendait grâce)"},
        {t:'tri', ar:"اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille !"},
        {t:'tri', ar:"وَأَلْبِسْنِي عَافِيَتَكَ", tr:"wa albisni ‘ âfiyataka", fr:"Vêtis-moi de Ton Salut."},
        {t:'tri', ar:"وَجَلِّلْنِي عَافِيَتَكَ", tr:"wa jallilni ‘âfiyataka", fr:"Enveloppe-moi dans Ton Salut."},
        {t:'tri', ar:"وَحَصَّنِي بِعَافِيَتِكَ", tr:"wa haşşinni bi âfiyatika", fr:"Place-moi dans la forteresse de Ton Salut."},
        {t:'tri', ar:"وَأَكْرِمْنِي بِعَافِيَتِكَ", tr:"wa akrimni bi âfiyatika", fr:"Honore-moi de Ton Salut."},
        {t:'tri', ar:"وَأَغْنِنِي بِعَافِيَتِكَ", tr:"wa aghnini bi âfiyatika", fr:"Enrichis-moi par Ton Salut."},
        {t:'tri', ar:"وَتَصَدَّقْ عَلَيَّ بِعَافِيَتِكَ", tr:"wa taşaddaq ‘alayya bi’âfiyatika", fr:"Donne-moi en aumône Ton Salut."},
        {t:'tri', ar:"وَهَبْ لِي عَافِيَتَكَ", tr:"wa hab li ‘ âfiyataka", fr:"Offre-moi Ton Salut."},
        {t:'tri', ar:"وَأَفْرِشْنِي عَافِيَتَكَ", tr:"wa africhni ‘âfiyataka", fr:"étends sur ma personne Ton Salut."},
        {t:'tri', ar:"وَأَصْلِحْ لِي عَافِيَتَكَ", tr:"wa aşlih lî ‘âfiyataka", fr:"Prépare-moi pour recevoir Ton Salut."},
        {t:'tri', ar:"وَلاَ تُفَرِّقْ بَيْنِي وَبَيْنَ عَافِيَتِكَ", tr:"wa lâ tufarriq baynî wa bayna ‘âfiyatika", fr:"Et ne me sépare pas de Ton Salut,"},
        {t:'tri', ar:"فِي الدُّنْيَا وَالآخِرَةِ", tr:"fiddunyâ wal- âkhirati", fr:"ni dans ce monde-ci ni dans le monde à venir!"},
        {t:'tri', ar:"اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَعَافِنِي عَافِيَةً كَافِيَةً شَافِيَةً", tr:"wa ‘âfini ‘âfiyatan kâfiyatan châfiyatan", fr:"Accorde-moi le bienêtre avec un Salut guérisseur et sans dépendance,"},
        {t:'tri', ar:"عَالِيَةً نَامِيَةً", tr:"âliyatan nâmiyatan", fr:"et supérieur à toute maladie et toutes causes,"},
        {t:'tri', ar:"عَافِيَةً تُوَلِّدُ فِي بَدَنِي الْعَافِيَةَ", tr:"âfiyatan tuwallidu fi badani al’âfiyata", fr:"un Salut qui donnera naissance au bien-être de mon corps physique,"},
        {t:'tri', ar:"عَافِيَةَ الدُّنْيَا وَالآخِرَةِ", tr:"âfiyata addunyâ wal-âkhirata", fr:"un Salut dans ce monde-ce et dans le monde à venir"},
        {t:'tri', ar:"وَامْنُنْ عَلَيَّ بِالصِّحَّةِ وَالأَمْنِ", tr:"wamnun ‘alayya bişşihhati wal-amni", fr:"Rends-moi obligeant envers Toi, par la santé que Tu m’accordes,"},
        {t:'tri', ar:"وَالسَّلاَمَةِ فِي دِينِي وَبَدَنِي", tr:"wassalâmati fi dîni wa badani", fr:"pour la sécurité et la sauvegarde dans ma religion et dans mon corps,"},
        {t:'tri', ar:"وَالْبَصِيرَةِ فِي قَلْبِي", tr:"walbașirati fi qalbi", fr:"et la perspicacité dans mon cœur,"},
        {t:'tri', ar:"وَالنَّفَاذِ فِي أُمُورِي", tr:"wannafâdhi fi umûri", fr:"pour la pénétration dans mes affaires,"},
        {t:'tri', ar:"وَالْخَشْيَةِ لَكَ", tr:"walkhachyati laka", fr:"pour avoir la crainte de Toi,"},
        {t:'tri', ar:"وَالْخَوْفِ مِنْكَ", tr:"walkhawfi minka", fr:"pour sentir La terreur de Toi,"},
        {t:'tri', ar:"وَالقُوَّةِ عَلَى مَا أَمَرْتَنِي بِهِ مِنْ طَاعَتِكَ", tr:"walquwwati ‘alâ mâ amartani bihi min tâ’ atika", fr:"pour avoir la force dans Ton Obéissance que Tu m’as ordonné,"},
        {t:'tri', ar:"وَالإجْتِنَابِ لِمَا نَهَيْتَنِي عَنْهُ مِنْ مَعْصِيَتِكَ", tr:"walijtinâbi limâ nahaytani ‘anhû min ma’șiyatika", fr:"et par l’action d’éviter de Te désobéir et dont Tu me l’as interdite"},
        {t:'tri', ar:"اللَّهُمَّ وَامْنُنْ عَلَيَّ بِالْحَجِّ وَالْعُمْرَةِ", tr:"allâhumma wamnun ‘alayya bilhajji wal’ umrati", fr:"Ô Dieu! Rends-moi obligeant par le Hajj et l’Umra,"},
        {t:'tri', ar:"وَزِيَارَةِ قَبْرِ رَسُولِكَ", tr:"wa ziyârati qabri rasûlika", fr:"et par la visite (pèlerinage) du Saint Sépulcre de Ton Envoyé (Messager)"},
        {t:'tri', ar:"صَلَوَاتُكَ عَلَيْهِ", tr:"șalawâtuka ‘alayhi", fr:"Que Ta Bénédiction,"},
        {t:'tri', ar:"وَرَحْمَتُكَ وَبَرَ كَاتُكَ عَلَيْهِ", tr:"wa rahmatuka wa barakâtuka ‘alayhi", fr:"Miséricorde, et Grâce soient avec lui"},
        {t:'tri', ar:"وَعَلَى آلِ رَسُولِكَ", tr:"wa ‘alâ âli rasûlika", fr:"et Famille de Ton Envoyé!"},
        {t:'tri', ar:"عَلَيْهِمُ السَّلَاَمُ", tr:"alayhim assalâmu", fr:"(Que la Paix soit avec eux!)"},
        {t:'tri', ar:"أَبَداً مَا أَبْقَيْتَنِي", tr:"abadan mâ abqaytani", fr:"pour autant que Tu me fasses vivre,"},
        {t:'tri', ar:"فِي عَامِي هَذَا وَفِي كُلَّ عَامٍ", tr:"fi ‘âmi hâdhâ wa fi kulli ‘âmin", fr:"dans cette année et dans chaque année à venir,"},
        {t:'tri', ar:"وَاجْعَلْ ذَلِكَ مَقْبُولاً مَشْكُوراً", tr:"waj’ al dhâlika maqbûlan machkûran", fr:"et fais-en sorte que mes supplications soient acceptées,"},
        {t:'tri', ar:"مَذْكُوراً لَدَيْكَ", tr:"madhküran ladayka", fr:"remerciées et mentionnées devant Toi,"},
        {t:'tri', ar:"مَذْخُوراً عِنْدَكَ", tr:"madhkhûran ‘indaka", fr:"et réservées avec Toi!"},
        {t:'tri', ar:"وَأَنُطِقْ بِحَمْدِكَ وَشُكْرِكَ", tr:"wa anțiq bihamdika wachukrika", fr:"Fais parler ma langue pour Te louer, Te remercier,"},
        {t:'tri', ar:"وَذِكْرِكَ وَحُسْنِ الثَّنَاءِ عَلَيْكَ لِسَانِي", tr:"wadhikrika wa husni aththana’i ‘alayka lisânî", fr:"se souvenir de Toi, et pour faire Ton excellent éloge,"},
        {t:'tri', ar:"وَاشْرَحْ لِمَرَاشِدِ دِينِكَ قَلْبِي", tr:"wachrah limarâchidi dînika qalbi", fr:"et élargis mon coeur envers les justes buts de Ta Religion!"},
        {t:'tri', ar:"وَأَعِدْنِي وَذُرَّيَّتِي مِنَ الشَّيْطَانِ الرَّجِيمِ", tr:"wa a’idhnî wa dhurriyyati min achchaytâni arrajimi", fr:"Protège-moi et mes descendants du damné Satan,"},
        {t:'tri', ar:"وَمِنْ شَرِّ السَّامَّةِ وَالْهَامَّةِ", tr:"wa min charri assâmmati walhâmmati", fr:"et du mal des insectes venimeux et menaçants,"},
        {t:'tri', ar:"وَالْعَامَّةِ وَالْلامَّةِ", tr:"wal’âmmati wallâmmati", fr:"du mauvais œil"},
        {t:'tri', ar:"وَمِنْ شَرِّ كُلِّ شَيْطَانٍ مَرِيدٍ", tr:"wa min charri kulli chaytânin marîdin", fr:"du mal de tout satan rebelle"},
        {t:'tri', ar:"وَمِنْ شَرِّ كُلِّ سُلْطَانٍ عَنِيدٍ", tr:"wa min charri kulli sultânin ‘anîdin", fr:"Du mal de tout tyran réfractaire,"},
        {t:'tri', ar:"وَمِنْ شَرِّ كُلِّ مُتْرَفٍ حَفِيدٍ", tr:"wa min charri kulli mutrafin hafidin", fr:"du mal de tout enfant gâté et dilapidateur (prodigue),"},
        {t:'tri', ar:"وَمِنْ شَرٍّ كُلِّ ضَعِيفٍ وَشَدِيدٍ", tr:"wa min charri kulli da ‘îfin wa chadîdin", fr:"du mal de toute personne faible ou forte,"},
        {t:'tri', ar:"وَمِنْ شَرِّ كُلَّ شَرِيفٍ وَوَضِيعٍ", tr:"wa min charri kulli charifin wa wadi in", fr:"Du mal de toute personne de haute ou basse naissance,"},
        {t:'tri', ar:"وَمِنْ شَرٍّ كُلِّ صَغِيرٍ وَكَبِيرٍ", tr:"wa min charri kulli şaghîrin wa kabirin", fr:"du mal de toute personne grande ou petite,"},
        {t:'tri', ar:"وَمِنْ شَرِّ كُلِّ قَرِيبٍ وَبَعِيدٍ", tr:"wa min charri kulli qarîbin wa ba’îdin", fr:"du mal de toute personne de près ou de loin,"},
        {t:'tri', ar:"وَمِنْ شَرِّ كُلِّ مَنْ نَصَبَ", tr:"wa min charri kulli", fr:"du mal de toute"},
        {t:'tri', ar:"لِرَسُولِكَ وَلَأَهْلِ بَيْتِهِ حَرْبًا مِنَ الْجِنِّ وَالإِنْسِ", tr:"man naşaba lirasûlika wa li-ahli baytihi harban min aljinni wal-insi", fr:"créature Jinn ou Homme, qui déclare la guerre contre Ton envoyé et sa Famille,"},
        {t:'tri', ar:"وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنتَ آخِذٌ بنَاصِيَتِهَا", tr:"wa min charri kulli dâbbatin anta akhidhun binâşiyatihâ", fr:"et du mal de toute créature rampante, que Tu as prise sous Ta Domination,"},
        {t:'tri', ar:"إِنَّكَ عَلَى صِرَاطٍ مُسْتَقِيمِ", tr:"innaka ‘alâ șirâțin mustaqimin", fr:"car en vérité Tu es dans le droit chemin."},
        {t:'tri', ar:"اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَمَنْ أَرَادَنِي بِسُوءٍ فَاصْرِفْهُ عَنِي", tr:"wa man arâdani bisû’in faşrifhû ‘anni", fr:"Et si jamais quelqu’un me veut du mal, détourne-le de moi,"},
        {t:'tri', ar:"وَادْحَرْ عَنِّي مَكْرَهُ", tr:"wadhar ‘anni makrahu", fr:"éloigne sa déception de ma personne,"},
        {t:'tri', ar:"وَادْرَأْ عَنِّي شَرَّهُ", tr:"wadra’ ‘anni charrahu", fr:"Sauve-moi de son mal (méfait),"},
        {t:'tri', ar:"وَرُدَّ كَيْدَهُ فِي نَحْرِهِ", tr:"wa rudda kaydahû fi nahrihi", fr:"et renvoie son attentat à son propre gosier,"},
        {t:'tri', ar:"وَاجْعَلْ بَيْنَ يَدَيْهِ سَدّاً", tr:"waj’ al bayna yadayhi saddan", fr:"et place devant lui un barrage,"},
        {t:'tri', ar:"حَتَّى تُعْمِيَ عَنِي بَصَرَهُ", tr:"hattâ tu miya ‘annî başarahu", fr:"de sorte que Tu puisses aveugler ses yeux envers moi,"},
        {t:'tri', ar:"وَتُصِمَّ عَنْ ذِكْرِي سَمْعَهُ", tr:"wa tușimma ‘an dhikri sam’ahu", fr:"assourdir ses oreilles chaque fois qu’il y a mention de moi,"},
        {t:'tri', ar:"وَتُقْفِلَ دُونَ إِخْطَارِي قَلْبَهُ", tr:"wa tuqfila dûna ikhtârî qalbahu", fr:"fermer à clé son cœur, chaque fois qu’il voudrait se souvenir de moi,"},
        {t:'tri', ar:"وَتُخْرِسَ عَنِّي لِسَانَهُ", tr:"wa tukhrisa ‘anni lisânahu", fr:"réduire en silence sa langue contre moi,"},
        {t:'tri', ar:"وَتَقْمَعَ رَأْسَهُ", tr:"wa taqma’a ra’sahu", fr:"restreindre sa tête,"},
        {t:'tri', ar:"وَتُذِلّ عِزَّهُ", tr:"wa tudhilla ‘izzahu", fr:"abattre son exaltation,"},
        {t:'tri', ar:"وَتَكْسِرَ جَبَرُوتَه", tr:"wa taksira jabarûtahu", fr:"rompre son arrogance,"},
        {t:'tri', ar:"وَتُذِلَّ رَقَبَتَهُ", tr:"wa tudhilla ragabatahu", fr:"disloquer son orgueil,"},
        {t:'tri', ar:"وَتَفْسَخَ كِبْرَهُ", tr:"wa tafsakha kibrahu", fr:"briser son arrogance,"},
        {t:'tri', ar:"وَتُؤْمِنَنِي مِنْ جَمِيعِ ضَرِّهِ وَشَرِّهِ", tr:"wa tu’minani min jamî’i darrihî wa charrihi", fr:"et me procurer une sécurité contre toutes ses injures, ses méfaits,"},
        {t:'tri', ar:"وَغَمْزِهِ وَهَمْزِهِ وَلَمْزِهِ", tr:"wa ghamzihî wa hamzihî wa lamzihî", fr:"ses calomnies, sa mauvaises langue derrière mon dos, ses critiques tranchantes,"},
        {t:'tri', ar:"وَحَسَدِهِ وَعَدَاوَتِهِ", tr:"wa hasadihî wa ‘adâwatihi", fr:"son envie, son inimité,"},
        {t:'tri', ar:"وَحَبَائِلِهِ وَمَصَائِدِهِ", tr:"wa habâ’ilihî wa maşâ’idihî", fr:"son mépris, ses pièges,"},
        {t:'tri', ar:"وَرَجْلِهِ وَخَيْلِهِ", tr:"wa rajlihî wa khaylihi", fr:"ses soldats et sa cavalerie!"},
        {t:'tri', ar:"إِنَّكَ عَزِيزٌ قَدِيرٌ.", tr:"innaka ‘azizun qadirun", fr:"Car en vérité Tu es Puissant et Fort!"},
        {t:'salawat'},
      ]
    },
    's24': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "24. Pour ses Parents",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour ses parents (Que la Paix soit avec eux!)",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ لأبويْهِ عليْهِما السّلامُ", tr:"", fr:"La vingt quatrième supplication: pour ses parents (Que la Paix soit avec eux!)"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ", tr:"allâhumma șalli ‘alâ muhammadin", fr:"Dieu! Bénis Mohammad"},
        {t:'tri', ar:"عَبْدِكَ وَرَسُولِكَ", tr:"abdika wa rasûlika", fr:"qui est Ton Esclave et Ton Envoyé."},
        {t:'tri', ar:"وَأَهْلِ بَيْتِهِ الطَّاهِرِينَ", tr:"wa ahli baytihi attâhirîna", fr:"Bénis toute sa sainte maisonnée!"},
        {t:'tri', ar:"وَاخْصُصْهُمْ بِأَفْضَلِ صَلَوَاتِكَ", tr:"wakhşuşhum bi’afdali şalawâtika", fr:"Accorde-leur la prérogative de recevoir les meilleures de Tes Salutations,"},
        {t:'tri', ar:"وَرَحْمَتِكَ وَبَرَكَاتِكَ وَسَلاَمِكَ", tr:"wa rahmatika wa barakâtika wa salâmika", fr:"Ta Grâce, Tes Bénédictions et Ton Salut!"},
        {t:'tri', ar:"وَاخْصُصِ اللَّهُمَّ وَالِدَيَّ بِالْكَرَامَةِ لَدَيْكَ", tr:"wakhșuş allâhumma wâlidayya bilkarâmati ladayka", fr:"Ô Dieu! Honore mon père et ma mère, et accorde-leur Tes Bénédictions,"},
        {t:'tri', ar:"وَالصَّلاَةِ مِنْكَ يَا أَرْحَمَ الرَّاحِمِينَ", tr:"waşsalâti minka ya arhama arrâhimîna", fr:"et Tes Grâces. Ô Le plus Miséricordieux parmi les miséricordieux!"},
        {t:'tri', ar:"اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَلْهِمْنِي عِلْمَ مَا يَجِبُ لَهُمَا عَلَّي إِلْهَاماً", tr:"wa alhimnî ‘ilma mâ yajibu lahumâ ‘alayya ilhâman", fr:"Inspire-moi des prescriptions obligatoires vis à vis d’eux,"},
        {t:'tri', ar:"وَاجْمَعْ لِي عِلْمَ ذَلِكَ كُلَّهِ تَمَاماً", tr:"wajma’ li ‘ilma dhâlika kullihî tamâman", fr:"et de prêter attention à leur moindre désire avec éle,"},
        {t:'tri', ar:"ثُمَّ اسْتَعْمِلْنِي بِمَا تُلْهِمُنِي مِنْهُ", tr:"thumma ista milni bimâ tulhimuni minhu", fr:"que j’ai le devoir de connaître et d’accomplir;"},
        {t:'tri', ar:"وَوَفْقْنِي لِلنُّفُوذِ فِيمَا تُبَصِّرُنِي مِنْ عِلْمِهِ", tr:"wa waffiqni linnufüdhi fimâ tubaşsiruni min ‘ilmihi", fr:"que Ton desir soit accompli par voie d’inspiration à mon humble personne."},
        {t:'tri', ar:"حَتَّى لاَ يَفُوتَنِي اسْتِعْمَالُ شَيءٍ عَلْمْتَنِيهِ", tr:"hattâ lâ yafûtani isti mâlu chay’in ‘allamtanîhi", fr:"Fais-en sorte que je ne puisse oublier mes devoirs, de peur que je ne réussisse d’agir, en accordance avec les choses que Tu m’as démontrées,"},
        {t:'tri', ar:"وَلَاَ تَثْقُلَ أَرْكَانِي عَنِ الْحُفُوفِ فِيمَا أَلْهَمْتَنِيهِ", tr:"wa la tathqula arkânî ‘an alhufûfi fimâ alhamtanîhi", fr:"ne se plaignent jamais de mes actions, que Tu m’as ordonné par voie d’inspiration"},
        {t:'tri', ar:"اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ كَمَا شَرَّفْتَنَا بِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihî kamâ charraftanâ bihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille! Par le fait même que Tu nous as ennoblis à cause de lui et par lui,"},
        {t:'tri', ar:"وَصَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"wa șalli ‘alâ muhammadin wa âlihi", fr:"et Bénis Mohammad et toute sa Famille,"},
        {t:'tri', ar:"كَمَا أَوْجَبْتَ لَنَا الْحَقَّ عَلَى الْخَلْقِ بِسَبَبِهِ", tr:"kamâ awjabta lanâ alhaqqa ‘alâ alkhalqi bisababihi", fr:"Comme Tu nous as accordés le privilège envers les autres créatures à cause de son privilège d’être élu!"},
        {t:'tri', ar:"اللَّهُمَّ اجْعَلْنِي أَهَابُهُمَا هَيْبَةَ السُّلْطَانِ الْعَسُوفِ", tr:"allâhumma ij’ alni ahâbuhumâ haybata assultâni al’asûfi", fr:"Ô Dieu! Fais-en sorte que J’aie la crainte d’eux, comme je craindrais un roi tyran."},
        {t:'tri', ar:"وَأَبَرُّهُمَا بِرَّ الأُمِّ الرَّءُوفِ", tr:"wa abarruhumâ birra al-ummi arra’ûfi", fr:"Fais-en sorte que je puisse rendre leur bonté et amour, autant qu’une mère affectueuse!"},
        {t:'tri', ar:"وَاجْعَلْ طَاعَتِي لِوَالِدَيَّ وَبِرِّي بِهِمَا", tr:"waj’al tâ’ ati liwâlidayya wa birri bihimâ", fr:"Fais-en sorte que je puisse obéir à leur moindre désir,"},
        {t:'tri', ar:"أَقَرَّ لِعَيْنِي مِنْ رَقْدَةِ الْوَسْنَانِ", tr:"aqarra li ayni min raqdati alwasnâni", fr:"autant que le bienveillant, en temps de fatigue, obéit au sommeil,"},
        {t:'tri', ar:"وَأَثْلَجَ لِصَدْرِي مِنْ شَرْبَةِ الظَّمْآنِ", tr:"wa athlaja lișadri min charbati azzam’âni", fr:"et autant que mon gosier a besoin d’une boisson rafraîchissante;"},
        {t:'tri', ar:"حتَّى أُوثِرَ عَلَى هَوَايَ هَوَاهُمَا", tr:"httâ u’thira ‘alâ hawâya hawâhumâ", fr:"Fais-en sorte que je puisse exaucer leur moindre volonté, par dessus tous mes désirs!"},
        {t:'tri', ar:"وَأُقَدِّمَ عَلَى رِضَايَ رِضَاهُمَا", tr:"va uqaddima al", fr:"et que je donne la priorité à obtenir leur satisfaction, avant et plus que mes propres joies et satisfactions"},
        {t:'tri', ar:"وَأَسْتَكْثِرَ بِرَّهُمَا بِي وَإِنْ قَلَّ", tr:"wa astakthira birrahumâ bî wa in qalla", fr:"Fais-en sorte que leur moindre bienfaisance me paraisse grandiose,"},
        {t:'tri', ar:"وَأَسْتَقِلَّ بِرِّي بِهِمَا وَإِنْ كَثُرَ", tr:"wa astaqilla birri bihimâ wa in kathura", fr:"et ma bienveillance envers eux, -même grandiose – me paraisse minimale."},
        {t:'tri', ar:"اللَّهُمَّ خَفِّضْ لَهُمَا صَوْتِي", tr:"illâhumma khaffic ahuma sawt", fr:"Ô Dieu! Abaisse ma voix et adoucis ma langue devant eux,"},
        {t:'tri', ar:"وَأَطِبْ لَهُمَا كَلَامِي", tr:"wa ațib lahumâ kalâmî", fr:"Fais-en sorte que mes paroles leur"},
        {t:'tri', ar:"وَأَلِنْ لَهُمَا عَرِيكَتِي", tr:"wa alin lahumâ ‘arîkati", fr:"soient douces et suaves,"},
        {t:'tri', ar:"وَأَعْطِفْ عَلَيْهِمَا قَلْبِي", tr:"wa a’tif alayhima aalbi", fr:"et ramollis mon tempérament et mon coeur envers eux."},
        {t:'tri', ar:"وَصَيِّرْنِي بِهِمَا رَفِيقاً", tr:"wa șayyirni bihima rafiqan", fr:"Fais-en sorte que je sois très tendre,"},
        {t:'tri', ar:"وَعَلَيْهِمَا شَفِيقاً", tr:"wa ‘alayhima chafiqan", fr:"affectueux et compatissant envers eux!"},
        {t:'tri', ar:"اللَّهُمَّ اشْكُرْ لَهُمَا تَرْبِيَتِي", tr:"allâhumma uchkur lahumâ tarbiyati", fr:"Ô Dieu! Récompense-les pour m’avoir élevé,"},
        {t:'tri', ar:"وَأَثِبْهُمَا عَلَى تَكْرِمَتِي", tr:"wa athibhumâ ‘alâ takrimati", fr:"et récompense-les pour les bontés qu’ils m’ont fait"},
        {t:'tri', ar:"وَاحْفَظْ لَهُمَا مَا حَفِظَاهُ مِنِّي فِي صِغَرِي", tr:"wahfaz lahumâ mâ hafizâhu minni fi şighari", fr:"Ô Dieu! Pour leur surveillance attentionnée pour ma personne dans mon enfance,"},
        {t:'tri', ar:"اللَّهُمَّ وَمَا مَسَّهُمَا مِنِّي مِنْ أَذًى", tr:"allâhumma wa mâ massahumâ minni min adhan", fr:"Ô Dieu! Autant qu’ils ont souffert dans mon enfance pour moi,"},
        {t:'tri', ar:"أَوْ خَلَصَ إِلَيْهِمَا عَنِّي مِنْ مَكْرُوهٍ", tr:"aw khalaşa ilayhimâ ‘annî min makrûhin", fr:"ou bien reçu des choses détestables de moi,"},
        {t:'tri', ar:"أَوْ ضَاعَ قِبَلِي لَهُمَا مِنْ حَقٍّ", tr:"aw dâ’ a qibali lahuma min haqqin", fr:"ou bien que leurs droits aient été négligés par moi,"},
        {t:'tri', ar:"فَاجْعَلْهُ حِطَّةً لِذُنُوبِهِمَا", tr:"faj’alhu hittatan lidhunûbihimâ", fr:"augmente leurs qualités vernisseuses"},
        {t:'tri', ar:"وَعُلُوّاً فِي دَرَجَاتِهِمَا", tr:"wa ‘uluwwan fi darajâtihimâ", fr:"et leurs bonnes actions,"},
        {t:'tri', ar:"وَزِيَادَةً فِي حَسَنَاتِهِمَا", tr:"wa ziyâdatan fi hasanâtihimâ", fr:"et leurs bonnes actions,"},
        {t:'tri', ar:"يَا مُبَدِّلَ السَّيِّئَاتِ بِأَضْعَافِهَا مِنَ الْحَسنَاتِ", tr:"ya mubaddila assayyi’âti bi- ad âfihâ min alhasnâti (", fr:"Ô Celui par qui les mauvaises actions se transforment en de nombreux bienfaits."},
        {t:'tri', ar:"اَللَّهُمَّ وَمَا تَعَدَّيَا عَلَيَّ فِيهِ مِنْ قَوْلٍ", tr:"allâhumma wa mâ ta ‘addayâ ‘alayya fihî min qawlin", fr:"Ô Dieu! Même s’ils ont dépassé en quoique ce soit leur devoir,"},
        {t:'tri', ar:"أَوْ أَسْرَفَا عَلَيَّ فِيهِ مِنْ فِعْلٍ", tr:"aw asrafâ ‘alayya fihi min filin", fr:"ou bien ont abusé dans leurs dettes et leurs bienfaits,"},
        {t:'tri', ar:"أَوْ ضَيَّعَاهُ لِي مِنْ حَقٍّ", tr:"aw dayya â lî min haqqin", fr:"ou bien ont négligé mes droits,"},
        {t:'tri', ar:"أَوْ قَصَّرَا بِي عَنْهُ مِنْ وَاجِبٍ", tr:"aw qaşșara bi ‘anhû min wâjibin", fr:"en actions ou en pensées, ou bien qu’ils aient négligé un demies droits,"},
        {t:'tri', ar:"فَقَدْ وَهَبْتُهُ لَهُمَا", tr:"faqad wahabtuhû lahumâ", fr:"ou manqué une obligation envers moi,"},
        {t:'tri', ar:"وَجُدْتُ بِهِ عَلَيْهِمَا", tr:"wa judtu bihî ‘alayhima", fr:"je les leur accorde"},
        {t:'tri', ar:"وَرَغِبْتُ إِلَيْكَ فِي وَضْعِ تَبِعَتِهِ عَنْهُمَا", tr:"wa raghibtu ilayka fi wad’i tabi’ atihî ‘anhumâ", fr:"et Je leur rends mon dû, et je Te supplie de les excuser et d’enlever leur punition"},
        {t:'tri', ar:"فَإِنِّي لاَ أَتَّهِمُهُمَا عَلَى نَفْسِي", tr:"fa inni lâ attahimuhumâ ‘alâ nafsî", fr:"Disculpe mes parents de toute faute qu’ils auraient pu commettre attahimuhumâ ‘alâ contre moi Je les excuse"},
        {t:'tri', ar:"وَلَاَ أَسْتَبْطِئُهُمَا فِي بِرِّي", tr:"wa lâ astabțl’uhumâ fi birri", fr:"et Je Te supplie de les acquitter,"},
        {t:'tri', ar:"وَلَا أَكْرَهُ مَا تَوَلَّيَاهُ مِنْ أَمْرِي يَا رَبٍّ", tr:"wa lâ akrahû mâ tawallayâhû min amri yâ rabbi", fr:"je ne revendique rien, Ô Dieu"},
        {t:'tri', ar:"فَهُمَا أَوْجَبُ حَقّاً عَلَيَّ", tr:"fahumâ awjabu haqqan ‘alayya", fr:"Ma dette envers eux, est bien plus importante que la dette qu’ils ont envers moi !"},
        {t:'tri', ar:"وَأَقْدَمُ إِحْسَانا إِلَيَّ", tr:"wa aqdamu ihsânan ilayya", fr:"et leur gentillesse et leur bonté envers moi,"},
        {t:'tri', ar:"وَأَعْظَمُ مِنَّةً لَدَيَّ", tr:"wa a zamu minnatan ladayya", fr:"sont bien plus grandes"},
        {t:'tri', ar:"مِنْ أَنْ أُقَاصَّهُمَا بِعَدْلِ", tr:"min an uqâşșahumâ bi adlin", fr:"de sorte que je ne pourrais jamais les repayer avec justesse"},
        {t:'tri', ar:"أَوْ أُجَازِيَهُمَا عَلَى مِثْلٍ", tr:"aw ujâziyahumâ alâ mithlin", fr:"ou bien égaliser quoique ce soit"},
        {t:'tri', ar:"أيْنَ إِذًا يَا إِلَهِي طُولُ شُغْلِهِمَا بِتَربِيَتِي؟", tr:"ayna idhan ya ilâhî tûlu chughlihimâ bitarbiyati", fr:"Ô Dieu! Où irait leur longue occupation à m’élever ?"},
        {t:'tri', ar:"وَأَيْنَ شِدَّةُ تَعَبِهِمَا فِي حِرَاسَتِي؟", tr:"wa ayna chiddatu ta’abihimâ fi hirâsati", fr:"et leurs nombreuses activités pour mon confort"},
        {t:'tri', ar:"وَأَيْنَ إِقْتَارُهُمَا عَلَى أَنْفُسِهِمَا لِلتَّوْسِعَةِ عَلَيَّ؟", tr:"wa ayna iqtâruhumâ ‘alâ anfusihimâ littawsi ati ‘alayya", fr:"Où iraient les épreuves et les souffrances qu’ils récoltèrent pour prendre soin de moi?"},
        {t:'tri', ar:"هَيْهَاتَ مَا يَسْتَوْفِيَانِ مِنِى حَقَّهُمَا", tr:"hayhâta mâ yastawfiyâni minni haqqahumâ", fr:"En vérité quelle étrange idée! Les dettes que je leur dois, Je n’aurai jamais ni le pouvoir,"},
        {t:'tri', ar:"وَلَا أُدْرِكُ مَا يَجِبُ عَلَيَّ لَهُمَا", tr:"wa lâ udriku mâ yajibu ‘alayya lahumâ", fr:"ni les commodités obligatoires pour les repayer de leurs bontés,"},
        {t:'tri', ar:"وَلَاَ أَنَا بِقَاضٍ وَظِيفَةَ خِدْمَتِهِمَا", tr:"wa lâ ana biqâdin wazifata khidmatihimâ", fr:"ou d’exécuter mon devoir de les servir convenablement!"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis donc Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَعِنِّي يَا خَيْرَ مَنِ اسْتُعِينَ بِهِ", tr:"wa a inni yâ khayra man istu ‘îna bihi", fr:"Aide-moi Ô Toi! Le plus Secourable de tous les secourables"},
        {t:'tri', ar:"وَوَفِّقْنِي يَا أَهْدَى مَنْ رُغِبَ إِلَیْهِ", tr:"wa waffiqni ya ahdâ man rughiba ilayhi", fr:"Rends-moi victorieux, Ô Toi! Accorde-moi la réussite Ô Le plus Direct et Droit Chemin,"},
        {t:'tri', ar:"وَلَاَ تَجْعَلْنِي فِي أَهْلِ الْعُقُوقِ لِلآبَاءِ وَالأُمَّهَاتِ", tr:"wa lâ taj’ alnî fi ahli al’uqûqi lil- âbâ’i wal- ummahâti", fr:"fais-en sorte que je ne sois pas parmi ceux qui ont montré de l’irrespect envers leurs parents!"},
        {t:'tri', ar:"(يَوْمَ تُجْزَى كُلُّ نَفْسٍ بِمَا كَسَبَتْ", tr:"yawma tujzâ kullu nafsin bimâ kasabat", fr:"le jour ou chaque personne,"},
        {t:'tri', ar:"وَهُمْ لاَ يُظْلَمُونَ)", tr:"wahum lâ yuzlamûna", fr:"recevra sa juste punition ou sa récompense,"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ وَذُرِّيَّتِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi wa dhurriyyatihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille! et tolite sa progéniture"},
        {t:'tri', ar:"وَاخْصُصْ أَبَوَيَّ بِأَفْضَلِ مَا خَصَصْتَ بِهِ آبَاءَ عِبَادِكَ الْمُؤْمِنِينَ وَأُمَّهَاتِهِمْ", tr:"wakhşuş abawayya bi-afdali mâ khaşaşta bihî âbâ’a ‘ibâdika almu’minina wa ummahâtihim", fr:"Ô Dieu! Inclue mon père et ma mère dans les rangs des parents élus, parmi Tes meilleurs et fidèles serviteurs,"},
        {t:'tri', ar:"يَا أَرْحَمَ الرَّاحِمِينَ", tr:"ya arhama arrâhimina", fr:"Ô Le pus Miséricordieux parmi les miséricordieux"},
        {t:'tri', ar:"اللَّهُمَّ لا تُنْسِنِي ذِكْرَهُمَا", tr:"allâhumma lâ tunsini dhikrahumâ", fr:"Ô Dieu! Aide-moi à ne pas les oublier"},
        {t:'tri', ar:"فِي أَدْبَارِ صَلَوَاتِي", tr:"fi adbâri șalawâti", fr:"Fais-en sorte qu’après chaque prière"},
        {t:'tri', ar:"وَفِي إِنًى مِنْ آنَاءِ لَيْلِي", tr:"wa fi inan min ânấ’i layli", fr:"et chaque méditation, où que je sois,"},
        {t:'tri', ar:"وَفِي كُلِّ سَاعَةٍ مِنْ سَاعَاتِ نَهَارِي", tr:"wa fi kulli sâ atin min sâ ‘âti nahâri", fr:"je puisse évoquer leur souvenir,"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et sa Famille!"},
        {t:'tri', ar:"وَاغْفِرْ لِي بِدُعَائِي لَهُمَا", tr:"waghfir lî bidu â’î lahumâ", fr:"pardonne-moi mes péchés, par le fait même d’avoir ardemment supplié pour mes parents,"},
        {t:'tri', ar:"وَاغْفِرْ لَهُمَا بِبِرِّهِمَا بِي مَغْفِرَةً حَتْماً", tr:"waghfir lahuma bibirrihimâ bi maghfiratan hatman", fr:"et bénis-les et pardonne-les leurs péchés pour leur bienveillance"},
        {t:'tri', ar:"وَارْضَ عَنْهُمَا بِشَفَاعَتِي لَهُمَا رِضًى عَزْماً", tr:"warda ‘anhumâ bichafâ’atî lahumâ ridan ‘azman", fr:"et leur dévotion envers moi à tout moment, avec un Pardon absolu et irrévocable"},
        {t:'tri', ar:"وَبَلِّغْهُمَا بِالْكَرَامَةِ مَوَاطِنَ السَّلاَمَةِ", tr:"wa ballighhumâ bilkarâmati mawâțina assalâmati", fr:"Ô Dieu! Si Ton Salut et Ton Absolution leur arrivent les premiers,"},
        {t:'tri', ar:"اللَّهُمَّ وَإِنْ سَبَقَتْ مَغْفِرَتُكَ لَهُمَا فَشَفِّعْهُمَا فِيَّ", tr:"allâhumma wa in sabaqat maghfiratuka lahumâ fachaffi ‘humâ fiyya", fr:"Fais-en sorte qu’ils soient mes intercesseurs,"},
        {t:'tri', ar:"وَإِنْ سَبَقَتْ مَغْفِرَتُكَ لِي فَشَفِّعْنِي فِيهِمَا", tr:"wa in sabaqat maghfiratuka li fachaffi ‘nî fihimâ", fr:"et si Ton Absolution atteignent le premier, désigne-moi comme leur intercesseur,"},
        {t:'tri', ar:"حَتَّى نَجْتَمِعَ بِرَأْفَتِكَ فِي دَارِ كَرَامَتِكَ", tr:"hattâ najtami a bira’fatika fi dâri karâmatika", fr:"de sorte que mes parents et moi, puissions entrer et nous réunir dans Ton grandiose, dans la maison de Ta Générosité,"},
        {t:'tri', ar:"وَمَحَلِّ مَغْفِرَتِكَ وَرَحْمَتِكَ", tr:"wa mahalli maghfiratika wa rahmatika", fr:"dans le lieu de Ton Pardon et de Ta Miséricorde !"},
        {t:'tri', ar:"إِنَّكَ ذُو الْفَضْلِ الْعَظِيمِ", tr:"innaka dhû alfadli al’azîmi", fr:"En vérité, Tu es le Tout Puissant,"},
        {t:'tri', ar:"وَالْمَنِّ الْقَدِيمِ", tr:"walmanni alqadimi", fr:"L’Omniscient,"},
        {t:'tri', ar:"وَأَنْتَ أَرْحَمُ الرَّاحِمِينَ.", tr:"wa anta arhamu arrâhimîna", fr:"et le plus Miséricordieux!"},
        {t:'salawat'},
      ]
    },
    's25': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "25. Pour ses Enfants",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour ses enfants (Que la Paix soit avec eux!)",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ لِوُلْدِهِ عَلَيْهِمُ السَّلامُ", tr:"", fr:"La vingt cinquième supplication: pour les enfants"},
        {t:'tri', ar:"اَللَّهُمَّ ومُنَّ عَلَيَّ بِبَقَاءِ وُلْدِي", tr:"allâhumma wamunna ‘alayya bibaqâ’i wuldi", fr:"Ô Dieu! De par la survivance de mes enfants,"},
        {t:'tri', ar:"وَبِإِصْلَاَحِهِمْ لِي", tr:"wa bi-işlâhihim lî", fr:"et leur bonne conduite envers moi,"},
        {t:'tri', ar:"وَبِإِمْتَاعِي بِهِمْ", tr:"wa bi-imtâ’î bihim", fr:"et laisse-moi prendre plaisir d’eux!"},
        {t:'tri', ar:"إِلَهِي امْدُدْ لِي فِي أَعْمَارِهِمْ", tr:"ilâhi umdud lî fi a’mârihim", fr:"Ô Dieu! Prolonge leur vie,"},
        {t:'tri', ar:"وَزِدْ لِي فِي آجَالِهِمْ", tr:"wa zid lî fi âjâlihim", fr:"Augmente la durée de leur vie,"},
        {t:'tri', ar:"وَرَبِّ لِي صَغِيرَهُمْ", tr:"wa rabbi lî şaghîrahum", fr:"élève le benjamin pour moi,"},
        {t:'tri', ar:"وَقَوِّ لِي ضَعِيفَهُمْ", tr:"wa qawwi li da ‘îfahum", fr:"fortifie le faible pour moi,"},
        {t:'tri', ar:"وَأَصِحَّ لِي أَبْدَانَهُمْ", tr:"wa aşihha lî abdânahum", fr:"préserve leur santé spirituelle et dédication corporelle"},
        {t:'tri', ar:"وَأَدْيَانَهُمْ وَأَخْلَاقَهُمْ", tr:"wa adyânahum wa akhlâqahum", fr:"et leur religieuse, et leurs caractéristiques morales,"},
        {t:'tri', ar:"وَعَافِهِمْ فِي أَنْفُسِهِمْ", tr:"wa ‘âfihim fi anfusihim", fr:"sauvegarde leur âme,"},
        {t:'tri', ar:"وَفِي جَوَارِحِهِمْ", tr:"wa fi jawârihihim", fr:"leur corps,"},
        {t:'tri', ar:"وَفِي كُلِّ مَا عُنِيتُ بِهِ مِنْ أَمْرِهِمْ", tr:"wa fi kulli mâ ‘unîtu bihî min amrihim", fr:"et tout ce qui me concerne à leur sujet,"},
        {t:'tri', ar:"وَأَدْرِرْ لِي وَعَلَى يَدَيَّ أَرْزَاقَهُمْ", tr:"wa adrir li wa ‘alâ yadayya arzâqahum", fr:"et verse sor moi et dans ma main leurs provisions!"},
        {t:'tri', ar:"وَاجْعَلْهُمْ أَبْرَاراً أَتْقِيَاءَ بُصَرَاءَ", tr:"waj’ alhum abrâran atqiyâ’a buşarâ’a", fr:"Transforme-les en des gens bienfaiteurs, pieux et perspicaces,"},
        {t:'tri', ar:"سَامِعِينَ مُطِيعِينَ لَكَ", tr:"sâmi’îna muți ‘îna laka", fr:"écoutant l’appel de la vérité, accueillants les conseils, obéissants envers To1,"},
        {t:'tri', ar:"وَلَأَوْلِيَائِكَ مُحِبِّينَ مُنَاصِحِينَ", tr:"wa li-awliyâ’ika muhibbîna munâşihîna", fr:"pleins de bonté et d’affection, et bien disposés envers Tes amis,"},
        {t:'tri', ar:"وَلِجَمِيعِ أَعْدَائِكَ مُعَانِدِينَ وَمُبْغِضِينَ", tr:"wa lijamî i a dâ’ika mu’ânidina wa mubghidina", fr:"et résistants avec entêtement et pleins de haine contre tous Tes ennemis jurés!"},
        {t:'tri', ar:"آمِينَ", tr:"âmîna", fr:"Amen!"},
        {t:'tri', ar:"اللَّهُمَّ اشْدُدْ بِهِمْ عَضُدِي", tr:"allâhumma uchdud bihim ‘adudi", fr:"Ô Dieu! Par eux, renforce mon bras,"},
        {t:'tri', ar:"وَأَقِمْ بِهِمْ أَوَدِي", tr:"wa agim bihim awadi", fr:"et réctifie mes inclinations,"},
        {t:'tri', ar:"وَكَثَّرْ بِهِمْ عَدَدِي", tr:"wa kaththir bihim ‘adadi", fr:"augmente mon nombre,"},
        {t:'tri', ar:"وَزَيِّنْ بِهِمْ مَحْضَرِي", tr:"wa zayyin bihim mahdari", fr:"orne (décore) ma maison de leur présence,"},
        {t:'tri', ar:"وَأَحْيِ بِهِمْ ذِكْرِي", tr:"wa ahyi bihim dhikri", fr:"Ravive et fais subsister mon nom par eux,"},
        {t:'tri', ar:"وَاكَفِنِي بِهِمْ فِي غَيْبَتِي", tr:"wakfini bihim fi ghaybati", fr:"et dans mon absence,"},
        {t:'tri', ar:"وَأَعِنِّي بِهِمْ عَلَى حَاجَتِي", tr:"wa a’innî bihim ‘alâ hâjati", fr:"fais-en sorte que mes affaires soit complètes par leurs aides,"},
        {t:'tri', ar:"وَاجْعَلْهُمْ لِي مُحِبِّينَ", tr:"waj alhum li muhibbîna", fr:"Aide-moi dans mes besoins, et rends-les affectueux vis-à-vis de moi,"},
        {t:'tri', ar:"وَعَلَيَّ حَدِبِينَ مُقْبِلِينَ", tr:"wa ‘alayya hadibina muqbilina", fr:"pleins de gentillesse et de bonne humeur,"},
        {t:'tri', ar:"مُسْتَقِيمِينَ لِي مُطِيعِينَ", tr:"mustagimina lî muti îna", fr:"attentionnés et obéissants,"},
        {t:'tri', ar:"غَيْرَ عَاصِينَ وَلاَ عَاقِّينَ", tr:"ghayra ‘âșîna wa lâ ‘âqqina", fr:"et ne les transforme jamais en des personnes désobéissantes, s’opposant contre mes volontés,"},
        {t:'tri', ar:"وَلَاَ مُخَالِفِينَ وَلَا خَاطِئِينَ", tr:"wa lâ mukhâlifîna wa lâ khâtI’îna", fr:"ou bien ét offensantes et fautives!"},
        {t:'tri', ar:"وَأَعِنِّي عَلَى تَرْبِيَتِهِمْ", tr:"wa a’inni ‘alâ tarbiyatihim", fr:"Aide-moi dans la dure responsabilité de les élever, dans leur éducation,"},
        {t:'tri', ar:"وَتَأْدِيبِهِمْ وَبِرِّهِمْ", tr:"wa ta’dîbihim wa birrihim", fr:"et dans la dévotion que j’éprouve pour eux,"},
        {t:'tri', ar:"رَهَبْ لِي مِنْ لَدُنْكَ مَعَهُمْ أَوْلَاَداً ذُكُوراً", tr:"wa hab li min ladunka ma ahum awlâdan dhukûran", fr:"Accorde-moi parmi eux, des enfants mâles,"},
        {t:'tri', ar:"وَاجْعَلْ ذَلِكَ خَيْراً لِي", tr:"waj’al dhâlika khayran li", fr:"et désigne-moi un bien dans tout cela,"},
        {t:'tri', ar:"وَاجْعَلْهُمْ لِي عَوْنًا عَلَى مَا سَأَلْتُكَ", tr:"waj’ alhum lî ‘awnan ‘alâ mâ sa’altuka", fr:"Fais-en sorte qu’ils m’aident dans tout ce que je Te demande!"},
        {t:'tri', ar:"وَأَعِذْنِي وَذُرِّيَّتِي مِنَ الشَّيْطَانِ الرَّجِيمِ", tr:"wa a’idhni wadhurriyyati min achchaytâni arrajîmi", fr:"Accorde à ma progéniture et à moi refuge, du damné Satan."},
        {t:'tri', ar:"فَإِنَكَ خَلَقْتَنَا وَأَمَرْتَنَا وَنَهَيْتَنَا", tr:"fa innaka khalaqtana wa amartanâ wa nahaytanâ", fr:"car c’est Toi qui nous as crées, ordonnés, interdits,"},
        {t:'tri', ar:"وَرَغَّبْتَنَا فِي ثَوَابِ مَا أَمَرْتَنَا", tr:"wa raghghabtana fi thawâbi mâ amartanâ", fr:"et incités à désirer la récompense de ce que Tu as ordonné"},
        {t:'tri', ar:"وَرَهَّبْتَنَا عِقَابَهُ", tr:"wa rahhabtanâ ‘iqâbahu", fr:"et effrayés de la punition de la négligence!"},
        {t:'tri', ar:"وَجَعَلْتَ لَنَا عَدُوّاً يَكِيدُنَا", tr:"wa ja’alta lanâ ‘aduwwan yakiduna", fr:"C’est Toi qui nous as désignés un ennemi qui complote contre nous,"},
        {t:'tri', ar:"سَلَّطْتَهُ مِنَّا عَلَى مَا لَمْ تُسَلِّطْنَا عَلَيْهِ مِنْهُ", tr:"sallațtahû minnâ ‘alâ mâ lam tusallițnâ ‘alayhi minhu", fr:"et lui as donné de l’autorité sur nous tel que Tu ne nous en as jamais donné sur lui!"},
        {t:'tri', ar:"أَسْكَنْتَهُ صُدُورَنَا", tr:"askantahû şudûranâ", fr:"C’est Toi qui lui as permis de séjourner dans nos coeurs."},
        {t:'tri', ar:"وَأجْرَيْتَهُ مَجَارِيَ دِمَائِنَا", tr:"wa ajraytahû majâriya dimâ’inâ", fr:"et de courir dans nos vaisseaux sanguins;"},
        {t:'tri', ar:"لاَ يَغْفُلُ إِنْ غَفَلْنَا", tr:"la yaghfulu in ghafalnâ", fr:"Il n’est jamais inattentionné même quand nous sommes ainsi,"},
        {t:'tri', ar:"وَلَا يَنْسَى إِنْ نَسِينَا", tr:"wa lâ yansâ in nasînâ", fr:"Il n’oublie jamais rien, même quand nous sommes ainsi;"},
        {t:'tri', ar:"يُؤْمِّنُنَا عِقَابَكَ", tr:"yu’amminunâ ‘iqâbaka", fr:"Il produit un sentiment de sécurité en nous de Ta Punition"},
        {t:'tri', ar:"وَيُخَوِّفُنَا بِغَيْرِكَ", tr:"wa yukhawwifunâ bighayrika", fr:"et remplit nos âmes de peur envers d’autres au Toi."},
        {t:'tri', ar:"إنْ هَمَمْنَا بفَاحِشَةٍ شَجَّعَنَا عَلَيْهَا", tr:"in hamamnâ bifâhichatin chajja’anâ ‘alayhâ", fr:"Si nous sommes sur le point de commettre une action indécente, il nous donne du courage pour l’accomplir,"},
        {t:'tri', ar:"وَإِنْ هَمَمْنَا بِعَمَلٍ صَالِحٍ ثَبَّطَنَا عَنْهُ", tr:"wa in hamamnâ bi’amalin şâlihin thabbațanâ ‘anhu", fr:"et si nous sommes sur le point de commettre une action bienfaisante, il nous en empêche."},
        {t:'tri', ar:"يَتَعَرَّضُ لَنَا بِالشَّهَوَاتِ", tr:"yata’arradu lanâ bichchahawâti", fr:"Il se montre à nous en guise de passions et de tentations pécheresses,"},
        {t:'tri', ar:"وَيَنْصِبُ لَنَا بِالشُّبُهَاتِ", tr:"wa yanşibu lanâ bichchubuhâti", fr:"et produit des doutes dans nos esprits"},
        {t:'tri', ar:"إِنْ وَعَدَنَا كَذَبَنَا", tr:"in wa’adanâ kadhabanâ", fr:"S’il lui arrive de nous promettre quoique ce soit, c’est qu’il est en train de mentir."},
        {t:'tri', ar:"وَإِنْ مَنَّانَا أَخْلَفَنَا", tr:"wa in mannânâ akhlafanâ", fr:"et s’il augmente le degré de nos espoirs, il manque à sa parole"},
        {t:'tri', ar:"وَإِلاّ تَصْرِف عَنَّا كَيْدَهُ يُضِلَّنَا", tr:"wa illâ taşrif ‘annâ kaydahû yudillanâ", fr:"Si Tu ne détournes pas ses tromperies de nous, il nous fera sortir du droit chemin et nous déroutera,"},
        {t:'tri', ar:"وَإِلاَّ تَقِنَا خَبَالَهُ يَسْتَزِلَّنَا", tr:"wa illâ taqinâ khabâlahû yastazillana", fr:"et si Tu ne nous protèges pas de sa corruption, il nous fera tomber dans l’erreur !"},
        {t:'tri', ar:"اللَّهُمَّ فَاقْهَرْ سُلْطَانَهُ عَنَّا بسُلْطَانِكَ", tr:"allâhumma faghar sultânahû ‘annâ bisulțânika", fr:"Ô Dieu! Ainsi, défais son autorité sur nous, de par Ton Autorité, de sorte que Tu puisses le détenir de s’approcher de nous,"},
        {t:'tri', ar:"حَتَّى تَحْبِسَهُ عَنَّا بِكَثْرَةِ الدُّعَاءِ لَكَ", tr:"hattâ tahbisahû • annâ bikathrati addu â’i laka", fr:"par la fréquence de nos supplications à Toi!"},
        {t:'tri', ar:"فَنُصْبِحَ مِنْ كَيْدِهِ فِي الْمَعْصُومِينَ بِكَ", tr:"fanuşbiha min kaydihi filma’şûmîna bika", fr:"Ainsi nous pourrions ignorer ses tromperies et nous élever dans le rang de ceux qui sont préservés de tout péché, de par Ton Aide!"},
        {t:'tri', ar:"اَللَّهُمَ أَعْطِنِي كُلَّ سُؤْلِي", tr:"allâhumma a ‘țini kulla sû’lî", fr:"Ô Dieu! Accorde-moi toutes mes requêtes,"},
        {t:'tri', ar:"وَاقْضِ لِي حَوَائِجِي", tr:"waqdi lî hawâ’iji", fr:"accomplis tous mes besoins,"},
        {t:'tri', ar:"وَلَاَ تَمْنَعْنِي الإِجَابَةَ وَقَدْ ضَمِنْتَهَا لِي", tr:"wa lâ tamna’nî al- ijâbata waqad damintahâ li", fr:"ne me refuse pas Ta Réponse positive, quand Tu T’es Toi-même porté garant pour cela,"},
        {t:'tri', ar:"وَلاَ تَحْجُبْ دُعَائِي عَنْكَ وَقَدْ أَمَرتَنِي بِهِ", tr:"wa lâ tahjub du â’i ‘anka waqad amartanî bihi", fr:"et ne mets aucun voile entre Toi et ma supplication de Toi, quand c’est Toi-même qui m’as command de le faire"},
        {t:'tri', ar:"وَامْنُنْ عَلَيَّ بِكُلِّ مَا يُصْلِحُنِي", tr:"wamnun ‘alayya bikulli mâ yuşlihunî", fr:"et Sois Clément envers moi dans toutes les choses qui me sont bénéfiques"},
        {t:'tri', ar:"فِي دُنْيَايَ وَآخِرَتِي", tr:"fi dunyâya wa âkhirati", fr:"dans ce monde-ci, et dans le monde à venir,"},
        {t:'tri', ar:"مَا ذَكَرْتُ مِنْهُ وَمَا نَسِيتُ", tr:"mâ dhakartu minhû wa mâ nasîtu", fr:"dans toutes les chose que je m’en souvienne ou que j’oublie"},
        {t:'tri', ar:"أَو أَظْهَرْتُ أَوْ أَخْفَيْتُ", tr:"aw azhartu aw akhfaytu", fr:"découvertes ou cachées,"},
        {t:'tri', ar:"أَوْ أَعْلَنْتُ أَوْ أَسْرَرْتُ", tr:"aw a lantu aw asrartu", fr:"ouvertement ou en secret!"},
        {t:'tri', ar:"وَاجْعَلْنِي فِي جَمِيعِ ذَلِكَ", tr:"waj’ alnî fî jamî’i dhâlika", fr:"Dans tout ceci, place-moi de par la demande que j’ai de Toi,"},
        {t:'tri', ar:"مِنَ الْمُصْلِحِينَ بِسُؤَالِي إِيَّاكَ", tr:"min almuşlihîna bisu’âlî iyyaka", fr:"parmi les pieux réformateurs,"},
        {t:'tri', ar:"الْمُنْجِحِينَ بِالطَّلَبِ إِلَيْكَ", tr:"almunjihina bittalabi ilayka", fr:"ceux qui sont écoutés favorablement quand ils Te font une requête,"},
        {t:'tri', ar:"غَيْرِ الْمَمْنُوعِينَ بِالتَّوَكُّلِ عَلَيْكَ", tr:"ghayri almamnû ‘îna bittawakkuli ‘alayka", fr:"et dont rien ne leur sera refusé, quand ils mettent leur confiance en Toi,"},
        {t:'tri', ar:"الْمُعَوَّذِينَ بِالتَّعَوُّذِ بِكَ", tr:"almu’awwadhîna bitta ‘awwudhi bika", fr:"Ceux qui sont accoutumés à chercher refuge auprès de Toi,"},
        {t:'tri', ar:"الرَّابِحِينَ فِي التِّجَارَةِ عَلَيْكَ", tr:"arrâbihîna fittijârati ‘alayka", fr:"ceux qui profitent du commerce qu’ils font avec Toi,"},
        {t:'tri', ar:"الْمُجَارِينَ بِعِزِّكَ", tr:"almujârîna bi’izzika", fr:"ceux qui reçoivent leur sanctuaire de par Ta Puissance,"},
        {t:'tri', ar:"اَلْمُوَسَّعِ عَلَيْهِمُ الرِّزْقُ الْحَلاَلُ", tr:"almuwassa’i ‘alayhim arrizqu alhalâlu", fr:"ceux qui reçoivent une provision licite (légitime)"},
        {t:'tri', ar:"مِنْ فَضْلِكَ الْوَاسِعِ", tr:"min fadlika alwâsi i", fr:"en plénitude de par Ta Largesse illimitée,"},
        {t:'tri', ar:"بِجُودِكَ وكَرَمِكَ", tr:"bijûdika wa karamika", fr:"de par Ta Munificence et Ta Générosité,"},
        {t:'tri', ar:"اَلْمُعَزِّينَ مِنَ الذُّلِّ بِكَ", tr:"almu’azzîna min adhdhulli bika", fr:"ceux qui atteignent l’exaltation après Tabaissement, de par Ton Aide,"},
        {t:'tri', ar:"وَالْمُجَارِينَ مِنَ الظُّلْمِ بِعَدْلِكَ", tr:"walmujârina min azzulmi bi’ adlika", fr:"ceux qui reçoivent une sanctuaire de toute injustice, de par Ta Justice,"},
        {t:'tri', ar:"وَالْمُعَافَيْنَ مِنَ الْبَلاَءِ بِرَحْمَتِكَ", tr:"walmu âfayna min albalâ’i birahmatika", fr:"ceux qui sont libérés de toute affliction de par Ta Miséricorde,"},
        {t:'tri', ar:"وَالْمُغْنَيْنَ مِن الْفَقْرِ بِغنَاكَ", tr:"walmughnayna min alfaqri bighinâka", fr:"ceux qui sont enrichis après la pauvreté de par Ta Richesse,"},
        {t:'tri', ar:"وَالْمَعْصُومِينَ مِنَ الذُّنُوبِ وَالزَّلَلِ وَالْخَطَاءِ بِتَقْوَاكَ", tr:"walma’şûmîna min adhdhunûbi wazzalali walkhața’i bitaqwaka", fr:"ceux qui sont préservés de tout péché, erreur et offense, de par leur peur révérentielle envers Toi,"},
        {t:'tri', ar:"والْمُوَفِّقِينَ لِلْخَيْرِ والرُّشْدِ وَالصَّوَابِ بِطَاعَتِكَ", tr:"walmuwaffaqina lilkhayri warruchdi waşsawâbi bițâ atika", fr:"ceux qui sont pleins de succès dans la bonté, bonne conduite et propriété, de par leur obéissance envers Toi,"},
        {t:'tri', ar:"والْمُحَالِ بَيْنَهُمْ وَبَيْنَ الذُّنُوبِ بِقُدْرَتِكَ", tr:"walmuhali baynahum wa bayna adhdhunûbi biqudratika", fr:"ceux qui sont quittes de tout péché, de par Ton Pouvoir,"},
        {t:'tri', ar:"اَلتَّارِكِينَ لِكُلِّ مَعْصِيَتِكَ", tr:"attârikîna likulli ma’ şiyatika", fr:"et qui s’abstiennent de toute action désobéissante envers Toi,"},
        {t:'tri', ar:"السَّاكِنِينَ فِي جِوَارِكَ", tr:"assâkinîna fi jiwârika", fr:"et ceux qui vivent (séjournent) dans Ton Voisinage!"},
        {t:'tri', ar:"اللَّهُمَّ أَعْطِنَا جَمِيعَ ذَلِكَ", tr:"allâhumma a tinâ jami a dhâlika", fr:"Ô Dieu! Accorde-moi tout cela,"},
        {t:'tri', ar:"بِتَوْفِيقِكَ وَرَحْمَتِكَ", tr:"bitawfiqika wa rahmatika", fr:"de par Ta Donation de succès, et Ta Miséricorde,"},
        {t:'tri', ar:"وَأَعِذْنَا مِنْ عَذَابِ السَّعِيرِ", tr:"wa a’idhnâ min ‘adhâbi assa ‘îri", fr:"sauve-nous du châtiment de brûler vif,"},
        {t:'tri', ar:"وَأَعْطِ جَمِيعَ الْمُسْلِمِينَ وَالْمُسْلِمَاتِ", tr:"wa a’ți jamî’ a almuslimîna walmuslimâti", fr:"et accorde à tous les Musulmans, mâle et femelle,"},
        {t:'tri', ar:"وَالْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ", tr:"walmu’minîna walmu’minâti", fr:"et tous les fidèles mâle et femelle,"},
        {t:'tri', ar:"مِثْلَ الَّذِي سَأَلْتُكَ لِنَفْسِي وَلِوُلْدِي", tr:"mithla alladhî sa’altuka linafsî wa liwuldi", fr:"ce que j’ai demandé pour mes enfants et moi,"},
        {t:'tri', ar:"فِي عَاجِلِ الدُّنْيَا وَآجِلِ الآخِرَةِ", tr:"fi ‘âjili addunyâ wa ajılı al-akhiratı", fr:"dans l’immédiat, dans ce monde-ci, et le monde à venir!"},
        {t:'tri', ar:"إِنَّكَ قَرِيبٌ مُجِيبٌ", tr:"innaka qarîbun mujibun", fr:"Car en vérité Tu es tout près,"},
        {t:'tri', ar:"سَمِيعٌ عَلِيمٌ", tr:"samî’ un ‘alîmun", fr:"Tu es Celui qui répond, qui entend tout,"},
        {t:'tri', ar:"عَفُوُّ غَفُورٌ", tr:"afuwwun gafûrun", fr:"l’Omniscient, qui pardonne,"},
        {t:'tri', ar:"رَءُوفٌ رَحِيمٌ", tr:"ra’ûfun rahîmun", fr:"qui absout, qui est Clément et Miséricordieux!"},
        {t:'tri', ar:"وَآتِنَا فِي الدُّنْيَا حَسَنَةً", tr:"wa âtinâ fiddunyâ hasanatan", fr:"Et accorde-nous le bien dans ce monde,"},
        {t:'tri', ar:"وَفِي الآخِرَةِ حَسَنَةً", tr:"wa fil-âkhirati hasanatan", fr:"et aussi dans le monde de l’Au-delà"},
        {t:'tri', ar:"وَقِنَا عَذَابَ النَّارِ.", tr:"wa qinâ ‘adhâba annâri", fr:"et protège-nous du châtiment du Feu de la Géhenne!"},
        {t:'salawat'},
      ]
    },
    's26': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "26. Pour ses Voisins et Amis",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour ses voisins et ses amis au moment où Il les mentionnait",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"فَقَالَ: وكان مِنْ دُعائِهِ عليْهِ السَّلامُ لِجِيرانِهِ وأوْلِيَائِهِ إِذا ذكرهُمْ", tr:"", fr:"La vingt sixième supplication: pour les voisins et les amis au moment où Il les mentionnait"},
        {t:'tri', ar:"اَللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et sa Famille!!"},
        {t:'tri', ar:"وَتَوَلِّنِي فِي جِيرَانِي وَمَوَالِيَّ", tr:"wa tawallani fi jîrâni wa mawâliyya", fr:"Aide-moi avec la meilleure assistance que Tu pourrais m’accorder, de venir au secours de mes voisins et de mes amis,"},
        {t:'tri', ar:"اَلْعَارِفِينَ بِحَقِّنَا وَالْمُنَابِذِينَ لأَعْدَائِنَا بِأَفْضَلِ وَلَايَتِكَ", tr:"al’ârifîna bihaqqinâ walmunâbidhîna li- a’dâ’inâ bi-afdali walâyatika", fr:"qui reconnaissent notre droit, et se battent contre nos ennemis."},
        {t:'tri', ar:"وَوَفِّقْهُمْ لإِقَامَةِ سُنَّتِكَ", tr:"wa waffiqhum li- iqâmati sunnatika", fr:"Accorde-leur succès dans l’accomplissement de Tes Prescriptions,"},
        {t:'tri', ar:"وَالأَخْذِ بِمَحَاسِنِ أَدَبِكَ", tr:"wal-akhdhi bimahâsini adabika", fr:"et la mise en pratique de Tes belles Leçons"},
        {t:'tri', ar:"فِي إِرْفَاقِ ضَعِيفهِمْ", tr:"fi irfâqi da ‘îfihim", fr:"par leur doux comportement envers les faibles,"},
        {t:'tri', ar:"وَسَدِّ خَلَّتِهِمْ", tr:"wa saddi khallatihim", fr:"et de combler leurs manques,"},
        {t:'tri', ar:"وَعِيَادَةِ مَرِيضِهِمْ", tr:"wa ‘iyâdati maridihim", fr:"en visitant des malades,"},
        {t:'tri', ar:"وَهِدَايَةِ مُسْتَرْشِدِهِمْ", tr:"wa hidâyati mustarchidihim", fr:"en guidant ceux qui cherchent la bonne voie,"},
        {t:'tri', ar:"وَمُنَاصَحَةِ مُسْتَشِيرِهِمْ", tr:"wa munâșahati mustachîrihim", fr:"en donnant de bons conseils à ceux qui en demandent,"},
        {t:'tri', ar:"وَتَعَهُّدِ قَادِمِهِمْ", tr:"wa ta ahhudi gâdimihim", fr:"en s’occupant du bienêtre de ceux qui rentrent chez eux,"},
        {t:'tri', ar:"وَكِتْمَانِ أَسْرَارِهِمْ", tr:"wa kitmâni asrârihim", fr:"en gardant leurs secrets,"},
        {t:'tri', ar:"وَسَتْرِ عَوْرَاتِهِمْ", tr:"wa satri ‘awrâtihim", fr:"en couvrant les fautes honteuses, en secourant les opprimés,"},
        {t:'tri', ar:"وَنُصْرَةِ مَظْلُومِهِمْ", tr:"wa nuşrati mazlûmihim", fr:"en partageant le nécessaire avec eux,"},
        {t:'tri', ar:"وَحُسْنِ مُوَاسَاتِهِمْ بِالْمَاعُونِ", tr:"wa husni muwâsâtihim bilmâ’ûni", fr:"et faisant des donations et des aumônes de leurs fortunes,"},
        {t:'tri', ar:"وَالْعَوْدِ عَلَيْهِمْ بِالْجِدَةِ وَالإِفْضَالِ", tr:"wal’ awdi ‘alayhim biljidati wal-ifdâli", fr:"et de ce qui leur revient,"},
        {t:'tri', ar:"وَإِعْطَاءِ مَا يَجِبُ لَهُمْ قَبْلَ السُّؤَالِ", tr:"wa i’tâ’i mâ yajibu lahum qabla assu’âli", fr:"avant même que les autres n’en demandent."},
        {t:'tri', ar:"واجْعَلْنِي اللَّهُمَّ أَجْزِي بِالإِحْسَانِ مُسِيئَهُمْ", tr:"w aj’alni allâhum ajzî bil-ihsâni musí’ahum", fr:"Ô Dieu! Laisse-moi repayer par un bienfait, celui qui d’entre eux est malfaiteur,"},
        {t:'tri', ar:"وَأُعْرِضُ بِالتَّجَاوزِ عَنْ ظَالِمِهِمْ", tr:"wa u ridu bittajâwzi ‘an zâlimihim", fr:"me détourner avec une douce patience,"},
        {t:'tri', ar:"وَأَسْتَعْمِلُ حُسْنَ الظَّنِّ فِي كَافَّتِهِمْ", tr:"wa asta milu husna azzanni fi kâffatihim", fr:"de celui qui d’entre eux est méchant,"},
        {t:'tri', ar:"وَأَتَوَلَّى بِالْبِرِّ عَامَّتَهُمْ", tr:"wa atawallâ bilbirri ‘âmmatahum", fr:"de préserver mon optimisme envers eux,"},
        {t:'tri', ar:"وَأَغُضُّ بَصَرِي عَنْهُمْ عِفَّةً", tr:"wa aghuddu başari ‘anhum ‘iffatan", fr:"de les secourir tous avec bienfaits et dévotion,"},
        {t:'tri', ar:"وَأُلِينَ جَانِبِي لَهُمْ تَوَاضُعاً", tr:"wa ulinu jânibi lahum tawâdu an", fr:"de baisser les yeux devant eux, avec continence,"},
        {t:'tri', ar:"وَأَرِقُّ عَلَى أَهْلِ الْبَلاَءِ مِنْهُمْ رَحْمَةً", tr:"wa ariqqu ‘alâ ahli albala’i minhum rahmatan", fr:"de m’adoucir devant eux avec humilité, d’être tendre envers ceux qui parmi eux sont affligés,"},
        {t:'tri', ar:"وَأُسِرُّ لَهُمْ بِالْغَيْبِ مَوَدَّةً", tr:"wa usirru lahum bilghaybi mawaddatan", fr:"en réservant beaucoup de pitié et beaucoup d’affection, dans leur absence,"},
        {t:'tri', ar:"وَأُحِبُّ بَقَاءَ النِّعْمَةِ عِنْدَهُمْ نُصْحًا", tr:"wa uhibbu baqâ’a anni mati ‘ indahum nuşhan", fr:"de me montrer content de ce qu’ils continuent de recevoir des faveurs, avec beaucoup de bienveillance,"},
        {t:'tri', ar:"وَأُوجِبُ لَهُمْ مَا أُوجِبُ لِحَامَّتِي", tr:"wa ûjibu lahum mâ üjibu lihâmmatî", fr:"de leur accorder ce que j’accorde à mes proches,"},
        {t:'tri', ar:"وَأَرْعَى لَهُمْ مَا أَرْعَى لِخَاصَّتِي", tr:"wa ar’â lahum mâ ar â likhâşșati", fr:"et d’observer pour eux, ce que j’observe pour mes particuliers!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et sa Famille!"},
        {t:'tri', ar:"وَارْزُقْنِي مِثْلَ ذَلِكَ مِنْهُمْ", tr:"warzuqni mithla dhâlika minhum", fr:"Accorde à moi aussi tout ce que j’ai supplié pour eux, de leur part,"},
        {t:'tri', ar:"وَاجْعَلْ لِي أَوْفَى الْحُظُوظِ فِيمَا عِنْدَهُمْ", tr:"waj’alli awfâ alhuzûzi fimâ ‘indahum", fr:"et désigne pour moi la part la plus complète de ce qui existe chez eux de délices,"},
        {t:'tri', ar:"وَزِدْهُمْ بَصِيرَةً فِي حَقِّي", tr:"wa zid-hum başîratan fi haqqî", fr:"Augmente leur perspicacité envers mon droit,"},
        {t:'tri', ar:"وَمَعْرِفَةً بِفَضْلِي", tr:"wa ma rifatan bifadli", fr:"Et leur connaissance de mon excellence"},
