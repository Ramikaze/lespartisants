        {t:'tri', ar:'اللّٰهُمَّ إِنِّى أُشْهِدُكَ وَكَفىٰ بِكَ شَهِيداً، وَأُشْهِدُ جَمِيعَ مَلائِكَتِكَ وَسُكَّانَ سَمٰواتِكَ وَحَمَلَةِ عَرْشِكَ وَمَنْ بَعَثْتَ مِنْ أَنْبِيَائِكَ وَ رُسُلِكَ، وَأَنْشَأْتَ مِنْ أَصْنَافِ خَلْقِكَ أَنِّى أَشْهَدُ أَنَّكَ أَنْتَ اللّٰهُ لَاإِلٰهَ إِلّا أَنْتَ، وَحْدَكَ لَا شَرِيكَ لَكَ وَ لَا عَدِيلَ، وَلَا خُلْفَ لِقَوْلِكَ وَلَا تَبْدِيلَ وَأَنَّ مُحَمَّداً صَلَّى اللّٰهُ عَلَيْهِ وَآلِهِ عَبْدُكَ وَرَسُولُكَ أَدَّىٰ مَا حَمَّلْتَهُ إِلَى الْعِبَادِ، وَجَاهَدَ فِى اللّٰهِ عَزَّ وَجَلَّ حَقَّ الْجِهَادِ وَأَنَّهُ بَشَّرَ بِمَا هُوَ حَقٌّ مِنَ الثَّوَابِ، وَأَنْذَرَ بِمَا هُوَ صِدْقٌ مِنَ الْعِقَابِ', tr:'Allâhumma, innî ush’hiduka wa kafâ bika shahîdann, wa ush’hidu jamî‘a malâ’ikatika wa sukkâna samâwâtika wa hamalata ‘arshika wa man ba’athta min anbiyâ’ ika wa rusulika wa ansha’ta min asnâfi khalqika annî ash’hadu annaka anta-llâhu lâ ilâha illâ anta, wahdaka lâ sharîka laka wa lâ ‘adîla, wa lâ khulfa li-qawlika wa lâ tabdîla wa anna Muhammadann, sallâ-llâhu ‘alayhi wa âlihi, ‘abduka wa rasûluka addâ mâ hammaltahu ilâ-l-‘ibâdi, wa jâhada fi-llâhi, ‘azza wa jalla, haqqa-l-jihâdi wa annahu bashshara bimâ huwa haqqunn mina-th-thawâbi, wa andhara bimâ huwa sidqunn mina-l-‘iqâbi', fr:"Ô mon Dieu ! Je Te prends à témoin — et Tu suffis comme Témoin —, je prends à témoin tous Tes anges, les habitants de Tes cieux, les Archanges porteurs de Ton Trône, les Prophètes et les Messagers envoyés par Toi, ainsi que toutes les sortes de créatures que Tu as créées ; je témoigne que Tu es Dieu ; il n'y a de Dieu que Toi ; l'Unique ; sans associé avec Toi ni d'égal à Toi ; il n'y a ni contradiction dans Ta parole ni modification. Et que Mohammed — que Dieu le bénisse ainsi que les Gens de sa Famille — est Ton serviteur et Ton messager."},
        {t:'tri', ar:'اللّٰهُمَّ ثَبِّتْنِى عَلىٰ دِينِكَ مَا أَحْيَيْتَنِى،وَلَا تُزِغْ قَلْبِى بَعْدَ إِذْ هَدَيْتَنِى وَهَبْ لِى مِنْ لَدُنْكَ رَحْمَةً إِنَّكَ أَنْتَ الْوَهَّابُ صَلِّ عَلَىٰ مُحَمَّدٍ وَعَلَىٰ آلِ مُحَمَّدٍ وَاجْعَلْنِى مِنْ أَتْباعِهِ وَشِيعَتِهِ، وَاحْشُرْ نِى فِى زُمْرَتِهِ وَوَفِّقْنِى لِأَدَاءِ فَرْضِ الْجُمُعَاتِ، وَمَا أَوْجَبْتَ عَلَىَّ فِيها مِنَ الطَّاعَاتِ وَقَسَمْتَ لِأَهْلِهَا مِنَ الْعَطَاءِ فِى يَوْمِ الْجَزَاءِ، إِنَّكَ أَنْتَ الْعَزِيزُ الْحَكِيمُ', tr:'Allâhumma, thabbitnî ‘alâ dînika mâ ahayaytanî wa lâ tuzigh qalbî ba‘da idh hadaytanî wa hab lî min ladunka rahmatann innaka anta-l-wahhâbu sallî ‘alâ Muhammadinn wa ‘alâ âli Muhammadinn wa-j’alnî min atbâ‘ihi wa shî‘atihi, wa-hshumî fî zumratihi wa waffiqnî li-adâ’i fardi-l-jumu’âti, wa mâ awjabta ‘alayya fîhâ mina-t-tâ‘âti wa qasamta li-ahlihâ mina-l-‘atâ’i fî yawmi-l-jazâ’i, innaka antal-‘ azîzu-l-hakîmu', fr:"Ô mon Dieu ! Affermis en moi Ta religion tant que Tu me maintiendras en vie. Ne dévie pas mon cœur après m'avoir dirigé ; accorde-moi une miséricorde venant de Toi. Tu es le Suprême Donateur. Bénis Mohammed et les Gens de la Famille de Mohammed ; fais de moi l'un de ses suivants et de ses partisans ; mets-moi au nombre de ceux qui sont dans ses rangs ; accorde-moi la réussite dans l'accomplissement des obligations religieuses du Vendredi. Tu es le Tout-Puissant, le Sage."},
        {t:'salawat'},
      ]
    },

    samedi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '68. Invocation du Samedi',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'بِسْمِ اللّٰهِ كَلِمَةِ الْمُعْتَصِمِينَ، وَمَقالَةِ الْمُتَحَرِّزِينَ وَأَعُوذُ بِاللّٰهِ تَعَالىٰ مِنْ جَوْرِ الْجَائِرِينَ، وَكَيْدِ الْحَاسِدِينَ، وَبَغْىِ الظَّالِمِينَ وَأَحْمَدُهُ فَوْقَ حَمْدِ الْحَامِدِينَ', tr:'Bismi-llâhi kalimati-l-mu‘tasimîna wa maqâlati-l-mutaharrizîna wa a’ûdhu bi-llâhi ta’âlâ min jawri-l-jâ’irîna, wa kaydi-l-hâsidîna wa baghî-zh-zhâ-limîna wa ahmaduhu fawqa hamdi-l- hâmidîna', fr:"Au Nom de Dieu ! La Parole de ceux qui se placent sous la Protection de Dieu ! La Devise de ceux qui cherchent ardemment Sa Protection ! Je cherche refuge en Dieu — Le Très Exalté soit-IL — contre l'injustice de l'injuste, contre les pièges des envieux, contre l'oppression des oppresseurs ; Et je Le loue de La Louange placée au-dessus de toutes les louanges des louangeurs !"},
        {t:'tri', ar:'اللّٰهُمَّ أَنْتَ الْواحِدُ بِلَا شَرِيكٍ، وَالْمَلِكُ بِلَا تَمْلِيكٍ، لَاتُضَادُّ فِى حُكْمِكَ، وَلَا تُنَازَعُ فِى مُلْكِكَ', tr:'Allâhumma, anta-l-wâhidu bilâ sharîkinn, wa-l-maliku bilâ tamlîkinn, lâ tudâddu fî hukmika wa lâ tunâza’u fî mulkika', fr:"Ô mon Dieu ! Tu es L'Unique sans associé, Le Roi sans avoir été intronisé ! Nul ne saurait s'opposer à Toi dans Ton Jugement ; nul ne saurait Te contester dans Ta Souveraineté !"},
        {t:'tri', ar:'أَسْأَلُكَ أَنْ تُصَلِّىَ عَلَىٰ مُحَمَّدٍ عَبْدِكَ وَرَسُولِكَ، وَأَنْ تُوزِعَنِى مِنْ شُكْرِ نُعْمَاكَ مَا تَبْلُغُ بِى غَايَةَ رِضَاكَ وَأَنْ تُعِينَنِى عَلَىٰ طَاعَتِكَ وَلُزُومِ عِبَادَتِكَ، وَاسْتِحْقَاقِ مَثُوبَتِكَ بِلُطْفِ عِنَايَتِكَ وَتَرْحَمَنِى بِصَدِّى عَنْ مَعَاصِيكَ مَا أَحْيَيْتَنِى، وَتُوَفِّقَنِى لِمَا يَنْفَعُنِى مَا أَبْقَيْتَنِى وَأَنْ تَشْرَحَ بِكِتَابِكَ صَدْرِى، وَتَحُطَّ بِتِلاوَتِهِ وِزْرِى، وَتَمْنَحَنِى السَّلَامَةَ فِى دِينِى وَنَفْسِى وَلَا تُوحِشَ بِى أَهْلَ أُنْسِى، وَتُتِمَّ إِحْسَانَكَ فِيَما بَقِىَ مِنْ عُمْرِى كَمَا أَحْسَنْتَ فِيَما مَضَىٰ مِنْهُ يَا أَرْحَمَ الرَّاحِمِينَ', tr:'As’aluka an tusalliya ‘alâ Muhammadinn ‘abdika wa rasûlika, wa an tûzi‘anî min shukri nu’mâka mâ tablughu bî ghâyata ridâka wa an tu‘înanî ‘alâ tâ‘atika wa luzûmi ‘ibâdatika, wa-stihqâqi mathûbatika bi-lutfî ‘inâyatika wa tarhamanî bi-saddî ‘an ma’âsîka mâ ahyaytanî, wa tuwaffiqanî limâ yanfa‘unî mâ abqaytanî wa an tasharaha bi-kitâbika sadrî, wa tahutta bi-tilâwatihi wizrî, wa tamnahanî-s-salâmata fî dînî wa nafsî Wa lâ tûhisha bî ahla unsî, wa tutimma ihsânaka fîmâ baqiya min ‘umrî kamâ ahsanta fîmâ madâ minhu yâ arhama-r-râhimîna', fr:"Je T'implore de bénir Mohammed et les Gens de sa Famille, Ton Serviteur et Ton Messager ; Inspire-moi le remerciement de Tes Bienfaits par lequel j'atteindrai le plus haut degré de Ta Satisfaction ; Accorde-moi l'aide à des fins de T'obéir, de persister dans l'Adoration qui T'est due, et ainsi mériter Ta Récompense par Ta Grâce Bienveillante. Fais preuve de Miséricorde à mon égard et protège-moi contre les actes de désobéissance envers Toi aussi longtemps que Tu me maintiendras en vie ; Élargis ma poitrine par Ton Livre, délivre-moi de mon fardeau par sa lecture ; Accorde-moi la perfection dans ma Religion et dans mon âme. Ô Le Plus Miséricordieux de ceux qui font miséricorde !"},
        {t:'salawat'},
      ]
    },


    'makarem': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '20. Mâkarem al-Akhlāq',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — L\'invocation des nobles traits de caractères (Mâkarem al-Akhlāq)',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي مكارِمِ الأخْلاقِ ومرْضِيِّ الأفْعالِ', fr:'La vingtième supplication: concernant les nobles caractéristiques morales et les actions qui plaisent à Dieu tout Puissant'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammed et toute sa Famille !'},
        {t:'tri', ar:'وَبَلِّغْ بِإِيمَانِي أَكْمَلَ الإِيَمَانِ', tr:'wa balligh bi-îmâni akmala al-îmâni', fr:'fais-en sorte que ma foi atteigne la plus parfaite foi.'},
        {t:'tri', ar:'وَاجْعَلْ يَقِينِي أَفْضَلَ الْيَقِينِ', tr:'waj’al yaqini afdala alyaqîni', fr:'Rends ma certitude, la plus excellente certitude,'},
        {t:'tri', ar:'وَانْتَهِ بِنِيَّتِي إِلَى أَحْسَنِ النِّيَّاتِ', tr:'wantahi biniyyati ilâ ahsani anniyyâti', fr:'Et transforme mon intention, à la meilleure des intentions,'},
        {t:'tri', ar:'وَبِعَمَلِي إِلَى أَحْسَنِ الأَعْمَالِ', tr:'wa bi’amali ilâ ahsani al-a’mâli', fr:'et mon travail, à la meilleure des activitès !'},
        {t:'tri', ar:'اَللَّهُمَّ وَفِّرْ بِلُطْفِكَ نِيَّتِي', tr:'allâhumma waffir biluțfika niyyati', fr:'Ô Dieu! Purifie et complete mon intentin par Ta Bonté'},
        {t:'tri', ar:'وَصَحِّحْ بِمَا عِنْدَكَ يَقِينِي', tr:'wa şahhih bimâ ‘indaka yaqîni', fr:'et redresse ma certitude envers Ta Grâce'},
        {t:'tri', ar:'وَاسْتَصْلِحْ بِقُدْرَتِكَ مَا فَسَدَ مِنِّي', tr:'wastaşlih biqudratika mâ fasada minnî', fr:'et répare ce qui est corrompu en moi, de par Ton Pouvoir!'},
        {t:'tri', ar:'اَللَّهُمَّ صَلّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَاكْفِنِي مَا يَشْغَلُنِي الاهْتِمَامُ بِهِ', tr:'wakfini mâ yachghaluni alihtimâmu bihi', fr:'épargne-moi les inquiétudes qui me distraient,'},
        {t:'tri', ar:'وَاسْتَعْمِلْنِي بِمَا تَسْأَلُنِي غَداً عَنْهُ', tr:'wasta ‘milni bimâ tas’aluni ghadan anhu', fr:'emploie-moi dans ce que Tu m’en demanderas compte demain,'},
        {t:'tri', ar:'وَاسْتَفْرِغْ أَيَّامِي فِيمَا خَلَقْتَنِي لَهُ', tr:'wastafrigh ayyâmi fimâ khalaqtani lahu', fr:'et laisse-moi passer mes journées en accomplissant ce pour quoi Tu m’avais crée!'},
        {t:'tri', ar:'وَأَغْنِنِي وَأَوْسِعْ عَلَيَّ فِي رِزْقِكَ', tr:'wa aghnini wa awsi’ ‘alayya fi rizqika', fr:'libéré-moi de tout besoin, abonde Ta Provision envers moi,'},
        {t:'tri', ar:'وَلَا تَفْتِنِّی بِالبَطَرِ', tr:'wa lâ taftinni binnazari', fr:'et ne me tente pas avec de l’ingratitude !'},
        {t:'tri', ar:'وَأَعِزَّنِي وَلَا تَبْتَلِيَنِّي بِالْكِبْرِ', tr:'wa a’izzani wa lâ tabtaliyannî bilkibri', fr:'exalte-moi, et ne m’afflige point avec lorgueil !'},
        {t:'tri', ar:'وَعَبِّدْنِي لَكَ', tr:'wa ‘abbidni laka', fr:'fais de moi Ton esclave de sorte que je puisse T’adorer,'},
        {t:'tri', ar:'وَلَا تُفْسِدْ عِبَادَتِي بِالْعُجْبِ', tr:'wa lâ tufsid ‘ibidati bil’ujbi', fr:'et ne corromps pas mon adoration avec l’égoïsme, et une admiration exagérée pour moi-même!'},
        {t:'tri', ar:'وَأَجْرِ لِلنَّاسِ عَلَى يَدِيَ الْخَيْرَ', tr:'wa ajri linnâsi ‘alâ yadayya alkhayra', fr:'fais-en sorte que la bonté coule abondamment de mes mains envers les gens,'},
        {t:'tri', ar:'وَلَاَ تَمْحَقْهُ بِالْمَنِّ', tr:'wa lâ tamhaqhu bilmanni', fr:'et n’efface point ma bonté en les faisant mes obligés!'},
        {t:'tri', ar:'وَهَبْ لِي مَعَالِيَ الأَخْلَاقِ', tr:'wa hab liya ma âliya al-akhlâqi', fr:'accorde-moi les plus hautes caractéristiques morales,'},
        {t:'tri', ar:'وَاعْصِمْنِي مِنَ الْفَخْرِ', tr:'wa i’șimnî mina alfakhri', fr:'et préserve-moi de toute vanité!'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَلَا تَرْفَعْنِي فِي النَّاسِ دَرَجَةً', tr:'wa lâ tarfa nî finnâsi darajatan', fr:'me m’élève pas même pour un degré devant les gens,'},
        {t:'tri', ar:'إِلَّا حَطَطْتَنِي عِنْدَ نَفْسِي مِثْلَهَا', tr:'illâ hatattani ‘inda nafsi mithlahâ', fr:'sans pour autant m’abaisser dans mon âme,'},
        {t:'tri', ar:'وَلَا تُحْدِثْ لِي عِزّاً ظَاهِراً', tr:'wa la tuhdith lî ‘izzan zâhiran', fr:'et ne me procure aucun honneur,'},
        {t:'tri', ar:'إلَّا أَحْدَثْتَ لِي ذِلَّةً بَاطِنَةً عِنْدَ نَفْسِي بِقَدَرِهَا', tr:'illâ ahdathta lî dhillatan bâținatan ‘ inda nafsi biqadarihâ', fr:'sans pour autant m’humilier du même degré, dans mon âme!'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ', tr:'allâhumma şalli ‘alâ muhammadin wa âli muhammadin', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَمَتِّعْنِي بِهُدًى صَالِحٍ لاَ أَسْتَبْدِلُ بِهِ', tr:'wa matti’nî bihudan şâlihin lâ astabdilu bihi', fr:'accorde-moi une bonne conduite dont je ne cherche à remplacer;'},
        {t:'tri', ar:'وَطَرِيقَةِ حَقِّ لاَ أَزِيغُ عَنْهَا', tr:'wa tarîqati haqqin lâ azighu ‘anhâ', fr:'Un chemin qui mène à la vérité, et de laquelle je ne dévie point, et guidé par Ta Grâce,'},
        {t:'tri', ar:'وَنِيَّةِ رُشْدٍ لاَ أَشُكُّ فِيهَا', tr:'wa niyyati ruchdin lâ achukku fihâ', fr:'aie une bonne intention pour exécuter la bonne conduite dans laquelle je n’aurai aucun doute!'},
        {t:'tri', ar:'وَعَمِّرْنِي مَا كَانَ عُمْرِي بِذْلَةً فِي طَاعَتِكَ', tr:'wa ‘ammirni mâ kâna ‘umri bidhlatan fi tâ’ atika', fr:'Laisse-moi vivre autant que ma vie reste offerte à T’obéir,'},
        {t:'tri', ar:'فَإِذَا كَانَ عُمْرِي مَرْتَعاً لِلشَّيْطَانِ', tr:'fa’idhâ kâna ‘umri marta an lichchaytâni', fr:'mais si ma vie doit devenir comme un pâturage pour Satan,'},
        {t:'tri', ar:'فَاقْبِضْنِي إِلَيْكَ', tr:'faqbidnî ilayka', fr:'prends ma vie,'},
        {t:'tri', ar:'قَبْلَ أَنْ يَسْبِقَ مَقْتُكَ إِلَيَّ', tr:'qabla an yasbiqa maqtuka ilayya', fr:'avant que Ta Haine ne me devance,'},
        {t:'tri', ar:'أَوْ يَسْتَحْكِمَ غَضَبُكَ عَلَيَّ', tr:'aw yastahkima ghadabuka ‘alayya', fr:'ou bien que Ton Courroux se consolide contre moi!'},
        {t:'tri', ar:'اللَّهُمَّ لا تَدَعْ خَصْلَةً تُعَابُ مِنِّي إِلاَّ أَصْلَحْتَهَا', tr:'allâhumma lâ tada’ khişlatan tu âbu minni illâ aşlahtahâ', fr:'Ô Dieu! Ne laisse en moi aucun comportement pour lequel je sois blâmé, à moins que Tu ne Tarranges!'},
        {t:'tri', ar:'ولاَ عَائِبَةً أُؤَنَّبُ بِهَا إِلاَّ حَسَّنْتَهَا', tr:'wa lâ ‘â’ibatan u’annabu bihâ illâ hassantaha', fr:'Ni un défaut pour lequel je sois blâmé à moins que Tu ne le rendes beau;'},
        {t:'tri', ar:'وَلَاَ أُكْرُومَةً فِيَّ نَاقِصَةً إِلاَّ أتْمَمْتَهَا', tr:'wa lâ ukrûmatan fiyya nâqișatan illâ atmamtahâ', fr:'ne laisse en moi aucune vertu déficiente, à moins que Tu ne la complètes!'},
        {t:'tri', ar:'اللَّهُمَّ صَلّ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ', tr:'allâhumma șalli ‘alâ muhammadin wa âli muhammadin', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَأَبْدِلْنِي مِنْ بِغْضَةِ أَهْلِ الشَّنَانِ الْمَحَبَّةَ', tr:'wa abdilni min bughdati ahli achchana’âni almahabbata', fr:'et remplace pour moi l’animosité et la haine des envieux, à l’amour,'},
        {t:'tri', ar:'وَمِنْ حَسَدِ أَهْلِ الْبَغْيِ الْمَوَدَّةَ', tr:'wa min hasadi ahli albaghyi almawaddata', fr:'la jalousie des insolents à l’affection,'},
        {t:'tri', ar:'وَمِنْ ظِنَّةِ أَهْلِ الصَّلَاحِ الثِّقَةَ', tr:'wa min zinnati ahli aşşalahi aththiqata', fr:'la suspicion des vertueux à la confiance,'},
        {t:'tri', ar:'وَمِنْ عَدَاوَةِ الأَدْنَيْنَ الْوَلاَيَةَ', tr:'wa min ‘adâwati al-adnayna alwalâyata', fr:'l’inimité de ceux qui nous sont proches avec l’amitié'},
        {t:'tri', ar:'وَمِنْ عُقُوقِ ذَوِي الأَرْحَامِ الْمَبَرَّةَ', tr:'wa min ‘uqûqi dhawî al-arhâmi almabarrata', fr:'Pirrespect des relatits à qui nous leur devons un devoir familial, à la dévotion,'},
        {t:'tri', ar:'وَمِنْ خِذْلَانِ الأَقْرَبِينَ النُّصْرَةَ', tr:'wa min khidhlâni al-aqrabina annuşrata', fr:'le mépris des parents à l’aide secourable,'},
        {t:'tri', ar:'وَمِنْ حُبِّ الْمُدَارِينَ تَصْحِيحَ الْمِقَةِ', tr:'wa min hubbi almudârina tashiha almiqati', fr:'lattachement des flatteurs à l’amour bien tourné'},
        {t:'tri', ar:'وَمِنْ رَدِّ الْمُلابِسِينَ كَرَمَ الْعِشْرةِ', tr:'wa min raddi almulâbisîna karama al’ichrati', fr:'le rejet des gens à une amitié généreuse,'},
        {t:'tri', ar:'وَمِنْ مَرَارَةِ خَوْفِ الظَّالِمِينَ حَلاَوَةَ الأَمَنَةِ', tr:'wa min marârati khawfi azzâlimina halâwata al-amnati', fr:'et l’amertume de la peur du tyran cruel à la douceur de la sécurité!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَاجْعَلْ لِي يَداً عَلَى مَنْ ظَلَمَنِي', tr:'waj’al lî yadan ‘alâ man zalamani', fr:'accorde-moi une main forte contre celui qui m’oppresse,'},
        {t:'tri', ar:'وَلِسَانًا عَلَى مَنْ خَاصَمَنِي', tr:'wa lisânan ‘alâ man khâșamani', fr:'une éloquence contre celui qui dispute avec moi,'},
        {t:'tri', ar:'وَظَفَراً بِمَنْ عَانَدَنِي', tr:'wa zafarân biman ‘ânadani', fr:'et une grande victoire contre celui qui me résiste obstinément!'},
        {t:'tri', ar:'وَهَبْ لِي مَكْراً عَلَى مَنْ كَايَدَنِي', tr:'wa hab lî makran ‘alâ man kâyadanî', fr:'Donne-moi astuce contre celui qui conspire contre moi,'},
        {t:'tri', ar:'وَقُدْرَةً عَلَى مَنِ اضْطَهَدَنِي', tr:'wa qudratan ‘alâ man idțahadani', fr:'donne-moi pouvoir contre celui qui m’oppresse,'},
        {t:'tri', ar:'وَتَكْذِيباً لِمَنْ قَصَبَنِي', tr:'wa takdhiban liman qașabani', fr:'donne-moi le pouvoir de réfuter celui qui me méprise,'},
        {t:'tri', ar:'وَسَلَاَمَةً مِمَّنْ تَوَعَّدَنِي', tr:'wa salâmatan mimman tawa »adani', fr:'et la sauvegarde contre celui qui me menace !'},
        {t:'tri', ar:'وَوَفَّقْنِي لِطَاعَةِ مَنْ سَدَّدَنِي', tr:'wa waffiqni lițâ ati man saddadani', fr:'Accorde-moi le succès d’obéir à celui qui me montre le droit chemin,'},
        {t:'tri', ar:'ومُتَابَعَةِ مَنْ أَرْشَدَنِي', tr:'wa mutâba’ati man archadani', fr:'et de suivre celui qui me guide!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَسَدِّدْنِي لأَنْ أُعَارِضَ مَنْ غَشَّنِي بِالنُّصْحِ', tr:'wa saddidni li’an u’ârida man ghachchani binnuşhi', fr:'Fais-en sorte que je puisse confronter avec bienveillance, celui qui m’a trahi avec des fourberies,'},
        {t:'tri', ar:'وَأَجْزِيَ مَنْ هَجَرَنِي بِالبِرِّ', tr:'wa ajziya man hajarani bilbirri', fr:'de bien payer celui qui se gardait de moi, avec une douce dévotion,'},
        {t:'tri', ar:'وَأُثِيبَ مَنْ حَرَمَنِي بِالْبَذْلِ', tr:'wa uthiba man haramani bilbadhli', fr:'de récompenser avec piété, celui qui s’est séparé de moi,'},
        {t:'tri', ar:'وَأُكَافِىَ مَنْ قَطَعَنِي بِالصِّلَةِ', tr:'wa ukâfi’a man qața anî bişşilati', fr:'de récompenser celui qui m’a dérivé, avec grande générosité,'},
        {t:'tri', ar:'وَأُخَالِفَ مَنِ اغْتَابَنِي إِلَى حُسْنِ الذّكْرِ', tr:'wa ukhâlifa man ightâbani ilâ husni adhdhikri', fr:'et contredire celui qui m’avait calomnié et de le louer,'},
        {t:'tri', ar:'وَأَنْ أَشْكُرَ الْحَسَنَةَ', tr:'wa an achkura alhasanata', fr:'et de le remercier pour les bienfaits,'},
        {t:'tri', ar:'وَأُغْضِيَ عَنِ السَّيِّئَةِ', tr:'wa ughdiya ‘an(i) assayyi’ata', fr:'et de fermer les yeux devant le mal!'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَحَلْنِي بِحِلْيَةِ الصَّالِحِينَ', tr:'wa hallinî bihilyati aşşâlihîna', fr:'Enveloppe-moi avec la parure des consciencieux,'},
        {t:'tri', ar:'وَأَلْبِسْنِي زِينَةَ الْمُتَّقِينَ', tr:'wa albisni zînata almuttaqina', fr:'vêtis-moi l’ornament des pieux!'},
        {t:'tri', ar:'فِي بَسْطِ الْعَدْلِ', tr:'fi basți al’adli', fr:'pour étendre l’équité,'},
        {t:'tri', ar:'وَكَظْمِ الْغَيْظِ', tr:'wa kazmi alghayzi', fr:'contenir ma rage,'},
        {t:'tri', ar:'وَإِطْفَاءِ النَّائِرَةِ', tr:'wa itfâ’i annâ’irati', fr:'éteindre les flammes de la haine,'},
        {t:'tri', ar:'وَضَمِّ أَهْلِ الْفُرْقَةِ', tr:'wa dammi ahli alfurqati', fr:'rapprocher les gens séparés,'},
        {t:'tri', ar:'وَإِصْلاَحِ ذَاتِ الْبَيْنِ', tr:'wa işlâhi dhâti albayni', fr:'faire renouer les relations coupées par des discordes,'},
        {t:'tri', ar:'وَإِفْشَاءِ الْعَارِفَةِ', tr:'wa ifchâ’i al’ârifati', fr:'dévoiler les bienfaits cachés,'},
        {t:'tri', ar:'وَسَتْرِ الْعَائِبَةِ', tr:'wa satri al’â’ibati', fr:'dissimuler les fautes honteuses d’autrui,'},
        {t:'tri', ar:'وَلِينِ الْعَرِيكَةِ', tr:'wa lîni al’arikati', fr:'et pour posséder de la douceur dans le tempérament,'},
        {t:'tri', ar:'وَخَفْضِ الْجَنَاحِ', tr:'wa khafdi aljanâhi', fr:'de la modestie,'},
        {t:'tri', ar:'وَحُسْنِ السِّيرَةِ', tr:'wa husni assîrati', fr:'de la bonne conduite,'},
        {t:'tri', ar:'وَسُكُونِ الرِّيحِ', tr:'wa sukûni arrîhi', fr:'de la gravité et de la quiétude dans mon'},
        {t:'tri', ar:'وَطِيبِ الْمُخَالَفَةِ', tr:'wa tibi almukhâlafati', fr:'comportement; de l’harmonie agréable du comportement,'},
        {t:'tri', ar:'وَالسَّبْقِ إِلَى الْفَضِيلَةِ', tr:'wa assabqi ilâ alfadilati', fr:'et la priorité à atteindre les qualités vertueuses,'},
        {t:'tri', ar:'وَإِیثَارِ التَّفَضُّلِ', tr:'wa îthâri attafadduli', fr:'et la préférence à la générosité,'},
        {t:'tri', ar:'وَتَرْكِ التَّعْيِيرِ', tr:'wa tarki atta yîri', fr:'et l’abstinence à récriminer l’autrui,'},
        {t:'tri', ar:'وَالإِفْضَالِ عَلَى غَيْرِ الْمُسْتَحِقِّ', tr:'wal ifdâli ‘alâ ghayri almustahiqqi', fr:'et d’offrir gratuitement l’aumône aux immérités,'},
        {t:'tri', ar:'وَالْقَوْلِ بِالْحَقِّ وَإِنْ عَزَّ', tr:'walqawli bilhaqqi wa in ‘azza', fr:'et dire la vérité quoique pénible,'},
        {t:'tri', ar:'وَاسْتِقْلالِ الْخَيْرِ وَإِنْ كَثُرَ مِنْ قَوْلِي وَفِعْلِي', tr:'wastiqlâli alkhayri wa in kathura min qawlî wa fi’lî', fr:'et de n’avoir aucun estime pour mes bienfaits dans mes bonnes paroles et dans mes actions quoiqu’ils soient abondants,'},
        {t:'tri', ar:'وَاسْتِكْثَارِ الشَّرِّ وَإِنْ قَلَّ مِنْ قَوْلِي وَفِعْلِي', tr:'wastikthâri achcharri wa in qalla min qawli wa fi’lî', fr:'et de compter pour beaucoup le degré de mes méfaits dans mes paroles et dans mes actions, même s’ils sont insignifiantes!'},
        {t:'tri', ar:'وَأَكْمِلْ ذَلِكَ لِي', tr:'wa akmil dhâlika lî', fr:'perfectionne cela pour moi,'},
        {t:'tri', ar:'بِدَوَامِ الطَّاعَةِ', tr:'bidawâmi ațțâ ‘ati', fr:'par une obéissance durable,'},
        {t:'tri', ar:'وَلُزُومِ الْجَمَاعَةِ', tr:'wa luzûmi aljamâ ati', fr:'laffinité avec la Communauté Musulmane et le fait de la suivre,'},
        {t:'tri', ar:'وَرَفْضِ أَهْلِ الْبِدَعِ', tr:'wa rafdi ahli albida’i', fr:'et les rejets des innovateurs (hérétiques)'},
        {t:'tri', ar:'وَمُسْتَعْمِلِي الرَّأيِ الْمُخْتَرَعِ', tr:'wa musta’mili arra’yi almukhtara’i', fr:'et ceux qui agissent et utilisent les idées inventées par eux!'},
        {t:'tri', ar:'اَللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma salli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَاجْعَلْ أَوْسَعَ رِزْقِكَ عَلَيَّ إِذَا كَبِرْتُ', tr:'waj’ al awsa a rizqika ‘alayya idhâ kabirtu', fr:'accorde-moi ta plus large Provision dans ma vieillesse,'},
        {t:'tri', ar:'وَأَقْوَى قُوَّتِكَ فِيَّ إِذَا نَصِبْتُ', tr:'wa aqwa quwwatika fiyya idhâ naşibtu', fr:'et Ta plus Puissante Force quand je sui épuisé'},
        {t:'tri', ar:'وَلَاَ تَبْتَلِيَنِّي بِالْكَسَلِ عَنْ عِبَادَتِكَ', tr:'wa lâ tabtalini bilkasali ‘an ‘ibâdatika', fr:'et ne m’éprouve point avec la paresse pour T’adorer,'},
        {t:'tri', ar:'وَلَاَ الْعَمَى عَنْ سَبِيلِكَ', tr:'wa lâ al’amâ ‘an sabîlika', fr:'ni par l’aveuglement devant Ton Chemin,'},
        {t:'tri', ar:'وَلَا بِالتَّعَرُّضِ لِخِلافِ مَحَبَّتِكَ', tr:'wa lâ bitta arrudi likhilâfi mahabbatika', fr:'ou toute chose qui s’oppose à l’amour de Toi,'},
        {t:'tri', ar:'وَلَاَ مُجَامَعَةِ مَنْ تَفَرَّقَ عَنْكَ', tr:'wa lâ mujâma ati man tafarraqa ‘anka', fr:'ni par le fait de me ranger à celui qui s’est séparé de Toi,'},
        {t:'tri', ar:'وَلَا مُفَارَقَةِ مَنِ إجْتَمَعَ إِلَيْكَ', tr:'wa la mufâraqati man ijtama’a ilayka', fr:'ni de me séparer de celui qui s’est rapproché de Toi!'},
        {t:'tri', ar:'اَللَّهُمَّ اجْعَلْنِي أَصُولُ بِكَ عِنْدَ الضَّرُورَةِ', tr:'allâhumma ij’alnî aşûlu bika ‘inda addarûrati', fr:'Ô Dieu! Fais-en sorte qui je puisse attaquer la détresse avec Ta Force,'},
        {t:'tri', ar:'وَأَسْأَلُكَ عِنْدَ الْحَاجَةِ', tr:'wa as’aluka ‘inda alhâjati', fr:'en demandant Ton Secours dans les temps de besoin,'},
        {t:'tri', ar:'وَأَتَضَرَّعُ إِلَيْكَ عِنْدَ الْمَسْكَنَةِ', tr:'wa atadarra u ilayka ‘inda almaskanati', fr:'et plaider en Toi dans les moments de misère!'},
        {t:'tri', ar:'وَلَاَ تَفْتِنِّي بِالإسْتِعَانَةِ بِغَيْرِكَ إِذَا اضْطُرِرْتُ', tr:'wa lâ taftinni bilisti’ânati bighayrika idhâ idțurirtu', fr:'Ne me tente pas à chercher du secours à d’autres qui Toi, quand je me sens misérable et inquiet,'},
        {t:'tri', ar:'وَلَاَ بِالْخُضُوعِ لِسُؤَالِ غَيْرِكَ إِذَا افْتَقَرْتُ', tr:'wa lâ bilkhudû ‘i lisu’âli ghayrika idhâ iftaqartu', fr:'de m’humilier à demander de l’aide à d’autres qui Toi, dans les moments de pauvreté,'},
        {t:'tri', ar:'وَلَا بِالتَّضَرُّعِ إِلَى مَنْ دُونَكَ إِذَا رَهِبْتُ', tr:'wa lâ bittadarru’i ilâ man dûnaka idhâ rahibtu', fr:'ou bien de supplier quelqu’un qui est bien plus intérieur à Toi dans les moments d’effroi,'},
        {t:'tri', ar:'فَأَسْتَحِقَّ بِذَلِكَ خِذْلاَنَكَ وَمَنْعَكَ وَإِعْرَاضَكَ', tr:'fa astahiqqu bidhâlika khidhlânaka wa man’aka wa i’râdaka', fr:'sinon je mériterai Ton Abandon, Ton Indifférence, et Ton Refus de donner,'},
        {t:'tri', ar:'يَا أَرْحَمَ الرَّاحِمِينَ', tr:'ya arhama arrâhamîna', fr:'Ô Le plus Miséricordieux parmi les miséricordieux!'},
        {t:'tri', ar:'اللَّهُمَّ اجْعَلْ مَا يُلْقِي الشَّيْطَانُ فِي رُوعِي', tr:'allâhumma ij’| mâ yulqi achchaytânu fî raw i', fr:'Ô Dieu! Fais-en sorte que: le souhait, les soupçon, et l’envie'},
        {t:'tri', ar:'مِنَ التَّمَنِّي وَالتَّظَنِّي وَالْحَسَدِ', tr:'min attamanni wattazanni walhasadi', fr:'que Satan jette dans mon cœur,'},
        {t:'tri', ar:'ذِكْراً لِعَظَمَتِكَ', tr:'dhikran li’azamatika', fr:'soient un rappel de Ta Force,'},
        {t:'tri', ar:'وَتَفَكُّراً فِي قُدْرَتِكَ', tr:'wa tafakkuran fi qudratika', fr:'une reflection de Ton Pouvoir,'},
        {t:'tri', ar:'وَتَدْبِيراً عَلَى عَدُوِّكَ', tr:'wa tadbiran ‘alâ ‘aduwwika', fr:'et une solution contre Ton ennemi!'},
        {t:'tri', ar:'وَمَا أَجْرَى عَلَى لِسَانِي', tr:'wa mâ ajrâ ‘alâ lisâni', fr:'Transforme ce que j’ai prononcé'},
        {t:'tri', ar:'مِنْ لَفْظَةِ فُحْشٍ أَوْ هَجْرٍ', tr:'min lafzati fuhchin aw hajrin', fr:'par ma langue en mots indécents,'},
        {t:'tri', ar:'أَوْ شَتْمِ عِرْضٍ أَوْ شَهَادَةِ بَاطِلٍ', tr:'aw chatmi ‘irdin aw chahâdati bâtilin', fr:'en calomnie contre les bonnes réputations, en faux témoignage,'},
        {t:'tri', ar:'أَوِ اغْتِيَابِ مُؤْمِنٍ غَائِبِ', tr:'aw ightiyâbi mu’minin ghâ ibin', fr:'en médisance d’un fidèle absent,'},
        {t:'tri', ar:'أَوْ سَبِّ حَاضِرٍ وَمَا أَشْبَهَ ذِلِكَ', tr:'aw sabbi hâzirin aw mâ achbaha dhâlika', fr:'ou bien par le fait d’injurier un fidèle présent, et toute ce qui ressemble à cela,'},
        {t:'tri', ar:'نُطْقاً بِالْحَمِدِ لَكَ', tr:'nuțqân bilhamdi laka', fr:'en un discours de louange envers Toi!'},
        {t:'tri', ar:'وَإِغْرَاقاً فِي الثَّنَاءِ عَلَيْكَ', tr:'wa ighrâqan fiththanâ’i ‘ailayka', fr:'en une poursuite pour faire l’éloge de Toi,'},
        {t:'tri', ar:'وَذَهَاباً فِي تَمْجِيدِكَ', tr:'wa dhahâban fi tamjidika', fr:'en une excursion pour Te magnifier,'},
        {t:'tri', ar:'وَشُكْراً لِنِعْمَتِكَ', tr:'wa chukran lini’matika', fr:'en un profond remerciement pour Ta Grâce,'},
        {t:'tri', ar:'وَاعْتِرَافاً بِإِحْسَانِكَ', tr:'wa i’tirâfân bi- ihsânika', fr:'en une reconnaissance pour Ta Générosité,'},
        {t:'tri', ar:'وَإِحْصَاءً لِمِنَنِكَ', tr:'wa ihsấ’an liminanika', fr:'en une énumération de Tes Dons divers!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَلَاَ أُظْلَمَنَّ وَأنْتَ مُطِيقٌ لِلدَّفْعِ عَنِي', tr:'wa lâ uzlamanna wa anta muțiqun liddaf’i ‘anni', fr:'Fais-en sorte que je ne sois pas oppressé, quand Tu peux repousser cela de moi,'},
        {t:'tri', ar:'وَلَا أَظْلِمَنَّ وَأَنْتَ الْقَادِرُ عَلَى الْقَبْضِ مِنِّي', tr:'wa lâ azlimanna wa anta alqâdiru ‘alâ alqabdi minnî', fr:'et que je n’oppresse point les gens quand Tu es Puissant et peux me retenir,'},
        {t:'tri', ar:'وَلَاَ أَضِلَّنَّ وَقَدْ أَمْكَنَتْكَ هِدَايَتِي', tr:'wa lâ adillanna wa qad amkanatka hidâyati', fr:'que je ne sois point mal orienté, quand Tu es capable de me guider,'},
        {t:'tri', ar:'وَلَا أَفْتَقِرَنَّ وَمِنْ عِنْدِكَ وُسْعِي', tr:'wa lâ aftaqiranna wa min ‘indika wus’î', fr:'que je ne sois point pauvre, quand ma plénitude réside en Toi,'},
        {t:'tri', ar:'وَلَاَ أَطْغَيَنَّ وَمِنْ عِنْدِكَ وُجْدِي', tr:'wa lâ atghayanna wa min ‘indika wujdi', fr:'que je ne sois point rebelle, quand tout ce que je possède vient de Toi!'},
        {t:'tri', ar:'اَللَّهُمَّ إِلَى مَغْفِرَتِكَ وَفَدْتُ', tr:'allâhumma ilâ maghfiratika wafadtu', fr:'Ô Dieu! Je me dirige vers Ton Absolution,'},
        {t:'tri', ar:'وَإِلَى عَفْوِكَ قَصَدْتُ', tr:'wa ilâ ‘afwika qaşadtu', fr:'je vais à l’encontre de Ton Pardon,'},
        {t:'tri', ar:'وَإِلَى تَجَاوُزِكَ اشْتَقْتُ', tr:'wa ilâ tajâwuzika ichtaqtu', fr:'je désire ardemment Ta Patience'},
        {t:'tri', ar:'وَبِفَضْلِكَ وَثِقْتُ', tr:'wa bifadlika wathiqtu', fr:'et je fais confiance en Ta Grâce,'},
        {t:'tri', ar:'وَلَيْسَ عِنْدِي مَا يُوجِبُ لِي مَغْفِرَتَكَ', tr:'wa laysa ‘indi mâ yûjibu li maghfirataka', fr:'car il n’y a rien en moi, qui puisse mériter Ton Absolution,'},
        {t:'tri', ar:'وَلَا فِي عَمَلِي مَا أَسْتَحِقُّ بِهِ عَفْوَكَ', tr:'wa lâ fi ‘amali mâ astahiqqu bihi ‘afwaka', fr:'rien dans mes actions, qui puisse mériter Ton Pardon,'},
        {t:'tri', ar:'وَمَا لِي بَعْدَ أَنْ حَكَمْتُ عَلَى نَفْسِي إِلاَّ فَضْلُكَ', tr:'wa mâ lí ba da an hakamtu ‘alâ nafsî illâ fadluka', fr:'et après qui j’aie condamné mon âme, rien ne me rester que Ton Indulgence,'},
        {t:'tri', ar:'فَصَلٌ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'faşalli ‘alâ muhammadin wa âlihi', fr:'alors Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَتَفَضَّلْ عَلَيَّ اللَّهُمَّ', tr:'wa tafaddal ‘alayya allâhumma', fr:'et verse Ta Grâce sur ma personne! Ô Dieu!'},
        {t:'tri', ar:'وَأَنْطِقْنِي بِالْهُدَى', tr:'wa anțiqni bilhudâ', fr:'emploie ma langue à parler justement et sans écart,'},
        {t:'tri', ar:'وَأَلْهِمْنِي التَّقْوَى', tr:'wa alhimni attaqwa', fr:'inspire-moi d’une vertu révérencielle,'},
        {t:'tri', ar:'وَوَفَّقْنِي لِلَّتِي هِيَ أَزْكَى', tr:'wa waffiqni lillati hiya azkâ', fr:'accorde-moi les succès dans l’action la plus pure,'},
        {t:'tri', ar:'وَاسْتَعْمِلْنِي بِمَا هُوَ أَرْضَى', tr:'wasta’ milni bimâ huwa ardâ', fr:'et emploie-moi dans ce qui T’apporte le plus de satisfaction!'},
        {t:'tri', ar:'اللَّهُمَّ اسْلُكْ بِيَ الطِّرِيقَةَ الْمُثْلَى', tr:'allâhumma isluk biya attarîqata almuthla', fr:'Ô Dieu! Laisse-moi tracer le meilleur chemin,'},
        {t:'tri', ar:'وَاجْعَلْنِي عَلَى مِلَّتِكَ أَمُوتُ وَأَحْيَا', tr:'waj alni ‘alâ millatika amûtu wa ahya', fr:'et fais-moi vivre et mourir dans Ta Religion !'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammed et toute sa Famille !'},
        {t:'tri', ar:'وَمَتِّعْنِي بِالإِقْتِصَادِ', tr:'wa matti’nî bil- iqtişâdi', fr:'Fais-en sorte qui je prenne plaisir dans la modération,'},
        {t:'tri', ar:'وَاجْعَلْنِي مِنْ أَهْلِ السَّدَادِ', tr:'waj’alni min ahli assadâdi', fr:'transforme-moi en une personne ayant un juste comportement,'},
        {t:'tri', ar:'وَمِنْ أَدِلَّةِ الرَّشَادِ', tr:'wa min adillati arrachâdi', fr:'en une preuve pour le droit chemin,'},
        {t:'tri', ar:'وَمِنْ صَالِحِي الْعِبَادِ', tr:'wa min sâlihi al’ibâdi', fr:'et un des serviteurs de la vertu,'},
        {t:'tri', ar:'وَارْزُقْنِي فَوْزَ الْمَعَادِ', tr:'warzuqni fawza alma ‘âdi', fr:'et accorde-moi la réussite, le jour du Jugement Dernier,'},
        {t:'tri', ar:'وَسَلَاَمَةَ الْمِرْصَادِ', tr:'wa salâmata almirşâdi', fr:'et la sauvegarde de toute embuscade!'},
        {t:'tri', ar:'اللَّهُمَّ خُذْ لِنَفْسِكَ مِنْ نَفْسِي مَا يُخَلِّصُهَا', tr:'allâhumma khudh linafsika min nafsi mâ yukhallişuhâ', fr:'Ô Dieu! de mes qualités spirituelles, préserve tout ce qui puisse me libérer'},
        {t:'tri', ar:'وَأَبْقِ لِنَفْسِي مِنْ نَفْسِي مَا يُصْلِحُهَا', tr:'wa abqi linafsî min nafsî mâ yuşlihuhâ', fr:'et laisse à mon âme, ce qui me rend pieux et convenable,'},
        {t:'tri', ar:'فَإِنَّ نَفْسِي هَالِكَةٌ أَوْ تَعْصِمُهَا', tr:'fa inna nafsi hâlikatun aw ta’șimahâ', fr:'car mon âme périra, à moins que Tu ne la préserves!'},
        {t:'tri', ar:'اللَّهُمَّ أَنْتَ عُدَّتِي إِنْ حَزِئْتُ', tr:'allâhumma anta ‘uddatî in hazintu', fr:'Ô Dieu! Tu es ma Provision et mon secours quand je suis triste,'},
        {t:'tri', ar:'وَأَنتَ مُنْتَجَعِي إِنْ حُرِمْتُ', tr:'wa anta muntaja ‘î in hurimtu', fr:'Tu es mon Recours, quand je suis déprivé,'},
        {t:'tri', ar:'وَبِكَ اسْتِغَاثَتِي إِنْ كَرِثْتُ', tr:'wa bika istighâthati in kurithtu', fr:'C’est de Toi que je demande secours, au temps des troubles,'},
        {t:'tri', ar:'وَعِنْدَكَ مِمَّا فَاتَ خَلَفٌ', tr:'wa ‘indaka mimmâ fâta khalafun', fr:'et c’est en Toi que je trouve un Substitut pour toutes les choses j’ai perdues,'},
        {t:'tri', ar:'وَلِمَا فَسَدَ صَلاَحٌ', tr:'wa limâ fasada şalâhun', fr:'une réparation pour toutes les choses corrompues,'},
        {t:'tri', ar:'وَفِيمَا أَنْكَرْتَ تَغْيِيرٌ', tr:'wa fîmâ ankarta taghyîrun', fr:'et un changement pour toutes les choses que Tu désapprouves,'},
        {t:'tri', ar:'فَامْنُنْ عَلَيَّ قَبْلَ الْبَلاَءِ بِالْعَافِيَةِ', tr:'famnun ‘alayya qabla albala’i bil’âfiyati', fr:'alors, montre-moi Ta Bonté avec un bien-être avant l’affliction,'},
        {t:'tri', ar:'وَقَبْلَ الطَّلَبِ بِالْجِدَةِ', tr:'wa qabla ațțalabi biljidati', fr:'une fortune avant d’en demander,'},
        {t:'tri', ar:'وَقَبْلَ الضَّلاَلِ بِالرَّشَادِ', tr:'wa qabla addalâli birrachâdi', fr:'une bonne conduite avant d’être perdu;'},
        {t:'tri', ar:'وَاكْفِنِي مَؤُنَةَ مَعَرَّةِ الْعِبَادِ', tr:'wakfini ma’ûnata ma’arrati al’ibâdi', fr:'protége-moi du fait de subir de la honte envers les gens,'},
        {t:'tri', ar:'وَهَبْ لِي أَمْنَ يَوْمِ الْمَعَادِ', tr:'wa hab lî amna yawmi alma’âdi', fr:'donne-moi la sécurité dans le jour du Retour,'},
        {t:'tri', ar:'وَامْنَحْنِي حُسْنَ الإِرْشَادِ', tr:'wamnahni husna al-irchâdi', fr:'et accorde-moi une excellente conduite!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَادْرَأْ عَنِي بِلُطْفِكَ', tr:'wadra ‘anni biluțfika', fr:'Repousse de ma personne tout méfait,'},
        {t:'tri', ar:'وَاغْذُنِي بِنِعْمَتِكَ', tr:'waghdhuni bini’ matika', fr:'nourris-moi avec Ta Générosité,'},
        {t:'tri', ar:'وَأَصْلِحْنِي بِكَرَمِكَ', tr:'wa aşlihnî bikaramika', fr:'corrige mes fautes avec Ton Indulgence,'},
        {t:'tri', ar:'وَدَاوِنِي بِصُنْعِكَ', tr:'wa dâwini bişun ‘ika', fr:'guéris-moi avec Ton Bienfait,'},
        {t:'tri', ar:'وَأَظِلَّنِي فِي ذَرَاكَ', tr:'wa azillani fi dharâka', fr:'abrite-moi dans Ton Refuge,'},
        {t:'tri', ar:'وَجَلّلْنِي رِضَاكَ', tr:'wa jallilni rizâka', fr:'enveloppe-moi dans Ton Bon Plaisir,'},
        {t:'tri', ar:'وَوَفَقْنِي إِذَا اشْتَكَلَتْ عَلَيَّ الأُمُورُ لأَهْدَاهَا', tr:'wa waffiqni idhâ ichtakalat ‘alayya al-umûru li’ahdâhâ', fr:'et donne-moi du succès pour atteindre l’affaire la plus guidée, quand les affaires me confondent,'},
        {t:'tri', ar:'وَإِذَا تَشَابَهَتِ الأَعْمَالُ لأَزْكَاهَا', tr:'wa idhâ tachâbahat al-a’mâlu li’azkâhâ', fr:'le travail le plus convenable quand les travaux se ressemblent,'},
        {t:'tri', ar:'وَإِذَا تَنَاقَضَتِ الْمِلَلُ لأَرْضَاهَا', tr:'wa idhâ tanâqadat almilalu li’ardâhâ', fr:'et la plus satisfaisante croyance pour Toi, quand les croyances produites se contredisent!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَتَوِّجْنِي بِالْكِفَايَةِ', tr:'wa tawwijni bilkifâyati', fr:'couronne-moi avec la compétence,'},
        {t:'tri', ar:'وَسُمْنِي حُسْنَ الْوَلَايَةِ', tr:'wa sumni husna alwilayati', fr:'accorde-moi la capacité d’accomplir mes devoirs de la plus belle manière,'},
        {t:'tri', ar:'وَهَبْ لِي صِدْقَ الْهِدَايَةِ', tr:'wa hab li șidqa alhidayati', fr:'aide-moi à bien me guider,'},
        {t:'tri', ar:'وَلَا تَفْتِنِّي بِالسَّعَةِ', tr:'wa lâ taftinni bissa ati', fr:'défends-moi d’utiliser ma fortune pour les choses que Tu hais,'},
        {t:'tri', ar:'وَامْنَحْنِي حُسْنَ الدَّعَةِ', tr:'wamnahni husna adda’ati', fr:'accorde-moi excellente quiétude,'},
        {t:'tri', ar:'وَلَاَ تَجْعَلْ عَيْشِي كَدًّا كَدّاً', tr:'wa lâ taj al ‘aychî kaddan kaddan', fr:'ne rends point ma vie troublée, difficile ou peinée,'},
        {t:'tri', ar:'وَلَا تَرُدَّ دُعَائِي عَلَيَّ رَدّاً', tr:'wa lâ tarudda du’â’î ‘alayya raddan', fr:'et ne refuse pas ma supplication en me rejetant,'},
        {t:'tri', ar:'فإِنِي لاَ أَجْعَلُ لَكَ ضِدّاً', tr:'fa innî lâ aj’alu laka diddan', fr:'car je ne prends personne pour Ton rival,'},
        {t:'tri', ar:'وَلَا أَدْعُو مَعَكَ نِدًّا', tr:'wa lâ ad’ û ma’aka niddan', fr:'et je ne supplie personne qui soit Ton égal!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَامْنَعْنِي مِنَ السَّرَفِ', tr:'wamna ni mina assarafi', fr:'Garde-moi de toute prodigalité,'},
        {t:'tri', ar:'وَحَصِّنْ رِزْقِي مِنَ التَّلَفِ', tr:'wa haşşin rizqî mina attalafi', fr:'fortifie ma provision contre la ruine,'},
        {t:'tri', ar:'وَوَفِّرْ مَلَكَتِي بِالْبَرَكَةِ فِيهِ', tr:'wa waffir malakati bilbarakati fihi', fr:'augmente mes possessions de par Ta Bénédiction,'},
        {t:'tri', ar:'وَأَصِبْ بِي سَبِيلَ الْهِدَايَةِ لِلْبِرِّ فِيمَا أُنْفِقُ مِنْهُ', tr:'wa aşib bî sabîla alhidâyati lilbirri fimâ unfiqu minhu', fr:'et mets-moi dans le chemin de la bonne conduite, en dépensant mon bien dans la piété!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَاكْفِنِي مَؤُونَةَ الإكْتِسَابِ', tr:'wakfini ma’ûnata al-iktisâbi', fr:'épargne-moi le fardeau de subir la peine de gagner ma vie,'},
        {t:'tri', ar:'وَارْزُقْنِي مِنْ غَيْرِ احْتِسَابٍ', tr:'warzuqni min ghayri ihtisabin', fr:'et donne-moi sans rien compter,'},
        {t:'tri', ar:'فَلَاَ أَشْتَغِلَ عَنْ عِبَادَتِكَ بِالطَّلَبِ', tr:'fa lâ achtaghila ‘an ‘ibâdatika bițțalabi', fr:'pour que je ne puisse me distraire de Ton Adoration,'},
        {t:'tri', ar:'وَلَاَ أَحْتَمِلَ إِصْرَ تَبِعَاتِ الْمَكْسَبِ', tr:'wa lâ ahtamila işra tabi’âti almaksabi', fr:'et que je ne porte point le lourd fardeau des retombées (chutes) professionnelles!'},
        {t:'tri', ar:'اللَّهُمَّ فَأَطْلِبْنِي بِقُدْرَتِكَ مَا أَطْلُبُ', tr:'allâhumma fațlibnî biqudratika mâ ațlubu', fr:'Ô Dieu! Accorde-moi ce que je cherche, de par Ton Pouvoir,'},
        {t:'tri', ar:'وَأَجِرْنِي بِعِزَّتِكَ مِمَّا أَرْهَبُ', tr:'wa ajirni bi’izzatika mimmâ arhabu', fr:'et accorde-moi sanctuaire et refuge, de ce que j’ai peur, de par Ta Puissance!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَصُنْ وَجْهِي بِالْيَسَارِ', tr:'wa şun wajhiya bilyasâri', fr:'Sauve ma face par la richesse,'},
        {t:'tri', ar:'وَلَا تَبْتَذِلْ جَاهِي بِالإِقْتَارِ', tr:'wa lâ tabtadhil jâhî bil-iqtâri', fr:'et n’abaisse point ma dignité par le besoin,'},
        {t:'tri', ar:'فَأَسْتَرْزِقَ أَهْلَ رِزْقِكَ', tr:'a astarziqa anti IZaIKi', fr:'de peur que je ne cherche provision vers ceux auxquels Tu as subvenu à leurs besoins,'},
        {t:'tri', ar:'وَأَسْتَعْطِيَ شِرَارَ خَلْقِكَ', tr:'wa asta ‘țiya chirâra khalqika', fr:'ou bien que je demande une donation, des pires de Tes créatures!'},
        {t:'tri', ar:'فَأَفْتَتِنَ بِحَمْدِ مَنْ أَعْطَانِي', tr:'fa aftatina bihamdi man a tâni', fr:'car ensuite je serai obligé et tenté de louer celui qui m’a fait ce don,'},
        {t:'tri', ar:'وَأُبْتَلَى بِذَمِّ مَنْ مَنَعَنِي', tr:'wa ubtalâ bidhammi man mana ani', fr:'et affliger de blâme celui qui se garda de me donner quoique ce soit,'},
        {t:'tri', ar:'وَأَنْتَ مِنْ دُونِهِمْ وَلِيُّ الإِعْطَاءِ وَالْمَنْعِ', tr:'wa anta min dünihim waliyyu al- i’tâ’i walman’i', fr:'pendant que c’est Toi, et non eux, qui es le Saint Patron de toute donation et de tout refus!'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad e t toute sa Famille!'},
        {t:'tri', ar:'وَارْزُقْنِي صِحَّةً فِي عِبَادَةٍ', tr:'warzuqni şihhatan fi ‘ibâdatin', fr:'Et accorde-moi une bonne santé dans l’adoration,'},
        {t:'tri', ar:'وَفَرَاغاً فِي زَهَادَةٍ', tr:'wa farâghan fi zahâdatin', fr:'un détachement dans la renonciation,'},
        {t:'tri', ar:'وَعِلْمًا فِي اسْتِعْمَالٍ', tr:'wa ‘ilman fisti mâlin', fr:'une connaissance mise en œuvre,'},
        {t:'tri', ar:'وَوَرَعاً فِي إِجْمَالٍ', tr:'wa wara an fi ijmâlin', fr:'et une abstinence dans sa plus belle forme!'},
        {t:'tri', ar:'اللّهُمَّ اخْتِمْ بِعَفْوِكَ أَجَلِي', tr:'allâhumma ikhtim bi’afwika ajali', fr:'Ô Dieu! scelle le terme de ma vie avec Ton Pardon,'},
        {t:'tri', ar:'وَحَقِّقْ فِي رَجَاءِ رَحْمَتِكَ أَمَلِي', tr:'wa haqqiq fi rajâ’i rahmatika amali', fr:'vérifie mon expectation en espérant pour Ta Grâce,'},
        {t:'tri', ar:'وَسَهِّلْ إِلَى بُلُوغِ رِضَاكَ سُبُلِي', tr:'wa sahhil ilâ bulûghi ridâka subuli', fr:'aplanis les chemins d’atteindre Ta Satisfaction,'},
        {t:'tri', ar:'وَحَسِّنْ فِي جَمِيعِ أَحْوَالِي عَمَلِي', tr:'wa hassin fi jamî’i ahwâlî ‘amali', fr:'et fais-en sorte que mes actions soient bonnes en toute condition!'},
        {t:'tri', ar:'اللّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَنَبِّهْنِي لِذِكْرِكَ فِي أَوْقَاتِ الْغَفْلَةِ', tr:'wa nabbihni lidhikrika fi awqâti alghaflati', fr:'Incite-moi à me souvenir de Toi, aux temps des inattentions et d’indifférence,'},
        {t:'tri', ar:'وَاسْتَعْمِلْنِي بِطَاعَتِكَ فِي أَيَّامِ الْمُهْلَةِ', tr:'wasta’ milni bițâ atika fi ayyâmi almuhlati', fr:'emploie-moi dans Ton Obéissance, dans cette période de délai,'},
        {t:'tri', ar:'وَانْهَجْ لِي إِلَى مَحَبَّتِكَ سَبِيلاً سَهْلَةً', tr:'wanhaj lî ilâ mahabbatika sabilan sahlatan', fr:'ouvre-moi une route lisse pour atteindre Ton Amour,'},
        {t:'tri', ar:'أَكْمِلْ لِي بِهَا خَيْرَ الدُّنيَا وَالآخِرَةِ', tr:'akmil lî bihâ khayra addunya wal- âkhirati', fr:'et complète pour moi toutes les bonnes choses de ce monde et le monde éternel!'},
        {t:'tri', ar:'اللَّهُمَّ وَصَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad e t toute sa Famille! de la meilleure des salutations (bénédictions)'},
        {t:'tri', ar:'كَأَفْضَلِ مَا صَلِّيْتَ عَلَى أَحَدٍ مِنْ خَلْقِكَ قَبْلَهُ', tr:'ka afdali mâ șallayta ‘alâ ahadin min khalqika qablahu', fr:'avec laquelle Tu as déjà salué (bénis) chacune de tes créatures avant lul,'},
        {t:'tri', ar:'وَأَنتَ مُصَلِّ عَلَى أَحَدٍ بَعْدَهُ', tr:'wa anta muşallin ‘alâ ahadin ba’dahu', fr:'et salueras (béniras) chacune d’entre elles, après lui,'},
        {t:'tri', ar:'وَآتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الآخِرَةِ حَسَنَةً', tr:'wa âtinâ fiddunyâ hasanatan wa fil- âkhirati hasanatan', fr:'et accorde-nous et dans le monde éternel,'},
        {t:'tri', ar:'وَقِنِي بِرَحْمَتِكَ عَذَابَ النَّارِ', tr:'wa qinî birahmatika ‘adhâba annâri', fr:'et par Ta Grâce! Protége-moi du châtiment du Feu éternel!'},
        {t:'tri', ar:'إِنَّكَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ', tr:'innaka ‘alâ kulli chay’in qadirun', fr:'Car en vérité Tu es Puissant sur toute chose,'},
        {t:'tri', ar:'وَهُوَ عَلَيْكَ يَسِيرٌ.', tr:'wahuwa ‘alayka yasirun', fr:'et cela est véritablement facile pour Toi!'},
        {t:'salawat'},
      ]
    },


    'z-hussain': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyara Imam al-Ḥusayn',
      subtitle: 'Visite pieuse à l\'Imam al-Ḥusayn ibn \'Alī (p)',
      body: [
        {t:'zv', tx:'Que la paix soit sur toi, ô fils du Messager de Dieu,', ar:'Assalâmo \'alayka yâ bna rasûli-l-lâhi'},
        {t:'zv', tx:'Que la paix soit sur toi, Ô fils du Prince des croyants.', ar:'As-salâmo \'alayka yâ bna amira-l-mominin'},
        {t:'zv', tx:'Que la paix soit sur toi, Ô fils de la Véridique, de la pure Fatimah, la première dame des femmes du monde !', ar:'As-Salamo \'Alayka yâ bna-s-siddiqati at-tahirati fâtimata sayyedati niçâ-il-\'âlamin'},
        {t:'zv', tx:'Que la paix soit sur toi, ô maître Abû Abdellah ainsi que la Miséricorde de Dieu et Sa Bénédiction !', ar:'As-slâmo alayka yâ mawlâya wa rahmato-llahi wa barakâtuhu'},
        {t:'zv', tx:'J\'atteste que tu as accompli la prière, que tu as donné la Zakat (l\'aumône),', ar:'Ashhadu annaka qad aqmata-s-slâta wa âtayta-z-zakâta'},
        {t:'zv', tx:'Que tu as ordonné le bien et interdit le mal,', ar:'wa amarta bi-l-ma\'rufi wa nahayta \'ani-l-munkari'},
        {t:'zv', tx:'Que tu as récité le livre d\'une juste lecture,', ar:'wa talawta-l-kitâba haqqan tilâwatihi'},
        {t:'zv', tx:'Que tu as lutté pour Dieu, le juste Combat.', ar:'wa jâhadta fi-Llah, haqqan jihâdihi'},
        {t:'zv', tx:'Que tu as patienté devant le mal aux côtés de Dieu jusqu\'à ce que la certitude t\'ait atteint,', ar:'wa sabarta \'ala-l-adha fi janbihi muhtasibann hattâ atâka-l-yaqinu'},
        {t:'zv', tx:'J\'atteste que ceux qui t\'ont désobéi, t\'ont combattu, t\'ont tué, sont maudits de la langue même du prophète, l\'illettré.', ar:'Ashhadu anna-l-ladhîna khâlafûka wa hârabûka wa-l-ladhîna qatalûka, mal\'ûnina \'ala lisâni-n-nabiyyi-l-ummiyyi'},
        {t:'zv', tx:'Que Dieu Maudisse ceux qui ont été injustes à votre encontre, des premiers aux derniers et qu\'Il augmente leur douloureux châtiment.', ar:'la\'ana-llâhu azh-zhâlimina lakum mina-l-awwalîna wa-l-âkhirîna'},
        {t:'zv', tx:'Ô mon maître, Ô fils du Messager de Dieu, je suis connaissant de tes droits, allié de tes alliés, hostile à ceux qui te sont hostiles,', ar:'Yâ mawlâya yâ\'bna rasûli-llâhi, Inni \'ârifann bi-haqqika, muwâliyann li-aw-liyâ\'ika'},
        {t:'zv', tx:'Clairvoyant de la bonne voie sur laquelle tu es, connaissant l\'égarement de ceux qui se sont opposés à toi, aussi intercède pour moi auprès de Dieu.', ar:'Mustabsirann bi-l-hudâ al-ladhî anta \'alayhi, fa-ashfa\' lî \'inda rabbika'},
        {t:'zv', tx:'Que la paix soit sur toi, ô Argument de Dieu sur Sa Terre et dans Son Ciel !', ar:'As-salâmu \'alayka yâ hujjatu-llâhi fî ardihi wa samâ\'ihi'},
        {t:'zv', tx:'Que Dieu prie sur ton bon esprit et ton corps pur, et que la paix soit sur toi, ô mon Maître, ainsi que la Miséricorde de Dieu et Ses Bénédictions !', ar:'Salla-llâhu \'ala rûhika at-tayyiba wa jaçadika, wa rahmatu-llâhi wa barakâtuhu'},
        {t:'instruction', tx:'Après la visite (Ziyārat), il est recommandé d\'accomplir deux rak\'ats et les offrir à l\'Imam al-Ḥusayn (p). À la fin de la prière, dire :'},
        {t:'zv', tx:'Ô mon Dieu, j\'offre ces deux rak\'ats que je viens d\'accomplir à mon Maître l\'Imam Al-Hussein (p).', ar:'Allâhomma inni çallayto hâtayni ar-rek\'atayni hadiyatann minni ilâ sayyidi wa malâya abâ abdillâhi-l-Hussein'},
      ]
    },

    'z-warith': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyārat Wārith',
      subtitle: 'Ziyārat al-Imam al-Ḥusayn (p) — Se diriger vers Karbalā\'',
      body: [
        {t:'instruction', tx:'Formuler l\'intention (Niyyah) : « Je récite Ziyārat al-Imam Ḥusayn (as) Qurbatan ilallāh ». Se diriger vers la direction du Mausolée de l\'Imam Ḥusayn vers Karbalā\' en Iraq.'},
        {t:'zv', tx:'Allāhumma ṣalli \'alā Muḥammad wa āle Muḥammad', ar:'اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّد'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'Adam, l\'Élu d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ آدَمَ صَفِيِّ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Noé (Nūḥ), le Prophète d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ نُوحٍ نَبِيِّ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'Ibrāhīm (Abraham), l\'Ami privilégié d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ إِبْرَاهِيمَ خَلِيلِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Moussa (Moïse), Interlocuteur d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ مُوسَى كَلِيمِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de \'Isā (Jésus), l\'Esprit d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ عِيسَى رُوحِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Moḥammad, le Bien-aimé d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ مُحَمَّدٍ حَبِيبِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de \'Alī, le Commandeur des Croyants, le Waliy d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ عَلِيٍّ أَمِيرِ الْمُؤْمِنِينَ'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'al-Ḥasan, le martyr, le petit-fils du Messager d\'Allah !'},
        {t:'zv', tx:'Paix sur toi, o fils du Messager d\'Allah ! Paix sur toi, o fils de Fāṭimah al-Zahrā\', la Maîtresse des femmes des mondes !'},
        {t:'zv', tx:'Paix sur toi, o Abū \'Abdullāh al-Ḥusayn ! Paix sur toi, O élu d\'Allah et fils de Son élu !'},
        {t:'zv', tx:'Paix sur toi, o Vengeance d\'Allah et fils de Sa Vengeance ! Paix sur toi, o vengeance et revendicateur de vengeance !'},
        {t:'zv', tx:'Paix sur toi, o Imam guidant et pur, ainsi que sur les âmes qui se sont rendues dans ton enclos, qui reposent dans ton voisinage, et qui sont venues avec tes visiteurs en pèlerins !'},
        {t:'zv', tx:'Paix sur toi, de ma part, tant que je vivrai et tant que demeureront la nuit et le jour, car ta perte est un grand malheur et un préjudice grave pour les Croyants, les Musulmans, et pour tous les habitants du Ciel et de la terre. Ainsi, nous sommes à Dieu et à Lui nous retournerons !'},
        {t:'zv', tx:'Que la Prière d\'Allah, Ses Bénédictions et Ses Salutations soient sur toi, sur tes parents purs, bons et nobles, et sur leurs descendants bons-guides et bien-guidés !'},
        {t:'zv', tx:'Ô mon Maître ! Ô Abū Abdullāh al-Ḥusayn ! Je suis l\'hôte d\'Allah et ton hôte, le voisin d\'Allah et ton voisin ; or tout hôte et tout voisin a droit à un geste d\'hospitalité, et mon droit sur toi à présent est que tu demandes à Allah de m\'accorder la libération de mon cou de l\'Enfer ! Il est celui qui entend la prière, Il est Proche et Il est celui qui exauce !'},
        {t:'zv', tx:'Allāhumma ṣalli \'alā Muḥammad wa āle Muḥammad', ar:'اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّد'},
      ]
    },

    'z-ashura': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyāra \'Āshūrā',
      subtitle: 'Ziyara du 10 Muharram — Jour de \'Āshūrā\'',
      body: [
        {t:'intro', tx:'Selon un hadith de l’Imâm Sâdiq (p) : "Chaque fois que vous avez un vœu que vous voulez qu’Allah exauce, récitez la Ziyârat `Achourâ’ puis le Du‘â’` Alqamah, et enfin, demandez au Seigneur ce que vous voulez, Incha’Allah cela vous sera donné de par sa Générosité et sa Gratitude".'},
        {t:'tri', ar:'بِسْمِ اللهِ الرَّحْمنِ الرَّحِيْمِ', tr:'Bismi-llâhi-r-rahmâni-r-rahîm', fr:'Par la grâce du nom d\'Allah, le Tout Miséricordieux, le Très Miséricordieux.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا اَبا عَبْدِاللهِ،', tr:'Assalâmu ‘alayka yâ Abâ ‘Abdillâh', fr:'Que la paix soit sur toi, ô Abâ ‘Abdillah.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَا بْنَ رَسُولِ اللهِ', tr:'Assalâmu ‘alayka ya-bna Rasûlillâh', fr:'Que la paix soit sur toi, ô fils de l’Envoyé d’Allah.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَا بْنَ اَميرِ الْمُؤْمِنينَ وَابْنَ سَيِّدِ الْوَصِيّينَ،', tr:'Assalâmu ‘alayka ya-bna Amîr-ul-mu’minîn-a wa-bna Sayyid-il-waçiyyîn-a', fr:'Que la paix soit sur toi, ô fils du Prince des croyants et du Maître des Héritiers présomptifs.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَا بْنَ فاطِمَةَ سَيِّدَةِ نِساءِ الْعالَمينَ،', tr:'Assalâmu ‘alayka ya-bna Fâtimata, Sayyidati nisâ’-il-‘âlamîn-a', fr:'Que la paix soit sur toi, ô fils de Fâtimah, Maîtresse des femmes des mondes.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا ثارَ اللهِ وَابْنَ ثارِهِ وَالْوِتْرَ الْمَوْتُورَ،', tr:'Assalâmu ‘alayka yâ thârallâh wa-bna thârihi wa-l-witra-l-mawtûr-a', fr:'Que la paix soit sur toi, ô « vengeance » d\'Allah et fils de Sa « Vengeance » ! Paix sur toi, ô vengeance et revendicateur de vengeance !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ وَعَلَى الاَْرْواحِ الَّتي حَلَّتْ بِفِنائِكَ', tr:'Assalâmu ‘alayka wa ‘ala-l-arwâh-il-latî hallat bi-finâ’ika', fr:'Que la paix soit sur toi et sur les âmes qui demeurent en ton seuil.'},
        {t:'tri', ar:'عَلَيْكُمْ مِنّي جَميعاً سَلامُ اللهِ اَبَداً ما بَقيتُ وَبَقِيَ اللَّيْلُ وَالنَّهارُ،', tr:'‘Alaykum minnî jamî‘an salâmullâhi abadan mâ baqîtu wa baqiy-al-laylu wan-nahâr-u', fr:'Que la paix d’Allah soit, de ma part, sur vous tous pour toujours, tant que j’existe et que durent la nuit et le jour.'},
        {t:'tri', ar:'يا اَبا عَبْدِاللهِ لَقَدْ عَظُمَتِ الرَّزِيَّةُ وَجَلَّتْ وَعَظُمَتِ الْمُصيبَةُ بِكَ عَلَيْنا وَعَلى جَميعِ اَهْلِ الاِْسْلامِ', tr:'Yâ Abâ ‘Abdillâh! laqad ‘adhumat-ir-raziyyatu wa jallat wa ‘adhumat -il-muçibatu bika ‘alaynâ wa ‘alâ jamî‘i ahl-il-islâm-i', fr:'Ô Abâ’Abdillah, le malheur de ta perte est immense et cette épreuve est terrible et difficile à supporter pour nous et pour tous les gens de l’Islam.'},
        {t:'tri', ar:'وَجَلَّتْ وَعَظُمَتْ مُصيبَتُكَ فِي السَّماواتِ عَلى جَميعِ اَهْلِ السَّماواتِ،', tr:'Wa jallat wa ‘adhumat muçîbatuka fi-s-samâwâti ‘alâ jamî‘i ahli-s-samâwât-i', fr:'Le malheur de ta perte est immense et cette épreuve est terrible et difficile à supporter également pour les gens des cieux.'},
        {t:'tri', ar:'فَلَعَنَ اللهُ اُمَّةً اَسَّسَتْ اَساسَ الظُّلْمِ وَالْجَوْرِ عَلَيْكُمْ اَهْلَ الْبَيْتِ،', tr:'Fa-la‘an-Allâhu ummatan assasat asâs-adh-dhulmi wa-l-jawri ‘alaykum Ahl-al-Bayt', fr:'Qu’Allah maudisse donc un peuple qui a édifié les fondements de l’injustice et de l’oppression sur vous, les Ahl-ul-Bayt.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ اُمَّةً دَفَعَتْكُمْ عَنْ مَقامِكُمْ وَاَزالَتْكُمْ عَنْ مَراتِبِكُمُ الَّتي رَتَّبَكُمُ اللهُ فيها،', tr:'Wa la‘an-Allâhu ummatan dafa‘at-kum ‘an maqâmikum wa azâlat-kum ‘an marâtibikum-ullatî rattabakum-ullâhu fîhâ', fr:'Qu’Allah maudisse un peuple qui vous a écartés de votre position et vous a confisqué les rangs dans lesquels Allah vous avait placés.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ اُمَّةً قَتَلَتْكُمْ وَلَعَنَ اللهُ الْمُمَهِّدينَ لَهُمْ بِالَّتمْكينِ مِنْ قِتالِكُمْ،', tr:'Wa la‘an-Allâhu ummatan qatalatkum wa la‘ana-llâhu-l-mumahhidîna lahum bi-t-tamkîni min qitâlikum', fr:'Qu’Allah maudisse un peuple qui vous a assassinés et qu’Il maudisse ceux qui lui ont préparé le terrain pour vous combattre.'},
        {t:'tri', ar:'بَرِئْتُ اِلَى اللهِ وَاِلَيْكُمْ مِنْهُمْ وَمِنْ اَشْياعِهِمْ وَاَتْباعِهِمْ وَاَوْلِيائِهِم', tr:'Bari’tu ila-llâhi wa ilaykum minhum wa achyâ‘ihim wa atbâ‘ihim wa awliyâ’ihim', fr:'Devant Allah et devant vous je les désapprouve et avec eux leurs partisans, leurs adeptes et leurs amis.'},
        {t:'tri', ar:'يا اَبا عَبْدِاللهِ اِنّي سِلْمٌ لِمَنْ سالَمَكُمْ وَحَرْبٌ لِمَنْ حارَبَكُمْ اِلى يَوْمِ الْقِيامَةِ،', tr:'Yâ Abâ ‘Abdillâh, innî silmun li-man sâlamakum wa harbun li-man hârabakum ilâ yawm-il-qiyâmah', fr:'Ô Abâ ‘Abdillâh, je suis en paix avec ceux qui sont en paix avec vous et en guerre contre ceux qui sont en guerre contre vous, jusqu’au Jour de la Résurrection.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ آلَ زِياد وَآلَ مَرْوانَ، وَلَعَنَ اللهُ بَني اُمَيَّةَ قاطِبَةً،', tr:'Wa la‘an-Allâhu âla Ziyâd wa âla Marwân wa la‘an-Allâhu Banî Umayyata qâtibatan', fr:'Qu’Allah maudisse les Âle Ziyâd et les Âle Marwân. Qu’Allah maudisse tous les Bani Omayyah sans exception.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ ابْنَ مَرْجانَةَ، وَلَعَنَ اللهُ عُمَرَ بْنَ سَعْدٍ، وَلَعَنَ اللهُ شِمْراً،', tr:'Wa la‘an-Allâhu-bna Marjânata wa la‘an-Allâhu ‘Umara-bna Sa‘d-in wa la‘ana-llâhu Chimran', fr:'Qu’Allah maudisse Ibn Marjânah. Qu’Allah maudisse Omar Ibn Sa‘d. Qu’Allah maudisse Chimr.'},
        {t:'tri', ar:'لَعَنَ اللهُ اُمَّةً اَسْرَجَتْ وَاَلْجَمَتْ وَتَنَقَّبَتْ لِقِتالِكَ،', tr:'Wa la‘an-Allâhu ummatan asrajat wa aljamat wa tanaqqabat li-qitâlika', fr:'Qu’Allah maudisse un peuple qui est monté en selle, qui a bridé ses chevaux et qui s’est préparé en vue de te combattre.'},
        {t:'tri', ar:'بِاَبي اَنْتَ وَاُمّي لَقَدْ عَظُمَ مُصابي بِكَ', tr:'Bi-abî anta wa ummî laqad ‘adhuma muçâbî bika', fr:'Que mon père et ma mère te soient sacrifiés ! La peine que je ressens pour toi est immense.'},
        {t:'tri', ar:'فَاَسْأَلُ اللهَ الَّذي اَكْرَمَ مَقامَكَ وَاَكْرَمَني اَنْ يَرْزُقَني طَلَبَ ثارِكَ مَعَ اِمامٍ مَنْصُورٍ مِنْ اَهْلِ بَيْتِ مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَآلِهِ،', tr:'Fa-as’al-ullâha-llathî akrama maqâmaka wa akramanî bika an yarzuqanî talaba thârika ma‘a imâmin mançûrin min Ahli-Bayti Muhammadin çallâ-Ilâhu ‘alayhi wa âlihi', fr:'Je demande donc à Allah, qui t’a honoré de ton rang et par toi m’a honoré, qu’Il m’accorde la chance de te venger aux côtés d’un Imâm victorieux descendant des Gens de la Maison de Mohammad (p).'},
        {t:'tri', ar:'اَللّـهُمَّ اجْعَلْني عِنْدَكَ وَجيهاً بِالْحُسَيْنِ عَلَيْهِ السَّلامُ فِي الدُّنْيا وَالاْخِرَةِ،', tr:'Allâhumma-j‘alnî ‘indaka wajîhan bi-l-Husayni ‘alayhi-s-salâmu fi-d-dunyâ wa-l-âkhira-ti', fr:'Ô mon Dieu ! Fasse que par la grâce d\'al-Hussain (p) je mérite Ta considération dans le monde ici-bas et dans l’au-delà.'},
        {t:'tri', ar:'يا اَبا عَبْدِاللهِ اِنّي اَتَقَرَّبُ اِلى اللهِ وَ اِلى رَسُولِهِ وَاِلى اَميرِ الْمُؤْمِنينَ وَاِلى فاطِمَةَ وَاِلَى الْحَسَنِ وَاِلَيْكَ بِمُوالاتِكَ وَبِالْبَراءَةِ مِمَّنْ اَسَسَّ اَساسَ ذلِكَ وَبَني عَلَيْهِ بُنْيانَهُ وَجَرى فِي ظُلْمِهِ وَجَوْرِهِ عَلَيْكُمْ وَعلى اَشْياعِكُمْ،', tr:'Yâ Abâ ‘Abdillâh ! Innî ataqarrabu ilâ-llâhi wa ilâ Rasûlihi wa ilâ Amîr-il-mu’minîna wa ilâ Fâtimata wa ilâ-l-Hasani wa ilayka bi-muwâlâtika wa bi-l-barâ’ati mimman assasa asâsa thalik wa banâ ‘alayhi bunyânahu wa jarâ fi dhulmihi wa jawrihi ‘alaykum wa ‘alâ achyâ‘ikum.', fr:'Ô Abâ’Abdillah, je demande à être rapproché d’Allah, de Son Envoyé, du Commandeur des croyants (l’Imam Ali), de Fâtimah, d’al-Hassan et de toi par mon amour pour toi et par mon rejet et mon désaveu de ceux qui ont posé la fondation de votre tragédie et y ont bâti leur édifice et qui ont poursuivi leur injustice et leur oppression contre vous et vos partisans.'},
        {t:'tri', ar:'بَرِئْتُ اِلَى اللهِ وَاِلَيْكُمْ مِنْهُمْ وَاَتَقَرَّبُ اِلَى اللهِ ثُمَّ اِلَيْكُمْ بِمُوالاتِكُمْ وَمُوالاةِ وَلِيِّكُمْ وَبِالْبَراءَةِ مِنْ اَعْدائِكُمْ وَالنّاصِبينَ لَكُمُ الْحَرْبَ وَبِالْبَراءَةِ مِنْ اَشْياعِهِمْ وَاَتْباعِهِمْ،', tr:'Bari’tu ilâ-llâhi wa ilaykum minhum wa ataqarrabu ilâ-llâh thumma ilaykum bi-muwâlâtikum wa muwâlâti waliyyikum wa bi-l-barâ’ati min a‘dâ’ikum wa-n-nâçibîna lakumu-l-harba wa bi-l-barâ’ati min achyâ‘ihim wa atbâ‘ihim', fr:'Je les désavoue devant Allah et devant vous et je cherche à me rapprocher d’Allah puis de vous en vous aimant et en aimant celui que vous aimez, par mon rejet de vos ennemis et de ceux qui sont en guerre contre vous, et par le rejet de leurs partisans et de leurs adeptes.'},
        {t:'tri', ar:'اِنّي سِلْمٌ لِمَنْ سالَمَكُمْ وَحَرْبٌ لِمَنْ حارَبَكُمْ وَوَليٌّ لِمَنْ والاكُمْ وَعَدُوٌّ لِمَنْ عاداكُمْ', tr:'Innî silmun li-man sâlamakum wa harbun li-man hârabakum wa waliyyun li-man wâlâkum wa ‘aduwwun li-man ‘âdâkum', fr:'Je suis en paix avec quiconque est en paix avec vous et je suis en guerre contre quiconque est en guerre contre vous, je suis l’ami de quiconque est votre ami et l’ennemi de quiconque est votre ennemi.'},
        {t:'tri', ar:'فَاَسْأَلُ اللهَ الَّذي أكْرَمَني بِمَعْرِفَتِكُمْ وَمَعْرِفَةِ اَوْلِيائِكُمْ وَرَزَقَنِي الْبَراءَةَ مِنْ اَعْدائِكُمْ اَنْ يَجْعَلَني مَعَكُمْ فِي الدُّنْيا وَالاْخِرَةِ وَاَنْ يُثَبِّتَ لي عِنْدَكُمْ قَدَمَ صِدْقٍ فِي الدُّنْيا وَالاْخِرَةِ', tr:'Fa-as’alu-llâha-llathî akramanî bi-ma‘rifatikum wa ma‘rifati awliyâ’ikum wa razaqaniya-l-barâ’ata min a‘dâ’ikum an yaj‘alanî ma‘akum fi-d-duniyâ wa-l-âkhirati wa an yuthabbita lî ‘indakum qadama çidqin fi-d-dunyâ wa-l-âkhira-ti', fr:'Je demande à Allah, qui m’a honoré de votre connaissance et de la connaissance de vos amis et m’a inspiré le désaveu de vos ennemis, de me permettre d’être avec vous dans le monde d’ici-bas et dans l’autre monde et d’affermir ma sincérité fidèle envers vous dans le monde d’ici-bas et dans l’autre monde.'},
        {t:'tri', ar:'وَاَسْأَلُهُ اَنْ يُبَلِّغَنِي الْمَقامَ الَْمحْمُودَ لَكُمْ عِنْدَ اللهِ وَاَنْ يَرْزُقَني طَلَبَ ثاري مَعَ اِمام هُدىً ظاهِرٍ ناطِقٍ بِالْحَقِّ مِنْكُمْ', tr:'Wa as’aluhu an yuballighaniya-l-maqâm-al-mahmûda lakum ‘inda-llâh wa an yarzuqani talaba thârikum ma‘a imâmi hudan dhâhirin nâtiqin bi-l-haqqi minkum', fr:'Et je Lui demande de me faire atteindre au rang méritoire que vous avez auprès d’Allah et de m’accorder l’occasion de réclamer votre vengeance aux côtés d’un Imâm de guidance, issu de vous, bien-guidé, réapparaissant et annonçant la vérité.'},
        {t:'tri', ar:'وَاَسْألُ اللهَ بِحَقِّكُمْ وَبِالشَّأنِ الَّذي لَكُمْ عِنْدَهُ اَنْ يُعْطِيَني بِمُصابي بِكُمْ اَفْضَلَ ما يُعْطي مُصاباً بِمُصيبَتِهِ مُصيبَةً ما اَعْظَمَها وَاَعْظَمَ رَزِيَّتَها فِي الاِْسْلامِ وَفِي جَميعِ السَّماواتِ وَالاْرْضِ', tr:'Wa as’alu-llâh bi-haqqikum wa bi-ch-cha’ni-llathî lakum ‘indahu an yu‘tiyanî bi-muçâbî bikum af-dhala mâ yu‘ti muçâban bi-muçîbatihi muçîbatan mâ a‘dhamahâ wa a‘dhama raziyyatahâ fi-l-Islâmi wa fî jamî‘i-s-samâwâti wa-l-ardh-i', fr:'Et je demande à Allah, par votre droit et par la haute position dont vous jouissez auprès de Lui, de me récompenser de mon deuil de vous, la meilleure récompense qu’Il puisse accorder à quelqu’un en deuil, car il s’agit là d’un deuil on ne peut plus immense et dont l’affliction est on ne peut plus immense pour l’Islam et pour tous les cieux et la terre.'},
        {t:'tri', ar:'اَللّـهُمَّ اجْعَلْني فِي مَقامي هذا مِمَّنْ تَنالُهُ مِنْكَ صَلَواتٌ وَرَحْمَةٌ وَمَغْفِرَةٌ،', tr:'Allâhumma-j‘alnî fî maqâmî hâthâ mimman tanâluhu minka çalawâtun wa rahmatun wa magh-firatun', fr:'Ô mon Dieu ! Fais que je sois, là où je me trouve ici (en visite pieuse « ziyârah »), au nombre de ceux que Tu combles de Prières, de Miséricorde et de Pardon.'},
        {t:'tri', ar:'اَللّـهُمَّ اجْعَلْ مَحْيايَ مَحْيا مُحَمَّدٍ وَآلِ مُحَمَّدٍ وَمَماتي مَماتَ مُحَمَّدٍ وَآلِ مُحَمَّدٍ،', tr:'Allâhumma-j‘al mahyâya mahyâ Muhammadin wa âle Muhammad-in wa mamâtî mamâta Muhammadin wa âle Muhammad-in', fr:'Ô mon Dieu ! Fais-moi vivre et mourir de la même façon dont ont vécu et sont morts Mohammad et la famille de Mohammad.'},
        {t:'tri', ar:'اَللّـهُمَّ اِنَّ هذا يَوْمٌ تَبَرَّكَتْ بِهِ بَنُو اُمَيَّةَ وَابْنُ آكِلَةِ الاَْكبادِ اللَّعينُ ابْنُ اللَّعينِ عَلى لِسانِكَ وَلِسانِ نَبِيِّكَ صَلَّى اللهُ عَلَيْهِ وَآلِهِ فِي كُلِّ مَوْطِن وَمَوْقِف وَقَفَ فيهِ نَبِيُّكَ صَلَّى اللهُ عَلَيْهِ وَآلِهِ،', tr:'Allâhumma inna hâthâ yawmun tabarrakat bihi Banû Umayyata wa-bnu âkilat-il-akbâd-al-la‘înu-bnu-l-la‘îni ‘alâ lisânika wa lisâni Nabiyyika çalla-llâhu ‘alayhi wa âlihi fi kulli mawtinin wa mawqifin waqafa fîhi Nabiyyuka çallâ-llâhu ‘alayhi wa âlihi', fr:'Ô mon Dieu ! C’est un jour dont se sont félicités les Banû Omayyah et le fils de la Dévoreuse de foies, le maudit fils du maudit, maudit par Ta bouche et par la bouche de Ton Prophète (P) dans chaque endroit et dans chaque demeure où s’est arrêté Ton Prophète (P).'},
        {t:'tri', ar:'اَللّـهُمَّ الْعَنْ اَبا سُفْيانَ وَمُعاوِيَةَ وَيَزيدَ ابْنَ مُعاوِيَةَ عَلَيْهِمْ مِنْكَ اللَّعْنَةُ اَبَدَ الآبِدينَ،', tr:'Allâhumma-l‘an Abâ Sufiyâna wa Mu‘âwiya-ta wa Yazîda-bna Mu‘âwiya-ta ‘alayhim minka-l-la‘natu abada-l-âbidîn-a', fr:'Ô mon Dieu ! Maudis Abâ Sufyân, Mu‘âwiyah et Yazîd, fils de Mu‘âwiyah ; que Ta malédiction soit sur eux pour l’éternité.'},
        {t:'tri', ar:'وَهذا يَوْمٌ فَرِحَتْ بِهِ آلُ زِياد وَآلُ مَرْوانَ بِقَتْلِهِمُ الْحُسَيْنَ صَلَواتُ اللهِ عَلَيْهِ،', tr:'Wa hâthâ yawmun farihat bihi âlu Ziyâd wa âlu Marwân bi-qatlihimu-l-Husayn çalawâtu-llâh ‘alayhi', fr:'C’est un jour où les Âle Ziyâd et les Âle Marwân se sont réjouis d’avoir assassiné al-Hussayn, que les Prières d’Allah soient sur lui.'},
        {t:'tri', ar:'اَللّـهُمَّ فَضاعِفْ عَلَيْهِمُ اللَّعْنَ مِنْكَ وَالْعَذابَ (الاَْليمَ)', tr:'Allâhumma fa-dhâ‘if ‘alayhimu-l-la‘na minka wa-l-‘athâb-al-alîm', fr:'Ô mon Dieu ! Double donc sur eux la malédiction venant de toi et le châtiment terrible.'},
        {t:'tri', ar:'اَللّـهُمَّ اِنّي اَتَقَرَّبُ اِلَيْكَ فِي هذَا الْيَوْمِ وَفِي مَوْقِفي هذا وَاَيّامِ حَياتي بِالْبَراءَةِ مِنْهُمْ وَاللَّعْنَةِ عَلَيْهِمْ وَبِالْمُوالاةِ لِنَبِيِّكَ وَآلِ نَبِيِّكَ عَلَيْهِ وَعَلَيْهِمُ اَلسَّلامُ', tr:'Allâhumma innî ataqarrabu ilayka fî hâthâ-l-yawmi wa fî mawqifî hâthâ wa ayyâmi hayâtî bi-l-barâ’ati minhum wa-l-la‘nati ‘alayhim wa bi-l-muwâlâti li- Nabbiyyika wa âle Nabiyyika ‘alayhi wa ‘alayhimu-s-salâm', fr:'Ô mon Dieu ! Je recherche Ta proximité en ce jour, dans cet endroit et pour tous les jours de ma vie, en les désavouant, en les maudissant, et en éprouvant de l’amour pour Ton Prophète et pour les membres de la famille de Ton Prophète, que la paix soit sur lui et sur eux.'},
        {t:'instruction', tx:'PUIS RÉCITER CENT FOIS :'},
        {t:'tri', ar:'ذلِكَ، اَللّـهُمَّ الْعَنْ اَوَّلَ ظالِم ظَلَمَ حَقَّ مُحَمَّد وَآلِ مُحَمَّدٍ وَآخِرَ تابِعٍ لَهُ عَلى ذلك', tr:'Allâhumma-l‘an awwala dhâlimin dhalama haqqa Muhammadin wa âle Muhammad wa âkhira tâbi‘in lahu ‘alâ thâlika', fr:'Ô mon Dieu ! Maudis le premier oppresseur qui a opprimé le bon droit de Muhammad et des Âle Muhammad et le dernier qui l’a suivi en cela.'},
        {t:'tri', ar:'اَللّـهُمَّ الْعَنِ الْعِصابَةَ الَّتي جاهَدَتِ الْحُسَيْنَ (عليه السلام) وَشايَعَتْ وَبايَعَتْ وَتابَعَتْ عَلى قَتْلِهِ،', tr:'Allâhumma-l‘ani-l-‘içâbat-al-latî jâhadati-l-Husayn wa châya‘at wa bâya‘at wa tâba‘at ‘alâ qatlihi', fr:'Ô mon Dieu ! Maudis la bande qui a combattu al-Husayn, qui s’est liguée, qui a pactisé et qui s’est compromise en vue de son assassinat.'},
        {t:'tri', ar:'اَللّـهُمَّ الْعَنْهُمْ جَميعاً', tr:'Allâhumma-l‘anhum jamî‘an', fr:'Ô mon Dieu ! Maudis-les tous.'},
        {t:'instruction', tx:'PUIS RÉCITER CENT FOIS CE QUI SUIT (LES CENT BÉNÉDICTIONS) :'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا اَبا عَبْدِاللهِ وَعَلَى الاَْرْواحِ الَّتي حَلَّتْ بِفِنائِكَ عَلَيْكَ مِنّي سَلامُ اللهِ اَبَداً ما بَقيتُ وَبَقِيَ اللَّيْلُ وَالنَّهارُ', tr:'As-salâmu ‘alayka yâ Abâ ‘Abdillâh-i wa ‘alâ-l-arwâh-il-latî hallat bi-finâ’ika ‘alayka minnî salâmu-llâhi abadan mâ baqîtu wa baqiya-l-laylu wan-nahâr-u', fr:'Que la paix soit sur toi, ô Abâ Abdillâh, ainsi que sur les âmes qui demeurent en ton seuil. Sur toi, de ma part, le salâm d’Allah pour toujours tant que j’existe et que durent la nuit et le jour.'},
        {t:'tri', ar:'وَلا جَعَلَهُ اللهُ آخِرَ الْعَهْدِ مِنّي لِزِيارَتِكُمْ،', tr:'Wa lâ ja‘alahu-llâh âkhira-l-‘ahdi minnî li-ziyâratikum', fr:'Qu’Allah ne fasse pas que ce soit mon dernier engagement à vous rendre visite.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَى الْحُسَيْنِ وَعَلى عَلِيِّ بْنِ الْحُسَيْنِ وَعَلى اَوْلادِ الْحُسَيْنِ وَعَلى اَصْحابِ الْحُسَيْنِ،', tr:'As-salâmu ‘alâ-l-Husayn wa ‘alâ ‘Aliyy-ibn-il-Husayn-i wa ‘alâ awlâdi-l-Husayn-i wa ‘alâ açhâbi-l-Husayn-i', fr:'Que la paix soit sur al-Husayn, sur Ali fils d’al-Husayn, sur les enfants d’al-Husayn et sur les compagnons d’al-Husayn.'},
        {t:'tri', ar:'اَللّـهُمَّ خُصَّ اَنْتَ اَوَّلَ ظالِم بِاللَّعْنِ مِنّي وَابْدَأْ بِهِ اَوَّلاً ثُمَّ (الْعَنِ) الثّانيَ وَالثّالِثَ وَالرّابِعَ اَللّـهُمَّ الْعَنْ يَزيدَ خامِساً وَالْعَنْ عُبَيْدَ اللهِ بْنَ زِياد وَابْنَ مَرْجانَةَ وَعُمَرَ بْنَ سَعْد وَشِمْراً وَآلَ اَبي سُفْيانَ وَآلَ زِياد وَآلَ مَرْوانَ اِلى يَوْمِ الْقِيامَةِ', tr:'Allâhumma khuçça anta awwala dhâlimin bi-l-la‘ni minnî wa-bda’ bihi awwalan thumma-th-thâniya wa-th-thâlitha wa-r-râbi‘a Allâhumma-l‘an Yazîda khâmisan wa-l‘an ‘Ubayda-llâhi-bna Ziyâd wa-bna Marjâna wa ‘Umara-bna Sa‘d wa Chimran wa âla Abî Sufiyâna wa âla Ziyâd wa âla Marwâna ilâ yawmi-l-qiyâmah', fr:'Ô mon Dieu ! Destine de ma part la malédiction sur le premier des oppresseurs et commence par lui en premier. Puis maudis le deuxième, le troisième et le quatrième. Ô mon Dieu !, maudis Yazîd en cinquième puis maudis ‘Ubaydallâh Ibn Ziyâd, Ibn Marjânah, ‘Omar Ibn Sa‘d, Chimr, les Âle Abû Sufiyân, les Âle Ziyâd et les Âle Marwân jusqu’au Jour de la Résurrection.'},
        {t:'instruction', tx:'PUIS SE PROSTERNER (SUJÛD) ET RÉCITER :'},
        {t:'tri', ar:'اَللّـهُمَّ لَكَ الْحَمْدُ حَمْدَ الشّاكِرينَ لَكَ عَلى مُصابِهِمْ اَلْحَمْدُ للهِ عَلى عَظيمِ رَزِيَّتي', tr:'Allâhumma laka-l-hamdu hamda-ch-châkirîna laka ‘alâ muçâbihim, al-hamdu li-llâhi ‘alâ ‘adhimi raziyyatî', fr:'Ô mon Dieu ! Louange à Toi, pareille à la louange de ceux qui Te remercient de leur deuil. Louange à Toi pour l’immensité de mon affliction.'},
        {t:'tri', ar:'اَللّـهُمَّ ارْزُقْني شَفاعَةَ الْحُسَيْنِ يَوْمَ الْوُرُودِ وَثَبِّتْ لي قَدَمَ صِدْق عِنْدَكَ مَعَ الْحُسَيْنِ وَاَصْحابِ الْحُسَيْنِ اَلَّذينَ بَذَلُوا مُهَجَهُمْ دُونَ الْحُسَيْنِ عَلَيْهِ السَّلامُ.', tr:'Allâhum-mar-zuqnî chafâ‘ati-l-Husayn-i yawma-l-wurûdi wa thabbit lî qadama çidqin ‘indaka ma‘a-l-Husayni wa açhâbi-l-Husayni allathîna bathalû muhajahum dûna-l-Husayni ‘alayhi-s-salâm-u', fr:'Ô mon Dieu ! Gratifie-moi de l’intercession d’al-Husayn le jour de l’Entrée (auprès de Toi) et affermis ma sincérité fidèle envers Toi aux côtés d’al-Husayn et des compagnons d’al-Husayn, qui ont sacrifié leur vie pour al-Hussayn, que la paix soit sur lui.'},
        {t:'intro', tx:'Enfin, après la ziyârah faire une prière de deux rak‘ah, suivie du Du‘â’ ‘Alqamah.'}
      ]
    },

    'z-lundi': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyārat du Lundi',
      subtitle: 'Consacrée aux Imams al-Ḥasan, al-Ḥusayn et Fāṭima Zahrā (que la paix soit sur eux)',
      body: [
        {t:'instruction', tx:'Ziyāra de l\'Imam al-Ḥasan (as)'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ رَسُولِ رَبِّ الْعالَمينَ', fr:'Que la paix soit sur toi, ô fils du Messager du Seigneur de l\'univers !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ اَميرِ الْمُؤْمِنينَ', fr:'Que la paix soit sur toi, ô fils de l\'Émir des croyants !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ فاطِمَةَ الزَّهْراءِ', fr:'Que la paix soit sur toi, ô fils de Fāṭima Zahrā !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا حَبيبَ اللهِ', fr:'Que la paix soit sur toi, ô Bien-Aimé de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا صِفْوَةَ اللهِ', fr:'Que la paix soit sur toi, ô Élite de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا اَمينَ اللهِ', fr:'Que la paix soit sur toi, ô Probe de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا حُجَّةَ اللهِ', fr:'Que la paix soit sur toi, ô Preuve de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا نُورَ اللهِ', fr:'Paix sur toi, ô Lumière de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا صِراطَ اللهِ', fr:'Paix sur toi, ô Chemin de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا بَيانَ حُكْمِ اللهِ', fr:'Que la paix soit sur toi, ô le Manifeste du jugement de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا ناصِرَ دينِ اللهِ', fr:'Que la paix soit sur toi, ô Défenseur de la religion de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا السَّيِدُ الزَّكِيُّ', fr:'Que la paix soit sur toi, ô Maître intègre !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا الْبَرُّ الْوَفِيُّ', fr:'Que la paix soit sur toi, ô le Généreux fidèle !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا الْقائِمُ الاَْمينُ', fr:'Que la paix soit sur toi, ô Inébranlable Probe !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا الْعالِمُ بِالتَّأْويلِ', fr:'Que la paix soit sur toi, ô Érudit de l\'exégèse !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا الْهادِي الْمَهْديُّ', fr:'Que la paix soit sur toi, ô Guide bien guidé !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا الطّاهِرُ الزَّكِيُّ', fr:'Que la paix soit sur toi, ô le Pur intègre !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا التَّقِيُّ النَّقِيُّ', fr:'Que la paix soit sur toi, ô le Dévot Immaculé !'},
        {t:'tri', ar:'السَّلامُ عَلَيْكَ اَيُّهَا الْحَقُّ الْحَقيقُ', fr:'Paix sur toi, ô la Vérité, l\'Authentique !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ اَيُّهَا الشَّهيدُ الصِّدّيقُ', fr:'Que la paix soit sur toi, ô le Martyre, le Sincère !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا اَبا مُحَمَّد الْحَسَنَ بْنَ عَلِيٍّ وَ رَحْمَةُ اللهِ وَبَرَكاتُهُ.', fr:'Que la paix soit sur toi, ô père de Muḥammad, Ḥasan fils de ʿAlī, ainsi que la miséricorde et les bénédictions de Dieu.'},
        {t:'instruction', tx:'Ziyāra de l\'Imam al-Ḥusayn (as)'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ رَسُولِ اللهِ', fr:'Que la paix soit sur toi, ô fils du Messager de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ اَميرِ الْمُؤْمِنينَ', fr:'Que la paix soit sur toi, ô fils de l\'Émir des croyants !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ سَيِّدَةِ نِساءِ الْعالَمينَ', fr:'Que la paix soit sur toi, ô fils de la Maîtresse des femmes de l\'univers !'},
        {t:'tri', ar:'اَشْهَدُ اَنـَّكَ اَقَمْتَ الصلاة', fr:'J\'atteste que tu as accompli la prière,'},
        {t:'tri', ar:'و آتَيْتَ الزكاة', fr:'que tu t\'es acquitté de l\'aumône,'},
        {t:'tri', ar:'وَاَمَرْتَ بِالْمَعْرُوفِ وَنَهَيْتَ عَنِ الْمُنْكَرِ', fr:'que tu as ordonné le bien et déconseillé le mal,'},
        {t:'tri', ar:'وَعَبَدْتَ اللهَ مُخْلِصاً', fr:'que tu as adoré Dieu, dévoué,'},
        {t:'tri', ar:'وَجاهَدْتَ فِي اللهِ حَقَّ جِهادِهِ حَتّى أتاكَ الْيَقينُ', fr:'que tu as lutté pour Allah avec tout l\'effort qu\'Il mérite, jusqu\'à ce que la certitude te soit venue,'},
        {t:'tri', ar:'فَعَلَيْكَ السَّلامُ مِنّي ما بَقيتُ وَبَقِيَ اللَّيْلُ وَالنَّهارُ', fr:'Que mon salut soit sur toi, tant que je sois vivant et que la nuit et le jour persistent,'},
        {t:'tri', ar:'وَعَلى آلِ بَيْتِكَ الطَّيِّبينَ الطّاهِرينَ،', fr:'ainsi que sur tes descendants, les bienveillants et Immaculés.'},
        {t:'tri', ar:'اَنَا يا مَوْلايَ مَوْلىً لَكَ وَلاِلِ بَيْتِكَ', fr:'Ô maître ! Je suis à ton service et au service de ta famille,'},
        {t:'tri', ar:'سِلْمٌ لِمَنْ سالَمَكُمْ', fr:'je suis conciliant de celui qui est votre conciliant,'},
        {t:'tri', ar:'وَحَرْبٌ لِمَنْ حارَبَكُمْ', fr:'je suis ennemi de celui qui est votre ennemi,'},
        {t:'tri', ar:'مُؤْمِنٌ بِسِرِّكُمْ وَجَهْرِكُمْ', fr:'je crois en ce qui est caché et en ce qui est apparent de vous,'},
        {t:'tri', ar:'وَظاهِرِكُمْ وَباطِنِكُمْ', fr:'en ce qui est manifeste et ce qui est secret,'},
        {t:'tri', ar:'لَعَنَ اللهُ اَعْداءَكُمْ مِنَ الاَْوَّلينَ وَالاْخِرينَ', fr:'que la malédiction de Dieu soit sur vos ennemis des premiers aux derniers,'},
        {t:'tri', ar:'وَاَنـَا أبْرَأُ اِلَى اللهِ تَعالى مِنْهُم', fr:'je les désavoue devant Dieu.'},
        {t:'tri', ar:'يا مَوْلايَ يا اَبا مُحَمَّد', fr:'Ô maître ! Ô Abā Muḥammad !'},
        {t:'tri', ar:'يا مَوْلايَ يا اَبا عَبْدِ اللهِ', fr:'Ô maître ! Ô Abā ʿAbdillāh !'},
        {t:'tri', ar:'هذا يَوْمُ الاِْثْنَيْنِ وَهُوَ يَوْمُكُما وَبِاسْمـِكُما', fr:'En ce jour du Lundi, qui est votre jour et en vos noms,'},
        {t:'tri', ar:'وَاَنـَا فيهِ ضَيْفُكُما فَاَضيفانى وَاَحْسِنا ضِيافَتى', fr:'je suis votre invité, accueillez-moi et faites-moi bon accueil,'},
        {t:'tri', ar:'فَنِعْمَ مَنِ اسْتُضيفَ بِهِ اَنْتُما', fr:'heureux est celui qui est votre invité,'},
        {t:'tri', ar:'وَاَنـَا فيهِ مِنْ جِوارِكُما فَاَجيرانى', fr:'je suis en votre proximité, protégez-moi,'},
        {t:'tri', ar:'فَاِنَّكُما مَأْمُورانِ بِالضِّيافَةِ وَالاِْجارَةِ', fr:'vous êtes enjoint à l\'hospitalité et la protection.'},
        {t:'tri', ar:'فَصَلَّى اللهُ عَلَيْكُما وَآلِكُمَا الطَّيِّبينَ.', fr:'Que Dieu vous bénisse ainsi que vos proches les bienfaisants.'},
        {t:'instruction', tx:'Ziyāra de Fāṭima Zahrā (as)'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكِ يا مُمْتَحَنَةُ امْتَحَنَكِ الَّذى خَلَقَكِ', fr:'Que la paix soit sur toi, ô Éprouvée, tu fus affligée par Celui qui t\'a créé,'},
        {t:'tri', ar:'فَوَجَدَكِ لِمَا امْتَحَنَكِ صابِرَةً،', fr:'Il t\'a trouvé patiente lorsqu\'Il t\'a éprouvée,'},
        {t:'tri', ar:'اَنَا لَكِ مُصَدِّقٌ صابِرٌ عَلى ما اَتى بِهِ اَبُوكِ وَوَصِيُّهُ', fr:'je crois en ta vérité et j\'endure devant ce que ton père et son mandataire ont transmis,'},
        {t:'tri', ar:'صَلَواتُ اللهِ عَلَيْهِما', fr:'que les prières de Dieu soient sur eux,'},
        {t:'tri', ar:'وَاَنَا أَسْأَلُكِ اِنْ كُنْتُ صَدَّقْتُكِ إلاّ اَلْحَقْتِنى بِتَصْديقى لَهُما', fr:'je te demande si ma loyauté est agréée, de la rallier à ma loyauté envers eux,'},
        {t:'tri', ar:'لِتُسَرَّ نَفْسى فَاشْهَدى اَنّى ظاهِرٌ بِوَلايَتِكِ', fr:'afin que mon âme se réjouisse, témoigne de mon allégeance manifeste pour toi,'},
        {t:'tri', ar:'وَوَلايَةِ آلِ بَيْتِكِ صَلَواتُ اللهِ عَلَيْهِمْ اَجْمَعينَ.', fr:'ainsi que de mon allégeance pour les gens de ta famille, que les prières de Dieu soient sur eux tous.'},
      ]
    },
    's21': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "21. Lorsqu'un fait est attristant",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lorsqu'un fait l'attristait et que les péchés le préoccupaient",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائهِ عليْهِ السَّلامُ إذا حزنهُ أمْرَ وأهمَتْهُ الْخطايا", tr:"", fr:"La vingt et unième supplication: quand quelque chose l’attristait, et des offenses l’inquiétaient"},
        {t:'tri', ar:"اللَّهُمَّ يَا كَافِيَ الْفَرْدِ الضَّعِيف", tr:"allâhumma yâ kâfiya alfardi adda îfi", fr:"Ô Celui qui protège le faible individu,"},
        {t:'tri', ar:"وَوَاقِيَ الأَمْرِ الْمَخُوفِ", tr:"wa wâqiya al-amri almakhûfi", fr:"et qui es Protecteur contre les catastrophes et les évènements sinistres!"},
        {t:'tri', ar:"أَفْرَدَتْنِي الْخَطَايَا فَلَاَ صَاحِبَ مَعِي", tr:"afradatni alkhațâyâ falâ sâhiba ma i", fr:"Des méfaits m’ont isolés, et je n’ai personne pour mon compagnon."},
        {t:'tri', ar:"وَضَعُفْتُ عَنْ غَضَبِكَ فَلاَ مُؤَيِّدَ لِي", tr:"wa da ‘uftu ‘an ghadabika falâ mu’ayyida lî", fr:"Sachant Ta Colère, je suis devenu très faible, et personne ne me console."},
        {t:'tri', ar:"وَأَشْرَفْتُ عَلَى خَوْفِ لِقَائِكَ فَلَاَ مُسَكِّنَ لِرَوْعَتِي", tr:"wa achraftu ‘alâ khawfi liqâ’ika fala musakkina liraw ati", fr:"Je me suis approché de la terreur de Te rencontrer, et il n’y a rien qui puisse calmer ma peur."},
        {t:'tri', ar:"وَمَنْ يُؤْمِنُنِي مِنْكَ وَأَنْتَ أَخَفْتَنِي؟", tr:"wa man yu’minuni minka wa anta akhaftani", fr:"Qui pourrait me sauvegarder de Toi, quand Tu m’as effrayé?"},
        {t:'tri', ar:"وَمَنْ يُسَاعِدُنِي وَأَنْتَ أَفْرَدْتَنِي؟", tr:"wa man yusâ idunî wa anta afradtani", fr:"Qui pourrait me venir en aide, quand Tu m’as isolé?"},
        {t:'tri', ar:"وَمَنْ يُقَوِّينِي وَأَنْتَ أَضْعَفْتَنِي؟", tr:"wa man yuqawwini wa anta ad’ aftani", fr:"Qui pourrait me fortifier quand Tu m’as affaibli?"},
        {t:'tri', ar:"لاَ يُجِيرُ يَا إِلَهِي إِلاَّ رَبُّ عَلَى مَرْبُوبِ", tr:"lâ yujîru ya ilâhi illâ rabbun ‘alâ marbûbin", fr:"Personne ne pourrait accorder de refuge à un esclave, à part son seigneur, mon Dieu!"},
