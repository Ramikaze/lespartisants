        {t:'tri', ar:"وَدَعَوْكَ بِأَمْرِكَ", tr:"wa da’awka bi- amrika", fr:"et Te supplient de par Ta Commande,"},
        {t:'tri', ar:"وَتَصَدَّقُوا لَكَ طَلَباً لِمَزِيدِكَ", tr:"wa taşaddaqû laka țalaban limazidika", fr:"et donnent des aumônes, pour recevoir le surplus de Ta Générosité;"},
        {t:'tri', ar:"وَفِيهَا كَانَتْ نَجَاتُهُمْ مِنْ غَضَبِكَ", tr:"wa fihâ kânat najâtuhum min ghadabika", fr:"Et dans tout cela réside leur délivrance de Ta Colère,"},
        {t:'tri', ar:"وَفَوْزُهُمْ بِرِضَاكَ", tr:"wa fawzuhum biridâka", fr:"et leur succès d’atteindre Ton Bon Plaisir."},
        {t:'tri', ar:"وَلَوْ دَلَّ مَخْلُوقٌ مَخْلُوقًا مِنْ نَفْسِهِ", tr:"wa law dalla makhlûqun makhlüqan min nafsihi", fr:"Et si une créature existait qui dirigeait une autre créature vers le droit chemin,"},
        {t:'tri', ar:"عَلَى مِثْلِ الَّذِي دَلَلْتَ عَلَيْهِ عِبَادَكَ مِنْكَ", tr:"alâ mithli alladhî dalalta ‘alayhî ‘ibâdaka minka", fr:"comme ce que Tu fais pour Tes serviteurs,"},
        {t:'tri', ar:"كَانَ مَوْصُوفًا بِالإِحْسَانِ", tr:"kâna mawşûfan bil- ihsâni", fr:"elle serait sans doute digne de Ta Générosité,"},
        {t:'tri', ar:"وَمَنْعُوتاً بِالإمْتِنَانِ", tr:"wa man’ûtan bilimtinâni", fr:"et serait qualifiée de bonne,"},
        {t:'tri', ar:"وَمَحْمُوداً بِكُلِّ لِسَانٍ", tr:"wa mahmûdan bikulli lisânin", fr:"et louée en toutes les langues."},
        {t:'tri', ar:"فَلَكَ الْحَمْدُ مَا وُجِدَ فِي حَمْدِكَ مَذْهَبٌ", tr:"falaka alhamdu mâ wujida fi hamdika madhhabun", fr:"Louange appartient à Toi, aussi longtemps qu’existe une voie pour Te glorifier,"},
        {t:'tri', ar:"وَمَا بَقِي لِلْحَمْدِ لَفْظٌ تُحْمَدُ بِهِ", tr:"wa mâ baqiya lilhamdi lafzun tuhmadu bihî", fr:"et des mots et des expressions par lesquels Tu sois loué,"},
        {t:'tri', ar:"وَمَعْنًى يَنْصَرِفُ إِلَيْهِ", tr:"wa ma’nan yanşarifu ilayhi", fr:"et des sens qui soient utilisés en louange de Toi!"},
        {t:'tri', ar:"يَا مَنْ تَحَمَّدَ إِلَى عِبَادِهِ بِالإِحْسَانِ وَالْفَضْلِ", tr:"yâ man tahammada ilâ ‘ibâdihî bil-ihsâni walfadli", fr:"Ô Celui qui se montre Louable envers Ses serviteurs, de par la Bienfaisance et la Générosité,"},
        {t:'tri', ar:"وَغَمَرَهُمْ بِالْمَنِّ وَالطَّوْلِ", tr:"wa ghamarahum bilmanni wattawli", fr:"en les innondant de Bonté et de Grâce (Miséricorde)"},
        {t:'tri', ar:"مَا أَفْشَى فِينَا نِعْمَتَكَ!", tr:"mâ afchâ fina ni’ mataka", fr:"Combien Ta Faveur a été distribuée parmi nous,"},
        {t:'tri', ar:"وَأَسْبَغَ عَلَيْنَا مِنَّتَكَ!", tr:"wa asbagha ‘alaynâ minnataka", fr:"et Ta Tendresse offerte à nous en profusion,"},
        {t:'tri', ar:"وَأَخَصَّنَا بِبِرِّكَ!", tr:"wa akhaşşana bibirrika", fr:"et Ta Bonté qui nous appartient tout particulièrement…!"},
        {t:'tri', ar:"هَدَيْتَنَا لِدِينِكَ الَّذِي اصْطَفَيْتَ", tr:"hadaytanå lidînika alladhi iştafayta", fr:"Tu nous as guidés vers Ta Religion"},
        {t:'tri', ar:"وَمِلَّتِكَ الَّتِي ارْتَضَيْتَ", tr:"wa millatika allati irtadayta", fr:"et à Ta Croyance louable,"},
        {t:'tri', ar:"وَسَبِيلِكَ الَّذِي سَهَّلْتَ", tr:"wa sabilika alladhi sahhalta", fr:"et à Ta Voie, dont Tu as facilité la traversée,"},
        {t:'tri', ar:"وَبَصَّرْتَنَا الزُّلْفَةَ لَدَيْكَ", tr:"wa başşartana azzulfata ladayka", fr:"et nous as faits percevoir le moyen (la voie) de rapprocher à Ta Personne,"},
        {t:'tri', ar:"وَالْوُصُولَ إِلَى كَرَامَتِكَ", tr:"walwușûla ilâ karâmatika", fr:"et atteindre Ta Générosité!"},
        {t:'tri', ar:"اللَّهُمَّ وَأَنْتَ جَعَلْتَ مِنْ صَفَايَا تِلْكَ الْوَظَائِفِ", tr:"allâhumma wa anta ja’ alta min șafâyâ tilka alwazâ’ifi", fr:"Ô Dieu! Tu as désigné parmi les meilleurs de ces devoirs,"},
        {t:'tri', ar:"وَخَصَائِصِ تِلْكَ الْفُرُوضِ", tr:"wa khaşâ’iși tilka alfurúdi", fr:"et parmi les obligations les plus spéciales:"},
        {t:'tri', ar:"شَهْرَ رَمَضَانَ الَّذِي اخْتَصَصْتَهُ مِنْ سَائِرِ الشُّهُورِ", tr:"chahra ramadâna alladhi ikhtaşaştahû min sâ’iri achchuhûri", fr:"le mois de Ramadan! Tu l’as particularisé aux autres mois,"},
        {t:'tri', ar:"وَتَخَيَّرْتَهُ مِنْ جَمِيعِ الأَزْمِنَةِ وَالدُّهُورِ", tr:"wa takhayyartahû min jamî’i al- azminati wadduhûri", fr:"Tu l’as choisi parmi tous les temps et tous les âges,"},
        {t:'tri', ar:"وَآثَرْتَهُ عَلَى كُلِّ أَوْقَاتِ السَّنَةِ", tr:"wa âthartahû ‘alâ kulli awgâti assanati", fr:"et l’as préféré à tous les autres temps de l’année,"},
        {t:'tri', ar:"بِمَا أَنْزَلْتَ فِيهِ مِنَ الْقُرْآنِ وَالنُّورِ", tr:"bimâ anzalta fihi min alqur’âni wannûri", fr:"à cause du Coran et de la Lumière que Tu as faits descendre dans ce mois,"},
        {t:'tri', ar:"وَضَاعَفْتَ فِيهِ مِنَ الْإِيمَانِ", tr:"wa dâ’ afta fihi min al-imâni", fr:"et par la foi que Tu as multipliée dans ce mois,"},
        {t:'tri', ar:"وَفَرَضْتَ فِيهِ مِنَ الصِّيَامِ", tr:"wa faradta fihî min aşşiyâmi", fr:"et par le jeûne que Tu as décreté dans ce mois,"},
        {t:'tri', ar:"وَرَغَّبْتَ فِيهِ مِنَ الْقِيَامِ", tr:"wa raghghabta fihi min alqiyâmi", fr:"et par la veille que Tu as exhorté,"},
        {t:'tri', ar:"وَأَجْلَلْتَ فِيهِ مِنْ لَيْلَةِ الْقَدْرِ", tr:"wa ajlalta fihi min laylati alqadri", fr:"et par la ‘Nuit qui décrète les Destins,’ que Tu as révérée dans ce mois,"},
        {t:'tri', ar:"اَلَّتِي هِيَ خَيْرٌ مِنْ أَلْفِ شَهْرٍ", tr:"allati hiya khayrun min alfi chahrin", fr:"comme étant la nuit qui est meilleure que mille mois!"},
        {t:'tri', ar:"ثُمَّ آثَرْتَنَا بِهِ عَلَى سَائِرِ الأُمَمِ", tr:"thumma âthartanâ bihî ‘alâ sâ’iri al- umami", fr:"Donc de par ce mois, Tu nous as préférés à d’autres communautés,"},
        {t:'tri', ar:"وَاصْطَفَيْتَنَا بِفَضْلِهِ دُونَ أَهْلِ الْمِلَلِ", tr:"waştafaytana bifadlihî dûna ahli almilali", fr:"et de par son mérite, Tu nous as choisis et préférés aux autres croyants,"},
        {t:'tri', ar:"فَصُمْنَا بِأَمْرِكَ نَهَارَهُ وَقُمْنَا بِعَوْنِكَ لَيْلَهُ", tr:"faşumnâ bi-amrika nahârahu wa qumnâ bi’ awnika laylahu", fr:"nous avons jeûné ses journées, et avec Ton Aide, nous sommes restés debout en prière dans ses heures nocturnes,"},
        {t:'tri', ar:"مُتَعَرِّّضِينَ بصِيَامِهِ وَقِيَامِهِ لِمَا عَرَّضْتَنَا لَهُ مِنْ رَحْمَتِكَ", tr:"muta ‘arridina bişiyâmihî wa giyâmihî limâ ‘arradtanâ lahû min rahmatika", fr:"en nous présentant avec son jeûne, et l’action de rester en prière, en nous exposant à Ton Indulgence,"},
        {t:'tri', ar:"وَتَسَبَّبْنَا إِلَيْهِ مِنْ مَثُوْبَتِكَ", tr:"wa tasabbabnâ ilayhi min mathûbatika", fr:"que Tu as mis à notre porteé, et nous avons trouvé de par ce mois, le moyen d’atteindre à Ta Récompense."},
        {t:'tri', ar:"وَأَنْتَ الْمَلِيءُ بِمَا رُغِبَ فِيهِ إِلَيْكَ", tr:"wa anta almalf’u bimâ rughiba fihî ilayka", fr:"Et Tu es Puissant à nous accorder tout ce qui a été demandé et prié de Toi,"},
        {t:'tri', ar:"الْجَوَادُ بِمَا سُئِلْتَ مِنْ فَضْلِكَ", tr:"aljawâdu bimâ su’ilta min fadlika", fr:"et Munificent envers tout ce qui a été demandé de Ta Générosité."},
        {t:'tri', ar:"الْقَرِيبُ إِلَى مَنْ حَاوَلَ قُرْبَكَ", tr:"alqaribu ilâ man hâwala qurbaka", fr:"et près de celui qui s’acharne à se trouver rapproché de Toi."},
        {t:'tri', ar:"وَقَدْ أَقَامَ فِينَا هَذَا الشَّهْرُ مَقَامَ حَمْدٍ", tr:"wa qad aqâma finâ hadhâ achchahru maqâma hamdin", fr:"Et en vérité ce mois est resté distingué parmi nous, dans une place spéciale de louange,"},
        {t:'tri', ar:"وَصَحِبَنَا صُحْبَةَ مَبْرُورٍ", tr:"wa șahibanâ şuhbata mabrûrin", fr:"et nous a parus comme un compagnon admirable et approuvé,"},
        {t:'tri', ar:"وَأَرْبَحَنَا أَفْضَلَ أَرْبَاحِ الْعَالَمِينَ", tr:"wa arbahanâ afdala arbâhi al’âlamîna", fr:"et nous a faits don de tous les profits des hommes de ce monde"},
        {t:'tri', ar:"ثَمَّ قَدْ فَارَقَنَا عِنْدَ تَمَامِ وَقْتِهِ", tr:"thumma qad fâraqanâ ‘inda tamâmi waqtihî", fr:"Ensuite il s’est séparé de nous, au terme de sa durée,"},
        {t:'tri', ar:"وَانْقِطَاعِ مُدَّتِهِ وَوَفَاءِ عَدَدِهِ", tr:"wangițâ i muddatihî wa wafai ‘adadihi", fr:"et par l’interruption de son temps et laccomplissement de ses nombres."},
        {t:'tri', ar:"فَنَحْنُ مُوَدِّعُوهُ وَدَاعَ مَنْ عَزَّ فِرَاقُهُ عَلَيْنَا", tr:"fanahnu muwaddi’ûhu wadâ’a man ‘azza firâquhû ‘alaynâ", fr:"Ainsi nous lui disons adieu: avec l’adieu de celui dont ladite séparation lui est très pénible;"},
        {t:'tri', ar:"وَغَمَّنَا وَأَوْحَشَنَا انْصِرَافهُ عَنَّا", tr:"wa ghammanâ wa awhachanâ inşirâfhû ‘annâ", fr:"et dont le départ nous attriste et nous chagrine,"},
        {t:'tri', ar:"وَلَزِمَنَا لَهُ الذِّمَامُ الْمَحْفُوظُ", tr:"wa lazimanâ lahu adhdhimâmu almahfüzu", fr:"et nous a laissés dans une solitude terrible,"},
        {t:'tri', ar:"وَالْحُرْمَةُ الْمَرْعِيَّةُّ وَالْحَقُّ الْمَقْضِيُّ", tr:"walhurmatu almar iyyatu walhaqqu almaqdiyyu", fr:"et il nous faut veiller à sauvegarder le contrat qu’il a avec nous, son respect bien inviolable, son droit bien honoré."},
        {t:'tri', ar:"فَنَحْنُ قَائِلُونَ:", tr:"fanahnu qâ’ilûna", fr:"Ainsi nous disons:"},
        {t:'tri', ar:"السَّلامُ عَلِيكَ يَا شَهْرَ اللَّهِ الأَكْبَرَ", tr:"assalâmu ‘alayka yâ chahra allâhi al- akbara", fr:"que la paix soit avec toi, ô le plus grand mois de Dieu!"},
        {t:'tri', ar:"وَيَا عِيدَ أَوْلِيَائِهِ", tr:"wa yâ ‘îda awliya ihi", fr:"Ô Fête des fidèles amis de Dieu"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ يَا أَكْرَمَ مَصْحُوبٍ مِنَ الأَوْقَاتِ", tr:"assalâmu ‘alayka ya akrama maşhûbin min al- awqâti", fr:"Que la paix soit avec toi, ô le plus noble compagnon de tout temps!"},
        {t:'tri', ar:"وَيَا خَيْرَ شَهْرٍ فِي الأَيَّامِ وَالسَّاعَاتِ", tr:"wa ya khayra chahrin fil-ayyâmi wassâ âti", fr:"Ô le meilleur des mois dans tous les jours,"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِنْ شَهْرٍ قَرُبَتْ فِيهِ الآمَالُ", tr:"assalâmu ‘alayka min chahrin qarubat fihi al- âmâlu", fr:"et dans toutes les heures! Que la paix soit avec toi, ô le mois dont la réalisation des souhaits y est facilitée,"},
        {t:'tri', ar:"وَنُشِرَتْ فِيهِ الْأَعْمَالُ", tr:"wa nuchirat fihi al- a mâlu", fr:"et les bonnes actions y sont bien répandues et abondantes!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِنْ قَرِينٍ جَلَّ قَدْرُهُ مَوْجُودًا", tr:"assalâmu ‘alayka min qarinin jalla qadruhû mawjûdan", fr:"Que la paix soit avec toi, ô camarade dont le mérite est grand,"},
        {t:'tri', ar:"وَأَفْجَعَ فَقْدُهُ مَفْقُوداً", tr:"wa afjâ a faqduhû mafqûdan", fr:"et l’absence est une disparition douloureuse,"},
        {t:'tri', ar:"وَمَرْجُوٍّ آلَمَ فِرَاقُهُ", tr:"wa marjuwwin âlama firâquhu", fr:"Ô cause de réjouissance qui, en s’écoulant nous inflige une douleur violente!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِنْ أَلِيفٍ آنَسَ مُقْبِلاً فَسَرَّ", tr:"assalâmu ‘alayka min alîfin ânasa muqbilan fasarra", fr:"Que la paix soit avec toi, ô intime compagnon, qui nous as bien confortés en arrivant,"},
        {t:'tri', ar:"وَأَوْحَشَ مُنْقَضِيَا فَمَضَّ", tr:"wa awhacha mungadiyan famadda", fr:"et en nous rendant heureux, et qui laisses la solitude en partant, en produisant l’angoisse!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِنْ مُجَاوِرٍ", tr:"assalâmu ‘alayka min mujâwirin", fr:"Je te salue, voisin dont le voisinage"},
        {t:'tri', ar:"رَقَّتْ فِيهِ الْقُلُوبُ", tr:"raqqat fihi alqulûbu", fr:"rend les coeurs tendres,"},
        {t:'tri', ar:"وَقَلَّتْ فِيهِ الذُّنُوبُ", tr:"wa qallat fîhi adhdhunûbu", fr:"et diminue les péchés!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِن نَاصِرٍ أَعَانَ عَلَى الشَّيْطَانِ", tr:"assalâmu ‘alayka min nâşirin a ‘âna ‘alâ achchaytâni", fr:"Je te salue, ô assistant secourable, qui nous aidas dans notre combat contre Satan,"},
        {t:'tri', ar:"وَصَاحِبَ سَهَّلَ سُبُلَ الإِحْسَانِ", tr:"wa şâhibin sahhala subula al-ihsâni", fr:"compagnon qui facilitas les voies de la bienveillance!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مَا أَكْثَرَ عُتَقَاءَ اللَّهِ فِيكَ", tr:"assalâmu ‘alayka mâ akthara ‘utaqâ’a allâhi fika", fr:"Je te salue, ô combien sont abondants le nombre les libérés de Dieu en toi,"},
        {t:'tri', ar:"وَمَا أَسْعَدَ مَنْ رَعَى حُرْمَتَكَ بِكَ", tr:"wa mâ as ada man ra’â hurmataka bika", fr:"Ô combien sont heureux ceux qui observèrent le respect dû à toi!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مَا كَانَ أَمْحَاكَ لِلذُّنُوبِ", tr:"assalâmu ‘alayka mâ kâna amhâka lidhdhunâbi", fr:"Je te salue, toi qui as effacé combien de péchés!"},
        {t:'tri', ar:"وَأَسْتَرَكَ لأَنْوَاعِ الْعُيُوبِ", tr:"wa astaraka li- anwâ i al’uyûbi", fr:"Ô toi qui as voilé combien de fautes, de toutes sortes,"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مَا كَانَ أَطْوَلَكَ عَلَى الْمُجْرِمِينَ", tr:"assalâmu ‘alayka mâ kâna ațwalaka ‘alâ almujrimîna", fr:"Je te salue, ô combien long étais-tu pour les pécheurs!"},
        {t:'tri', ar:"وَأَهْيَبَكَ فِي صُدُورِ الْمُؤْمِنِينَ", tr:"wa ahyabaka fi şudûri almu’minîna", fr:"Ô combien redoutable étais-tu dans les coeurs des fidèles!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِنْ شَهْرٍ لا تُنَافِسُهُ الأَيَّامُ", tr:"assalâmu ‘alayka min chahrin lâ tunâfisuhu al- ayyâmu", fr:"Je te salue, ô mois qu’aucun autre temps ne le rivalise!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِنْ شَهْرٍ هُوَ مِنْ كُلِّ أَمْرٍ سَلاَمٌ", tr:"assalâmu ‘alayka min chahrin huwa min kulli amrin salâmun", fr:"Je te salue, ô mois où pendant ta durée, toute affaire est en paix et salut!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ غَيْرَ كَرِيهِ الْمُصَاحَبَةِ", tr:"assalâmu ‘alayka ghayra karihi almuşâhabati", fr:"Je te salue, ô mois dont la compagnie n’est pas déplue"},
        {t:'tri', ar:"وَلَاَ ذَمِيمِ الْمُلاَبَسَةِ", tr:"wa lâ dhamîmi almulâbasati", fr:"et dont l’amitié n’est pas désapprouvée (blâmée)!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ كَمَا وَفَدْتَ عَلَيْنَا بِالْبَرَكَاتِ", tr:"assalâmu ‘alayka kamâ wafadta ‘alaynâ bilbarakâti", fr:"Je te salue, toi qui, à ton arrivée nous apportas des bénédictions,"},
        {t:'tri', ar:"وَغَسَلْتَ عَنَّا دَنَسَ الْخَطِيئَاتِ", tr:"wa ghasalta ‘annâ danasa alkhați’âti", fr:"et nous essuyas toutes les souillures des péchés!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ غَيْرَ مُوَدَّعٍ بَرَماً", tr:"assalâmu ‘alayka ghayra muwadda’in baraman", fr:"Je te salue, ô celui qui au moment de la séparation, on ne lui dit adieu qu’avec ennui,"},
        {t:'tri', ar:"وَلَاَ مَتْرُوكٍ صِيَامُهُ سَأَماً", tr:"wa lâ matrûkin șiyâmuhû sa’aman", fr:"et dont on quitte le jeûne sans aucune lassitude!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مِنْ مَطْلُوبِ قَبْلَ وَقْتِهِ", tr:"assalâmu ‘alayka min mațlûbin qabla waqtihi", fr:"Je te salue, ô celui dont on espérait la venue avant son arrivée,"},
        {t:'tri', ar:"وَمَحْزُونٍ عَلَيْهِ قَبْلَ فَوْتِهِ", tr:"wa mahzânin ‘alayhî qabla fawtihi", fr:"et dont on s’attriste de son départ, avant même qu’il soit écoulé!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ كَمْ مِنْ سُوءٍ صُرِفَ بِكَ عَنَّا", tr:"assalâmu ‘alayka kam min sû’in şurifa bika ‘annâ", fr:"Je te salue, ô que de maux ont été détournés de nous, de par ta présence,"},
        {t:'tri', ar:"وَكَمْ مِنْ خَيْرٍ أُفِيضَ بِكَ عَلَيْنَا", tr:"wa kam min khayrin ufida bika ‘alaynâ", fr:"et que biens ont été coulés vers nous, à cause de toi!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ وَعَلَى لَيْلَةِ الْقَدْرِ", tr:"assalâmu ‘alayka wa ‘lâ laylati alqadri", fr:"Je te salue, et aussi la ‘Nuit qui décrète les Destins’"},
        {t:'tri', ar:"الَّتِي هِيَ خَيْرٌ مِنْ أَلْفِ شَهْرٍ", tr:"allati hiya khayrun min alfi chahrin", fr:"qui est bien meilleure que mille mois!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ مَا كَانَ أَحْرَصَنَا بِالأَمْسِ عَلَيْكَ", tr:"assalâmu ‘alayka mâ kâna ahraşanâ bil-amsi ‘alayka", fr:"Je te salue, ô combien étions-nous attachés à toi, hier!"},
        {t:'tri', ar:"وَأَشَدَّ شَوْقَنَا غَداً إِلَيْكَ", tr:"wa achadda chawqan ghadan ilayka", fr:"et combien soupirerons-nous d’envie pour toi, demain!"},
        {t:'tri', ar:"السَّلامُ عَلَيْكَ وَعَلَى فَضْلِكَ الَّذِي حُرِمْنَاهُ", tr:"assalâmu ‘alayka wa ‘alâ fadlika alladhî hurimnâhu", fr:"Je te salue, et aussi ta grâce (abondance), dont nous sommes privées,"},
        {t:'tri', ar:"وَعَلَى مَاضٍ مِنْ بَرَكَاتِكَ سُلِبْنَاهُ", tr:"wa ‘alâ mâdin min barakâtika sulibnâhu", fr:"et tes bénédictions passées qui nous ont été extirpées!"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّا أَهْلُ هَذَا الشَّهْرِ", tr:"allâhumma innâ ahlu hadhâ achchahri", fr:"Ô Dieu! nous sommes les compagnons de ce mois."},
        {t:'tri', ar:"الَّذِي شَرَّفْتَنَا بِهِ", tr:"alladhî charraftanâ bihî", fr:"De par ce mois, Tu nous as ennoblis,"},
        {t:'tri', ar:"وَوَفَّقْتَنَا بِمَنِّكَ لَهُ", tr:"wa waffaqtana bimannika lahû", fr:"et de par Ta Bonté, nous as accordés du succès,"},
        {t:'tri', ar:"حِينَ جَهِلَ الأَشْقِيَاءُ وَقْتَهُ", tr:"hîna jahila al- achqiyâ’u waqtahu", fr:"pendant que des malheureux misérables ont ignoré ton temps,"},
        {t:'tri', ar:"وَحُرِمُوا لِشَقَائِهِمْ فَضْلَهُ", tr:"wa hurimû lichaqâ ihim fadlahu", fr:"et à cause de leur malheur, sont privés de ta grâce,"},
        {t:'tri', ar:"وَأَنْتَ وَلِيُّ مَا آثَرْتَنَا بِهِ مِنْ مَعْرِفَتِهِ", tr:"wa anta waliyyu mâ âthartanâ bihî min ma rifatihî", fr:"Tu es Le Seigneur et Guide, qui nous as choisis et nous accordas le privilège de la connaissance de ce mois,"},
        {t:'tri', ar:"وَهَدَيْتَنَا لَهُ مِنْ سُنَّتِهِ", tr:"wa hadaytanâ lahû min sunnatihi", fr:"et de ses pratiques, prescrites et vers lesquelles Tu nous y as conduis,"},
        {t:'tri', ar:"وَقَدْ تَوَلَّيْنَا بتَوْفِيقِكَ صِيَامَهُ وَقِيَامَهُ عَلَى تَقْصِيرٍ", tr:"wa qad tawallaynâ bitawfiqika şiyâmahû wa qiyâmahû ‘alâ taqsîrin", fr:"De par le succès que Tu nous as accordés, nous avons accompli les règles du jeûne, et le fait de rester debout en prière, mais avec des manques (insuffisances) et des négligences;"},
        {t:'tri', ar:"وَأَدَّيْنَا فِيهِ قَلِيلاً مِنْ كَثِيرٍ", tr:"wa addayna fîhi qalîlan min kathîrin", fr:"Et de beaucoup, nous avons accompli bien peu…!"},
        {t:'tri', ar:"اللَّهُمَّ فَلَكَ الْحَمْدُ إِقْرَاراً بِالإِسَاءَةِ", tr:"allâhumma falaka alhamdu igrâran bil-isâ’ati", fr:"Ô Dieu! Ainsi louange appartient à Toi, en admettant nos mauvaises actions,"},
        {t:'tri', ar:"وَاعْتِرَافاً بِالإِضَاعَةِ", tr:"wa’tirâfan bil- idâ’ ati", fr:"et en confessant notre négligence,"},
        {t:'tri', ar:"وَلَكَ مِنْ قُلُوبِنَا عَقْدُ النَّدَمِ", tr:"wa laka min qulûbinâ ‘aqdu annadami", fr:"et le remord qui s’est noué dans nos coeurs, et notre souhait d’être pardonné,"},
        {t:'tri', ar:"وَمِنْ أَلْسِنَتِنَا صِدْقُ الْإِعْتِذَارِ", tr:"wa min alsinatinâ șidqu ali tidhâri", fr:"qui est prononcé par la sincère demande d’excuse par nos langues."},
        {t:'tri', ar:"فَأْجُرْنَا عَلَى مَا أصَابَنَا فِيهِ مِنَ التَّفْرِيطِ أجْراً", tr:"fa ajurnâ ‘alâ mâ aşâbanâ fihi min attafriți ajran", fr:"Récompense-nous malgré la négligence qui nous accapara dans ce mois,"},
        {t:'tri', ar:"نَسْتَدْرِكُ بِهِ الْفَضْلَ الْمَرْغُوبَ فِيهِ", tr:"nastadriku bihi alfadla almarghûba fihi", fr:"avec une récompense par laquelle nous puissions atteindre la Grâce tant désirée,"},
        {t:'tri', ar:"وَنَعْتَاضُ بِهِ مِنْ أَنْوَاعِ الذُّخْرِ الْمَحْرُوصِ عَلَيْهِ", tr:"wa na tâdu bihî min anwâ’i adhdhukhri almahrûşi ‘alayhi", fr:"et gagner les variétés mises en réserves et tant souhaitées!"},
        {t:'tri', ar:"وَأَوْجِبْ لَنَا عُذْرَكَ عَلَى مَا قَصَّرْنَا فِيهِ مِنْ حَقِّكَ", tr:"wa awjib lanâ ‘udhraka ‘alâ mâ qaşşarna fihi min haqqika", fr:"Accorde-nous Ton Pardon, pour avoir manqué à Ton Droit pendant ce mois,"},
        {t:'tri', ar:"وَابْلُغْ بِأَعْمَارِنَا مَا بَيْنَ أَيْدِينَا", tr:"wablugh bi ‘a’mârinâ mâ bayna aydînâ", fr:"et dans la vie qui est devant nous,"},
        {t:'tri', ar:"مِنْ شَهْرِ رَمَضَانَ الْمُقْبِلِ", tr:"min chahri ramadâna almuqbili", fr:"et fais-nous atteindre la venue du prochain Ramadan!"},
        {t:'tri', ar:"فَإِذَا بَلَّغْتَنَاهُ", tr:"fa idhâ ballaghtanâhu", fr:"Après nous avoir aidés à l’atteindre,"},
        {t:'tri', ar:"فَأَعِنَّا عَلَى تَنَاوُلِ مَا أَنْتَ أَهْلُهُ مِنَ الْعِبَادَةِ", tr:"fa a’innâ ‘alâ tanâwuli mâ anta ahluhû min al’ibâdati", fr:"viens à notre secours, de sorte que nous puissions accomplir une adoration qui Te sera digne,"},
        {t:'tri', ar:"وَأَدِّنَا إِلَى الْقِيَامِ بِمَا يَسْتَحِقُّةُ مِنَ الطَّاعَةِ", tr:"wa addinâ ilâ alqiyâmi bimâ yastahiqquhû min ațtâ’ati", fr:"et quand Tu nous l’as fais atteindre, aide-nous à exécuter l’obéissance que Tu mérites,"},
        {t:'tri', ar:"وَأَجْرِ لَنَا مِنْ صَالِحِ الْعَمَلِ", tr:"wa ajri lanâ min şâlihi al’amali", fr:"et accorde-nous des actions vertueuses"},
        {t:'tri', ar:"مَا يَكونُ دَرَكًا لِحَقِّكَ فِي الشَّهْرَيْنِ مِنْ شُهُورِ الدَّهْرِ", tr:"mâ yakûnu darakan lihaqqika fi achchahrayni min chuhûri addahri", fr:"pour que nous puissions accomplir Ton Bon Droit dans ce mois-ci, et le prochain mois de Ramadan!"},
        {t:'tri', ar:"اللَّهُمَّ وَمَا أَلْمَمْنَا بِهِ فِي شَهْرِنَا هَذَا مِنْ لَمَمٍ أَوْ إِثْمٍ", tr:"allâhumma wa mâ almamnâ bihî fi chahrina hadhâ min lamamin aw ithmin", fr:"Ô Dieu! Et quant aux négligences petites ou grandes que nous avons commises dans ce mois,"},
        {t:'tri', ar:"أَوْ وَاقَعْنَا فِيهِ مِنْ ذَنْبٍ", tr:"aw wâqa nâ fihi min dhanbin", fr:"et les méfaits dans lesquels nous nous y sommes entraînés (tombés),"},
        {t:'tri', ar:"وَاكْتَسَبْنَا فِيهِ مِنْ خَطِيئَةٍ", tr:"waktasabna fihi min khatf’atin", fr:"et les offenses que nous avons commises,"},
        {t:'tri', ar:"عَلَى تَعَمُّدٍ مِنَّا أَوْ عَلَى نِسْيَانٍ", tr:"alâ ta ammudin minnâ aw ‘alâ nisyânin", fr:"intentionnellement ou bien par oubli,"},
        {t:'tri', ar:"ظَلَمْنَا فِيهِ أَنْفُسَنَا", tr:"zalamnâ fîhi anfusanâ", fr:"en faisant du mal à nous-mêmes,"},
        {t:'tri', ar:"أَوِ انْتَهَكْنَا بِهِ حُرْمَةً مِنْ غَيْرِنَا", tr:"aw intahakna bihi hurmatan min ghayrina", fr:"ou bien en violant le respect dû aux autres,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"bénis Mohammad et toute sa Famille,"},
        {t:'tri', ar:"وَاسْتُرْنَا بِسِتْرِكَ", tr:"wasturnâ bisitrika", fr:"et enveloppe-nous dans le voile de Ta Tolérance,"},
        {t:'tri', ar:"وَاعْفُ عَنَّا بِعَفْوِكَ", tr:"wa’fu ‘annâ bi’afwika", fr:"et pardonne-nous de Par Ton Indulgence,"},
        {t:'tri', ar:"وَلاَ تَنْصِبْنَا فِيهِ لأَعْيُنِ الشَّامِتِينَ", tr:"wa lâ tanșibnâ fîhi li-a yuni achchâmitina", fr:"ne nous dresse pas comme une cible, devant les regards avides des malveillants,"},
        {t:'tri', ar:"وَلاَ تَبْسُطْ عَلَيْنَا فِيهِ أَلْسُنَ الطَّاعِنِينَ", tr:"wa lâ tabsut ‘alaynâ fihi alsuna attâ’ inîna", fr:"et n’allonge pas les langues des calomnieuses vers nous,"},
        {t:'tri', ar:"وَاسْتَعْمِلْنَا بِمَا يَكُونُ حِطَّةً وَكَفَّارَةً لِمَا أَنكَرْتَ مِنَّا فِيهِ", tr:"wasta’ milnâ bimâ yakünu hițțatan wa kaffâratan limâ ankarta minnâ fihi", fr:"et emploie-nous dans tout ce qui allègera et fera expier tout ce que Tu désapprouves de nous, dans ce mois,"},
        {t:'tri', ar:"بِرَأْفَتِكَ الَّتِي لاَ تَنْفَدُ", tr:"bira’fatika allati lâ tanfadu", fr:"de par Ta Clémence qui ne tarit point,"},
        {t:'tri', ar:"وَفَضْلِكَ الَّذِي لا يَنْقُصُ", tr:"wa fadlika alladhî lâ yanquşu", fr:"et de par Ta Générosité qui ne se diminue pas!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْبُرْ مُصِيبَتَنَا بِشَهْرِنَا", tr:"wajbur muşîbatanâ bichahrinâ", fr:"et console-nous de la perte qui nous est arrivée par le départ de ce mois,"},
        {t:'tri', ar:"وَبَارِكْ لَنَا فِي يَوْمِ عِيدِنَا وَفِطْرِنَا", tr:"wa bârik lanâ fi yawmi ‘îdinâ wa fitrina", fr:"et bénis-nous en ce jour de fête de ‘Fêtr’"},
        {t:'tri', ar:"وَاجْعَلْهُ مِنْ خَيْرِ يَوْمٍ مَرَّ عَلَيْنَا", tr:"waj’alhû min khayri yawmin marra ‘alaynâ", fr:"et transforme-le au plus beau jour, parmi les jours que nous avons eus,"},
        {t:'tri', ar:"أَجْلَبِهِ لِعَفْوٍ وَأَمْحَاهُ لِذَنْبٍ", tr:"ajlabihî li afwin wa amhâhu lidhanbin", fr:"et Ton Pardon comme le plus attirant, et celui qui efface le plus, nos péchés,"},
        {t:'tri', ar:"وَاغْفِرْ لَنَا مَا خَفِيَ مِنْ ذُنُوبِنَا وَمَا عَلَنَ", tr:"waghfir lanâ mâ khafiya min dhunûbinâ wa mâ ‘alana", fr:"et pardonne nos péchés, que’ils soient voilés ou dévoilés!"},
        {t:'tri', ar:"اللَّهُمَّ اسْلَخْنَا بِانْسِلاَخِ هَذَا الشَّهْرِ مِنْ خَطَايَانَا", tr:"allâhumma islakhnâ binsilâkhi hadhâ achchahri min khatâyânâ", fr:"Ô Dieu! avec l’écoulement de ce mois, dépouille nos esprits des péchés"},
        {t:'tri', ar:"وَأَخْرِجْنَا بِخُرُوجِهِ مِنْ سَيِّئَاتِنَا", tr:"wa akhrijnâ bikhurûjihi min sayyi’âtinâ", fr:"et des offenses, et avec son départ, fais-nous sortir de nos perfidies,"},
        {t:'tri', ar:"وَاجْعَلْنَا مِنْ أَسْعَدِ أَهْلِهِ بِهِ", tr:"waj’ alnâ min as’adi ahlihî bihi", fr:"et de par la bénédiction de ce mois,"},
        {t:'tri', ar:"وَأَجْزَلِهِمْ قِسْماً فِيهِ", tr:"wa ajzalihim qisman fihi", fr:"désigne-nous parmi des gens les plus heureux,"},
        {t:'tri', ar:"وَأَوْفَرِهِمْ حَظّاً مِنْهُ", tr:"wa awfarihim hazzan minhu", fr:"parmi ceux dont la part de Ta Grâce est plus abondante!"},
        {t:'tri', ar:"اللَّهُمَّ وَمَنْ رَعَى حَقَّ هَذَا الشَّهْرِ حَقَّ رِعَايَتِهِ", tr:"allâhumma waman ra’â haqqa hadhâ achchahri haqqa ri âyatihi", fr:"Ô Dieu! Quand une personne a observé ce mois, comme il se doit d’être observé,"},
        {t:'tri', ar:"وَحَفِظَ حُرْمَتَهُ حَقَّ حِفْظِهَا", tr:"wa hafiza hurmatahû haqqa hifzihâ", fr:"et a sauvegardé son respect, comme il se doit d’être respecté,"},
        {t:'tri', ar:"وَقَامَ بِحُدُودِهِ حَقَّ قِيَامِهَا", tr:"wa qâma bihudûdihî haqqa qiyâmihâ", fr:"et s’incline comme il se doit devant ses limites,"},
        {t:'tri', ar:"وَاتَّقَى ذُنُوبَهُ حَقَّ تُقَاتِهَا", tr:"wa ittaqâ dhunûbahû haqqa tuqâtihâ", fr:"et a évité les péchés,"},
        {t:'tri', ar:"أَوْ تَقَرَّبَ إِلَيْكَ بِقُرْبَةٍ أَوْجَبَتْ رِضَاكَ لَهُ", tr:"aw taqarraba ilayka biqurbatin awjabat ridâka lahu", fr:"comme ils se doivent d’être évités, ou bien cherche Ton rapprochement avec n’importe quelle bonne action que Tu as inscrite, pour qu’il se rapproche de Toi,"},
        {t:'tri', ar:"وَعَطَفَتْ رَحْمَتَكَ عَلَيْهِ", tr:"wa ‘atafat rahmataka ‘alayhi", fr:"et qui lui vaut Ton Bon Plaisir et incline (dirige) Ta Pitié envers lui,"},
        {t:'tri', ar:"فَهَبْ لَنَا مِثْلَهُ مِنْ وجْدِكَ", tr:"fahab lanâ mithlahû min wujdika", fr:"ainsi accorde-nous de même, de Ta Richesse,"},
        {t:'tri', ar:"وَأَعْطِنَا أَضْعَافَهُ مِنْ فَضْلِكَ", tr:"wa a’tinâ ad’âfahû min fadlika", fr:"et de par Ta Générosité, accorde-nous cela de façon multiple,"},
        {t:'tri', ar:"فَإِنَّ فَضْلَكَ لاَ يَغِيضُ", tr:"fa inna fadlaka lâ yaghîdu", fr:"car Ton Abondance ne diminue jamais,"},
        {t:'tri', ar:"وَإِنَّ خَزَائِنَكَ لاَ تَنْقُصُ بَلْ تَفِيضُ", tr:"wa inna khazâ’inaka lâ tanqușu bal tafidu", fr:"et non seulement Tes Trésors ne se réduisent jamais, mais encore débordent!"},
        {t:'tri', ar:"وَإِنَّ مَعَادِنَ إِحْسَانِكَ لاَ تَفْنَى", tr:"wa inna ma ‘âdina ihsânika lâ tafnâ", fr:"Et les mines de Ta Bienfaisance ne s’épuisent jamais,"},
        {t:'tri', ar:"وَإِنَّ عَطَاءَكَ لَلْعَطَاءُ الْمُهَنَّا", tr:"wa inna ‘ațâ’aka lal’ațâ’u almuhannâ", fr:"et ce que Tu accordes est un don pleinement agréable!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa alihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاكْتُبْ لَنَا مِثْلَ أُجُورِ مَنْ صَامَهُ", tr:"waktub lanâ mithla ujûri man sâmahû", fr:"et inscris pour nous T’équivalent des récompenses de celui qui avait jeûné dans ce mois,"},
        {t:'tri', ar:"أَوْ تَعَبَّدَ لَكَ فِيهِ إِلَى يَوْمِ الْقِيَامَةِ", tr:"aw ta abbada laka fihi ilâ yawmi alqiyâmati", fr:"ou bien qui avait adoré dans ce mois jusqu’au Jour de la Résurrection!"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّا نَتُوبُ إِلَيْكَ فِي يَوْمِ فِطْرِنَا", tr:"allâhumma innâ natübu ilayka fi yawmi fițrina", fr:"Ô Dieu! En ce jour, où nous terminons le jeûne, et que Tu as appointé ce ‘Fêtr’"},
        {t:'tri', ar:"الَّذِي جَعَلْتَهُ لِلْمُؤْمِنِينَ عِيداً وَسُرُوراً", tr:"alladhi ja altahû lilmu’minina ‘îdan wa surûran", fr:"comme une fête et une joie intense pour les croyants"},
        {t:'tri', ar:"وَلَأَهْلِ مِلْتِكَ مَجْمَعاً وَمُحْتَشَداً", tr:"wa li-ahli millatika majma an wa muhtachadan", fr:"et les gens de Ta Religion, et comme une assemblée et une réunion,"},
        {t:'tri', ar:"مِنْ كُلَّ ذَنْبٍ أَذْنَبْنَاهُ", tr:"min kulli dhanbin adhnabnâhu", fr:"et nous nous repentons à Toi de tous les méfaits que nous avons commis,"},
        {t:'tri', ar:"أَوْ سُوءٍ أَسْلَفْنَاهُ", tr:"aw sû’in aslafnâhu", fr:"et de toutes les mauvaises actions durant la vie que nous avons eue,"},
        {t:'tri', ar:"أَوْ خَاطِرِ شَرٍّ أَضْمَرْنَاهُ", tr:"aw khâțiri charrin admarnâhu", fr:"ou bien de toutes mauvaises pensées que nous avons conçues au plus secret de nous-mêmes;"},
        {t:'tri', ar:"تَوْبَةَ مَنْ لاَ يَنْطَوِي عَلَى رُجُوعٍ إِلَى ذَنْبٍ", tr:"tawbata man lâ yanțawi ‘alâ rujû in ilâ dhanbin", fr:"une repentance de celui qui ne pense aucunement à retourner vers le péché,"},
        {t:'tri', ar:"وَلَاَ يَعُودُ بَعْدَهَا فِي خَطِيئَةٍ", tr:"wa lâ ya ‘ûdu ba dahâ fi khati’atin", fr:"et qui après cela, ne retournera point à son offense!"},
        {t:'tri', ar:"تَوْبَةً نَصُوحًا خَلَصَتْ مِنَ الشَّكِّ وَالإرْتِيَابِ", tr:"tawbatan naşûhan khalaşat min achchakki walirtiyâbi", fr:"Une repentance inébranlable et vide de tout doute, et de toute hésitation!"},
        {t:'tri', ar:"فَتَقَبَّلْهَا مِنَّا", tr:"fataqabbalhâ minnâ", fr:"accepte-la de nous,"},
        {t:'tri', ar:"وَارْضَ عَنَّا", tr:"warda ‘annâ", fr:"et Sois content de nous,"},
        {t:'tri', ar:"وَثَبِّتْنَا عَلَيْهَا", tr:"wa thabbitnâ ‘alayha", fr:"et rends-nous fermes et stables dans cette repentance!"},
        {t:'tri', ar:"اللَّهُمَّ ارْزُقْنَا خَوْفَ عِقَابِ الْوَعِيدِ", tr:"allahumma irzugna khawfa ‘igâbi alwa’îdi", fr:"Ô Dieu! pourvois-nous avec la crainte d’une punition menacée,"},
        {t:'tri', ar:"وَشَوْقَ ثَوَابِ الْمَوْعُودِ", tr:"wa chawqa thawâbi almaw’ûdi", fr:"et d’un enthousiasme pour une récompense promise,"},
        {t:'tri', ar:"حَتَّى نَجِدَ لَذَّةَ مَا نَدْعُوكَ بِهِ", tr:"hattâ najida ladhdhata mâ nad üka bihi", fr:"de sorte que nous puissions trouver le plaisir de ce que nous Te supplions,"},
        {t:'tri', ar:"وَكَأْبَةَ مَا نَسْتَجِيرُكَ مِنْهُ", tr:"wa ka’bata mâ nastajiruka minhu", fr:"et le degré de la tristesse pour ce que nous cherchons refuge auprès de Toi!"},
        {t:'tri', ar:"وَاجْعَلْنَا عِنْدَكَ مِنَ التَّوَّابِينَ", tr:"waj’alnâ ‘indaka min attawwâbîna", fr:"Et inscris-nous dans Ton Registre, chez Toi, parmi ceux qui ont repenti:"},
        {t:'tri', ar:"الّذِينَ أَوْجَبْتَ لَهُمْ مَحَبَّتَكَ", tr:"alladhina awjabta lahum mahabbataka", fr:"ceux pour lesquels Tu as rendu Ton Amour obligatoire,"},
        {t:'tri', ar:"وَقَبِلْتَ مِنْهُمْ مُرَاجَعَةَ طَاعَتِكَ", tr:"wa qabilta minhum murâja ata tâ* atika", fr:"et dont Tu as accepté leur retour vers Ton Obéissance!"},
        {t:'tri', ar:"يَا أَعْدَلَ الْعَادِلِينَ", tr:"yâ a dala al’âdilîna", fr:"Ô Le plus Juste des justes."},
        {t:'tri', ar:"اللَّهُمَّ تَجَاوَزْ عَنْ آبَائِنَا وَأُمَّهَاتِنَا", tr:"allâhumma tajâwaz an âbâ’inâ wa ummahâtinâ", fr:"Ô Dieu! Montre Ton Indulgence envers nos pères et nos mères,"},
        {t:'tri', ar:"وَأهْلِ دِينِنَا جَمِيعاً", tr:"wa ahli dîninâ jami an", fr:"et tous les gens de notre religion:"},
        {t:'tri', ar:"مَنْ سَلَفَ مِنْهُمْ وَمَنْ غَبَرَ إِلَى يَوْمِ الْقِيَامَةِ", tr:"man salafa minhum wa man ghabara ilâ yawmi alqiyâmati", fr:"ceux qui nous ont précédés dans la mort, et ceux qui viendront jusqu’au Jour de la Résurrection"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ نَبِيِّنَا وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin nabiyyinâ wa âlihî", fr:"Ô Dieu! Bénis Mohammad, notre Prophète et toute sa Famille,"},
        {t:'tri', ar:"كَمَا صَلَّيْتَ عَلَى مَلاَئِكَتِكَ الْمُقَرَّبِينَ", tr:"kamâ șallayta ‘alâ malâ’ikatika almuqarrabîna", fr:"comme Tu as béni Tes Anges qui sont rapprochés de Toi,"},
        {t:'tri', ar:"وَصَلِّ عَلَيْهِ وَآلِهِ", tr:"wa șalli ‘alayhî wa âlihi", fr:"Bénis-le et toute sa Famille,"},
        {t:'tri', ar:"كَمَا صَلَّيْتَ عَلَى أَنْبِيَائِكَ الْمُرْسَلِينَ", tr:"kamâ șallayta ‘alâ anbiyâ’ika almursalina", fr:"comme Tu as béni tous les Prophètes que Tu envoyas ici-bas,"},
        {t:'tri', ar:"وَصَلِّ عَلَيْهِ وَآلِهِ", tr:"wa şalli ‘alayhi", fr:"Bénis-le et toute sa Famille,"},
        {t:'tri', ar:"كَمَا صَلَّيْتَ عَلَى عِبَادِكَ الصَّالِحِينَ", tr:"wa âlihî kamâ șallayta ‘alâ «  »ibâdika aşşâlihîna", fr:"comme Tu as béni tous Tes serviteurs vertueux,"},
        {t:'tri', ar:"وَأَفْضَل مِنْ ذَلِكَ يَا رَبَّ الْعَالَمِينَ", tr:"wa afdala min dhâlika yâ rabba al’âlamîna", fr:"même meilleur que de tout cela, Ô Seigneur des mondes!"},
        {t:'tri', ar:"صَلاَةً تَبْلُغُنَا بَرَكَتُهَا", tr:"şalâtan tablughunâ barakatuhâ", fr:"Une grâce dont la bénédiction nous atteigne,"},
        {t:'tri', ar:"وَيَنَالُنَا نَفْعُهَا", tr:"wa yanâlunâ naf uhâ", fr:"et le gain nous accede,"},
        {t:'tri', ar:"وَيُسْتَجَابُ لَهَا دُعَاؤُنَا", tr:"wa yustajâbu lahâ du’â’unâ", fr:"et par laquelle notre supplication sera exaucée!"},
        {t:'tri', ar:"إِنَّكَ أَكْرَمُ مَنْ رُغِبَ إِلَيْهِ", tr:"innaka akramu man rughiba ilayhi", fr:"Tu es la plus Généreux de tous les généreux,"},
        {t:'tri', ar:"وَأَكْفَى مَنْ تُوكِّلَ عَلَيْهِ", tr:"wa akfâ man tuwukkila ‘alayhi", fr:"Le plus Confiant, Le plus Capable, Le plus Suffisant"},
        {t:'tri', ar:"وَأَعْطَى مَنْ سُئِلَ مِنْ فَضْلِهِ", tr:"wa a’tâ man su’ila min fadlihi", fr:"et Le plus Gratifiant parmi ceux à qui on demande la Générosité et la Grâce,"},
        {t:'tri', ar:"وَأَنتَ عَلَى كُلِّ شَيءٍ قَدِيرٌ.", tr:"wa anta ‘alâ kulli chay’in qadirun", fr:"et Tu es Puissant sur tout, et pour tout!"},
        {t:'salawat'},
      ]
    },
    's51': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "51. Imploration et Humiliation",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation dans l'imploration et l'humiliation",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وَكَانَ مِنْ دُعَائِهِ عَلَيْهِ السَّلَامُ فِي التّضْرُّعِ والإسْتِكانةِ", tr:"", fr:"La cinquante et unième supplication: en plaidant à propos de l’humiliation et de la soumission"},
        {t:'tri', ar:"إِلَهِي أَحْمَدُكَ وَأَنْتَ لِلْحَمْدِ أَهْلٌ", tr:"ilâhî ahmaduka wa anta lilhamdi ahlun", fr:"Mon Dieu! Je Te loue, et Tu mérites sûrement la louange,"},
        {t:'tri', ar:"عَلَى حُسْنِ صَنِيعِكَ إِلَيَّ", tr:"alâ husni şanî’ika ilayya", fr:"pour Ta Bienveillance envers moi,"},
        {t:'tri', ar:"وَسُبُوغِ نَعْمَائِكَ عَلَيَّ", tr:"wa subûghi na’mâ’ika ‘alayya", fr:"et la Largesse de Tes Faveurs envers moi,"},
        {t:'tri', ar:"وَجَزِيلِ عَطَائِكَ عِنْدِي", tr:"wa jazîli ‘ațâ’ika ‘indî", fr:"et Tes Donations abondantes pour moi,"},
        {t:'tri', ar:"وَعَلَى مَا فَضَّلْتَنِي مِنْ رَحْمَتِكَ", tr:"wa ‘alâ mâ faddaltani min rahmatika", fr:"et pour avoir montré Ta Provision, par Ta Pitié,"},
        {t:'tri', ar:"وَأَسْبَغْتَ عَلَيَّ مِنْ نِعْمَتِكَ", tr:"wa asbaghta *alayya min ni’matika", fr:"et la Largesse que Tu me montres pour Tes Faveurs."},
        {t:'tri', ar:"فَقَدِ اصْطَنَعْتَ عِنْدِي مَا يَعْجِزُ عَنْهُ شُكْرِي", tr:"faqad iştana’ta ‘indi mâ ya jizu ‘anhu chukri", fr:"Tu as toujours bien agi envers moi, de telle sorte que je suis véritablement incapable de Te rendre grâce"},
        {t:'tri', ar:"وَلَوْلا إِحْسَانُكَ إِلَيَّ", tr:"wa lawlâ ihsânuka ilayya", fr:"et de Te remercier Si ce n’était pour Ta Bienveillance envers moi,"},
        {t:'tri', ar:"وَسُبُوغُ نَعْمَائِكَ عَلَيَّ", tr:"wa subüghu na’mâ’ika ‘alayya", fr:"et l’abondance de Tes Faveurs envers moi,"},
        {t:'tri', ar:"مَا بَلَغْتُ إِحْرَازَ حَظِّي", tr:"mâ balaghtu ihrâza hazzi", fr:"je ne serai pas arrivé à prendre ma part de tout cela,"},
        {t:'tri', ar:"وَلاَ إِصْلاحَ نَفْسِي", tr:"wa lâ işlâha nafsi", fr:"ni perfectionner mon âme!"},
        {t:'tri', ar:"وَلكِنَّكَ ابْتَدَأْتَنِي بِالإِحْسَانِ", tr:"wa lâkinnaka ibtada’tani bil- ihsâni", fr:"Mais Tu commenças Ta Bienveillance envers moi,"},
        {t:'tri', ar:"وَرَزَقْتَنِي فِي أُمورِي كُلِّهَا الْكِفَايَةَ", tr:"wa razaqtani fi umûrî kullihâ alkifâyata", fr:"me pourvoyais suffisamment dans toutes mes affaires,"},
        {t:'tri', ar:"وَصَرَفْتَ عِنِّي جَهْدَ الْبَلاءِ", tr:"wa șarafta ‘annî jahda albalâ’i", fr:"détournas de ma personne toute la peine de l’affliction,"},
        {t:'tri', ar:"وَمَنَعْتَ مِنِّي مَحْذُورَ الْقَضَاءِ", tr:"wa mana’ta minnî mahdhûra alqadâ’i", fr:"et Te retins de me faire un décret terrible."},
        {t:'tri', ar:"إِلَهِي فَكَمْ مِنْ بَلاءٍ جَاهِدٍ قَدْ صَرَفْتَ عَنِّي", tr:"ilâhi fakam min balâ’in jâhidin qad șarafta ‘annî", fr:"Mon Dieu! Combien d’afflictions pénibles as-Tu détournées de moi"},
        {t:'tri', ar:"وَكَمْ مِنْ نِعْمَةٍ سَابِغَةٍ أَقْرَرْتَ بِهَا عَيْنِي", tr:"wa kam min ni’matin sâbighatin aqrarta bihâ ‘ayni", fr:"Combien de Faveurs en toute Largesse, m’as-tu donné et qui ont produit un plaisir profond pour mes yeux!"},
        {t:'tri', ar:"وَكَمْ مِنْ صَنِيعَةٍ كَرِيمَةٍ لَكَ عِنْدِي", tr:"wa kam min șanî’atin karîmatin laka ‘indi", fr:"Combien de Bienfaisances Généreuses de Ta Part, qui existent chez moi!"},
        {t:'tri', ar:"أَنْتَ الَّذِي أَجَبْت عِنْدَ الاضْطِرَارِ دَعْوَتِي", tr:"anta alladhi ajabta ‘inda alidțirâri da ‘wati", fr:"C’est Toi qui as répondu à ma supplication en cas de détresse,"},
        {t:'tri', ar:"وَأَقَلْتَ عِنْدَ الْعِثَارِ زَلَّتِي", tr:"wa aqalta ‘inda al’ ithâri zallatî", fr:"mas pardonné mes péchés commis par mes faux pas,"},
        {t:'tri', ar:"وَأَخَذْتَ لِي مِنَ الأَعْدَاءِ بِظُلامَتِي", tr:"wa akhadhta lî min al-a dâ’i bizulâmati", fr:"et as repris mes droits (m’as vengé) des ennemis qui m’avaient fait de l’injustice."},
        {t:'tri', ar:"إِلَهِي مَا وَجَدْتُكَ بَخِيلاً حِينَ سَأَلْتُكَ", tr:"ilâhî mâ wajadtuka bakhîlan hîna sa’altuka", fr:"Mon Dieu! je ne T’ai point trouvé avare, quand je T’ai prié pour une chose,"},
        {t:'tri', ar:"وَلاَ مُنْقَبِضاً حِينَ أَرَدْتُكَ", tr:"wa la munqabidan hina aradtuka", fr:"ni maussade, quand je me suis tourné vers Toi,"},
        {t:'tri', ar:"بَلْ وَجَدْتُكَ لِدُعَائِي سَامِعاً", tr:"bal wajadtuka lidu â’î sâmi’ an", fr:"Mais au contraire, je T’ai trouvé prêt à écouter mes supplications,"},
        {t:'tri', ar:"وَلِمَطَالِبِي مُعْطِيًا", tr:"wa limațâlibi mu’țiyan", fr:"et accordant mes requêtes (souhaits)!"},
        {t:'tri', ar:"وَوَجَدْتُ نُعْمَاكَ عَلَيَّ سَابِغَةً", tr:"wa wajadtu nu’ mâka ‘alayya sâbighatan", fr:"J’ai trouvé Tes Faveurs envers moi,"},
        {t:'tri', ar:"فِي كُلِّ شَأْنٍ مِنْ شَأْنِي", tr:"fi kulli cha’nin min cha’ni", fr:"quelle que soit la situation,"},
        {t:'tri', ar:"وَکُلِّ زَمَانٍ مِنْ زَمَانِي", tr:"wa kulli zamânin min zamâni", fr:"et quel que soit le cas, larges et généreuses!"},
        {t:'tri', ar:"فَأَنْتَ عِندِي مَحْمُودٌ", tr:"fa anta ‘indî mahmûdun", fr:"Ainsi Tu es loué par moi,"},
        {t:'tri', ar:"وَصَنِيعُكَ لَدَيَّ مَبْرُورٌ", tr:"wa şanî’uka ladayya mabrûrun", fr:"et Ta Gratification est appréciée par moi."},
        {t:'tri', ar:"تَحْمَدُكَ نَفْسِي وَلِسَانِي وَعَقْلِي", tr:"tahmaduka nafsi wa lisâni wa ‘aqli", fr:"Mon âme, ma langue, mon intelligence Te louent!"},
        {t:'tri', ar:"حَمْداً يَبْلُغُ الْوَفَاءَ وَحَقِيقَةَ الشُّكْرِ", tr:"hamdan yablughu alwafâ’a wa haqiqata achchukri", fr:"Une louange qui atteigne le parfait accomplissement! Une louange qui atteigne la réalité de rendre grâce,"},
        {t:'tri', ar:"حَمْداً يَكُونُ مَبْلَغَ رِضَاكَ عَنَّي", tr:"hamdan yakûnu mablagha ridâka anni", fr:"une louange qui soit T’apogée de Ta Satisfaction de moi!"},
        {t:'tri', ar:"فَنَجِّنِي مِنْ سَخَطِكَ", tr:"fanajjini min sakhațika", fr:"Par conséquent, Sauve-moi de Ta Colère,"},
        {t:'tri', ar:"يَا كَهْفِي حِينَ تُعْيِينِي الْمَذَاهِبُ", tr:"ya kahfi hîna tu yîni almadhâhibu", fr:"Ô Mon Dernier Refuge! Quand des voies diverses m’épuisent!"},
        {t:'tri', ar:"وَيَا مُقِيلِي عَثْرَتِي", tr:"wa ya muqili ‘athrati", fr:"Ô Celui qui pardonne mes négligences."},
        {t:'tri', ar:"فَلَوْلا سَتْرُكَ عَوْرَتِي لَكُنْتُ مِنَ الْمَفْضُوحِينَ", tr:"falawlâ satruka ‘awrati lakuntu min almafdûhîna", fr:"Si Tu n’avais point voilé mes défauts, je serais dans les rangs des infâmes disgraciés!"},
        {t:'tri', ar:"وَيَا مُؤَيِّدِي بِالنَّصْرِ", tr:"wa yå mu’ayyidi binnaşri", fr:"Ô Celui qui me protège par Son Aide!"},
        {t:'tri', ar:"فَلَوْلا نَصْرُكَ إِيَّايَ لَكُنْتُ مِنَ الْمَغْلُوبينَ", tr:"falawla naşruka iyyâya lakuntu min almaghlûbîna", fr:"Si ce n’était pour Ton Aide, je serais devenu un des vaincus!"},
        {t:'tri', ar:"وَيَا مَنْ وَضَعَتْ لَهُ الْمُلوكُ نِيرَ الْمَذَلَّةِ عَلَى أَعْنَاقِهَا", tr:"wa ya man wada’ at lahu almulüku nîra almadhallati ‘alâ a’nâqihâ", fr:"Ô Celui devant qui, tous les rois placent le joug de la bassesse autour de leur cou,"},
        {t:'tri', ar:"فَهُمْ مِنْ سَطَوَاتِهِ خَائِفُونَ", tr:"fahum min satawâtihi khâ’ifûna", fr:"et sont craintifs de Sa Colère!"},
        {t:'tri', ar:"وَيَا أَهْلَ التَّقْوَى", tr:"wa ya ahla attaqwa", fr:"Ô Celui qui est Le plus Digne de crainte!"},
        {t:'tri', ar:"وَيَا مَنْ لَهُ الأَسْمَاءُ الْحُسْنَى", tr:"wa ya man lahu al- asmâ’u alhusna", fr:"Ô Celui qui possède les Noms les Plus beaux!"},
        {t:'tri', ar:"أَسْأَلُكَ أَنْ تَعْفُوَ عَنِّي وَتَغْفِرَ لِي", tr:"as’aluka an ta’fuwa ‘anni wa taghfira li", fr:"Je Te supplie humblement de me pardonner, et d’être Indulgent envers moi,"},
        {t:'tri', ar:"فَلَسْتُ بَرِيئاً فَأَعْتَذِرَ", tr:"falastu bari’an fa’a tadhiru", fr:"car je ne suis ni un innocent qui présente ses excuses,"},
        {t:'tri', ar:"وَلاَ بِذِي قُوَّةٍ فَأَنْتَصِرَ", tr:"wa lâ bidhi quwwatin fa antaşiru", fr:"ni quelqu’un qui possède une grande force, pour pouvoir se sauvegarder,"},
        {t:'tri', ar:"وَلَا مَفَرَّ لِي فَأَفِرَّ", tr:"wa lâ mafarra li fa- afirru", fr:"et il n’existe aucun refuge pour que je m’y rende"},
        {t:'tri', ar:"وَأَسْتَقِيلُكَ عَثَرَاتِي", tr:"wa astaqiluka ‘atharâtî", fr:"Je Te supplie de me pardonner mes fautes,"},
        {t:'tri', ar:"وَأَتَنَصَّلُ إِلَيْكَ مِنْ ذُنوبِيَ", tr:"wa atanaşşalu ilayka min dhunûbi", fr:"et devant Toi, je montre ma haine contre ces fautes"},
        {t:'tri', ar:"اَلَّتِي قَدْ أَوْبَقَتْنِي وَأَحَاطَتْ بِي فَأَهْلَكَتْنِي", tr:"allati qad awbaqatni wa ahâtat bî fa- ahlakatni", fr:"qui m’ont pesé lourdement, qui m’ont encerclé et ont causé ma perte, et j’en demande humblement pardon!"},
        {t:'tri', ar:"مِنْهَا فَرَرْتُ إِلَيْكَ رَبِّ", tr:"minhâ farartu ilayka rabbi", fr:"Je prends la fuite de ces fautes, pour venir vers Toi, Mon Seigneur,"},
        {t:'tri', ar:"تَائِباً فَتُبْ عَلَيَّ", tr:"tâ’iban fatub ‘alayya", fr:"et en me détournant en toute repentance. Alors tourne-Toi vers moi"},
        {t:'tri', ar:"مُتَعَوِّذاً فَأَعِذْنِي", tr:"muta awwidhan fa-a’idhni", fr:"qui cherche un refuge, et accorde-moi un refuge,"},
        {t:'tri', ar:"مُسْتَجِيراً فَلا تَخْذُلْنِي", tr:"mustajiran falâ takhdhulni", fr:"qui demande un refuge, ne m’abandonne pas,"},
        {t:'tri', ar:"سَائِلاً فَلا تَحْرِمْنِي", tr:"sâ’ilan falâ tahrimni", fr:"ne me déprive pas, en Te mendiant, et ne me délaisse pas,"},
        {t:'tri', ar:"مُعْتَصِماً فَلا تُسْلِمْنِي", tr:"mu’taşiman falâ tuslimni", fr:"en ayant recours à Ta Protection,"},
        {t:'tri', ar:"دَاعِياً فَلا تَرُدَّنِي خَائِباً", tr:"dâ iyan falâ taruddani khâ’iban", fr:"et en Te suppliant, ne me renvoie pas désespéré!"},
        {t:'tri', ar:"دَعَوْتُكَ يَا رَبِّ", tr:"da awtuka yâ rabbi", fr:"Je T’ai supplié, mon Dieu,"},
        {t:'tri', ar:"مِسْكِيناً مُسْتَكِيناً", tr:"miskinan mustakinan", fr:"comme un misérable, un vil,"},
        {t:'tri', ar:"مُشْفِقاً خَائِفاً", tr:"muchfiqan khâ’ifan", fr:"un craintif, un peureux,"},
        {t:'tri', ar:"وَجِلاً فَقِيراً", tr:"wajilan faqiran", fr:"un pauvre mendiant,"},
        {t:'tri', ar:"مُضْطَراً إِلَيْكَ", tr:"mudțarran ilayka", fr:"et qui cherche à avoir recours à Toi!"},
        {t:'tri', ar:"أَشْكُو إِلَيْكَ يَا إِلَهِي", tr:"achkû ilayka yâ ilâhi", fr:"Je dépose ma plainte devant Toi, mon Dieu,"},
        {t:'tri', ar:"ضَعْفَ نَفْسِي عَنِ الْمُسَارَعَةِ فِيمَا وَعَدْتَهُ أَوْلِيَاءَكَ", tr:"da fa nafsi ‘an almusâra ‘ati fîmâ wa adtahû awliyâ’aka", fr:"de mon âme qui est trop faible, pour se hâter vers ce que Tu as promis à Tes amis,"},
        {t:'tri', ar:"وَالْمُجَانَبَةِ عَمَّا حَذَّرْتَهُ أَعْدَاءَكَ", tr:"walmujânabati ‘ammâ hadhdhartahû a’dâ’aka", fr:"ou bien d’éviter ce par quoi Tu as menacé Tes ennemis;"},
        {t:'tri', ar:"وَكَثْرَةَ هُمُومِي وَوَسْوَسَةَ نَفْسِي", tr:"wa kathrata humûmî wa waswasata nafsi", fr:"et aussi des tentations de mon âme,"},
        {t:'tri', ar:"إِلَهِي لَمْ تَفْضَحْنِي بِسَرِيرَتِي", tr:"ilâhî lam tafdahnî bisarirati", fr:"Mon Dieu! Tu ne m’as point déshonoré en dévoilant mes pensées secrètes,"},
        {t:'tri', ar:"وَلَمْ تُهْلِكْنِي بِجَرِيرَتِي", tr:"wa lam tuhlikni bijarirati", fr:"et Tu ne m’as point détruit à cause de mes mauvaises actions!"},
        {t:'tri', ar:"أَدْعُوكَ فَتُجِيبُنِي", tr:"ad’ ûka fatujibuni", fr:"Je T’appelle, et Tu réponds,"},
        {t:'tri', ar:"وَإِنْ كُنْتُ بَطِيئاً حِينَ تَدْعُونِي", tr:"wa in kuntu bati’an hina tad’ âni", fr:"même si je suis lent à répondre, quand Tu m’appelles!"},
        {t:'tri', ar:"وَأَسْأَلُكَ كُلَّمَا شِئْتُ مِنْ حَوَائِجِي", tr:"wa as’aluka kullamâ chi’tu min hawâ’iji", fr:"Je Te demande n’importe quand et n’importe comment, toutes les choses que je voudrais comme mes désirs,"},
        {t:'tri', ar:"وَحَيْثُ مَا كُنْتُ وَضَعْتُ عِنْدَكَ سِرِّي", tr:"wa haythu mâ kuntu wada tu ‘indaka sirrî", fr:"et Je dépose en Toi, mon secret intime, où que je sois!"},
        {t:'tri', ar:"فَلا أَدْعُو سِوَاكَ", tr:"falâ ad’ û siwâka", fr:"Je ne supplie personne à part Toi,"},
        {t:'tri', ar:"وَلاَ أَرْجُو غَيْرَكَ", tr:"wa lâ arjû ghayraka", fr:"et je n’espère en personne sauf en Toi."},
        {t:'tri', ar:"لَبَّيْكَ لَبَّيْكَ", tr:"labbayka labbayka", fr:"À Ton appel! A Ton appel!"},
        {t:'tri', ar:"تَسْمَعُ مَنْ شَكَا إِلَيْكَ", tr:"tasma’u man chakâ ilayka", fr:"Tu entends celui qui porte sa plainte à Toi!"},
        {t:'tri', ar:"وَتَلْقَى مَنْ تَوَكَّلَ عَلَيْكَ", tr:"wa talqâ man tawakkala ‘alayka", fr:"Tu reçois les bras ouverts, celui qui a confiance absolue en Toi!"},
        {t:'tri', ar:"وَتُخَلِّصُ مَنِ اعْتَصَمَ بِكَ", tr:"na tukhallışu mar i’tasama bik:", fr:"Tu sauves celui qui se réfugie en Ta Grâce!"},
        {t:'tri', ar:"وَتُفَرِّجُ عَمَّنْ لاذَ بِكَ", tr:"wa tufarriju ‘amman lâdha bika", fr:"Tu soulages de tout fléau, celui qui cherche asile en Toi!"},
        {t:'tri', ar:"إِلَهِي فَلا تَحْرِمْنِي خَيْرَ الآخِرَةِ وَالأُولَى", tr:"ilâhi falâ tahrimni khayra al-akhirati wal-ûlâ", fr:"Mon Dieu! Ainsi, ne me prive pas des biens du monde de l’Au-delà, et aussi des biens de ce monde-ci,"},
        {t:'tri', ar:"لِقِلَّةِ شُكْرِي", tr:"ligillati chukri", fr:"à cause de la petitesse de mes remerciements et de ma reconnaissance,"},
        {t:'tri', ar:"وَاغْفِرْ لِي مَا تَعْلَمُ مِنْ ذُنُوبِي", tr:"waghfir li mâ ta lamu min dhunûbi", fr:"et pardonne-moi les péchés que j’ai commis, et dont Tu en as pleine connaissance!"},
        {t:'tri', ar:"إِنْ تُعَذِّبْ فَأَنَا الظَّالِمُ الْمُفَرِّطُ", tr:"in tu adhdhib fa’ana azzâlimu almufarrițu", fr:"Si Tu châties, c’est parce que je suis le malfaiteur,"},
        {t:'tri', ar:"الْمُضَيِّعُ الآثِمُ", tr:"almudayyi’ u al- âthimu", fr:"le négligent, le lâche paresseux,"},
        {t:'tri', ar:"الْمُقَصِّرُ الْمُضَجِّعُ", tr:"almuqaşşiru almudajji u", fr:"l’insouciant oublieux,"},
        {t:'tri', ar:"الْمُغْفِلُ حَظَّ نَفْسِي", tr:"almughfilu hazza nafsi", fr:"gâchant les bénéfices de mon âme!"},
        {t:'tri', ar:"وَإِنْ تَغْفِرْ فَأَنْتَ أَرْحَمُ الرَّاحِمِينَ.", tr:"wa in taghfir fa anta arhamu arrâhimîna", fr:"Et si Tu pardonnes, c’est parce que Tu es le plus Miséricordieux parmi les miséricordieux!"},
        {t:'salawat'},
      ]
    },
    's52': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "52. Pour implorer Dieu",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour implorer Dieu (insistance dans les requêtes)",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وَكَانَ مِنْ دُعَائِهِ عَلَيْهِ السَّلَامُ فِي الإِلْحَاحِ على اللّهِ تعالى", tr:"", fr:"La cinquante deuxième supplication: en implorant Dieu"},
        {t:'tri', ar:"يَا اللَّهُ الَّذِي لا يَخْفَى عَلَيْهِ شَيءٌ", tr:"yâ allâhu alladhi lâ yakhfâ ‘alayhî chay’un", fr:"Ô Dieu! dont rien ne T’est caché"},
        {t:'tri', ar:"فِي الأَرْضِ وَلاَ فِي السَّمَاءِ", tr:"fil-ardi wa lâ fissamâ’i", fr:"dans la terre ou le ciel!"},
        {t:'tri', ar:"وَكَيْفَ يَخْفَى عَلِيكَ يَا إِلَهِي مَا أَنْتَ خَلَقْتَهُ؟", tr:"wa kayfa yakhfâ ‘alayka yâ ilâhî mâ anta khalaqtahu", fr:"Comment serait-ce possible, mon Dieu, que des choses créées par Ta Propre Volonté, Te restent cachées?"},
        {t:'tri', ar:"وَكَيْفَ لاَ تُحْصِي مَا أَنْتَ صَنَعْتَهُ؟", tr:"wakayfa lâ tuhși mâ anta șana tahu", fr:"Comment serait-ce possible que Tu ne reconnaisses point ce que Tu as fabriqué Toi-même?"},
        {t:'tri', ar:"أَوْ كَيْفَ يَغِيبُ عَنْكَ مَا أَنْتَ تُدَبِّرُهُ؟", tr:"aw kayfa yaghîbu ‘anka mâ anta tudabbiruhu", fr:"Comment serait-ce possible qu’une chose Te semble absente, quand Tu l’as Toi-même conçue?"},
        {t:'tri', ar:"أَوْ كَيْفَ يَسْتَطِيعُ أَنْ يَهْرُبَ مِنْكَ مَنْ لا حَيَاةَ لَهُ إلاَّ بِرِزْقِكَ؟", tr:"aw kayfa yastațî’u an yahruba minka man lâ hayâta lahû illâ birizqika", fr:"Comment serait-ce possible qu’une chose qui n’a point de subsistance que par Ta Provision, ait l’habilité de s’enfuir de Toi?"},
        {t:'tri', ar:"أَوْ كَيْفَ يَنْجُو مِنْكَ مَنْ لا مَذْهَبَ لَهُ فِي غَيْرِ مُلْكِكَ؟", tr:"aw kayfa yanjû minka man lâ madh-haba lahû fi ghayri mulkika", fr:"Comment serait-ce possible qu’une chose qui n’a aucune voie de fuite puisse s’enfuir de Ton Royaume?!"},
        {t:'tri', ar:"سُبْحَانَكَ! أَخْشَى خَلْقِكَ لَكَ أَعْلَمُهُمْ بِكَ", tr:"subhânaka akhchâ khalqika laka a’lamuhum bika", fr:"Gloire à Toi! Celui qui parmi Tes créatures a plus peur de Toi, est celui qui Te connaît le mieux!"},
        {t:'tri', ar:"وَأَخْضَعُهُمْ لَكَ أَعْمَلُهُمْ بطَاعَتِكَ", tr:"wa akhda ‘uhum laka a’maluhum bițâ atika", fr:"Celui qui parmi elles est le plus modeste dans son humilité, est celui qui est le plus actif dans son obéissance!"},
        {t:'tri', ar:"وَأَهْوَنُهُمْ عَلَيْكَ مَنْ أَنْتَ تَرْزُقُهُ وَهُوَ يَعْبُدُ غَيْرَكَ", tr:"wa ahwanuhum ‘alayka man anta tarzuquhû wa huwa ya budu ghayraka", fr:"Et celui qui parmi elles, est le plus méprisable, est celui qui, tout en recevant sa provision de Toi, adore quelqu’un d’autre!"},
        {t:'tri', ar:"سُبْحَانَكَ! لا يَنْقُصُ سُلْطَانَكَ مَنْ أَشْرَكَ بِكَ وَكَذَّبَ رُسُلَكَ", tr:"subhânaka lâ yanquşu sulțânaka man achraka bika wa kadhdhaba rusulaka", fr:"Gloire à Toi! Dont le Royaume et l’Autorité, ne sont point diminués par celui qui associe d’autres à Toi, et renie Tes messagers!"},
        {t:'tri', ar:"وَلَيْسَ يَسْتَطِيعُ مَنْ كَرِهَ قَضَاءَكَ أَنْ يَرُدَّ أَمْرَكَ", tr:"wa laysa yastațî u man kariha qadâ’aka an yarudda amraka", fr:"Celui à qui Ta Décision ne plaît, n’a point la force de refuser Ta Commande!"},
        {t:'tri', ar:"وَلَاَ يَمْتَنِعُ مِنْكَ مَنْ كَذَّبَ بِقُدْرَتِكَ", tr:"wa lâ yamtani u minka man kadhdhaba biqudratika", fr:"Et celui qui renie Ton Pouvoir, ne sera point en dehors de la circonférence de Ta Puissance!"},
        {t:'tri', ar:"وَلَاَ يَفُوتُكَ مَنْ عَبَدَ غَيْرَكَ", tr:"wa lâ yafûtuka man ‘abada ghayraka", fr:"Et celui qui adore autre que Toi, ne sortira point de Ton Pouvoir!"},
        {t:'tri', ar:"وَلَا يُعَمَّرُ فِي الدُّنْيَا مَنْ كَرِهَ لِقَاءَكَ", tr:"wa lâ yu’ammaru fiddunya man kariha liqâ’aka", fr:"Et celui qui n’aime point Te rencontrer, n’aura point la vie éternelle dans ce monde!"},
        {t:'tri', ar:"سُبْحَانَكَ! مَا أَعْظَمَ شَأْنَكَ", tr:"subhânaka mâ a zama cha’naka", fr:"Gloire à Toi! Combien est grande Ta Situation,"},
        {t:'tri', ar:"وَأَقْهَرَ سُلْطَانَكَ", tr:"wa aqhara sulțânaka", fr:"et combien est dominante Ton Autorité (Royauté)!"},
        {t:'tri', ar:"وَأشَدَّ قُوَّتَكَ", tr:"wa achadda quwwataka", fr:"Combien est violente Ta Force,"},
        {t:'tri', ar:"وَأَنْفَذَ أَمْرَكَ", tr:"wa anfadha amraka", fr:"et combien est impérativement b exécutée Ta Commande!"},
        {t:'tri', ar:"سُبْحَانَكَ! قَضَيْتَ عَلَى جَمِيعِ خَلْقِكَ الْمَوْتَ", tr:"subhânaka qadayta ‘alâ jamî i khalqika almawta", fr:"Gloire à Toi! Tu as décreté la mort pour toutes Tes créatures:"},
        {t:'tri', ar:"مَنْ وَحَّدَكَ وَمَنْ كَفَرَ بِكَ", tr:"man wahhadaka wa man kafara bika", fr:"ceux qui professent Ton Unité et ceux qui ne croient pas en Toi;"},
        {t:'tri', ar:"وَكُلُّ ذَائِقُ الْمَوتِ", tr:"wa kullun dhâ’iqu almawti", fr:"Chacun savourera le trépas,"},
        {t:'tri', ar:"وَكُلَّ صَائِرٌ إِلَيْكَ", tr:"wa kullun sâ’irun ilayka", fr:"et chacun reviendra vers Toi."},
        {t:'tri', ar:"فَتَبَارَكْتَ وَتَعَالَيْتَ", tr:"fatabârakta wa ta ‘âlayta", fr:"Or, Tu es Le plus Béni, et Le plus Élevé!"},
        {t:'tri', ar:"لاَ إلَهَ إلاَّ أَنْتَ", tr:"lâ ilâha illâ anta", fr:"Il n’existe de plus Exalté que Toi!"},
        {t:'tri', ar:"وَحْدَكَ لاَ شَرِيكَ لَكَ", tr:"wahdaka lâ charika laka", fr:"Il n’y aucun Dieu sauf Toi, et Toi Seul! Celui qui ni aucun associé!"},
        {t:'tri', ar:"آمَنْتُ بِكَ وَصَدَّقْتُ رُسُلَكَ", tr:"âmantu bika wa șaddaqtu rusulaka", fr:"J’ai foi en Toi, j’atteste à Tes messagers,"},
        {t:'tri', ar:"وَقَبِلْتُ كِتَابَكَ", tr:"wa qabiltu kitâbaka", fr:"j’accepte Ton Livre,"},
        {t:'tri', ar:"وَكَفَرْتُ بِكُلِّ مَعْبُودٍ غَيْرِكَ", tr:"wa kafartu bikulli ma bûdin ghayrika", fr:"je ne crois et ne me soumets devant aucun objet d’adoration autre que Toi!"},
        {t:'tri', ar:"وَبَرِئْتُ مِمَّنْ عَبَدَ سِوَاكَ", tr:"wa bari’tu mimman ‘abada siwâka", fr:"Et je dénonce quiconque adorant autre que Toi!"},
        {t:'tri', ar:"اللَّهُمَّ إِنِّي أُصْبِحُ وَأُمْسِي", tr:"allâhumma innî uşbihû wa umsî", fr:"Ô Dieu! Je me lève le jour et amène le soir à moi,"},
        {t:'tri', ar:"مُسْتَقِلاً لِعَمَلِي", tr:"mustaqillan li’ amali", fr:"en faisant peu de cas de mes bonnes actions,"},
        {t:'tri', ar:"مُعْتَرِفاً بِذَنْبِي", tr:"mu’tarifan bidhambi", fr:"en confessent à mes péchés,"},
        {t:'tri', ar:"مُقِرّاً بِخَطَايَايَ", tr:"muqirran bikhațâyâya", fr:"en admettant à mes offenses;"},
        {t:'tri', ar:"أَنَّا بِإِسْرَافِي عَلَى نَفسِي ذَلِيلٌ", tr:"ana bi-isrâfi ‘alâ nafsi dhalîlun", fr:"Je suis vil à cause des prodigues que je commets contre moi."},
        {t:'tri', ar:"عَمَلِي أَهْلَكَنِي", tr:"amali ahlakanî", fr:"Mes faits et actions m’ont anéanti et détruit,"},
        {t:'tri', ar:"وَهَوَايَ أَرْدَانِي", tr:"wa hawâya ardânî", fr:"mes caprices m’ont ruiné,"},
        {t:'tri', ar:"وَشَهَوَاتِي حَرَمَتْنِي", tr:"wa chahawâti haramatni", fr:"mes passions m’ont privé de toute chose!"},
        {t:'tri', ar:"فَأَسْأَلُكَ يَا مَوَلايَ سُؤَالَ مَنْ نَفْسُهُ لاهِيَةٌ لِطُولِ أَمَلِهِ", tr:"fa as’aluka ya mawlâya su’âla man nafsuhû lâhiyatun lițûli amalihi", fr:"Ainsi, je demande à Toi, mon Maître, avec la demande de celui dont l’âme est distraite par la longueur de ses espoirs,"},
        {t:'tri', ar:"وَبَدَنُهُ غَافِلٌ لِسُكُونِ عُرُوقِهِ", tr:"wa badanuhû ghâfilun lisukûni ‘urûqihi", fr:"et dont le corps, par l’immobilité de ses veines, est tombé dans l’insouciance et la paresse,"},
        {t:'tri', ar:"وَقَلْبُهُ مَفْتونٌ بِكَثْرَةِ النِّعَمِ عَلَيْهِ", tr:"wa qalbuhû maftûnun bikathrati anni’ ami ‘alayhi", fr:"et dont le coeur est séduit (captivé), par la multitude des faveurs accordées a lui,"},
        {t:'tri', ar:"وَفِكْرُهُ قَلِيلٌ لِمَا هُوَ صَائِرٌ إليْهِ", tr:"wa fikruhû qalilun limâ huwa șâ’irun ilayhi", fr:"et qui réfléchit bien peu sur la destination finale qu’il devrait en effet atteindre."},
        {t:'tri', ar:"سُؤَالَ مَنْ قَدْ غَلَبَ عَلَيْهِ الأَمَلُ", tr:"su âla man qad ghalaba ‘alayhi al- amalu", fr:"Je demande avec la demande de celui qui est vaincu par ses souhaits,"},
        {t:'tri', ar:"وَفَتَنَهُ الْهَوَى وَاسْتَمْكَنَتْ مِنْهُ الدُّنْيَا", tr:"wa fatanahu alhawâ wastamkanat minhu addunya", fr:"et dont les caprices l’ont séduit, et dont le monde d’ici-bas l’a complètement maîtrisé,"},
        {t:'tri', ar:"وَأَظَلَّهُ الأَجَلُ", tr:"wa azallahu al- ajalu", fr:"et dont la mort lui a jeté son ombre;"},
        {t:'tri', ar:"سُؤَالَ مَنِ اسْتَكْثَرَ ذُنُوبَهُ", tr:"su’âla man istakthara dhunûbahu", fr:"Je demande avec la demande de celui qui reconnaît profondément ses péchés,"},
        {t:'tri', ar:"وَاعْتَرَفَ بِخَطِيئَتِهِ", tr:"wa i’tarafa bikhați’atihi", fr:"et qui confesse ses offenses [fautes],"},
        {t:'tri', ar:"سُؤَالَ مَنْ لَاَ رَبَّ لَهُ غَيْرُكَ", tr:"su’âla man lâ rabba lahû ghayruka", fr:"je demande avec la demande de celui qui n’a aucun Seigneur sauf Toi,"},
        {t:'tri', ar:"وَلَا وَلِيَّ لَهُ دُونَكَ", tr:"wa lâ waliyya lahû dûnaka", fr:"qui n’a aucun ami sauf Toi,"},
        {t:'tri', ar:"وَلاَ مُنْقِذَ لَهُ مِنْكَ", tr:"wa lâ munqidha lahû minka", fr:"qui n’a aucun Protecteur sauf Toi,"},
        {t:'tri', ar:"وَلَا مَلْجَأَ لَهُ مِنْكَ إِلَّا إِلَيْكَ", tr:"wa lâ malja’a lahû minka illa ilayka", fr:"et dont rien ne peut le délivrer de Toi,"},
        {t:'tri', ar:"إِلَهِي أَسْأَلُكَ بِحَقِّكَ الْوَاجِبِ عَلَى جَمِيعِ خَلْقِكَ", tr:"ilâhî as’aluka bihaqqika alwâjibi alâ jamii khalqika", fr:"Mon Dieu! Je Te demande, par le droit que Tu possèdes sur toutes Tes créatures,"},
        {t:'tri', ar:"وَبِاسْمِكَ الْعَظِيمِ الَّذِي أَمَرْتَ رَسُولَكَ أَنْ يُسَبِّحَكَ بِهِ", tr:"wa bismika al’azîmi alladhî amarta rasûlaka an yusabbihaka bihi", fr:"par Ton Grand Nom, avec lequel Tu as commandé à Ton messager de Te glorifier,"},
        {t:'tri', ar:"وَبِجَلالِ وَجْهِكَ الْكَرِيمِ", tr:"wa bijalali wajhika alkarîmi", fr:"et par la majesté grandiose et généreuse"},
        {t:'tri', ar:"الَّذِي لَاَ يَبْلَى وَلَاَ يَتَغَيَّرُ", tr:"alladhi lâ yablâ wa lâ yataghayyaru", fr:"qui ne devient point surannée et usée, et qui ne change,"},
        {t:'tri', ar:"وَلَا يَحُولُ وَلاَ يَفْنَى", tr:"wa lâ yahûlu wa lâ yafnâ", fr:"ni se transforme, ni ne subit aucune altération, ni ne trépasse,"},
        {t:'tri', ar:"أَنْ تُصَلِّيَ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ", tr:"an tuşalliya ‘alâ muhammadin wa âli muhammadin", fr:"que Tu bénisses Mohammad et toute la Famille de Mohammad,"},
        {t:'tri', ar:"وَأَنْ تُغْنِيَنِي عَنْ كُلِّ شَيءٍ بِعِبَادَتِكَ", tr:"wa an tughniyani ‘an kulli chay’in bi’ ibâdatika", fr:"et que Tu m’enrichisses contre tout besoin envers toute chose, de par Ton Adoration!"},
        {t:'tri', ar:"وَأَنْ تُسَلِّيَ نَفْسِي عَنِ الدُّنْيَا بمَخَافَتِكَ", tr:"wa an tusalliya nafsi ‘an addunyâ bimakhâfatika", fr:"Et que Tu distraies mon âme de l’amour de ce monde, de par la crainte de Toi,"},
        {t:'tri', ar:"وَأَنْ تُثْنِيَنِي بِالْكَثِيرِ مِنْ كَرَامَتِكَ بِرَحْمَتِكَ", tr:"wa an tuthniyani bilkathîri min karâmatika birahmatika", fr:"et de par Ta Grâce! Que Tu me tournes vers Tes présent généreusement abondants"},
        {t:'tri', ar:"فَإِلَيْكَ أَفِرُّ", tr:"fa ilayka afirru", fr:"Car c’est vers Toi que je m’enfuis,"},
        {t:'tri', ar:"وَمِنْكَ أَخَافُ", tr:"wa minka akhâfu", fr:"c’est Toi que je crains,"},
        {t:'tri', ar:"وَبِكَ أَسْتَغِيثُ", tr:"wa bika astaghîthu", fr:"c’est Toi à qui je demande secours,"},
        {t:'tri', ar:"وَإِيَّاكَ أَرْجُو", tr:"wa iyyâka arjû", fr:"c’est en Toi que j’espère,"},
        {t:'tri', ar:"وَلَكَ أَدْعُو", tr:"wa laka ad ‘û", fr:"c’est Toi que je supplie,"},
        {t:'tri', ar:"وَإِلَيْكَ أَلْجَأُ", tr:"wa ilayka alja’u", fr:"c’est auprés de Toi que je cherche asile,"},
        {t:'tri', ar:"وَبِكَ أَثِقُ", tr:"wa bika athiqu", fr:"c’est Toi en qui j’ai confiance,"},
        {t:'tri', ar:"وَإِيَّاكَ أَسْتَعِينُ", tr:"wa iyyâka asta ‘înu", fr:"c’est de Toi que je demande aide et secours,"},
        {t:'tri', ar:"وَبِكَ أُؤْمِنُ", tr:"wa bika u’minu", fr:"c’est en Toi que j’ai foi,"},
        {t:'tri', ar:"وَعَلَيْكَ أَتَوَكَّلُ", tr:"wa ‘alayka atawakkalu", fr:"c’est en Toi que j’ai placé mon assurance,"},
        {t:'tri', ar:"وَعَلَى جُودِكَ وَكَرَمِكَ أَتَّكِلُ.", tr:"wa ‘alâ jûdika wa karamika attakilu", fr:"et j’ai confiance en Ta Munificence et Ta Générosité!"},
        {t:'salawat'},
      ]
    },
    's53': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "53. Humilité devant Le Glorieux",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation dans l'acte d'humilité devant Le Glorieux, L'Exalté",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وَكَانَ مِنْ دُعَائِهِ عَلَيْهِ السَّلَامُ فِي التّذلُّلِ للهِِ عزّ وجلّ", tr:"", fr:"La cinquante troisième supplication: en s’humiliant devant Dieu (qui est Puissant et Majestueux!)"},
        {t:'tri', ar:"رَبِّ أَفْحَمَتْنِي ذُنُوبِي", tr:"rabbi afhamatni dhunûbî", fr:"Seigneur! Mes péchés m’ont fait taire,"},
        {t:'tri', ar:"وَانْقَطَعَتْ مَقَالَتِي", tr:"wanqața at maqâlati", fr:"et mes paroles ont été coupées courtes."},
        {t:'tri', ar:"فَلا حُجَّةَ لِي", tr:"falâ hujjata li", fr:"Je n’ai aucun argument (aucune explication),"},
        {t:'tri', ar:"فَأَنَا الأَسِيرُ بِبَلِيَّتِي", tr:"fa ana al-asîru bibaliyyati", fr:"car je suis prisonnier de ma propre affliction,"},
        {t:'tri', ar:"الْمُرْتَهَنُ بِعَمَلِي", tr:"almurtahanu bi’amali", fr:"l’otage de mes faits et actions,"},
        {t:'tri', ar:"الْمُتَرَدِّدُ فِي خَطِيئَتِي", tr:"almutaraddidu fi khat’ati", fr:"perdu dans mes fautes,"},
        {t:'tri', ar:"الْمُتَحَيِّرُ عَنْ قَصْدِي", tr:"almutahayyiru ‘an qaşdi", fr:"confus dans la droiture de la direction que je dois prendre,"},
        {t:'tri', ar:"الْمُنْقَطِعُ بِي", tr:"almungațiu bi", fr:"et complètement réduit à l’impuissance!"},
        {t:'tri', ar:"قَدْ أَوْقَفْتُ نَفْسِي", tr:"qad awqaftu nafsi", fr:"Je me retiens dans la situation"},
        {t:'tri', ar:"مَوْقِفَ الأَذِلاءِ الْمُذْنِبِينَ", tr:"mawqifa al-adhillâ’i almudhnibîna", fr:"des pécheurs vils et abaissés,"},
        {t:'tri', ar:"مَوْقِفَ الأَشْقِيَاءِ الْمُتَجَرِّئِينَ عَلَيْكَ", tr:"mawgifa al- achqiya’i almutajarri’îna ‘alayka", fr:"la situation de ces malheureux qui osent se dresser devant Ta Grandeur,"},
        {t:'tri', ar:"الْمُسْتَخِفِّينَ بِوَعْدِكَ", tr:"almustakhiffina biwa ‘ dika", fr:"et ceux qui pensent à la légère, à Ta Promesse."},
        {t:'tri', ar:"سُبْحَانَكَ! أَيَّ جُرْأَةٍ اجْتَرَأْتُ عَلَيْكَ؟", tr:"subhânaka ayya jur’atin ijtara’tu ‘alayka", fr:"Gloire à Toi! Quelle insolence ai-je montré impudemment envers Toi! Comment ai-je pu oser faire cela?"},
        {t:'tri', ar:"وَأيَّ تَغْرِيرٍ غَرَّرْتُ بِنَفْسِي؟", tr:"wa ayya taghririn gharrartu binafsi", fr:"Et par quelle illusion, me suis -je trompé et ruiné?"},
        {t:'tri', ar:"مَوْلايَ ارْحَمْ كَبْوَتِي لِحُرٍّ وَجْهِي وَزَلَّةَ قَدَمِي", tr:"mawlâya irham kabwati lihurri wajhi wa zallata qadami", fr:"Mon Maître bien-aimé! Aie pitié de moi qui ai trébuché par terre, en plein visage, de mon faux pas."},
        {t:'tri', ar:"وَعُدْ بحِلْمِكَ عَلَى جَهْلِي", tr:"wa ‘ud bhilmika ‘alâ jahlî", fr:"De par Ta Clémence, pardonne mon ignorance;"},
        {t:'tri', ar:"وَبِإِحْسَانِكَ عَلَى إِسَاءَتِي", tr:"wa bi-ihsânika ‘alâ isâ’ati", fr:"Et de par Ta Bienveillance, pardonne mes mauvaises actions,"},
        {t:'tri', ar:"فَأَنَا الْمُقِرُّ بِذَنْبِي", tr:"fa ana almuqirru bidhanbi", fr:"car j’admets mon péché,"},
        {t:'tri', ar:"الْمُعْتَرِفُ بِخَطِيئَتِي", tr:"almu tarifu bikhațî’atî", fr:"et je confesse mon offense:"},
        {t:'tri', ar:"وَهَذِهِ يَدِي وَنَاصِيَتِي", tr:"wa hâdhihî yadî wa nâșiyati", fr:"Voici ma main et mon front!"},

// ══ BUILD SIDEBAR ══
var sbScroll = document.getElementById('sb-scroll');
var activeItemId = null;

DATA.themes.forEach(function(theme) {
  var group = document.createElement('div');
  group.className = 'sb-group';

  var themeBtn = document.createElement('div');
  themeBtn.className = 'sb-theme';
  themeBtn.innerHTML = '<span class="sb-theme-icon">'+theme.icon+'</span><span class="sb-theme-label">'+theme.label+'</span><span class="sb-chevron">›</span>';

  var itemsDiv = document.createElement('div');
  itemsDiv.className = 'sb-items';

  var currentContainer = itemsDiv;

  theme.items.forEach(function(item) {
    if (item.type === 'header') {
      var headerBtn = document.createElement('div');
      headerBtn.className = 'sb-item subheader';
      headerBtn.innerHTML = '<span class="sb-theme-label">' + item.label + '</span><span class="sb-chevron">›</span>';
      
      var subItemsDiv = document.createElement('div');
      subItemsDiv.className = 'sb-sub-items';
      
      headerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var isOpen = subItemsDiv.classList.contains('open');
        if (!isOpen) {
          subItemsDiv.classList.add('open');
          headerBtn.classList.add('open');
        } else {
          subItemsDiv.classList.remove('open');
          headerBtn.classList.remove('open');
        }
      });
      
      itemsDiv.appendChild(headerBtn);
      itemsDiv.appendChild(subItemsDiv);
      currentContainer = subItemsDiv;
    } else {
      var el = document.createElement('div');
      el.className = 'sb-item' + (item.disabled ? ' disabled' : '');
      el.textContent = (item.emoji || '') + ' ' + item.label;
      if (!item.disabled) {
        el.addEventListener('click', function() {
          document.querySelectorAll('.sb-item').forEach(function(i){ i.classList.remove('active'); });
          el.classList.add('active');
          showInvocation(item.id);
        });
      }
      currentContainer.appendChild(el);
    }
  });

  themeBtn.addEventListener('click', function() {
    var isOpen = itemsDiv.classList.contains('open');
    // Close all
    document.querySelectorAll('.sb-items').forEach(function(d){ d.classList.remove('open'); });
    document.querySelectorAll('.sb-theme').forEach(function(t){ t.classList.remove('open'); });
    if(!isOpen) {
      itemsDiv.classList.add('open');
      themeBtn.classList.add('open');
    }
  });

  group.appendChild(themeBtn);
  group.appendChild(itemsDiv);
  sbScroll.appendChild(group);
});

// ══ RENDER INVOCATION ══
// Font size controls
var _invAr = 2.0, _invFr = 1.4, _invTr = 1.1;
document.documentElement.style.setProperty('--inv-ar-size', _invAr + 'rem');
document.documentElement.style.setProperty('--inv-fr-size', _invFr + 'rem');
document.documentElement.style.setProperty('--inv-tr-size', _invTr + 'rem');
function invFs(type, dir) {
  var step = 0.1;
  if (type === 'ar') {
    _invAr = Math.min(3.0, Math.max(0.8, _invAr + dir * step));
    document.documentElement.style.setProperty('--inv-ar-size', _invAr + 'rem');
  } else if (type === 'tr') {
    _invTr = Math.min(2.5, Math.max(0.6, _invTr + dir * step));
    document.documentElement.style.setProperty('--inv-tr-size', _invTr + 'rem');
  } else {
    _invFr = Math.min(2.0, Math.max(0.6, _invFr + dir * step));
    document.documentElement.style.setProperty('--inv-fr-size', _invFr + 'rem');
  }
}

function showInvocation(id) {
  var data = DATA.invocations[id];
  if(!data) return;

  var welcome = document.getElementById('welcome');
  var content = document.getElementById('content');
  welcome.classList.add('hidden');
  content.classList.remove('hidden');
  document.getElementById('invFc').classList.add('show');

  var html = '<div class="content-inner">';
  html += '<div class="c-source">'+data.source+'</div>';
  html += '<div class="c-title">'+data.title+'</div>';
  if(data.subtitle) html += '<div class="c-subtitle">'+data.subtitle+'</div>';
  html += '<div class="c-divider"></div>';

  if(data.prose) {
    html += '<div class="c-prose">';
    data.body.forEach(function(p){
      if (typeof p === 'string') {
        html += '<p>'+p+'</p>';
      } else if (p.t === 'intro') {
        html += '<div class="c-intro">'+p.tx+'</div>';
      } else if (p.t === 'salawat') {
        html += '<div class="c-salawat">— Ṣalawāt —</div>';
      }
    });
    html += '</div>';
  } else {
    data.body.forEach(function(v){
      if(v.t === 'salawat') {
        html += '<div class="c-salawat">— Ṣalawāt —</div>';
      } else if(v.t === 'intro') {
        html += '<div class="c-intro">'+v.tx+'</div>';
      } else if(v.t === 'instruction') {
        html += '<div class="c-instruction">'+v.tx+'</div>';
      } else if(v.t === 'v') {
        html += '<div class="c-verse"><div class="c-vnum">'+v.n+'</div><div class="c-vtext">'+v.tx+'</div></div>';
      } else if(v.t === 'zv') {
        html += '<div class="c-zv"><div class="c-zv-text">'+v.tx+(v.ar?'<div class="c-zv-ar">'+v.ar+'</div>':'')+'</div></div>';
      } else if(v.t === 'tri') {
        html += '<div class="c-tri">';
        if(v.ar) html += '<div class="c-tri-ar">'+v.ar+'</div>';
        if(v.tr) html += '<div class="c-tri-tr">'+v.tr+'</div>';
        html += '<div class="c-tri-fr">'+v.fr+'</div>';
        html += '</div>';
      }
    });
  }

  html += '</div>'; // close content-inner
  content.innerHTML = html;
  content.scrollTop = 0;
  // Trigger animation
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = '';
}
</script>

<!-- Theme listener: receives theme from parent portal -->
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    var t = e.data.theme;
    document.documentElement.setAttribute('data-theme', t);
    document.body.setAttribute('data-theme', t === 'light' ? '' : 'dark');
    // Also try calling the module's own theme function
    try { if (typeof setTheme === 'function') setTheme(t); } catch(ex) {}
    try { if (typeof S !== 'undefined' && S.th !== undefined) { S.th = t === 'light' ? 'light' : 'dark'; document.body.setAttribute('data-theme', S.th); } } catch(ex) {}
    // Force canvas/render update
    try { window.dispatchEvent(new Event('resize')); } catch(ex) {}
  }
});
try {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.body.setAttribute('data-theme', '');
    try { if (typeof S !== 'undefined') { S.th = 'light'; document.body.setAttribute('data-theme', 'light'); } } catch(ex) {}
  }
} catch(e) {}
</script>

</button>
<script>
(function(){
  var btn=document.getElementById('scrollTopBtn');
  if(!btn) return;
  var scroller=document.querySelector('.content-area')||document.querySelector('.main-content')||document.querySelector('.main')||document.querySelector('.content')||null;
  var target=scroller||document.documentElement;
  var eventTarget=scroller||window;
  function check(){
    var st=scroller?scroller.scrollTop:(window.pageYOffset||document.documentElement.scrollTop);
    btn.classList.toggle('visible',st>250);
  }
  eventTarget.addEventListener('scroll',check,{passive:true});
  btn.addEventListener('click',function(){
    target.scrollTo({top:0,behavior:'smooth'});
  });
  check();
})();
</script>
