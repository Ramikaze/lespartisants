        {t:'tri', ar:"وَلَا تُشْقِنَا بِضِيَافَتِهِ", tr:"wa lâ tuchqinâ bidiyâfatihi", fr:"et ne nous rends pas malheureux d’avoir été obligés de la recevoir, où de l’hospitalité que nous lui devons,"},
        {t:'tri', ar:"وَلَاَ تُخْزِنَا بِزِيَارَتِهِ", tr:"wa lâ tukhzinâ biziyâratihi", fr:"et ne nous dégrade pas pendant sa visite,"},
        {t:'tri', ar:"وَاجْعَلْهُ بَاباً مِنْ أَبْوَابِ مَغْفِرَتِكَ", tr:"waj’alhû bâban min abwâbi maghfiratika", fr:"et désigne- la comme un des portails de Ton Absolution,"},
        {t:'tri', ar:"وَمِفْتَاحًا مِنْ مَفَاتِيحِ رَحْمَتِكَ", tr:"wa miftâhan min mafâtihi rahmatika", fr:"et comme une des clés de Ta Grâce!"},
        {t:'tri', ar:"أَمِتْنَا مُهْتَدِينَ غَيْرَ ضَالِّينَ", tr:"amitnâ muhtadina ghayra dâllîna", fr:"Fais-nous mourir comme des personnes bien guidées, et non perdues,"},
        {t:'tri', ar:"طَائِعِينَ غَيْرَ مُسْتَكْرِهِينَ", tr:"tâ’i îna ghayra mustakrihîna", fr:"mais obéissantes et non contraintes,"},
        {t:'tri', ar:"تَائِبِينَ غَيْرَ عَاصِينَ وَلَاَ مُصِرِّينَ", tr:"tâ’ibîna ghayra ‘âșîna wa lâ muşirrina", fr:"mais repentantes, et non comme des pécheurs désobéissants qui n’insistent point à T’obéir,"},
        {t:'tri', ar:"يَا ضَامِنَ جَزَاءِ الْمُحْسِنِينَ", tr:"yâ dâmina jazâ’i almuhsinina", fr:"Celui qui se porte garant de la récompense des bienfaiteurs,"},
        {t:'tri', ar:"وَمُسْتَصْلِحَ عَمَلِ الْمُفْسِدِينَ.", tr:"wa mustaşliha ‘amali almufsidîna", fr:"et qui cherche à arranger pour le nieux, le travail des corrompus!"},
        {t:'salawat'},
      ]
    },
    's41': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "41. Demande de protection",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour aspirer à une protection et à un voilement",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي طلبِ السِّتْرِ والْوقايةِ", tr:"", fr:"La quarante et unième supplication: en demandant la protection et le fait de couvrir les fautes"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa alihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَفْرِشْنِي مِهَادَ كَرَامَتِكَ", tr:"wa africhnî mihâda karâmatika", fr:"étale la couche (lit) de Ton Prodige,"},
        {t:'tri', ar:"وَأَوْرِدْنِي مَشَارِعَ رَحْمَتِكَ", tr:"wa awridni machâria rahmatika", fr:"Emmène-moi vers les fontaines de Ta noble Grâce,"},
        {t:'tri', ar:"وَأَحْلِلْنِي بُحْبُوحَةَ جَنَّتِكَ", tr:"wa ahlilni buhbûhata jannatika", fr:"Installe-moi au milieu de Ton Jardin de Paradis,"},
        {t:'tri', ar:"وَلَاَ تَسُمْنِي بِالرَّدِّ عَنْكَ", tr:"wa la tasumni birraddi ‘anka", fr:"ne me marque pas avec le sceau de Ton Rejet,"},
        {t:'tri', ar:"وَلاَ تَحْرِمْنِي بِالْخَيْبَةِ مِنْكَ", tr:"wa lâ tahrimni bilkhaybati minka", fr:"ne me déprive pas de l’espoir de Ta Miséricorde,"},
        {t:'tri', ar:"وَلَاَ تُقَاصَّنِي بِمَا اجْتَرَحْتُ", tr:"wa lâ tuqâșșanî bimâ ijtarahtu", fr:"ne règle point Ton Compte avec moi, par tout que j’ai commis en cachette,"},
        {t:'tri', ar:"وَلَا تُنَاقِشْنِي بِمَا اكْتَسَبْتُ", tr:"wa lâ tunâqichni bimâ iktasabtu", fr:"et n’aie aucun compte avec moi, parce que j’ai délibérément gagné,"},
        {t:'tri', ar:"وَلَاَ تُبْرِزْ مَكُتُومِي", tr:"wa lâ tubriz maktûmî", fr:"ne dévoile pas ce que j’ai caché,"},
        {t:'tri', ar:"وَلَاَ تَكْشِفْ مَسْتُورِي", tr:"wa lâ takchif mastûri", fr:"n’expose pas ce que j’avais couvert,"},
        {t:'tri', ar:"وَلَاَ تَحْمِلْ عَلَى مِيزَانِ الإِنْصَافِ عَمَلِي", tr:"wa lâ tahmil ‘alâ mîzâni al-inșâfi amali", fr:"ne mesure pas mes actions avec la balance de la justice équitable,"},
        {t:'tri', ar:"وَلَاَ تُعْلِنْ عَلَى عُيُونِ الْمَلإِ خَبَرِي", tr:"wa lâ tu lin ‘alâ ‘uyûni almala’i khabari", fr:"et ne dévoile pas mes nouvelles,"},
        {t:'tri', ar:"أَخْفِ عَنْهُمْ مَا يَكُونُ نَشْرُهُ عَلَيَّ عَاراً", tr:"akhfi ‘anhum mâ yakûnu nachruhû ‘alayya ‘âran", fr:"et soustrais-les aux regards d’autrui de Grâce!"},
        {t:'tri', ar:"وَاطْوِ عَنْهُمْ مَا يُلْحِقُنِي عِنْدَكَ شَنَاراً", tr:"watwi ‘anhum mâ yulhiqunî ‘indaka chanâran", fr:"dissimule à ces personnes, toute révélation qui me rendrait honteux,"},
        {t:'tri', ar:"شَرِّفْ دَرَجَتِي بِرِضْوَانِكَ", tr:"charrif darajati biridwânika", fr:"et voile tout ce qui me déshonore devant Toi! Ennoblis mon rang, de par Ta Satisfaction,"},
        {t:'tri', ar:"وَأَكْمِلْ كَرَامَتِي بِغُفْرَانِكَ", tr:"wa akmil karâmati bighufrânika", fr:"perfectionne mon honneur de par Ton Absolution,"},
        {t:'tri', ar:"وَأَنْظِمْنِي فِي أَصْحَابِ الْيَمِينِ", tr:"wa anzimni fi aşhâbi alyamîni", fr:"Range-moi parmi les compagnons de droite,"},
        {t:'tri', ar:"وَوَجِّهْنِي فِي مَسَالِكِ الآمِنِينَ", tr:"wa wajjihni fi masâliki al-âminîna", fr:"Dirige-moi vers les chemins sûrs et rassurants"},
        {t:'tri', ar:"وَاجْعَلْنِي فِي فَوْجِ الْفَائِزِينَ", tr:"waj’ alni fi fawji alfâ’izîna", fr:"Place-moi dans le groupe des âmes sauvées,"},
        {t:'tri', ar:"وَاعْمُرْ بِي مَجَالِسَ الصَّالِحِينَ", tr:"wa’mur bî majâlisa aşşâlihîna", fr:"et fais-en sorte que les séances des vertueux s’épanouissent par ma présence!"},
        {t:'tri', ar:"آمِينَ رَبَّ الْعَالَمِينَ.", tr:"âmina rabba al’âlamîna", fr:"Amen, Seigneur des mondes!"},
        {t:'salawat'},
      ]
    },
    's42': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "42. Clôture du Coran",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lors de la lecture complète du Coran",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السّلامُ عِنْد ختْمِ الْقُرْآنِ", tr:"", fr:"La quarante deuxième supplication: quand Il terminait la lecture du Coran"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّكَ أَعَنْتَنِي عَلَى خَتْمِ كِتَابِكَ", tr:"allâhumma innaka a’antani ‘alâ khatmi kitâbika", fr:"Ô Dieu! Tu m’as aidé à terminer Ton Livre"},
        {t:'tri', ar:"الَّذِي أَنْزَلْتَهُ نُورًا", tr:"alladhi anzaltahû nûran", fr:"que Tu as fais descendre ici-bas comme une lumieré,"},
        {t:'tri', ar:"وَجَعَلْتَهُ مُهَيْمِناً عَلَى كُلِّ كِتَابٍ أَنْزَلْتَهُ", tr:"wa ja altahû muhayminan ‘alâ kulli kitâbin anazaltahu", fr:"et dont Tu as désigné comme Témoin de tous les autres Livres que Tu as faits descendre ici-bas,"},
        {t:'tri', ar:"وَفَضَّلْتَهُ عَلَى كُلِّ حَدِيثٍ قَصَصْتَهُ", tr:"wa faddaltahû ‘alâ kulli hadîthin qaşaştahu", fr:"et que tu as prétéré à toutes Tes autres narrations."},
        {t:'tri', ar:"وَقُرْقَاناً فَرَقْتَ بِهِ بَيْنَ حَلاَلِكَ وَحَرَامِكَ", tr:"wa furqânan faraqta bihi bayna halâlika wa harâmika", fr:"Une Lecture par laquelle Tu as séparé Tes Lois permissives, de Tes Interdits,"},
        {t:'tri', ar:"وَقُرْآناً أَعْرَبْتَ بِهِ عَنْ شَرَائِعِ أَحْكَامِكَ", tr:"wa qur’ânan a’rabta bihî ‘an charâ’i’i ahkâmika", fr:"et par lequel Tu as démontré clairement Tes Ordonnances,"},
        {t:'tri', ar:"وَكِتَاباً فَصَّلْتَهُ لِعِبَادِكَ تَفْصِيلاً", tr:"wa kitâban faşşaltahû li’ibâdika tafșîlan", fr:"un Livre que Tu as rendu distinctement distingué pour Tes serviteurs,"},
        {t:'tri', ar:"وَوَحْيَا أَنْزَلْتَهُ عَلَى نَبِيِّكَ مُحَمَّدٍ", tr:"wa wahyan anzaltahû ‘alâ nabiyyika muhammadin", fr:"Une Révélation que Tu as fait descendre ici-bas, à Ton Prophète Mohammad,"},
        {t:'tri', ar:"صَلَوَاتُكَ عَلَيْهِ وَآلِهِ تَنْزِيلاً", tr:"șalawâtuka ‘alayhî wa âlihi tanzilan", fr:"que Tes Salutations sorte accordées à Lui et sa Famille,"},
        {t:'tri', ar:"وَجَعَلْتَهُ نُوراً نَهْتَدِي مِنْ ظُلَمِ الضَّلاَلَةِ وَالْجَهَالَةِ بِاتَّبَاعِهِ", tr:"wa ja altahû nûran nahtadi min zulami addalâlati waljahâlati bittibâ ihi", fr:"Tu l’a désigné comme une lumière, qu’en la suivant nous pouvons être guides des ténébres obscures de l’erreur et de l’ignorance,"},
        {t:'tri', ar:"وَشِفَاءً لِمَنْ أَنْصَتَ بِفَهْم التَّصْدِيقِ إِلَى اسْتِمَاعِهِ", tr:"wa chifâ’an liman anşata bifahmi attaşdiqi ilâ istima ihi", fr:"une guérison pour celui qui acquise et prête l’oreille attentivement pour l’entendre, et pour la comprendre en Tattestant,"},
        {t:'tri', ar:"وَمِيزَانَ قِسْطٍ لا يَحِيفُ عَنِ الْحَقِّ لِسَانُهُ", tr:"wa mîzâna qisțin lâ yahîfu ‘an alhaqqi lisânuhu", fr:"et un juste balance dont la langue ne se détourne point de la vérité,"},
        {t:'tri', ar:"وَنُورَ هُدًى لاَ يَطْفَأُ عَنِ الشَّاهِدِينَ بُرْهَانُهُ", tr:"wa nûra hudan lâ yațfa’u ‘an achchâhidîna burhânuhu", fr:"et un phare dont l’argument (la preuve) ne puisse s’éteindre devant le regard des témoins,"},
        {t:'tri', ar:"وَعَلَمَ نَجَاةٍ لا يَضِلُّ مَنْ أَمَّ قَصْدَ سُنَّتِهِ", tr:"wa ‘alama najâtin la yadillu man amma qaşda sunnatihi", fr:"et un signal de Salut, de sorte que celui qui se dirige vers sa direction ne sera point perdu,"},
        {t:'tri', ar:"وَلَاَ تَنَالُ أَيْدِي الْهَلَكَاتِ مَنْ تَعَلَّقَ بِعُرْوَةِ عِصْمَتِهِ", tr:"wa lâ tanâlu aydî alhalakâti man ta allaqa bi’urwati ‘ işmatihi", fr:"et celui qui s’attache à la poignée de sa protection, ne sera point atteint par la main des périls!"},
        {t:'tri', ar:"اللَّهُمَّ فَإِذْ أَفَدْتَنَا الْمَعُونَةَ عَلَى تِلاَوَتِهِ", tr:"allâhumma fa’idh afadtana alma’ûnata ‘alâ tilâwatihi", fr:"Ô Dieu! Tu nous as accordés Ton Aide pour le réciter,"},
        {t:'tri', ar:"وَسَهَّلْتَ جَوَاسِيَ أَلْسِنَتِنَا بِحُسْنِ عِبَارَتِهِ", tr:"wa sahhalta jawâsiya alsinatinâ bihusni ‘ibâratihi", fr:"et as assoupli les rugosités de nos langues, de par la beauté de son expression;"},
        {t:'tri', ar:"فَاجْعَلْنَا مِمَّنْ يَرْعَاهُ حَقَّ رِعَايَتِهِ", tr:"faj alnâ mimman yar âhu haqqa ri’âyatihi", fr:"or place-nous parmi ceux qui l’observent, comme Il se doit d’être observé,"},
        {t:'tri', ar:"وَيَدِينُ لَكَ بِاعْتِقَادِ التَّسْلِيمِ لِمُحْكَمِ آيَاتِهِ", tr:"wa yadînu laka bi’tiqâdi attaslîmi limuhkami âyâtihi", fr:"et de par leur foi de soumission à obéir à la fermeté textuelle de ses versets,"},
        {t:'tri', ar:"وَيَفْرَعُ إِلَى الإِقْرَارِ بَمُتَشَابِهِهِ وَمُوضَحَاتِ بَيِّنَاتِهِ", tr:"wa yafza u ilâ al- iqrâri bamutachâbihihî wa mûdahâti bayyinâtihi", fr:"et qui cherchent refuge en admettant les figures, et l’élucidation de ses signes clairs."},
        {t:'tri', ar:"اَللَّهُمَّ إِنَّكَ أَنْزَلْتَهُ عَلَى نَبِيِّكَ مُحَمَّدٍ", tr:"allâhumma innaka anzaltahû ‘alâ nabiyyika muhammadin", fr:"Ô Dieu! Tu l’as fait descendre à Ton Prophète Mohammad"},
        {t:'tri', ar:"صَلَّى اللَّهُ عَلَيْهِ وَآلِهِ مُجْمَلاً", tr:"șallâ allâhû ‘alayhî wa âlihî mujmalan", fr:"(Bénis Mohammad et toute sa Famille!) dans une forme sommaire,"},
        {t:'tri', ar:"وَأَلْهَمْتَهُ عِلْمَ عَجَائِبِهِ مُكَمَّلاً", tr:"wa alhamtahû ‘ilma ‘ajâ’ibihî mukammalan", fr:"et Tu lui as inspiré la Science de ses merveilles, complètement détaillée,"},
        {t:'tri', ar:"وَوَرَّثْتَنَا عِلْمَهُ مُفَسَّراً", tr:"wa warrathtanâ ‘ilmahû mufassaran", fr:"et Tu nous as faits les héritiers de sa Science bien interprétée,"},
        {t:'tri', ar:"وَفَضَّلْتَنَا عَلَى مَنْ جَهِلَ عِلْمَهُ", tr:"wa faddaltanâ ‘alâ man jahila ‘ilmahu", fr:"et Tu nous as préférés à ceux qui ignorent sa connaissance,"},
        {t:'tri', ar:"وَقَوَّيْتَنَا عَلَيْهِ لِتَرْفَعَنَا فَوْقَ مَنْ لَمْ يُطِقْ حَمْلَهُ", tr:"wa gawwaytanâ ‘alayhi litarfa’anâ fawqa man lam yuțiq hamlahu", fr:"et Tu as daigné nous fortifier pour nous élever au-dessus de ceux qui ne peuvent le comprendre."},
        {t:'tri', ar:"اللَّهُمَّ فَكَمَا جَعَلْتَ قُلُوبَنَا لَهُ حَمَلَةً", tr:"allâhumma fakamâ ja’ alta qulûbanâ lahû hamalatan", fr:"Ô Dieu! comme Tu as désigné nos coeurs comme ses porteurs,"},
        {t:'tri', ar:"وَعَرَّفْتَنَا بِرَحْمَتِكَ شَرَفَهُ وَفَضْلَهُ", tr:"wa ‘arraftanâ birahmatika charafahu wafadlahu", fr:"et par Ta Clémence, nous as dévoilés sa mobilité et son excellence,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ الْخَطِيبِ بِهِ", tr:"fașalli ‘alâ muhammadin alkhațibi bihî", fr:"par conséquent bénis Mohammad qui est l’Orateur du Coran,"},
        {t:'tri', ar:"وَعَلَى آلِهِ الْخُزَّانِ لَهُ", tr:"wa ‘alâ âlihi alkhuzzâni lahu", fr:"et tous les membres de sa Famille, qui sont les trésoriers de Ton Livre,"},
        {t:'tri', ar:"وَاجْعَلْنَا مِمَّنْ يَعْتَرِفُ بِأَنَّهُ مِنْ عِنْدِكَ", tr:"waj’alnâ mimman ya tarifu bi-annahû min ‘indika", fr:"et place-nous parmi ceux qui confessent que ce Livre vient en vérité de Ta part,"},
        {t:'tri', ar:"حَتَّى لاَ يُعَارِضَنَا الشَّكُّ فِي تَصْدِيقِهِ", tr:"hattâ lâ yu ‘âridanâ achchakku fi taşdîqihi", fr:"de sorte qu’aucun doute ne nous assaille,"},
        {t:'tri', ar:"وَلَا يَخْتَلِجَنَا الزَّيْغُ عَنْ قَصْدِ طَرِيقِهِ", tr:"wa lâ yakhtalijana azzayghu ‘an qaşdi tarîqihi", fr:"et aucune déviation de son droit chemin ne nous déroute!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa alihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْعَلْنَا مِمَّنْ يَعْتَصِمُ بِحَبْلِهِ", tr:"waj alnâ mimman yâ’ taşimu bihablihi", fr:"Et place-nous parmi ceux qui tiennent fermement à la corde du Coran,"},
        {t:'tri', ar:"وَيَأْوِي مِنَ الْمُتَشَابِهَاتِ إِلَى حِرْزِ مَعْقِلِهِ", tr:"wa ya’wi min almutachâbihâti ilâ hirzi ma gilihi", fr:"et cherchent refuge de ses figuratifs dans sa forteresse (citadelle) fortifiée,"},
        {t:'tri', ar:"وَيَسْكُنُ فِي ظِلِّ جَنَاحِهِ", tr:"wa yaskunu fi zilli janâhihi", fr:"et séjournent sous l’ombre de ses ailes,"},
        {t:'tri', ar:"وَيَهْتَدِي بِضَوْءِ صَبَاحِهِ", tr:"wa yahtadi bidaw’i şabâhihi", fr:"et trouvent direction dans sa splendeur matinale,"},
        {t:'tri', ar:"وَيَقْتَدِي بِتَبَلُّجِ إِسْفَارِهِ", tr:"wa yaqtadi bitaballuji isfârihi", fr:"et suivent le chemin brillant de son illumination,"},
        {t:'tri', ar:"وَيَسْتَصْبِحُ بِمِصْبَاحِهِ", tr:"wa yastaşbihû bimişbâhihi", fr:"et acquièrent lumière de sa lampe,"},
        {t:'tri', ar:"وَلَاَ يَلْتَمِسُ الْهُدَى فِي غَيْرِهِ", tr:"wa lâ yaltamisu alhudâ fi ghayrihi", fr:"et ne demandent jamais la guidance ailleurs!"},
        {t:'tri', ar:"اللَّهُمَّ وَكَمَا نَصَبْتَ بِهِ مُحَمَّداً عَلَماً لِلدَّلاَةِ عَلَيْكَ", tr:"allâhumma wa kamâ naşabta bihi muhammadan ‘alaman liddalâti ‘alayka", fr:"Ô Dieu! de même que Tu as désigné Mohammad comme un signe indicatif pour nous guider vers Toi,"},
        {t:'tri', ar:"وَأَنْهَجْتَ بآلِهِ سُبُلَ الرِّضَا إِلَيْكَ", tr:"wa anhajta bi-âlihî subula arridâ ilayka", fr:"et de même, as manifesté les voies d’obtenir Ton Bon Plaisir à sa Famille,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْعَلِ الْقُرْآنَ وَسِيلَةً لَنَا إِلَى أَشْرَفِ مَنَازِلِ الْكَرَامَةِ", tr:"waj al alqur’âna wasîlatan lanâ ilâ achrafi manâzili alkarâmati", fr:"et désigne le Coran, notre moyen pour arriver aux plus nobles étapes de l’honneur,"},
        {t:'tri', ar:"وَسُلَّماً نَعْرُجُ فِيهِ إِلَى مَحَلِّ السَّلاَمَةِ", tr:"wa sullaman na ruju fihi ilâ mahalli assalâmati", fr:"et une échelle par laquelle nous escaladions à la place de refuge et de sécurité,"},
        {t:'tri', ar:"وَسَبَباً نُجْزَى بِهِ النَّجَاةَ فِي عَرْصَةِ الْقِيَامَةِ", tr:"wa sababan nujzâ bihi annajâta fi arşati algiyâmati", fr:"et la cause par laquelle nous serons récompenses avec la délivrance dans la plaine de la Résurrection,"},
        {t:'tri', ar:"وَذَرِيعَةً نَقْدُمُ بِهَا عَلَى نَعِيمِ دَارِ الْمُقَامَةِ", tr:"wa dhari atan naqdumu bihâ ‘alâ na’îmi dâri almuqâmati", fr:"et un moyen par lequel nous pourrons atteindre aux bienfaits de la Maison éternelle!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allahumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاحْطُطْ بِالْقُرْآنِ عَنَّا ثِقْلَ الأَوْزَارِ", tr:"wahtut bilqur’âni ‘annâ thiqla al- awzâri", fr:"De par le Coran, démonte le poids de nos lourds péchés"},
        {t:'tri', ar:"وَهَبْ لَنَا حُسْنَ شَمَائِلِ الأَبْرَارِ", tr:"wa hab lanâ husna chamâ’ili al-abrâri", fr:"et accorde-nous les excellentes qualités des pieux,"},
        {t:'tri', ar:"وَاقْفُ بِنَا آثَارَ الَّذِينَ قَامُوا لَكَ بِهِ", tr:"waqfu binâ âthâra alladhîna qâmû laka bihi", fr:"et fais-nous suivre les traces de ceux qui s’étaient levés dans les différentes intervalles (laps)"},
        {t:'tri', ar:"آنَاءَ اللَّيْلِ وَأَطْرَافَ النَّهَارِ", tr:"ânấ’a allayli wa ațrâfa annahâri", fr:"de la nuit et du jour, pour T’adorer avec la récitation du Coran,"},
        {t:'tri', ar:"حَتَى تُطَهِّرَنَا مِنْ كُلَّ دَنَسٍ بِتَطْهِيرِهِ", tr:"hattâ tutahhiranâ min kulli danasin bitathîrihi", fr:"de sorte que Tu puisses nous purger de toute souillure, de par la purgation pureté du Coran,"},
        {t:'tri', ar:"وَتَقْفُوَ بِنَا آثَارَ الَّذِينَ اسْتَضَاءُوا بِنُورِهِ", tr:"wa taqfuwa binâ âthâra alladhîna istadâ’û binûrihi", fr:"et nous fasses suivre les traces de ceux qui ont été illuminés de par la lumière même du Coran,"},
        {t:'tri', ar:"وَلَمْ يُلْهِهِمُ الأَمَلُ عَنِ الْعَمَلِ", tr:"wa lam yulhihim al-amalu ‘an al’amali", fr:"ceux qui n’ont jamais été distraits de leur travail, par des souhaits extravagants,"},
        {t:'tri', ar:"فَيَقْطَعَهُمْ بِخُدَعِ غُرُورِهِ", tr:"fayaqta uhum bikhuda’i ghurûrihi", fr:"et qui ne se méprennent point de leurs ruses trompeuses!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْعَلِ الْقُرْآنَ لَنَا فِي ظُلَمِ اللَّيَالِي مُؤْنِساً", tr:"waj’al alqur’âna lanâ fi zulami allayâlî mu’nisan", fr:"et désigne le Coran comme notre intime, dans les ténèbres obscurcies de la nuit,"},
        {t:'tri', ar:"وَمِنْ نَزَغَاتِ الشَّيْطَانِ", tr:"wa min nazaghâti achchaytâni", fr:"et comme un gardien contre les instigations de Satan"},
        {t:'tri', ar:"وَخَطَرَاتِ الْوَسَاوِسِ حَارِساً", tr:"wa khatarâti alwasâwisi hârisan", fr:"et des hallucinations confuses,"},
        {t:'tri', ar:"وَلَأَقْدَامِنَا عَنْ نَقْلِهَا إِلَى الْمَعَاصِي حَابِساً", tr:"wa li-aqdâminâ ‘an naqlihâ ilâ alma’âșî hâbisan", fr:"et comme un barrage pour nos pas, afin de ne pas commettre des péchés,"},
        {t:'tri', ar:"وَلَأَلْسِنَتِنَا عَنِ الْخَوْضِ فِي الْبَاطِلِ", tr:"wa li-alsinatinâ ‘an alkhawdi filbâțili", fr:"et comme un amortisseur pour nos langues, sans la présence d’aucun fléau,"},
        {t:'tri', ar:"مِنْ غَيْرِ مَا آفَةٍ مُخْرِساً", tr:"min ghayri mâ âfatin mukhrisan", fr:"qui nous empêchera de nous plonger dans la fausseté,"},
        {t:'tri', ar:"وَلِجَوَارِحِنَا عَنِ اقْتِرَافِ الآثَامِ زَاجِراً", tr:"wa lijawârihinâ ‘an iqtirâfi al-âthâmi zâjiran", fr:"et comme une entrave restrictive pour nos membres, afin de ne point commettre des péchés,"},
        {t:'tri', ar:"وَلِمَا طَوَتِ الْغَفْلَةُ عَنَّا مِنْ تَصَفُّحِ الإعْتِبَارِ نَاشِراً", tr:"walimâ tawat alghaflatu ‘annâ min taşaffuhI ali tibâri nâchiran", fr:"et comme un «  »dérouleur » » pour scruter la vigilance prudente qui avait été enroulée par la main d’une insouciance négligeante,"},
        {t:'tri', ar:"حَتَّى تُوصِلَ إِلَى قُلُوبِنَا فَهُمَ عَجَائِبِهِ", tr:"hattâ tûșila ilâ qulubina tahma ‘ajâ’ibihi", fr:"de sorte que Tu puisses attacher à nos coeurs la compréhension des merveilles du Coran,"},
        {t:'tri', ar:"وَزَوَاجِرَ أَمْثَالِهِ", tr:"wa zawâjira amthâlihi", fr:"et ses exemples et ses histoires prohibitifs,"},
        {t:'tri', ar:"الَّتِي ضَعُفَتِ الْجِبَالُ الرَّوَاسِي عَلَى صَلَاَبَتِهَا عَنِ احْتِمَالِهِ", tr:"allati da ufat aljibâlu arrawâsî ‘alâ șalâbatihâ ‘an ihtimâlihi", fr:"que même les montagnes immuables, dans toute leur solidité, ne supportent pas!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَدِمْ بِالْقُرْآنِ صَلَاَحَ ظَاهِرِنَا", tr:"wa adim bilqur’âni șalâha zâhirinâ", fr:"et de par le Coran, continue en permanence la juste rectitude de nos apparences,"},
        {t:'tri', ar:"وَاحْجُبُ بِهِ خَطَرَاتِ الْوَسَاوِسِ عَنْ صِحَّةِ ضَمَائِرِنَا", tr:"wahjub bihi khatarâti alwasâwisi ‘an șihhati damâ’irina", fr:"et voile les pensées confuses, et de par le Coran, barre les voies de la tentation vers la profondeur de nos êtres"},
        {t:'tri', ar:"وَاغْسِلْ بِهِ دَرَنَ قُلُوبِنَا وَعَلَاَئِقَ أَوْزَارِنَا", tr:"waghsil bihi darana qulûbinâ wa ‘alâ’iqa awzârinâ", fr:"jusqu’à ce que tu laves la souillure de nos cours, et les saletés de nos lourds péchés."},
        {t:'tri', ar:"وَاجْمَعْ بِهِ مُنْتَشَرَ أُمُورِنَا", tr:"wajma’ bihi muntachara umûrina", fr:"Arrange nos affaires éparpillées et dispersées,"},
        {t:'tri', ar:"وَارْوِ بِهِ فِي مَوْقِفِ الْعَرْضِ عَلَيْكَ ظَمَأَ هَوَاجِرِنَا", tr:"warwi bihi fi mawaifi al’ardi ‘alayka zama’a hawâjirinâ", fr:"assouvis notre soif brûlante dans les rangs, dans le Jour de la Résurrection devant Toi,"},
        {t:'tri', ar:"وَاكْسُنَا بِهِ حُلَلَ الأَمَانِ يَوْمَ الْفَزَعِ الأَكْبَرِ فِي نُشُورِنَا", tr:"waksunâ bihî hulala al-amâni yawma alfaza i alakbari fi nuchûrinâ", fr:"et revêtis-nous des habits de sécurité, dans le Jour de la plus Grande Terreur, au moment de la sortie des tombes!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْبُرْ بِالْقُرْآنِ خَلَّتَنَا مِنْ عَدَمِ الإِمْلَاقِ", tr:"wajbur bilqur’âni khallatana min ‘adami al-imlâqi", fr:"et de par le Coran, redresse notre misérable pauvreté,"},
        {t:'tri', ar:"وَسُقْ إِلَيْنَا بِهِ رَغَدَ الْعَيْشِ", tr:"wa suq ilaynâ bihî raghada al’aychi", fr:"et conduis les conforts de la vie,"},
        {t:'tri', ar:"وَخِصْبَ سَعَةِ الأَرْزَاقِ", tr:"wa khişba sa’ati al-arzâqi", fr:"et une abondance de provisions vers nous,"},
        {t:'tri', ar:"وَجَنِّبْنَا بِهِ الضَّرَائِبَ الْمَذْمُومَةَ", tr:"wa jannibnâ bihî addarâ’iba almadhmûmata", fr:"éloigne de nous des traits de caractère blâmant"},
        {t:'tri', ar:"وَمَدَانِيَ الأَخْلاَقِ", tr:"wa madâni al- akhlâqi", fr:"et des vils défauts,"},
        {t:'tri', ar:"وَاعْصِمْنَا بِهِ مِنْ هُوَّةِ الْكُفْرِ وَدَوَاعِي النِّفَاقِ", tr:"wa’simnâ bihî min huwwati alkufri wa dawa i annifâqi", fr:"et préserve-nous de l’abîme de l’incroyance (l’hérésie) et des raisons pour l’hypocrisie,"},
        {t:'tri', ar:"حَتَّى يَكُونَ لَنَا فِي الْقِيَامَةِ", tr:"hattâ yakûna lanâ fi alqiyâmati", fr:"de sorte qu’à la Résurrection,"},
        {t:'tri', ar:"إِلَى رِضْوَانِكَ وَجِنَانِكَ قَائِداً", tr:"ilâ ridwânika wa jinânika qâ’idan", fr:"le Coran soit notre guide vers Ton Bon Plaisir et Tes Jardins de Paradis,"},
        {t:'tri', ar:"وَلَنَا فِي الدُّنْيَا عَنْ سُخْطِكَ", tr:"walanâ fiddunyâ ‘an sukhțika", fr:"et dans ce monde-ci, un protecteur contre Ton déplaisir"},
        {t:'tri', ar:"وَتَعَدِّي حُدُودِكَ ذَائِداً", tr:"wa ta addi hudûdika dhấ’idan", fr:"et le fait de transgresser de Tes Limites,"},
        {t:'tri', ar:"وَلِمَا عِنْدَكَ بِتَحْلِيلِ حَلاَلِهِ وَتَحْرِيمِ حَرَامِهِ شَاهِداً", tr:"wa limâ ‘indaka bitahlîli halâlihî wa tahrimi harâmihî châhidan", fr:"et qu’il soit devant Toi, un témoin pour permettre les choses licites, et interdire les choses illicites!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli alà muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَهَوِّنْ بالْقُرْآنِ عِنْدَ الْمَوْتِ عَلَى أَنْفُسِنَا", tr:"wa hawwin bilqur’âni ‘inda almawti ‘alâ anfusina", fr:"De par le Coran, au moment de la mort, facilite pour nos âmes"},
        {t:'tri', ar:"كَرْبَ السِّيَاقِ", tr:"karba assiyâqi", fr:"la peine de l’agonie,"},
        {t:'tri', ar:"وَجَهْدَ الأَنِينِ", tr:"wa jahda al-anini", fr:"l’effort de soupirer et de gémir,"},
        {t:'tri', ar:"وَتَرَادُفَ الْحَشَارِجِ", tr:"wa tarâdufa alhachâriji", fr:"et les râles qui se succéderont les unes après les autres,"},
        {t:'tri', ar:"إِذَا بَلَغَتِ النُّفُوسُ التَّرَاقِيَ", tr:"idhâ balaghat annufûsu attarâqiya", fr:"lorsque l’âme remonte dans les clavicules"},
        {t:'tri', ar:"وَقِيلَ مَنْ رَاقٍ", tr:"wa qila man râqin", fr:"et on demande: «  »Qui est Magicien? » »"},
        {t:'tri', ar:"وَتَجَلَّى مَلَكُ الْمَوْتِ لِقَبْضِهَا", tr:"wa tajallâ malaku almawti liqabdihâ", fr:"et l’Ange de la mort apparaît,"},
        {t:'tri', ar:"مِنْ حُجُبِ الْغُيُوبِ", tr:"min hujubi alghuyûbi", fr:"des voiles occultes,"},
        {t:'tri', ar:"وَرَمَاهَا عَن قَوْسِ الْمَنَايَا", tr:"wa ramâhâ ‘an qawsi almanâya", fr:"et à l’aide de l’arc de la mort,"},
        {t:'tri', ar:"بِأَسْهُمِ وَحْشَةِ الْفِرَاقِ", tr:"bi-as-humi wahchati alfirâqi", fr:"tire des flèches de terreur,"},
        {t:'tri', ar:"وَدَافَ لَهَا مِنْ ذُعَافِ الْمَوْتِ", tr:"wa dâfa lahâ min dhu’âfi almawti", fr:"et en mélangeant Tamer sirop mortel"},
        {t:'tri', ar:"كَأْساً مَسْمُومَةَ الْمَذَاقِ", tr:"ka’san masmûmata almadhâqi", fr:"dans la coupe empoisonnée pour le palais de leurs âmes;"},
        {t:'tri', ar:"وَدَنَا مِنَّا إِلَى الآخِرَةِ رَحِيلٌ وَانْطِلاقٌ", tr:"wa danâ minnâ ilâ al-âkhirati rahîlun wanțilâqun", fr:"et quand le déparia et lémigration viendraient à nous pour nous faire aller à l’autre monde (l’Au-delà),"},
        {t:'tri', ar:"وَصَارَتِ الْأَعْمَالُ قَلاَئِدَ فِي الأَعْنَاقِ", tr:"wa șârat al-a’mâlu qalâ’ida fil-a nâqi", fr:"les actions deviendraient comme des collets autour des cous,"},
        {t:'tri', ar:"وَكَانَتِ الْقُبورُ هِيَ الْمَأْوَى إِلَى مِيقَاتِ يَوْمِ التَّلَاَقِ", tr:"wa kânat alqubûru hiya alma’wâ ilâ migâti yawmi attalâqi", fr:"et les tombes seraient notre domicile, jusqu’au rendez-vous du Jour de la Rencontre!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَبَارِكْ لَنَا فِي حُلُولِ دَارِ الْبِلَى", tr:"wa bârik lanâ fi hulûli dâri albilâ", fr:"et blesse pour nous la descente à la maison de la détérioration,"},
        {t:'tri', ar:"وَطُولِ الْمُقَامَةِ بَيْنَ أَطْبَاقِ الثَّرَى", tr:"wa țûli almuqâmati bayna atbâqi aththarâ", fr:"et le long séjour entre les couches de la terre,"},
        {t:'tri', ar:"وَاجْعَلِ الْقُبورَ بَعْدَ فِرَاقِ الدُّنْيَا خَيْرَ مَنَازِلِنَا", tr:"waj’al alqubûra ba da firâqi addunyâ khayra manâzilinâ", fr:"et fais-en sorte que nos tombes soient nos meilleures logements,"},
        {t:'tri', ar:"وَافْسَحْ لَنَا بِرَحْمَتِكَ فِي ضِيقِ مَلاَحِدِنَا", tr:"wafsah lanâ birahmatika fi diqi malâhidinâ", fr:"et de par Ta Grâce, élargis pour nous l’étroitesse de nos tombes,"},
        {t:'tri', ar:"وَلَاَ تَفْضَحْنَا فِي حَاضِرِ الْقِيَامَةِ بِمُوبِقَاتِ آثَامِنَا", tr:"wa la tafdahnâ fi hâdiri alqiyâmati bimûbiqâti âthâminâ", fr:"et dans la Résurrection, parmi ceux présents, ne nous déshonore point par nos péchés mortels (ruineux)!"},
        {t:'tri', ar:"وَارْحَمْ بالْقُرَآنِ فِي مَوْقِفِ الْعَرْضِ عَلَيْكَ ذُلَّ مَقَامِنَا", tr:"warham bilqurâni fi mawaifi al’ardi ‘alayka dhulla maqâminâ", fr:"De par le Coran, Aie pitié de notre humble humiliation devant Toi, dans l’étape de notre assemblée en rangs;"},
        {t:'tri', ar:"وَثَبِّتْ بِهِ عِنْدَ اضْطِرَابِ جِسْرِ جَهَنَّمَ", tr:"wa thabbit bihî ‘inda idțirâbi jisri jahannama", fr:"affermis nos pas pendant le tremblement du pont qui passe par l’Enfer,"},
        {t:'tri', ar:"يَوْمَ الْمَجَازِ عَلَيْهَا زَلَلَ أَقْدَامِنَا", tr:"yawma almajâzi ‘alayhâ zalala aqdâminâ", fr:"au jour où il faudrait passer au-dessus,"},
        {t:'tri', ar:"وَنَوِّرْ بِهِ قَبْلَ الْبَعْثِ سُدَفَ قُبُورِنَا", tr:"wa nawwir bihî qabla alba’thi sudafa qubûrinâ", fr:"Illumine de par le Coran, l’obscurité de nos tombes avant la Résurrection,"},
        {t:'tri', ar:"وَنَجِّنَا بِهِ مِنْ كُلِّ كَرْبٍ يَوْمَ الْقِيَامَةِ", tr:"wa najjina bihi min kulli karbin yawma alqiyâmati", fr:"et de par le Coran, sauve-nous de toute détresse dans le jour de la Résurrection,"},
        {t:'tri', ar:"وَشَدَائِدِ أَهْوَالِ يَوْمِ الطَّامَّةِ", tr:"wa chadâ’idi ahwâli yawmi attâmmati", fr:"et de toutes les tribulations et les violences de la Terreur dans le Jour du Désastre!"},
        {t:'tri', ar:"وَبَيِّضْ وجُوهَنَا يَوْمَ تَسْوَدُّ وُجُوهُ الظَّلَمَةِ", tr:"wa bayyid wujühana yawma taswaddu wujûhu azzalamati", fr:"Blanchis nos visages, le jour où le visage des malfaiteurs sera noirci;"},
        {t:'tri', ar:"فِي يَوْمِ الْحَسْرَةِ وَالنَّدَامَةِ", tr:"fi yawmi alhasrati wannadâmati", fr:"Pendant le Jour du Regret et du Remord,"},
        {t:'tri', ar:"وَاجْعَلْ لَنَا فِي صُدُور الْمُؤْمِنِينَ وُدّاً", tr:"waj’al lanâ fi şudûri almu’minîna wuddan", fr:"appointe pour nous l’amitié dans les coeurs des fidèles,"},
        {t:'tri', ar:"وَلَاَ تَجْعَلِ الْحَيَاةَ عَلَيْنَا نَكَداً", tr:"wa lâ taj al alhayâta ‘alaynâ nakadan", fr:"et de Grâce! ne rends pas notre vie pénible!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ", tr:"allâhumma şalli ‘alâ muhammadin", fr:"Ô Dieu! Bénis Mohammad,"},
        {t:'tri', ar:"عَبْدِكَ وَرَسُولِكَ", tr:"abdika wa rasûlika", fr:"Ton serviteur et Ton messager,"},
        {t:'tri', ar:"كَمَا بَلَّغَ رِسَالَتَكَ", tr:"kamâ ballagha risâlataka", fr:"de même qu’il délivra Ton Message,"},
        {t:'tri', ar:"وَصَدَعَ بِأَمْرِكَ", tr:"wa șada a bi- amrika", fr:"et proclama Ta Commande,"},
        {t:'tri', ar:"وَنَصَحَ لِعِبَادِكَ", tr:"wa nașaha li’ibâdika", fr:"et conseilla Tes serviteurs!"},
        {t:'tri', ar:"اللَّهُمَّ اجْعَلْ نَبِيَّنَا", tr:"allâhumma ij’al nabiyyanâ", fr:"Ô Dieu! Désigne le siège de notre Prophète"},
        {t:'tri', ar:"صَلَوَاتُكَ عَلَيْهِ وَعَلَى آلِهِ", tr:"şalawâtuka ‘alayhî wa ‘alâ âlihî", fr:"– qu’il soit béni ainsi que sa Famille! –"},
        {t:'tri', ar:"يَوْمَ الْقِيَامَةِ أَقْرَبَ النَّبِيِّینَ مِنْكَ مَجْلِساً", tr:"yawma algiyâmati aqraba annabiyyîna minka majlisan", fr:"le plus proche de Toi parmi les Prophètes, dans le Jour de la Résurrection!"},
        {t:'tri', ar:"وَأَمْكَنَهُمْ مِنْكَ شَفَاعَةً", tr:"wa amkanahum minka chafâ atan", fr:"Qu’il soit le plus capable devant Toi parmi eux pour l’intercession,"},
        {t:'tri', ar:"وَأَجَلَّهُمْ عِنْدَكَ قَدْراً", tr:"wa ajallahum ‘indaka qadran", fr:"le plus prestigieux,"},
        {t:'tri', ar:"وَأَوْجَهَهُمْ عِنْدَكَ جَاهاً", tr:"wa awjahahum ‘indaka jâhan", fr:"et le plus éminent parmi eux devant Toi!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ", tr:"allâhumma şalli ‘alâ muhammadin wa ali muhammadin", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَشَرِّفْ بُنْيَانَهُ", tr:"wa charrif bunyânahu", fr:"Ennoblis son édifice (fondement)"},
        {t:'tri', ar:"وَعَظِّمْ بُرْهَانَهُ", tr:"wa ‘azzim burhânahu", fr:"magnifie son argument,"},
        {t:'tri', ar:"وَثَقِّلْ مِيْزَانَهُ", tr:"wa thaqqil mizânahu", fr:"alourdis sa balance,"},
        {t:'tri', ar:"وَتَقَبَّلْ شَفَاعَتَهُ", tr:"wa taqabbal chafâ ‘atahu", fr:"honore son intercession,"},
        {t:'tri', ar:"وَقَرِّبْ وَسِيلَتَهُ", tr:"wa qarrib wasilatahu", fr:"rapproche de Toi son intermédiaire,"},
        {t:'tri', ar:"وَبَيّضْ وَجْهَهُ", tr:"wa bayyid wajhahu", fr:"et blanchis son visage,"},
        {t:'tri', ar:"وَأَتِمَّ نُورَهُ", tr:"wa atimma nûrahu", fr:"perfectionne sa lumière,"},
        {t:'tri', ar:"وَارْفَعْ دَرَجَتَهُ", tr:"warfa’ darajatahu", fr:"et élève au plus haut son rang!"},
        {t:'tri', ar:"وَأَحْيِنَا عَلَى سُنَّتِهِ", tr:"wa ahyinâ ‘alâ sunnatihi", fr:"Fais-nous vivre en accordance avec sa tradition Sunna"},
        {t:'tri', ar:"وَتَوَفَّنَا عَلَى مِلَّتِهِ", tr:"wa tawaffanâ ‘alâ millatihi", fr:"Fais-nous mourir dans sa religion,"},
        {t:'tri', ar:"وَخُذْ بِنَا مِنْهَاجَهُ", tr:"wa khudh binâ minhâjahu", fr:"Mène-nous à son chemin,"},
        {t:'tri', ar:"وَاسْلُكْ بِنَا سَبِيلَهُ", tr:"wasluk binâ sabilahu", fr:"Fais-nous parcourir son clair sentier (voie)"},
        {t:'tri', ar:"وَاجْعَلْنَا مِنْ أَهْلِ طَاعَتِهِ", tr:"waj alnâ min ahli tâ’atihi", fr:"Place-nous parmi ceux qui lui obéissent,"},
        {t:'tri', ar:"وَاحْشُرْنَا فِي زُمْرَتِهِ", tr:"wahchurna fi zumratihi", fr:"Place-nous parmi son groupe,"},
        {t:'tri', ar:"وَأَوْرِدْنَا حَوْضَهُ", tr:"wa awridnâ hawdahu", fr:"Fais-nous entrer dans sa fontaine,"},
        {t:'tri', ar:"وَاسْقِنَا بِكَأْسِهِ", tr:"wasqinâ bika’sihi", fr:"Fais-nous boire (désaltère-nous) de sa coupe!"},
        {t:'tri', ar:"وَصَلِّ اللَّهُمَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"wa şalli allahumma ‘alâ muhammadin wa âlihi", fr:"Bénis Mohammad et toute sa Famille"},
        {t:'tri', ar:"صَلاَةً تُبَلِّغُهُ بِهَا أَفْضَلَ مَا يَأْمُلُ", tr:"şalâtan tuballighuhû bihâ afdala mâ ya’mulu", fr:"d’une telle bénédiction par laquelle Tu le fasses atteindre comme il espère"},
        {t:'tri', ar:"مِنْ خَيْرِكَ وَفَضْلِكَ وَكَرَامَتِكَ", tr:"min khayrika wa fadlika wa karâmatika", fr:"de Toi à l’excellence de Ta Bonté, de Ta Grâce et de Ta Générosité"},
        {t:'tri', ar:"إِنَّكَ ذُو رَحْمَةٍ وَاسِعةٍ", tr:"innaka dhû rahmatin wâsi’ itin", fr:"Tu es Le Possesseur d’une Clémence immense,"},
        {t:'tri', ar:"وَفَضْلٍ كَرِيمِ", tr:"wa fadlin karimin", fr:"et d’une Abondance généreuse."},
        {t:'tri', ar:"اللَّهُمَّ اجْزِهِ بِمَا بَلَّغَ مِنْ رِسَالاَتِكَ", tr:"allâhumma ijzihî bimâ ballagha min risâlâtika", fr:"Ô Dieu! Récompense-le pour Tes messages qu’il délivra,"},
        {t:'tri', ar:"وَأَدَّى مِنْ آيَاتِكَ", tr:"wa addâ min âyâtika", fr:"Tes signes qu’il démontra,"},
        {t:'tri', ar:"وَنَصَح لِعِبَادِكَ", tr:"wa nașaha li’ibâdika", fr:"et les bons conseils qu’il donna à Tes serviteurs,"},
        {t:'tri', ar:"وَجَاهَدَ فِي سَبِيلِكَ", tr:"wa jâhada fi sabîlika", fr:"et l’effort qu’il entreprit dans Ta Voie,"},
        {t:'tri', ar:"أَفْضَلَ مَا جَزَيْتَ أَحَداً مِنْ مَلاَئِكَتِكَ الْمُقَرَّبِينَ", tr:"afdala mâ jazayta ahadan min malâ’ikatika almuqarrabîna", fr:"avec le meilleur de ce que Tu as récompensé chacun de Tes plus proches Anges,"},
        {t:'tri', ar:"وَأَنْبِيَائِكَ الْمُرْسَلِينَ الْمُصْطَفَيْنَ", tr:"wa anbiyâ’ika almursalîna almuşțafayna", fr:"et Tes Prophètes que Tu avais choisis et envoyés ici-bas,"},
        {t:'tri', ar:"وَالسَّلامُ عَلَيْه وَعَلَى آلِهِ الطَِّّيبِینَ الطَّاهِرِينَ", tr:"wassalâmu ‘alayhi wa ‘alâ âlihi attayyibina attâhirina", fr:"Et que la paix soit sur Lui et sa Famille, les vertueux et les purs,"},
        {t:'tri', ar:"وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ.", tr:"wa rahmatu allâhî wa barakâtuhu", fr:"et aussi Ta Clémence et Tes Bénédictions!"},
        {t:'salawat'},
      ]
    },
    's43': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "43. La Nouvelle Lune",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lorsque apparaît la nouvelle Lune",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وَكَانَ مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا نظر إِلى الْهِلالِ", tr:"", fr:"La quarante troisième supplication: quand Il regardait le croissant du nouveau mois lunaire"},
        {t:'tri', ar:"أَيُّّهَا الخَلْقُ الْمُطِيعُ،", tr:"ayyuhå alkhalqu almuți’u", fr:"Ô! créature obéissante!"},
        {t:'tri', ar:"الدَّائِبُ السّرِيعُ،", tr:"addâ’ibu assari u", fr:"Assidûment rapide!"},
        {t:'tri', ar:"الْمُتَرَدّدُ فِي مَنَازِلِ التَّقْدِيرِ،", tr:"almutaraddidu fi manâzili attaqdiri", fr:"fréquenteuse des phases déterminées,"},
        {t:'tri', ar:"المُتَصَرّفُ فِي فَلَكِ التَّدْبِيرِ،", tr:"almutaşarrifu fi falaki attadbiri", fr:"et qui se meut dans la sphère de la gouvernance!"},
        {t:'tri', ar:"آمَنْتُ بِمَنْ نَوّرَ بِكَ الظَّلَمَ،", tr:"âmantu biman nawwara bika azzulama", fr:"J’ai foi en Celui qui illumine l’obscurité par toi,"},
        {t:'tri', ar:"وَأَوْضَحَ بِكَ البُهَمَ،", tr:"wa awdaha bika albuhama", fr:"et élucide par toi les Ténèbres,"},
        {t:'tri', ar:"وَجَعَلَكَ آيَةً مِنْ آيَاتِ مُلْكِهِ،", tr:"wa ja’alaka âiyatan min âyâti mulkihi", fr:"et te désigna comme l’un des signes de Son Royaume"},
        {t:'tri', ar:"وَعَلامَةً مِنْ عَلامَاتِ سُلْطَانِهِ،", tr:"wa ‘alâmatan min ‘alâmâti sulțânihi", fr:"et une des marques de Son Autorité,"},
        {t:'tri', ar:"فَحَدّ بِكَ الزّمَانَ", tr:"fahadda bika alzzamâna", fr:"et te rendit humble,"},
        {t:'tri', ar:"وَامْتَهَنَكَ بِالكَمَالِ وَانُّقْصَانِ", tr:"wamtahanaka bilkamâli wannuqșâni", fr:"de par l’augmentation et la réduction,"},
        {t:'tri', ar:"وَالطّلُوعِ وَالأُفُولِ", tr:"wattulû’i wal’ufûli", fr:"par le lever et le coucher,"},
        {t:'tri', ar:"وَالإنَارَةِ وَالكُسُوفِ", tr:"wal-inârati walkusûfi", fr:"par l’illumination et l’éclipse."},
        {t:'tri', ar:"فِي كُلّ ذلِكَ أَنْتَ لَهُ مُطِيعٌ", tr:"fi kulli dhâlika anta lahu muți’un", fr:"Dans tout cela, tu Lui es obéissante,"},
        {t:'tri', ar:"وَإِلَى إرَادَتِهِ سَرِيعٌ،", tr:"wa ilâ irâdatihi sari un", fr:"et prompte envers Sa Volonté."},
        {t:'tri', ar:"سُبْحَانَهُ مَا أَعْجَبَ مَا دَبّرَ مِنْ أَمْرِكَ!", tr:"subhânahu mâ a jaba mâ dabbara min amrika", fr:"Gloire à Lui! Comme c’est merveilleux ce qu’il a arrangé dans ta situation"},
        {t:'tri', ar:"وَأَلْطَفَ مَا صَنَعَ فِي شَأْنِكَ!", tr:"wa alțafa mâ șana’a fi cha’nika", fr:"Comme paraît subtil ce qu’Il a fait pour toi!"},
        {t:'tri', ar:"جَعَلَكَ مِفْتَاحَ شَهْرٍ حَادِثٍ لأَمْرٍ حَادِثٍ،", tr:"ja’alaka miftâha chahrin hâdithin li’amrin hâdithin", fr:"Il t’a rendu comme étant la clé d’un nouveau mois, pour une nouvelle action."},
        {t:'tri', ar:"فَأَسْأَلُ اللهَ رَبِّي وَرَبّكَ،", tr:"fa-as’alu allâha rabby wa rabbaka", fr:"Ainsi, je demande à Dieu, Mon Seigneur et Ton Seigneur,"},
        {t:'tri', ar:"وَخَالِقِي وَخَالِقَكَ،", tr:"wa khâliqy wa khâliqaka", fr:"Mon Créateur et Ton Créateur,"},
        {t:'tri', ar:"وَمُقَدّرِي وَمُقَدّرَكَ،", tr:"wa muqaddiry wa muqaddiraka", fr:"et dont la mesure de ce qu’Il a pour toi et moi, réside dans Son Pouvoir,"},
        {t:'tri', ar:"وَمُصَوِّرِي وَمُصَوّرَكَ", tr:"wa muşawwiry wa muşawwiraka", fr:"Mon portraitiste et Ton portraitiste"},
        {t:'tri', ar:"أَنْ يُصَلِّيَ عَلَى مُحَمِّدٍ وَآلِ مُحَمّدٍ،", tr:"an yuşalliya ‘alâ muhammadin wa âli muhammadin", fr:"qu’Il bénisse Mohammad et Sa Famille,"},
        {t:'tri', ar:"وَأَنْ يَجْعَلَكَ هِلالَ بَرَكَةٍ لا تَمْحَقُهَا الأَيَّامُ،", tr:"wa an yaj’alaka hilâla barakatin lâ tamhaquhâ alayyâmu", fr:"et te désigne comme un croissant de bénédictions qui ne disparaîtra point par le passage des jours,"},
        {t:'tri', ar:"وَطَهَارَةٍ لا تُدَنِّسُهَا الآثَامُ،", tr:"wa tahâratin lâ tudannisuhâ al- âthâmu", fr:"et comme une pureté que la souillure des péchés ne l’avilira point."},
        {t:'tri', ar:"هِلالَ أَمْنٍ مِنَ الْآفَاتِ،", tr:"hilâla amnin mina al-âfâti", fr:"Comme un croissant de sécurité contre tout fléau,"},
        {t:'tri', ar:"وَسَلامَةٍ مِنَ السيِّئَاتِ،", tr:"wa salâmatin mina assayy iâti", fr:"de salut contre toute laideur;"},
        {t:'tri', ar:"هِلالَ سَعْدٍ لا نَحْسَ فِيهِ،", tr:"hilâla sa’din lâ nahsa fihi", fr:"Un croissant de félicité, vide de toute infortune, un croissant de bonheur propice, ne contenant aucune calamité;"},
        {t:'tri', ar:"وَيُمْنِ لا نَكَدَ مَعَهُ،", tr:"wa yumnin la nakada ma’ahu", fr:"De prospérité, qui ne soit accompagné d’aucune adversité;"},
        {t:'tri', ar:"وَيُسْرٍ لا يُمَازِجُهُ عُسْرٌ،", tr:"wa yusrin lâ yumâzijuhu ‘usrun", fr:"De facilité et d’aise, qui ne soit point mélangé avec aucune difficulté;"},
        {t:'tri', ar:"وَخيْرِ لا يَشُوبُهُ شَرّ،", tr:"wa khîrin lâ yachûbuhu charrun", fr:"Un croissant de bonté, qui ne soit teinté d’aucun mal;"},
        {t:'tri', ar:"هِلالَ أَمْنٍ وَإِيمَانٍ،", tr:"hilâla amnin wa ‘îmânin", fr:"Un croissant de sécurité et de foi,"},
        {t:'tri', ar:"وَنِعْمَةٍ وَإِحْسَانٍ،", tr:"wa ni’matin wa ihsânin", fr:"de faveur et de bienfaisance,"},
        {t:'tri', ar:"وَسَلامَةٍ وَإسْلامٍ.", tr:"wa salâmatin wa islâmin", fr:"de sûreté et de soumission,"},
        {t:'tri', ar:"اللّهُمْ صَلِّ عَلَى مُحَمّدٍ وَآلِ مُحَمّدٍ", tr:"allâhumma şalli ‘alâ muhammadin wa ali muhammadin", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْعَلْنَا مِنْ أَرْضَى مَنْ طَلَعَ عَلَيْهِ،", tr:"waj’ alnâ min ardâ man țala a ‘alayhi", fr:"Place-nous parmi les plus contents, entre ceux dont le croissant de lune s’est levé au-dessus d’eux parmi les plus purs,"},
        {t:'tri', ar:"وَأَزْكَى مَنْ نَظَرَ إِلَيْهِ،", tr:"wa azkâ man nazara ilayhi", fr:"et qui l’ont aperçu, parmi les plus fortunés entre ceux qui dans ledit mois"},
        {t:'tri', ar:"وَأَسْعَدَ مَنْ تَعَبّدَ لَكَ فِيهِ،", tr:"wa as’ada man ta’abbada laka fihi", fr:"ont essayé d’être Tes serviteurs;"},
        {t:'tri', ar:"وَوَفّقْنَا اللّهُمّ فِيهِ لِلطَّاعَةِ وَالتّوْبَةِ،", tr:"wa waffiqna allâhumma fihi lițțâ ati wattawbati", fr:"Accorde-nous succès pendant [le nouveau mois] pour pouvoir nous repentir,"},
        {t:'tri', ar:"وَاعْصِمْنَا فِيهِ مِنَ الآثَامِ وَالحَوْبَةِ،", tr:"wâ’ simnâ fihi mina al-âthâmi walhawbati", fr:"et préserve-nous de toute mauvaise action dans ce mois, et protège-nous dans ce mois, de toute désobéissance envers Toi,"},
        {t:'tri', ar:"وَأَوْزِعْنَا فِيهِ شُكْرَ النَّعْمَةِ،", tr:"wa awzi’ nâ fîhi chukra anni’ mati", fr:"et accorde-nous la possibilité de Te remercier dans ce mois, pour toutes les faveurs que Tu nous as accordés, et durant ce mois,"},
        {t:'tri', ar:"وَأَلْبِسْنَا فِيهِ جُنَنَ العَافِيَةِ،", tr:"wa albisna fihi junana al’âfiyati", fr:"Fais-nous porter l’armure (l’habit) du bien-être,"},
        {t:'tri', ar:"وَأَتْمِمْ عَلَيْنَا بِاسْتِكْمَالِ طَاعَتِكَ فِيهِ المِنّةَ،", tr:"wa atmim ‘alaynâ biâstikmâli tâ’ atika fîhi alminnata", fr:"et en ce mois, complète pour nous Ta Bonté pour que nous ayons le courage de perfectionner notre obéissance envers Toi."},
        {t:'tri', ar:"إنّكَ أَنْتَ المَنَّانُ الحَمِيدُ،", tr:"innaka anta almannânu alhamîdu", fr:"Car Tu es sûrement le Donateur le plus Généreux des grandes abondances, et Digne des plus hautes louanges!"},
        {t:'tri', ar:"وَصَلَّى اللهُ عَلَى مُحَمّدٍ وَآلِهِ الطّيّبِينَ الطَّاهِرِينَ.", tr:"et toute sa Famille, qui wa sallâallâhu ala di, dari de all diss muhammadin wa âlihi ațțayyibîna", fr:"Et bénis Mohammad sont les bons et les purs!"},
        {t:'salawat'},
      ]
    },
    's44': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "44. Le Mois de Ramadan",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation à l'entrée du mois de Ramadan",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا دخل شهْرُ رمضان", tr:"", fr:"La quarante quatrième supplication: à l’approche du mois de Ramadan"},
        {t:'tri', ar:"اَلْحَمدُ لِلَّهِ الَّذِي هَدَانَا لِحَمْدِهِ", tr:"alhamdu lillâhi alladhi hadânâ lihamdihi", fr:"Louange appartient à Dieu qui nous a guidés pour que nous Lui rendions grâce,"},
        {t:'tri', ar:"وَجَعَلَنَا مِنْ أَهْلِهِ", tr:"wa ja’alanâ min ahlihi", fr:"et nous plaçâ parmi les gens louables,"},
        {t:'tri', ar:"لِنَكُونَ لإِحْسَانِهِ مِنَ الشَّاكِرِينَ", tr:"linakûna li-ihsânihî min achchâkirina", fr:"pour que nous soyons parmi les gens qui rendent grâce pour Ses Bientaisances,"},
        {t:'tri', ar:"وَلِيَجْزِيَنَا عَلَى ذَلِكَ جَزَاءَ الْمُحْسِنِينَ", tr:"wa liyajziyanâ ‘alâ dhâlika jazâ’a almuhsinina", fr:"et qu’Il nous accorde la récompense destinée aux bienfaiteurs!"},
        {t:'tri', ar:"وَالْحَمْدُ لِلَّهِ الَّذِي حَبَانَا بِدِينِهِ", tr:"walhamdu lillâhi alladhi habânâ bidînihi", fr:"Et louange appartient à Dieu qui nous gratifia Sa Croyance,"},
        {t:'tri', ar:"وَاخْتَصَّنَا بِمِلَّتِهِ", tr:"wakhtaşșana bimillatihi", fr:"et nous fit approprier Sa Religion,"},
        {t:'tri', ar:"وَسَبَّلَنَا فِي سُبُلِ إِحْسَانِهِ", tr:"wa sabbalanâ fi subuli ihsânihi", fr:"et nous dirigea dans les chemins de Sa Bienfaisance,"},
        {t:'tri', ar:"لِنَسْلُكَهَا بِمَنَّهِ إِلَى رِضْوَانِهِ", tr:"linaslukaha bimannihi ilâ ridwânihi", fr:"de sorte qu’à travers ces chemins, nous puissions à l’aide de Sa Grâce!"},
        {t:'tri', ar:"حَمْداً يَتَقَبَّلُهُ مِنَّا", tr:"hamdan yataqabbaluhû minnâ", fr:"Une louange qu’il acceptera de nous,"},
        {t:'tri', ar:"وَيَرْضَى بِهِ عَنَّا", tr:"wa yardâ bihî ‘annâ", fr:"et par laquelle Il sera satisfait de nous!"},
        {t:'tri', ar:"وَالْحَمْدُ لِلَّهِ الَّذِي جَعَلَ مِنْ تِلْكَ السُّبُلِ شَهْرَهُ", tr:"walhamdu lillâhi alladhî ja ‘ala min tilka assubuli chahrahû", fr:"Et louange appartient à Dieu qui désigna parmi ces chemins Son mois:"},
        {t:'tri', ar:"شَهْرَ رَمَضَانَ", tr:"chahra ramadâna", fr:"le mois de Ramadan,"},
        {t:'tri', ar:"شَهْرَ الصِّيَامِ", tr:"chahra aşşiyâmi", fr:"le mois de jeûne,"},
        {t:'tri', ar:"وَشَهْرَ الإِسْلاَمِ", tr:"wa chahra al-islâmi", fr:"le mois de soumission,"},
        {t:'tri', ar:"وَشَهْرَ الطَّهُورِ", tr:"wa chahra ațtahûri", fr:"le mois de pureté,"},
        {t:'tri', ar:"وَشَهْرَ التَّمْحِيصِ", tr:"Na cnanra attamhişi", fr:"le mois de passage des épreuves,"},
        {t:'tri', ar:"وَشَهْرَ الْقِيَامِ", tr:"wa chahra alqiyâmi", fr:"le mois de rester debout en prière,"},
        {t:'tri', ar:"اَلَّذِي أُنْزِلَ فِيهِ الْقُرْآنُ", tr:"alladhî unzila fîhi alqur’ânu", fr:"dans lequel le Coran a été descendu ici-bas comme une Direction"},
        {t:'tri', ar:"هُدًى لِلنَّاسِ وَبَيِّنَاتٍ مِنَ الْهُدَى وَالْفُرْقَانِ", tr:"hudan linnâsi wa bayyinâtin min alhudâ walfurqân", fr:"pour les hommes, une manifestation claire de la Direction et de la Loi!"},
        {t:'tri', ar:"فَأَبَانَ فَضِيلَتَهُ عَلَى سَائِرِ الشُّهُورِ", tr:"fa abâna fadîlatahû ‘alâ sâ’iri achchuhûri", fr:"Il manifesta sa supériorité sur d’autres mois"},
        {t:'tri', ar:"بِمَا جَعَلَ لَهُ مِنَ الْحُرُمَاتِ الْمَوْفُورَةِ", tr:"bimâ ja ala lahû min alhurumâti almawfürati", fr:"par de nombreuses choses sacrées,"},
        {t:'tri', ar:"وَالْفَضَائِلِ الْمَشْهُورَةِ", tr:"walfadâ’ili almach-hûrati", fr:"et des vertus bien connues (célèbres) qu’Il mit dans ce mois-ci;"},
        {t:'tri', ar:"فَحَرَّمَ فِيهِ مَا أَحَلَّ فِي غَيْرِهِ إِعْظَاماً", tr:"faharrama fihi mâ ahalla fi ghayrihî i’zâman", fr:"Ainsi pour l’estime dû envers ce mois, Il y décréta illicite, ce qu’il avait déclaré licite dans d’autres mois, et pour l’honorer,"},
        {t:'tri', ar:"وَحَجَرَ فِيهِ الْمَطَاعِمَ وَالْمَشَارِبَ إِكْرَاماً", tr:"wa hajara fihi almațâ’ima walmachâriba ikrâman", fr:"Il interdit nourritures et boissons dans ce mois, et Majestueux et Puissant qu’Il est,"},
        {t:'tri', ar:"وَجَعَلَ لَهُ وَقْتَا بَيِّناً", tr:"wa ja ala lahû waqtan bayyinan", fr:"Il lui désigna un laps de temps défini, clair et précis,"},
        {t:'tri', ar:"لاَ يُجِيزُ جَلَّ وَعَزَّ أَنْ يُقَدَّمَ قَبْلَهُ", tr:"lâ yujîzu jalla wa ‘azza an yuqaddama qablahu wa lâ yaqbalu an", fr:"et dont Il n’admet point qu’il se précipite en avant,"},
        {t:'tri', ar:"وَلَا يَقْبَلُ أَنْ يُؤَخَّرَ عَنْهُ", tr:"wa lâ yaqbalu an yu’akhkhara ‘anhu", fr:"ou qu’il s’ajourne en arrière."},
        {t:'tri', ar:"ثُمَّ فَضَّلَ لَيْلَةً وَاحِدَةً مِنْ لَيَالِيهِ", tr:"thumma faddala laylatan wâhidatan min layalihi", fr:"Ensuite Il montra Sa Préférence, de sorte qu’une seule des nuits de ce mois,"},
        {t:'tri', ar:"عَلَى لَيَالِي أَلْفِ شَهْرٍ", tr:"alâ layâli alfi chahrin", fr:"surpasse les nuits de mille mois,"},
        {t:'tri', ar:"وَسَمَّاهَا لَيْلَةَ الْقَدْرِ", tr:"wa sammâhâ laylata alqadri", fr:"et la surnomma «  »Nuit du Décret (Qadr) » »"},
        {t:'tri', ar:"تَنَزَّلُ الْمَلاَئِكَةُ وَالرُّوحُ فِيهَا", tr:"tanazzalu almalâ’ikatu warrûhu fihâ", fr:"Dans laquelle les Anges et l’Esprit descendent"},
        {t:'tri', ar:"بِإِذْنِ رَبِّهِمْ مِنْ كُلِّ أَمْرٍ", tr:"bi-idhni rabbhim min kulli amrin", fr:"par la commande de leur Seigneur, pour toutes les affaires,"},
        {t:'tri', ar:"سَلاَمٌ دَائِمُ الْبَرَكَةِ إِلَى طُلُوعِ الْفَجْرِ", tr:"salâmun dâ’imu albarakati ilâ tulû i alfajri", fr:"et c’est une nuit pleine de paix constante en bénédictions jusqu’à l’aube,"},
        {t:'tri', ar:"عَلَى مَنْ يَشَاءُ مِنْ عِبَادِهِ", tr:"min ‘ibâdihî", fr:"sur n’importe lequel de ‘alâ man yachâ’u Ses serviteurs,"},
        {t:'tri', ar:"بِمَا أَحْكَمَ مِنْ قَضَائِهِ", tr:"bimâ ahkama min qadâ’ihi", fr:"en accordance avec la décision qu’il a tenue ferme."},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَلْهِمْنَا مَعْرِفَةَ فَضْلِهِ", tr:"wa alhimnâ ma rifata fadlihi", fr:"Inspire-nous avec la connaissance de sa supériorité,"},
        {t:'tri', ar:"وَإِجْلالَ حُرْمَتِهِ", tr:"wa ijlâla hurmatihi", fr:"avec la vénération de son inviolabilité,"},
        {t:'tri', ar:"وَالتَّحَفُّظَ مِمَّا حَظَرْتَ فِيهِ", tr:"wattahaffuza mimmâ hazarta fihi", fr:"et le respect de nous préserver ce que Tu as interdit dans ce mois,"},
        {t:'tri', ar:"وَأَعِنَّا عَلَى صِيَامِهِ", tr:"wa a’innâ ‘alâ şiyâmihî", fr:"et aide-nous à jeûne dans ce mois,"},
        {t:'tri', ar:"بِكَفِّ الْجَوَارِحِ عَنْ مَعَاصِيكَ", tr:"bikaffi aljawârihi ‘an ma’âşîka", fr:"avec une stricte retenue (abstinence) de nos membres, et retiens-nous de toute désobéissance envers Toi,"},
        {t:'tri', ar:"وَاسْتِعْمَالِهَا فِيهِ بِمَا يُرْضِيكَ", tr:"wasti mâlihâ fihi bimâ yurdika", fr:"et d’utiliser nos membres dans ce mois, comme il Te plairait,"},
        {t:'tri', ar:"حَتَّى لَاَ نُصْغِيَ بِأَسْمَاعِنَا إِلَى لغْوٍ", tr:"hattâ lâ nuşghiya bi-asmâ’ inâ ilâ laghwin", fr:"de sorte que nous ne prêtions oreille aux sottises,"},
        {t:'tri', ar:"وَلَاَ نُسْرِعَ بِأَبْصَارِنَا إِلَى لَهْوٍ", tr:"wa lâ nusri a bi- abșârina ilâ lahwin", fr:"et ne hâtions nos yeux pour regarder d’inutiles diversions,"},
        {t:'tri', ar:"وَحَتَّى لاَ نَبْسُطَ أَيْدِيَنَا إِلَى مَحْظُورٍ", tr:"wa hattâ lâ nabsuța aydiyanâ ilâ mahzürin", fr:"et n’avancions nos mains vers ce qui est interdit,"},
        {t:'tri', ar:"وَلَا نَخْطُوَ بِأَقْدَامِنَا إِلَى مَحْجُورٍ", tr:"wa lâ nakhțû bi- aqdâminâ ilâ mahjürin", fr:"et ne marchions avec nos pas vers ce qui est défendu,"},
        {t:'tri', ar:"وَحَتَّى لاَ تَعِيَ بُطُونُنَا إِلاَّ مَا أَحْلَلْتَ", tr:"wa hattâ lâ ta iya butûnunâ illâ mâ ahlalta", fr:"et que nos ventres ne conservent que ce que Tu as déclaré licite,"},
        {t:'tri', ar:"وَلَاَ تَنْطِقَ أَلْسِنَتُنَا إِلاَّ بِمَا مَثَّلْتَ", tr:"wa lâ tanțiqa alsinatunâ illâ bimâ maththalta", fr:"et que nos langues ne parlent que de ce que tu as exprimé,"},
        {t:'tri', ar:"وَلَاَ نَتَكَلَّفَ إِلاَّ مَا يُدْنِي مِنْ ثَوَابِكَ", tr:"wa lâ natakallafa illa mâ yudni min thawâbika", fr:"et que nous ne nous engagions que vers ce qui nous amène vers"},
        {t:'tri', ar:"وَلاَ نَتَعَاطَى إِلاَّ الَّذِي يَقِي مِنْ عِقَابِكَ", tr:"wa lâ nata ‘âtâ illâ alladhi yaqî min ‘ iqâbika", fr:"Ta Récompense, et n’entreprenions que ce qui nous protége de Ta Punition!"},
        {t:'tri', ar:"ثُمَّ خَلِّصْ ذَلِكَ كُلَّهُ مِنْ رِيَاءِ الْمُرَائِينَ", tr:"thumma khallis dhâlika kullahû min riyâ’i almurâ’îna", fr:"Ensuite débarrasse (purge) toutes ces actions: de l’hypocrisie"},
        {t:'tri', ar:"وَسُمْعَةِ الْمُسْمِعِينَ", tr:"wa sum’ati almusmi’îna", fr:"des hypocrites, et de toute tendance à nous faire entendre comme ceux qui s’adonnent à cette action,"},
        {t:'tri', ar:"لاَ نُشْرِكُ فِيهِ أَحَداً دُونَكَ", tr:"lâ nuchriku fihi ahadan dûnaka", fr:"de sorte que nous n’associions dans ce mois, qui que ce soit avec Toi,"},
        {t:'tri', ar:"وَلَاَ تَبْتَغِي بِهِ مُرَاداً سِوَاكَ", tr:"wa lâ nabtaghi bihî murâdan siwâka", fr:"ou bien que nous ne cherchions d’autre but que Toi!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَقِفْنَا فِيهِ عَلَى مَوَاقِيتِ الصَّلَوَاتِ الْخَمْسِ", tr:"wa qifnâ fihi ‘alâ mawâqiti aşşalawâti alkhamsi", fr:"Avertis-nous dans ce mois, des moments précis que Tu as désignés pour les cinq prières,"},
        {t:'tri', ar:"بحُدُودِهَا الَّتِي حَدَّدْتَ", tr:"bihudüdihâ allatî haddadta", fr:"et la limite que Tu y as prescrite (établie)"},
        {t:'tri', ar:"وَفُرُوضِهَا الَّتِي فَرَضْتَ", tr:"wa furûdihâ allatî faradta", fr:"les obligations que Tu as décrétées,"},
        {t:'tri', ar:"وَوَظَائِفِهَا الَّتِي وَظَّفْتَ", tr:"wa wazâ’ifihâ allati wazzafta", fr:"les devoirs que Tu as assignés,"},
        {t:'tri', ar:"وَأَوْقَاتِهَا الَّتِي وَقَّتَّ", tr:"wa awqâtihâ allati waqqatta", fr:"et aux temps que Tu as spécifiés;"},
        {t:'tri', ar:"وَأَنْزِلْنَا فِيهَا مَنْزِلَةَ الْمُصِيبِينَ لِمَنَازِلِهَا", tr:"wa anzilnâ fihâ manzilata almuşîbîna limanâzilihâ", fr:"Pendant la prière, place-nous dans les échelons de ceux qui ont accompli dignement cet échelon"},
        {t:'tri', ar:"الْحَافِظِينَ لأَرْكَانِهَا", tr:"alhâfizîna li- arkâniha", fr:"et conservent ses piliers,"},
        {t:'tri', ar:"الْمُؤَدِّينَ لَهَا فِي أَوْقَاتِهَا", tr:"almu’addîna lahâ fi awqâtihâ", fr:"et de ceux qui font la prière,"},
        {t:'tri', ar:"عَلَى مَا سَنَّهُ عَبْدُكَ وَرَسُولُكَ", tr:"alâ mâ sannahû ‘abduka wa rasûluka", fr:"comme ce que Ton serviteur et Ton Messager a prescrit par sa Tradition (Sunna),"},
        {t:'tri', ar:"صَلَوَاتُكَ عَلَيْهِ وَآلِهِ", tr:"șalawâtuka alayhi wa âlihî", fr:"(que Ta Bénédiction soit sur Lui et toute sa Famille!)"},
        {t:'tri', ar:"فِي رُكُوعِهَا وَسُجُودِهَا", tr:"fi rukû ihâ wa sujûdihâ", fr:"dans toutes ses inclinations et salutations, dans toutes ses"},
        {t:'tri', ar:"وَجَمِيعِ فَوَاضِلِهَا", tr:"wa jamî i fawâdilihâ", fr:"prosternations et toutes ses excellentes vertus,"},
        {t:'tri', ar:"عَلَى أَتَمِّ الطَّهُورِ وَأَسْبَغِهِ", tr:"alâ atammi attahüri wa asbaghihi", fr:"avec la plus complète et la plus ample pureté rituelle,"},
        {t:'tri', ar:"وَأَبْيَنِ الْخُشُوعِ وَأَبْلَغِهِ", tr:"wa abyani alkhuchû ‘i wa ablaghihi", fr:"et la plus apparente et la plus intense humilité!"},
        {t:'tri', ar:"وَوَفِّقْنَا فِيهِ لأَنْ نَصِلَ أَرْحَامَنَا بِالْبِرِّ وَ الصِّّلَةِ", tr:"wa waffiqna fihi li-an nașila arhâmanâ bilbirri waşșilati", fr:"Accorde-nous succès dans ce mois-ci pour pouvoir resserrer nos liens de parenté avec bienfait,"},
        {t:'tri', ar:"وَأَن نَتَعَاهَدَ جِيرَانَنَا بِالإِفْضَالِ وَالْعَطِيَّةِ", tr:"wa an nata ‘âhada jîrânanâ bil-ifdâli wal’ ațiyyati", fr:"d’être au service de nos voisins (les secourir) avec des dons et des offrandes,"},
        {t:'tri', ar:"وَأَنْ نُخَلِّصَ أَمْوَالَنَا مِنَ التَّبِعَاتِ", tr:"wa an nukhallișa amwâlanâ min attabi’âti", fr:"d’épurer nos possessions de toute dette et de toute revendication,"},
        {t:'tri', ar:"وَأَنْ نُطَهِّرَهَا بِإِخْرَاجِ الزَّكَوَاتِ", tr:"wa an nuțahhirahâ bi-ikhrâji azzakawâti", fr:"et de les purifier en payant des aumônes,"},
        {t:'tri', ar:"وَأَنْ نُرَاجِعَ مَنْ هَاجَرَنَا", tr:"wa an nurâji’a man hâjaranâ", fr:"de renouer avec celui qui s’est éloigné de nous,"},
        {t:'tri', ar:"وَأَنْ نُنْصِفَ مَنْ ظَلَمَنَا", tr:"wa an nunșifa man zalamanâ", fr:"et de traiter justement (équitablement) celui qui nous a faits de mal,"},
        {t:'tri', ar:"وَأَنْ نُسَالِمَ مَنْ عَادَانَا", tr:"wa an nusâlima man ‘âdânâ", fr:"de pacifier avec celui qui montre de l’inimité envers nous,"},
        {t:'tri', ar:"حَاشَا مَنْ عُودِيَ فِيكَ وَلَكَ", tr:"hâchâ man ‘ûdiya fika wa laka", fr:"excepté celui qui est l’ennemi de Ta Cause,"},
        {t:'tri', ar:"فَإِنَّهُ الْعَدُوُّ الَّذِي لاَ نُوَالِيهِ", tr:"fa innahu al’ aduwwu alladhi lâ nuwâlîhi", fr:"et dont l’inimité a pris racine pour son aversion et son inimité envers Toi,"},
        {t:'tri', ar:"وَالْحِزْبُ الَّذِي لَا نُصَافِيهِ", tr:"walhizbu alladhi la nuşâfîhi", fr:"car en ce cas, il est l’ennemi dont nous ne montrons aucune amitié envers lui, et le parti avec qui, nous ne serons jamais intimes! Accorde-nous"},
        {t:'tri', ar:"وَأَنْ نَتَقَرَّبَ إِلَيْكَ فِيهِ مِنَ الأَعْمَالِ الزَّاكِيَةِ", tr:"wa an nataqarraba ilayka fihi min al- a’mâli azzâkiyati", fr:"l’honneur de chercher à nous approcher de Toi par des actions vertueuses,"},
        {t:'tri', ar:"بِمَا تُطَهِّرُنَا بِهِ مِنَ الذُّنُوبِ", tr:"bimâ tuțahhirunâ bihî min adhdhunûbi", fr:"qui nous purifieront de tous les péchés,"},
        {t:'tri', ar:"وَتَعْصِمُنَا فِيهِ مِمَّا نَسْتَأْنِفُ مِنَ الْعُيُوبِ", tr:"wa ta’șimunâ fîhi mimmâ nasta’nifu min al’uyûbi", fr:"et nous préserveront à renouveler nos fautes,"},
        {t:'tri', ar:"حَتَّى لاَ يُورِدَ عَلَيْكَ أَحَدٌ مِنْ مَلاَئِكَتِكَ", tr:"hattâ lâ yûrida ‘alayka ahadun min malâ’ikatika", fr:"de sorte qu’aucuns de Tes Anges ne offrent meilleure obéissance,"},
        {t:'tri', ar:"إِلَّا دُونَ مَا نُورِدُ مِنْ أَبْوَابِ الطَّاعَةِ لَكَ", tr:"illâ dûna mâ nûridu min abwâbi ațtâ’ ati laka", fr:"et meilleure faveur de ce que nous T’avons offert,"},
        {t:'tri', ar:"وَأَنْوَاعِ الْقُرْبَةِ إِلَيْكَ", tr:"wa anwâ’i alqurbati ilayka", fr:"et qu’elles soient moins de ce que nous Te présentons!"},
        {t:'tri', ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ بِحَقِّ هَذَا الشَّهْرِ", tr:"allâhumma innî as’aluka bihaqqi hadhâ achchahri", fr:"Ô Dieu! De par le droit de ce mois, je Te demande de par son jour"},
        {t:'tri', ar:"وَبِحَقِّ مَنْ تَعَبَّدَ لَكَ فِيهِ", tr:"wa bihaqqi man ta abbada laka fihi", fr:"de par le droit de celui qui Adore dans ce mois, de commencement"},
        {t:'tri', ar:"مِنِ ابْتِدَائِهِ إِلَى وَقْتِ فَنَائِهِ", tr:"min ibtidâ’ihi ilâ waqti fanâ’ihi", fr:"jusqu’à sa fin, de par le droit de celui qui T’adore dans ce mir,"},
        {t:'tri', ar:"مِنْ مَلَكٍ قَرَّبْتَهُ", tr:"min malakin qarrabtahu", fr:"et de tout Ange à qui Tu as permis de s’approcher de Toi,"},
        {t:'tri', ar:"أَوْ نَبِيٍّ أَرْسَلْتَهُ", tr:"aw nabiyyin arsaltahu", fr:"et de tout Prophète que Tu as envoyé ici-bas pour guider,"},
        {t:'tri', ar:"أَوْ عَبْدٍ صَالِحٍ اخْتَصَصْتَهُ", tr:"aw ‘abdin şâlihin ikhtaşaştahu", fr:"ou bien de par le droit d’un serviteur vertueux, que Tu as distingué des autres,"},
        {t:'tri', ar:"أَنْ تُصَلِّيَ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"an tuşalliya ‘alâ muhammadin wa âlihi", fr:"que Tu bénisses Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَهِّلْنَا فِيهِ لِمَا وَعَدْتَ أَوْلِيَاءَكَ مِنْ كَرَامَتِكَ", tr:"wa ahhilnâ fihi limâ wa’adta awliyâ’aka min karâmatika", fr:"Fais-nous digne de la générosité que Tu as promise à Tes amis,"},
        {t:'tri', ar:"وَأَوْجِبْ لَنَا فِيهِ مَا أَوْجَبْتَ لأَهْلِ الْمُبَالَغَةِ فِي طَاعَتِكَ", tr:"wa awjib lanâ fîhi mâ awjabta li-ahli almubâlaghati fi țâ’ atika", fr:"Rends-nous dignes de ce que Tu as accordé à ceux qui s’acharnent à T’obéir,"},
        {t:'tri', ar:"وَاجْعَلْنَا فِي نَظْمِ مَنِ اسْتَحَقَّ الرَّفِيعَ الأَعْلَى بِرَحْمَتِكَ", tr:"waj alnâ fi nazmi man istahaqqa arrafi a al-a’lâ birahmatika", fr:"et place-nous dans les rangs de ceux qui méritent de par Ta Clémence, la plus haute élévation!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَجَنِّبْنَا الإِلْحَادَ فِي تَوْحِيدِكَ", tr:"wa jannibnâ al- ilhâda fi tawhîdika", fr:"Éloigne-nous de l’hérésie envers Ton Unité,"},
        {t:'tri', ar:"وَالتَّقْصِيرَ فِي تَمْجِيدِكَ", tr:"wattaqsira fi tamjidika", fr:"et de la faute de ne pas Te glorifier"},
        {t:'tri', ar:"وَالشَّكَّ فِي دِينِكَ", tr:"wachchakka fi dînika", fr:"et de douter de Ta Religion,"},
        {t:'tri', ar:"وَالْعَمَى عَنْ سَبِيلِكَ", tr:"wal’amâ ‘an sabîlika", fr:"et de la cécité dans Ton Chemin,"},
        {t:'tri', ar:"وَالإِغْفَالَ لِحُرْمَتِكَ", tr:"wal-ighfâla lihurmatika", fr:"et de la négligence envers Ton Inviolabilité,"},
        {t:'tri', ar:"وَالإنْخِدَاعَ لِعَدُوِّكَ الشَّيْطَانِ الرَّجِيمِ", tr:"wal-inkhidâ a li’aduwwika achchaytâni arrajimi", fr:"et d’être trompé par Ton ennemi, ce damné Satan!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَإِذَا كَانَ لَكَ فِي كُلِّ لَيْلَةٍ مِنْ لَيَالِي شَهْرِنَا هَذَا", tr:"wa idhâ kâna laka fi kulli laylatin min layâlî chahrinâ hadhâ", fr:"Et si dans chaque nuit parmi les nuits de ce mois,"},
        {t:'tri', ar:"رِقَابٌ يُعْتِقُهَا عَفْوُكَ", tr:"riqâbun yu’tiquhâ ‘afwuka", fr:"Tu as des serviteurs que Ton Pardon les libérera,"},
        {t:'tri', ar:"أَوْ يَهَبُهَا صَفْحُكَ", tr:"aw yahabuha şafhuka", fr:"ou bien Ta Clémence les pardonnera,"},
        {t:'tri', ar:"فَاجْعَلْ رِقَابَنَا مِنْ تِلْكَ الرِّقَابِ", tr:"faj’al riqâbanâ min tilka arriqâbi", fr:"en ce cas place-nous parmi ces serviteurs,"},
        {t:'tri', ar:"وَاجْعَلْنَا لِشَهْرِنَا مِنْ خَيْرِ أَهْلٍ وَأَصْحَابٍ", tr:"waj’ alnâ lichahrinâ min khayri ahlin wa aşhâbin", fr:"et place-nous parmi les meilleurs gens, et les meilleurs compagnons de ce mois"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَامْحَقْ ذُنُوبَنَا مَعَ إِمْحَاقِ هِلاَلِهِ", tr:"wamhaq dhunûbanâ ma’a imhâqi hilâlihi", fr:"Efface nos péchés avec l’éclipse de son croissant,"},
        {t:'tri', ar:"وَاسْلَخْ عَنَّا تَبِعَاتِنَا مَعَ انْسِلاَخِ أَيَّامِهِ", tr:"waslakh ‘annâ tabi’âtinâ ma’a insilâkhi ayyâmihi", fr:"et fais-nous passer outre, tous les mauvais effets de nos actions, avec le passage des jours,"},
        {t:'tri', ar:"حَتَّى يَنْقَضِيَ عَنَّا وَقَدْ صَفَّيْتَنَا فِيهِ مِنْ الْخَطِيئَاتِ", tr:"hattâ yanqadiya ‘annâ waqad şaffaytana fihi min alkhațî’âti", fr:"jusqu’à ce que le mois de Ramadan nous dépasse, pendant que dans ce mois,"},
        {t:'tri', ar:"وَأَخْلَصْتَنَا فِيهِ مِنَ السَّيِّئَاتِ", tr:"wa akhlaştana fihi min assayyi’ati", fr:"Tu nous as purifiés des péchés, et nous as purgés des mauvaises actions!"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَإِنْ مِلْنَا فِيهِ فَعَدِّلْنَا", tr:"wa in milnâ fihi fa’addilnâ", fr:"Et si nous péchâmes, ramène-nous vers le droit chemin,"},
        {t:'tri', ar:"وَإِنْ زُغْنَا فِيهِ فَقَوِّمْنَا", tr:"wa in zughnâ fihi faqawwimna", fr:"et si nous déviâmes dans ce mois, redresse et raffermis-nous;"},
        {t:'tri', ar:"وَإِنِ اشْتَمَلَ عَلَيْنَا عَدُوُّكَ الشَّيْطَانُ فَاسْتَنْقِذْنَا مِنْهُ", tr:"wa in ichtamala ‘alayna ‘aduwwuka achchaytânu fastangidhnâ minhu", fr:"et si Ton ennemi: Satan, nous encercle, libère-nous de lui!"},
        {t:'tri', ar:"اللَّهُمَّ اشْحَنْهُ بِعِبَادَتِنَا إِيَّاكَ", tr:"allâhumma ichhanhu bi ibâdatinâ iyyâka", fr:"Ô Dieu! Remplis ce mois avec notre adoration pour Toi,"},
        {t:'tri', ar:"وَزَيِّنْ أَوْقَاتَهُ بِطَاعَتِنَا لَكَ", tr:"wa zayyin awqâtahû bițâ’ atinâ laka", fr:"orne son temps avec notre obéissance envers Toi,"},
        {t:'tri', ar:"وَأَعِنَّا فِي نَهَارِهِ عَلَى صِيَامِهِ", tr:"wa a ‘innâ fi nahârihî ‘alâ şiyâmihi", fr:"Aide-nous durant la journée dans le jeûne,"},
        {t:'tri', ar:"وَفِي لَيْلِهِ عَلَى الصَّلاَةِ", tr:"wa fi laylihî ‘alâ aşşalâti", fr:"et la nuit avec des prières,"},
        {t:'tri', ar:"وَالتَّضَرُّعِ إِلَيْكَ", tr:"wattadarru i ilayka", fr:"et des supplications"},
        {t:'tri', ar:"وَالْخُشُوعِ لَكَ", tr:"walkhuchû’i laka", fr:"avec humilité,"},
        {t:'tri', ar:"وَالذِّلَّةِ بَيْنَ يَدَيْكَ", tr:"wadhdhillati bayna yadayka", fr:"et la modestie devant Toi,"},
        {t:'tri', ar:"حَتَّى لاَ يَشْهَدَ نَهَارُهُ عَلَيْنَا بِغَفْلَةٍ", tr:"hattâ la yachhada nahâruhû ‘alaynâ bighaflatin", fr:"de sorte que sa journée ne témoigne point de notre négligence contre nous,"},
        {t:'tri', ar:"وَلَا لَيْلُهُ بِتَفْرِيطٍ", tr:"wa lâ layluhû bitafrițin", fr:"et sa nuit ne témoigne point contre notre négligence"},
        {t:'tri', ar:"اللَّهُمَّ وَاجْعَلْنَا فِي سَائِرِ الشُّهُورِ وَالأَيَّامِ كَذَلِكَ مَا عَمَّرْتَنَا", tr:"allâhumma waj alnâ fi sâ’iri achchuhûri wal- ayyâmi kadhâlika mâ ‘ammartanâ", fr:"Ô Dieu! Fais-nous comme cela dans les autres mois et dans les autres jours, aussi longtemps que Tu nous donnes à vivre,"},
        {t:'tri', ar:"وَاجْعَلْنَا مِنْ عِبَادِكَ الصَّالِحِينَ", tr:"waj alnâ min ‘ibâdika aşşâlihîna", fr:"et place-nous parmi Tes serviteurs vertueux (pieux)"},
        {t:'tri', ar:"اَلَّذِينَ يَرِثُونَ الْفِرْدَوْسَ", tr:"alladhina yarithuna alfirdawsa", fr:"ceux qui hériteront du Paradis,"},
        {t:'tri', ar:"هُمْ فِيهَا خَالِدُونَ", tr:"hum fihâ khâlidûna", fr:"où Ils demeureront immortels;"},
        {t:'tri', ar:"وَالَّذِينَ يُؤْتُونَ مَا آتَوْا وَقُلُوبُهُمْ وَجِلَةٌ", tr:"walladhina yu’tûna mâ âtaw wa qulûbuhum wajilatun", fr:"Ceux qui donnent ce qu’ils donnent, tandis que leurs coeurs sont pénétrés"},
        {t:'tri', ar:"أَنَّهُمْ إِلَى رَبِّهِمْ رَاجِعُونَ", tr:"annahum ilâ rabbihim râji’ûna", fr:"de crainte à la pensée qu’ils retourneront vers leur Seigneur;"},
        {t:'tri', ar:"وَمِنَ الَّذِينَ يُسَارِعُونَ فِي الْخَيْرَاتِ", tr:"wa min alladhina yusâri ûna filkhayrâti", fr:"Ceux qui se hâtent vers les bonnes actions,"},
        {t:'tri', ar:"وَهُمْ لَهَا سَابِقُونَ", tr:"wahum lahâ sâbiqûna", fr:"et sont les premiers à les accomplir!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"فِي كُلِّ وَقْتٍ وَكُلِّ أَوَانٍ", tr:"fi kulli waqtin wa kulli awânin", fr:"En tout temps, à tout moment,"},
        {t:'tri', ar:"وَعَلَى كُلِّ حَالٍ", tr:"wa ‘alâ kulli hâlin", fr:"et dans tous les états,"},
        {t:'tri', ar:"عَدَدَ مَا صَلَّيْتَ عَلَى مَنْ صَلَّيْتَ عَلَيْهِ", tr:"adada mâ șallayta ‘alâ man șallayta ‘alayhi", fr:"au nombre des bénédictions de ceux que Tu as bénis,"},
        {t:'tri', ar:"وَأَضْعَافَ ذَلِكَ كُلِّهِ", tr:"wa ad’âfa dhâlika kullihi", fr:"et multipliés en plus grand nombre,"},
        {t:'tri', ar:"بِالأَضْعَافِ الَّتِي لاَ يُحْصِيهَا غَيْرُكَ", tr:"bil-ad’âfi allatî lâ yuhşîhâ ghayruka", fr:"par des multiplications que personne d’autre que Toi, ne pourrait jamais compter!"},
        {t:'tri', ar:"إِنَّكَ فَعَالٌ لِمَا تُرِيدُ.", tr:"innaka fa’âlun limâ turîdu", fr:"Car Tu es sûrement l’Accomplissement de tout ce que Tu désires!"},
        {t:'salawat'},
      ]
    },
    's45': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "45. L'Adieu au Ramadan",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation à la fin du mois de Ramadan (Adieu au Ramadan)",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي وِداعِ شهْرِ رمضان", tr:"", fr:"La quarante cinquième supplication: en faisant ses adieux avec le mois de Ramadan"},
        {t:'tri', ar:"اللَّهُمَّ يَا مَنْ لا يَرْغَبُ فِي الْجَزَاءِ", tr:"allâhumma ya man lâ yarghabu filjazâ’i", fr:"Ô Dieu! Ô Celui qui ne désire aucune récompense"},
        {t:'tri', ar:"وَيَا مَنْ لَاَ يَنْدَمُ عَلَى الْعَطَاءِ", tr:"wa yâ man lâ yandamu ‘alâl’ atâ’i", fr:"Ô Celui qui ne regrette point Ses Dons!"},
        {t:'tri', ar:"وَيَا مَنْ لَا يُكَافِئُ عَبْدَهُ عَلَى السَّوَاءِ", tr:"wa ya man la yukâfi’u ‘abdahû ‘alâ assawa’i", fr:"Ô Celui qui récompense Son serviteur bien plus de ce qu’il mérite!"},
        {t:'tri', ar:"مِنَّتُكَ ابْتِدَاءٌ", tr:"minnatuka ibtidâ’un", fr:"Ta Bonté précède la demande,"},
        {t:'tri', ar:"وَعَفْوُكَ تَفَضُّلٌ", tr:"wa ‘afwuka tafaddulun", fr:"Ton Indulgence est une Grâce,"},
        {t:'tri', ar:"وَعُقُوبَتُكَ عَدْلٌ", tr:"wa ‘uqûbatuka ‘adlun", fr:"Ta Punition est Justice,"},
        {t:'tri', ar:"وَقَضَاؤُكَ خِيَرَةٌ", tr:"wa qadâ’uka khiyaratun", fr:"Ton Décret est une choix pour le meilleur!"},
        {t:'tri', ar:"إِنْ أَعْطَيْتَ لَمْ تَشُبْ عَطَاءَكَ بِمَنِّ", tr:"in a tayta lam tachub ‘atâ’aka bimannin", fr:"Si Tu donnes, Ton Don n’est teinté d’aucune obligation,"},
        {t:'tri', ar:"وَإِنْ مَنعْتَ لَمْ يَكُنْ مَنْعُكَ تَعَدِّياً", tr:"wa in man’ta lam yakun man’uka ta addiyan", fr:"et si Tu refuses, Ton refus n’est point une transgression!"},
        {t:'tri', ar:"تَشْكُرُ مَنْ شكَرَكَ", tr:"tachkuru man chakaraka", fr:"Tu remercies celui qui Te rend Grâce"},
        {t:'tri', ar:"وَأَنْتَ أَلْهَمْتَهُ شُكْرَكَ", tr:"wa anta alhamtahû chukraka", fr:"quand c’est Toi qui l’inspires à Te rendre grâce!"},
        {t:'tri', ar:"وَتُكَافِئُ مَنْ حَمِدَكَ", tr:"wa tukâfi’u man hamidaka", fr:"Tu récompenses celui qui"},
        {t:'tri', ar:"وَأَنْتَ عَلَّمْتَهُ حَمْدَكَ", tr:"wa anta ‘allamtahû hamdaka", fr:"Te loue en lui apprenant la Louange."},
        {t:'tri', ar:"وَتَسْتُرُ عَلَى مَنْ لَوْ شِئْتَ فَضَحْتَهُ", tr:"wa tasturu ‘alâ man law chita fadahtahu", fr:"Tu couvres celui qui, si Tu le voulais, Tu l’aurais dénoncé"},
        {t:'tri', ar:"وَتَجُودُ عَلَى مَنْ لَوْ شِئْتَ مَنَعْتَهُ", tr:"wa tajûdu ‘alâ man law chi’ta mana’tahu", fr:"et Tu es Généreux envers celui à qui Tu pouvais lui refuser"},
        {t:'tri', ar:"وَكِلاَهُمَا أَهْلٌ مِنْكَ لِلْفَضِيحَةِ وَالْمَنْعِ", tr:"wa kilâhuma ahlun minka lilfadihati walman’i", fr:"Ton Pardon, pendant que les deux, méritent Ta Dénonciation et Ton Refus,"},
        {t:'tri', ar:"غَيْرَ أَنَّكَ بَنَيْتَ أَفَعَالَكَ عَلَى التَّفَضُّلِ", tr:"ghayra annak banayta af’âlaka ‘alâ attafadduli", fr:"mais Tu as fondé Tes Actions sur la Grâce,"},
        {t:'tri', ar:"وَأَجْرَيْتَ قُدْرَتَكَ عَلَى التَّجَاوزِ", tr:"wa ajrayta qudrataka ‘alâ attajâwuzi", fr:"et as exécuté Ta Puissance avec la Tolérance,"},
        {t:'tri', ar:"وَتَلَقَّيْتَ مَنْ عَصَاكَ بِالْحِلْمِ", tr:"wa talaqqayta man ‘aşâka bilhilmi", fr:"Tu as reçu avec Clémence et Douceur celui qui Ta désobéi,"},
        {t:'tri', ar:"وَأَمْهَلْتَ مَنْ قَصَدَ لِنَفْسِهِ بِالظُّلْمِ", tr:"wa amhalta man qaşada linafsihî bizzulmi", fr:"et Tu accordes un délai à celui qui avait l’intention de se faire du mal."},
        {t:'tri', ar:"تَستَنْظِرُهُمْ بِأَنَاتِكَ إِلَى الإِنَابَةِ", tr:"tastanziruhum bi- anâtika ilâ al- inâbati", fr:"Tu leur accordes un délai avec Ta Patience, pour qu’ils reviennent vers Toi,"},
        {t:'tri', ar:"وتَتْرُكُ مُعَاجَلَتَهُمْ إِلَى التَّوْبَةِ", tr:"wa tatruku mu âjalatahum ilâ attawbati", fr:"et Tu réfrènes à les dépêcher vers la repentance,"},
        {t:'tri', ar:"لِكَيْلاَ يَهْلِكَ عَلَيْكَ هَالِكُهُمْ", tr:"likaylâ yahlika ‘alayka hâlikuhum", fr:"de sorte que celui qui malgré Ta Volonté doit périr ne périt pas,"},
        {t:'tri', ar:"وَلَاَ يَشْقَى بِنعْمَتِكَ شَقِيُّهُمْ", tr:"wa lã yachqâ bini matika chaqiyyuhum", fr:"et celui qui a abusé de Tes Bontés et mérite le malheur n’est point malheureux,"},
        {t:'tri', ar:"إِلَّا عَنْ طُولِ الإِعْذَارِ إِلَيْهِ", tr:"illâ ‘an țûli al- i’ dhâri ilayhi", fr:"sauf après Tes longues Menaces,"},
        {t:'tri', ar:"وَبَعْدَ تَرَادُفِ الْحُجَّةِ عَلَيْهِ", tr:"wa ba da tarâdufi alhujjati ‘alayhi", fr:"et des preuves consécutives envers lui,"},
        {t:'tri', ar:"كَرَماً مِن عَفْوِكَ يَا كَرِيمُ", tr:"karaman min ‘afwika yå karimu", fr:"et tout ceci est dû à la Générosité de Ton Indulgence, ô Celui qui est Généreux!"},
        {t:'tri', ar:"وَعَائِدَةً مِنْ عَطْفِكَ يَا حَلِيمُ", tr:"wa ‘â’idatan min ‘ațfika ya halîmu", fr:"Et aussi à la Grâce de Ta Tendresse, ô Celui qui est Clément!"},
        {t:'tri', ar:"أَنْتَ الَّذِي فَتَحْتَ لِعِبَادِكَ بَابًا إِلَى عَفْوِكَ", tr:"anta alladhi fatahta li ibâdika bâban ilâ ‘afwika", fr:"C’est Toi qui as ouvert pour Tes serviteurs une porte à Ton Indulgence,"},
        {t:'tri', ar:"وَسَمَّيْتَهُ التَّوْبَةَ", tr:"wa sammaytahu attawbata", fr:"et que Tu as nommée «  »repentance » »!"},
        {t:'tri', ar:"وَجَعَلْتَ عَلَى ذَلِكَ الْبَابِ دَلِيلاً مِنْ وَحْيِكَ", tr:"wa ja’alta ‘alâ dhâlika albâbi dalîlan min wahyika", fr:"Tu as placé sur cette porte, un signal de Ta Révélation,"},
        {t:'tri', ar:"لِئَلاَّ يَضِلُّوا عَنْهُ", tr:"li-allâ yadillû ‘anhû", fr:"pour que personne ne puisse se perdre."},
        {t:'tri', ar:"فَقُلْتَ تَبَارَكَ اسْمُكَ:", tr:"faqulta tabâraka ismuka", fr:"Tu as dit (Béni soit Ton Nom)."},
        {t:'tri', ar:"(تُوبُوَا إِلَى اللَّهِ تَوْبَةً نَصُوحًا", tr:"tâbû ilâ allâhî tawbatan naşûhan", fr:"«  »Ô vous les croyants! Revenez à Dieu avec un repentir sincère."},
        {t:'tri', ar:"عَسَى رَبُّكُمْ أَنْ يُكَفِّرَ عَنْكُمْ سَيِّئَاتِكُمْ", tr:"asâ rabbukum an yukaffira ‘ankum sayyi’âtikum", fr:"Il se peut que votre Seigneur efface vos fautes,"},
        {t:'tri', ar:"وَيُدْخِلَكُمْ جَنَّاتٍ تَجْرِي مِنْ تَحْتِهَا الأَنْهَارُ", tr:"wa yudkhilakum jannâtin tajri min tahtihâ al-anhâru", fr:"et qu’Il vous fasse entrer dans des Jardins où coulent les ruisseaux."},
        {t:'tri', ar:"يَوْمَ لاَ يُخْزِي اللَّهُ النَّبِيَّ وَالَّذِينَ آمَنُوا مَعَهُ", tr:"yawma lâ yukhzî allâhu annabiyya walladhîna âmanû ma’ahû", fr:"Le Jour où Dieu ne couvrira de honte, ni le Prophète, ni ceux qui auront cru avec lui."},
        {t:'tri', ar:"نُورُهُمْ يَسْعَى بَيْنَ أَيْدِيهِمْ وَبِأَيْمَانِهِمْ", tr:"nûruhum yas â bayna aydihim wa bi-aymânihim", fr:"Leur lumière courra devant eux et à leur droite,"},
        {t:'tri', ar:"يَقُولُونَ رَبَّنَا أَتْمِمْ لَنَا نُورَنَا وَاغْفِرْ لَنَا", tr:"yaqûlûna rabbana atmim lanâ nûranâ waghfir lana", fr:"Ils diront: ‘Notre Seigneur! Parachève pour nous notre lumière; Pardonne-nous!"},
        {t:'tri', ar:"إِنَّكَ عَلَى كُلِّ شَيءٍ قَدِيرٌ.)", tr:"innaka ‘alâ kulli chay’in qadirun", fr:"Oui, Tu es Puissant sur toute chose?"},
        {t:'tri', ar:"فَمَا عُذْرُ مَنْ أَغْفَلَ دُخُولَ ذَلِكَ الْمَنْزِلِ", tr:"famâ ‘udhru man aghfala dukhûla dhâlika almanzili", fr:"Or, quelle est l’excuse de celui qui néglige à entrer dans cette maison,"},
        {t:'tri', ar:"بَعْدَ فَتْحِ الْبَابِ وَإِقَامَةِ الدَّلِيلِ؟", tr:"ba’da fathi albâbi wa iqâmati addalîli", fr:"après l’ouverture de la porte, et l’érection du signal?"},
        {t:'tri', ar:"وَأَنْتَ الَّذِي زِدْتَ فِي السَّوْمِ عَلَى نَفْسِكَ لِعِبَادِكَ", tr:"wa anta alladhî zitda fi assawmi ‘alâ nafsika li’ibâdika", fr:"C’est Toi qui, dans ce commerce, renchéris à l’avantage de Tes serviteurs,"},
        {t:'tri', ar:"تُرِيدُ رِبْحَهُمْ فِي مُتَاجَرَتِهمْ لَكَ", tr:"turidu ribhahum fi mutâjaratihm laka", fr:"en désirant leurs profits dans le commerce qu’ils font avec Toi,"},
        {t:'tri', ar:"وَفَوْزَهُمْ بِالْوِفَادَةِ عَلَيْكَ وَالزِّيَادَةِ مِنْكَ", tr:"wa fawzahum bilwifâdati ‘alayka wazziyâdati minka", fr:"et leurs profits par leur rapprochement à Toi,"},
        {t:'tri', ar:"فَقُلْتَ تَبَارَكَ اسْمُكَ وَتَعَالَيْتَ:", tr:"faqulta tabâraka ismuka wa ta ‘âlayta", fr:"et leurs gains de Ta part, car Tu as dit: Toi, dont le Nom est Béni et Tu es Exalté!"},
        {t:'tri', ar:"(مَنْ جَاءَ بِالْحَسَنَةِ فَلَهُ عَشْرُ أَمْثَالِهَا", tr:"man jấ’a bilhasanati falahû ‘achru amthâlihâ", fr:"«  »Celui qui accomplit une bonne action, recevra dix fois le nombre de ce qu’il a fait,"},
        {t:'tri', ar:"وَمَنْ جَاءَ بالسَّيِّئَةِ فَلَا يُجْزَى إِلاَّ مِثْلَهَا)", tr:"waman jấ’a bissayyi’ati falâ yujzâ illâ mithlahâ", fr:"et celui qui commet une mauvaise action, recevra sa punition exactement à la mesure de son méfait. » »"},
        {t:'tri', ar:"وَقُلْت:", tr:"wa qulta", fr:"Et Tu as dit:"},
        {t:'tri', ar:"(مَثَلُ الَّذِينَ يُنْفِقُونَ أَمْوَالَهُمْ فِي سَبِيلِ اللَّهِ", tr:"mathalu alladhîna yunfiqûna amwâlahum fi sabîli allâhî", fr:"«  »Ceux qui dépensent leurs biens dans le chemin de Dieu"},
        {t:'tri', ar:"كَمَثَلِ حَبَّةٍ أَنْْبَتَتْ سَبْعَ سَنَابِلَ", tr:"kamathali habbatin anbatat sab’a sanâbila", fr:"sont semblables à un grain qui produit sept épis;"},
        {t:'tri', ar:"فِي كُلِّ سُنْبُلَةٍ مِائَةُ حَبَّةٍ", tr:"fi kulli sunbulatin mi’atu habbatin", fr:"et chaque épi contient cent grains. Dieu accorde le double à qui Il veut."},
        {t:'tri', ar:"وَاللَّهُ يُضَاعِفُ لِمَنْ يَشَاءُ )", tr:"wallâhu yudâ’ifu liman yachấ’u", fr:"Dieu est présent partout et Il sait. » »"},
        {t:'tri', ar:"وَقُلْتَ:", tr:"wa quita", fr:"Et Tu as dit:"},
        {t:'tri', ar:"(مَنْ ذَا الَّذِي يُقْرِضُ اللَّهَ قَرْضاً حَسَناً", tr:"man dhâ alladhî yugridu allâha qardan hasanan", fr:"«  »A celui qui fait à Dieu un beau prêt,"},
        {t:'tri', ar:"فَيُضَاعِفَهُ لَهُ أَضْعَافاً كَثِيرَةً)", tr:"fayudâ ifahû lahû ad’âfan kathîratan", fr:"Dieu le lui rendra avec abondance. » »"},
        {t:'tri', ar:"وَمَا أَنْزَلْتَ مِن نَظَائِرِهِنَّ فِي الْقُرْآنِ", tr:"wa mâ anzalta min nazâ’irihinna filqur’âni", fr:"Ainsi, par de pareils versets que Tu as faits descendre dans le Coran,"},
        {t:'tri', ar:"مِنْ تَضَاعِيفِ الْحَسَنَاتِ", tr:"min tadâ’îfi alhasanâti", fr:"Tu as parlé sur la multiplication des bienfaits."},
        {t:'tri', ar:"وَأَنْتَ الَّذِي دَلَلْتَهُمْ بِقَوْلِكَ مِنْ غَيْبِكَ", tr:"wa anta alladhî dalaltahum biqawlika min ghaybika", fr:"De par Ta Parole sur Ton Monde Invisible,"},
        {t:'tri', ar:"وَتَرْغِيبِكَ الَّذِي فِيهِ حَظُّهُمْ", tr:"wa targhîbika alladhi fihi hazzuhum", fr:"et de par Ton Encouragement, dans lesquels résident leurs bonnes fortunes,"},
        {t:'tri', ar:"عَلَى مَا لَوْ سَتَرْتَهُ عَنْهُمْ لَمْ تُدْرِكْهُ أَبْصَارُهُمْ", tr:"alâ mâ law satartahû ‘anhum lam tudrik-hu abşâruhum", fr:"c’est Toi qui les as guidés vers les choses que si Tu leur avais cachés, leurs yeux ne les auraient certainement point vues,"},
        {t:'tri', ar:"وَلَمْ تَعِهِ أَسْمَاعُهُمْ", tr:"wa lam ta ihî asmâ uhum", fr:"et leurs oreilles ne les auraient point entendues,"},
        {t:'tri', ar:"وَلَمْ تَلْحَقْهُ أَوْهَامُهُمْ", tr:"wa lam talhaqhû awhâmuhum", fr:"et leur imagination ne les aurait point perçues,"},
        {t:'tri', ar:"فَقُلْتَ:", tr:"Faqulta", fr:"car Tu as dit:"},
        {t:'tri', ar:"(اُذْكُرُونِي أَذْكُرْكُمْ", tr:"udhkurûni adhkurkum", fr:"«  »Souvenez-vous de moi, et je me souviendrai de vous,"},
        {t:'tri', ar:"وَاشْكُرُوا لِي وَلَاَ تَكْفُرُونِ)", tr:"wa ichkurû lî wa lâ takfurûni", fr:"rendez grâce à Moi, et ne soyez point ingrats envers Moi! » »"},
        {t:'tri', ar:"وَقُلْتَ:", tr:"wa quita", fr:"Tu as dit:"},
        {t:'tri', ar:"(لَئِنْ شَكَرْتُمْ لأَزِيدَنَّكُمْ", tr:"la-in chakartum la-azîdannakum", fr:"«  »Si vous êtes reconnaissant, j’élèverai votre station, j’augmenterai vos biens"},
        {t:'tri', ar:"وَلَئِنْ كَفَرْتُمْ إِنَّ عَذَابِي لَشَدِيدٌ)", tr:"wa la-in kafartum inna ‘adhâbî lachadîdun", fr:"mais si vous êtes ingrats, Mon châtiment sera sûrement terrible! »"},
        {t:'tri', ar:"وَقُلْتَ:", tr:"wa quita", fr:"Et Tu as dit:"},
        {t:'tri', ar:"(اُدْعُونِي أَسْتَجِبْ لَكُمْ", tr:"ud ûnî astajib lakum", fr:"«  »Suppliez moi, et je vous répondrai;"},
        {t:'tri', ar:"إِنَّ الَّذِينَ يَسْتَكْبِرُونَ عَنْ عِبَادَتِي", tr:"inna alladhina yastakbirûna ‘an ‘ ibâdatî", fr:"sûrement ceux qui par orgueil, se retiennent de M’adorer,"},
        {t:'tri', ar:"سَيَدْخُلُونَ جَهَنَّمَ دَاخِرِينَ)", tr:"sayadkhulûna jahannama dâkhirina", fr:"entreront à la Géhenne, complètement abjects! » »"},
        {t:'tri', ar:"فَسَمَّيْتَ دُعَاءَكَ عِبَادَةً", tr:"fasammayta du â’aka ‘ibâdatan", fr:"Ainsi Tu as nommé l’action de Te supplier ‘Adorer’"},
        {t:'tri', ar:"وَتَرْكَهُ اسْتِكْبَاراً", tr:"wa tarkahû istikbâran", fr:"et l’action de refuser de faire cela ‘Orgueil’"},
        {t:'tri', ar:"وَتَوَعَّدْتَ عَلَى تَرْكِهِ دُخُولَ جَهَنَّمَ دَاخِرِينَ", tr:"wa tawa » adta ‘alâ tarkihî dukhûla jahannama dâkhirina", fr:"Et Tu as menacé que le fait de refuser de faire cela, se terminerait à entrer dédaigneusement à la Géhenne!"},
        {t:'tri', ar:"فَذَكَرُوكَ بمَنِّكَ", tr:"fadhakarûka bimannika", fr:"Ainsi Tes serviteurs se souviennent de Toi pour Ta Grâce et Ta Bonté,"},
        {t:'tri', ar:"وَشَكَرُوكَ بِفَضْلِكَ", tr:"wa chakarûka bifadlika", fr:"et Te remercient pour Tes Bienfaits,"},
