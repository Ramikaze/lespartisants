        {t:'tri', ar:"وَلَاَ خَفِيرٌ يُؤْمِنُنِي عَلَيْكَ", tr:"wa lâ khafirun yu’minunî ‘alayka", fr:"Ni aucun protecteur pour assurer ma sécurité devant Toi,"},
        {t:'tri', ar:"وَلَاَ حِصْنٌ يَحْجُبُنِي عَنْكَ", tr:"wa lâ hişnun yahjubuni ‘anka", fr:"ni aucune forteresse pour me cacher de Toi,"},
        {t:'tri', ar:"وَلَا مَلاَذٌ أَلْجَأُ إِلَيْهِ مِنْكَ", tr:"wa lâ malâdhun alja’u ilayhi minka", fr:"ni aucun abri qui m’abrite de Toi!"},
        {t:'tri', ar:"فَهذَا مَقَامُ الْعَائِذِ بِكَ", tr:"fahdhâ maqâmu al’â’idhi bika", fr:"Voilà la position de celui qui demande refuge auprés de Toi,"},
        {t:'tri', ar:"وَمَحَلُّ الْمُعْتَرِفِ لَكَ", tr:"wa mahallu almu’tarifi laka", fr:"et la situation de celui qui Te confesse."},
        {t:'tri', ar:"فَلَا يَضِيقَنَّ عَنِّي فَضْلُكَ", tr:"falâ yadîqanna ‘anni fadluka", fr:"Que Ta Grâce ne se rétrécisse point pour me contenir!"},
        {t:'tri', ar:"وَلَاَ يَقْصُرَنَّ دُونِي عَفْوُكَ", tr:"wa lâ yaqsuranna dûnî ‘afwuka", fr:"Ne fais pas en sorte que je sois le plus désespéré de Tes serviteurs repentis,"},
        {t:'tri', ar:"وَلَا أَكُنْ أَخْيَبَ عِبَادِكَ التَّائِبينَ", tr:"wa lâ akun akhyaba ‘ibâdika attâ’ibîna", fr:"Ne permets pas que Ton Pardon ne m’atteigne point!"},
        {t:'tri', ar:"وَلَاَ أَقْنَطَ وفُودِكَ الآمِلِينَ", tr:"wa lâ aqnața wufûdika al-âmilîna", fr:"ni le plus privé parmi ceux qui viennent à Toi avec un espoir"},
        {t:'tri', ar:"وَاغْفِرْ لِي إِنَّكَ خَيْرُ الْغَافِرِينَ", tr:"waghfir lî innaka khayru alghâfirîna", fr:"Et pardonne-moi, car Tu es sûrement le Meilleur qui puisses me pardonner!"},
        {t:'tri', ar:"اَللَّهُمَّ إِنَّكَ أَمَرْتَنِي فَتَرَكْتُ", tr:"allâhumma innaka amartanî fataraktu", fr:"Ô Dieu! Tu me commandas [à faire des bienfaits] et j’ai négligé,"},
        {t:'tri', ar:"وَنَهَيْتَنِي فَرَكِبْتُ", tr:"wa nahaytanî farakibtu", fr:"Tu m’interdis [de commettre des péchés] et je les ai commis"},
        {t:'tri', ar:"وَسَوَّلَ لِيَ الْخَطَاءَ خَاطِرُ السُّوءِ فَفَرَّطْتُ", tr:"wa sawwala lî alkhața’u khâțiru assû’i fafarrațtu", fr:"De mauvaises tentations m’ont enjolivé les fautes et j’ai abusé"},
        {t:'tri', ar:"وَلَاَ أَسْتَشْهِدُ عَلَى صِيَامِي نَهَاراً", tr:"wa lâ astach-hidu ‘alâ șiyâmî nahâran", fr:"Je ne puis m’en rapporter à aucune journée pour témoigner d’un jeûne bien tenu,"},
        {t:'tri', ar:"وَلَاَ أَسْتَجِيرُ بِتَهَجُّدِي لَيْلاً", tr:"wa lâ astajiru bitahajjudi laylan", fr:"et je ne me réfugie point derrière mes prières nocturnes,"},
        {t:'tri', ar:"وَلَا تُثْنِي عَلَيَّ بِإِحْيَائِهَا سُنَّةٌ", tr:"wa lâ tuthnî ‘alayya bi-ihyâ’ihâ sunnatun", fr:"et je n’ai accompli aucun Sunna pour avis été digne de Toi,"},
        {t:'tri', ar:"حَاشَى فُرُوضِكَ الَّتِي مَنْ ضَيَّعَهَا هَلَكَ", tr:"hâchâ furûdika allati man dayya’ ahâ halaka", fr:"sauf Tes Obligations, et dont celui qui les négligea, périrait."},
        {t:'tri', ar:"وَلَسْتُ أَتَوَسَّلُ إِلَيْكَ بِفَضْلِ نَافِلَةٍ", tr:"wa lastu atawassalu ilayka bifadli nâfilatin", fr:"Je ne puis même pas avoir recours chez Toi par l’excellence"},
        {t:'tri', ar:"مَعَ كَثِيرِ مَا أَغْفَلْتُ مِنْ وَظَائِفِ فُرُوضِكَ", tr:"ma’a kathîri mâ aghfaltu min wazâ’ifi furüdik", fr:"d’une prière ou d’une action, susceptible d’attirer Ton Indulgence."},
        {t:'tri', ar:"وَتَعَدَّيْتُ عَنْ مَقَامَاتِ حُدُودِكَ", tr:"wa ta addaytu ‘an maqâmâti hudûdika", fr:"Quoique j’ai négligé beaucoup de Tes Devoirs et Tes Obligations,"},
        {t:'tri', ar:"إِلَى حُرُمَاتٍ انْتَهَكْتُهَا", tr:"ilâ hurumâtin intahaktuhâ", fr:"et transgressé et violé les stations de Tes Interdictions,"},
        {t:'tri', ar:"وَكَبَائِرِ ذُنُوبٍ اجْتَرَحْتُهَا", tr:"wa kabâ’iri dhunûbin ijtarahtuhâ", fr:"et commis de grands péchés,"},
        {t:'tri', ar:"كَانَتْ عَافِيَتُكَ لِي مِنْ فَضَائِحِهَا سِتْراً", tr:"kânat ‘âfiyatuka lî min fadâ’ihihâ sitran", fr:"Cependant Ta Sauvegarde a couvert mes disgrâces."},
        {t:'tri', ar:"وَهَذَا مَقَامُ مَنِ اسْتَحْيًا لِنَفْسِهِ مِنْكَ", tr:"wa hadha maqamu man istahya linafsihi mink", fr:"Ceci est la situation de celui qui a honte de lui-même, et se montre humilié devant Toi,"},
        {t:'tri', ar:"وَسَخِطَ عَلَيْهَا وَرَضِيَ عَنْكَ", tr:"wa sakhița ‘alayhâ wa radiya ‘anka", fr:"et qui est en colère contre lui-même, mais se montre content de Ta Volonté."},
        {t:'tri', ar:"قَتَلَقَّاكَ بِنَفْسٍ خَاشِعَةٍ", tr:"fatalaqqâka binafsin khâchi’atin", fr:"Il vient à Ta rencontre avec une âme humble,"},
        {t:'tri', ar:"وَرَقَبَةٍ خَاضِعَةٍ", tr:"wa raqabatin khâdi atin", fr:"un cou courbé,"},
        {t:'tri', ar:"وَظَهْرٍ مُثْقَلٍ مِنَ الخَطَايَا", tr:"wa zahrin muthqalin min alkhațâyâ", fr:"un dos lourd d’offenses,"},
        {t:'tri', ar:"وَاقِفاً بَيْنَ الرَّغْبَةِ إِلَيْكَ وَالرَّهْبَةِ مِنْكَ", tr:"wâgifan bayna arraghbati ilayka warrahbati minka", fr:"hésitant entre son désir intense pour Toi, et sa crainte de Toi."},
        {t:'tri', ar:"وَأَنْتَ أَوْلَى مَنْ رَجَاهُ", tr:"wa anta awlâ man rajâhu", fr:"Tu es Le plus Digne parmi ceux en qui il pourrait y mettre son espoir,"},
        {t:'tri', ar:"وَأَحَقُّ مَنْ خَشِيَهُ وَاتَّقَاهُ", tr:"wa ahaqqu man khachiyahû wattaqâhu", fr:"Le plus Digne parmi eux, pour qu’il ait de la crainte et de la terreur envers Lui!"},
        {t:'tri', ar:"فَأَعْطِنِي يَا رَبِّ مَا رَجَوْتُ", tr:"fa a’țini yâ rabbi mâ rajawtu", fr:"Accorde-moi mon Dieu, ce que je souhaite,"},
        {t:'tri', ar:"وَآمِنِّي مَا حَذِرْتُ", tr:"wa âminni mâ hadhirtu", fr:"et donne-moi une sécurité contre ce qui m’effraie,"},
        {t:'tri', ar:"وَعُدْ عَلَيَّ بِعَائِدَةِ رَحْمَتِكَ", tr:"wa ‘ud ‘alayya bi’ â’idati rahmatika", fr:"et agis bonnement envers moi, avec la bonne action née de Ta Miséricorde."},
        {t:'tri', ar:"إِنَّكَ أَكْرَمُ الْمَسْئُولِينَ", tr:"innaka akramu almas’ûlina", fr:"Car Tu es sûrement Le plus Généreux parmi ceux à qui on dépose sa demande"},
        {t:'tri', ar:"اَللَّهُمَّ وَإِذْ سَتَرْتَنِي بِعَفْوِكَ", tr:"allâhumma wa idh satartani bi’afwika", fr:"Ô Dieu! Comme Tu m’as voilé de par Ton Pardon,"},
        {t:'tri', ar:"وَتَغَمَّدْتَنِي بِفَضْلِكَ", tr:"wa taghammadtani bifadlika", fr:"et m’as enveloppé avec Ta Grâce"},
        {t:'tri', ar:"فِي دَارِ الْفَنَاءِ بِحَضْرَةِ الأَكْفَاءِ", tr:"fi dâri alfanâ’i bihadrati al-akfa’i", fr:"dans le domicile de l’annihilation, et dans la présence des égaux,"},
        {t:'tri', ar:"فَأَجِرْنِي مِنْ فَضِيحَاتِ دَارِ الْبَقَاءِ", tr:"fa ajirni min fadînâti dâri albaqâ’i", fr:"Accorde-moi donc un refuge, des disgrâces"},
        {t:'tri', ar:"عِنْدَ مَوَاقِفِ الأَشْهَادِ", tr:"inda mawâqifi al- achhâdi", fr:"dans l’Éternel Domicile devant les places des Témoins,"},
        {t:'tri', ar:"مِنَ الْمَلَائِكَةِ الْمُقَرَّبِينَ", tr:"min almalâ’ikati almuqarrabina", fr:"(qui sont les Anges proches,"},
        {t:'tri', ar:"وَالرُّسُلِ الْمُكَرَّمِينَ", tr:"warrusuli almukarramîna", fr:"les Messagers Vénérés de Ta Lumière,"},
        {t:'tri', ar:"وَالشُّهَدَاءِ وَالصَّالِحِينَ", tr:"wachchuhadấ’i waşşâlihîna", fr:"les Martyrs, et les Virtuous)"},
        {t:'tri', ar:"مِنْ جَارٍ كُنْتُ أُكَاتِمُهُ سَيِّئَاتِي", tr:"min jârin kuntu ukâtimuhû sayyi’âtî", fr:"devant le voisin à qui Javais caché mes mauvaises actions,"},
        {t:'tri', ar:"وَمِنْ ذِي رَحِمٍ كُنْتُ أَحْتَشِمُ مِنْهُ فِي سَرِيرَاتِي", tr:"wa min dhi rahimin kuntu ahtachimu minhu fì sarîrâti", fr:"et les parents très intimes (et dont nous sommes liés par le lien du sang) et devant qui je me sentais humilié de mes pensées secrètes"},
        {t:'tri', ar:"لَمْ أَثِقْ بِهِمْ رَبِّ فِي السِّتْرِ عَلَيَّ", tr:"lam athiq bihim rabbi fissitri ‘alayya", fr:"Je ne leur fais pas confiance mon Seigneur, et ne crois pas qu’ils puissent couvrir mes fautes,"},
        {t:'tri', ar:"وَوَثِقْت بِكَ رَبِّ فِي الْمَغْفِرَةِ لِي", tr:"wa wathiqtu bika rabbi filmaghfirati lô", fr:"mais je Te fais confiance à Toi, mon Seigneur, pour me pardonner"},
        {t:'tri', ar:"وَأَنْتَ أَوْلَى مَنْ وُثِقَ بِهِ", tr:"wa anta awlâ man wuthiqa bihi", fr:"Tu es Le plus Digne parmi ceux en qui on pourrait y placer sa confiance,"},
        {t:'tri', ar:"وَأَعْطَى مَنْ رُغِبَ إِلَيْهِ", tr:"wa a’tâ man rughiba ilayhi", fr:"Le plus Donateur (Offrant) parmi ceux à qui on exprime sa demande,"},
        {t:'tri', ar:"وَأَرْأَفُ مَنِ اسْتُرْحِمَ فَارْحَمْنِي", tr:"wa ar’afu man isturhima farhamni", fr:"et Le plus Clément parmi ceux à, qui on demande la Miséricorde et la Grâce! Par conséquent Aie pitié de moi."},
        {t:'tri', ar:"اَللَّهُمَّ وَأَنْتَ حَدَرْتَنِي مَاءً مَهِيناً", tr:"allâhumma wa anta hadartani mấ’an mahînan", fr:"Ô Dieu! Tu me fis descendre comme une eau"},
        {t:'tri', ar:"مِنْ صُلْبٍ مُتَضَائِقِ الْعِظَامِ حَرِجِ الْمَسَالِكِ", tr:"min şulbin mutadâ’iqi al’izâmi hariji almasâliki", fr:"vile couler des lombes à l’ossature étroite,"},
        {t:'tri', ar:"إِلَى رَحِمٍ ضَيَّقَةٍ سَتَرْتَهَا بِالْحُجُبِ", tr:"ilâ rahimin dayyiqatin satartahâ bilhujubi", fr:"par des voies très étroites au dedans de l’utérus contracté,"},
        {t:'tri', ar:"تُصَرِّفُنِي حَالاً عَنْ حَالٍ", tr:"tuşarrifunî hâlan ‘an hâlin", fr:"que Tu avais couvert avec des voiles;"},
        {t:'tri', ar:"حَتَّى انْتَهَيْتَ بِي إِلَى تَمَامِ الصُّورَةِ", tr:"hattâ intahayta bi ilâ tamâmi aşşûrati", fr:"me développant d’un état à un autre, jusqu’à ce que Tu complétas ma forme,"},
        {t:'tri', ar:"وَأَثْبَتَّ فِيَّ الْجَوَارِحَ", tr:"wa athbatta fiyya aljawâriha", fr:"et me fixas les membres,"},
        {t:'tri', ar:"كَمَا نَعَتَّ فِي كِتَابِكَ:", tr:"kamâ na’atta fi kitâbika", fr:"comme Tu le décrivis si bien dans Ton Livre:"},
        {t:'tri', ar:"(نُطْفَةً ثُمَّ عَلَقَةً", tr:"nutfatan thumma ‘alaqatan", fr:"une goutte de sperme,"},
        {t:'tri', ar:"ثُمَّ مُضْغَةً ثُمَّ عِظَاماً", tr:"thumma mudghatan thumma ‘izâman", fr:"puis un caillot de sang,"},
        {t:'tri', ar:"ثُمَّ كَسَوْتَ الْعِظَامَ لَحْماً", tr:"thumma kasawta al’izâma lahman", fr:"puis un morceau de chair, puis les os, ensuite Tu vêtis les os avec la chair,"},
        {t:'tri', ar:"ثُمَّ أَنْشَأْتَنِي خَلْقاً آخَرَ) كَمَا شِئْتَ", tr:"thumma ancha’tani khalqan âkhara kamâ chita", fr:"et finalement Tu me produisis de toute une autre nature comme Tu voulus."},
        {t:'tri', ar:"حَتَّى إِذَا احْتَجْتُ إِلَى رِزْقِكَ", tr:"hattâ idhâ ihtajtu ilâ rizqika", fr:"Ensuite, quand j’eus besoin de la Provision,"},
        {t:'tri', ar:"وَلَمْ أَسْتَغْنِ عَنْ غِيَاثِ فَضْلِكَ", tr:"wa lam astaghni ‘an ghiyâthi fadlika", fr:"et ne pouvais subsister sans l’aide de Ta Grâce,"},
        {t:'tri', ar:"جَعَلْتَ لِي قُوتاً مِنْ فَضْلِ طَعَامٍ وَشَرَابٍ", tr:"ja alta lî qûtan min fadli ta ‘âmin wa charâbin", fr:"Tu me désignas une nourriture, de la générosité de l’aliment et de la boisson"},
        {t:'tri', ar:"أَجْرَيْتَهُ لأَمَتِكَ الَّتِي أَسْكَنْتَنِي جَوْفَهَا", tr:"ajraytahû li-amatika allati askantani jawfahâ", fr:"que Tu avais offerts à Ta servante qui m’avait abrité au dedans d’elle-même,"},
        {t:'tri', ar:"وَأَوْدَعْتَنِي قَرَارَ رَحِمِهَا", tr:"wa awda tani qarâra rahimihâ", fr:"et dont Tu m’avais déposé dans le dépôt de son utérus."},
        {t:'tri', ar:"وَلَوْ تَكِلْنِي يَا رَبِّ فِي تِلْكَ الْحَالاَتِ إِلَى حَوْلِي", tr:"wa law takiluni ya rabbi fi ti-ka alhâlâti ilâ hawli", fr:"Ô Dieu! Si Tu m’avais laissé dans ces états,"},
        {t:'tri', ar:"أَوْ تَضْطَرُّنِي إِلَى قُوَّتِي", tr:"aw tadțarruni ilâ quwwati", fr:"ou si Tu m’avais forcé de m’en abstenir à ma seule puissance,"},
        {t:'tri', ar:"لَكَانَ الْحَوْلُ عَنِّي مُعْتَزِلاً", tr:"lakâna alhawlu ‘anni mu tazilan", fr:"toute force m’aurait lâché,"},
        {t:'tri', ar:"وَلَكَانَتِ القُوَّةُ مِنِّي بَعِيدَةً", tr:"wa lakânat alquwwatu minni ba’îdatan", fr:"et toute puissance éloignée de ma personne!"},
        {t:'tri', ar:"فَغَذَوْتَنِي بِفَضْلِكَ غِذَاءَ الْبَرِّ اللَّطِيفِ", tr:"faghadhawtani bifadlika ghidhâ’a albarri allațîfi", fr:"Ainsi! Tu m’as uni de par Ta Générosité, avec la bonté et une bonne nourriture;"},
        {t:'tri', ar:"تَفْعَلُ ذَلِكَ بِي تَطَوُّلاً عَلَيَّ", tr:"taf alu dhâlika bî tațawwulan ‘alayya", fr:"Tu as continué à faire cela pour moi en toute Grâcieuseté,"},
        {t:'tri', ar:"إِلَى غَايَتِي هَذِه لاَ أَعْدَمُ بِرَّكَ", tr:"ilâ ghâyati hadhihi lâ u damu birraka", fr:"jusqu’à ma situation présente. Ta Bonté ne me manque point,"},
        {t:'tri', ar:"وَلَاَ يُبْطِئُ بِي حُسْنُ صَنِيعِكَ", tr:"wa lâ yubți’u bî husnu şanî’ika", fr:"et Tes Bienfaits ne sont pas retardés pour moi!"},
        {t:'tri', ar:"وَلَاَ تَتَأَكَّدُ مَع ذَلِكَ ثِقَتِي", tr:"wa lâ tata’akkadu ma’a dhâlika thiqati", fr:"Et pourtant, ma confiance n’est pas entièrement ferme,"},
        {t:'tri', ar:"فَأَتَفَرَّغَ لِمَا هُوَ أَحْظى لِي عِنْدَكَ", tr:"fa atafarragha limâ huwa ahza lî ‘indaka", fr:"de sorte que je puisse me libérer, et d’agir d’une façon positive, pour accomplir ce qui m’est le plus utile chez Toi."},
        {t:'tri', ar:"قَدْ مَلَكَ الشَّيْطَانُ عِنَانِي", tr:"qad malaka achchaytânu ‘inâni", fr:"Satan a pris possession de mes reins,"},
        {t:'tri', ar:"فِي سُوءِ الظَّنِّ وَضَعْفِ الْيَقِينِ", tr:"fi sû’i azzanni wa da fi alyaqîni", fr:"par mon manque de confiance, et à cause de ma fragile certitude."},
        {t:'tri', ar:"فَأَنَا أَشْكُو سُوءَ مُجَاوَرَتِهِ لِي", tr:"fa ana achkû sû’a mujâwaratihi li", fr:"Je porte plainte de son mauvais voisinage avec moi,"},
        {t:'tri', ar:"وَطَاعَةَ نَفْسِي لَهُ", tr:"wa tâ’ ata nafsî lahu", fr:"et l’obéissance de mon âme envers lui"},
        {t:'tri', ar:"وَأَسْتَعْصِمُكَ مِنْ مَلَكَتِهِ", tr:"wa asta’șimuka min malakatihi", fr:"Je Te prie humblement de me préserver contre sa domination,"},
        {t:'tri', ar:"وَأَتَضَرَّعُ إِلَيْكَ فِي صَرْفِ كَيْدِهِ عَنِّي", tr:"wa atadarra’u ilayka fi şarfi kaydihî ‘annî", fr:"et je Te supplie de détourner sa ruse loin de moi!"},
        {t:'tri', ar:"وَأَسْأَلُكَ فِي أَنْ تُسَهِّلَ إِلَى رِزْقِي سَبِيلاً", tr:"wa as’aluka fi an tusahhila ilâ rizqî sabilan", fr:"Je Te demande de faciliter le chemin de ma provision,"},
        {t:'tri', ar:"فَلَكَ الْحَمْدُ عَلَى ابْتِدَائِكَ بِالنِّعَمِ الْجِسَامِ", tr:"falaka alhamdu ‘alâ ibtidâ’ika binni ami aljisâmi", fr:"car à Toi Seul appartient toute Louange: et pour les faveurs immenses que Tu m’as accordé dès le commencement,"},
        {t:'tri', ar:"وَإِلْهَامِكَ الشُّكْرَ عَلَى الإِحْسَانِ وَالإِنْعَامِ", tr:"wa ilhâmika achchukra ‘alâ al- ihsâni wal-in’âmi", fr:"et pour le sentiment de gratitude que Tu m’as inspiré pour les bienfaits et la donation de Tes Faveurs!"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَسَهِّلْ عَلَيَّ رِزْقِي", tr:"wa sahhil ‘alayya rizai", fr:"Et facilite-moi le chemin de ma provision!"},
        {t:'tri', ar:"وَأَنْ تُقْنِعَنِي بِتَقْدِيرِكَ لِي", tr:"wa an tuqni ani bitaqdirika li", fr:"[je Te prie] de me rendre content de ce que Tu as mesuré pour moi,"},
        {t:'tri', ar:"وَأَنْ تُرْضِيَنِي بِحِصَّتِي فِيمَا قَسَمْتَ لِي", tr:"wa an turdiyani bihişşatî fîmâ qasamta lî", fr:"et de me rendre satisfait de ma part et de mon lot que Tu as répartis pour moi"},
        {t:'tri', ar:"وَأَنْ تَجْعَلَ مَا ذَهَبَ مِنْ جِسْمِي وَعُمْرِي فِي سَبِيلِ طَاعَتِكَ", tr:"wa an taj ala mâ dhahaba min jismi wa ‘umri fi sabîli tâ’ atika", fr:"et de placer ce qui s’est écoulé de mon corps et de mon âge, dans le chemin de Ton Obéissance!"},
        {t:'tri', ar:"إِنَّكَ خَيْرُ الرَّازِقِينَ", tr:"innaka khayru arrâziqina", fr:"Car Tu est sûrement Le Meilleur des Pourvoyeurs!"},
        {t:'tri', ar:"اَللَّهُمَّ إِنِّي أعُوذُ بِكَ مِنْ نَارٍ", tr:"allâhumma inni a’ûdhu bika min nârin", fr:"Ô Dieu! Je cherche refuge en Toi du Feu,"},
        {t:'tri', ar:"تَغَلَّظْتَ بِهَا عَلَى مَنْ عَصَاكَ", tr:"taghallazta bihâ ‘alâ man ‘aşâka", fr:"que Tu as endurci contre celui qui Ta désolé,"},
        {t:'tri', ar:"وَتَوَعَّدْتَ بِهَا مَنْ صَدَفَ عَنْ رِضَاكَ", tr:"wa tawa » adta biha man șadafa ‘an ridâka", fr:"et par lequel Tu as menacé celui qui s’est détourné de Ta Satisfaction"},
        {t:'tri', ar:"وَمِنْ نَارٍ نُورُهَا ظُلْمَةٌ", tr:"wa min nârin nûruhâ zulmatun", fr:"Je cherche refuge en Toi du Feu dont la lumière est obscurité,"},
        {t:'tri', ar:"وَهَيِّنُهَا أَلِيمٌ", tr:"wa hayyinuhâ alimun", fr:"et que même quand il est doux, est néanmoins douloureux,"},
        {t:'tri', ar:"وَبَعِيدُهَا قَرِيبٌ", tr:"wa ba’îduhâ qaribun", fr:"et son lointain est proche;"},
        {t:'tri', ar:"وَمِنْ نَارٍ يَأْكُلُ بَعْضَهَا بَعْضٌ", tr:"wa min nârin ya’kulu ba dahâ ba dun", fr:"Je cherche refuge en Toi du Feu, dont certaines de ses parts dévorent certaines d’autres,"},
        {t:'tri', ar:"وَيَصُولُ بَعْضُهَا عَلَى بَعْضٍ", tr:"wa yaşûlu ba’ duhâ ‘alâ ba din", fr:"et d’autres attaquent d’autres;"},
        {t:'tri', ar:"وَمِنْ نَارٍ تَذَرُ الْعِظَامَ رَمِيماً", tr:"wa min nârin tadharu al’izâma ramîman", fr:"Je cherche refuge en Toi du Feu, qui pourrit les os,"},
        {t:'tri', ar:"وَتَسْقِي أَهْلَهَا حَمِيماً", tr:"wa tasqi ahlahâ hamiman", fr:"et fait boire de l’eau bouillante aux gens;"},
        {t:'tri', ar:"وَمِنْ نَارٍ لا تُبْقِي عَلَى مَنْ تَضَرَّعَ إِلَيْهَا", tr:"wa min nârin lâ tubai ‘ alâ man tadarra a ilayhâ", fr:"Je cherche refuge en Toi du Feu, qui n’épargne pas celui qui lui plaide sa cause,"},
        {t:'tri', ar:"وَلاَ تَرْحَمُ مَنِ اسْتَعْطَفَهَا", tr:"wa lâ tarhamu man ista tafahâ", fr:"et n’a aucune pitié envers celui qui cherche la sympathie pour lui,"},
        {t:'tri', ar:"وَلَاَ تَقْدِرُ عَلَى التَّخْفِيفِ عَمَّنْ خَشَعَ لَهَا", tr:"wa lâ taqdiru ‘alâ attakhfifi ‘amman khacha’a lahâ", fr:"et n’a aucun pouvoir de soulager celui qui humilie devant lui,"},
        {t:'tri', ar:"وَاسْتَسْلَمَ إِلَيْهَا", tr:"wastaslama ilayhâ", fr:"et se soumet à lui!"},
        {t:'tri', ar:"تَلْقَى سُكَّانَهَا بِأَحَرِّ مَا لَدَيْهَا", tr:"talqâ sukkânahâ bi-aharri mâ ladayhâ", fr:"Ce Feu va à la rencontre de ses habitants avec la chaleur la plus chaude qu’il possède:"},
        {t:'tri', ar:"مِنْ أَلِيمِ النَّكَالِ وَشَدِيدِ الْوَبَالِ", tr:"min alimi annakâli wa chadîdi alwabâli", fr:"une punition douloureuse et une intense nocivité."},
        {t:'tri', ar:"وَأَعُوذُ بِكَ مِنْ عَقَارِبِهَا الْفَاغِرَةِ أَفْوَاهُهَا", tr:"wa a’ûdhu bika min’aqâribihâ alfâghirati afwâhuhâ", fr:"Je cherche refuge en Toi de ses scorpions à bouches ouvertes,"},
        {t:'tri', ar:"وَحَيَّاتِهَا الصَّالِقَةِ بِأَنْيَابِهَا", tr:"wa hayyâtihâ aşşâliqati bi- anyâbiha", fr:"de ses serpents qui mordent avec leurs crocs,"},
        {t:'tri', ar:"وَشَرَابِهَا الَّذِي يُقَطِّعُ أَمْعَاءَ وَأَفْئِدَةَ سُكَّانِهَا", tr:"wa charâbihâ alladhî yuqațți u am’ấ’a wa af’idata sukkânihâ", fr:"et de sa boisson qui déchire les intestins et les coeurs de ses habitants,"},
        {t:'tri', ar:"وَيَنْزِعُ قُلُوبَهُمْ", tr:"wa yanzi u qulûbahum", fr:"et déracine leurs moelles!"},
        {t:'tri', ar:"وَأَسْتَهْدِيكَ لِمَا بَاعَدَ مِنْهَا وَأَخَّرَ عَنْهَا", tr:"wa astahdika limâ bâ ada minhâ wa akhkhara ‘anhâ", fr:"Je Te demande de me guider vers ce qui me gardera loin de ce Feu, et qui me le fera rater!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَجِرْنِي مِنْهَا بِفَضْلِ رَحْمَتِكَ", tr:"wa ajirni minhâ bifadli rahmatika", fr:"Accorde-moi sanctuaire de ce Feu, par la générosité de Ta Grâce,"},
        {t:'tri', ar:"وَأَقِلْنِي عَثَرَاتِي بِحُسْنِ إِقَالَتِكَ", tr:"wa aqilni ‘atharâti bihusni iqâlatika", fr:"Pardonne-moi mes faux-pas (erreurs), de par Ton Renoncement, et – de Grâce!-"},
        {t:'tri', ar:"وَلَاَ تَخْذُلْنِي يَا خَيْرَ الْمُجِيرِينَ", tr:"wa la takhdhulni ya khayra almujirina", fr:"ne m’y abandonne pas! Ô celui qui accorde le meilleur sanctuaire!"},
        {t:'tri', ar:"اَللَّهُمَّ إِنَّكَ تَقِي الْكَرِيهَةَ", tr:"allâhumma innaka taqî alkarihata", fr:"Ô Dieu! Tu protèges Tes serviteurs fidèles de toute chose désagréable et de toute aversion,"},
        {t:'tri', ar:"وتُعْطِي الْحَسَنَةَ", tr:"wa tu tê alhasanata", fr:"et leur accordes le bien,"},
        {t:'tri', ar:"وَتَفْعَلُ مَا تُرِيدُ", tr:"wa taf’ alu mâ turîdu", fr:"Fais ce que Tu veux,"},
        {t:'tri', ar:"وَأَنْتَ عَلَى كُلِّ شَيءٍ قَدِيرٌ", tr:"wa anta ‘alâ kulli chay’in qadîrun", fr:"car Tu es Puissant sur toutes les choses!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"إِذَا ذُكِرَ الأَبْرَارُ", tr:"idhâ dhukira al- abrâru", fr:"quand on se souvient des pieux,"},
        {t:'tri', ar:"وَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"wa șalli ‘alâ muhammadin wa âlihi", fr:"et donc bénis Mohammad et toute sa Famille"},
        {t:'tri', ar:"مَا اخْتَلَفَ اللَّيْلُ وَالنَّهَارُ", tr:"makhtalafa allaylu wannahâru", fr:"tant que le jour et la nuit se suivent,"},
        {t:'tri', ar:"صَلاَةً لاَ يَنْقَطِعُ مَدَدُهَا", tr:"salâtan lâ yanqați u madaduhâ", fr:"avec une bénédiction qui ne sera jamais terminée,"},
        {t:'tri', ar:"وَلَاَ يُحْصَى عَدَدُهَا", tr:"wa lâ yuhşa ‘adaduhâ", fr:"et dont jamais le nombre ne peut être compté;"},
        {t:'tri', ar:"صَلاَةً تَشْحَنُ الْهَوَاءَ", tr:"șalâtan tachhanu alhawấ’a", fr:"Une bénédiction qui emplira l’air,"},
        {t:'tri', ar:"وَتَمْلأُ الأَرْضَ وَالسَّمَاءَ", tr:"wa tamla’u al-arda wassamâ’a", fr:"et qui remplira la terre et le ciel!"},
        {t:'tri', ar:"صَلَّى اللَّهُ عَلَيْهِ حَتَّى يَرضَى", tr:"şallâ allâhu ‘alayhi hattâ yardâ", fr:"Que Dieu le bénisse! Jusqu’à ce qu’il soit pleinement satisfait,"},
        {t:'tri', ar:"وَصَلَّى اللَّهُ عَلَيْهِ وَآلِهِ بَعْدَ الرِّضَا", tr:"wa şallâ allâhu ‘alayhi wa âlihi ba’da arridâ", fr:"et que Dieu lui bénisse et toute sa Famille, après cette splendide satisfaction,"},
        {t:'tri', ar:"صَلاَةً لاَ حَدَّ لَهَا وَلَاَ مُنْتَهَى", tr:"șalâtan la hadda lahâ wa lâ muntahâ", fr:"avec une bénédiction qui n’a ni de limite ni de fin!"},
        {t:'tri', ar:"يَا أَرْحَمَ الرَّاحِمِينَ.", tr:"ya arhama arrâhimîna", fr:"Ô Le plus Miséricordieux parmi les miséricordieux!"},
        {t:'salawat'},
      ]
    },
    's33': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "33. Demande du Meilleur",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lors de la demande du Meilleur (Istikhârah)",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الأسْتِخارةِ", tr:"", fr:"La trente troisième supplication: en demandant pour le meilleur"},
        {t:'tri', ar:"اللَّهُمَّ إِنِّي أَسْتَخِيرُكَ بِعِلْمِكَ", tr:"allâhumma innî astakhiruka bi’ilmika", fr:"O Dieu! De par Ta Connaissance, je Te demande le meilleur,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"bénis donc Mohammad et toute sa Famille,"},
        {t:'tri', ar:"وَاقْضِ لِي بِالْخِيَرَةِ", tr:"waqdi li bilkhiyarati", fr:"et décrète le meilleur pour moi!"},
        {t:'tri', ar:"وَأَلْهِمْنَا مَعْرِفَةَ الإخْتِيَارِ", tr:"wa alhimnâ ma rifata alikhtiyâri", fr:"Inspire nous de connaître le bon choix,"},
        {t:'tri', ar:"وَاجْعَلْ ذَلِكَ ذَرِيعةً إِلَى الرِّضَا بِمَا قَضَيْتَ لَنَا", tr:"waj al dhâlika dharîatan ilâ arridâ bima qadayta lanâ", fr:"et transforme cela en un moyen d’être satisfait par ce que Tu as décidé pour nous"},
        {t:'tri', ar:"وَالتَّسْلِيمِ لِمَا حَكَمْتَ", tr:"wa attaslîmi limâ hakamta", fr:"et de nous y soumettre!"},
        {t:'tri', ar:"فَأَزِحْ عَنَّا رَيْبَ الإرْتِيَاب", tr:"fa azih ‘annâ rayba alirtiyâbi", fr:"Bânis de notre personne la suspicion du doute,"},
        {t:'tri', ar:"وَأَيَّدْنَا بِيَقِينِ الْمُخْلِصِينَ", tr:"wa ayyidnâ biyaqîni almukhlişina", fr:"et confirme-nous avec la certitude des gens sincères!"},
        {t:'tri', ar:"وَلَاَ تَسُمْنَا عَجْزَ الْمَعْرِفَةِ عَمَّا تَخَيَّرْتَ", tr:"wa lâ tasumnâ ‘ajza alma rifati ammâ takhayyarta", fr:"Ne nous impose pas l’incapacité de comprendre ce que Tu as choisi,"},
        {t:'tri', ar:"فَنَغْمِطَ قَدْرَكَ", tr:"fanaghmița qadraka", fr:"afin que nous ne soyons pas ingrats envers Toi,"},
        {t:'tri', ar:"وَنَكْرَهَ مَوْضِعَ رِضَاكَ", tr:"wa nakraha mawdi a ridâka", fr:"et que ce qui Te plaît, ne nous soit pas déplaisant,"},
        {t:'tri', ar:"وَتَجْنَحَ إِلَى الَّتِي هِيَ أَبْعَدُ مِنْ حُسْنِ الْعَاقِبَةِ", tr:"wa najnaha ilâ allati hiya ab’adu min husni al’âqibati", fr:"et de ne pas nous diriger vers ce qui est loin d’un bon résultat,"},
        {t:'tri', ar:"وَأَقْرَبُ إِلَى ضِدِّ الْعَافِيَةِ", tr:"wa aqrabu ilâ diddi al’âfiyati", fr:"mais de ce qui est près de son opposé!"},
        {t:'tri', ar:"حَبِّبْ إلَيْنَا مَا نَكْرَهُ مِنْ قَضَائِكَ", tr:"habbib ilaynâ mâ nakrahû min qadâ’ika", fr:"Fais-nous aimer ce qui ne nous plaît point dans Ton Décret,"},
        {t:'tri', ar:"وَسَهِّلْ عَلَيْنَا مَا تَسْتَصْعِبُ مِنْ حُكْمِكَ", tr:"wa sahhil ‘alaynâ mâ nastaș ibu min hukmika", fr:"et facilite pour nous ce que nous trouvons difficile dans Ton Choix!"},
        {t:'tri', ar:"وَأَلْهِمْنَا الإِنْقِيَادَ لِمَا أَوْرَدْتَ عَلَيْنَا مِنْ مَشِيَّتِكَ", tr:"wa alhimnâ alinqiyâda limâ awradta ‘alaynâ min machiyyatika", fr:"Inspire-nous de nous soumettre à ce que Tu nous as imposés de par Ta Volonté,"},
        {t:'tri', ar:"حَتَّى لاَ نُحِبَّ تَأْخِيرَ مَا عَجَّلْتَ", tr:"hattâ lâ nuhibba ta khîra mâ ‘ajjalta", fr:"afin que nous n’aimions l’ajournement de ce que Tu as précipité,"},
        {t:'tri', ar:"وَلَا تَعْجِيلَ مَا أخَّرْتَ", tr:"wa lâ ta jîla mâ akhkharta", fr:"et la précipitation de ce que Tu as ajournée,"},
        {t:'tri', ar:"وَلَا نَكْرَهَ مَا أَحْبَبْتَ", tr:"wa lâ nakraha mâ ahbabta", fr:"et de ne pas aimer ce qui Te déplaît,"},
        {t:'tri', ar:"وَلَاَ تَتَخَيَّرَ مَا كَرِهْتَ", tr:"wa lâ natakhayyara mâ karihta", fr:"et de ne pas choisir ce que Tu n’aimes pas!"},
        {t:'tri', ar:"وَاخْتِمْ لَنَا بِالَّتِي هِيَ أَحْمَدُ عَاقِبَةً", tr:"wakhtim lanâ billatî hiya ahmadu ‘âqibatan", fr:"Marque-nous avec le sceau de ce qui sera le plus loué à la fin,"},
        {t:'tri', ar:"وَأَكْرَمُ مَصِيراً", tr:"wa akramu maşiran", fr:"et qui aura le résultat le plus digne d’éloge!"},
        {t:'tri', ar:"إِنَّكَ تُفِيدُ الْكَرِيمَةَ", tr:"innaka tufidu alkarimata", fr:"Car en vérité, Tu offres un gain généreux,"},
        {t:'tri', ar:"وَتُعْطِي الْجَسِيمَةَ", tr:"wa tu ti aljasîmata", fr:"Tu accordes des dons immenses,"},
        {t:'tri', ar:"وَتَفْعَلُ مَا تُرِيدُ", tr:"wa taf’alu mâ turidu", fr:"Tu fais ce que Tu veux,"},
        {t:'tri', ar:"وَأَنْتَ عَلَى كُلِّ شَيءٍ قَدِيرٌ.", tr:"wa anta ‘alâ kulli chay’in qadirun", fr:"et Tu es Puissant sur toutes les choses!"},
        {t:'salawat'},
      ]
    },
    's34': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "34. Lors de l'affliction",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lors de l'affliction ou du déshonneur",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا ابْتُلِي أوْ رأى مُبْتلَى بِفضِيحةٍ بِذنْبٍ", tr:"", fr:"La trente quatrième supplication: au moment d’affliction ou bien quand Il voyait un affligé, avec un scandale dû à un péché"},
        {t:'tri', ar:"اللّهُمَّ لَكَ الْحَمْدُ عَلَى سِتْرِكَ بَعْدَ عِلْمِكَ", tr:"allâhumma laka alhamdu ‘alâ sitrika ba da ‘ilmika", fr:"Ô Dieu! Par ce que Tu voiles après Ton Savoir, à Toi appartient toute louange!"},
        {t:'tri', ar:"وَمُعَافَاتِكَ بَعْدَ خُبْرِكَ", tr:"wa mu’âfâtika ba’da khubrika", fr:"et par le Pardon Que Tu accordes après Ta Conscience!"},
        {t:'tri', ar:"فَكُلُّنَا قَدِ اقْتَرَفَ الْعَائِبَةَ فَلَمْ تَشْهَرْهُ", tr:"fakulluna qad iqtarafa al’â’ibata falam tachharhu", fr:"Chacun de nous a commis des fautes reprochables, mais Tu ne les as jamais transformées en objet de scandale,"},
        {t:'tri', ar:"وَارْتَكَبَ الْفَاحِشَةَ فَلَمْ تَفْضَحْهُ", tr:"wartakaba alfâhichata falam tafdahhu", fr:"et chacun de nous a commis des indécences, mais Tu n’as jamais déshonoré personne,"},
        {t:'tri', ar:"وَتَسَتَّرَ بِالْمَسَاوِئِ فَلَمْ تَدْلُلْ عَلَيْهِ", tr:"wa tasattara bilmasâwi’i falam tadlul ‘alayhi", fr:"et quand en cachette quelqu’un a commis des péchés, Tu ne l’as point dénoncé,"},
        {t:'tri', ar:"كَمْ نَهْيٍ لَكَ قَدْ أَتَيْنَاهُ", tr:"kam nahyin laka qad ataynahu", fr:"Combien est le nombre des actions interdites que nous avons commises avec impudence?"},
        {t:'tri', ar:"وَأَمْرٍ قَدْ وَقَفْتَنَا عَلَيْهِ فَتَعَدَّيْنَاهُ", tr:"wa amrin qad waqaftanâ ‘alayhî fata’addaynâhu", fr:"combien est le nombre des ordres que Tu nous as ordonnés et dont nous avons transgressé?"},
        {t:'tri', ar:"وَسَيِّئَةٍ اِكْتَسَبْنَاهَا", tr:"wa sayyi’atin iktasabnâhâ", fr:"combien est le nombre des méfaits dont nous nous sommes accaparés?"},
        {t:'tri', ar:"وَخَطِيئَةٍ اِرْتَكَبْنَاهَا", tr:"wa khatf’atin irtakabnâhâ", fr:"combien est le nombre des offenses que nous avons commises?"},
        {t:'tri', ar:"كُنْتَ الْمُطَّلِعَ عَلَيْهَا دونَ النَّاظِرِينَ", tr:"kunta almuțțali a ‘alayha dûna annâzirina", fr:"Tu étais le Seul Observateur, et non les autres."},
        {t:'tri', ar:"وَالْقَادِرَ عَلَى إِعْلَانِهَا فَوْقَ الْقَادِرِينَ", tr:"walqâdira ‘alâ i’lânihâ fawqa alqâdirina", fr:"Tu as le Pouvoir de les rendre publics, plus que les plus puissants!"},
        {t:'tri', ar:"كَانَتْ عَافِيَتُكَ لَنَا حِجَاباً دُونَ أَبْصَارهِمْ", tr:"kânat ‘âfiyatuka lanâ hijâban dûna abşârhim", fr:"Mais en nous procurant la sauvegarde, Tu as voilé leurs yeux,"},
        {t:'tri', ar:"وَرَدْماً دُونَ أَسْمَاعِهِمْ", tr:"wa radman dûna asmâ ihim", fr:"et bouché leurs oreilles!"},
        {t:'tri', ar:"فَاجْعَلْ مَا سَتَرْتَ مِنَ الْعَوْرَةِ", tr:"faj al mâ satarta min al’awrati", fr:"Ainsi, fais-en sorte que toutes les choses humiliantes que Tu as dissimulées,"},
        {t:'tri', ar:"وَأَخْفَيْتَ مِنَ الدَّخِيلَةِ وَاعِظًا لَنَا", tr:"wa akhfayta min addakhîlati wâ izan lanâ", fr:"et la laideur interne que Tu as cachée, deviennent nos admonestations (remontrances),"},
        {t:'tri', ar:"وَزَاجِراً عَنْ سُوءِ الْخُلْقِ", tr:"wa zâjiran ‘an sû’i alkhulqi", fr:"et une réprimande pour nos mauvais tempéraments"},
        {t:'tri', ar:"وَاقْتِرَافِ الْخَطِيئَةِ", tr:"waqtirâfi alkhați’ati", fr:"et nos offenses commises,"},
        {t:'tri', ar:"وَسَعْياً إِلَى التَّوْبَةِ الْمَاحِيَةِ", tr:"wa sa yan ilâ attawbati almâhiyati", fr:"et un effort envers le repentir qui effacera [les péchés]"},
        {t:'tri', ar:"وَالطَّرِيقِ الْمَحْمُودَةِ", tr:"wattariqi almahmudati", fr:"et nous conduira vers le chemin de la vertu."},
        {t:'tri', ar:"وَقَرِّبِ الْوَقْتَ فِيهِ", tr:"wa qarrib alwaqta fihi", fr:"Approche ce moment,"},
        {t:'tri', ar:"وَلَا تَسُمْنَا الْغَفْلَةَ عَنْكَ", tr:"wa lâ tasumnâ alghaflata ‘anka", fr:"et ne nous humilie point par une négligence envers Toi!"},
        {t:'tri', ar:"إِنَّا إِلَيْكَ رَاغِبُونَ", tr:"innâ ilayka râghibûna", fr:"Car nous sommes sûrement et véritablement Tes suppliants,"},
        {t:'tri', ar:"وَمِنَ الذُّنُوبِ تَائِبُونَ", tr:"wa min adhdhunûbi tâ ibûna", fr:"et ceux qui se sont repentis de leurs péchés."},
        {t:'tri', ar:"وَصَلِّ عَلَى خِيَرَتِكَ اللَّهُمَّ مِنْ خَلْقِكَ", tr:"wa șalli ‘alâ khiyaratika allâhumma min khalqika", fr:"Ô Dieu! Bénis Mohammad et son élite,"},
        {t:'tri', ar:"مُحَمَّدٍ وَعِتْرَتِهِ", tr:"muhammadin wa’itratihi", fr:"et ses purs descendants parmi tous les êtres humains,"},
        {t:'tri', ar:"الصَّفْوَةِ مِنْ بَرِيَّتِكَ الطَّاهِرِينَ", tr:"aşşafwati min bariyyatika attâhirîna", fr:"qui sont Ton bon choix parmi toutes Tes créatures,"},
        {t:'tri', ar:"وَاجْعَلْنَا لَهُمْ سَامِعِينَ وَمُطِيعِينَ كَمَا أَمَرْتَ.", tr:"waj alnâ lahum sâmi ‘îna wamuți îna kamâ amarta", fr:"et fais de nous leurs serviteurs obéissants, et que nous les écoutions, comme Tu l’as commandé!"},
        {t:'salawat'},
      ]
    },
    's35': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "35. Satisfaction du Décret",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lors de la satisfaction du Décret divin",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الرِّضا إِذا نظر إِلى أصْحابِ الدُّنْيَا", tr:"", fr:"La trente cinquième supplication: quand Il apercevait « les compagnons de ce monde » en se méfiant d’eux, et en décrivant sa satisfaction de sa situation"},
        {t:'tri', ar:"الْحَمْدُ للهِ رِضًى بِحُكْمِ اللهِ", tr:"alhamdu lillâhî ridan bihukmi allahi", fr:"Tout éloge appartient à Dieu en satisfaction et soumission à l’ordre de Dieu!"},
        {t:'tri', ar:"شَهِدْتُ أَنَّ اللَّهَ قَسَّمَ مَعَايِشَ عِبَادِهِ بِالْعَدْلِ", tr:"chahidtu anna allâh qassama ma’âyicha ‘ibâdihî bil ‘adli", fr:"J’atteste et confirme que Dieu a distribué la subsistance de Ses serviteurs avec équité,"},
        {t:'tri', ar:"وَأَخَذَ عَلَى جَمِيعِ خَلْقِهِ بِالْفَضْلِ", tr:"wa akhadha ‘alâ jamî i khalqihî bilfadli", fr:"et pour chacune de Ses créatures a montré Sa Grâce!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَلَا تَفْتِنِّي بِمَا أَعْطَيْتَهُمْ", tr:"wa lâ taftinni bimâ a taytahum", fr:"Fais-en sotie que je ne sois pas mis à l’épreuve devant ce que Tu as donné à Tes créatures,"},
        {t:'tri', ar:"وَلَا تَفْتِنْهُمْ بِمَا مَنَعْتَنِي", tr:"wa lâ taftinhum bimâ mana’tanî", fr:"et de même, ne les tente pas avec ce que Tu m’as refusé,"},
        {t:'tri', ar:"فَأَحْسُدَ خَلْقَكَ", tr:"fa ahsuda khalqaka", fr:"de peur que je n’envie Tes créatures,"},
        {t:'tri', ar:"وَأَغْمِطَ حُكْمَكَ", tr:"wa aghmița hukmaka", fr:"et dédaigne Ta Décision."},
        {t:'tri', ar:"اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَطَیِّبْ بِقَضَائِكَ نَفْسِي", tr:"wa tayyib biqadâ’ika nafsî", fr:"Fais-en sorte que j’accueille Ta Volonté avec joie,"},
        {t:'tri', ar:"وَوَسِّعْ بِمَوَاقِعِ حُكْمِكَ صَدْرِي", tr:"wa wassi’ bimawâqi i hukmika şadri", fr:"élargis mon coeur pour accepter Ton Décret,"},
        {t:'tri', ar:"وَهَبْ لِيَ الثِّقَةَ", tr:"wa hab lî aththiqata", fr:"Accorde-moi une confiance"},
        {t:'tri', ar:"لأُقِرَّ مَعَهَا بِأَنَّ قَضَاءَكَ لَمْ يَجْرِ إِلاَّ بِالْخِيَرَةِ", tr:"li-uqirra ma ahâ bi-anna qadâ’aka lam yajri illâ bilkhiyarati", fr:"pour que j’admette que Tes décrets ne s’exécutent que de la plus belle manière, et pour les meilleurs des résultats,"},
        {t:'tri', ar:"وَاجْعَلْ شُكْرِي لَكَ عَلَى مَا زَوَيْتَ عَنِّي", tr:"waj’al chukri laka ‘alâ mâ zawayta ‘anni", fr:"et fais-en sorte que ma gratitude envers Toi pour ce que Tu m’as refusé,"},
        {t:'tri', ar:"أَوْفَرَ مِنْ شُكْرِي إِيَّاكَ عَلَى مَا خَوَّلْتَنِي", tr:"awfara min chukri iyyâka ‘alâ mâ khawwaltani", fr:"soit beaucoup plus abondante que ma gratitude envers Toi pour ce que Tu m’as accordé!"},
        {t:'tri', ar:"وَاعْصِمْنِي مِنْ أَنْ أَظُنَّ بِذِي عَدَمٍ خَسَاسَةً", tr:"wa’șimni min an azunna bidhî ‘adamin khasâsatan", fr:"Préserve-moi d’avoir des pensées mesquines envers une personne qui est dénuée et pauvre,"},
        {t:'tri', ar:"أَوْ أَظُنَّ بِصَاحِبِ ثَرْوَةٍ فَضْلاً", tr:"aw azunna bişâhibi tharwatin fadlan", fr:"Ou bien d’imaginer une sorte de supériorité chez celui qui possède richesse et fortune,"},
        {t:'tri', ar:"فَإِنَّ الشَّرِيفَ مَنْ شَرَّفَتْهُ طَاعَتُكَ", tr:"fa inna achcharifa man charrafat-hu tâ’ atuka", fr:"Car noble est celui dont l’obéissance à Toi la ennobli,"},
        {t:'tri', ar:"وَالْعَزِيزَ مَنْ أَعَزَّتْهُ عِبَادَتُكَ", tr:"wal’aziza man a’azzat-hû ‘ibâdatuka", fr:"et glorieux est celui dont l’adoration qu’il voue pour Toi l’a glorifié!"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَمَتِّعْنَا بِثَرْوَةٍ لا تَنْفَدُ", tr:"wa matti’nâ bitharwatin lâ tanfadu", fr:"Fais-en sorte que nous jouissions d’une richesse qui ne finisse jamais,"},
        {t:'tri', ar:"وَأَيِّدْنَا بِعِزِّ لاَ يُفْقَدُ", tr:"wa ayyidna bi’izzin lâ yufqadu", fr:"et protège-nous avec une gloire à jamais intarissable et perpétuelle,"},
        {t:'tri', ar:"وَأَسْرِحْنَا فِي مُلْكِ الأَبَدِ", tr:"wa asrihnâ fi mulki al-abadi", fr:"et fais-en sorte que nous nous promenions dans le Royaume de la Perpétuité!"},
        {t:'tri', ar:"إِنَّكَ الْوَاحِدُ الأَحَدُ الصَّمَدُ", tr:"innaka alwâhidu al- ahadu aşşamadu", fr:"Car Tu es sûrement le Seul, l’Unique, l’Éternel Refuge,"},
        {t:'tri', ar:"اَلَّذِي لَمْ تَلِدْ وَلَمْ تُولَدْ", tr:"alladhi lam talid walam tûlad", fr:"Celui qui n’engendre point, et qui n’a jamais été engendré,"},
        {t:'tri', ar:"وَلَمْ يَكُنْ لَكَ كُفُواً أَحَدٌ.", tr:"wa lam yakun laka kufuwan ahadun", fr:"et personne n’est Ton égal"},
        {t:'salawat'},
      ]
    },
    's36': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "36. Entendre le tonnerre",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lorsque l'on entend le tonnerre",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا نظر إِلى السَّحابِ والْبرْقِ وسمِع صوْت الرّعْدِ", tr:"", fr:"La trente sixième supplication: quand Il regardait les nuages et l’éclair, et entendait le bruit du tonnerre"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّ هذَيْنِ آيَتَانِ مِنْ آيَاتِكَ", tr:"allâhumma inna hâdhayni âyatâni min âyâtika", fr:"Ô Dieu! Ces deux signes sont de Tes Signes,"},
        {t:'tri', ar:"وَهَذَيْنِ عَوْنَانِ مِنْ أَعْوَانِكَ", tr:"wa hâdhayni ‘awnâni min a’wânika", fr:"et ces deux agents sont deux de Tes serviteurs."},
        {t:'tri', ar:"يَبْتَدِرَانِ طَاعَتَكَ بِرَحْمَةٍ نَافِعَةٍ أَوْ نَقِمَةٍ ضَارَّةٍ", tr:"yabtadirâni tâ ‘ataka birahmatin nâfi atin aw naqimatin dârratin", fr:"Ils se dépêchent pour obéir avec avec une grâce bénéfique, ou bien une catastrophe nuisible;"},
        {t:'tri', ar:"فَلَا تُمْطِرْنَا بِهِمَا مَطَرَ السَّوْءِ", tr:"falâ tumțirnâ bihimâ mațara assaw’i", fr:"Par conséquent, ne verse pas sur nous une pluie,"},
        {t:'tri', ar:"وَلَاَ تُلْبِسْنَا بِهِمَا لِبَاسَ الْبَلاَءِ", tr:"wa lâ tulbisnâ bihima libâsa albalaii", fr:"et ne nous vêtis point avec l’habit d’affliction!"},
        {t:'tri', ar:"اَللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَنْزِلْ عَلَيْنَا نَفْعَ هَذِه السَّحَائِبِ وَبَرَكَتَهَا", tr:"wa anzil ‘alaynâ naf’a hâdhihi assahâ’ibi wa barakatahâ", fr:"Envoie pour nous les profits de ces nuages, et leurs bénédictions,"},
        {t:'tri', ar:"وَاصْرِفْ عَنَّا أَذَاهَا وَمَضَرَّتَهَا", tr:"waşrif ‘annâ adhâhâ wa madarratahâ", fr:"détourne de nous leurs maux et leurs nuisances,"},
        {t:'tri', ar:"وَلَاَ تُصِبْنَا فِيهَا بِآفَةٍ", tr:"wa lâ tuşibnâ fihâ bi-âfatin", fr:"ne nous frappe pas de malheur par ces pluies,"},
        {t:'tri', ar:"وَلَاَ تُرْسِلْ عَلَى مَعَايِشِنَا عَاهَةً", tr:"wa lâ tursil ‘alâ ma’âyichinâ ‘âhatan", fr:"et ne nous fais pas subir la pénurie dans notre subsistance!"},
        {t:'tri', ar:"اللَّهُمَّ وَإِنْ كُنْتَ بَعَثْتَهَا نَقِمَةً", tr:"allâhumma wa in kunta ba’athtahâ naqimatan", fr:"Ô Dieu! Si Tu les as envoyées comme punition,"},
        {t:'tri', ar:"وَأَرْسَلْتَهَا سَخْطَةً", tr:"wa arsaltahâ sakhtatan", fr:"et les as expédiées par colère,"},
        {t:'tri', ar:"فَإِنَّا نَسْتَجِيرُكَ مِنْ غَضَبِكَ", tr:"fa innâ nastajiruka min ghadabika", fr:"nous cherchons refuge en Toi de Ton Courroux,"},
        {t:'tri', ar:"وَتَبْتَهِلُ إِلَيْكَ فِي سُؤَالِ عَفْوِكَ", tr:"wa nabtahilu ilayka fi su’âli ‘afwika", fr:"et nous T’implorons en demandant pardon!"},
        {t:'tri', ar:"فَمِلْ بِالْغَضَبِ إِلَى الْمُشْرِكِينَ", tr:"famil bilghadabi ilâ almuchrikîna", fr:"par conséquent, dirige Ta Colère vers les idolâtres,"},
        {t:'tri', ar:"وَأَدِرْ رَحَى نَقِمَتِكَ عَلَى الْمُلْحِدِينَ", tr:"wa adir rahâ nagimatika ‘alâ almulhidîna", fr:"et fais marcher le moulin de Ta Vengeance de sorte qu’elle se tourne vers les hérétiques!"},
        {t:'tri', ar:"اَللَّهُمَّ أَذْهِبْ مَحْلَ بِلَادِنَا بِسُقْيَاكَ", tr:"allâhumma adhhib mahla bilâdinâ bisuqyâka", fr:"Ô Dieu! Remporte l’aridité de nos terres, avec Ton irrigation (pluie),"},
        {t:'tri', ar:"وَأَخْرِجْ وَحَرَ صُدُورِنَا بِرِزْقِكَ", tr:"wa akhrij wahara şudûrinâ birizqika", fr:"écarte la malice de nos coeurs par la provision que Tu nous offres,"},
        {t:'tri', ar:"وَلَا تَشْغَلْنَا عَنْكَ بِغَيْرِكَ", tr:"wa lâ tachghalnâ ‘anka bighayrika", fr:"ne nous distrais point de Ta Pensée par un autre que Toi,"},
        {t:'tri', ar:"وَلَا تَقْطَعْ عَنْ كَافَّتِنَا مَادَّةَ بِرِّكَ", tr:"wa lâ taqța’ ‘an kâffatinâ mâddata birrika", fr:"et ne nous éloigne pas de la source de Ta Bonté,"},
        {t:'tri', ar:"فَإِنَّ الْغَنِيَّ مَنْ أَغْنَيْتَ", tr:"fa inna alghaniyya man aghnayta", fr:"car en vérité, le riche est celui que Tu as enrichi,"},
        {t:'tri', ar:"وَإِنَّ السَّالِمَ مَنْ وَقَيْتَ", tr:"wa inna assâlima man waqayta", fr:"et le sain et sauf est celui que Tu as protégé!"},
        {t:'tri', ar:"مَا عِنْدَ أَحَدٍ دُونَكَ دِفَاعٌ", tr:"mâ ‘inda ahadin dûnaka difâ’ un", fr:"Personne n’a de défense contre Toi,"},
        {t:'tri', ar:"وَلَا بأَحَدٍ عَنْ سَطْوَتِكَ امْتِنَاعٌ", tr:"wa la bi-ahadin ‘an satwatika imtinâ’ un", fr:"ni aucun moyen de résister contre Ton Attaque!"},
        {t:'tri', ar:"تَحْكُمُ بِمَا شِئْتَ عَلَى مَنْ شِئْتَ", tr:"tahkumu bimâ chita ‘alâ man chi’ta", fr:"C’est Toi qui décides de ce que Tu accomplis pour celui que Tu veux,"},
        {t:'tri', ar:"وَتَقْضِي بِمَا أَرَدْتَ فِي مَنْ أَرَدْتَ", tr:"wa taqdi bimâ aradta fi man aradta", fr:"et c’est Toi qui décrètes ce que Tu désires pour celui que Tu désires!"},
        {t:'tri', ar:"فَلَكَ الْحَمْدُ عَلَى مَا وَقَيْتَنَا مِنَ الْبَلَاءِ", tr:"falaka alhamdu ‘alâ mâ waqaytanâ min albala’i", fr:"Ainsi à Toi appartient tout éloge pour nous avoir protégés de l’affliction,"},
        {t:'tri', ar:"وَلَكَ الشُّكْرُ عَلَى مَا خَوَّلْتَنَا مِنَ النَّعْمَاءِ", tr:"wa laka achchukru ‘alâ mâ khawwaltanâ min anna mấ’i", fr:"et à Toi appartient appréciation et remerciements pour nous avoir accordés des bénédictions,"},
        {t:'tri', ar:"حَمْداً يُخَلِّفُ حَمْدَ الْحَامِدِينَ وَرَائَهُ", tr:"hamdan yukhallifu hamda alhâmidîna warâ’ahu", fr:"un éloge qui fera devancer les éloges de ceux qui Te louent,"},
        {t:'tri', ar:"حَمْداً يَمْلأُ أَرْضَهُ وَسَمَاءَهُ", tr:"hamdan yamla’u ardahû wa samâ’ahu", fr:"un éloge qui remplira la terre et le ciel!"},
        {t:'tri', ar:"إِنَّكَ الْمَنَّانُ بِجَسِيمِ الْمِنَنِ", tr:"innaka almannânu bijasimi alminani", fr:"Tu es sûrement le plus Généreux de par Ton immense Bonté,"},
        {t:'tri', ar:"اَلْوَهَّابُ لِعَظِيمِ النِّعَمِ", tr:"alwahhâbu li azîmi anni’ ami", fr:"Tu es le Donateur des faveurs abondantes,"},
        {t:'tri', ar:"اَلْقَابِلُ يَسِيرَ الْحَمْدِ", tr:"alqâbilu yasîra alhamdi", fr:"Celui qui accepte les minces éloges,"},
        {t:'tri', ar:"الشَّاكِرُ قَلِيلَ الشُّكْرِ", tr:"achchâkiru qalîla achchukri", fr:"et Celui qui est Reconnaissant pour le peu de gratitude;"},
        {t:'tri', ar:"اَلْمُحْسِنُ الْمُجْمِلُ ذُو الطَّوْلِ", tr:"almuhsinu almujmilu dhû attawli", fr:"Le Bénéfique, Le Bénévole, Le Possesseur de la Grâce Divine!"},
        {t:'tri', ar:"لاَ إِلَهَ إِلاَّ أَنْتَ", tr:"lâ ilâha illâ anta", fr:"Il n’y aucun Dieu, mais Toi Seul!"},
        {t:'tri', ar:"إِلَيْكَ الْمَصِيرُ.", tr:"ilayka almaşiru", fr:"Le retour final est vers Toi!"},
        {t:'salawat'},
      ]
    },
    's37': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "37. Formuler des remerciements",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour formuler des remerciements envers Dieu",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا اعْترف بِالتَّقْصِيرِ عنْ تأدِيةِ الشُّكْرِ", tr:"", fr:"La trente septième supplication: au moment de confesser à ses négligences quand // rendait grâce à Dieu"},
        {t:'tri', ar:"اللَّهُمَّ إِنَّ أَحَداً لَا يَبْلُغُ مِنْ شُكْرِكَ غَايَةً", tr:"allâhumma inna ahadan la yablughu min chukrika ghâyatan", fr:"Ô Dieu! Personne ne peut atteindre une limite en Te rendant grâce,"},
        {t:'tri', ar:"إِلاَّ حَصَلَ عَلَيْهِ مِنْ إِحْسَانِكَ مَا يُلْزِمُهُ شُكْراً", tr:"illâ haşala ‘alayhi min ihsânika mâ yulzimuhû chukraka", fr:"sans en acquérir de nouveau de par Ta Bienfaisance; Ce qui l’oblige de nouveau à Te remercier et à Te rendre grâce,"},
        {t:'tri', ar:"وَلاَ يَبْلُغُ مَبْلَغاً مِنْ طَاعَتِكَ وَإِنِ اجْتَهَدَ", tr:"wa lâ yablughu mablaghan min tâ’ atika wa in ijtahada", fr:"de même, personne ne peut atteindre un degré [spécifique] en T’obéissant, même s’il s’efforce,"},
        {t:'tri', ar:"إِلَّا كَانَ مُقَصِّّراً دُونَ اسْتِحْقَاقِكَ بِفَضْلِكَ", tr:"illâ kâna muqaşșiran dûna istihqâqika bifadlika", fr:"sans pour autant manquer à son but, et ne pas arriver à ce qui est vraiment Ton Dû, et cela à cause de Ta Grâce!"},
        {t:'tri', ar:"فَأَشْكَرُ عِبَادِكَ عَاجِزٌ عَنْ شُكْرِكَ", tr:"fa achkaru ‘ibâdika ‘âjizun ‘an chukrika", fr:"Le plus reconnaissant de Tes serviteurs ne possède pas la capacité nécessaire pour Te remercier,"},
        {t:'tri', ar:"وَأَعْبَدُهُمْ لَك مقَصِّرٌ عَنْ طَاعَتِكَ", tr:"wa a baduhum laka mqaşsirun ‘an țâ’ atika", fr:"et le plus adorateur parmi eux, ne réussit pas à T’obéir comme il convient."},
        {t:'tri', ar:"لاَ يَجِبُ لأَحَدٍ مِنْهُم أَنْ تَغْفِرَ لَهُ بِاسْتِحْقَاقِهِ", tr:"lâ yajibu li-ahadin minhum an taghfira lahû bistihqâqihi", fr:"À aucun d’entre eux n’est dû Ton Absolution par ce qu’il mérite,"},
        {t:'tri', ar:"وَلَا يَحِقُّ لَهُ أَنْ تَرْضَى عَنْهُ بِاسْتِيجَابِهِ", tr:"wa lâ yahiqqu lahû an tardâ ‘anhû bistîjâbihi", fr:"ou bien Ta Satisfaction, pour son propre mérite."},
        {t:'tri', ar:"فَمَنْ غَفَرْتَ لَهُ فَبِطَوْلِكَ", tr:"faman ghafarta lahû fabițawlika", fr:"Quand Tu pardonnes quelqu’un, c’est à cause de Ta Bienveillance,"},
        {t:'tri', ar:"وَمَنْ رَضِيتَ عَنْهُ فَبِفَضْلِكَ", tr:"wa man radîta ‘anhû fabifadlika", fr:"et quand Tu es Content de quelqu’un, cela provient de Ta Grâce."},
        {t:'tri', ar:"تَشْكُرُ يَسِيرَ مَا شُكِرْتَهُ", tr:"tachkuru yasîra mâ chukirtahu", fr:"Tu montres Ta Gratitude aux misérables pour qui Tu as dévoilé Tà Reconnaissance,"},
        {t:'tri', ar:"وَتُثِيبُ عَلَى قَلِيلِ مَا تُطَاعُ فِيهِ", tr:"wa tuthîbu ‘alâ qalîli mâ tutâ u fihi", fr:"et Tu récompenses les plus minces actions par lesquelles Tu avais été obéi,"},
        {t:'tri', ar:"حَتَّى كَأَنَّ شُكْرَ عِبَادِكَ", tr:"hattâ ka’anna chukra ‘ibâdika", fr:"de sorte qu’il semble que les remerciements de Tes serviteurs,"},
        {t:'tri', ar:"اَلَّذِي أَوْجَبْتَ عَلَيْهِ ثَوَابَهُمْ", tr:"alladhi awjabta ‘alayhi thawâbahum", fr:"pour lesquels Tu as exigé"},
        {t:'tri', ar:"وَأَعْظَمْتَ عَنْهُ جَزَاءَهُمْ", tr:"wa a zamta ‘anhu jazâ’ahum", fr:"à Toi-même de les récompenser,"},
        {t:'tri', ar:"أَمْرٌ مَلَكُوا اسْتِطَاعَةَ الإمْتِنَاعِ مِنْهُ دُونَكَ فَكَافَأْتَهُمْ", tr:"amrun malakû istițâ ata alimtinâ i minhu dûnaka fakâfa’tahum", fr:"-et les as repayés grandiosement en effet!- soit une simple affaire qu’ils pensaient qu’ils pouvaient s’en passer et n’en rien faire. Ou bien le fait que Tu les as récompensés,"},
        {t:'tri', ar:"وَلَمْ يَكُنْ سَبَبُهُ بِيَدِكَ فَجَازَيْتَهُمْ", tr:"wa lam yakun sababuhû biyadika fajâzaytahum", fr:"soit une affaire dont la cause était hors de Ta Volonté, et par conséquent Tu les as repayés."},
        {t:'tri', ar:"بَلْ مَلَكْتَ يَا إِلَهِي أَمْرَهُمْ", tr:"bal malakta ya ilâhî amrahum", fr:"Mais que non, mon Bon Dieu! Tu avais plein Pouvoir sur leur affaire,"},
        {t:'tri', ar:"قَبْلَ أَنْ يَمْلِكُوا عِبَادَتَكَ", tr:"qabla an yamlikû ‘ibâdataka", fr:"avant même qu’ils puissent avoir le pouvoir de T’adorer,"},
        {t:'tri', ar:"وَأَعْدَدْتَ ثَوَابَهُمْ", tr:"wa a dadta thawâbahum", fr:"et Tu avais préparé leur récompense"},
        {t:'tri', ar:"قَبْلَ أَنْ يُفِيضُوا فِي طَاعَتِكَ", tr:"qabla an yufidû fi țâ ‘atika", fr:"vant même qu’ils lient commencée à obéir;"},
        {t:'tri', ar:"وَذَلِكَ أَنَّ سُنَّتَكَ الإِفْضَالُ", tr:"wa dhâlika anna sunnataka al-ifdâlu", fr:"Et cela, parce que Ta Manière se résume à accorder généreusement Ta Grâce."},
        {t:'tri', ar:"وَعَادَتَكَ الإِحْسَانُ", tr:"wa ‘âdataka al- ihsanu", fr:"Ta Méthode est le bienfait,"},
        {t:'tri', ar:"وَسَبِيلَكَ الْعَفْوُ", tr:"wa sabîlaka al’afwu", fr:"et Ta Voie est celle du pardon."},
        {t:'tri', ar:"فَكُلُّ الْبَرِيَّةِ مُعْتَرِفَةٌ بِأَنَّكَ غَيْرُ ظَالِمٍ لِمَنْ عَاقَبْتَ", tr:"fakullu albariyyati mu’tarifatun bi- annaka ghayru zâlimin liman ‘âqabta", fr:"Ainsi, Toutes les créatures confessent que Tu n’as jamais opprimé celui que Tu punis,"},
        {t:'tri', ar:"وَشَاهِدَةٌ بِأَنَّكَ مُتَفَضِّلٌ عَلَى مَنْ عَافَيْتَ", tr:"wa châhidatun bi- annaka mutafaddilun ‘alâ man ‘âfayta", fr:"et elles attestent que Tu accordes la Grâce à celui que Tu pardonnes."},
        {t:'tri', ar:"وَكُلُّ مُقِرُّ عَلَى نَفْسِهِ بِالتَّقْصِيرِ عَمَّا اسْتَوْجَبْتَ", tr:"wa kullun muqirrun ‘ alâ nafsihî bittaqsiri ‘ammâ istawjabta", fr:"et tous admettent qu’ils n’ont pas accompli leur devoir envers Toi, comme Tu le mérites."},
        {t:'tri', ar:"فَلَوْلاَ أَنَّ الشَّيْطَانَ يَخْتَدِعُهُمْ عَنْ طَاعَتِكَ", tr:"falawla anna achchaytâna yakhtadi uhum ‘an tâ’ atika", fr:"Si Satan ne les avait point méconduits de Ton obéissance,"},
        {t:'tri', ar:"مَا عَصَاكَ عَاصٍ", tr:"mâ ‘aşâka ‘âșin", fr:"aucun pécheur ne T’aurait désobéi,"},
        {t:'tri', ar:"وَلَوْلاَ أَنَّهُ يُصَوِّرُ لَهُمُ الْبَاطِلَ فِي مِثَالِ الْحَقِّ", tr:"wa lawlâ annahû yuşawwiru lahum albâțila fi mithâli alhaqqi", fr:"et s’il ne leur avait pas montré la fausseté, semblable à la vérité,"},
        {t:'tri', ar:"مَا ضَلَّ عَنْ طَرِيقِكَ ضَالٌّ", tr:"mâ dalla ‘an țarîqika dâllun", fr:"aucun égaré et désorienté ne se seraient déroutés de Ton Chemin!"},
        {t:'tri', ar:"فَسُبْحَانَكَ مَا أَبْيَنَ كَرَمَكَ فِي مُعَامَلَةٍ مَنْ أَطَاعَكَ أَوْ عَصَاكَ", tr:"fasubhânaka mâ abyana karamaka fi mu âmalati man ațâ ‘aka aw ‘aşâka", fr:"Ainsi, Gloire à Toi! Combien est manifestée Ta Générosité par rapport avec celui qui T’obéit ou bien Te désobéit!"},
        {t:'tri', ar:"تَشْكُرُ الْمُطِيعَ عَلَى مَا أَنْتَ تَوَلَّيْتَهُ لَهُ", tr:"tachkuru almuți’a ‘alâ mâ anta tawallaytahû lahu", fr:"Tu montres Ta Gratitude envers les obéissants et encore pour ce que Tu leur avais accordés,"},
        {t:'tri', ar:"وَتُمْلِي لِلْعَاصِي فِيمَا تَمْلِكُ مُعَاجَلَتَهُ فِيهِ", tr:"wa tumlî lil’âși fîmâ tamliku mu âjalatahû fîhi", fr:"et Tu ajournes pour un pécheur, ce que Tu peux précipiter."},
        {t:'tri', ar:"أَعْطَيْتَ كُلّاً مِنْهُمَا مَا لَا يَجِبُ لَهُ", tr:"a tayta kullan minhumâ mâ lâ yajibu lahu", fr:"Tu accordes à chacun d’entre eux ce qui n’est pas vraiment son dû,"},
        {t:'tri', ar:"وَتَفَضَّلْتَ عَلَى كُلٍّ مِنْهُمَا بِمَا يَقْصُرُ عَمَلُهُ عَنْهُ", tr:"wa tafaddalta ‘alâ kullin minhumâ bimâ yaqsuru ‘amaluhû ‘anhu", fr:"et Tu leur avais accordés Ta Grâce de sorte que même leurs actions sont impuissantes à se montrer méritoires!"},
        {t:'tri', ar:"وَلَوْ كَافَيْتَ الْمُطِيعَ عَلَى مَا أَنْتَ تَوَلَّيْتَهُ لَهُ", tr:"wa law kâfayta almuți a ‘alâ mâ anta tawallaytahû lahu", fr:"Et si Tu voulais contrebalancer ce que Tu avais Toi-même pris en charge pour Ton serviteur obéissant,"},
        {t:'tri', ar:"لأَوْشَكَ أَنْ يَفْقِدَ ثَوَابَكَ", tr:"la’awchaka an yafqida thawâbaka", fr:"il serait sur le point de perdre Ta Récompense,"},
        {t:'tri', ar:"وَأَنْ تَزُولَ عَنْهُ نِعْمَتُكَ", tr:"wa an tazûla ‘anhû ni’matuka", fr:"et voir disparaître Ta Faveur,"},
        {t:'tri', ar:"وَلكِنَّكَ بِكَرَمِكَ جَازَيْتَهُ", tr:"wa lâkinnaka bikaramika jâzaytahû", fr:"mais de par Ta Générosité, Tu l’as récompensé"},
        {t:'tri', ar:"عَلَى الْمُدَّةِ الْقَصِيرَةِ الْفَانِيَةِ", tr:"alâ almuddati alqaşîrati alfâniyati", fr:"dans un délai court et éphémère,"},
        {t:'tri', ar:"بِالْمُدَّةِ الطَّوِيلَةِ الْخَالِدَةِ", tr:"bilmuddati attawilati alkhâlidati", fr:"par une période longue et durable,"},
        {t:'tri', ar:"وَعَلَى الْغَايَةِ الْقَرِيبَةِ الزَّائِلَةِ", tr:"wa ‘alâ alghâyati alqarîbati azzâ’ilati", fr:"et pour une limite qui est de courte durée et sur le point de disparaître,"},
        {t:'tri', ar:"بِالْغَايَةِ الْمَدِيدَةِ الْبَاقِيَةِ", tr:"bilghâyati almadîdati albâqiyati", fr:"d’une durée illimitée."},
        {t:'tri', ar:"ثُمَّ لَمْ تَسُمْهُ الْقِصَاصَ فِيمَا أَكَلَ مِنْ رِزْقِكَ", tr:"thumma lam tasumhu alqișâșa fîmâ akala min rizqika", fr:"Ensuite Tu ne lui as pas imposé de Te rendre des comptes pour Ta Provision,"},
        {t:'tri', ar:"اَلَّذِي يَقْوَى بِهِ عَلَى طَاعَتِكَ", tr:"alladhî yaqwâ bihî ‘alâ țâ ‘ atika", fr:"par laquelle il s’est fortifié pour pouvoir obéir,"},
        {t:'tri', ar:"وَلَمْ تَحْمِلْهُ عَلَى الْمُنَاقَشَةِ فِي الآلَاَتِ", tr:"wa lam tahmilhu ‘alâ almunâqachati fil-âlâti", fr:"ni ne l’as forcé à Te rendre des comptes, pour les moyens"},
        {t:'tri', ar:"اَلَّتِي تَسَبَّبَ بِاسْتِعْمَالِهَا إِلَى مَغْفِرَتِكَ", tr:"allati tasabbaba bisti’mâlihâ ilâ maghfiratika", fr:"qu’il employa pour trouver le prétexte d’atteindre Ton Absolution!"},
        {t:'tri', ar:"وَلَوْ فَعَلْتَ ذَلِكَ بِهِ لَذَهَبَ جَمِيعُ مَا كَدَحَ لَهُ", tr:"wa law fa’alta dhâlika bihî ladhahaba jamî’u mâ kadaha lahu", fr:"Si Tu voulais agir ainsi, cela aurait repris tout ce qu’il s’était approprié en faisant la besogne,"},
        {t:'tri', ar:"وَجُمْلَةُ مَا سَعَى فِيهِ", tr:"wa jumlatu mâ sa â fîhi", fr:"et tout ce qu’il s’était procuré en s’épuisant outre mesure,"},
        {t:'tri', ar:"جَزَاءً لِلصُّغْرَى مِنْ أَيَادِيكَ ومِنَنِكَ", tr:"jazâ’an lişșughrâ min ayâdîka wa minanika", fr:"comme un paiement pour le plus insignifiant de Tes généreux Bienfaits et Faveurs,"},
        {t:'tri', ar:"وَلَبَقِيَ رَهِيناً بَيْنَ يَدَيْكَ بِسَائِرِ نِعَمِكَ", tr:"wa labaqiya rahînan bayna yadayka bisâ’iri ni’amika", fr:"et il serait resté Ton otage pour les autres faveurs que Tu lui avais accordé."},
        {t:'tri', ar:"فَمَتَى كَانَ يَستَحِقُّ شَيْئاً مِنْ ثَوَابِكَ؟ لاَ مَتَى؟!", tr:"famatâ kâna yastahiqqu chay’an min thawâbika lâ matâ", fr:"Par conséquent, comment pourrait-il mériter quoique ce soit de Ta Récompense? En vérité comment et quand?"},
        {t:'tri', ar:"هَذَا يَا إِلَهِي حَالُ مَنْ أَطَاعَكَ", tr:"hadha ya ilâni halu man ațâ ‘aka", fr:"Cela, mon Dieu, est la situation de celui qui T’obèit,"},
        {t:'tri', ar:"وَسَبِيلُ مَنْ تَعَبَّدَ لَكَ", tr:"wa sabilu man ta abbada laka", fr:"et la voie de celui qui adore et se soumet à Tes Ordres."},
        {t:'tri', ar:"فَأَمَّا الْعَاصِي أَمْرَكَ وَالْمُوَاقِعُ نَهْيَكَ", tr:"fa ammâ al’âși amraka walmuwâqi u nahyaka", fr:"Et en ce qui concerne celui qui désobéit à Tes Commandes, et se révolte contre Toi,"},
        {t:'tri', ar:"فَلَمْ تُعَاجِلْهُ بِنَقِمَتِكَ", tr:"falam tu âjilhu binaqimatika", fr:"Tu ne hâtes pas Ta Vengeance,"},
        {t:'tri', ar:"لِكَيْ يَسْتَبْدِلَ بِحَالِهِ فِي مَعْصِيَتِكَ", tr:"likay yastabdila bihâlihî fi ma’ şiyatika", fr:"de sorte qu’il puisse échanger son état de désobéissance envers Toi,"},
        {t:'tri', ar:"حَالَ الإِنَابَةِ إِلَى طَاعَتِكَ", tr:"hâla al-inâbati ilâ țâ’ atika", fr:"avec l’état de se tourner vers Toi, et se soumettre à Tes Ordres."},
        {t:'tri', ar:"وَلَقَدْ كَانَ يَسْتَحِقُّ يَا إِلَهِي فِي أَوَّلِ مَا هَمَّ بِعِصْيَانِكَ", tr:"wa laqad kâna yastahiqqu ya ilâhî fi awwali mâ hamma bi işyânika", fr:"Voilà en vérité: dès le moment où il commença à Te désobéir,"},
        {t:'tri', ar:"كُلَّ مَا أَعْدَدْتَ لِجَمِيعِ خَلْقِكَ مِنْ عُقُوبَتِكَ", tr:"kulla mâ a’dadta lijamî i khalqika min ‘uqûbatika", fr:"il méritait toutes les punitions que Tu avais prévues pour Tes créatures."},
        {t:'tri', ar:"فَجَمِيعُ مَا أَخَّرْتَ عَنْهُ مِنْ الْعَذَابِ", tr:"fajamî u mâ akhkharta ‘anhû min al’adhâbi", fr:"Tous les châtiments que Tu as retenus de lui,"},
        {t:'tri', ar:"وَأَبْطَأْتَ عَلَيْهِ مِنْ سَطَوَاتِ النِّقْمَةِ وَالعِقَابِ", tr:"wa abța’ta ‘alayhi min sațawâti anniqmati wal iqâbi", fr:"et chaque pénalité de Ta Vengeance et Ta Punition que Tu as retardées pour lui,"},
        {t:'tri', ar:"تَرْكٌ مِنْ حَقِّكَ", tr:"tarkun min haqqika", fr:"Tu as toujours renoncé à Ton Droit,"},
        {t:'tri', ar:"وَرِضًى بِدُونِ وَاجِبِكَ", tr:"wa ridan bidûni wâjibika", fr:"et Tu Tes contenté de délaisser ce qui était nécessaire pour Ta Part."},
        {t:'tri', ar:"فَمَنْ أَكْرَمُ يَا إِلَهِي مِنْكَ؟", tr:"faman akramu ya ilâhi minka", fr:"Ainsi, qui est plus Généreux que Toi Ô mon Dieu?"},
        {t:'tri', ar:"وَمَنْ أَشْقَى مِمَّنْ هَلَكَ عَلَيْكَ؟ لاَ مَنْ؟!", tr:"waman achqâ mimman halaka ‘alayka lâ man", fr:"Et qui est plus malheureux et affligé que celui qui périt malgré Toi? En vérité Qui?"},
        {t:'tri', ar:"فَتَبَارَكْتَ أَنْ تُوصَفَ إِلاَّ بِالإِحْسَانِ", tr:"fatabârakta an tûșafa illâ bil- ihsâni", fr:"Tu es par trop Béni pour être décrit par autre chose que Ton Bienfait,"},
        {t:'tri', ar:"وَكَرُمْتَ أَنْ يُخَافَ مِنْكَ إِلاَّ الْعَدْلُ", tr:"wa karumta an yukhâfa minka illâ al’adlu", fr:"et trop Généreux pour qu’on n’ait pas la crainte de Toi, sauf de Ta Justice."},
        {t:'tri', ar:"لاَ يُخْشَى جَوْرُكَ عَلَى مَنْ عَصَاكَ", tr:"la yukhcha jawruka ‘alâ man ‘aşâka", fr:"Il n’y a aucune crainte que Tu puisses être injuste envers celui qui Te désobéit,"},
        {t:'tri', ar:"وَلَاَ يُخَافُ إِغْفَالُكَ ثَوَابَ مَنْ أَرْضَاكَ", tr:"wa lâ yukhâfu ighfâluka thawâba man ardâka", fr:"ni la crainte de Ta négligence pour récompenser celui qui Te satisfait!"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis donc Mohammad et toute sa Famille,"},
        {t:'tri', ar:"وَهَبْ لِي مِنْكَ أَمَلِي", tr:"wa hab li minka amali", fr:"Accorde-moi mon souhait,"},
        {t:'tri', ar:"وَزِدْنِي مِنْ هُدَاكَ مَا أَصِلُ بِهِ إِلَى التَّوْفِيقِ فِي عَمَلِي", tr:"wa zidni min hudâka mâ aşilu bihî ilâ attawfiqi fi ‘amali", fr:"et augmente la Conduite guidée sur ma personne, par laquelle je pourrais réussir dans mes devoirs!"},
        {t:'tri', ar:"إِنَّكَ مَنَّانٌ كَرِيمٌ.", tr:"innaka mannânun karimun", fr:"Car Tu es sûrement le plus grand Bienfaiteur et le plus Généreux!"},
        {t:'salawat'},
      ]
    },
    's38': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "38. Demander le pardon",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation pour demander pardon pour ses fautes",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وَكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الإعْتِذارِ مِنْ تَبِعاتِ العِبادِ ومِن التَّقْصِيرِ فِي حُقُوقِهِمْ وفِي فكاكِ رقبتِهِ مِن النّارِ", tr:"", fr:"La trente huitiême supplication: en demandant pardon pour les méfaits commis contre les serviteurs de Dieu, et pour avoir négligé leurs droits, et pour demander la libération de son cou et de son corps, pour qu’ils soient épargnés du Feu"},
        {t:'tri', ar:"اللَّهُمَّ إِنِّي أَعْتَذِرُ إِلَيْكَ", tr:"allâhumma innî a’tadhiru ilayka", fr:"Ô Dieu! Je Te demande pardon,"},
        {t:'tri', ar:"مِنْ مَظْلُومٍ ظُلِمَ بِحَضْرَتِي فَلَمْ أَنْصُرْهُ", tr:"min mazlûmin zulima bihadrati falam anşurhu", fr:"si une personne était oppressée en ma présence, et que je n’ai point assistée (secourue)"},
        {t:'tri', ar:"وَمِنْ مَعْرُوفٍ أُسْدِيَ إِلَيَّ فَلَمْ أَشْكُرْهُ", tr:"wa min ma’rûfin usdiya ilayya falam achkurhu", fr:"et pour une faveur qui m’a été conférée, et que je n’ai point remercié,"},
        {t:'tri', ar:"وَمِنْ مُسِيءٍ اعْتَذَرَ إِلَيَّ فَلَمْ أَعْذِرْهُ", tr:"wa min musi in i’tadhara ilayya falam a dhirhu", fr:"et pour un malfaiteur qui me demanda pardon, et que je n’ai point pardonné,"},
        {t:'tri', ar:"وَمِنْ ذِي فَاقَةٍ سَأَلِنِي فَلَمْ أُؤْثِرْهُ", tr:"wa min dhi fâqatin sâlani falam u’thirhu", fr:"et d’un pauvre qui demanda mon aide, et dont je n’ai pas préféré la demande à la mienne,"},
        {t:'tri', ar:"وَمِنْ حَقِّ ذِي حَقٍّ لَزِمَنِي لِمُؤْمِنٍ فَلَمْ أُوَفِّرْهُ", tr:"wa min haqqi dhî haqqin lazimani limu’minin falam uwaffirhu", fr:"et du droit d’un croyant ayant eu droit sur moi, que je devais honorer et lui payer son dû,"},
        {t:'tri', ar:"وَمِنْ عَيْبِ مُؤْمِنٍ ظَهَرَ لِي فَلَمْ أَسْتُرْهُ", tr:"wa min ‘aybi mu’minin zahara lî falam asturhu", fr:"et dont j’ai failli de le rembourser complètement, et du défaut d’un croyant qui m’apparut et dont je n’ai point essayé de le cacher,"},
        {t:'tri', ar:"وَمِنْ كُلِّ إِثْمٍ عَرَضَ لِي فَلَمْ أَهْجُرْهُ", tr:"wa min kulli ithmin ‘arada lî falam ahjurhu", fr:"et de tous les péchés qui me sont arrivés, et dont j’ai n’ai point évité."},
        {t:'tri', ar:"أَعْتَذِرُ إِلَيْكَ يَا إِلَهِي مِنْهُنَّ وَمِنْ نَظَائِرِهِنَّ", tr:"a’tadhiru ilayka yâ ilâhî minhunna wa min nazâ’irihinna", fr:"Je demande pardon, mon Dieu, pour toutes ces choses et ce qui les ressemble,"},
        {t:'tri', ar:"اِعْتِذَارَ نَدَامَةٍ يَكُونُ وَاعِظاً لِمَا بَيْنَ يَدَيَّ مِنْ أَشْبَاهِهِنَّ", tr:"i’tidhâra nadâmatin yakûnu wâ izan limâ bayna yadayya min achbâhihinna", fr:"avec une demande de pardon plein de remords, qui peut agir comme un facteur réprimer, contre des choses similaires."},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"fașalli ‘alâ muhammadin wa âlihi", fr:"Bénis Mohammad et toute sa Famille,"},
        {t:'tri', ar:"وَاجْعَلْ نَدَامَتِي عَلَى مَا وَقَعْتُ فِيهِ مِنَ الزَّلَّاتِ", tr:"waj’al nadâmati ‘alâ mâ waqa’tu fihi min azzallâti", fr:"et fais-en sorte que mon repentir (remord) pour les négligences dans lesquelles j’y suis tombées,"},
        {t:'tri', ar:"وَعَزْمِي عَلَى تَرْكِ مَا يَعْرِضُ لِي مِنَ السَّيِّئَاتِ", tr:"wa ‘azmi ‘alâ tarki mâ ya ridu lî min assayyi’âti", fr:"et ma détermination à me retenir de commettre des mauvaises actions qui se mettent devant moi,"},
        {t:'tri', ar:"تَوْبَةً تُوجِبُ لِي مَحَبَّتَكَ", tr:"tawbatan tûjibu li mahabbataka", fr:"soient un repentir qui exigeraient Ta Pitié envers moi,"},
        {t:'tri', ar:"يَا مُحِبَّ التَّوَّابِينَ.", tr:"ya muhibba attawwâbina", fr:"Ô! Celui qui aime ceux qui se repentent!"},
        {t:'salawat'},
      ]
    },
    's39': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "39. Demande du Pardon",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation à la recherche du Pardon et de la Miséricorde",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي طلبِ الْعَفْوِ والرّحْمةِ", tr:"", fr:"La trente neuvième supplication: en demandant pardon et en suppliant pour la Grâce Divine"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allahumma șalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاكْسِرْ شَهْوَتِي عَنْ كُلِّ مُحَرَّمٍ", tr:"waksir chahwati ‘an kulli muharramin", fr:"Romps ma passion pour toute chose illégale,"},
        {t:'tri', ar:"وَازْوِ حِرْصِي عَنْ كُلِّ مَأْثَمٍ", tr:"wazwi hirşi ‘an kulli ma’thamin", fr:"éloigne ma cupidité (intérêt) envers n’importe quel péché,"},
        {t:'tri', ar:"وَامْنَعْنِي عَنْ أَذى كُلِّ مُؤْمِنٍ وَمُؤْمِنَةٍ", tr:"wamna’ni ‘an adha kulli mu’minin wa mu’minatin", fr:"et ne me laisse point tourmenter aucun croyant ou croyante,"},
        {t:'tri', ar:"وَمُسْلِمٍ وَمُسْلِمَةٍ", tr:"wa muslimin wa muslimatin", fr:"et aucun Musulman mâle ou femelle!"},
        {t:'tri', ar:"اَللَّهُمَّ وَأَيُّمَا عَبْدٍ نَالَ مِنِّي مَا حَظَرْتَ عَلَيْهِ", tr:"allâhumma wa ayyuma ‘abdin nâla minni mâ hazarta ‘alayhi", fr:"Ô Dieu! Si jamais un de Tes serviteurs a l’intention de me faire un méfait que Tu avais interdit,"},
        {t:'tri', ar:"وَانْتَهَكَ مِنِّي مَا حَجَرْتَ عَلَيْهِ", tr:"wantahaka minni mâ hajarta ‘alayhi", fr:"ou bien de me violer dans ce que Tu lui avais proscrit,"},
        {t:'tri', ar:"فَمضَى بِظُلامَتِي مَيِّتاً", tr:"famdâ bizulâmatî mayyitan", fr:"et qu’il lui arrive de mourir, tout en portant encore ma complainte,"},
        {t:'tri', ar:"أَوْ حَصَلَتْ لِي قِبَلَهُ حَيَّا", tr:"aw haşalat li qibalahû hayyan", fr:"ou bien qu’il m’arrive d’avoir une complainte contre lui, pendant qu’il est encore en vie,"},
        {t:'tri', ar:"فَاغْفِرْ لَهُ مَا أَلَمَّ بِهِ مِنِّي", tr:"faghfir lahû mâ alamma bihi minni", fr:"je Te prie de pardonner ce qu’il me fit,"},
        {t:'tri', ar:"وَاعْفُ لَهُ عَمَّا أَدْبَرَ بِهِ عَنِّي", tr:"wa’fu lahû ‘ammâ adbara bihî ‘annî", fr:"et de même, pardonner ce pour quoi il s’était détourné de ma personne!"},
        {t:'tri', ar:"وَلَا تَقِفْهُ عَلَى مَا ارْتكَبَ فِيَّ", tr:"wa lâ taqifhû ‘alâ martkaba fiyya", fr:"De Grâce! Ne l’avertis pas (ne lui reproche rien) de ce qu’il avait commis contre moi,"},
        {t:'tri', ar:"وَلَاَ تَكْشِفْهُ عَمَّا اكْتَسَبَ بِي", tr:"wa lâ takchifhû ‘ammâ iktasaba bî", fr:"et ne dévoile pas ce qu’il avait commis contre moi, et ne le déshonore pas!"},
        {t:'tri', ar:"وَاجْعَلَ مَا سَمَحْتُ بِهِ مِنَ الْعَفْوِ عَنْهُمْ", tr:"waj’al mâ samahtu bihî min al’afwi ‘anhum", fr:"Fais-en sorte que le pardon et l’abnégation"},
        {t:'tri', ar:"وَتَبَرَّعْتُ بِهِ مِنَ الصَّدَقَةِ عَلَيْهِمْ", tr:"wa tabarra tu bihî min aşşadaqati ‘alayhim", fr:"et la contribution charitable que j’ai accordés"},
        {t:'tri', ar:"أَزْكَى صَدَقَاتِ الْمُتَصَدِّقِينَ", tr:"azkâ șadaqâti almutaşaddiqina", fr:"(faits dons) envers eux, deviennent la plus pure aumône des donateurs charitables,"},
        {t:'tri', ar:"وَأَعَلَى صِلَاَتِ الْمُتَقَرِّبِينَ", tr:"wa a’lâ șilâti almutaqarribina", fr:"et la plus haute parmi les offrandes de ceux qui aspirent à être admis auprès de Toi!"},
        {t:'tri', ar:"وَعَوِّضْنِي مِنْ عَفْوِي عَنْهُمْ عَفْوَكَ", tr:"wa ‘awwidni min ‘afwi ‘anhum ‘ afwaka", fr:"Récompense-moi pour les avoir pardonnés, avec le don de Ton Pardon,"},
        {t:'tri', ar:"وَمِنْ دُعَائِي لَهُمْ رَحْمَتَكَ", tr:"wa min du’â’î lahum rahmataka", fr:"avec Ta Miséricorde, et pour mes voeux d’absolution pour eux,"},
        {t:'tri', ar:"حَتَّى يَسْعَدَ كُلُّ وَاحِدٍ مِنَّا فَضْلِكَ", tr:"hattâ yas’ada kullu wâhidin minnâ bifadlika", fr:"de sorte que chacun d’entre nous obtienne la félicité de par Ta Grâce!"},
        {t:'tri', ar:"وَيَنْجُوَ كُلٌّ مِنَّا بِمَنِّكَ", tr:"wa yanjuwa kullun minnâ bimannika", fr:"Et chacun de nous soit sauvé de par Ta Générosité!"},
        {t:'tri', ar:"اَللَّهُمَّ وَأَيُّمَا عَبْدٍ مِنْ عَبِيدِكَ", tr:"allâhumma wa ayyumâ ‘abdin min ‘abîdika", fr:"Ô Dieu! S’il existe parmi Tes serviteurs"},
        {t:'tri', ar:"أَدْرَكَهُ مِنِّي دَرَكٌ", tr:"adrakahû minnî darakun", fr:"quelqu’un qui soit atteint d’un malheur pour mon compte,"},
        {t:'tri', ar:"أَوْ مَسَّهُ مِنْ نَاحِيَتِي أَذًى", tr:"aw massahû min nâhiyati adhan", fr:"ou qu’un mal l’ait touché de ma part,"},
        {t:'tri', ar:"أَوْ لَحِقَهُ بِي أَوْ بِسَبَبِي ظُلْمٌ", tr:"aw lahiqahû bi aw bisababi zulmun", fr:"ou bien une cruauté lui ait été atteinte par moi ou à cause de moi,"},
        {t:'tri', ar:"فَفُتُّهُ بِحَقِّهِ", tr:"fafuttuhû bihaqqihi", fr:"et si jamais j’aie agi à son détriment,"},
        {t:'tri', ar:"أَوْ سَبَقْتُهُ بِمَظْلَمَتِهِ", tr:"aw sabaqtuhû bimazlamatihi", fr:"et que je lui devance sur la mort avec le fardeau de cette cruauté,"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَأَرْضِهِ عَنِّي مِنْ وجْدِكَ", tr:"wa ardihî ‘anni min wujdika", fr:"Satisfais ladite personne envers moi, de par Ta Richesse,"},
        {t:'tri', ar:"وَأَوْفِهِ حَقَّهُ مِنْ عِنْدِكَ", tr:"wa awfihi haqqahû min ‘indika", fr:"et comble-le de tout son droit de Ta Part!"},
        {t:'tri', ar:"ثُمَّ قِنِي مَا يُوجِبُ لَهُ حُكْمُكَ", tr:"thumma qinî mâ yüjibu lahû hukmuka", fr:"Ensuite protège-moi de ce que Ta décision finale exige,"},
        {t:'tri', ar:"وَخَلِّصْنِي مِمَّا يَحكُمُ بِهِ عَدْلُكَ", tr:"wa khallişni mimmâ yahkumu bihî ‘adluka", fr:"et sauve-moi de ce que Ta Justice décide,"},
        {t:'tri', ar:"فَإِنَّ قُوَّتِي لاَ تَسْتَقِلُّ بِنَقِمَتِكَ", tr:"fa inna quwwati lâ tastaqillu binaqimatika", fr:"car ma force ne pourrait jamais supporter Ta Vengeance,"},
        {t:'tri', ar:"وَإِنَّ طَاقَتِي لاَ تَنْهَضَ بِسُخْطِكَ", tr:"wa inna tâqati lâ tanhadu bisukhțika", fr:"et mon pouvoir ne pourrait se redresser à Ta Colère!"},
        {t:'tri', ar:"فَإِنَّكَ إِنْ تُكَافِنِي بِالْحَقِّ تُهْلِكْنِي", tr:"fa innaka in tukâfini bilhaqqi tuhlikni", fr:"Si Tu me récompenses pour ce que je lui dois, Tu me détruiras certainement,"},
        {t:'tri', ar:"وَإِلاّ تَغَمَّدْنِي بِرَحْمَتِكَ تُوبِقْنِي", tr:"wa illa taghammadni birahmatika tûbiqni", fr:"et si Tu ne m’abrites point dans Ta Miséricorde, Tu m’anéantiras sûrement."},
        {t:'tri', ar:"اَللَّهُمَّ إِنِّي أَسْتَوْهِبُكَ يَا إِلَهِي مَا لَاَ يَنْقُصُكَ بَذْلُهُ", tr:"allâhumma inni astawhibuka ya ilâhi mâ là yanquşuka badhluhu", fr:"Ô Dieu! Je Te demande de m’accorder ce qu’en m’accordant, ne réduira rien de Toi,"},
        {t:'tri', ar:"وَأَسْتَحْمِلُكَ مَا لا يَبْهَظُكَ حَمْلُهُ", tr:"wa astahmiluka mâ lâ yabhazuka hamluhu", fr:"et je Te prie de porter un fardeau qui ne Te fatiguera point!"},
        {t:'tri', ar:"أَسْتَوْهِبُكَ يَا إِلَهِي نَفْسِيَ", tr:"astawhibuka ya ilâhi nafsi", fr:"Mon Dieu! Je Te demande d’accorder le Pardon à mon âme,"},
        {t:'tri', ar:"اَلَّتِي لَمْ تَخْلُقْهَا لِتَمْتَنِعَ بِهَا مِنْ سُوءٍ", tr:"allati lam takhluqhâ litamtani a bihâ min sû’in", fr:"(ce que Tu n’avais pas crée pour Te préserver d’un mal quelconque,"},
        {t:'tri', ar:"أَوْ لِتَطَرَّقَ بِهَا إِلَى نَفْعٍ", tr:"aw litațarraqa bihâ ilâ naf’ in", fr:"ni même pour obtenir un profit, que non!)"},
        {t:'tri', ar:"وَلكِنْ أَنْشَأْتَهَا إِثْبَاتًا لِقُدْرَتِكَ عَلَى مِثْلِهَا", tr:"wa lâkin ancha’tahâ ithbâtan liqudratika ‘alâ mithlihâ", fr:"En fait, Tu l’avais créée pour démontrer Ton Pouvoir de création sur ces choses,"},
        {t:'tri', ar:"وَاحْتِجَاجاً بِهَا عَلَى شَكْلِهَا", tr:"wahtijâjan bihâ ‘alâ chaklihâ", fr:"et de produire une preuve pour les autres comme elles."},
        {t:'tri', ar:"وَأَسْتَحْمِلُكَ مِنْ ذُنُوبِي مَا قَدْ بَهَظَنِي حَمْلُهُ", tr:"wa astahmiluka min dhunûbi mâ qad bahazani hamluhu", fr:"Je Te demande de porter mes péchés dont le poids m’a essoufflé et courbé,"},
        {t:'tri', ar:"وَأَسْتَعِينُ بكَ عَلَى مَا قَدْ فَدَحَنِي ثِقْلُهُ", tr:"wa asta ‘înu bika ‘alâ mâ qad fadahani thiqluhu", fr:"et je Te demande aide et secours, pour ce dont le fardeau m’oppresse en vérité."},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis Mohammad et toute sa Famille,"},
        {t:'tri', ar:"وَهَبْ لِنَفْسِي عَلَى ظُلْمِهَا نَفْسِي", tr:"wa hab linafsi ‘alâ zulmihâ nafsî", fr:"et rends-moi mon âme, et pardonne-la de la cruauté qu’elle a infligée,"},
        {t:'tri', ar:"وَوَكِّلْ رَحْمَتَكَ بِاحْتِمَالِ إِصْرِي", tr:"wa wakkil rahmataka bihtimâli işrî", fr:"et accorde Ta Miséricorde, pour prendre en charge mon fardeau!"},
        {t:'tri', ar:"فَكَمْ قَدْ لَحِقَتْ رَحْمَتُكَ بِالْمُسِيئِينَ", tr:"fakam qad lahiqat rahmatuka bilmusi’ina", fr:"Combien de malfaiteurs qui ont reçu Ta Grâce indulgente!"},
        {t:'tri', ar:"وَكَمْ قَدْ شَمِلَ عَفْوُكَ الظَّالِمِينَ", tr:"wa kam qad chamila ‘afwuka azzâlimîna", fr:"Combien de pervers qui ont été enveloppés par Ton Pardon!"},
        {t:'tri', ar:"فَصَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"faşalli ‘alâ muhammadin wa âlihi", fr:"Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاجْعَلْنِي أُسْوَةَ مَنْ أَنْهَضْتَهُ", tr:"waj’ alni uswata man anhadtahû", fr:"Désigne-moi comme un fidèle exemple de ceux"},
        {t:'tri', ar:"بِتَجَاوزِكَ عَنْ مَصَارِعِ الْخَاطِئِينَ", tr:"bitajâwuzika ‘an maşâri i alkhâți’îna", fr:"que Tu avais relevés de par Ta Patience"},
        {t:'tri', ar:"وَخَلَّصْتَهُ بتَوفِيقِكَ مِنْ وَرَطَاتِ الْمُجْرِمِينَ", tr:"wa khallaştahû bitawfiqika min warațâti almujrimina", fr:"et Ton Indulgence, des infirmités mortelles des offenseurs,"},
        {t:'tri', ar:"فَأَصْبَحَ طَلِيقَ عَفْوِكَ منْ إِسَارِ سُخْطِكَ", tr:"fa aşbaha țaliqa ‘afwika min isâri sukhțika", fr:"et sauvés de par Ton Secours triomphal,"},
        {t:'tri', ar:"وَعَتِيقَ صُنْعِكَ مِنْ وَثَاقِ عَدْلِكَ", tr:"wa ‘atiqa șun’ ika min wathagi ‘adlika", fr:"de la triste situation des pécheurs!"},
        {t:'tri', ar:"إِنَّكَ إِنْ تَفْعَلْ ذَلِكَ يَا إِلَهِي", tr:"innaka in taf’al dhâlika ya ilâhî", fr:"En vérité si Tu fais cela mon Dieu, Tu feras cela pour quelqu’un"},
        {t:'tri', ar:"تَفْعَلْهُ بِمَنْ لاَ يَجْحَدُ اسْتِحْقَاقَ عُقُوبَتِكَ", tr:"taf’alhû biman lâ yajhadu istihqâqa ‘ uqûbatika", fr:"qui ne nie point qu’il mérite en vérité Ta Punition,"},
        {t:'tri', ar:"وَلَا يُبَرِّئُ نَفْسَهُ مِنْ اسْتِيجَابِ نَقِمَتِكَ", tr:"wa lâ yubarri’u nafsahû min istîjâbi naqimatika", fr:"et ne veut pas s’acquitter du droit de Ta Vengeance."},
        {t:'tri', ar:"تَفْعَلُ ذَلِكَ يَا إِلَهِي", tr:"taf alu dhâlika yâ ilâhi", fr:"De Grâce! fais cela pour quelqu’un,"},
        {t:'tri', ar:"بمَنْ خَوْفُهُ مِنْكَ أَكْثَرُ مِنْ طَمَعِهِ فِيكَ", tr:"biman khawfuhû minka aktharu min țama’ ihi fika", fr:"dont la terreur qu’il éprouve pour Toi,"},
        {t:'tri', ar:"وَبِمَنْ يَأْسُهُ مِنَ النَّجَاةِ أَوْكَدُ مِنْ رَجَائِهِ لِلْخَلاَصِ", tr:"wa biman ya’suhû min annajâti awkadu min rajâ’ihî lilkhalâși", fr:"est bien plus grande que son désir intense de Toi, et dont le désespoir qu’il éprouve pour sa délivrance, est bien plus ferme que son espoir de Salut!"},
        {t:'tri', ar:"لاَ أَنْ يَكُونَ يَأْسُهُ قُنُوطاً", tr:"lâ an yakûna ya’suhû qunûțan", fr:"Non pas que son abattement soit désespoir,"},
        {t:'tri', ar:"أَوْ أَنْ يَكُونَ طَمَعُهُ اغْتِرَاراً", tr:"aw an yakûna țama uhû ightirâran", fr:"ni que son expectation soit illusoire et trompeuse"},
        {t:'tri', ar:"بَلْ لِقِلَّةِ حَسَنَاتِهِ بَيْنَ سَيِّئَاتِهِ", tr:"bal liqillati hasanâtihî bayna sayyi’âtihi", fr:"Non! En fait c’est plutôt à cause du peu de ses bonnes actions,"},
        {t:'tri', ar:"وَضَعْفِ حُجَجِهِ فِي جَمِيعِ تَبِعَاتِهِ", tr:"wa da fi hujajihi fi jamî i tabi âtihi", fr:"et ses arguments sont frêles et fragiles envers ses responsabllités."},
        {t:'tri', ar:"فَأَمَّا أَنْتَ يَا إِلَهِي فَأَهْلٌ أَنْ لاَ يَغْتَرَّ بِكَ الصِّدِّيقُونَ", tr:"fa ammâ anta ya ilâhi fa ahlun an la yaghtarra bika aşşiddîqûna", fr:"Mais Toi! Ô mon Dieu! Tu mérites que les vertueux ne se trompent point en ce qui Te concerne,"},
        {t:'tri', ar:"وَلاَ يَيْأَسَ مِنْكَ الْمُجْرِمُونَ", tr:"wa lâ yay’asa minka almujrimûna", fr:"et les pécheurs ne perdent pas leur espoir en Toi,"},
        {t:'tri', ar:"لأَنَّكَ الرَّبُّ الْعَظِيمُ", tr:"li-annaka arrabbu al’azîmu", fr:"car Tu es en vérité le Seigneur Tout-Puissant"},
        {t:'tri', ar:"اَلَّذِي لاَ يَمْنَعُ أَحَداً فَضْلَهُ", tr:"alladhi lâ yamna’u ahadan fadlahu", fr:"qui ne refuse jamais Sa Grâce à quelqu’un,"},
        {t:'tri', ar:"وَلَا يَسْتَقْصِي مِنْ أَحَدٍ حَقَّهُ", tr:"wa la yastaqşi min ahadin haqqahu", fr:"et n’exige jamais Son Plein Droit de personne"},
        {t:'tri', ar:"تَعَالَى ذِكْرُكَ عَنِ الْمَذْكُورِينَ", tr:"ta ‘âlâ dhikruka ‘an almadhkûrîna", fr:"Ton Nom est plus Glorieux de tous les noms!"},
        {t:'tri', ar:"وَتَقَدَّسَتْ أَسْمَاؤُكَ عَنِ الْمَنْسُوبِينَ", tr:"wa taqaddasat asmâ’uka ‘an almansûbina", fr:"Tes Noms sont bien plus Sacrosaintes pour que d’autres puissent se l’attribuer!"},
        {t:'tri', ar:"وَفَشَتْ نِعْمَتُكَ فِي جَمِيعِ الْمَخْلوقِينَ", tr:"wa fachat étendue parmi toutes ni’ matuka fi jamî i almakhlûqîna", fr:"Ta Faveur est bien les créatures!"},
        {t:'tri', ar:"فَلَكَ الْحَمْدُ عَلَى ذَلِكَ يَا رَبَّ الْعَالَمِينَ.", tr:"falaka alhamdu ‘alâ dhâlika yâ rabba al ‘âlamîna", fr:"Louange à Toi, pour tout cela, Seigneur des mondes!"},
        {t:'salawat'},
      ]
    },
    's40': {
      source: "As-Ṣaḥīfa as-Sajjādiyya",
      title: "40. Lorsque la mort survient",
      subtitle: "As-Ṣaḥīfa as-Sajjādiyya — Invocation lorsque la mort est venue ou lors de la mention de la mort",
      body: [
        {t:'salawat'},
        {t:'tri', ar:"وَكَان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا نُعِي إِليْهِ ميِّتٌ أوْ ذكر الْموْت", tr:"", fr:"La quarantiême supplication: quand la mort de quelqu’un lui était annoncée, ou bien quand Il se souvenait de la mort"},
        {t:'tri', ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ", tr:"allâhumma şalli ‘alâ muhammadin wa âlihi", fr:"Ô Dieu! Bénis Mohammad et toute sa Famille!"},
        {t:'tri', ar:"وَاكْفِنَا طُولَ الأَمَلِ", tr:"wakfinâ țûla al-amali", fr:"Épargne-nous des longues expectations,"},
        {t:'tri', ar:"وَقَصِّّرْهُ عَنَّا بِصِدْقِ الْعَمَلِ", tr:"wa qaşsirhu ‘annâ bișidqi al’amali", fr:"et raccourcis-les dans nos cœurs, par des travaux et des actions sincères,"},
        {t:'tri', ar:"حَتَّى لاَ نُؤَمِّلَ اسْتِتْمَامَ سَاعَةٍ بَعْدَ سَاعَةٍ", tr:"hattâ lâ nu’ammila istitmâma sâ ‘atin ba’da sâ’atin", fr:"de sorte que nous ayons à souhaiter achever heure après l’heure,"},
        {t:'tri', ar:"وَلَاَ اسْتِيفَاءَ يَوْمٍ بَعْدَ يَوْمٍ", tr:"wa lâ istifâ’a yawmin ba da yawmin", fr:"jour après jour,"},
        {t:'tri', ar:"وَلَاَ اتِّصَالَ نَفَسٍ بِنَفَسٍ", tr:"wa lâ ittișâla nafasin binafasin", fr:"et joindre souffle après souffle,"},
        {t:'tri', ar:"وَلاَ لُحُوقَ قَدَمٍ بِقَدَمِ", tr:"wa lâ luhûqa qadamin biqadamin", fr:"et pas après pas."},
        {t:'tri', ar:"وَسَلَّمْنَا مِنْ غُرُورِهِ", tr:"wa sallimnâ min ghurûrihi", fr:"Préserve-nous de la tromperie des souhaits"},
        {t:'tri', ar:"وَآمِنَّا مِنْ شُرُورِهِ", tr:"wa âminnâ min churûrihi", fr:"Sauvegarde-nous de leur méchanceté,"},
        {t:'tri', ar:"وَانْصِبِ الْمَوْتَ بَيْنَ أَيْدِينَا نَصْباً", tr:"wanşib almawta bayna aydînâ naşban", fr:"et visualise la mort devant nos yeux,"},
        {t:'tri', ar:"وَلَا تَجْعَلْ ذِكْرَنَا لَهُ غِبّاً", tr:"wa lâ taj’al dhikranâ lahû ghibban", fr:"et ne nous la rappelle point parfois,"},
        {t:'tri', ar:"وَاجْعَلْ لَنَا مِنْ صَالِحِ الْأَعْمَالِ عَمَلاً", tr:"waj’al lanâ min şâlihi al-a’mâli amalan", fr:"mais toujours parmi les bonnes actions,"},
        {t:'tri', ar:"تُسْتَبْطِئُ مَعَهُ الْمَصِيرَ إِلَيْكَ", tr:"nastabțl’u ma’ahu almaşira ilayka", fr:"Désigne-nous une bonne action par laquelle nous sentirons notre retour vers Toi très lent,"},
        {t:'tri', ar:"وَنَحْرِصُ لَهُ عَلَى وَشْكِ اللَّحَاقِ بِكَ", tr:"wa nahrișu lahû ‘alâ wachki allahâqi bika", fr:"et désirerons une rapide rencontre avec Toi,"},
        {t:'tri', ar:"حَتَّى يَكُونَ الْمَوْتُ مَأْنَسَنَا الَّذِي نَأْنَسُ بِهِ", tr:"hattâ yakûna almawtu ma’nasanâ alladhî na’nasu bihi", fr:"de sorte que la mort nous semblera comme une accoutumance dans laquelle nous nous sentirons à l’aise."},
        {t:'tri', ar:"وَمَألَفَنَا الَّذِي نَشْتَاقُ إِلَيْهِ", tr:"na ma laran. ilayhi", fr:"comme un lieu familier vers lequel notre intense désir nous y entraîne,"},
        {t:'tri', ar:"وَحَامَّتَنَا الَّتِي تُحِبُّ الدُّنُوَّ مِنْهَا", tr:"wa hâmmatanâ allatî nuhibbu addunuwwa minhâ", fr:"et comme un parent familier et intime, et dont nous aimons le voisinage"},
        {t:'tri', ar:"فَإِذَا أَوْرَدْتَهُ عَلَيْنَا وَأَنْزَلْتَهُ بِنَا", tr:"fa idhâ awradtahû ‘alaynâ wa anzaltahû binâ", fr:"Quand Tu l’auras amenée [la mort] vers nous, et l’auras faite descendre sur nous,"},
        {t:'tri', ar:"فَأَسْعِدْنَا بِهِ زَائِراً", tr:"fa as’idnâ bihî zâ’iran", fr:"Rends-nous heureux,"},
        {t:'tri', ar:"وَآنِسْنَا بِهِ قَادِماً", tr:"wa ânisnâ bihî qâdiman", fr:"et conforte-nous de son arrivée,"},
