        {t:'tri', ar:'لَكَ الْحَمْدُ أَنْ بَعَثْتَنِى مِنْ مَرْقَدِى وَلَوْ شِئْتَ جَعَلْتَهُ سَرْمَداً مْداً دائِماً لَايَنْقِطعُ أَبَداً، وَلَا يُحْصِى لَهُ الْخَلائِقُ عَدَداً', tr:'Laka al-hamdu an ba’athtanî min marqadî wa law shi’ta ja‘altahu sarmadann hamdann dâ’ imann lâ yanqati ‘ u abadann wa lâ yuhsî lahu-lkhalâ’iqu ‘adadann', fr:"À Toi appartient La Louange ! Tu m'as tiré de mon sommeil, si Tu l'avais désiré Tu l'aurais fait éternel ; une Louange continuelle et à jamais ininterrompue, dont les créatures ne peuvent en faire le compte !"},
        {t:'tri', ar:'اللّٰهُمَّ لَكَ الْحَمْدُ أَنْ خَلَقْتَ فَسَوَّيْتَ، وَقَدَّرْتَ وَقَضَيْتَ، وَ أَمَتَّ وَ أَحْيَيْتَ وَأَمْرَضْتَ وَشَفَيْتَ، وَعافَيْتَ وَ أَبْلَيْتَ، وَعَلَى الْعَرْشِ اسْتَوَيْتَ، وَعَلَى الْمُلْكِ احْتَوَيْتَ', tr:'Allâhumma laka-l-hamdu an khalaqta fa-sawwayta, wa qaddarta wa qadayta, wa amatta wa ahyayta wa amradta wa shafayta, wa ‘âfayta wa ablayta, wa ‘alâ-l-‘arshi-stawayta wa ‘alâ-l-mulki ahtawayta', fr:"Ô mon Dieu ! À Toi appartient La Louange ! Tu as créé ; Tu as formé harmonieusement ; Tu as ordonné ; Tu as décrété ; Tu as donné la mort ; Tu as donné la vie ; Tu as donné la maladie ; Tu as donné la guérison ; Tu as donné l'aisance ; Tu as donné l'affliction ; Tu T'es assis sur le Trône et Tu détiens La Souveraineté !"},
        {t:'tri', ar:'أَدْعُوكَ دُعَاءَ مَنْ ضَعُفَتْ وَسِيلَتُهُ، وَانْقَطَعَتْ حِيلَتُهُ، وَاقْتَرَبَ أَجَلُهُ وَتَدَانَىٰ فِى الدُّنْيَا أَمَلُهُ، واشْتَدَّتْ إِلَىٰ رَحْمَتِكَ فاقَتُهُ، وَعَظُمَتْ لِتَفْرِيطِهِ حَسْرَتُهُ وَكَثُرَتْ زَلَّتُهُ وَعَثْرَتُهُ، وَخَلُصَتْ لِوَجْهِكَ تَوْبَتُهُ', tr:'Ad’ûka du‘â’a man da‘ufat wasîlatuhu, wa-nqata‘at hîlatuhu, waqtaraba ajaluhu wa tadânâ fî-d-dunyâ amaluhu wa-shtaddat ilâ rahmatika fâqatuhu, wa ‘azhumat li-tafrîtihi hasratuhu wa kathurat zallatuhu wa ‘athratuhu wa khalusat li-wajhika tawbatuhu', fr:"Je T'implore de l'imploration de celui dont le moyen s'est affaibli ; dont le prétexte est épuisé ; dont la fin est proche ; dont l'espérance en cette vie immédiate s'est dissipée ; dont le besoin en Ta Miséricorde s'est amplifié ; dont le remords s'est accentué à cause de son insouciance ; dont les déviations et les faux pas sont nombreux ; dont le repentir est sincèrement dédié à Ta Face."},
        {t:'tri', ar:'فَصَلِّ عَلَىٰ مُحَمَّدٍ خاتَمِ النَّبِيِّينَ، وَعَلَىٰ أَهْلِ بَيْتِهِ الطَّيِّبِينَ الطَّاهِرِينَ وَارْزُقْنِى شَفاعَةَ مُحَمَّدٍ صَلَّى اللّٰهُ عَلَيْهِ وَآلِهِ، وَلَا تَحْرِمْنِى صُحْبَتَهُ إِنَّكَ أَنْتَ أَرْحَمُ الرَّاحِمِينَ', tr:'Fa-salli ‘alâ Muhammadinn khâtami-n-nabiyyîna, wa ‘alâ ahli baytihi at-tayyibîna, at-tâhirîna wa-rzuqnî shafa‘ata Muhammadinn sallâ-llâhu ‘alayhi wa âlihi, wa lâ tahrimnî suhbatahu innaka anta arhamu-r-râhimîna', fr:"Aussi, bénis Mohammed, le Sceau des Prophètes, ainsi que les Gens de sa Famille, les Excellents, les Purs ; accorde-moi l'Intercession de Mohammed ; que Dieu le bénisse ainsi que les Gens de sa Famille, ne me prive pas de sa compagnie ! En vérité, Tu es Le Plus Miséricordieux de ceux qui font miséricorde !"},
        {t:'tri', ar:'اللّٰهُمَّ اقْضِ لِى فِى الْأَرْبَعاءِ أَرْبَعاً: اجْعَلْ قُوَّتِى فِى طَاعَتِكَ، وَنَشَاطِى فِى عِبَادَتِكَ وَرَغْبَتِى فِى ثَوَابِكَ، وَزُهْدِى فِيَما يُوجِبُ لِى أَلِيمَ عِقَابِكَ إِنَّكَ لَطِيفٌ لِمَا تَشَاءُ', tr:'Allâhumma-qdi lî fî-l-arbi‘â’i arba’ann : aj‘al quwwatî fî tâ’atika, wâ nashâtî fî ‘ibâdatika wa raghbatî fî thawâbika, wa zuhdî fîmâ yûjibu lî alîma ‘iqâbika innaka latîfunn limâ tashâ’u', fr:"Ô mon Dieu ! Décrète en ma faveur, en ce quatrième jour de la semaine, quatre choses : fasse que ma force soit employée à l'obéissance envers Toi ; fasse que mon ardeur soit occupée à T'adorer ; fasse que mon désir soit celui d'obtenir Ta Récompense ; fasse que mon renoncement soit au sujet de ce qui implique sur moi la douleur de Ton Châtiment ! Tu es Bienveillant envers celui que Tu choisis !"},
        {t:'salawat'},
      ]
    },

    jeudi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '66. Invocation du Jeudi',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'الْحَمْدُ لِلّٰهِ الَّذِى أَذْهَبَ اللَّيْلَ مُظْلِماً بِقُدْرَتِهِ، وَجَاءَ بِالنَّهَارِ مُبْصِراً بِرَحْمَتِهِ وَكَسَانِى ضِياءَهُ وَأَنَا فِى نِعْمَتِهِ', tr:'Al-hamdu li-llâhi al-ladhî adhhaba al-layla muzhlimann biqudratihi, wa jâ’a bi-n-nahâri mubsirann bi-rahmatihi wa kasânï diyâ’ahu wa anâ fî ni’matihi', fr:"Louange à Dieu ! Qui dissipe les ténèbres de la nuit par Sa Puissance ; Qui suscite la clarté du jour par Sa Miséricorde. IL m'a enveloppé de la lumière du jour et m'a accordé son bienfait."},
        {t:'tri', ar:'اللّٰهُمَّ فَكَمَا أَبْقَيْتَنِى لَهُ فَأَبْقِنِى لِأَمْثالِهِ وَصَلِّ عَلَى النَّبِيِّ مُحَمَّدٍ وَآلِهِ وَلَا تَفْجَعْنِي فِيهِ وَفِي غَيْرِهِ مِنَ اللَّيالِى وَالْأَيَّامِ، بِارْتِكَابِ الْمَحَارِمِ، وَاكْتِسَابِ الْمَآثِمِ وَارْزُقْنِى خَيْرَهُ، وَخَيْرَ مَا فِيهِ، وَخَيْرَ مَا بَعْدَهُ وَاصْرِفْ عَنِّى شَرَّهُ، وَشَرَّ مَا فِيهِ، وَشَرَّ مَا بَعْدَهُ', tr:'Allâhumma, fakamâ abqaytanî lahu fa-abqinî li-amthâlihi wa salli ‘alâ-n-nabî Muhammadinn wa âlihi wa lâ tafja’nî fîhi wa fi ghayrihi mina-l-layâlî wa-l-ayyâmi, birtikâbi- l-mahârimi wa-ktisâbi-l-mâthimi Wa-rzuqnî khayrahu wa khayra mâ fîhi wa khayra mâ ba‘dahu wa-srif ‘annî sharrahu wa sharra mâ fîhi wa sharra mâ ba‘dahu', fr:"Ô mon Dieu ! De la même manière que Tu m'as épargné en ce jour, épargne-moi pour ses semblables, bénis le Prophète Mohammed et les Gens de sa Famille, ne me tourmente pas en ce jour ni durant les nuits ni durant les jours suivants en m'abandonnant à commettre des actes interdits et à me couvrir d'actes coupables ; accorde-moi ses bienfaits ; le Bien qui est en lui et le Bien de toutes choses après lui ; écarte-moi de son Mal, le Mal qui est en lui et le Mal de toutes choses après lui !"},
        {t:'tri', ar:'اللّٰهُمَّ إِنِّى بِذِمَّةِ الْإِسْلامِ أَتَوَسَّلُ إِلَيْكَ، وَبِحُرْمَةِ الْقُرْآنِ أَعْتَمِدُ عَلَيْكَ وَبِمُحَمَّدٍ الْمُصْطَفىٰ صَلَّى اللّٰهُ عَلَيْهِ وَآلِهِ أَسْتَشْفِعُ لَدَيْكَ فَاعْرِفِ اللّٰهُمَّ ذِمَّتِىَ الَّتِى رَجَوْتُ بِهَا قَضَاءَ حَاجَتِى، يَا أَرْحَمَ الرَّاحِمِينَ', tr:'Allâhumma innî bi-dhimmati-l-islâmi atawassalu ilayka, wa bihurmati- l-qurâni a’tamidu ‘alayka wa bi-Muhammadinn al-mustafâ, sallâ-llâhu ‘alayhi wa âlihi, astashfi‘ u ladayka Fa-a‘rifi, Allâhumma, dhimmatî al-latî rajawtu bihâ qadâ’a hâjatî, yâ arhama ar-râhimîna', fr:"Ô mon Dieu ! Par le Pacte de Protection de l'Islam, je sollicite la Demande de Recours envers Toi ! Par la Sainteté du Coran je prends appui sur Toi ! Par Mohammed, l'Élu, que Dieu le bénisse ainsi que les Gens de sa Famille, je sollicite l'Intercession auprès de Toi ! Ô mon Dieu ! Reconnais mon Pacte de Protection en vertu duquel j'ose espérer l'exaucement de ma requête. Ô Le Plus Miséricordieux de ceux qui font miséricorde !"},
        {t:'tri', ar:'اللّٰهُمَّ اقْضِ لِى‌فِى الْخَمِيسِ خَمْساً لَايَتَّسِعُ لَها إِلّا كَرَمُكَ، وَلَا يُطِيقُها إِلّا نِعَمُكَ سَلَامَةً أَقْوىٰ بِهَا عَلَىٰ طَاعَتِكَ، وَعِبادَةً أَسْتَحِقُّ بِها جَزِيلَ مَثُوبَتِكَ، وَسَعَةً فِى الْحَالِ مِنَ الرِّزْقِ الْحَلَالِ وَأَن تُؤْمِنَنِى فِى مَوَاقِفِ الْخَوْفِ بِأَمْنِكَ، وَتَجْعَلَنِى مِنْ طَوَارِقِ الْهُمُومِ وَالْغُمُومِ فِى حِصْنِكَ', tr:'Allâhumma, aqdi lî fî-l-khamîsi khamsann, lâ yattasi‘u lahâ illâ karamuka wa lâ yutîquhâ illâ ni‘amuka : salâmatann aqwâ bihâ ‘alâ tâ‘atika, wa ‘ibâdatann astahiqqu bihâ jazîla mathûbatika, wa sa‘atann fî-l-hâli mina-r-rizqi-l-halâli wa an tu’amminanî fi mawâqifi-l-khawfi bi-amnika, wa taj ‘alanî min tawâriqi-l-humûmi wa-l-ghumûmi fi hisnika', fr:"Ô mon Dieu ! Décrète en ma faveur, en ce cinquième jour de la semaine, cinq choses que seule Ta Générosité est capable d'accorder et Ta Grâce de dispenser : une bonne santé qui me donnera la force de persévérer dans l'obéissance envers Toi ; une pratique adorative par laquelle je mériterai l'abondance de Ta Récompense ; une situation aisée faite de Tes Moyens licites de subsistance ; une protection venant de Toi dans toutes situations de crainte ; et un refuge dans Ta Citadelle contre les assauts des tourments et des soucis !"},
        {t:'tri', ar:'وَ صَلِّ عَلَىٰ مُحَمَّدٍ وَآلِ مُحَمَّدٍ وَاجْعَلْ تَوَسُّلِى بِهِ شَافِعاً، يَوْمَ الْقِيامَةِ نَافِعاً، إِنَّكَ أَنْتَ أَرْحَمُ الرَّاحِمِينَ', tr:'Wa salli ‘alâ Muhamadinn wa âli Muhammadinn wa-j‘al tawassulî bihi shâfi’ann yawma-l-qiyâmati nâfi‘ann, innaka anta arhamu ar-râhimîna', fr:"Bénis Mohammed et les Gens de sa Famille ; fasse que ma Demande de Recours d'Intercession du Prophète me soit favorable au Jour de la Résurrection ! En vérité, Tu es Le Plus Miséricordieux de ceux qui font miséricorde !"},
        {t:'salawat'},
      ]
    },

    vendredi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '67. Invocation du Vendredi',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'الْحَمْدُ لِلّٰهِ الأَوَّلِ قَبْلَ الْإِنْشاءِ وَالْإِحْياءِ، وَالْآخِرِ بَعْدَ فَنَاءِ الأَشْياءِ الْعَلِيمِ الَّذِى لَايَنْسىٰ مَنْ ذَكَرَهُ، وَلَا يَنْقُصُ مَنْ شَكَرَهُ وَلَا يَخِيبُ مَنْ دَعَاهُ، وَلَا يَقْطَعُ رَجَاءَ مَنْ رَجَاهُ', tr:'Al-hamdu li-llâhi al-awwali qabla-l-inshâ’i wa-l-ihyâ’i, wa-l-âkhiri ba’da fanâ’i-l-ashyâ’i al-‘alîmi-l-ladhî lâ yansâ man dhakarahu wa lâ yanqusu man shakarahu wa lâ yakhîbu man da‘âhu, wa là yaqta’u rajâ’a man rajâhu', fr:"Louange à Dieu ! Celui qui fut avant la création et la manifestation de toute vie ; Celui qui demeurera après la disparition de toutes choses : l'Omniscient, qui n'oublie pas celui qui Le remémore ; qui ne rabaisse pas celui qui fait preuve de gratitude envers Lui ; qui ne déçoit pas celui qui L'invoque ; qui ne délaisse pas l'espérance de celui qui espère en Lui."},
        {t:'tri', ar:'اللّٰهُمَّ إِنِّى أُشْهِدُكَ وَكَفىٰ بِكَ شَهِيداً، وَأُشْهِدُ جَمِيعَ مَلائِكَتِكَ وَسُكَّانَ سَمٰواتِكَ وَحَمَلَةِ عَرْشِكَ وَمَنْ بَعَثْتَ مِنْ أَنْبِيَائِكَ وَ رُسُلِكَ، وَأَنْشَأْتَ مِنْ أَصْنَافِ خَلْقِكَ أَنِّى أَشْهَدُ أَنَّكَ أَنْتَ اللّٰهُ لَاإِلٰهَ إِلّا أَنْتَ، وَحْدَكَ لَا شَرِيكَ لَكَ وَ لَا عَدِيلَ، وَلَا خُلْفَ لِقَوْلِكَ وَلَا تَبْدِيلَ وَأَنَّ مُحَمَّداً صَلَّى اللّٰهُ عَلَيْهِ وَآلِهِ عَبْدُكَ وَرَسُولُكَ أَدَّىٰ مَا حَمَّلْتَهُ إِلَى الْعِبَادِ، وَجَاهَدَ فِى اللّٰهِ عَزَّ وَجَلَّ حَقَّ الْجِهَادِ وَأَنَّهُ بَشَّرَ بِمَا هُوَ حَقٌّ مِنَ الثَّوَابِ، وَأَنْذَرَ بِمَا هُوَ صِدْقٌ مِنَ الْعِقَابِ', tr:'Allâhumma, innî ush’hiduka wa kafâ bika shahîdann, wa ush’hidu jamî‘a malâ’ikatika wa sukkâna samâwâtika wa hamalata ‘arshika wa man ba’athta min anbiyâ’ ika wa rusulika wa ansha’ta min asnâfi khalqika annî ash’hadu annaka anta-llâhu lâ ilâha illâ anta, wahdaka lâ sharîka laka wa lâ ‘adîla, wa lâ khulfa li-qawlika wa lâ tabdîla wa anna Muhammadann, sallâ-llâhu ‘alayhi wa âlihi, ‘abduka wa rasûluka addâ mâ hammaltahu ilâ-l-‘ibâdi, wa jâhada fi-llâhi, ‘azza wa jalla, haqqa-l-jihâdi wa annahu bashshara bimâ huwa haqqunn mina-th-thawâbi, wa andhara bimâ huwa sidqunn mina-l-‘iqâbi', fr:"Ô mon Dieu ! Je Te prends à témoin — et Tu suffis comme Témoin —, je prends à témoin tous Tes anges, les habitants de Tes cieux, les Archanges porteurs de Ton Trône, les Prophètes et les Messagers envoyés par Toi, ainsi que toutes les sortes de créatures que Tu as créées ; je témoigne que Tu es Dieu ; il n'y a de Dieu que Toi ; l'Unique ; sans associé avec Toi ni d'égal à Toi ; il n'y a ni contradiction dans Ta parole ni modification. Et que Mohammed — que Dieu le bénisse ainsi que les Gens de sa Famille — est Ton serviteur et Ton messager."},
        {t:'tri', ar:'اللّٰهُمَّ ثَبِّتْنِى عَلىٰ دِينِكَ مَا أَحْيَيْتَنِى،وَلَا تُزِغْ قَلْبِى بَعْدَ إِذْ هَدَيْتَنِى وَهَبْ لِى مِنْ لَدُنْكَ رَحْمَةً إِنَّكَ أَنْتَ الْوَهَّابُ صَلِّ عَلَىٰ مُحَمَّدٍ وَعَلَىٰ آلِ مُحَمَّدٍ وَاجْعَلْنِى مِنْ أَتْباعِهِ وَشِيعَتِهِ، وَاحْشُرْ نِى فِى زُمْرَتِهِ وَوَفِّقْنِى لِأَدَاءِ فَرْضِ الْجُمُعَاتِ، وَمَا أَوْجَبْتَ عَلَىَّ فِيها مِنَ الطَّاعَاتِ وَقَسَمْتَ لِأَهْلِهَا مِنَ الْعَطَاءِ فِى يَوْمِ الْجَزَاءِ، إِنَّكَ أَنْتَ الْعَزِيزُ الْحَكِيمُ', tr:'Allâhumma, thabbitnî ‘alâ dînika mâ ahayaytanî wa lâ tuzigh qalbî ba‘da idh hadaytanî wa hab lî min ladunka rahmatann innaka anta-l-wahhâbu sallî ‘alâ Muhammadinn wa ‘alâ âli Muhammadinn wa-j’alnî min atbâ‘ihi wa shî‘atihi, wa-hshumî fî zumratihi wa waffiqnî li-adâ’i fardi-l-jumu’âti, wa mâ awjabta ‘alayya fîhâ mina-t-tâ‘âti wa qasamta li-ahlihâ mina-l-‘atâ’i fî yawmi-l-jazâ’i, innaka antal-‘ azîzu-l-hakîmu', fr:"Ô mon Dieu ! Affermis en moi Ta religion tant que Tu me maintiendras en vie. Ne dévie pas mon cœur après m'avoir dirigé ; accorde-moi une miséricorde venant de Toi. Tu es le Suprême Donateur. Bénis Mohammed et les Gens de la Famille de Mohammed ; fais de moi l'un de ses suivants et de ses partisans ; mets-moi au nombre de ceux qui sont dans ses rangs ; accorde-moi la réussite dans l'accomplissement des obligations religieuses du Vendredi. Tu es le Tout-Puissant, le Sage."},
        {t:'salawat'},
      ]
    },

    samedi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '68. Invocation du Samedi',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'بِسْمِ اللّٰهِ كَلِمَةِ الْمُعْتَصِمِينَ، وَمَقالَةِ الْمُتَحَرِّزِينَ وَأَعُوذُ بِاللّٰهِ تَعَالىٰ مِنْ جَوْرِ الْجَائِرِينَ، وَكَيْدِ الْحَاسِدِينَ، وَبَغْىِ الظَّالِمِينَ وَأَحْمَدُهُ فَوْقَ حَمْدِ الْحَامِدِينَ', tr:'Bismi-llâhi kalimati-l-mu‘tasimîna wa maqâlati-l-mutaharrizîna wa a’ûdhu bi-llâhi ta’âlâ min jawri-l-jâ’irîna, wa kaydi-l-hâsidîna wa baghî-zh-zhâ-limîna wa ahmaduhu fawqa hamdi-l- hâmidîna', fr:"Au Nom de Dieu ! La Parole de ceux qui se placent sous la Protection de Dieu ! La Devise de ceux qui cherchent ardemment Sa Protection ! Je cherche refuge en Dieu — Le Très Exalté soit-IL — contre l'injustice de l'injuste, contre les pièges des envieux, contre l'oppression des oppresseurs ; Et je Le loue de La Louange placée au-dessus de toutes les louanges des louangeurs !"},
        {t:'tri', ar:'اللّٰهُمَّ أَنْتَ الْواحِدُ بِلَا شَرِيكٍ، وَالْمَلِكُ بِلَا تَمْلِيكٍ، لَاتُضَادُّ فِى حُكْمِكَ، وَلَا تُنَازَعُ فِى مُلْكِكَ', tr:'Allâhumma, anta-l-wâhidu bilâ sharîkinn, wa-l-maliku bilâ tamlîkinn, lâ tudâddu fî hukmika wa lâ tunâza’u fî mulkika', fr:"Ô mon Dieu ! Tu es L'Unique sans associé, Le Roi sans avoir été intronisé ! Nul ne saurait s'opposer à Toi dans Ton Jugement ; nul ne saurait Te contester dans Ta Souveraineté !"},
        {t:'tri', ar:'أَسْأَلُكَ أَنْ تُصَلِّىَ عَلَىٰ مُحَمَّدٍ عَبْدِكَ وَرَسُولِكَ، وَأَنْ تُوزِعَنِى مِنْ شُكْرِ نُعْمَاكَ مَا تَبْلُغُ بِى غَايَةَ رِضَاكَ وَأَنْ تُعِينَنِى عَلَىٰ طَاعَتِكَ وَلُزُومِ عِبَادَتِكَ، وَاسْتِحْقَاقِ مَثُوبَتِكَ بِلُطْفِ عِنَايَتِكَ وَتَرْحَمَنِى بِصَدِّى عَنْ مَعَاصِيكَ مَا أَحْيَيْتَنِى، وَتُوَفِّقَنِى لِمَا يَنْفَعُنِى مَا أَبْقَيْتَنِى وَأَنْ تَشْرَحَ بِكِتَابِكَ صَدْرِى، وَتَحُطَّ بِتِلاوَتِهِ وِزْرِى، وَتَمْنَحَنِى السَّلَامَةَ فِى دِينِى وَنَفْسِى وَلَا تُوحِشَ بِى أَهْلَ أُنْسِى، وَتُتِمَّ إِحْسَانَكَ فِيَما بَقِىَ مِنْ عُمْرِى كَمَا أَحْسَنْتَ فِيَما مَضَىٰ مِنْهُ يَا أَرْحَمَ الرَّاحِمِينَ', tr:'As’aluka an tusalliya ‘alâ Muhammadinn ‘abdika wa rasûlika, wa an tûzi‘anî min shukri nu’mâka mâ tablughu bî ghâyata ridâka wa an tu‘înanî ‘alâ tâ‘atika wa luzûmi ‘ibâdatika, wa-stihqâqi mathûbatika bi-lutfî ‘inâyatika wa tarhamanî bi-saddî ‘an ma’âsîka mâ ahyaytanî, wa tuwaffiqanî limâ yanfa‘unî mâ abqaytanî wa an tasharaha bi-kitâbika sadrî, wa tahutta bi-tilâwatihi wizrî, wa tamnahanî-s-salâmata fî dînî wa nafsî Wa lâ tûhisha bî ahla unsî, wa tutimma ihsânaka fîmâ baqiya min ‘umrî kamâ ahsanta fîmâ madâ minhu yâ arhama-r-râhimîna', fr:"Je T'implore de bénir Mohammed et les Gens de sa Famille, Ton Serviteur et Ton Messager ; Inspire-moi le remerciement de Tes Bienfaits par lequel j'atteindrai le plus haut degré de Ta Satisfaction ; Accorde-moi l'aide à des fins de T'obéir, de persister dans l'Adoration qui T'est due, et ainsi mériter Ta Récompense par Ta Grâce Bienveillante. Fais preuve de Miséricorde à mon égard et protège-moi contre les actes de désobéissance envers Toi aussi longtemps que Tu me maintiendras en vie ; Élargis ma poitrine par Ton Livre, délivre-moi de mon fardeau par sa lecture ; Accorde-moi la perfection dans ma Religion et dans mon âme. Ô Le Plus Miséricordieux de ceux qui font miséricorde !"},
        {t:'salawat'},
      ]
    },

    makarem: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '20. Mâkarem al-Akhlāq — Traits de caractères nobles',
      subtitle: 'L\'invocation des actes nobles de la morale',
      prose: true,
      body: [
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais atteindre ma foi la plus parfaite des fois, rends ma certitude la meilleure des certitudes, fais aboutir mon intention à la meilleure des intentions, mon action à la meilleure des actions.',
        'Mon Dieu, parfais mon intention par Ta Grâce, rectifie ma certitude par ce que Tu possèdes, réforme ce qui est corrompu en moi par Ton Pouvoir.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, suffis-moi dans ce qui occupe toute mon attention, emploie-moi dans des actions à propos desquelles Tu m\'interrogeras demain, consacre mes jours à ce pour quoi Tu m\'as créé, enrichis-moi, étends sur moi Tes ressources et ne m\'éprouve pas par l\'ingratitude ou par le regard des autres ou par l\'attente, honore-moi et ne me mets pas à l\'épreuve de l\'arrogance, asservis-moi à Toi et ne laisse pas corrompre mon adoration à Ton égard par la fatuité, mets-moi en permanence au bon service des gens et ne le fais pas s\'annuler par le rappel du bienfait, accorde-moi une morale sublime et préserve-moi de la vantardise.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, ne m\'élève pas d\'un degré auprès des gens sans m\'abaisser d\'un degré semblable en moi-même, ne m\'accorde pas une gloire apparente sans susciter en moi-même une humilité intérieure d\'une égale valeur.',
        'Mon Dieu, prie sur Mohammed et sur la famille de Mohammed, fais-moi jouir d\'une juste direction que je ne substituerai pas, d\'une voie droite dont je ne dévierai pas, et d\'une intention bien juste dont je ne douterai pas.',
        'Laisse-moi vivre aussi longtemps que ma vie sera vouée à l\'obéissance envers Toi, et si ma vie devenait un foyer pour Satan, alors rappelle-moi auprès de Toi avant que Ton Abomination ne m\'atteigne ou que Ta Colère ne s\'abatte sur moi.',
        'Mon Dieu, ne laisse pas en moi un trait honteux sans le réformer, ni un défaut blâmable sans le corriger, ni une morale incomplète sans la parachever.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, remplace l\'animosité des gens vindicatifs à mon égard par l\'amour, la jalousie des gens qui convoitent par l\'amitié, la suspicion des gens de bonne conduite par la confiance, l\'inimitié des parents les plus proches par l\'attachement, l\'ingratitude des consanguins par la bienfaisance, la défection des proches par l\'assistance, l\'amour des flatteurs par la correction du tendre ami, la répulsion de ceux qui me fréquentent par le noble commerce, l\'amertume de la peur des oppresseurs par la douceur de la sécurité.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, assure-moi une force contre celui qui m\'a opprimé, un argument contre celui qui m\'a cherché querelle, une victoire sur celui qui s\'est entêté contre moi, octroie-moi un stratagème contre celui qui m\'a trompé, un pouvoir sur celui qui m\'a persécuté, un démenti contre celui qui m\'a incriminé à tort, un salut contre celui qui m\'a menacé, fais-moi parvenir à obéir à celui qui m\'a dirigé sur le droit chemin et à suivre celui qui m\'a guidé dans la bonne voie.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais-moi réussir à conseiller celui qui m\'a dupé, à rétribuer par la bonté celui qui m\'a délaissé, à récompenser par la générosité celui qui m\'a privé, à compenser celui qui s\'est séparé de moi en établissant des liens avec lui, à contrecarrer celui qui a médit sur moi en disant du bien de lui, à faire preuve de gratitude pour tout bienfait dont j\'ai fait l\'objet, à fermer les yeux sur toute malfaisance dont j\'ai été victime.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, pare-moi de la parure des gens saints, revêts-moi de l\'ornement des gens pieux, en répandant la justice, en retenant la colère, en éteignant les feux de l\'inimitié, en regroupant les gens désunis, en résolvant les discordes, en diffusant les bienfaits, en dissimulant les défauts, en ayant un naturel doux, une attitude humble, une bonne conduite, une paisible quiétude, une compagnie agréable, en devançant les autres vers la vertu, en choisissant de préférence la prévenance, en abandonnant les reproches et les bonnes grâces envers ceux qui ne les méritent pas, en disant la vérité même si elle est difficile.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, accorde-moi Ta subsistance la plus abondante lorsque j\'aurai vieilli, Ta force la plus grande quand je serai fatigué. Ne m\'éprouve pas par la paresse qui m\'empêcherait de T\'adorer, ni par l\'aveuglement qui m\'égarerait de Ta voie, ni par l\'exposition à ce qui est contraire à Ton amour, ni par la compagnie de celui qui s\'est séparé de Toi, ni par la séparation de celui qui s\'est joint à Toi.',
        'Mon Dieu, fais que je combatte par Toi en cas de nécessité, que je Te sollicite en cas de besoin, que je T\'implore en cas de pauvreté, et ne m\'induis pas en erreur en me laissant demander de l\'aide à autre que Toi si je suis dans la nécessité.',
        'Mon Dieu, fais que tout ce que Satan introduit dans mon cœur en envie, en suspicion et en jalousie soit une occasion pour rappeler Ta grandeur, méditer sur Ta puissance et organiser la riposte contre Ton ennemi.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais qu\'on ne m\'opprime pas alors que Tu as la capacité de me défendre, que je n\'oppresse personne alors que Tu peux me retenir, que je ne m\'égare pas alors que Tu as la possibilité de me guider, que je ne tombe pas dans la misère alors que mon opulence vient de Toi, que je ne devienne pas orgueilleux alors que ma richesse vient de chez Toi.',
        'Mon Dieu, c\'est auprès de Ton pardon que je me suis rendu, c\'est à Ton absolution que j\'ai aspiré, c\'est Ton indulgence qui m\'a manqué, c\'est à Ta faveur que je me suis fié, alors qu\'il n\'y a rien en moi qui impliquerait Ton pardon et rien au niveau de mes actes qui me le ferait mériter. Et après m\'être jugé moi-même, il ne me reste que Ta faveur. Alors prie sur Mohammed et sur sa famille et couvre-moi de Ta faveur.',
        'Mon Dieu, fais-moi prononcer des mots justes, inspire-moi la piété, fais-moi obtenir ce qui est le plus pur et emploie-moi dans ce qui Te satisfait le plus. Mon Dieu, fais-moi emprunter la voie la plus exemplaire, fais-moi mourir et vivre selon Ta religion.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, fais-moi jouir de la pondération, place-moi au nombre des gens justes, des guides de la bonne direction, des serviteurs saints, accorde-moi la réussite lors de la Résurrection et le salut lors de l\'examen des actes.',
        'Mon Dieu, prends de mon âme pour Toi-même ce qui la sauverait, laisse-moi en moi-même ce qui la réformerait, car mon âme est perdue à moins que Tu ne l\'empêches de faire des fautes. Mon Dieu, Tu es mon refuge quand je suis affligé, Tu es mon asile quand je suis démuni, et c\'est auprès de Toi que je cherche secours quand je suis dans la détresse.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, éloigne tout mal de moi par Ta bonté, nourris-moi par Ta grâce, réforme-moi par Ta générosité, guéris-moi par Ta bonne œuvre, mets-moi sous Ta protection, couvre-moi de Ta satisfaction, assiste-moi dans le choix de la plus juste des affaires quand elles s\'embrouillent, de la plus pure des actions quand elles se confondent, de la plus satisfaisante des doctrines quand elles sont contradictoires.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, couronne-moi de la suffisance, impose-moi une allégeance honorable, octroie-moi une guidance sincère, ne m\'éprouve pas par l\'abondance. Accorde-moi la bonne aisance, ne rends pas ma vie laborieuse et pénible, ne repousse pas ma supplication, car je ne T\'attribue aucun rival ni égal à Toi dans mes supplications.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, empêche-moi de me livrer au gaspillage, protège mes moyens de subsistance de la détérioration, augmente mes possessions par la bénédiction s\'y trouvant, fais-moi atteindre la voie de la guidance à la piété dans tout ce que je dépense. Mon Dieu, prie sur Mohammed et sur sa famille, épargne-moi la peine du gain, pourvois-moi en moyens de subsistance sans compter, afin de ne pas me détourner de Ton adoration par la recherche de ces moyens.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, sauve-moi la face par l\'aisance, ne m\'abaisse pas par le don parcimonieux, car j\'aurais à demander mes moyens d\'existence à ceux qui les reçoivent de Toi, à mendier auprès de Tes méchantes créatures, alors que Tu es, à l\'exclusion d\'eux, le Maître du don et de l\'obstruction.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, attire mon attention sur Ton évocation durant les moments d\'insouciance, emploie-moi dans l\'obéissance à Toi les jours passés sur terre, fais-moi suivre une voie facile vers Ton amour et parfait par lui pour moi le bien de ce monde et de l\'au-delà.',
        'Mon Dieu, prie sur Mohammed et sur sa famille, de la meilleure façon que Tu n\'aies prié sur quiconque de Tes créatures avant lui, et que Tu pries encore sur quiconque après lui, accorde-nous un Bienfait dans ce monde et un Bienfait dans l\'Autre, et préserve-moi, par Ta Miséricorde, du Châtiment du Feu.',
      ]
    },

    'z-hussain': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyara Imam al-Ḥusayn',
      subtitle: 'Visite pieuse à l\'Imam al-Ḥusayn ibn \'Alī (p)',
      body: [
        {t:'zv', tx:'Que la paix soit sur toi, ô fils du Messager de Dieu,', ar:'Assalâmo \'alayka yâ bna rasûli-l-lâhi'},
        {t:'zv', tx:'Que la paix soit sur toi, Ô fils du Prince des croyants.', ar:'As-salâmo \'alayka yâ bna amira-l-mominin'},
        {t:'zv', tx:'Que la paix soit sur toi, Ô fils de la Véridique, de la pure Fatimah, la première dame des femmes du monde !', ar:'As-Salamo \'Alayka yâ bna-s-siddiqati at-tahirati fâtimata sayyedati niçâ-il-\'âlamin'},
        {t:'zv', tx:'Que la paix soit sur toi, ô maître Abû Abdellah ainsi que la Miséricorde de Dieu et Sa Bénédiction !', ar:'As-slâmo alayka yâ mawlâya wa rahmato-llahi wa barakâtuhu'},
        {t:'zv', tx:'J\'atteste que tu as accompli la prière, que tu as donné la Zakat (l\'aumône),', ar:'Ashhadu annaka qad aqmata-s-slâta wa âtayta-z-zakâta'},
        {t:'zv', tx:'Que tu as ordonné le bien et interdit le mal,', ar:'wa amarta bi-l-ma\'rufi wa nahayta \'ani-l-munkari'},
        {t:'zv', tx:'Que tu as récité le livre d\'une juste lecture,', ar:'wa talawta-l-kitâba haqqan tilâwatihi'},
        {t:'zv', tx:'Que tu as lutté pour Dieu, le juste Combat.', ar:'wa jâhadta fi-Llah, haqqan jihâdihi'},
        {t:'zv', tx:'Que tu as patienté devant le mal aux côtés de Dieu jusqu\'à ce que la certitude t\'ait atteint,', ar:'wa sabarta \'ala-l-adha fi janbihi muhtasibann hattâ atâka-l-yaqinu'},
        {t:'zv', tx:'J\'atteste que ceux qui t\'ont désobéi, t\'ont combattu, t\'ont tué, sont maudits de la langue même du prophète, l\'illettré.', ar:'Ashhadu anna-l-ladhîna khâlafûka wa hârabûka wa-l-ladhîna qatalûka, mal\'ûnina \'ala lisâni-n-nabiyyi-l-ummiyyi'},
        {t:'zv', tx:'Que Dieu Maudisse ceux qui ont été injustes à votre encontre, des premiers aux derniers et qu\'Il augmente leur douloureux châtiment.', ar:'la\'ana-llâhu azh-zhâlimina lakum mina-l-awwalîna wa-l-âkhirîna'},
        {t:'zv', tx:'Ô mon maître, Ô fils du Messager de Dieu, je suis connaissant de tes droits, allié de tes alliés, hostile à ceux qui te sont hostiles,', ar:'Yâ mawlâya yâ\'bna rasûli-llâhi, Inni \'ârifann bi-haqqika, muwâliyann li-aw-liyâ\'ika'},
        {t:'zv', tx:'Clairvoyant de la bonne voie sur laquelle tu es, connaissant l\'égarement de ceux qui se sont opposés à toi, aussi intercède pour moi auprès de Dieu.', ar:'Mustabsirann bi-l-hudâ al-ladhî anta \'alayhi, fa-ashfa\' lî \'inda rabbika'},
        {t:'zv', tx:'Que la paix soit sur toi, ô Argument de Dieu sur Sa Terre et dans Son Ciel !', ar:'As-salâmu \'alayka yâ hujjatu-llâhi fî ardihi wa samâ\'ihi'},
        {t:'zv', tx:'Que Dieu prie sur ton bon esprit et ton corps pur, et que la paix soit sur toi, ô mon Maître, ainsi que la Miséricorde de Dieu et Ses Bénédictions !', ar:'Salla-llâhu \'ala rûhika at-tayyiba wa jaçadika, wa rahmatu-llâhi wa barakâtuhu'},
        {t:'instruction', tx:'Après la visite (Ziyārat), il est recommandé d\'accomplir deux rak\'ats et les offrir à l\'Imam al-Ḥusayn (p). À la fin de la prière, dire :'},
        {t:'zv', tx:'Ô mon Dieu, j\'offre ces deux rak\'ats que je viens d\'accomplir à mon Maître l\'Imam Al-Hussein (p).', ar:'Allâhomma inni çallayto hâtayni ar-rek\'atayni hadiyatann minni ilâ sayyidi wa malâya abâ abdillâhi-l-Hussein'},
      ]
    },

    'z-warith': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyārat Wārith',
      subtitle: 'Ziyārat al-Imam al-Ḥusayn (p) — Se diriger vers Karbalā\'',
      body: [
        {t:'instruction', tx:'Formuler l\'intention (Niyyah) : « Je récite Ziyārat al-Imam Ḥusayn (as) Qurbatan ilallāh ». Se diriger vers la direction du Mausolée de l\'Imam Ḥusayn vers Karbalā\' en Iraq.'},
        {t:'zv', tx:'Allāhumma ṣalli \'alā Muḥammad wa āle Muḥammad', ar:'اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّد'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'Adam, l\'Élu d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ آدَمَ صَفِيِّ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Noé (Nūḥ), le Prophète d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ نُوحٍ نَبِيِّ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'Ibrāhīm (Abraham), l\'Ami privilégié d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ إِبْرَاهِيمَ خَلِيلِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Moussa (Moïse), Interlocuteur d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ مُوسَى كَلِيمِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de \'Isā (Jésus), l\'Esprit d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ عِيسَى رُوحِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de Moḥammad, le Bien-aimé d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ مُحَمَّدٍ حَبِيبِ اللهِ'},
        {t:'zv', tx:'Paix sur toi, o Héritier de \'Alī, le Commandeur des Croyants, le Waliy d\'Allah !', ar:'السَّلامُ عَلَيْكَ يَا وَارِثَ عَلِيٍّ أَمِيرِ الْمُؤْمِنِينَ'},
        {t:'zv', tx:'Paix sur toi, o Héritier d\'al-Ḥasan, le martyr, le petit-fils du Messager d\'Allah !'},
        {t:'zv', tx:'Paix sur toi, o fils du Messager d\'Allah ! Paix sur toi, o fils de Fāṭimah al-Zahrā\', la Maîtresse des femmes des mondes !'},
        {t:'zv', tx:'Paix sur toi, o Abū \'Abdullāh al-Ḥusayn ! Paix sur toi, O élu d\'Allah et fils de Son élu !'},
        {t:'zv', tx:'Paix sur toi, o Vengeance d\'Allah et fils de Sa Vengeance ! Paix sur toi, o vengeance et revendicateur de vengeance !'},
        {t:'zv', tx:'Paix sur toi, o Imam guidant et pur, ainsi que sur les âmes qui se sont rendues dans ton enclos, qui reposent dans ton voisinage, et qui sont venues avec tes visiteurs en pèlerins !'},
        {t:'zv', tx:'Paix sur toi, de ma part, tant que je vivrai et tant que demeureront la nuit et le jour, car ta perte est un grand malheur et un préjudice grave pour les Croyants, les Musulmans, et pour tous les habitants du Ciel et de la terre. Ainsi, nous sommes à Dieu et à Lui nous retournerons !'},
        {t:'zv', tx:'Que la Prière d\'Allah, Ses Bénédictions et Ses Salutations soient sur toi, sur tes parents purs, bons et nobles, et sur leurs descendants bons-guides et bien-guidés !'},
        {t:'zv', tx:'Ô mon Maître ! Ô Abū Abdullāh al-Ḥusayn ! Je suis l\'hôte d\'Allah et ton hôte, le voisin d\'Allah et ton voisin ; or tout hôte et tout voisin a droit à un geste d\'hospitalité, et mon droit sur toi à présent est que tu demandes à Allah de m\'accorder la libération de mon cou de l\'Enfer ! Il est celui qui entend la prière, Il est Proche et Il est celui qui exauce !'},
        {t:'zv', tx:'Allāhumma ṣalli \'alā Muḥammad wa āle Muḥammad', ar:'اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَ آلِ مُحَمَّد'},
      ]
    },

    'z-ashura': {
      source: 'Ziyāra — Visites pieuses',
      title: 'Ziyāra \'Āshūrā',
      subtitle: 'Ziyara du 10 Muharram — Jour de \'Āshūrā\'',
      body: [
        {t:'intro', tx:'Selon un hadith de l’Imâm Sâdiq (p) : "Chaque fois que vous avez un vœu que vous voulez qu’Allah exauce, récitez la Ziyârat `Achourâ’ puis le Du‘â’` Alqamah, et enfin, demandez au Seigneur ce que vous voulez, Incha’Allah cela vous sera donné de par sa Générosité et sa Gratitude".'},
        {t:'tri', ar:'بِسْمِ اللهِ الرَّحْمنِ الرَّحِيْمِ', tr:'Bismi-llâhi-r-rahmâni-r-rahîm', fr:'Par la grâce du nom d\'Allah, le Tout Miséricordieux, le Très Miséricordieux.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا اَبا عَبْدِاللهِ،', tr:'Assalâmu ‘alayka yâ Abâ ‘Abdillâh', fr:'Que la paix soit sur toi, ô Abâ ‘Abdillah.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَا بْنَ رَسُولِ اللهِ', tr:'Assalâmu ‘alayka ya-bna Rasûlillâh', fr:'Que la paix soit sur toi, ô fils de l’Envoyé d’Allah.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَا بْنَ اَميرِ الْمُؤْمِنينَ وَابْنَ سَيِّدِ الْوَصِيّينَ،', tr:'Assalâmu ‘alayka ya-bna Amîr-ul-mu’minîn-a wa-bna Sayyid-il-waçiyyîn-a', fr:'Que la paix soit sur toi, ô fils du Prince des croyants et du Maître des Héritiers présomptifs.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَا بْنَ فاطِمَةَ سَيِّدَةِ نِساءِ الْعالَمينَ،', tr:'Assalâmu ‘alayka ya-bna Fâtimata, Sayyidati nisâ’-il-‘âlamîn-a', fr:'Que la paix soit sur toi, ô fils de Fâtimah, Maîtresse des femmes des mondes.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا ثارَ اللهِ وَابْنَ ثارِهِ وَالْوِتْرَ الْمَوْتُورَ،', tr:'Assalâmu ‘alayka yâ thârallâh wa-bna thârihi wa-l-witra-l-mawtûr-a', fr:'Que la paix soit sur toi, ô « vengeance » d\'Allah et fils de Sa « Vengeance » ! Paix sur toi, ô vengeance et revendicateur de vengeance !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ وَعَلَى الاَْرْواحِ الَّتي حَلَّتْ بِفِنائِكَ', tr:'Assalâmu ‘alayka wa ‘ala-l-arwâh-il-latî hallat bi-finâ’ika', fr:'Que la paix soit sur toi et sur les âmes qui demeurent en ton seuil.'},
        {t:'tri', ar:'عَلَيْكُمْ مِنّي جَميعاً سَلامُ اللهِ اَبَداً ما بَقيتُ وَبَقِيَ اللَّيْلُ وَالنَّهارُ،', tr:'‘Alaykum minnî jamî‘an salâmullâhi abadan mâ baqîtu wa baqiy-al-laylu wan-nahâr-u', fr:'Que la paix d’Allah soit, de ma part, sur vous tous pour toujours, tant que j’existe et que durent la nuit et le jour.'},
        {t:'tri', ar:'يا اَبا عَبْدِاللهِ لَقَدْ عَظُمَتِ الرَّزِيَّةُ وَجَلَّتْ وَعَظُمَتِ الْمُصيبَةُ بِكَ عَلَيْنا وَعَلى جَميعِ اَهْلِ الاِْسْلامِ', tr:'Yâ Abâ ‘Abdillâh! laqad ‘adhumat-ir-raziyyatu wa jallat wa ‘adhumat -il-muçibatu bika ‘alaynâ wa ‘alâ jamî‘i ahl-il-islâm-i', fr:'Ô Abâ’Abdillah, le malheur de ta perte est immense et cette épreuve est terrible et difficile à supporter pour nous et pour tous les gens de l’Islam.'},
        {t:'tri', ar:'وَجَلَّتْ وَعَظُمَتْ مُصيبَتُكَ فِي السَّماواتِ عَلى جَميعِ اَهْلِ السَّماواتِ،', tr:'Wa jallat wa ‘adhumat muçîbatuka fi-s-samâwâti ‘alâ jamî‘i ahli-s-samâwât-i', fr:'Le malheur de ta perte est immense et cette épreuve est terrible et difficile à supporter également pour les gens des cieux.'},
        {t:'tri', ar:'فَلَعَنَ اللهُ اُمَّةً اَسَّسَتْ اَساسَ الظُّلْمِ وَالْجَوْرِ عَلَيْكُمْ اَهْلَ الْبَيْتِ،', tr:'Fa-la‘an-Allâhu ummatan assasat asâs-adh-dhulmi wa-l-jawri ‘alaykum Ahl-al-Bayt', fr:'Qu’Allah maudisse donc un peuple qui a édifié les fondements de l’injustice et de l’oppression sur vous, les Ahl-ul-Bayt.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ اُمَّةً دَفَعَتْكُمْ عَنْ مَقامِكُمْ وَاَزالَتْكُمْ عَنْ مَراتِبِكُمُ الَّتي رَتَّبَكُمُ اللهُ فيها،', tr:'Wa la‘an-Allâhu ummatan dafa‘at-kum ‘an maqâmikum wa azâlat-kum ‘an marâtibikum-ullatî rattabakum-ullâhu fîhâ', fr:'Qu’Allah maudisse un peuple qui vous a écartés de votre position et vous a confisqué les rangs dans lesquels Allah vous avait placés.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ اُمَّةً قَتَلَتْكُمْ وَلَعَنَ اللهُ الْمُمَهِّدينَ لَهُمْ بِالَّتمْكينِ مِنْ قِتالِكُمْ،', tr:'Wa la‘an-Allâhu ummatan qatalatkum wa la‘ana-llâhu-l-mumahhidîna lahum bi-t-tamkîni min qitâlikum', fr:'Qu’Allah maudisse un peuple qui vous a assassinés et qu’Il maudisse ceux qui lui ont préparé le terrain pour vous combattre.'},
        {t:'tri', ar:'بَرِئْتُ اِلَى اللهِ وَاِلَيْكُمْ مِنْهُمْ وَمِنْ اَشْياعِهِمْ وَاَتْباعِهِمْ وَاَوْلِيائِهِم', tr:'Bari’tu ila-llâhi wa ilaykum minhum wa achyâ‘ihim wa atbâ‘ihim wa awliyâ’ihim', fr:'Devant Allah et devant vous je les désapprouve et avec eux leurs partisans, leurs adeptes et leurs amis.'},
        {t:'tri', ar:'يا اَبا عَبْدِاللهِ اِنّي سِلْمٌ لِمَنْ سالَمَكُمْ وَحَرْبٌ لِمَنْ حارَبَكُمْ اِلى يَوْمِ الْقِيامَةِ،', tr:'Yâ Abâ ‘Abdillâh, innî silmun li-man sâlamakum wa harbun li-man hârabakum ilâ yawm-il-qiyâmah', fr:'Ô Abâ ‘Abdillâh, je suis en paix avec ceux qui sont en paix avec vous et en guerre contre ceux qui sont en guerre contre vous, jusqu’au Jour de la Résurrection.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ آلَ زِياد وَآلَ مَرْوانَ، وَلَعَنَ اللهُ بَني اُمَيَّةَ قاطِبَةً،', tr:'Wa la‘an-Allâhu âla Ziyâd wa âla Marwân wa la‘an-Allâhu Banî Umayyata qâtibatan', fr:'Qu’Allah maudisse les Âle Ziyâd et les Âle Marwân. Qu’Allah maudisse tous les Bani Omayyah sans exception.'},
        {t:'tri', ar:'وَلَعَنَ اللهُ ابْنَ مَرْجانَةَ، وَلَعَنَ اللهُ عُمَرَ بْنَ سَعْدٍ، وَلَعَنَ اللهُ شِمْراً،', tr:'Wa la‘an-Allâhu-bna Marjânata wa la‘an-Allâhu ‘Umara-bna Sa‘d-in wa la‘ana-llâhu Chimran', fr:'Qu’Allah maudisse Ibn Marjânah. Qu’Allah maudisse Omar Ibn Sa‘d. Qu’Allah maudisse Chimr.'},
        {t:'tri', ar:'لَعَنَ اللهُ اُمَّةً اَسْرَجَتْ وَاَلْجَمَتْ وَتَنَقَّبَتْ لِقِتالِكَ،', tr:'Wa la‘an-Allâhu ummatan asrajat wa aljamat wa tanaqqabat li-qitâlika', fr:'Qu’Allah maudisse un peuple qui est monté en selle, qui a bridé ses chevaux et qui s’est préparé en vue de te combattre.'},
        {t:'tri', ar:'بِاَبي اَنْتَ وَاُمّي لَقَدْ عَظُمَ مُصابي بِكَ', tr:'Bi-abî anta wa ummî laqad ‘adhuma muçâbî bika', fr:'Que mon père et ma mère te soient sacrifiés ! La peine que je ressens pour toi est immense.'},
        {t:'tri', ar:'فَاَسْأَلُ اللهَ الَّذي اَكْرَمَ مَقامَكَ وَاَكْرَمَني اَنْ يَرْزُقَني طَلَبَ ثارِكَ مَعَ اِمامٍ مَنْصُورٍ مِنْ اَهْلِ بَيْتِ مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَآلِهِ،', tr:'Fa-as’al-ullâha-llathî akrama maqâmaka wa akramanî bika an yarzuqanî talaba thârika ma‘a imâmin mançûrin min Ahli-Bayti Muhammadin çallâ-Ilâhu ‘alayhi wa âlihi', fr:'Je demande donc à Allah, qui t’a honoré de ton rang et par toi m’a honoré, qu’Il m’accorde la chance de te venger aux côtés d’un Imâm victorieux descendant des Gens de la Maison de Mohammad (p).'},
        {t:'tri', ar:'اَللّـهُمَّ اجْعَلْني عِنْدَكَ وَجيهاً بِالْحُسَيْنِ عَلَيْهِ السَّلامُ فِي الدُّنْيا وَالاْخِرَةِ،', tr:'Allâhumma-j‘alnî ‘indaka wajîhan bi-l-Husayni ‘alayhi-s-salâmu fi-d-dunyâ wa-l-âkhira-ti', fr:'Ô mon Dieu ! Fasse que par la grâce d\'al-Hussain (p) je mérite Ta considération dans le monde ici-bas et dans l’au-delà.'},
        {t:'tri', ar:'يا اَبا عَبْدِاللهِ اِنّي اَتَقَرَّبُ اِلى اللهِ وَ اِلى رَسُولِهِ وَاِلى اَميرِ الْمُؤْمِنينَ وَاِلى فاطِمَةَ وَاِلَى الْحَسَنِ وَاِلَيْكَ بِمُوالاتِكَ وَبِالْبَراءَةِ مِمَّنْ اَسَسَّ اَساسَ ذلِكَ وَبَني عَلَيْهِ بُنْيانَهُ وَجَرى فِي ظُلْمِهِ وَجَوْرِهِ عَلَيْكُمْ وَعلى اَشْياعِكُمْ،', tr:'Yâ Abâ ‘Abdillâh ! Innî ataqarrabu ilâ-llâhi wa ilâ Rasûlihi wa ilâ Amîr-il-mu’minîna wa ilâ Fâtimata wa ilâ-l-Hasani wa ilayka bi-muwâlâtika wa bi-l-barâ’ati mimman assasa asâsa thalik wa banâ ‘alayhi bunyânahu wa jarâ fi dhulmihi wa jawrihi ‘alaykum wa ‘alâ achyâ‘ikum.', fr:'Ô Abâ’Abdillah, je demande à être rapproché d’Allah, de Son Envoyé, du Commandeur des croyants (l’Imam Ali), de Fâtimah, d’al-Hassan et de toi par mon amour pour toi et par mon rejet et mon désaveu de ceux qui ont posé la fondation de votre tragédie et y ont bâti leur édifice et qui ont poursuivi leur injustice et leur oppression contre vous et vos partisans.'},
        {t:'tri', ar:'بَرِئْتُ اِلَى اللهِ وَاِلَيْكُمْ مِنْهُمْ وَاَتَقَرَّبُ اِلَى اللهِ ثُمَّ اِلَيْكُمْ بِمُوالاتِكُمْ وَمُوالاةِ وَلِيِّكُمْ وَبِالْبَراءَةِ مِنْ اَعْدائِكُمْ وَالنّاصِبينَ لَكُمُ الْحَرْبَ وَبِالْبَراءَةِ مِنْ اَشْياعِهِمْ وَاَتْباعِهِمْ،', tr:'Bari’tu ilâ-llâhi wa ilaykum minhum wa ataqarrabu ilâ-llâh thumma ilaykum bi-muwâlâtikum wa muwâlâti waliyyikum wa bi-l-barâ’ati min a‘dâ’ikum wa-n-nâçibîna lakumu-l-harba wa bi-l-barâ’ati min achyâ‘ihim wa atbâ‘ihim', fr:'Je les désavoue devant Allah et devant vous et je cherche à me rapprocher d’Allah puis de vous en vous aimant et en aimant celui que vous aimez, par mon rejet de vos ennemis et de ceux qui sont en guerre contre vous, et par le rejet de leurs partisans et de leurs adeptes.'},
        {t:'tri', ar:'اِنّي سِلْمٌ لِمَنْ سالَمَكُمْ وَحَرْبٌ لِمَنْ حارَبَكُمْ وَوَليٌّ لِمَنْ والاكُمْ وَعَدُوٌّ لِمَنْ عاداكُمْ', tr:'Innî silmun li-man sâlamakum wa harbun li-man hârabakum wa waliyyun li-man wâlâkum wa ‘aduwwun li-man ‘âdâkum', fr:'Je suis en paix avec quiconque est en paix avec vous et je suis en guerre contre quiconque est en guerre contre vous, je suis l’ami de quiconque est votre ami et l’ennemi de quiconque est votre ennemi.'},
        {t:'tri', ar:'فَاَسْأَلُ اللهَ الَّذي أكْرَمَني بِمَعْرِفَتِكُمْ وَمَعْرِفَةِ اَوْلِيائِكُمْ وَرَزَقَنِي الْبَراءَةَ مِنْ اَعْدائِكُمْ اَنْ يَجْعَلَني مَعَكُمْ فِي الدُّنْيا وَالاْخِرَةِ وَاَنْ يُثَبِّتَ لي عِنْدَكُمْ قَدَمَ صِدْقٍ فِي الدُّنْيا وَالاْخِرَةِ', tr:'Fa-as’alu-llâha-llathî akramanî bi-ma‘rifatikum wa ma‘rifati awliyâ’ikum wa razaqaniya-l-barâ’ata min a‘dâ’ikum an yaj‘alanî ma‘akum fi-d-duniyâ wa-l-âkhirati wa an yuthabbita lî ‘indakum qadama çidqin fi-d-dunyâ wa-l-âkhira-ti', fr:'Je demande à Allah, qui m’a honoré de votre connaissance et de la connaissance de vos amis et m’a inspiré le désaveu de vos ennemis, de me permettre d’être avec vous dans le monde d’ici-bas et dans l’autre monde et d’affermir ma sincérité fidèle envers vous dans le monde d’ici-bas et dans l’autre monde.'},
        {t:'tri', ar:'وَاَسْأَلُهُ اَنْ يُبَلِّغَنِي الْمَقامَ الَْمحْمُودَ لَكُمْ عِنْدَ اللهِ وَاَنْ يَرْزُقَني طَلَبَ ثاري مَعَ اِمام هُدىً ظاهِرٍ ناطِقٍ بِالْحَقِّ مِنْكُمْ', tr:'Wa as’aluhu an yuballighaniya-l-maqâm-al-mahmûda lakum ‘inda-llâh wa an yarzuqani talaba thârikum ma‘a imâmi hudan dhâhirin nâtiqin bi-l-haqqi minkum', fr:'Et je Lui demande de me faire atteindre au rang méritoire que vous avez auprès d’Allah et de m’accorder l’occasion de réclamer votre vengeance aux côtés d’un Imâm de guidance, issu de vous, bien-guidé, réapparaissant et annonçant la vérité.'},
        {t:'tri', ar:'وَاَسْألُ اللهَ بِحَقِّكُمْ وَبِالشَّأنِ الَّذي لَكُمْ عِنْدَهُ اَنْ يُعْطِيَني بِمُصابي بِكُمْ اَفْضَلَ ما يُعْطي مُصاباً بِمُصيبَتِهِ مُصيبَةً ما اَعْظَمَها وَاَعْظَمَ رَزِيَّتَها فِي الاِْسْلامِ وَفِي جَميعِ السَّماواتِ وَالاْرْضِ', tr:'Wa as’alu-llâh bi-haqqikum wa bi-ch-cha’ni-llathî lakum ‘indahu an yu‘tiyanî bi-muçâbî bikum af-dhala mâ yu‘ti muçâban bi-muçîbatihi muçîbatan mâ a‘dhamahâ wa a‘dhama raziyyatahâ fi-l-Islâmi wa fî jamî‘i-s-samâwâti wa-l-ardh-i', fr:'Et je demande à Allah, par votre droit et par la haute position dont vous jouissez auprès de Lui, de me récompenser de mon deuil de vous, la meilleure récompense qu’Il puisse accorder à quelqu’un en deuil, car il s’agit là d’un deuil on ne peut plus immense et dont l’affliction est on ne peut plus immense pour l’Islam et pour tous les cieux et la terre.'},
        {t:'tri', ar:'اَللّـهُمَّ اجْعَلْني فِي مَقامي هذا مِمَّنْ تَنالُهُ مِنْكَ صَلَواتٌ وَرَحْمَةٌ وَمَغْفِرَةٌ،', tr:'Allâhumma-j‘alnî fî maqâmî hâthâ mimman tanâluhu minka çalawâtun wa rahmatun wa magh-firatun', fr:'Ô mon Dieu ! Fais que je sois, là où je me trouve ici (en visite pieuse « ziyârah »), au nombre de ceux que Tu combles de Prières, de Miséricorde et de Pardon.'},
        {t:'tri', ar:'اَللّـهُمَّ اجْعَلْ مَحْيايَ مَحْيا مُحَمَّدٍ وَآلِ مُحَمَّدٍ وَمَماتي مَماتَ مُحَمَّدٍ وَآلِ مُحَمَّدٍ،', tr:'Allâhumma-j‘al mahyâya mahyâ Muhammadin wa âle Muhammad-in wa mamâtî mamâta Muhammadin wa âle Muhammad-in', fr:'Ô mon Dieu ! Fais-moi vivre et mourir de la même façon dont ont vécu et sont morts Mohammad et la famille de Mohammad.'},
        {t:'tri', ar:'اَللّـهُمَّ اِنَّ هذا يَوْمٌ تَبَرَّكَتْ بِهِ بَنُو اُمَيَّةَ وَابْنُ آكِلَةِ الاَْكبادِ اللَّعينُ ابْنُ اللَّعينِ عَلى لِسانِكَ وَلِسانِ نَبِيِّكَ صَلَّى اللهُ عَلَيْهِ وَآلِهِ فِي كُلِّ مَوْطِن وَمَوْقِف وَقَفَ فيهِ نَبِيُّكَ صَلَّى اللهُ عَلَيْهِ وَآلِهِ،', tr:'Allâhumma inna hâthâ yawmun tabarrakat bihi Banû Umayyata wa-bnu âkilat-il-akbâd-al-la‘înu-bnu-l-la‘îni ‘alâ lisânika wa lisâni Nabiyyika çalla-llâhu ‘alayhi wa âlihi fi kulli mawtinin wa mawqifin waqafa fîhi Nabiyyuka çallâ-llâhu ‘alayhi wa âlihi', fr:'Ô mon Dieu ! C’est un jour dont se sont félicités les Banû Omayyah et le fils de la Dévoreuse de foies, le maudit fils du maudit, maudit par Ta bouche et par la bouche de Ton Prophète (P) dans chaque endroit et dans chaque demeure où s’est arrêté Ton Prophète (P).'},
        {t:'tri', ar:'اَللّـهُمَّ الْعَنْ اَبا سُفْيانَ وَمُعاوِيَةَ وَيَزيدَ ابْنَ مُعاوِيَةَ عَلَيْهِمْ مِنْكَ اللَّعْنَةُ اَبَدَ الآبِدينَ،', tr:'Allâhumma-l‘an Abâ Sufiyâna wa Mu‘âwiya-ta wa Yazîda-bna Mu‘âwiya-ta ‘alayhim minka-l-la‘natu abada-l-âbidîn-a', fr:'Ô mon Dieu ! Maudis Abâ Sufyân, Mu‘âwiyah et Yazîd, fils de Mu‘âwiyah ; que Ta malédiction soit sur eux pour l’éternité.'},
        {t:'tri', ar:'وَهذا يَوْمٌ فَرِحَتْ بِهِ آلُ زِياد وَآلُ مَرْوانَ بِقَتْلِهِمُ الْحُسَيْنَ صَلَواتُ اللهِ عَلَيْهِ،', tr:'Wa hâthâ yawmun farihat bihi âlu Ziyâd wa âlu Marwân bi-qatlihimu-l-Husayn çalawâtu-llâh ‘alayhi', fr:'C’est un jour où les Âle Ziyâd et les Âle Marwân se sont réjouis d’avoir assassiné al-Hussayn, que les Prières d’Allah soient sur lui.'},
        {t:'tri', ar:'اَللّـهُمَّ فَضاعِفْ عَلَيْهِمُ اللَّعْنَ مِنْكَ وَالْعَذابَ (الاَْليمَ)', tr:'Allâhumma fa-dhâ‘if ‘alayhimu-l-la‘na minka wa-l-‘athâb-al-alîm', fr:'Ô mon Dieu ! Double donc sur eux la malédiction venant de toi et le châtiment terrible.'},
        {t:'tri', ar:'اَللّـهُمَّ اِنّي اَتَقَرَّبُ اِلَيْكَ فِي هذَا الْيَوْمِ وَفِي مَوْقِفي هذا وَاَيّامِ حَياتي بِالْبَراءَةِ مِنْهُمْ وَاللَّعْنَةِ عَلَيْهِمْ وَبِالْمُوالاةِ لِنَبِيِّكَ وَآلِ نَبِيِّكَ عَلَيْهِ وَعَلَيْهِمُ اَلسَّلامُ', tr:'Allâhumma innî ataqarrabu ilayka fî hâthâ-l-yawmi wa fî mawqifî hâthâ wa ayyâmi hayâtî bi-l-barâ’ati minhum wa-l-la‘nati ‘alayhim wa bi-l-muwâlâti li- Nabbiyyika wa âle Nabiyyika ‘alayhi wa ‘alayhimu-s-salâm', fr:'Ô mon Dieu ! Je recherche Ta proximité en ce jour, dans cet endroit et pour tous les jours de ma vie, en les désavouant, en les maudissant, et en éprouvant de l’amour pour Ton Prophète et pour les membres de la famille de Ton Prophète, que la paix soit sur lui et sur eux.'},
        {t:'instruction', tx:'PUIS RÉCITER CENT FOIS :'},
        {t:'tri', ar:'ذلِكَ، اَللّـهُمَّ الْعَنْ اَوَّلَ ظالِم ظَلَمَ حَقَّ مُحَمَّد وَآلِ مُحَمَّدٍ وَآخِرَ تابِعٍ لَهُ عَلى ذلك', tr:'Allâhumma-l‘an awwala dhâlimin dhalama haqqa Muhammadin wa âle Muhammad wa âkhira tâbi‘in lahu ‘alâ thâlika', fr:'Ô mon Dieu ! Maudis le premier oppresseur qui a opprimé le bon droit de Muhammad et des Âle Muhammad et le dernier qui l’a suivi en cela.'},
        {t:'tri', ar:'اَللّـهُمَّ الْعَنِ الْعِصابَةَ الَّتي جاهَدَتِ الْحُسَيْنَ (عليه السلام) وَشايَعَتْ وَبايَعَتْ وَتابَعَتْ عَلى قَتْلِهِ،', tr:'Allâhumma-l‘ani-l-‘içâbat-al-latî jâhadati-l-Husayn wa châya‘at wa bâya‘at wa tâba‘at ‘alâ qatlihi', fr:'Ô mon Dieu ! Maudis la bande qui a combattu al-Husayn, qui s’est liguée, qui a pactisé et qui s’est compromise en vue de son assassinat.'},
        {t:'tri', ar:'اَللّـهُمَّ الْعَنْهُمْ جَميعاً', tr:'Allâhumma-l‘anhum jamî‘an', fr:'Ô mon Dieu ! Maudis-les tous.'},
        {t:'instruction', tx:'PUIS RÉCITER CENT FOIS CE QUI SUIT (LES CENT BÉNÉDICTIONS) :'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا اَبا عَبْدِاللهِ وَعَلَى الاَْرْواحِ الَّتي حَلَّتْ بِفِنائِكَ عَلَيْكَ مِنّي سَلامُ اللهِ اَبَداً ما بَقيتُ وَبَقِيَ اللَّيْلُ وَالنَّهارُ', tr:'As-salâmu ‘alayka yâ Abâ ‘Abdillâh-i wa ‘alâ-l-arwâh-il-latî hallat bi-finâ’ika ‘alayka minnî salâmu-llâhi abadan mâ baqîtu wa baqiya-l-laylu wan-nahâr-u', fr:'Que la paix soit sur toi, ô Abâ Abdillâh, ainsi que sur les âmes qui demeurent en ton seuil. Sur toi, de ma part, le salâm d’Allah pour toujours tant que j’existe et que durent la nuit et le jour.'},
        {t:'tri', ar:'وَلا جَعَلَهُ اللهُ آخِرَ الْعَهْدِ مِنّي لِزِيارَتِكُمْ،', tr:'Wa lâ ja‘alahu-llâh âkhira-l-‘ahdi minnî li-ziyâratikum', fr:'Qu’Allah ne fasse pas que ce soit mon dernier engagement à vous rendre visite.'},
        {t:'tri', ar:'اَلسَّلامُ عَلَى الْحُسَيْنِ وَعَلى عَلِيِّ بْنِ الْحُسَيْنِ وَعَلى اَوْلادِ الْحُسَيْنِ وَعَلى اَصْحابِ الْحُسَيْنِ،', tr:'As-salâmu ‘alâ-l-Husayn wa ‘alâ ‘Aliyy-ibn-il-Husayn-i wa ‘alâ awlâdi-l-Husayn-i wa ‘alâ açhâbi-l-Husayn-i', fr:'Que la paix soit sur al-Husayn, sur Ali fils d’al-Husayn, sur les enfants d’al-Husayn et sur les compagnons d’al-Husayn.'},
        {t:'tri', ar:'اَللّـهُمَّ خُصَّ اَنْتَ اَوَّلَ ظالِم بِاللَّعْنِ مِنّي وَابْدَأْ بِهِ اَوَّلاً ثُمَّ (الْعَنِ) الثّانيَ وَالثّالِثَ وَالرّابِعَ اَللّـهُمَّ الْعَنْ يَزيدَ خامِساً وَالْعَنْ عُبَيْدَ اللهِ بْنَ زِياد وَابْنَ مَرْجانَةَ وَعُمَرَ بْنَ سَعْد وَشِمْراً وَآلَ اَبي سُفْيانَ وَآلَ زِياد وَآلَ مَرْوانَ اِلى يَوْمِ الْقِيامَةِ', tr:'Allâhumma khuçça anta awwala dhâlimin bi-l-la‘ni minnî wa-bda’ bihi awwalan thumma-th-thâniya wa-th-thâlitha wa-r-râbi‘a Allâhumma-l‘an Yazîda khâmisan wa-l‘an ‘Ubayda-llâhi-bna Ziyâd wa-bna Marjâna wa ‘Umara-bna Sa‘d wa Chimran wa âla Abî Sufiyâna wa âla Ziyâd wa âla Marwâna ilâ yawmi-l-qiyâmah', fr:'Ô mon Dieu ! Destine de ma part la malédiction sur le premier des oppresseurs et commence par lui en premier. Puis maudis le deuxième, le troisième et le quatrième. Ô mon Dieu !, maudis Yazîd en cinquième puis maudis ‘Ubaydallâh Ibn Ziyâd, Ibn Marjânah, ‘Omar Ibn Sa‘d, Chimr, les Âle Abû Sufiyân, les Âle Ziyâd et les Âle Marwân jusqu’au Jour de la Résurrection.'},
        {t:'instruction', tx:'PUIS SE PROSTERNER (SUJÛD) ET RÉCITER :'},
        {t:'tri', ar:'اَللّـهُمَّ لَكَ الْحَمْدُ حَمْدَ الشّاكِرينَ لَكَ عَلى مُصابِهِمْ اَلْحَمْدُ للهِ عَلى عَظيمِ رَزِيَّتي', tr:'Allâhumma laka-l-hamdu hamda-ch-châkirîna laka ‘alâ muçâbihim, al-hamdu li-llâhi ‘alâ ‘adhimi raziyyatî', fr:'Ô mon Dieu ! Louange à Toi, pareille à la louange de ceux qui Te remercient de leur deuil. Louange à Toi pour l’immensité de mon affliction.'},
        {t:'tri', ar:'اَللّـهُمَّ ارْزُقْني شَفاعَةَ الْحُسَيْنِ يَوْمَ الْوُرُودِ وَثَبِّتْ لي قَدَمَ صِدْق عِنْدَكَ مَعَ الْحُسَيْنِ وَاَصْحابِ الْحُسَيْنِ اَلَّذينَ بَذَلُوا مُهَجَهُمْ دُونَ الْحُسَيْنِ عَلَيْهِ السَّلامُ.', tr:'Allâhum-mar-zuqnî chafâ‘ati-l-Husayn-i yawma-l-wurûdi wa thabbit lî qadama çidqin ‘indaka ma‘a-l-Husayni wa açhâbi-l-Husayni allathîna bathalû muhajahum dûna-l-Husayni ‘alayhi-s-salâm-u', fr:'Ô mon Dieu ! Gratifie-moi de l’intercession d’al-Husayn le jour de l’Entrée (auprès de Toi) et affermis ma sincérité fidèle envers Toi aux côtés d’al-Husayn et des compagnons d’al-Husayn, qui ont sacrifié leur vie pour al-Hussayn, que la paix soit sur lui.'},
        {t:'intro', tx:'Enfin, après la ziyârah faire une prière de deux rak‘ah, suivie du Du‘â’ ‘Alqamah.'}
      ]
    },

    'z-lundi': {

        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ اَميرِ الْمُؤْمِنينَ', fr:'Que la paix soit sur toi, ô fils de l\'Émir des croyants !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يَابْنَ فاطِمَةَ الزَّهْراءِ', fr:'Que la paix soit sur toi, ô fils de Fāṭima Zahrā !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا حَبيبَ اللهِ', fr:'Que la paix soit sur toi, ô Bien-Aimé de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا صِفْوَةَ اللهِ', fr:'Que la paix soit sur toi, ô Élite de Dieu !'},
        {t:'tri', ar:'اَلسَّلامُ عَلَيْكَ يا اَمينَ اللهِ', fr:'Que la paix soit sur toi, ô Probe de Dieu !'},

// ══ BUILD SIDEBAR ══
var sbScroll = document.getElementById('sb-scroll');
var activeItemId = null;

DATA.themes.forEach(function(theme) {
  var group = document.createElement('div');
  group.className = 'sb-group';

  var themeBtn = document.createElement('div');
  themeBtn.className = 'sb-theme';
  themeBtn.innerHTML = '<span class="sb-theme-icon">'+theme.icon+'</span><span class="sb-theme-label">'+theme.label+'</span><span class="sb-chevron">›</span>';

  var itemsDiv = document.createElement('div');
  itemsDiv.className = 'sb-items';

  var currentContainer = itemsDiv;

  theme.items.forEach(function(item) {
    if (item.type === 'header') {
      var headerBtn = document.createElement('div');
      headerBtn.className = 'sb-item subheader';
      headerBtn.innerHTML = '<span class="sb-theme-label">' + item.label + '</span><span class="sb-chevron">›</span>';
      
      var subItemsDiv = document.createElement('div');
      subItemsDiv.className = 'sb-sub-items';
      
      headerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var isOpen = subItemsDiv.classList.contains('open');
        if (!isOpen) {
          subItemsDiv.classList.add('open');
          headerBtn.classList.add('open');
        } else {
          subItemsDiv.classList.remove('open');
          headerBtn.classList.remove('open');
        }
      });
      
      itemsDiv.appendChild(headerBtn);
      itemsDiv.appendChild(subItemsDiv);
      currentContainer = subItemsDiv;
    } else {
      var el = document.createElement('div');
      el.className = 'sb-item' + (item.disabled ? ' disabled' : '');
      el.textContent = (item.emoji || '') + ' ' + item.label;
      if (!item.disabled) {
        el.addEventListener('click', function() {
          document.querySelectorAll('.sb-item').forEach(function(i){ i.classList.remove('active'); });
          el.classList.add('active');
          showInvocation(item.id);
        });
      }
      currentContainer.appendChild(el);
    }
  });

  themeBtn.addEventListener('click', function() {
    var isOpen = itemsDiv.classList.contains('open');
    // Close all
    document.querySelectorAll('.sb-items').forEach(function(d){ d.classList.remove('open'); });
    document.querySelectorAll('.sb-theme').forEach(function(t){ t.classList.remove('open'); });
    if(!isOpen) {
      itemsDiv.classList.add('open');
      themeBtn.classList.add('open');
    }
  });

  group.appendChild(themeBtn);
  group.appendChild(itemsDiv);
  sbScroll.appendChild(group);
});

// ══ SIDEBAR TOGGLE ══
var sidebar = document.getElementById('sidebar');
var toggle = document.getElementById('sb-toggle');
var sidebarOpen = true;
toggle.addEventListener('click', function(){
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('collapsed', !sidebarOpen);
  toggle.textContent = sidebarOpen ? '‹' : '›';
  toggle.style.left = sidebarOpen ? '240px' : '0';
});

// ══ RENDER INVOCATION ══
// Font size controls
var _invAr = 2.0, _invFr = 1.4, _invTr = 1.1;
document.documentElement.style.setProperty('--inv-ar-size', _invAr + 'rem');
document.documentElement.style.setProperty('--inv-fr-size', _invFr + 'rem');
document.documentElement.style.setProperty('--inv-tr-size', _invTr + 'rem');
function invFs(type, dir) {
  var step = 0.1;
  if (type === 'ar') {
    _invAr = Math.min(3.0, Math.max(0.8, _invAr + dir * step));
    document.documentElement.style.setProperty('--inv-ar-size', _invAr + 'rem');
  } else if (type === 'tr') {
    _invTr = Math.min(2.5, Math.max(0.6, _invTr + dir * step));
    document.documentElement.style.setProperty('--inv-tr-size', _invTr + 'rem');
  } else {
    _invFr = Math.min(2.0, Math.max(0.6, _invFr + dir * step));
    document.documentElement.style.setProperty('--inv-fr-size', _invFr + 'rem');
  }
}

function showInvocation(id) {
  var data = DATA.invocations[id];
  if(!data) return;

  var welcome = document.getElementById('welcome');
  var content = document.getElementById('content');
  welcome.classList.add('hidden');
  content.classList.remove('hidden');
  document.getElementById('invFc').classList.add('show');

  var html = '<div class="content-inner">';
  html += '<div class="c-source">'+data.source+'</div>';
  html += '<div class="c-title">'+data.title+'</div>';
  if(data.subtitle) html += '<div class="c-subtitle">'+data.subtitle+'</div>';
  html += '<div class="c-divider"></div>';

  if(data.prose) {
    html += '<div class="c-prose">';
    data.body.forEach(function(p){
      if (typeof p === 'string') {
        html += '<p>'+p+'</p>';
      } else if (p.t === 'intro') {
        html += '<div class="c-intro">'+p.tx+'</div>';
      } else if (p.t === 'salawat') {
        html += '<div class="c-salawat">— Ṣalawāt —</div>';
      }
    });
    html += '</div>';
  } else {
    data.body.forEach(function(v){
      if(v.t === 'salawat') {
        html += '<div class="c-salawat">— Ṣalawāt —</div>';
      } else if(v.t === 'intro') {
        html += '<div class="c-intro">'+v.tx+'</div>';
      } else if(v.t === 'instruction') {
        html += '<div class="c-instruction">'+v.tx+'</div>';
      } else if(v.t === 'v') {
        html += '<div class="c-verse"><div class="c-vnum">'+v.n+'</div><div class="c-vtext">'+v.tx+'</div></div>';
      } else if(v.t === 'zv') {
        html += '<div class="c-zv"><div class="c-zv-text">'+v.tx+(v.ar?'<div class="c-zv-ar">'+v.ar+'</div>':'')+'</div></div>';
      } else if(v.t === 'tri') {
        html += '<div class="c-tri">';
        if(v.ar) html += '<div class="c-tri-ar">'+v.ar+'</div>';
        if(v.tr) html += '<div class="c-tri-tr">'+v.tr+'</div>';
        html += '<div class="c-tri-fr">'+v.fr+'</div>';
        html += '</div>';
      }
    });
  }

  html += '</div>'; // close content-inner
  content.innerHTML = html;
  content.scrollTop = 0;
  // Trigger animation
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = '';
}
</script>

<!-- Theme listener: receives theme from parent portal -->
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    var t = e.data.theme;
    document.documentElement.setAttribute('data-theme', t);
    document.body.setAttribute('data-theme', t === 'light' ? '' : 'dark');
    // Also try calling the module's own theme function
    try { if (typeof setTheme === 'function') setTheme(t); } catch(ex) {}
    try { if (typeof S !== 'undefined' && S.th !== undefined) { S.th = t === 'light' ? 'light' : 'dark'; document.body.setAttribute('data-theme', S.th); } } catch(ex) {}
    // Force canvas/render update
    try { window.dispatchEvent(new Event('resize')); } catch(ex) {}
  }
});
try {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.body.setAttribute('data-theme', '');
    try { if (typeof S !== 'undefined') { S.th = 'light'; document.body.setAttribute('data-theme', 'light'); } } catch(ex) {}
  }
} catch(e) {}
</script>

<!-- ══ Scroll-to-top ══ -->
<style>
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;background:rgba(19,29,53,0.85);border:1px solid rgba(201,168,76,0.3);border-radius:50%;color:#c9a84c;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:all .3s ease;z-index:999;backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.scroll-top-btn.visible{opacity:1;pointer-events:all}
.scroll-top-btn:hover{background:rgba(201,168,76,0.2);border-color:#c9a84c;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4),0 0 12px rgba(201,168,76,0.15)}
.scroll-top-btn:active{transform:translateY(0)}
.scroll-top-btn svg{width:20px;height:20px}
[data-theme="light"] .scroll-top-btn{background:rgba(225,218,206,0.9)!important;border-color:rgba(122,92,36,0.25)!important;color:#7a5c24!important;box-shadow:0 4px 16px rgba(60,45,20,0.12)!important}
[data-theme="light"] .scroll-top-btn:hover{background:rgba(235,228,216,0.95)!important;border-color:#7a5c24!important;box-shadow:0 6px 20px rgba(60,45,20,0.18),0 0 12px rgba(122,92,36,0.1)!important}
</style>
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Retour en haut" title="Retour en haut">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script>
(function(){
  var btn=document.getElementById('scrollTopBtn');
  if(!btn) return;
  var scroller=document.querySelector('.content-area')||document.querySelector('.main-content')||document.querySelector('.main')||document.querySelector('.content')||null;
  var target=scroller||document.documentElement;
  var eventTarget=scroller||window;
  function check(){
    var st=scroller?scroller.scrollTop:(window.pageYOffset||document.documentElement.scrollTop);
    btn.classList.toggle('visible',st>250);
  }
  eventTarget.addEventListener('scroll',check,{passive:true});
  btn.addEventListener('click',function(){
    target.scrollTo({top:0,behavior:'smooth'});
  });
  check();
})();
</script>

<script>
// ── Global Search relay ───────────────────────────────────────────────
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'gs-navigate' && e.data.state) {
    if (typeof showInvocation === 'function') showInvocation(e.data.state);
  }
});
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    try { window.parent.postMessage({type:'gs-open'}, '*'); } catch(ex) {}
  }
});
</script>

</body>
</html>
