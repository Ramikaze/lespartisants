        '30. Mutawakkil dit : Alors j\'ai pris le parchemin-sahifa. Lorsque Yahya Ibn Zayd fut tué, je suis allé à Médine pour rencontrer [Imam] Abu Abd Allah [Ja‘far As-Sâdeq], que la Paix soit avec lui. Je lui ai rapporté les propos de Yahya. Il se mit à pleurer avec une intense compassion.',
        '31. Il dit : Que Dieu étende sa Miséricorde sur le fils de mon oncle paternel.',
        '32. Qu\'IL le place en compagnie de ses parents et grands-parents ! Par Dieu ! Ô Mutawakkil ! Le seul fait qui m\'a poussé à lui remettre l\'invocation était la crainte qu\'il ressentait pour la sauvegarde du parchemin-sahifa de son père. Où est ce parchemin ? – Je lui ai répondu : il est ici. Il le déroula en disant : Par Dieu ! Ceci est l\'écriture de mon oncle paternel Zayd et l\'invocation de mon grand-père Ali Ibn Al-Hossein, que la Paix soit sur eux deux.',
        '33. Puis il dit à son fils : Debout, Ô Ismaël<sup id="ref-17"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-17\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[17]</a></sup>, et apporte les supplications que je t\'ai demandé de mémoriser et de sauvegarder. Donc, Ismaël se leva et il apporta un parchemin-sahîfa en tout point identique à celui que Yahya m\'avait remis.',
        '34. Abu Abd Allâh l\'embrassa et la posa sur ses yeux en disant : Ceci est l\'écriture de mon père sous la dictée de mon grand-père, que la Paix soit avec eux deux, j\'en ai été le témoin.',
        '35. J\'ai dit : Ô fils du Messager de Dieu ! Ne serait-il pas convenable pour moi de la comparer au parchemin en provenance de Zayd et de Yahya ? Il m\'accorda l\'autorisation de la comparaison en me disant : Je te considère digne de cela.',
        '36. J\'ai comparé et j\'ai constaté qu\'il s\'agissait bien d\'un seul et même sujet. Je n\'ai découvert aucune lettre qui soit différente ni dans l\'un ni dans l\'autre des parchemins-sahîfa.',
        '37. Aussi, j\'ai demandé la permission à Abu Abd Allâh de remettre le parchemin-sahîfa aux deux fils de Abd Allah Ibn Al-Hassan. Il me dit : Dieu vous ordonne de restituer les dépôts<sup id="ref-18"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-18\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[18]</a></sup>. D\'accord, tu peux les leur remettre.',
        '38. Lorsque j\'ai fait signe de bouger pour aller à leur rencontre, il me dit : Ne te déranges pas !',
        '39. Il envoya chercher Mohammed et Ibrahim qui nous rejoignirent. Il dit : C\'est là l\'Héritage du fils de votre oncle paternel Yahya, qu\'il détenait de son père. Il vous a choisi pour cela au lieu et place de ses propres frères. Toutefois, nous vous imposerons une condition concernant cet héritage.',
        '40. Ils dirent : Que la Miséricorde soit sur toi ! Dis-nous et tes recommandations seront acceptées.',
        '41. Il répondit : Ne quittez pas Médine accompagnés de ce parchemin-sahîfa !',
        '42. Ils demandèrent : Et pourquoi cela ?',
        '43. Il déclara : Le fils de votre oncle paternel a craint pour lui la même chose que je crains pour vous.',
        '44. Ils rétorquèrent : Il a craint pour lui seulement lorsqu\'il a appris qu\'il serait assassiné.',
        '45. Abu Abd Allâh, que la Paix soit sur lui, les avertit : Quant à vous ne vous croyez pas à l\'abri ! Par Dieu ! Je sais que vous vous révolterez comme il s\'est révolté, et vous serez tués comme il a été tué !',
        '46. Ils se levèrent en disant : Il n\'y a de force ni de puissance que par de Dieu, le Très-Haut, le Très Grand<sup id="ref-19"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-19\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[19]</a></sup>.',
        '47. Lorsqu\'ils se révoltèrent Abu Abd Allâh, que la Paix soit avec lui, me dit : Ô Mutawakkil ! Que t\'a dit Yahya ? En vérité mon oncle paternel Mohammed Ibn Alî et son fils Ja‘afar appellent les gens à la vie, et nous les appelons à la mort.',
        '48. J\'ai répondu : Oui, Dieu est Témoin que tu dis la vérité ! Le fils de ton oncle paternel Yahya m\'a bien dit cela.',
        '49. Il communiqua ceci : Que la miséricorde de Dieu soit avec Yahya ! Mon père a rapporté de son père qui le tenait de son grand-père qui le tenait de Ali, que la Paix soit sur lui, que le Messager de Dieu, que la Paix et les Bénédictions de Dieu soient avec lui, fut arrêté dans ses mouvements pour un instant alors qu\'il était en chair.',
        '50. Il eut la vision de quelques hommes bondissant sur la chaire tels des singes et faisant perdre aux gens leurs niveaux atteints.',
        '51. Alors, le Messager de Dieu, que la Paix et les Bénédictions de Dieu soient sur lui et sur les Gens de sa demeure, s\'assit, laissant apparaître sur son visage son inquiétude.',
        '52. Ensuite, l\'Archange Gabriel, que la Paix soit sur lui, vint à lui pour lui révéler ce verset : Nous n\'avons fait de la vision que Nous t\'avons montrée ainsi que l\'arbre maudit, mentionné dans le Coran, qu\'une tentation pour les hommes. Nous les menaçons, mais cela ne fait qu\'accroître leur grande rébellion<sup id="ref-20"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-20\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[20]</a></sup>.',
        '53. Il demanda : Ô Gabriel ! Cela aura-t-il lieu durant ma Mission et à mon époque ?',
        '54. Il répondit : Non, parce que le cours de l\'Islam se maintiendra avec ton émigration-Hégire mais il sera arrêté une dizaine d\'années après cet événement. Alors, à partir de là, il faudra attendre trente-cinq années avant que le cours reprenne vie pour une période d\'environ cinq années seulement. Elles déboucheront sur un courant porteur d\'erreurs et d\'installation de la dynastie des Pharaons.',
        '55. Il dit : Dieu a fait descendre à ce propos : Oui, Nous l\'avons fait descendre durant la Nuit du Décret ? Comment pourrais-tu savoir ce qu\'est la Nuit du Décret ? La Nuit du Décret est meilleure que mille mois ! <sup id="ref-21"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-21\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[21]</a></sup> période durant laquelle les Umayyades seront à la tête des affaires musulmanes, période aussi durant laquelle il n\'y aura pas de Nuit du Décret.',
        '56. Il ajouta : Donc, Dieu transmit ces nouvelles à Son Prophète Mohammed, que la Paix et les Bénédictions de Dieu soient sur lui et sur sa famille concernant la durée de la dynastie des Omayyades sur la communauté et qu\'à la fin de cette période leur règne sera déchu.',
        '57. Alors que les montagnes rivalisaient avec eux, ils s\'imposèrent à elles jusqu\'au moment où Dieu, Exalté soit-IL, donna la permission de la déchéance de leur dynastie ; durant cette période ils hissèrent la bannière de l\'inimitié et de la haine envers nous, les Gens de la Maison-Ahlul Beyt.',
        '58. Dieu confirma à Son Prophète tout ce qui arrivera aux Gens de sa Demeure, à propos des gens qui leur témoigneront leur affection, et ce qu\'il adviendra de leurs partisans durant les jours de la dynastie des Omayyades.',
        '59. Il confirma en disant que Dieu a fait descendre à leur propos : N\'as-tu pas vu ceux qui échangent les bienfaits de Dieu contre l\'incrédulité et qui établissent leur peuple dans la demeure de la perdition ; dans la Géhenne où ils brûleront ? Quel détestable lieu de séjour !<sup id="ref-22"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-22\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[22]</a></sup>',
        '60. La Grâce de Dieu est en Mohammed et dans les Gens de sa Demeure. L\'affection à leur égard c\'est la foi qui ouvre au Jardin, et l\'inimitié à leur égard c\'est de l\'incroyance et une hypocrisie qui ouvrent à l\'Enfer.',
        '61. Raison pour laquelle le Messager de Dieu, que la Paix et les Bénédictions de Dieu soient avec lui et sur Sa Famille, nous a confiés à Ali et aux Gens de sa Demeure.',
        '62. Il compléta en disant : Puis, Abu Abd Allâh, que la Paix soit avec lui, dit : Avant la parousie de notre Qa‘îm<sup id="ref-23"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-23\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[23]</a></sup> aucun d\'entre les Gens de la Demeure ne se sera soulevé ou aura eu le désir de se révolter pour repousser une injustice ou pour relever un droit sans que cela ne lui amène de la peine et sans que son soulèvement n\'augmente l\'adversité à notre égard et à l\'égard de nos partisans.',
        '63. Al-Mutawakkil ibn Harun dit : Puis, Abu Abd Allâh me dicta les invocations composées de soixante-quinze chapitres. J\'en ai égaré onze d\'entre elles et sauvegardé une soixantaine.',
        '64. Abi-l-Mufaddal nous<sup id="ref-24"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-24\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[24]</a></sup> a rapporté en disant : Mohammed Ibn Al-Hassan Ibn Ruzbih Abu Bakr Al-Mada‘ini<sup id="ref-25"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-25\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[25]</a></sup>, scribe vivant à Rahba, nous a relaté dans sa maison.',
        '65. Il dit : Mohammed Ibn Ahmad Ibn Muslim Al-Mutahhari<sup id="ref-26"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-26\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[26]</a></sup> m\'a rapporté.',
        '66. Me disant : Mon père m\'a transmis de Umayr Ibn Mutawakkil Al-Balkhi qui le tenait de son père Mutawakkil ibn Harûn.',
        '67. Il a dit : J\'ai rencontré Yahya Ibn Zayd Ibn Alî, que la Paix soit sur eux deux. Puis, il fit mention du hadith en entier concernant la vision du Prophète, que Dieu le bénisse ainsi que les Gens de sa Demeure dont la mention fut faite par Ja‘afar Ibn Mohammed qui le tenait de ses ascendants, que les Bénédictions de Dieu soient sur eux.',
        '68. Pour toute la version de Al-Mutahhari, les chapitres mis en avant sont les suivants : 1. Louange à Dieu – 2. Bénédictions sur Mohammed et sur les Gens de sa Maison – 3. Bénédictions sur les Serviteurs du Trône – 4. Bénédictions sur ceux qui témoignent des Prophètes – 5. Ses Invocations pour Lui-Même et pour Ses Amis Rapprochés. 6. Son Invocation pour l\'Aube et le Crépuscule – 7. Son Invocation lors des Tâches préoccupantes – 8. Son Invocation pour Son Abri sûr – 9. Son Invocation dans Son Désir – 10. Son Invocation à la Recherche du Refuge de Dieu – 11. Son Invocation pour les Bons Résultats – 12. Son Invocation pour la Confidence – 13. Son Invocation dans la Recherche des moyens d\'existence – 14. Son Invocation pour préserver des mauvaises actions – 15. Son Invocation pour la Guérison – 16. Son Invocation pour la Libération – 17. Son Invocation contre Satan – 18. Son Invocation dans les Périls – 19. Son Invocation dans la Demande de Pluie – 20. Son Invocation pour posséder des traits de caractères nobles – 21. Son Invocation lorsqu\'un fait est attristant – 22. Son Invocation dans les difficultés – 23. Son Invocation pour le Bien-être – 24. Son Invocation pour les Parents – 25. Son Invocation pour les Enfants – 26. Son Invocation pour les voisins et les amis – 27. Son Invocation pour les gens des frontières – 28. Son Invocation dans la fuite face au danger – 29. Son Invocation lorsque Ses provisions sont rationnées – 30. Son Invocation pour être aidé dans le remboursement des dettes – 31. Son Invocation pour le Repentir – 32. Son Invocation lors de la prière de la nuit – 33. Son Invocation lors de la demande du Meilleur – 34. Son Invocation lors de l\'affliction – 35. Son Invocation pour la Satisfaction de Son Décret – 36. Son Invocation lorsque l\'on entend le tonnerre – 37. Son Invocation en formulant des Remerciements – 38. Son Invocation lorsque l\'on demande le Pardon – 39. Son Invocation lorsque l\'on est à la recherche du Pardon – 40. Son Invocation lorsque le moment de la Mort est venu – 41. Son Invocation lorsque l\'on aspire à une protection – 42. Son Invocation lors de la lecture du Coran – 43. Son Invocation lorsque apparaît la nouvelle Lune – 44. Son Invocation au début du Mois de Ramadan – 45. Son Invocation pour saluer la fin du Mois de Ramadan – 46. Son Invocation lors de la rupture du jeûne ainsi que pour le vendredi – 47. Son Invocation pour le jour d\'Arafa – 48. Son Invocation pour le Jour du Sacrifice et pour le Vendredi – 49. Son Invocation pour repousser les ruses des ennemis – 50. Son Invocation dans la Crainte – 51. Son Invocation dans l\'Imploration et l\'Humiliation – 52. Son Invocation pour implorer Dieu – 53. Son Invocation dans l\'acte d\'humilité devant Le Glorieux, L\'Exalté – 54. Son Invocation pour éloigner les soucis.',
        '69. Les chapitres précédents sont attribués aux citations de Abu Abd Allah Al-Hassani, que la Miséricorde de Dieu soit sur lui.',
        '70. Abi Abd Allah Ja‘afar Ibn Mohammed Al-Hassani nous a relaté<sup id="ref-27"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-27\') && document.getElementById(\'note-27\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[27]</a></sup> ;',
        '71. ayant dit : Abd Allah Ibn Omar Ibn Khattab Al-Zayyat nous a rapporté ;',
        '72. ayant dit : Khali Ibn Nu‘man Al-A‘lam nous a rapporté ;',
        '73. ayant dit : Umayr Ibn Mutawakkil Al-Thaqafi Al-Balkhi nous a rapporté d\'après son père Mutawakkil Ibn Harun ;',
        '74. ayant dit : Mon maître véridique, Abou Abd Allah Ja‘afar Ibn Mohammed m\'a dicté ;',
        '75. ayant dit : Mon grand-père Ali Ibn Al-Hossein dicta à mon père Mohammed Ibn Ali – que la Paix soit sur eux – et j\'en fus témoin.',
        {t:'instruction', tx:'Notes:'},
        '<span id="note-3"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-3\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[3]</a></span> Le nom du Seyyed Najm Al-Dînbahâ’ Al-Sharaf Abu Al-Hassan Mohammed Ibn Ahmad Ibn Ali Ibn Mohammed Ibn Umar Ibn Yahya Al-Alawi Al-Hassani n\'est mentionné nulle part ailleurs hormis ce texte. Cependant, les exégètes n\'attribuent à cet état de chose aucune conséquence négative car le texte est bien Mutawatir-c\'est-à-dire une tradition transmise par de nombreux rapporteurs, ce qui porte à constater qu\'elle n\'a pu être inventée. En outre, il s\'agit là d\'une chaîne d\'autorisation et non d\'une chaîne de transmission, autrement dit, le texte lui-même nous est parvenu, certes, par divers canaux, mais l\'autorisation de l\'enseigner dans sa forme première fut confiée aux personnalités dont il est fait mention ci-après. Ajoutons, qu\'il n\'est pas raisonnable de penser que cette chaîne d\'autorisation soit délibérément forgée de toutes pièces, il eut fallu dans ce cas un faussaire de haut niveau.',
        '<span id="note-4"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-4\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[4]</a></span> Il y a une certaine confusion concernant l\'identité du « nous » en début de la chaîne d\'autorisation. Elle est créée du fait de la présence de deux savants mentionnée dans les diverses chaînes de transmission de Sahifa. Cheikh Baha\'î, l\'un des nombreux exégètes ayant travaillé sur le sujet de Sahifa, soutient que « nous » indique Ali Ibn Al-Sukûn – Ali Al-Hassan Ali Ibn Mohammed Ibn Mohammed Ibn Ali Ibn Mohammed Ibn Mohammed Ibn Sukûn Al-Hilli, décédé en 606/1209 –. Dans ses commentaires concernant Sahifa, Mir Dâmâd écrit qu\'il s\'agit de ‘Amid Al-Ru\'asa’ Hibat Allah Ibn Hâmid Ibn Ahmad Ibn Ayyûb Al-Hilli – décédé en l\'an 610/1213.1214 –. Pour appuyer cette affirmation, il fait état du manuscrit de Al-Shahid Al-Awwal pour l\'avoir collationné de celui de Ibn Al-Sukûn dont ‘Amid Al-Ru\'asa en fit certaines annotations en l\'an 603/1206.',
        '<span id="note-5"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-5\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[5]</a></span> Il fut le gendre de Cheikh Al-Ta\'ifa Abu Ja\'afar Al-Tusi – décédé en 460/1067.8. –. Il fut une personnalité officielle du Sanctuaire de Ali à Nadjaf.',
        '<span id="note-6"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-6\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[6]</a></span> Sayyed ‘Alikhan écrit à propos de Al-‘Ukbari que son nom ne semble pas apparaître dans les ouvrages biographiques des Chiites, alors que Al-Samani le mentionne dans Al-Ançab – ajoutant Ibn Al-Hossein à son nom après Ibn Ahmad –, et faisant état de l\'année 472/179.80. retenue pour son décès.',
        '<span id="note-7"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-7\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[7]</a></span> Sayyed ‘Alikhan mentionne quatre sources concernant Abi Al-Muffadal en tant que Muhaddith-Rapporteur de hadiths. Tout ce qui concerne ce sujet est relaté par : Najashi ; Scheikh Al-Ta\'îfa Al-Tusi ; Ibn Al-Ghada\'iri et Abi Dawoud.',
        '<span id="note-8"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-8\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[8]</a></span> Najashi en fait l\'éloge en tant que personne digne de confiance. Il fait mention de bon nombre d\'ouvrages rattachés à son autorité. Il décéda en 308/921, à plus de quatre-vingt-dix ans [Sayyed Alikhan].',
        '<span id="note-9"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-9\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[9]</a></span> Selon Sayyed Alikhan, rien n\'est connu de lui.',
        '<span id="note-10"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-10\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[10]</a></span> Najashi fait état d\'un personnage nommé Ali Ibn Al-Nu\'man Al-A\'lam Al-Nakha\'ï connu pour être un compagnon du huitième Imam Ali Al-Redha – décédé en l\'an 203/818 –.',
        '<span id="note-11"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-11\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[11]</a></span> Ni le nom de ‘Umayr Ibn Mutawakkil ni celui de son père Mutawakkil Ibn Harun n\'apparaissent dans les pages de l\'Histoire. Cependant, Najashi et Cheikh Al-Tusi nomment Al-Mutawakkil Ibn Umayr Ibn Al-Mutawakkil en tant que rapporteur de Sahifa d\'après Yahya Ibn Zayd. A partir de lui, ils font état d\'une chaîne d\'autorisation différente de celle mentionnée dans le présent texte. Tel le souligne Sha\'rani, compte tenu de leur ancienneté et de leur agrément, le nom qu\'ils avancent est à préférer au nom mentionné dans le présent texte.',
        '<span id="note-12"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-12\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[12]</a></span> Cela eut lieu probablement en l\'an 122/740. Tel il est su, après le décès du fils et successeur de Zayn Al-Abidin connu sous le nom de Mohammed Al-Baqir, le fils de celui-ci, Zayd, se souleva contre bablement Mutawakkil Ibn ‘Umayr – rencontra Yahya fils de Zayd peu de temps avant qu\'il ne soit tué alors qu\'il poursuivait le soulèvement de son père.',
        '<span id="note-13"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-13\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[13]</a></span> « Dieu efface ou confirme ce qu\'IL veut. La Mère du Livre se trouve auprès de Lui ». (Coran 13/39) En accord avec Sayyed Alikhan, Yahya, en faisant mention de ce verset, suggère que même s\'il s\'agit bien du Commandement de Dieu connu de As-Sâdeq, Dieu peut le modifier. C\'est là la doctrine chiite de bada’-modification apparente dans le Décret divin ou le Pouvoir de Dieu de modifier Son Décret à l\'encontre de Ses Créatures. [Voir aussi : Majma Al-Bahrayn – Scheikh Fakhr Al-Din Al-Tourayhi – 979-1085 de l\'Hégire – éd. : Maison Al-Bi\'itha ; Département des Etudes islamiques – Qom – République islamique d\'Iran – 1416 de l\'Hégire lunaire – Tome 1 – p. 125.126. Note des traducteurs de la version en langue française de Sahifa]. L\'Imam Ja‘afar cite, également, ce verset pour appuyer la possibilité de bada’.',
        '<span id="note-14"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-14\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[14]</a></span> L\'usage de l\'expression Al-Sahifat Al-Kamila laisse penser que les Sahifa furent nommées ainsi dès le début. Dans une explication de la terminologie de l\'expression en question, Sayyed Alikhan cite un passage extrait de Ma\'alim Al-Ulama de Ibn Shahrashub – décédé en l\'an 588/1192 –.',
        '<span id="note-15"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-15\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[15]</a></span> Dans les notes de sa traduction en Persan, Sha\'rani porte à notre connaissance que le terme Sahifa signifie un manuscrit enroulé autour d\'une tige métallique aux extrémités de laquelle il y avait des fermetures, et muni d\'un sceau de cire.',
        '<span id="note-16"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-16\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[16]</a></span> Mohammed est davantage connu sous le nom de Al-Nafs Al-Zakiyya. Il fut désigné comme étant le Mahdi par son père et nombreux furent ceux qui lui prêtèrent allégeance, y compris Al-Mansour qui plus tard devint le premier calife abbasside. Mohammed et Ibrahim se soulevèrent, appuyé par une grande partie de l\'opinion publique, lorsque les Abbassides tentèrent de leur imposer leur autorité. Mohammed, soutenu par les gens de Médine, fut tué lors d\'une rude bataille, en l\'an 145/762 ; quant à Ibrahim, soutenu par les Zaïdites et les groupes de Mu\'tazilites de Kufa et de Basra, il fut tué quelques mois plus tard.',
        '<span id="note-17"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-17\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[17]</a></span> Ismaël fut le fils aîné de l\'Imam Ja‘afar et son successeur désigné. Cependant, il décéda avant son père ce qui l\'amena a désigné son second fils Mussa à la charge d\'Imam après lui. Les Ismaéliens choisirent de suivre Ismaël et non Mussa, soutenant que leur point de vue était légitime d\'autant que l\'Imamat demeurait dans sa famille.',
        '<span id="note-18"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-18\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[18]</a></span> « Dieu vous ordonne de restituer les dépôts et de juger selon la justice, lorsque vous jugez entre les hommes ». (Coran 4/58)',
        '<span id="note-19"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-19\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[19]</a></span> Une invocation souvent répétée dans de nombreux hadiths.',
        '<span id="note-20"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-20\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[20]</a></span> Coran 17/60. – Les exégètes du Coran proposent trois interprétations concernant cette vision. A propos de la troisième, Baydawi écrit : « Il est également dit que le Prophète vit un groupe de Omayyades assiégeant sa chaire et bondissant dessus tels des singes. – Alors, il dit : C\'est-là leur participation à la vie immédiate de ce monde ; ils voulaient la détenir pour accepter l\'Islam ». D\'après cette interprétation, ce qui est sous-entendu par « qu\'une tentation pour les hommes » correspond bien à ce qui eut lieu durant leur époque [Anwar Al-Tanzil, commentaire du verset 60 de la sourate 17]. Le commentateur chiite Tabarsi propose aussi cette affirmation en tant que troisième possibilité s\'appuyant sur deux hadiths [Majma‘a Al-Bayan]. Sayyed Alikhan rapporte de Baydawi et d\'autres à des fins de soutenir cette interprétation ; alors que Ibn Abbas parmi d\'autres, en tant que personne d\'autorité concernant cet événement, propose pour ces « trois maudites » l\'unique référence rattachée aux Omayyades.',
        '<span id="note-21"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-21\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[21]</a></span> Coran 97/1 à 3 – Tarmidhi propose un hadith rattaché à Al-Hassan Ibn Ali soutenant que l\'interprétation des mille mois concerne bien les Omayyades [Tafseer de la sourate 97, verset 1].',
        '<span id="note-22"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-22\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[22]</a></span> Coran 14/28.29.',
        '<span id="note-23"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-23\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[23]</a></span> Le Douzième Imam, celui qui se « lèvera–qa’ïm » au nom de la Vérité et pour la Vérité, il culbutera les ennemis de la Vérité.',
        '<span id="note-24"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-24\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[24]</a></span> L\'auteur, ici, est Al-Ukbari, connu aussi pour avoir fait état d\'une autre chaîne de qui il reçut Sahifa de Abu Al-Mufaddal.',
        '<span id="note-25"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-25\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[25]</a></span> Son nom est méconnu dans les ouvrages biographiques.',
        '<span id="note-26"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-26\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[26]</a></span> Son nom est également méconnu dans les ouvrages biographiques.'
      ]
    },


    'dua-simaat-intro': {
      source: 'Du\'â as-Simât',
      title: 'L\'Invocation des Marques (as-Simât)',
      subtitle: 'Introduction et mérites',
      prose: true,
      body: [
        {t:'intro', tx:'Introduction'},
        "Du’â’ as-Simât (en arabe : السمات دعاء) est une invocation rapportée par l’Imam al-Bâqir (a), qui est recommandée de réciter dans les dernières heures du vendredi.",
        "Selon un hadith de l’Imam Muhammad al-Bâqir (a), le Grand Nom d’Allah (الأعظم الإسم) est mentionné dans cette invocation. Les savants chiites écrivirent de nombreuses exégèses sur ce du’â’.",
        '"Simât" est le pluriel de "Simmah" qui signifie : le signe. Il est dit que cette invocation fut nommée as-Simât, car ce du’â contient beaucoup de signes de l’exaucement des prières.',
        "L’invocation d’as-Simât fut rapportée par : Cheikh at-Tûsî dans le livre Misbâh al-mutahajjid, Ibn Tâwûs dans le livre Jamal al-usbû’, al-Kaf’amî dans les livres al-Balad al-amîn et al-Misbâh, ’Allâma al-Majlisî dans les livres Bihâr al-anwâr et Zâd al-ma’âd, avec des chaînes de transmission authentiques de Muhammad b. ’Uthmân al-’Amrî (l’un des quatre représentants de l’Imam al-Mahdi (a)), de l’Imam as-Sâdiq (a), de son père (l’Imam Muhammad al-Bâqir (a)).",
        "Sayyid b. Tâwûs dans son livre, Jamal al-Usbû’, rapporta cette invocation de trois chaînes de transmission.",
        "Cheikh ’Abbâs Qummî dans son livre Mafâtîh al-jinân, rapporta cette invocation de Misbâh al-Mutahajjid de Cheikh at-Tûsî.",
        "Ayatollah Khû’î n’a pas approuvé l’authenticité de la chaîne de transmission de cette invocation.",
        "D’après Allâma al-Majlisî, du’â’ as-Simât fut très connue parmi les compagnons des Imams (a) et ils la récitaient.",
        "La récitation de cette invocation est recommandée dans les dernières heures du jour du vendredi et samedi soir. Il est dit que sa demande sera exaucée, si quelqu’un récite cette invocation, en demandant quelque chose à Allah. Aussi ce du’â est un protecteur devant les ennemis et ceux qui nous font peur. Celui qui n’arrive pas la réciter, peut l’écrire et l’attacher à son bras ou la porter, dans ce cas, il aura le même effet. Les Chiites récitent cette invocation, seul ou en groupe dans des lieux saints.",
        "Dans l’invocation d’as-Simât, Dieu est appelé par son Grand Nom, par les prophètes (a) et par les lieux saints où Dieu parla avec ses Messagers et leur envoya la révélation.",
        "Le début de cette invocation commence par l’imploration de Dieu et parle de Ses bienfaits. L’accompagnement de Moïse à Banû Israël, leur passage de la mer et la mort de Pharaon et de son armée, sont mentionnés également.",
        "Dans d’autres parties, il est mentionné la communication de Dieu avec Mûsâ b. Imrân, Ibrâhîm (Abraham) (a), Is’hâq (Isaac) (a), Ya’qûb (Jacob) (a) et la miséricorde de Dieu envers le Prophète Âdam (a) et ses descendants.",
        "Aussi, ce du’â rappelle les bénédictions de Dieu sur les nations précédentes, puis il met l’accent sur les bénédictions de Dieu sur le peuple du Prophète Muhammad (s) et demande à Dieu d’accorder la paix, la miséricorde et la bénédiction à lui et aux membres immaculés de sa famille, comme Il a prié Abraham (a) et sa famille.",
        "Dans un hadith de l’Imam al-Bâqir (a), il dit :",
        '"Si je jure que le Grand Nom de Dieu est mentionné dans cette invocation, je dis la vérité."'
      ]
    },

    'dua-simaat': {
      source: 'Du\'â as-Simât',
      title: 'L\'Invocation des Marques (as-Simât)',
      subtitle: 'A réciter dans les dernières heures du vendredi',
      body: [
        {t:'intro', tx:'Invocation as-Simât'},
        {t:'tri', ar:'ﻋَﲆ  ﺑِﻪِ  دُﻋﯿﺖَ  اِذا  اَﻟﱠﺬی  اﻻَﮐْﺮَمِ  اﻻَﺟَﻞﱢ  اﻻَﻋَﺰﱢ  اﻻَﻋْﻈَﻢِ  اﻟْﻌَﻈﯿﻢِ  ﺑِﺎﺳْﻤِﮏَ  اَﺳْﺌَﻠُﮏَ  اِﻧﯽ  اﻟﻠﻬُﻢﱠ اﻻَرضِ  أﺑْﻮابِ  ﻣَﻀَﺎﯾﻖِ  ﻋَﲆ  ﺑِﻪِ  دُﻋﯿﺖَ  وَاِذا  اﻧْﻔَﺘَﺤَﺖْ  ﺑِﺎﻟﺮﱠﺣْﻤَﻪِ  ﻟِﻠْﻔَﺘْﺢِ  اﻟﺴَﻤﺎءِ  أﺑْﻮابِ  ﻣَﻐﺎﻟِﻖِ اﻷَْﻣْﻮَاتِ  ﻋَﲆَ  ﺑِﻪِ  دُﻋِﯿﺖَ  إِذَا  وَ  ﺗَﯿَﺴﱠﺮَتْ  ﻟِﻠْﯿُﺴْﺮِ  اﻟْﻌُﺴْﺮِ  ﻋَﲆَ  ﺑِﻪِ  دُﻋِﯿﺖَ  إِذَا  وَ  اﻧْﻔَﺮَﺟَﺖْ  ﻟِﻠِﻔَﺮَجِ وَﺟْﻬِﮏَ  ﺑِﺠَﻼلِ  وَ  اﻧْﮑَﺸَﻔَﺖْ  اﻟﻀﱠﺮﱠاءِ  وَ  اﻟْﺒَﺄْﺳَﺎءِ  ﮐَﺸْﻒِ  ﻋَﲆَ  ﺑِﻪِ  دُﻋِﯿﺖَ  إِذَا  وَ  اﻧْﺘَﺸَﺮَتْ  ﻟِﻠﻨﱡﺸُﻮرِ اﻟْﮑَﺮِﯾﻢِ،', tr:"Allâhumma innî as’aluka bi-smika al-‘azhîmi al-a‘zhami al-a‘azzi al-ajalli al- akrami,al-ladhî idhâ du‘îta bihi ‘alâ maghâliqi abwâbi-s-samâ’i li-l-fat’hi bi-r- rahmati infatahat, wa idhâ du‘îta bihi ‘alâ madâ’iqi abwâbi-l-ardi li-l-faraji infarajat, wa idhâ du‘îta bihi ‘alâ-l-‘usri li-l-yusri tayassarat, wa idhâ du‘îta bihi ‘alâ-l- amwâti li-n-nushûri antasharat, wa idhâ du'ita bihi ‘alâ kashfi-l-ba’sâ’i wa-d-darrâ’i inkashafat, wa bi-jalâli wajhika-l-karîmi.", fr:'Mon Dieu, je Te demande, par [la Grâce de] Ton Nom Grandiose, le plus Grandiose, le plus Puissant, le plus Majestueux, le plus Noble, par Lequel, s’il est évoqué devant les portes fermées du ciel pour qu’elles s’ouvrent à la Miséricorde, elles s’ouvrent, par Lequel, s’il est évoqué devant les portes étroites de la terre pour qu’elles s’élargissent, elles s’élargissent, par Lequel, s’il est évoqué devant la difficulté pour qu’elle devienne facile, elle devient facile, par Lequel, s’il est évoqué devant les morts pour qu’ils soient ressuscités, ils ressuscitent, par Lequel, s’il est évoqué pour dissiper le malheur et l’adversité, ils sont dissipés, et par la Majesté de Ta noble FaceDu`a Al Simat'},
        {t:'tri', ar:'وَ  اﻷَْﺻْﻮَاتُ  ﻟَﻪُ  ﺧَﺸَﻌَﺖْ  وَ  اﻟﺮﱢﻗَﺎبُ  ﻟَﻪُ  ﺧَﻀَﻌَﺖْ  وَ  اﻟْﻮُﺟُﻮهُ  ﻟَﻪُ  ﻋَﻨَﺖْ  اﻟﱠﺬِی  اﻟْﻮُﺟُﻮهِ  أَﻋَﺰﱢ  وَ  اﻟْﻮُﺟُﻮهِ  أَﮐْﺮَمِ إِﻻ  اﻷَْرْضِ  ﻋَﲆَ  ﺗَﻘَﻊَ  أَنْ  اﻟﺴﱠﻤَﺎءَ  ﺗُﻤْﺴِﮏُ  ﺑِﻬَﺎ  اﻟﱠﺘِﯽ  ﺑِﻘُﻮﱠﺗِﮏَ  وَ  ﻣَﺨَﺎﻓَﺘِﮏَ  ﻣِﻦْ  اﻟْﻘُﻠُﻮبُ  ﻟَﻪُ  وَﺟِﻠَﺖْ اﻟْﻌَﺎﻟَﻤُﻮنَ،  ﻟَﻬَﺎ  [ ﮐَﺎنَ ] دَانَ  اﻟﱠﺘِﯽ  ﺑِﻤَﺸِﯿﱠﺘِﮏَ  وَ  ﺗَﺰُوﻻ  أَنْ  اﻷَْرْضَ  وَ  اﻟﺴﱠﻤَﺎوَاتِ  ﺗُﻤْﺴِﮏُ  وَ  ﺑِﺈِذْﻧِﮏَ', tr:'akrami-l-ujûhi wa a‘azzi-l- ujûhi, al-ladhî ‘anat lahu al-ujûhu, wa khada‘at lahu ar- riqâbu, wa khasha‘at lahu al-aswâtu, wa wajilat lahu al-qulûbu min makhâfatika, wa bi-quwwatika al-latî bihâ tumsiku-s-samâ’a an taqa‘a ‘alâ-l-ardi illâ bi-idhnika, wa tumsiku as-samâwâti wa-l-arda an tazûlâ, wa bi-mashî’atika al-latî dâna lahâ al-‘âlamûna,', fr:'la plus Noble des faces, la plus Puissante des faces, pour/devant Laquelle s’humilient les faces, pour/devant Laquelle s’enfoncent les cous dans les épaules, pour/devant Laquelle s’abaissent les voix, pour/devant Laquelle tremblent les coeurs par crainte de Toi, et par Ta Force par Laquelle Tu empêches le ciel de tomber sur la terre sauf avec Ton Autorisation et avec Laquelle Tu empêches les cieux et la terre de disparaître, et par Ta Volonté à Laquelle obéissent les mondes,'},
        {t:'tri', ar:'وَ  اﻟْﻌَﺠَﺎﺋِﺐَ  ﺑِﻬَﺎ  ﺻَﻨَﻌْﺖَ  اﻟﱠﺘِﯽ  ﺑِﺤِﮑْﻤَﺘِﮏَ  وَ  اﻷَْرْضَ  وَ  اﻟﺴﱠﻤَﺎوَاتِ  ﺑِﻬَﺎ  ﺧَﻠَﻘْﺖَ  اﻟﱠﺘِﯽ  ﺑِﮑَﻠِﻤَﺘِﮏَ  وَ ﺟَﻌَﻠْﺘَﻪُ  وَ  اﻟﻨﱡﻮرَ  ﺑِﻬَﺎ  ﺧَﻠَﻘْﺖَ  وَ  [ ﻣَﺴْﮑَﻨﺎ ] ﺳَﮑَﻨﺎ  اﻟﻠﱠﯿْﻞَ  ﺟَﻌَﻠْﺖَ  وَ  ﻟَﯿْﻼ  ﺟَﻌَﻠْﺘَﻬَﺎ  وَ  اﻟﻈﱡﻠْﻤَﻪَ  ﺑِﻬَﺎ  ﺧَﻠَﻘْﺖَ ﺧَﻠَﻘْﺖَ  وَ  ﺿِﯿَﺎءً  اﻟﺸﱠﻤْﺲَ  ﺟَﻌَﻠْﺖَ  وَ  اﻟﺸﱠﻤْﺲَ  ﺑِﻬَﺎ  ﺧَﻠَﻘْﺖَ  وَ  ﻣُﺒْﺼِﺮا  ﻧُﺸُﻮرا  اﻟﻨﱠﻬَﺎرَ  ﺟَﻌَﻠْﺖَ  وَ  ﻧَﻬَﺎرا ﻧُﻮرا،  اﻟْﻘَﻤَﺮَ  ﺟَﻌَﻠْﺖَ  وَ  اﻟْﻘَﻤَﺮَ  ﺑِﻬَﺎ', tr:'wa bi-kalimatika al-latî khalaqta bihâ as-samâwâti wa-l-arda, wa bi-hikmatika al- latî sana’ta bihâ al-’ajâ’iba, wa khalaqta bîhâ azh-zhulmata wa ja’alta-hâ laylann, wa ja‘alta-l-layla sakanann, wa khalaqta bihâ an-nûra wa ja’altahu nahârann, wa ja’alta annahâra nushûrann mubsirann,wa khalaqta bihâ shamsa wa ja’alta shamsa diyâ’ann.wa khalaqta bihâ al-qamara wa ja’alta-l-qamara nûrann, et par Ta Parole au moyen de Laquelle Tu as créé les cieux et la terre, et par Ta Sagesse avec Laquelle Tu as fabriqué des Merveilles, au moyen de Laquelle Tu as créé les Ténèbres dont Tu as fait la nuit, rendant la nuit un [moment] de repos,au moyen de Laquelle Tu as créé la lumière dont Tu as fait un jour, rendant le jour un retour à la vie, où l’on voit clair, par Laquelle Tu as créé le soleil, faisant du soleil', fr:'une luminosité, par laquelle Tu as créé la lune, faisant de la lune une lumière,'},
        {t:'tri', ar:'ﻟَﻬَﺎ  ﺟَﻌَﻠْﺖَ  وَ  رُﺟُﻮﻣﺎ  وَ  زِﯾﻨَﻪً  وَ  ﻣَﺼَﺎﺑِﯿﺢَ  وَ  ﺑُﺮُوﺟﺎ  وَ  ﻧُﺠُﻮﻣﺎ  ﺟَﻌَﻠْﺘَﻬَﺎ  وَ  اﻟْﮑَﻮَاﮐِﺐَ  ﺑِﻬَﺎ  ﺧَﻠَﻘْﺖَ  وَ ﻓِﯽ  ﻗَﺪﱠرْﺗَﻬَﺎ  وَ  ﻣَﺴَﺎﺑِﺢَ  وَ  ﻓَﻠَﮑﺎ  ﻟَﻬَﺎ  ﺟَﻌَﻠْﺖَ  وَ  ﻣَﺠَﺎرِیَ  وَ  ﻣَﻄَﺎﻟِﻊَ  ﻟَﻬَﺎ  ﺟَﻌَﻠْﺖَ  وَ  ﻣَﻐَﺎرِبَ  وَ  ﻣَﺸَﺎرِقَ ﺑِﺄَﺳْﻤَﺎﺋِﮏَ  أَﺣْﺼَﯿْﺘَﻬَﺎ  وَ  ﺗَﺼْﻮِﯾﺮَﻫَﺎ  ﻓَﺄَﺣْﺴَﻨْﺖَ  ﺻَﻮﱠرْﺗَﻬَﺎ  وَ  ﺗَﻘْﺪِﯾﺮَﻫَﺎ  ﻓَﺄَﺣْﺴَﻨْﺖَ  ﻣَﻨَﺎزِلَ  اﻟﺴﱠﻤَﺎءِ وَ  اﻟﻠﱠﯿْﻞِ  ﺑِﺴُﻠْﻄَﺎنِ  ﺳَﺨﱠﺮْﺗَﻬَﺎ  وَ  ﺗَﺪْﺑِﯿﺮَﻫَﺎ  [ ﻓَﺄَﺣْﺴَﻨْﺖَ ] أَﺣْﺴَﻨْﺖَ  وَ  ﺗَﺪْﺑِﯿﺮا  ﺑِﺤِﮑْﻤَﺘِﮏَ  دَﺑﱠﺮْﺗَﻬَﺎ  وَ  إِﺣْﺼَﺎءً رُؤْﯾَﺘَﻬَﺎ  ﺟَﻌَﻠْﺖَ  وَ  اﻟْﺤِﺴَﺎبِ  وَ  اﻟﺴﱢﻨِﯿﻦَ  [ ﻋَﺪَدَ  ﺑِﻬَﺎ  ﻋَﺮﱠﻓْﺖَ  وَ ] ﻋَﺪَدِ  وَ  اﻟﺴﱠﺎﻋَﺎتِ  وَ  اﻟﻨﱠﻬَﺎرِ  ﺳُﻠْﻄَﺎنِ وَاﺣِﺪا،  ﻣَﺮْأًى  اﻟﻨﱠﺎسِ  ﻟِﺠَﻤِﯿﻊِ', tr:'wa khalaqta bihâ al-kawâkibi wa ja‘altahâ nujûmann wa burûjann wa masâbîha wa zînatann wa rujûmann, wa ja‘alta lahâ mashâriqa wa maghâriba, wa ja‘alta lahâ matâli’a wa majâriya, wa ja’alta lahâ falakann wa masâbiha, wa qaddartahâ bi-s-samâ’i manâzila fa-ahsanta taqdîrahâ, wa sawwartahâ fa-ahsanta taswîrahâ, wa ahsaytahâ bi-asmâ’ika ihsa’ann, wa dabbartahâ bi-hikmatika tadbîrann, fa-ahsanta tadbîrahâ, wa sakhkhartahâ bi-sultâni-l-layli wa sultâni- n-nahâri, wa-s-sâ‘âti wa ‘adadi-s-sinîna wa-l-hisâbi, wa ja‘alta ru’yatahâ li- jamî‘i-n-nâsi mar’aann wâhidann,wa as’aluka,', fr:'par laquelle Tu as créé les planètes en en faisant des étoiles, des astres, des lanternes, une décoration et des météorites,en plaçant pour eux les levants et les couchants, en plaçant pour eux des points de départ et des voies célestes,en plaçant pour eux les orbites et les déplacements dans les cieux,Tu as mesuré pour eux une demeure, la meilleure des mesures, Tu leur as donné une forme, la meilleure des formes,Tu les as totalement dénombrés par Tes Noms, Tu les as totalement organisés par Ta Sagesse, de la meilleure des organisations, Tu les as assujettis par le pouvoir de la nuit et celui du jour et [par] les heures, le nombre des années et le compte et Tu les as placés bien en vue pour l’ensemble des gens, d’une seule vue,'},
        {t:'tri', ar:'ﻓِﯽ  اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﻋِﻤْﺮَانَ  ﺑْﻦَ  ﻣُﻮﺳَﻰ  رَﺳُﻮﻟَﮏَ  وَ  ﻋَﺒْﺪَکَ  ﺑِﻪِ  ﮐَﻠﱠﻤْﺖَ  اﻟﱠﺬِی  ﺑِﻤَﺠْﺪِکَ  اﻟﻠﱠﻬُﻢﱠ  أَﺳْﺄَﻟُﮏَ  وَ ﺗَﺎﺑُﻮتِ  ﻓَﻮْقَ  اﻟﻨﱡﻮرِ  ﻏَﻤَﺎﺋِﻢِ  ﻓَﻮْقَ  [ اﻟْﮑَﺮُوﺑِﯿﱢﯿﻦَ ] اﻟْﮑَﺮُوﺑِﯿﻦَ  [ أَﺣْﺴَﺎسِ ] إِﺣْﺴَﺎسِ  ﻓَﻮْقَ  اﻟْﻤُﻘَﺪﱠﺳِﯿﻦَ ﻓِﯽ  اﻟْﻤُﻘَﺪﱠسِ  اﻟْﻮَادِ  ﻓِﯽ  ﺣُﻮرِﯾﺚَ  ﺟَﺒَﻞِ  [ إِﱃَ ] ﻓِﯽ  وَ  ﺳَﯿْﻨَﺎءَ  ﻃُﻮرِ  ﻓِﯽ  وَ  اﻟﻨﱠﺎرِ  ﻋَﻤُﻮدِ  ﻓِﯽ  اﻟﺸﱠﻬَﺎدَهِ وَ  ﺑَﯿﱢﻨَﺎتٍ  آﯾَﺎتٍ  ﺑِﺘِﺴْﻊِ  ﻣِﺼْﺮَ  أَرْضِ  ﻓِﯽ  وَ  اﻟﺸﱠﺠَﺮَهِ  ﻣِﻦَ  اﻷَْﯾْﻤَﻦِ  اﻟﻄﱡﻮرِ  ﺟَﺎﻧِﺐِ  ﻣِﻦْ  اﻟْﻤُﺒَﺎرَﮐَﻪِ  اﻟْﺒُﻘْﻌَﻪِ ﺳُﻮفٍ  ﺑَﺤْﺮِ  ﻓِﯽ  اﻟْﻌَﺠَﺎﺋِﺐَ  ﺑِﻬَﺎ  ﺻَﻨَﻌْﺖَ  اﻟﱠﺘِﯽ  اﻟْﻤُﻨْﺒَﺠِﺴَﺎتِ  ﻓِﯽ  وَ  اﻟْﺒَﺤْﺮَ  إِﺳْﺮَاﺋِﯿﻞَ  ﻟِﺒَﻨِﯽ  ﻓَﺮَﻗْﺖَ  ﯾَﻮْمَ ،', tr:'Allâhumma, bi-majdika al-ladhî kallamta bihi ‘abdaka wa rasûlaka, Mûsâ bna ‘imrâna, ‘alayhi-s-salâmu, fî-l-muqaddasîna, fawqa ihsâsi al-karûbiyyîna, fawqa ghamâ’imin-nûri, fawqa tâbûti-sh-shahâdati, fî ‘amûdi-n-nâri, wa fî tûri sînâ’a wa fî jabali hûrîtha, fî-l-wâdî al-muqaddasi fî-lbuq‘ati-l-mubârakati min jânibi-t- tûri al-aymani mina-sh-shajarati, wa fî ardi misra bi-tis‘i âyâtinn bayyinâtinn, wa yawma faraqta libanî isrâ’ila-l-bahra, wa fî-l-munbajisâti-l-latî sana’ta bihâ al-‘ajâ’iba fî bahri sûfmn,', fr:'je Te demande, mon Dieu, par Ta Magnificence par laquelle Tu as parlé à Ton Serviteur et Messager, Moussa fils de ‘Imrân (que la Paix soit sur lui), parmi les Saints, au-dessus de la perception des Angeschérubins, au-dessus des nuages de la lumière et au-dessus du Tabernacle du Témoignage, dans la colonne de feu [qui apparut à Moussa(p)], dans le mont du Sinaï, dans la montagne de Hûrîth, dans la vallée sainte, dans la contrée bénie, du côté droit de l’arbre, ainsi que dans la terre d’Egypte avec neuf signes évidents et le jour où Tu as fendu la mer pour les fils d’Israël, et dans les jaillissements d’eau avec lesquels Tu as réalisé des prodiges dans la mer de sûf'},
        {t:'tri', ar:'ﮐَﻠِﻤَﺘُﮏَ  ﺗَﻤﱠﺖْ  وَ  اﻟْﺒَﺤْﺮَ  إِﺳْﺮَاﺋِﯿﻞَ  ﺑِﺒَﻨِﯽ  ﺟَﺎوَزْتَ  وَ  ﮐَﺎﻟْﺤِﺠَﺎرَهِ  اﻟْﻐَﻤْﺮِ  ﻗَﻠْﺐِ  ﻓِﯽ  اﻟْﺒَﺤْﺮِ  ﻣَﺎءَ  ﻋَﻘَﺪْتَ  وَ وَ  ﻟِﻠْﻌَﺎﻟَﻤِﯿﻦَ  ﻓِﯿﻬَﺎ  ﺑَﺎرَﮐْﺖَ  اﻟﱠﺘِﯽ  ﻣَﻐَﺎرِﺑَﻬَﺎ  وَ  اﻷَْرْضِ  ﻣَﺸَﺎرِقَ  أَوْرَﺛْﺘَﻬُﻢْ  وَ  ﺻَﺒَﺮُوا  ﺑِﻤَﺎ  ﻋَﻠَﯿْﻬِﻢْ  اﻟْﺤُﺴْﻨَﻰ اﻷَْﮐْﺮَمِ  اﻷَْﺟَﻞﱢ  اﻷَْﻋَﺰﱢ  [ اﻷَْﻋْﻈَﻢِ ] اﻷَْﻋْﻈَﻢِ  اﻟْﻌَﻈِﯿﻢِ  ﺑِﺎﺳْﻤِﮏَ  وَ  اﻟْﯿَﻢﱢ  ﻓِﯽ  ﻣَﺮَاﮐِﺒَﻪُ  وَ  ﺟُﻨُﻮدَهُ  وَ  ﻓِﺮْﻋَﻮْنَ  أَﻏْﺮَﻗْﺖَ اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﻹِِﺑْﺮَاﻫِﯿﻢَ  وَ  ﺳَﯿْﻨَﺎءَ  ﻃُﻮرِ  ﻓِﯽ  اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﮐَﻠِﯿﻤِﮏَ  ﻟِﻤُﻮﺳَﻰ  ﺑِﻪِ  ﺗَﺠَﻠﱠﯿْﺖَ  اﻟﱠﺬِی  ﺑِﻤَﺠْﺪِکَ  وَ وَ  [ ﺳَﺒْﻊٍ ] ﺷِﯿَﻊٍ  ﺑِﺌْﺮِ  ﻓِﯽ  اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﺻَﻔِﯿﱢﮏَ  ﻹِِﺳْﺤَﺎقَ  وَ  اﻟْﺨَﯿْﻒِ،  ﻣَﺴْﺠِﺪِ  ﻓِﯽ  ﻗَﺒْﻞُ  ﻣِﻦْ  ﺧَﻠِﯿﻠِﮏَ ﻹِِﺳْﺤَﺎقَ  وَ  ﺑِﻤِﯿﺜَﺎﻗِﮏَ  اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﻹِِﺑْﺮَاﻫِﯿﻢَ  أَوْﻓَﯿْﺖَ  وَ  إِﯾﻞٍ  ﺑَﯿْﺖِ  ﻓِﯽ  اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﻧَﺒِﯿﱢﮏَ  ﻟِﯿَﻌْﻘُﻮبَ اﻟﱠﺬِی  ﺑِﻤَﺠْﺪِکَ  وَ  ﻓَﺄَﺟَﺒْﺖَ  ﺑِﺄَﺳْﻤَﺎﺋِﮏَ  ﻟِﻠﺪﱠاﻋِﯿﻦَ  وَ  ﺑِﻮَﻋْﺪِکَ  ﻟِﻠْﻤُﺆْﻣِﻨِﯿﻦَ  وَ  ﺑِﺸَﻬَﺎدَﺗِﮏَ  ﻟِﯿَﻌْﻘُﻮبَ  وَ  ﺑِﺤَﻠْﻔِﮏَ وَﻗَﻌَﺖْ  اﻟﱠﺘِﯽ  ﺑِﺂﯾَﺎﺗِﮏَ  وَ  [ اﻟْﻬَﺮْﻣَﺎنِ ] [ اﻟﺰﱠﻣَﺎنِ ] اﻟﺮﱡﻣﱠﺎنِ  ﻗُﺒﱠﻪِ  ﻋَﲆَ  اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﻋِﻤْﺮَانَ  ﺑْﻦِ  ﻟِﻤُﻮﺳَﻰ  ﻇَﻬَﺮَ اﻟْﮑَﻠِﻤَﻪِ  ﺑِﺸَﺄْنِ  وَ  اﻟْﻘُﺪْرَهِ  ﺑِﻌِﺰﱠهِ  وَ  اﻟْﻘُﻮﱠهِ  ﺑِﺴُﻠْﻄَﺎنِ  وَ  ﻋَﺰِﯾﺰَهٍ  ﺑِﺂﯾَﺎتٍ  اﻟْﻐَﻠَﺒَﻪِ  وَ  اﻟْﻌِﺰﱠهِ  ﺑِﻤَﺠْﺪِ  ﻣِﺼْﺮَ  أَرْضِ  ﻋَﲆَ اﻟﺘﱠﺎﻣﱠﻪِ،', tr:'wa ‘aqadta mâ’a-l-bahri fî qalbi-l-ghamri ka-l-hijârati, wa jâwazta bi-banî isrâ’îla al- bahra, wa tammat kalimatuka-l-husnâ ‘alayhim bimâ sabarû, waawrathatahum mashâriqa-l-ardi wa maghâribahâ, al-latî bârakta fîhâ li-l-‘âlamîna, wa aghraqta fir ‘awna wa junûdahu wa marâkibahu fî-l-yammi, wa bi-smika al-‘azhîmi al-a‘zhami al- a‘azzi al-ajalli al-akrami, wa bi-majdika al-ladhî tajal-layta bihi li-Mûsâ kalîmika ‘alayhi assalâmu fi tûri sînâ’a, wa li-Ibrâhîma ‘alayhi as-salârau khalîlika min qablu fî masjidi-lkhayfi, wa li-Ishâqa safiyyika, ‘alayhi as-salâmu, fî bi’ri shî‘inn, wa li-Ya‘qûba nabiyyika, ‘alayhi as-salâmu, fî bayti-îlinn, wa awfayta li-Ibrâhîma, ‘alayhi as-salâmu, bi-mîthâqika, wa li-Is’hâqa bi-halfika, wa li-Ya‘-qûba bi-shahâdatika,wa li-l-mu’minîna bi-wa‘dika, wali-d-dâ‘îna bi-asmâ’ika fa-ajabta,wa bi-majdika al-ladhî zhahara li-Mûsâ bni ‘imrâna ‘alayhi assalâmu ‘alâ qubbati-r-rum-mâni,wa bi-âyâtika al-latî waqa‘at ‘alâ ardi misra bi-majdi-l-‘izzati wa-lghalabati, bi-âyâtinn ‘azîzatinn, wabi-sultâni-l- quwwati wa bi-‘izzati-lqudrati wa bi-sha’ni-l-kalimati at-tâmmati,', fr:'Tu as retenu l’eau de la mer en pleine mer comme des rochers et Tu as fait traverser (la mer) aux fils d’Israël,accomplissant ainsi Ta belle Promesse envers les fils d’Israël pour leur patience et leur donnant en héritage les contrées orientales et occidentales que Tu as bénies pour les mondes,et Tu as fait engloutir Pharaon, ses soldats et ses bateaux dans la mer,et par [la Grâce de] Ton Nom Grandiose, le plus Grandiose, le plus Puissant, le plus Majestueux, le plus Noble,et par Ta Puissance avec laquelle Tu as apparu à Moussa, celui à qui Tu as parlé (que la paix soit sur lui), sur le mont du Sinaï, et avant, à Ibrahim (que la paix soit sur lui), Ton Ami intime, dans la mosquée d’al- Khayf, à Isa‘ac, Ton pur Ami (que la paix soit sur lui), au puits de Shî‘inn, à Ya‘coub, Ton Prophète (que la paix soit sur lui), à Beit-Ïl, et avec Laquelle Tu as accompli Ton Pacte pour Ibrahim (que la paix soit sur lui), Ton Serment pour Isa‘ac, Ton Témoignage pour Ya‘-coub, la Promesse pour les croyants et Tu as répondu à ceux qui appellent par Tes Noms,et par Ta Puissance qui apparut à Moussa fils de ‘Imrân (que la Paix soit sur lui) dans la « Coupole de la Grenade », et par Tes Signes qui sont tombés sur la terre d’Egypte par la Gloire de Ta Puissance, par des Signes puissants, par le pouvoir de la Force, par le summum de la Puissance, par l’importance du Mot complet, 14'},
        {t:'tri', ar:'ﺑِﺮَﺣْﻤَﺘِﮏَ  وَ  اﻵْﺧِﺮَهِ  أَﻫْﻞِ  وَ  اﻟﺪﱡﻧْﯿَﺎ  أَﻫْﻞِ  وَ  اﻷَْرْضِ  وَ  اﻟﺴﱠﻤَﺎوَاتِ  أَﻫْﻞِ  ﻋَﲆَ  ﺑِﻬَﺎ  ﺗَﻔَﻀﱠﻠْﺖَ  اﻟﱠﺘِﯽ  ﺑِﮑَﻠِﻤَﺎﺗِﮏَ  وَ ﻗَﺪْ  اﻟﱠﺬِی  ﺑِﻨُﻮرِکَ  وَ  اﻟْﻌَﺎﻟَﻤِﯿﻦَ  ﻋَﲆَ  ﺑِﻬَﺎ  أَﻗَﻤْﺖَ  اﻟﱠﺘِﯽ  ﺑِﺎﺳْﺘِﻄَﺎﻋَﺘِﮏَ  وَ  ﺧَﻠْﻘِﮏَ  ﺟَﻤِﯿﻊِ  ﻋَﲆَ  ﺑِﻬَﺎ  ﻣَﻨَﻨْﺖَ  اﻟﱠﺘِﯽ ﺗَﺴْﺘَﻘِﻠﱠﻬَﺎ  ﻟَﻢْ  اﻟﱠﺘِﯽ  ﺟَﺒَﺮُوﺗِﮏَ  وَ  ﻋِﺰﱠﺗِﮏَ  وَ  ﮐِﺒْﺮِﯾَﺎﺋِﮏَ  وَ  ﺟَﻼﻟِﮏَ  وَ  ﺑِﻌِﻠْﻤِﮏَ  وَ  ﺳَﯿْﻨَﺎءَ  ﻃُﻮرُ  ﻓَﺰَﻋِﻪِ  ﻣِﻦْ  ﺧَﺮﱠ وَ  اﻷَْﻧْﻬَﺎرُ  وَ  اﻟْﺒِﺤَﺎرُ  ﻟَﻬَﺎ  رَﮐَﺪَتْ  وَ  اﻷَْﮐْﺒَﺮُ  اﻟْﻌُﻤْﻖُ  ﻟَﻬَﺎ  اﻧْﺰَﺟَﺮَ  وَ  اﻟﺴﱠﻤَﺎوَاتُ  ﻟَﻬَﺎ  اﻧْﺨَﻔَﻀَﺖْ  وَ  اﻷَْرْضُ ، ﺑِﻤَﻨَﺎﮐِﺒِﻬَﺎ  اﻷَْرْضُ  ﻟَﻬَﺎ  ﺳَﮑَﻨَﺖْ  وَ  اﻟْﺠِﺒَﺎلُ  ﻟَﻬَﺎ  ﺧَﻀَﻌَﺖْ', tr:"wa bi-kalimâtika al-latî tafad-dalta bihâ ‘alâ ahli-s-samâwâti wa-lardi, wa ahli-d- dunyâ wa ahli-l-âkhirati,wa bi-rahmatika al-latî mananta bihâ ‘alâ jamî‘i khalqika,wa bi-istitâ‘atika al-latî aqamta bihâ ‘alâ-l-‘âlamîna, wa bi-nûrika al-ladhî qad kharra min faza‘ihi tûru sînâ’a, wa bi-‘ilmika wa jalâlika, wa kibriyâ’ika wa ‘izzatika, wa jabarûtika, al-latî lam tastaqillahâ al-ardu, wa-nkhafadat lahâ as-samâwâtu, wa- nzajara lahâ al-‘umuqu al-akbaru,wa rakadat lahâ al-bihâru wa-l-anhâru, wa khada'at lahâ al-jibâlu, wa sakanat lahâ al-ardu bi-manâkibihâ,", fr:'par Tes Mots par lesquels Tu as conféré les Bienfaits aux habitants des cieux et de la terre, aux habitants de ce monde et ceux de l’Au-delà, par Ta Miséricorde avec Laquelle Tu as accordé les Dons à l’ensemble de Tes créatures, par Ta Puissance que Tu as imposée sur les mondes, par Ta Lumière devant laquelle le Mont Sinaï est tombé prosterné de crainte, par Ton Savoir, Ta Majesté, Ton Arrogance, Ta Puissance, Ton Pouvoir coercitif, que la terre n’a pas pu supporter, pour qui les cieux se sont abaissés, les grandes profondeurs se sont éloignées, [pour qui] les mers et les fleuves se sont stagnés, les montagnes se sont abaissées, la terre s’est immobilisée de ses flancs,'},
        {t:'tri', ar:'ﻓِﯽ  اﻟﻨﱢﯿﺮَانُ  ﻟَﻬَﺎ  ﺧَﻤَﺪَتْ  وَ  ﺟَﺮَﯾَﺎﻧِﻬَﺎ  ﻓِﯽ  اﻟﺮﱢﯾَﺎحُ  ﻟَﻬَﺎ  ﺧَﻔَﻘَﺖْ  وَ  ﮐُﻠﱡﻬَﺎ  اﻟْﺨَﻼﺋِﻖُ  ﻟَﻬَﺎ  اﺳْﺘَﺴْﻠَﻤَﺖْ  وَ وَ  اﻟﺴﱠﻤَﺎوَاتِ  ﻓِﯽ  ﺑِﻪِ  ﺣُﻤِﺪْتَ  وَ  اﻟﺪﱡﻫُﻮرِ  دَﻫْﺮَ  اﻟْﻐَﻠَﺒَﻪُ  ﺑِﻪِ  ﻟَﮏَ  ﻋُﺮِﻓَﺖْ  اﻟﱠﺬِی  ﺑِﺴُﻠْﻄَﺎﻧِﮏَ  وَ  أَوْﻃَﺎﻧِﻬَﺎ وَ  ﺑِﺎﻟﺮﱠﺣْﻤَﻪِ  ذُرﱢﯾﱠﺘِﻪِ  وَ  اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  آدَمَ  ﻷَِﺑِﯿﻨَﺎ  ﺳَﺒَﻘَﺖْ  اﻟﱠﺘِﯽ  اﻟﺼﱢﺪْقِ  ﮐَﻠِﻤَﻪِ  ﺑِﮑَﻠِﻤَﺘِﮏَ  وَ  اﻷَْرَﺿِﯿﻦَ ﺧَﺮﱠ  وَ  دَﮐّﺎ  ﻓَﺠَﻌَﻠْﺘَﻪُ  ﻟِﻠْﺠَﺒَﻞِ  ﺑِﻪِ  ﺗَﺠَﻠﱠﯿْﺖَ  اﻟﱠﺬِی  وَﺟْﻬِﮏَ  ﺑِﻨُﻮرِ  وَ  ءٍ  ﺷَﯽْ  ﮐُﻞﱠ  ﻏَﻠَﺒَﺖْ  اﻟﱠﺘِﯽ  ﺑِﮑَﻠِﻤَﺘِﮏَ  أَﺳْﺄَﻟُﮏَ ﺻَﻌِﻘﺎ،  ﻣُﻮﺳَﻰ', tr:"wa-staslamat lahâ al-khalâ’iqu kulluhâ, wa khafaqat lahâ arriyâhu fi jarayânihâ, wa khamadat lahâ an-nîrânu fi awtânihâ, wa bi-sultânika al-ladhî ‘urifat laka bihi al-ghalabatu dahra-dduhûri, wa humidta bihi fî-s- samâwâti wa-l-aradîna, wa bi-kalimatika kalimati-s-sidqi al-latî sabaqat li-abînâ Adama ‘alayhi as- salâmu wa dhurriyyatihi bi-r-rahmati,wa as’aluka bi-kalimatika al-latî ghalabat kulli shay’inn, wa binûri wajhika,al-ladhî tajallayta bihi li-l-jabal, fa-ja‘altahu dakkann wa kharra Mûsâ sa'iqann,", fr:'l’ensemble des créatures se sont soumises, les vents ont soufflé dans leurs courses, les feux se sont éteints dans leurs foyers, Par Ta Force par laquelle il fut connu que la suprématie est pout Toi de tout temps, et par laquelle Tu es Loué dans les cieux et les terres, par Ton Mot, un Mot sincère qui précéda pour notre père Adam et sa descendance, par la Miséricorde, je Te demande par Ton Mot qui domine toute chose, par la Lumière de Ta Face, par laquelle Tu T’es Manifesté à la montagne, Tu l’as alors rendue en miettes et Moussa s’effondra foudroyé,'},
        {t:'tri', ar:'وَ  ﻋِﻤْﺮَانَ  ﺑْﻦَ  ﻣُﻮﺳَﻰ  رَﺳُﻮﻟَﮏَ  وَ  ﻋَﺒْﺪَکَ  ﺑِﻪِ  ﻓَﮑَﻠﱠﻤْﺖَ  ﺳَﯿْﻨَﺎءَ  ﻃُﻮرِ  ﻋَﲆَ  ﻇَﻬَﺮَ  اﻟﱠﺬِی  ﺑِﻤَﺠْﺪِکَ  وَ اﻟﺼﱠﺎﻓﱢﯿﻦَ  اﻟْﻤَﻼﺋِﮑَﻪِ  ﺟُﻨُﻮدِ  وَ  اﻟْﻤُﻘَﺪﱠﺳِﯿﻦَ  ﺑِﺮَﺑَﻮَاتِ  ﻓَﺎرَانَ  ﺟَﺒَﻞِ  ﻓِﯽ  ﻇُﻬُﻮرِکَ  وَ  ﺳَﺎﻋِﯿﺮَ  ﻓِﯽ  ﺑِﻄَﻠْﻌَﺘِﮏَ اﻟﺴﱠﻼمُ  ﻋَﻠَﯿْﻪِ  ﺧَﻠِﯿﻠِﮏَ  إِﺑْﺮَاﻫِﯿﻢَ  ﻋَﲆَ  ﻓِﯿﻬَﺎ  ﺑَﺎرَﮐْﺖَ  اﻟﱠﺘِﯽ  ﺑِﺒَﺮَﮐَﺎﺗِﮏَ  وَ  اﻟْﻤُﺴَﺒﱢﺤِﯿﻦَ  اﻟْﻤَﻼﺋِﮑَﻪِ  ﺧُﺸُﻮعِ  وَ ﻋَﻠَﯿْﻬِﻤَﺎ  ﻋِﯿﺴَﻰ  أُﻣﱠﻪِ  ﻓِﯽ  ﺻَﻔِﯿﱢﮏَ  ﻹِِﺳْﺤَﺎقَ  ﺑَﺎرَﮐْﺖَ  وَ  آﻟِﻪِ  وَ  ﻋَﻠَﯿْﻪِ  ﷲﱠُ  ﺻَﲆﱠ  ﻣُﺤَﻤﱠﺪٍ  أُﻣﱠﻪِ  ﻓِﯽ اﻟﺴﱠﻼمُ،  ﻋَﻠَﯿْﻬِﻤَﺎ  ﻣُﻮﺳَﻰ  أُﻣﱠﻪِ  ﻓِﯽ  إِﺳْﺮَاﺋِﯿﻠِﮏَ  ﻟِﯿَﻌْﻘُﻮبَ  ﺑَﺎرَﮐْﺖَ  وَ  اﻟﺴﱠﻼمُ', tr:'wa bi-majdika al-ladhî zhahara‘alâ tûri sînâ’a, fa-kallamta bihi ‘abdaka wa rasûlaka Mûsâ bna ‘imrâna, wa bi-tal‘atika fi sâ‘îra wa zhuhûrika fi jabali fârâna, bi-rabawâtil-muqaddasîna wa junûdi-l-malâ’ikati as-sâffîna, wa khushû‘i-l- makâ’ikati almusabbihîna, wa bi-barakâtika al-latî bârakta fihâ ‘alâ Ibrâhîma khalîlika, ‘alayhi as-salâmu, fi ummati Muhammadinn, sallâ-llâhu ‘alayhi wa âlihi, wa bârakta li-Is’hâqa safiyyika fi ummati ‘Issâ ‘alayhimâ assalâmu,wa bârakta li-Ya‘qûba Isrâ’îlika fi ummati Mûsâ ‘alayhimâ assalâmu,', fr:'par Ta Grandeur qui apparut au Mont du Sinaï, Tu as alors parlé à Ton Serviteur et Messager, Moussa fils de ‘Imrân, par Ta Manifestation à Sâ‘îr [nom de la montagne où Dieu fit descendre la Révélation sur ‘Issa(p)] et Ton Apparition à la Montagne Fârân [nom d’une des montagnes de La Mecque], par les collines des Saints, et les Anges-soldats placés en rangs, et la crainte des Anges qui Te Louent,et par Tes Bénédictions dont Tu as comblé Ibrahim, Ton Ami Intime (que la Paix soit sur lui), dans la communauté de Mohammed (que Dieu prie sur lui et sur sa famille), dont Tu as comblé pour Isa‘ac Ton Ami Pur, dans la communauté de ‘Issa (que la Paix soit sur eux deux), dont Tu as comblé pour Ya‘coub, Ton «Israélite», dans la communauté de Moussa (que la Paix soit sur eux deux),'},
        {t:'tri', ar:'ﮐَﻤَﺎ  وَ  اﻟﻠﱠﻬُﻢﱠ  أُﻣﱠﺘِﻪِ  [ ﻓِﯽ ] وَ  ذُرﱢﯾﱠﺘِﻪِ  وَ  ﻋِﺘْﺮَﺗِﻪِ  ﻓِﯽ  آﻟِﻪِ  وَ  ﻋَﻠَﯿْﻪِ  ﷲﱠُ  ﺻَﲆﱠ  ﻣُﺤَﻤﱠﺪٍ  ﻟِﺤَﺒِﯿﺒِﮏَ  ﺑَﺎرَﮐْﺖَ  وَ ﻣُﺤَﻤﱠﺪٍ  آلِ  وَ  ﻣُﺤَﻤﱠﺪٍ  ﻋَﲆَ  ﺗُﺼَﻠﱢﯽَ  أَنْ  ﻋَﺪْﻻ  وَ  ﺻِﺪْﻗﺎ  ﻧَﺮَهُ  ﻟَﻢْ  وَ  ﺑِﻪِ  آﻣَﻨﱠﺎ  وَ  ﻧَﺸْﻬَﺪْهُ  ﻟَﻢْ  وَ  ذَﻟِﮏَ  ﻋَﻦْ  ﻏِﺒْﻨَﺎ وَ  ﺻَﻠﱠﯿْﺖَ  ﻣَﺎ  ﮐَﺄَﻓْﻀَﻞِ  ﻣُﺤَﻤﱠﺪٍ  آلِ  وَ  ﻣُﺤَﻤﱠﺪٍ  ﻋَﲆَ  ﺗَﺮَﺣﱠﻢَ  وَ  ﻣُﺤَﻤﱠﺪٍ  آلِ  وَ  ﻣُﺤَﻤﱠﺪٍ  ﻋَﲆَ  ﺗُﺒَﺎرِکَ  أَنْ  وَ ﮐُﻞﱢ  ﻋَﲆَ  أَﻧْﺖَ  وَ  ﺗُﺮِﯾﺪُ  ﻟِﻤَﺎ  ﻓَﻌﱠﺎلٌ  ﻣَﺠِﯿﺪٌ  ﺣَﻤِﯿﺪٌ  إِﻧﱠﮏَ  إِﺑْﺮَاﻫِﯿﻢَ  آلِ  وَ  إِﺑْﺮَاﻫِﯿﻢَ  ﻋَﲆَ  ﺗَﺮَﺣﱠﻤْﺖَ  وَ  ﺑَﺎرَﮐْﺖَ [ ﺷَﻬِﯿﺪٌ ] ﻗَﺪِﯾﺮٌ  ءٍ  ﺷَﯽْ', tr:'wa bârakta li-habîbika Muhammadinn, sallâ-llâhu ‘alayhi wa âlihi, fî ‘itratihi wa dhurriyyatihi wa ummatihi, Allâhumma, wa kamâ ghibnâ ‘an dhâlika wa lam nashhad’hu, wa âmannâ bihi wa lam narahu, sidqann wa ‘adlann, an tusalliya ‘alâ Muhammadinn wa âli Muhammadinn, wa an tubârika ‘alâ Muhammadinn wa âli Muhammadinn, wa tarahhama ‘alâ Muhammadinn wa âli Muhammadinn, ka- afdali mâ sallayta wa bârakta wa tarahhamta ‘alâ Ibrâhîma wa âli Ibrâhîma,innaka hamîdunn majîdunn fa“âlunn limâ turîdu wa anta ‘alâ kulli shay’inn qadîrunn.', fr:'dont Tu as comblé Ton Bien-Aimé Mohammed (que Dieu prie sur lui et sur sa famille), dans sa famille, sa descendance et sa communauté, Mon Dieu, - comme nous avons été absents à cela, et nous n’avons pas été témoins, et nous avons cru en lui, [même si] nous ne l’avons pas vu, en vérité et justice -, [nous Te demandons] de prier sur Mohammed et la famille de Mohammed, de bénir Mohammed et la famille de Mohammed, de faire Miséricorde à Mohammed et à la famille de Mohammed, du mieux que Tu n’aies prié, béni, fait Miséricorde à Ibrahim et la famille d’Ibrahim, car Tu es le Très-Loué, le Très-Glorifié, faisant ce que Tu veux et Tu es Puissant sur toute chose.'},

        {t:'tri', ar:'ﻏَﯿْﺮُکَ  ﺑَﺎﻃِﻨَﻬَﺎ  ﯾَﻌْﻠَﻢُ  ﻻ  وَ  ﺗَﻔْﺴِﯿﺮَﻫَﺎ  ﯾَﻌْﻠَﻢُ  ﻻ  اﻟﱠﺘِﯽ  اﻷَْﺳْﻤَﺎءِ  ﻫَﺬِهِ  ﺑِﺤَﻖﱢ  وَ  اﻟﺪﱡﻋَﺎءِ  ﻫَﺬَا  ﺑِﺤَﻖﱢ  اﻟﻠﱠﻬُﻢﱠ ﻣِﻦْ  ﻟِﯽ  اﻏْﻔِﺮْ  وَ  أَﻫْﻠُﻪُ  أَﻧَﺎ  ﻣَﺎ  ﺑِﯽ  ﺗَﻔْﻌَﻞْ  ﻻ  وَ  أَﻫْﻠُﻪُ  أَﻧْﺖَ  ﻣَﺎ  ﺑِﯽ  اﻓْﻌَﻞْ  وَ  ﻣُﺤَﻤﱠﺪٍ  آلِ  وَ  ﻣُﺤَﻤﱠﺪٍ  ﻋَﲆَ  ﺻَﻞﱢ وَ  ﺳَﻮْءٍ  إِﻧْﺴَﺎنِ  ﻣَﺌُﻮﻧَﻪَ  اﮐْﻔِﻨِﯽ  وَ  رِزْﻗِﮏَ  ﺣَﻼلِ  ﻣِﻦْ  ﻋَﻠَﯽﱠ  وَﺳﱢﻊْ  وَ  ﺗَﺄَﺧﱠﺮَ  ﻣَﺎ  وَ  ﻣِﻨْﻬَﺎ  ﺗَﻘَﺪﱠمَ  ﻣَﺎ  ذُﻧُﻮﺑِﯽ رَبﱠ  آﻣِﯿﻦَ  ﻋَﻠِﯿﻢٌ  ءٍ  ﺷَﯽْ  ﺑِﮑُﻞﱢ  وَ  ﻗَﺪِﯾﺮٌ  ﺗَﺸَﺎءُ  ﻣَﺎ  ﻋَﲆَ  إِﻧﱠﮏَ  ﺳَﻮْءٍ  ﺳُﻠْﻄَﺎنِ  وَ  ﺳَﻮْءٍ  ﻗَﺮِﯾﻦِ  وَ  ﺳَﻮْءٍ  ﺟَﺎرِ اﻟْﻌَﺎﻟَﻤِﯿﻦَ', tr:"Allâhumma bi-haqqi hadhâ-d-du‘â’i wa bi-haqqi hadhihi-l-ismâ’i, al-latî lâ yaiamu tafsîrahâ wa lâ ya‘lamu bâtinahâ ghayruka, salli ‘alâ Muhammadinn wa âli Muhammadinn, wa-fal bî mâ anta ahluhu walâ taf al bî mâ anâ ahluhu, wa- ghfir liya min dhunûbî mâ taqaddama minhâ wa mâ ta’akhkhara, wa wassi‘ ‘alayya min halâli rizqika, wa-kfinî ma’unata insâni saw’inn wa jâri saw'inn wa qarîni saw’inn wa sultâni saw’inn, innaka ‘alâ mâ tashâ’u qadîrunn, wa bi-kulli shay’inn ‘alîmunn, âmîna, rabba-l-‘âlamîna.", fr:"Mon Dieu, par le droit de cette invocation, par le droit de ces noms, dont personne autre que Toi ne connaît leur interprétation et leur [sens] profond, prie sur Mohammed et sur la famille de Mohammed, et agis avec moi selon ce dont Tu es Maître et ne me traite pas comme je le mérite, pardonne-moi mes péchés, récents et passés, répands sur moi de Tes Ressources licites, épargne-moi la peine d’un mauvais homme, d’un mauvais voisin, d'une mauvaise compagnie, d’un mauvais tyran, car Tu peux faire ce que Tu veux et Tu sais tout, exaucemoi, Seigneur des mondes !"},
        {t:'instruction', tx:'Je dis : Il y a après, selon certaines versions : -Ensuite, évoquer ses besoins et dire'},
        {t:'tri', ar:'اﻟﺮﱠاﺣِﻤِﯿﻦَ  أَرْﺣَﻢَ  ﯾَﺎ  اﻹِْﮐْﺮَامِ  وَ  اﻟْﺠَﻼلِ  ذَا  ﯾَﺎ  اﻷَْرْضِ  وَ  اﻟﺴﱠﻤَﺎوَاتِ  ﺑَﺪِﯾﻊَ  ﯾَﺎ  ﻣَﻨﱠﺎنُ  ﯾَﺎ  ﺣَﻨﱠﺎنُ  ﯾَﺎ  ﷲﱠُ  ﯾَﺎ وَ  ﺑَﺎﻃِﻨَﻬَﺎ  ﻻ  وَ  ﺗَﺄْوِﯾﻠَﻬَﺎ  ﻻ  وَ  ﺗَﻔْﺴِﯿﺮَﻫَﺎ  ﯾَﻌْﻠَﻢُ  ﻻ  اﻟﱠﺘِﯽ  اﻷَْﺳْﻤَﺎءِ  ﻫَﺬِهِ  ﺑِﺤَﻖﱢ  وَ  اﻟﺪﱡﻋَﺎءِ  ﻫَﺬَا  ﺑِﺤَﻖﱢ  اﻟﻠﱠﻬُﻢﱠ اﻵْﺧِﺮَهِ  وَ  اﻟﺪﱡﻧْﯿَﺎ  ﺧَﯿْﺮَ  ﺗَﺮْزُﻗَﻨِﯽ  أَنْ  وَ  ﻣُﺤَﻤﱠﺪٍ  آلِ  وَ  ﻣُﺤَﻤﱠﺪٍ  ﻋَﲆَ  ﺗُﺼَﻠﱢﯽَ  أَنْ  ﻏَﯿْﺮُکَ  ﻇَﺎﻫِﺮَﻫَﺎ  ﻻ', tr:"Yâ Allâhu, yâ hannânu, yâ mannânu, yâ badî‘a-s-samâwâti wa-lardi, yâ dhâ-l- jalâli wa-l-ikrâmi, yâ arhama ar-râhimîna. Allâhumma, bi-haqqi hadhâ-d-du'â’i, wa bi-haqqi hadhihi-lasmâ'i, al-latî lâ ya'lamu tafsîrahâ wa lâ ta’wîlahâ, wa là bâtinihâ wa lâ zhâhirahâ ghayruka, an tusalliya ‘alâ Muhammadinn wa âli Muhammadinn wa an tarzuqanî khayra-d-dunyâ wa-l-âkhirati.", fr:'Ô Dieu, ô Très-Tendre, ô Généreux Donateur, ô Créateur des cieux et de la terre,ô Plein de Majesté et de Noblesse, ô le plus Miséricordieux des miséricordieux ! Mon Dieu, par le droit de cette invocation, par le droit de ces Noms, dont personne antre que Toi ne connaît leur interprétation, ni leur exégèse, ni leur [sens] profond (intérieur) ni apparent (extérieur), [je Te demande] de prier sur Mohammed et sur la famille de Mohammed et de me pourvoir des Biens de ce monde et de l’Au-delà !'},
        {t:'instruction', tx:'-Ensuite, demander ce dont on a besoin et dire :'},
        {t:'tri', ar:'ﻟِﯽ  اﻏْﻔِﺮْ  وَ  ﻓُﻼنٍ  ﺑْﻦِ  ﻓُﻼنِ  ﻣِﻦْ  ﻟِﯽ  اﻧْﺘَﻘِﻢْ  وَ  أَﻫْﻠُﻪُ  أَﻧَﺎ  ﻣَﺎ  ﺑِﯽ  ﺗَﻔْﻌَﻞْ  ﻻ  وَ  أَﻫْﻠُﻪُ  أَﻧْﺖَ  ﻣَﺎ  ﺑِﯽ  اﻓْﻌَﻞْ  وَ ﻣِﻦْ  ﻋَﻠَﯽﱠ  وَﺳﱢﻊْ  وَ  اﻟْﻤُﺆْﻣِﻨَﺎتِ  وَ  اﻟْﻤُﺆْﻣِﻨِﯿﻦَ  ﻟِﺠَﻤِﯿﻊِ  وَ  ﻟِﻮَاﻟِﺪَیﱠ  وَ  ﺗَﺄَﺧﱠﺮَ  ﻣَﺎ  وَ  ﻣِﻨْﻬَﺎ  ﺗَﻘَﺪﱠمَ  ﻣَﺎ  ذُﻧُﻮﺑِﯽ  ﻣِﻦْ ﺳَﻮْءٍ  ﯾَﻮْمِ  وَ  ﺳَﻮْءٍ  ﻗَﺮِﯾﻦِ  وَ  ﺳَﻮْءٍ  ﺳُﻠْﻄَﺎنِ  وَ  ﺳَﻮْءٍ  ﺟَﺎرِ  وَ  ﺳَﻮْءٍ  إِﻧْﺴَﺎنِ  ﻣَﺌُﻮﻧَﻪَ  اﮐْﻔِﻨِﯽ  وَ  رِزْﻗِﮏَ  ﺣَﻼلِ وَ  أَوْﻻدِی  وَ  ﺑِﺄَﻫْﻠِﯽ  وَ  ﺑِﯽ  ﯾُﺮِﯾﺪُ  وَ  ﻋَﻠَﯽﱠ  ﯾَﺒْﻐِﯽ  ﻣِﻤﱠﻦْ  وَ  ﯾَﮑِﯿﺪُﻧِﯽ  ﻣِﻤﱠﻦْ  ﻟِﯽ  اﻧْﺘَﻘِﻢْ  وَ  ﺳَﻮْءٍ  ﺳَﺎﻋَﻪِ  وَ ﺑِﮑُﻞﱢ  وَ  ﻗَﺪِﯾﺮٌ  ﺗَﺸَﺎءُ  ﻣَﺎ  ﻋَﲆَ  إِﻧﱠﮏَ  ﻇُﻠْﻤﺎ  اﻟْﻤُﺆْﻣِﻨَﺎتِ  وَ  اﻟْﻤُﺆْﻣِﻨِﯿﻦَ  ﻣِﻦَ  ﻗَﺮَاﺑَﺎﺗِﯽ  وَ  ﺟِﯿﺮَاﻧِﯽ  وَ  إِﺧْﻮَاﻧِﯽ اﻟْﻌَﺎﻟَﻤِﯿﻦَ  رَبﱠ  آﻣِﯿﻦَ  ﻋَﻠِﯿﻢٌ  ءٍ  ﺷَﯽْ', tr:"Wa-fal bî mâ anta ahluhu, wa lâ taf al bî mâ anâ ahluhu, wantaqim lî min fulâni bni fulâninn. wa-ghfir lî min dhunûbî mâ taqaddama minhâ wa mâ ta’akhkhara, wa li-wâlidayya wa li-jamî‘i-l-mu’minîna wa-lmu’minâti, wa wassi‘alayya min halâli rizqika, wa-kfmî ma’unata insâni saw’inn wa jâri saw’inn wa sultâni saw’inn wa qarîni saw’inn wa yawmi saw’inn wa sâ‘ati saw’inn, wa-ntaqim liya mimman yakîdunî, wa mimman yabghî ‘alayya, wa yurîdu bî wa bi-ahlî wa awlâdî wa ikhwânî wa jîrânî wa qarâbâtî mina-l-mu'minîna wa-l-mu’minâti zhulmann, innaka ‘alâ mâ tashâ’u qadîrunn, wa bi-kulli shay’inn ‘alîmunn, âmîna rabba-l-‘âlamîna.", fr:"Agis avec moi selon ce dont Tu es Maître et ne me traite pas comme je le mérite, venge-moi d'un tel fils d’un tel, (et nommer son ennemi), pardonne-moi mes péchés, récents et passés, ainsi qu’à mes parents et à l’ensemble des croyants et des croyantes, répands sur moi de Tes Ressources licites, épargne-moi la peine d’un mauvais homme, d’un mauvais voisin, d’un mauvais tyran, d’une mauvaise compagnie, d’un mauvais jour, d’une mauvaise heure, venge-moi de celui qui me tend des pièges, de celui qui est tyrannique à mon encontre, de celui qui veut être injuste contre moi, ma famille, mes enfants, mes frères, mes voisins, mes proches croyants et croyantes, car Tu peux faire ce que Tu veux et Tu sais tout, exaucemoi, Seigneur des mondes !"},
        {t:'instruction', tx:'Ensuite dire :'},
        {t:'tri', ar:'ﻋَﲆَ  وَ  اﻟﺜﱠﺮْوَهِ  وَ  ﺑِﺎﻟْﻐِﻨَﻰ  اﻟْﻤُﺆْﻣِﻨَﺎتِ  وَ  اﻟْﻤُﺆْﻣِﻨِﯿﻦَ  ﻓُﻘَﺮَاءِ  ﻋَﲆَ  ﺗَﻔَﻀﱠﻞْ  اﻟﺪﱡﻋَﺎءِ  ﻫَﺬَا  ﺑِﺤَﻖﱢ  اﻟﻠﱠﻬُﻢﱠ اﻟْﻤُﺆْﻣِﻨَﺎتِ  وَ  اﻟْﻤُﺆْﻣِﻨِﯿﻦَ  أَﺣْﯿَﺎءِ  ﻋَﲆَ  وَ  اﻟﺼﱢﺤﱠﻪِ  وَ  ﺑِﺎﻟﺸﱢﻔَﺎءِ  اﻟْﻤُﺆْﻣِﻨَﺎتِ  وَ  اﻟْﻤُﺆْﻣِﻨِﯿﻦَ  ﻣَﺮْﺿَﻰ ﻣُﺴَﺎﻓِﺮِی  ﻋَﲆَ  وَ  اﻟﺮﱠﺣْﻤَﻪِ  وَ  ﺑِﺎﻟْﻤَﻐْﻔِﺮَهِ  اﻟْﻤُﺆْﻣِﻨَﺎتِ  وَ  اﻟْﻤُﺆْﻣِﻨِﯿﻦَ  أَﻣْﻮَاتِ  ﻋَﲆَ  وَ  اﻟْﮑَﺮَاﻣَﻪِ  وَ  ﺑِﺎﻟﻠﱡﻄْﻒِ وَ  اﻟﺮﱠاﺣِﻤِﯿﻦَ  أَرْﺣَﻢَ  ﯾَﺎ  ﺑِﺮَﺣْﻤَﺘِﮏَ  ﻏَﺎﻧِﻤِﯿﻦَ  ﺳَﺎﻟِﻤِﯿﻦَ  أَوْﻃَﺎﻧِﻬِﻢْ  إِﱃَ  ﺑِﺎﻟﺮﱠدﱢ  اﻟْﻤُﺆْﻣِﻨَﺎتِ  وَ  اﻟْﻤُﺆْﻣِﻨِﯿﻦَ .ﮐَﺜِﯿﺮا  ﺗَﺴْﻠِﯿﻤﺎ  ﺳَﻠﱠﻢَ  وَ  اﻟﻄﱠﺎﻫِﺮِﯾﻦَ  ﻋِﺘْﺮَﺗِﻪِ  وَ  اﻟﻨﱠﺒِﯿﱢﯿﻦَ  ﺧَﺎﺗَﻢِ  ﻣُﺤَﻤﱠﺪٍ  ﺳَﯿﱢﺪِﻧَﺎ  ﻋَﲆَ  ﷲﱠُ  ﺻَﲆﱠ', tr:'Allâhumma, bi-haqqi hadhâ-d-du‘â’i, tafaddal ‘alâ fuqarâ’i almu’minîna wa-l- mu’minâti bi-l-ghinâ wa-th-tharwati, wa ‘alâ mardâ-l-mu’minîna wa-l- mu’minâti bi-sh-shifa’i wa-ssihhati, wa ‘alâ ahyâ’i-l-mu’minîna wa-l-mu’minâti bi-l-lutfi wa-lkarâmati, wa alâ amwâti-l-mu’minîna wa-l-mu’minâti bi-l- maghfirati wa-rrahmati, wa ‘alâ musâfiri-l-mu’minîna wa-l-mu’minâti bi-r-raddi ilâ awtânihim sâlimîna ghânimîna, bi-rahmatika yâ arhama arrâhimîna. Wa sallâ-llâhu ‘alâ sayyidinâ Muhammadinn khâtami-nnabiyyîna, wa ‘itratihi at- tâhirîna wa sallama taslîmann kathîrann.', fr:'Mon Dieu, par le droit de cette invocation, accorde aux croyants et aux croyantes pauvres, la richesse et la fortune, aux croyants et aux croyantes malades, la guérison et la santé, aux croyants et aux croyantes vivants, la grâce et la noblesse, aux croyants et aux croyantes morts, le pardon et la miséricorde, aux croyants et croyantes en voyage, le retour dans leur patrie sains et saufs et couronnés de succès, par Ta Miséricorde, ô le plus Miséricordieux des miséricordieux. Que Dieu prie sur notre Maître Mohammed, le dernier des Prophètes, et sur les membres purs de sa famille et les salue beaucoup.'},
        {t:'instruction', tx:'Il est recommandé de dire après l’invocation as-Simât :'},
        {t:'tri', ar:'ﻣِﻦَ  ﻋَﻠَﯿْﻪِ  ﯾَﺸْﺘَﻤِﻞُ  ﺑِﻤَﺎ  وَ  اﻷَْﺳْﻤَﺎءِ  ﻣِﻦَ  ﻣِﻨْﻪُ  ﻓَﺎتَ  ﺑِﻤَﺎ  وَ  اﻟﺪﱡﻋَﺎءِ  ﻫَﺬَا  ﺑِﺤُﺮْﻣَﻪِ  أَﺳْﺄَﻟُﮏَ  إِﻧﱢﯽ  اﻟﻠﱠﻬُﻢﱠ ﮐﺬا  و  ﮐﺬا  ﺑﺠﺎى  و  ﮐَﺬَا  وَ  ﮐَﺬَا  ﺑِﯽ  ﺗَﻔْﻌَﻞَ  أَنْ  أَﻧْﺖَ  إِﻻ  ﺑِﻪِ  ﯾُﺤِﯿﻂُ  ﻻ  اﻟﱠﺬِی  اﻟﺘﱠﺪْﺑِﯿﺮِ  وَ  اﻟﺘﱠﻔْﺴِﯿﺮِ', tr:'Allâhumma, innî as’aluka bi-hurmati hadhâ ad-du‘â’i, wa bimâ fâta minhu mina- l-asmâ’i, wa bimâ yashtamilu ‘alayhi mina-t-tafsîri wa-t-tadbîri, al-ladhî lâ yuhîtu bihi illâ anta, an tafala bî kadhâ wa kadhâ.', fr:'Mon Dieu, je Te demande, par le côté sacré de cette invocation, par les Noms qui n’y ont pas été mentionnés, par ce qu’elle comprend en interprétation et en méditation, dont Seul Toi a une connaissance complète, de faire pour moi cela et cela.. Evoquer son besoin à la place de «cela et cela». »'},
      ]
    },

    kumayl: {
      source: 'Du\'ā classiques — Misbāḥ al-Mutahajid',
      title: 'Du\'ā Kumayl',
      subtitle: 'L\'invocation de Kumayl fils de Ziyād, enseignée par le Prince des croyants (p). Elle est récitée la nuit du milieu du mois de Sha\'aban et les nuits du vendredi.',
      body: [
        {t:'intro',tx:'Elle est une des invocations les plus connues. Le grand savant al-Majlisî (que Dieu lui fasse miséricorde) dit qu\'elle est la meilleure des invocations. Elle est l\'invocation d\'al-Khuḍr(p) que le Prince des croyants enseigna à Kumayl, un de ses plus proches compagnons. On l\'invoque la nuit du milieu du mois de Sha\'aban et les nuits du vendredi.'},
        {t:'tri',ar:'اللَّهُمَّ إِنِّي أَسْأَلُكَ بِرَحْمَتِكَ الَّتِي وَسِعَتْ كُلَّ شَيْءٍ،',tr:'Allâhumma, innî as\'aluka, bi-rahmatika al-latî wasi\'at kulla shay\'inn,',fr:'Mon Dieu, je Te demande, par Ta Miséricorde qui embrasse toute chose,'},
        {t:'tri',ar:'وَبِقُوَّتِكَ الَّتِي قَهَرْتَ بِهَا كُلَّ شَيْءٍ، وَخَضَعَ لَهَا كُلَّ شَيْءٍ، وَذَلَّ لَهَا كُلَّ شَيْءٍ،',tr:'wa bi-quwwatika al-latî qaharta bihâ kulla shay\'inn, wa khada\'a lahâ kullu shay\'inn, wa dhalla lahâ kullu shay\'inn,',fr:'par Ta Force avec laquelle Tu subjugues toute chose, à laquelle toute chose se soumet, devant laquelle toute chose s\'abaisse,'},
        {t:'tri',ar:'وَبِجَبَرُوتِكَ الَّتِي غَلَبْتَ بِهَا كُلَّ شَيْءٍ، وَبِعِزَّتِكَ الَّتِي لَا يَقُومُ لَهَا شَيْءٌ،',tr:'wa bi-jabarûtika al-latî ghalabta bihâ kulla shay\'inn, wa bi-\'izzatika al-latî lâ yaqûmu lahâ shay\'unn,',fr:'par Ta Force dominatrice avec laquelle Tu vaincs toute chose, par Ta Toute-Puissance à laquelle rien ne s\'oppose,'},
        {t:'tri',ar:'وَبِعَظَمَتِكَ الَّتِي مَلَأَتْ كُلَّ شَيْءٍ، وَبِسُلْطَانِكَ الَّذِي عَلَا كُلَّ شَيْءٍ،',tr:'wa bi-\'azhamatika al-latî mala\'at kulla shay\'inn, wa bi-sultânika al-ladhî \'alâ kulla shay\'inn,',fr:'par Ta Grandeur qui remplit toute chose, par Ton Pouvoir qui s\'élève au-dessus de toute chose,'},
        {t:'tri',ar:'وَبِوَجْهِكَ الْبَاقِي بَعْدَ فَنَاءِ كُلِّ شَيْءٍ، وَبِأَسْمَائِكَ الَّتِي مَلَأَتْ أَرْكَانَ كُلِّ شَيْءٍ،',tr:'wa bi-wajhika al-bâqî ba\'da fanâ\'i kulli shay\'inn, wa bi-asmâ\'ika al-latî mala\'at arkâna kulli shay\'inn,',fr:'par Ta Face qui subsiste après l\'anéantissement de toute chose, par Tes Noms qui remplissent les piliers de toute chose,'},
        {t:'tri',ar:'وَبِعِلْمِكَ الَّذِي أَحَاطَ بِكُلِّ شَيْءٍ، وَبِنُورِ وَجْهِكَ الَّذِي أَضَاءَ لَهُ كُلُّ شَيْءٍ،',tr:'wa bi-\'ilmika al-ladhî ahâta bi-kulli shay\'inn, wa bi-nûri wajhika al-ladhî adâ\'a lahu kullu shay\'inn,',fr:'par Ton Savoir qui englobe toute chose, par la Lumière de Ta Face pour qui toute chose s\'illumine,'},
        {t:'tri',ar:'يَا نُورُ يَا قُدُّوسُ، يَا أَوَّلَ الْأَوَّلِينَ، وَيَا آخِرَ الْآخِرِينَ.',tr:'yâ nûru, yâ quddûsu, yâ awwala-l-awwalîna, wa yâ âkhira-l-âkhirîna.',fr:'ô Lumière, ô Saint, ô le Premier des premiers, ô le Dernier des derniers !'},
        {t:'tri',ar:'اللَّهُمَّ اغْفِرْ لِيَ الذُّنُوبَ الَّتِي تَهْتِكُ الْعِصَمَ،',tr:'Allâhumma-ghfir liya adh-dhu-nûba al-latî tahtika -l-\'isama',fr:'Mon Dieu, pardonne-moi les péchés qui déchirent les voiles protecteurs !'},
        {t:'tri',ar:'اللَّهُمَّ اغْفِرْ لِيَ الذُّنُوبَ الَّتِي تُنْزِلُ النِّقَمَ،',tr:'Allâhumma-ghfir liya adh-dhu-nûba al-latî tunzilu-n-niqama.',fr:'Mon Dieu, pardonne-moi les péchés qui font descendre les châtiments !'},
        {t:'tri',ar:'اللَّهُمَّ اغْفِرْ لِيَ الذُّنُوبَ الَّتِي تُغَيِّرُ النِّعَمَ،',tr:'Allâhumma-ghfir liya adh-dhu-nûba al-latî tughayyiru an-ni\'ama',fr:'Mon Dieu, pardonne-moi les péchés qui altèrent les bienfaits !'},
        {t:'tri',ar:'اللَّهُمَّ اغْفِرْ لِيَ الذُّنُوبَ الَّتِي تَحْبِسُ الدُّعَاءَ،',tr:'Allâhumma-ghfir liya adh-dhu-nûba al-latî tahbisu-d-du\'â\'a !',fr:'Mon Dieu, pardonne-moi les péchés qui retiennent l\'invocation !'},
        {t:'tri',ar:'اللَّهُمَّ اغْفِرْ لِيَ الذُّنُوبَ الَّتِي تُنْزِلُ الْبَلَاءَ،',tr:'Allâhumma-ghfir liya adh-dhu-nûba al-latî tunzilu-l-balâ\'a !',fr:'Mon Dieu, pardonne-moi les péchés qui font descendre le malheur !'},
        {t:'tri',ar:'اللَّهُمَّ اغْفِرْ لِيَ الذُّنُوبَ الَّتِي تَقْطَعُ الرَّجَاءَ،',tr:'Allâhumma-ghfir liya adh-dhu-nûba al-latî taqta\'u ar-rajâ\'a !',fr:'Mon Dieu, pardonne-moi les péchés qui coupent l\'espérance !'},
        {t:'tri',ar:'اللَّهُمَّ اغْفِرْ لِي كُلَّ ذَنْبٍ أَذْنَبْتُهُ، وَكُلَّ خَطِيئَةٍ أَخْطَأْتُهَا،',tr:'Allâhumma-ghfir liya kulla dhanbinn adhnabtuhu wa kulla khati\'atinn akhta\'tuhâ !',fr:'Mon Dieu, pardonne-moi tous les péchés que j\'ai commis et toute faute que j\'ai faite !'},
        {t:'tri',ar:'اللَّهُمَّ إِنِّي أَتَقَرَّبُ إِلَيْكَ بِذِكْرِكَ، وَأَسْتَشْفِعُ بِكَ إِلَى نَفْسِكَ،',tr:'Allâhumma, innî ataqarrabu ilayka bi-dhikrika, wa-stashfi\'u bika ilâ nafsika,',fr:'Mon Dieu, je m\'approche de Toi par Ton Évocation, j\'implore Ton Intercession auprès de Toi,'},
        {t:'tri',ar:'وَأَسْأَلُكَ بِجُودِكَ أَنْ تُدْنِيَنِي مِنْ قُرْبِكَ، وَأَنْ تُوزِعَنِي شُكْرَكَ، وَأَنْ تُلْهِمَنِي ذِكْرَكَ.',tr:'wa as\'aluka bi-jûdika an tudni-yanî min qurbika wa an tûzi\'anî shukraka wa an tulhimanî dhikraka.',fr:'et je Te demande par Ta Générosité de me rapprocher de Toi, de me suggérer de Te remercier et de m\'inspirer de T\'évoquer !'},
        {t:'tri',ar:'اللَّهُمَّ إِنِّي أََسْأَلُكَ سُؤَالَ خَاضِعٍ مُتَذَلِّلٍ خَاشِعٍ، أَنْ تُسَامِحَنِي وَتَرْحَمَنِي،',tr:'Allâhumma, innî as\'aluka su\'âla khâdi\'inn, mutadhallilinn, khâ-shi\'inn, an tusâmihanî wa tarhamanî,',fr:'Mon Dieu, je T\'implore, en étant soumis à Toi, en m\'abaissant devant Toi, humblement, de me pardonner, de me faire miséricorde,'},
        {t:'tri',ar:'وَتَجْعَلَنِي بِقِسْمِكَ رَاضِياً قَانِعاً، وَفِي جَمِيعِ الْأَحْوَالِ مُتَوَاضِعاً.',tr:'wa taj\'alanî bi-qasmika râdi-yann, qâni\'ann wa fî jamî\'i-l-ahwâli mutawâdi\'ann.',fr:'et de me rendre satisfait et convaincu de Ton Partage, et humble en toute circonstance !'},
        {t:'tri',ar:'اللَّهُمَّ وَأَسْأَلُكَ سُؤَالَ مَنِ اشْتَدَّتْ فَاقَتُهُ، وَأَنْزَلَ بِكَ عِنْدَ الشَّدَائِدِ حَاجَتَهُ، وَعَظُمَ فِيمَا عِنْدَكَ رَغْبَتُهُ.',tr:'Allâhumma, wa as\'aluka su\'âla man ashtaddat fâqatuhu, wa anzala bika \'inda-sh-shadâ\'idi hâjatahu wa \'azhuma fîmâ \'indaka raghbatuhu.',fr:'Mon Dieu, je Te présente la demande de quelqu\'un dont l\'indigence s\'est beaucoup accrue, qui a déposé auprès de Toi sa requête dans l\'adversité, dont le désir de ce qu\'il y a auprès de Toi est devenu grandiose.'},
        {t:'tri',ar:'اللَّهُمَّ عَظُمَ سُلْطَانُكَ وَعَلَا مَكَانُكَ، وَخَفِيَ مَكْرُكَ وَظَهَرَ أَمْرُكَ، وَغَلَبَ قَهْرُكَ وَجَرَتْ قُدْرَتُكَ، وَلَا يُمْكِنُ الْفِرَارُ مِنْ حُكُومَتِكَ.',tr:'Allâhumma, \'azhuma sultânuka wa \'alâ makânuka wa khafiya makruka wa zhahara amruka, wa ghalaba qahruka wa jarat qudratuka wa lâ yumkinu-l-firâru min hukûmatika.',fr:'Mon Dieu, Ton Pouvoir est grandiose, Ton Lieu élevé, Ta Ruse cachée, Ton Ordre manifeste, Ta Force est victorieuse, Ta Puissance courante et il n\'est pas possible d\'échapper à Ton Gouvernement.'},
        {t:'tri',ar:'اللَّهُمَّ لَا أَجِدُ لِذُنُوبِي غَافِراً وَلَا لِقَبَائِحِي سَاتِراً، وَلَا لِشَيْءٍ مِنْ عَمَلِيَ الْقَبِيحِ بِالْحَسَنِ مُبَدِّلاً غَيْرَكَ،',tr:'Allâhumma, lâ ajidu li-dhunûbî ghâfirann wa lâ li-qabâ\'ihî sâtirann, wa lâ li-shay\'inn min \'amalî-l-qabîhi bi-l-hasani mu-baddilann ghayraka.',fr:'Mon Dieu, je ne vois personne pour pardonner mes péchés, recouvrir mes ignominies, remplacer mes mauvaises actions par des bienfaits autre que Toi !'},
        {t:'tri',ar:'لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ وَبِحَمْدِكَ',tr:'Lâ ilâha illâ anta subhânaka wa bi-hamdika.',fr:'Point de divinité autre que Toi, que Tu sois Glorifié et par Ta Louange !'},
        {t:'tri',ar:'ظَلَمْتُ نَفْسِي، وَتَجَرَّأْتُ بِجَهْلِي، وَسَكَنْتُ إِلَى قَدِيمِ ذِكْرِكَ لِي وَمَنِّكَ عَلَيَّ.',tr:'Zhalamtu nafsî, wa tajjara\'tu bi-jahlî, wa sakantu ilâ qadîmi dhikrika lî wa mannika \'alayya.',fr:'Je me suis fait du tort à moi-même, je me suis enhardi à cause de mon ignorance, et je me suis fié à l\'éternité de Ton Rappel pour moi et de Ta Grâce à mon égard !'},
        {t:'tri',ar:'اللَّهُمَّ مَوْلَايَ كَمْ مِنْ قَبِيحٍ سَتَرْتَهُ، وَكَمْ مِنْ فَادِحٍ مِنَ الْبَلَاءِ أَقَلْتَهُ،',tr:'Allâhumma mawlâya kam min qabîhinn satartahu, wa kam min fâdihinn mina-l-balâ\'i aqaltahu,',fr:'Mon Dieu, mon Maître, combien de vilaines actions as-Tu recouvertes, combien d\'accablantes calamités m\'as Tu épargnées,'},
        {t:'tri',ar:'وَكَمْ مِنْ عِثَارٍ وَقَيْتَهُ، وَكَمْ مِنْ مَكْرُوهٍ دَفَعْتَهُ، وَكَمْ مِنْ ثَنَاءٍ جَمِيلٍ لَسْتُ أَهْلًا لَهُ نَشَرْتَهُ.',tr:'wa kam min \'ithârinn waqay-tahu wa kam min makrûhinn dafa\'tahu, wa kam min thanâ\'-inn jamîlinn lastu ahlann lahu nashartahu.',fr:'de combien de faux-pas m\'as-Tu protégé, combien d\'adversités as-Tu repoussées de moi, combien de belles louanges que je ne méritais pas as-Tu répandues !'},
        {t:'tri',ar:'اللَّهُمَّ عَظُمَ بَلَائِي، وَأَفْرَطَ بِي سُوءُ حَالِي، وَقَصُرَتْ بِي أَعْمَالِي،',tr:'Allâhumma, \'azhuma balâ\'î wa afrata bî sû\'u hâlî, wa qasurat bî a\'mâlî,',fr:'Mon Dieu, mon malheur est devenu grandiose, mon état s\'est empiré à l\'excès, mes bonnes actions me font défaut,'},
        {t:'tri',ar:'وَقَعَدَتْ بِي أَغْلَالِي، وَحَبَسَنِي عَنْ نَفْعِي بُعْدُ آمَالِي،',tr:'wa qa\'adat bî aghlâlî, wa habasanî \'an naf\'î bu\'du âmâlî.',fr:'les liens de mes péchés m\'entravent et la longueur de mes espoirs ne m\'est pas profitable.'},
        {t:'tri',ar:'وَخَدَعَتْنِي الدُّنْيَا بِغُرُورِهَا، وَنَفْسِي بِخِيَانَتِهَا، وَمِطَالِي يَا سَيِّدِي',tr:'Wa khada\'atnî-d-dunyâ bi-ghu-rûrihâ, wa nafsî bi-khiyânatihâ, wa mitâlî yâ sayyidî.',fr:'Le monde ici-bas m\'a trompé avec ses illusions ainsi que mon âme avec sa perfidie et ma tendance à remettre à plus tard, ô mon Maître !'},
        {t:'tri',ar:'فَأَسْأَلُكَ بِعِزَّتِكَ أَنْ لَا يَحْجُبَ عَنْكَ دُعَائِي سُوءُ عَمَلِي وَفِعَالِي،',tr:'Fa-as\'aluka, bi-\'izzatika an lâ yahjuba \'anka du\'â\'î sû\'u \'amalî wa fi\'âlî,',fr:'Aussi, je Te demande, par Ta Puissance, de ne pas laisser mes mauvaises actions être un voile entre mes invocations et Toi,'},
        {t:'tri',ar:'وَلَا تَفْضَحْنِي بِخَفِيِّ مَا اطَّلَعْتَ عَلَيْهِ مِنْ سِرِّي،',tr:'wa lâ tafdahanî bi-khafiyyi mâ attala\'ta \'alayhi min sirrî,',fr:'de ne pas me déshonorer en dévoilant mes secrets intérieurs dont Tu as connaissance,'},
        {t:'tri',ar:'وَلَا تُعَاجِلْنِي بِالْعُقُوبَةِ عَلَى مَا عَمِلْتُهُ فِي خَلَوَاتِي مِنْ سُوءِ فِعْلِي وَإِسَاءَتِي،',tr:'wa lâ tu\'âjilnî bi-l-\'uqûbati \'alâ mâ \'amiltuhu fî khalawâtî min sû\'i fi\'lî wa isâ\'atî,',fr:'de ne pas T\'empresser de me punir pour les mauvaises actions et les méfaits que j\'ai faits dans l\'isolement,'},
        {t:'tri',ar:'وَدَوَامِ تَفْرِيطِي وَجَهَالَتِي، وَكَثْرَةِ شَهَوَاتِي وَغَفْلَتِي،',tr:'wa dawâmi tafrîtî wa jahâlatî wa kathrati shahawâtî wa ghaflatî,',fr:'pour la permanence de mes excès et de mon ignorance, pour la multitude de mes passions et de mon insouciance,'},
        {t:'tri',ar:'وَكُنِ اللَّهُمَّ بِعِزَّتِكَ لِي فِي الْأَحْوَالِ كُلِّهَا رَءُوفاً، وَعَلَيَّ فِي جَمِيعِ الْأُمُورِ عَطُوفاً.',tr:'wa kun, Allâhumma, bi-\'izzatika lî fî-l-ahwâli kullihâ ra\'ûfann, wa \'alayya fî jamî\'i-l-umûri \'atûfann.',fr:'je Te demande, ô mon Dieu, d\'être, par Ta Puissance, Bon envers moi dans toutes les situations et Bienveillant dans l\'ensemble des ordres.'},
        {t:'tri',ar:'إِلَهِي وَرَبِّي مَنْ لِي غَيْرُكَ أَسْأَلُهُ كَشْفَ ضُرِّي وَالنَّظَرَ فِي أَمْرِي،',tr:'Ilâhî wa rabbî, man lî ghayruka as\'aluhu kashfa durrî wa-n-nazhara fî amrî.',fr:'Mon Dieu et mon Seigneur, à qui m\'adresser, autre que Toi, pour demander de soulager ma misère et considérer mon ordre ?'},
        {t:'tri',ar:'إِلَهِي وَمَوْلَايَ أَجْرَيْتَ عَلَيَّ حُكْماً اتَّبَعْتُ فِيهِ هَوَى نَفْسِي وَلَمْ أَحْتَرِسْ فِيهِ مِنْ تَزْيِينِ عَدُوِّي،',tr:'Ilâhî wa mawlâya, ajrayta \'alayya hukmann attaba\'tu fîhi hawâ nafsî wa lam ahtaris fîhi min tazyîni \'aduwwiyî,',fr:'Mon Dieu et mon Maître, Tu m\'as instauré un règlement et au lieu de T\'obéir je n\'ai suivi que les passions de mon âme, je n\'ai pas pris garde aux embellissements de mon ennemi,'},
        {t:'tri',ar:'فَغَرَّنِي بِمَا أَهْوَى وَأَسْعَدَهُ عَلَى ذَلِكَ الْقَضَاءُ',tr:'fa-gharranî bimâ ahwâ wa as\'adahu \'alâ dhâlika al-qadâ\'u.',fr:'alors il m\'a trompé par ce que j\'ai désiré, le Décret arrêté l\'aidant en cela.'},
        {t:'tri',ar:'فَتَجَاوَزْتُ بِمَا جَرَى عَلَيَّ مِنْ ذَلِكَ بَعْضَ حُدُودِكَ، وَخَالَفْتُ بَعْضَ أَوَامِرِكَ،',tr:'Fa-tajâwaztu bimâ jarâ \'alayya min dhâlika ba\'da hudûdika, wa khâlaftu ba\'da awâmirika.',fr:'Alors j\'ai transgressé certaines de Tes Lois de ce que Tu m\'as instauré à ce propos, et j\'ai désobéi à certains de Tes Ordres.'},
        {t:'tri',ar:'فَلَكَ الْحُجَّةُ عَلَيَّ فِي جَمِيعِ ذَلِكَ، وَلَا حُجَّةَ لِي فِيمَا جَرَى عَلَيَّ فِيهِ قَضَاؤُكَ، وَأَلْزَمَنِي حُكْمُكَ وَبَلَاؤُكَ،',tr:'Falaka-l-hujjatu \'alayya fî jamî\'i dhâlika, wa lâ hujjata lî fîmâ jarâ \'alayya fîhi qadâ\'uka, wa alzamanî hukmuka wa balâ\'uka.',fr:'Alors Tu as l\'argument à mon encontre pour l\'ensemble de cela, et moi je n\'en ai aucun pour ma défense à propos de Ton Décret en cours, ainsi que Ton Jugement et Ton Épreuve que Tu m\'as imposés.'},
        {t:'tri',ar:'وَقَدْ أَتَيْتُكَ يَا إِلَهِي بَعْدَ تَقْصِيرِي وَإِسْرَافِي عَلَى نَفْسِي',tr:'Wa qad ataytuka yâ ilâhî ba\'da taqsîrî wa isrâfî \'alâ nafsî,',fr:'Je suis déjà venu à Toi, ô mon Dieu, après ma défaillance et mes excès,'},
        {t:'tri',ar:'مُعْتَذِراً نَادِماً مُنْكَسِراً مُسْتَقِيلاً مُسْتَغْفِراً مُنِيباً مُقِرّاً مُذْعِناً مُعْتَرِفاً،',tr:'mu\'tadhirann, nâdimann, mun-kasirann, mustaqîlann, mustagh-firann, munîbann, muqirrann, mudh\'inann, mu\'tarifann.',fr:'Te présentant les excuses, regrettant, abattu, demandant l\'absolution, implorant le pardon, me repentant, reconnaissant mes péchés, docile, me confessant à Toi.'},
        {t:'tri',ar:'لَا أَجِدُ مَفَرّاً مِمَّا كَانَ مِنِّي وَلَا مَفْزَعاً أَتَوَجَّهُ إِلَيْهِ فِي أَمْرِي، غَيْرَ قَبُولِكَ عُذْرِي وَإِدْخَالِكَ إِيَّايَ فِي سَعَةِ مِنْ رَحْمَتِكَ،',tr:'Lâ ajidu mafarrann mimmâ kâna minnî wa lâ mafza\'ann atawajjahu ilayhi fî amrî, ghayra qabûlika \'udhrî wa idkhâlika iyyâya fî sa\'atinn rahmatika.',fr:'Je ne trouve aucun lieu où fuir de ce que j\'ai fait, ni d\'abri vers où me diriger, en dehors de Ton acceptation de mes excuses et mon admission dans l\'étendue de Ta Miséricorde.'},
        {t:'tri',ar:'اللَّهُمَّ فَاقْبَلْ عُذْرِي وَارْحَمْ شِدَّةَ ضُرِّي، وَفُكَّنِي مِنْ شَدِّ وَثَاقِي،',tr:'Allâhumma, fa-qbal \'udhrî wa-rham shiddata durrî, wa fukkanî min shaddi wathâqî.',fr:'Alors, mon Dieu, accepte mes excuses, aie pitié de la gravité de mon dommage, délivre-moi de la lourdeur de mes chaînes !'},
        {t:'tri',ar:'يَا رَبِّ ارْحَمْ ضَعْفَ بَدَنِي وَرِقَّةَ جِلْدِي وَدِقَّةَ عَظْمِي،',tr:'Yâ rabbi, arham da\'fa badanî wa riqqata jildî wa diqqata \'azhmî.',fr:'Ô Seigneur, aie pitié de la faiblesse de mon corps, de la délicatesse de ma peau, de la finesse de mes os !'},
        {t:'tri',ar:'يَا مَنْ بَدَأَ خَلْقِي وَذِكْرِي وَتَرْبِيَتِي وَبِرِّي وَتَغْذِيَتِي، هَبْنِي لِابْتِدَاءِ كَرَمِكَ وَسَالِفِ بِرِّكَ بِي،',tr:'Yâ man bada\'a khalqî wa dhikrî wa tarbiyatî wa birrî wa taghdhiyatî, habnî li-ibtidâ\'i karamika wa sâlifi birrika bî.',fr:'Ô Celui qui est à l\'origine de ma création, de mon éducation, du dévouement envers moi et de ma nourriture, continue de me pourvoir, par la Grâce de Ta Générosité initiale et de Ta Bienveillance préalable à mon égard.'},
        {t:'tri',ar:'يَا إِلَهِي وَسَيِّدِي وَرَبِّي، أَتُرَاكَ مُعَذِّبِي بِنَارِكَ بَعْدَ تَوْحِيدِكَ،',tr:'Yâ ilâhî, wa sayyidî, wa rabbî, a turâka mu\'adhdhibî bi-nârika ba\'da tawhîdika,',fr:'Ô mon Dieu, mon Maître et mon Seigneur, est-ce que Tu me verrais être châtié par Ton Feu après que j\'eus proclamé Ton Unicité,'},
        {t:'tri',ar:'وَبَعْدَمَا انْطَوَى عَلَيْهِ قَلْبِي مِنْ مَعْرِفَتِكَ، لَهِجَ بِهِ لِسَانِي مِنْ ذِكْرِكَ، وَاعْتَقَدَهُ ضَمِيرِي مِنْ حُبِّكَ،',tr:'wa ba\'damâ-ntawâ \'alayhi qalbî min ma\'rifatika, lahija bihi lisânî min dhikrika wa-\'taqadahu damîrî min hubbika,',fr:'que mon cœur se fut empli de Ta Connaissance, que ma langue se fut attachée à T\'évoquer et que ma conscience se fut convaincue de Ton Amour,'},
        {t:'tri',ar:'وَبَعْدَ صِدْقِ اعْتِرَافِي وَدُعَائِي خَاضِعاً لِرُبُوبِيَّتِكَ،',tr:'wa ba\'da sidqi a\'tirâfi wa du\'â\'î khâdi\'ann li-rubûbiyyatika.',fr:'et après la sincérité de la reconnaissance de mes péchés et de mes invocations, me soumettant à Ta Seigneurie ?!'},
        {t:'tri',ar:'هَيْهَاتَ أَنْتَ أَكْرَمُ مِنْ أَنْ تُضَيِّعَ مَنْ رَبَّيْتَهُ، أَوْ تُبْعِدَ مَنْ أَدْنَيْتَهُ،',tr:'Hayhâta, anta akramu min an tudayyi\'a man rabbaytahu aw tuba\'\'\'ida man adnaytahu,',fr:'Non ! Jamais ! Tu es plus Généreux que cela, pour abandonner celui que Tu as élevé ou pour éloigner celui que Tu as rapproché,'},
        {t:'tri',ar:'أَوْ تُشَرِّدَ مَنْ آوَيْتَهُ، أَوْ تُسَلِّمَ إِلَى الْبَلَاءِ مَنْ كَفَيْتَهُ وَرَحِمْتَهُ،',tr:'aw tusharrida man âwaytahu aw tusallima ilâ-l-balâ\'i man kafaytahu wa rahimtahu.',fr:'ou pour chasser celui que Tu as abrité, ou pour livrer quelqu\'un au malheur dont Tu l\'avais épargné, à qui Tu as fait miséricorde !'},
        {t:'tri',ar:'وَلَيْتَ شِعْرِي يَا سَيِّدِي وَإِلَهِي وَمَوْلَايَ،',tr:'Wa layta shi\'rî, yâ sayyidî, wa ilâhî, wa mawlâya,',fr:'Ô si je savais, ô mon Maître, mon Dieu, mon Souverain,'},
        {t:'tri',ar:'أَتُسَلِّطُ النَّارَ عَلَى وُجُوهٍ خَرَّتْ لِعَظَمَتِكَ سَاجِدَةً، وَعَلَى أَلْسُنٍ نَطَقَتْ بِتَوْحِيدِكَ صَادِقَةً، وَبِشُكْرِكَ مَادِحَةً،',tr:'a tusallitu-n-nâra \'alâ ujûhinn kharrat li-\'azhamatika sâjida-tann, wa \'alâ alsuninn nataqat bi-tawhîdika sâdiqatann wa bi-shukrika mâdihatann,',fr:'est-ce que Tu donnerais le pouvoir au Feu de s\'emparer de visages qui sont tombés prosternés devant Ta Grandeur, de langues qui ont parlé de Ton Unicité en toute sincérité et qui T\'ont remercié en Te louant,'},
        {t:'tri',ar:'وَعَلَى قُلُوبٍ اعْتَرَفَتْ بِإِلَهِيَّتِكَ مُحَقِّقَةً، وَعَلَى ضَمَائِرَ حَوَتْ مِنَ الْعِلْمِ بِكَ حَتَّى صَارَتْ خَاشِعَةً،',tr:'wa \'alâ qulûbinn a\'tarafat bi-ilâhiyyatika muhaqqiqatann, wa \'alâ damâ\'ira hawat mina-l-\'ilmi bika hattâ sârat khâ-shi\'atann,',fr:'de cœurs qui ont reconnu Ta Divinité avec certitude, de consciences qui se sont imprégnées de Ta Connaissance au point de devenir humbles,'},
        {t:'tri',ar:'وَعَلَى جَوَارِحَ سَعَتْ إِلَى أَوْطَانِ تَعَبُّدِكَ طَائِعَةً، وَأَشَارَتْ بِاسْتِغْفَارِكَ مُذْعِنَةً،',tr:'wa \'alâ jawâriha sa\'at ilâ awtâni ta\'abbudika tâ\'i\'atann, wa ashârat bi-stighfârika mudh\'inatann ?!',fr:'de membres qui se sont rendus aux lieux où l\'on T\'adore par obéissance à Toi, et qui ont indiqué la demande de Ton Pardon en toute docilité ?!'},
        {t:'tri',ar:'مَا هَكَذَا الظَّنُّ بِكَ، وَلَا أُخْبِرْنَا بِفَضْلِكَ عَنْكَ يَا كَرِيمُ،',tr:'Mâ hakadhâ azh-zhannu bika, wa lâ ukhbirnâ bi-fadlika \'anka yâ karîmu.',fr:'Non ! Ce n\'est pas l\'opinion que nous avons de Toi, ni ce qui nous a été indiqué par Ta Faveur sur Toi, ô très Généreux !'},
        {t:'tri',ar:'يَا رَبِّ، وَأَنْتَ تَعْلَمُ ضَعْفِي عَنْ قَلِيلٍ مِنْ بَلَاءِ الدُّنْيَا وَعُقُوبَاتِهَا، وَمَا يَجْرِي فِيهَا مِنَ الْمَكَارِهِ عَلَى أَهْلِهَا،',tr:'Yâ rabbi, wa anta ta\'lamu da\'fî \'an qalîlinn min balâ\'i-d-dunyâ wa \'uqûbâtihâ, wa mâ yajrî fîhâ mina-l-makârihi \'alâ ahlihâ,',fr:'Ô mon Seigneur, Tu connais ma faiblesse devant le peu d\'épreuves de ce monde et de ses châtiments, devant les adversités qui arrivent à ses habitants,'},
        {t:'tri',ar:'عَلَى أَنَّ ذَلِكَ بَلَاءٌ وَمَكْرُوهٌ، قَلِيلٌ مَكْثُهُ، يَسِيرٌ بَقَاؤُهُ، قَصِيرٌ مُدَّتُهُ،',tr:'\'alâ anna dhalika balâ\'unn wa makrûhunn, qalîlunn makthu-hu, yasîrunn baqâ\'uhu, qasîrunn muddatuhu.',fr:'alors que ce sont des épreuves et des adversités passagères, éphémères, de courte durée !'},
        {t:'tri',ar:'فَكَيْفَ احْتِمَالِي لِبَلَاءِ الْآخِرَةِ وَجَلِيلِ وُقُوعِ الْمَكَارِهِ فِيهَا،',tr:'Fa-kayfa ihtimâlî li-balâ\'i-l-âkhirati wa jalîli uqû\'i-l-makârihi fîhâ,',fr:'Alors, comment pourrais-je supporter les épreuves de l\'Au-delà, ses adversités grandioses,'},
        {t:'tri',ar:'وَهُوَ بَلَاءٌ تَطُولُ مُدَّتُهُ، وَيَدُومُ مَقَامُهُ، وَلَا يُخَفَّفُ عَنْ أَهْلِهِ،',tr:'wa huwa balâ\'unn tatûlu muddatuhu wa yadûmu ma-qâmuhu wa lâ yukhaffafu \'an ahlihi,',fr:'alors que ce sont des épreuves de longue durée, permanentes, qui ne sont pas allégées pour ses tenants,'},
        {t:'tri',ar:'لِأَنَّهُ لَا يَكُونُ إِلَّا عَنْ غَضَبِكَ وَانْتِقَامِكَ وَسَخَطِكَ، وَهَذَا مَا لَا تَقُومُ لَهُ السَّمَاوَاتُ وَالْأَرْضُ،',tr:'li-innahu lâ yakûnu illâ \'an ghadabika wa-ntiqâmika wa sakhatika, wa hadhâ mâ lâ taqûmu lahu as-samâwâtu wa-l-ardu;',fr:'parce qu\'elles ne proviennent que de Ta Colère, de Ta Vengeance et de Ton Courroux, et cela est ce que ni les cieux ni la terre ne peuvent supporter !'},
        {t:'tri',ar:'يَا سَيِّدِي فَكَيْفَ بِي وَأَنَا عَبْدُكَ الضَّعِيفُ الذَّلِيلُ، الْحَقِيرُ الْمِسْكِينُ،',tr:'Yâ sayyidî, fa-kayfa bî wa anâ \'abduka ad-da\'îfu adh-dhalîlu, al-haqîru, al-miskînu.',fr:'Alors, ô mon Maître, qu\'en serait-il de moi, moi qui suis Ton serviteur faible, vil, méprisable, misérable ?'},
        {t:'tri',ar:'يَا إِلَهِي وَرَبِّي وَسَيِّدِي وَمَوْلَايَ، لِأَيِّ الْأُمُورِ إِلَيْكَ أَشْكُو، وَلِمَا مِنْهَا أَضِجُّ وَأَبْكِي،',tr:'Yâ ilâhî wa rabbî wa sayyidî wa mawlâya, li-ayyi-l-umûri ilayka ashkû, wa lima minhâ adijju wa abkî.',fr:'Ô mon Dieu, mon Seigneur, mon Maître, mon Tuteur, de quelles choses me plaindre auprès de Toi, pour lesquelles je crierai et je pleurerai ?'},
        {t:'tri',ar:'لِأَلِيمِ الْعَذَابِ وَشِدَّتِهِ أَمْ لِطُولِ الْبَلَاءِ وَمُدَّتِهِ،',tr:'Li-alîmi-l-\'adhâbi wa shidda-tihi am li-tûli-l-balâ\'i wa muddatihi ?',fr:'De la douleur et de l\'intensité du châtiment ou de la permanence de l\'épreuve et de sa durée ?'},
