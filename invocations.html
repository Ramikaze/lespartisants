<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070c18;color:#e8e2d0;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}
.app{display:flex;height:100%}

/* ══ SIDEBAR ══ */
.sidebar{
  width:240px;flex-shrink:0;height:100%;
  background:#0a1020;border-right:1px solid rgba(201,168,76,0.12);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{width:0}
.sb-header{
  padding:16px 14px 12px;border-bottom:1px solid rgba(201,168,76,0.1);
  flex-shrink:0;
}
.sb-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#c9a84c;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.sb-sub{font-size:10px;color:#3a4560;margin-top:2px;white-space:nowrap}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15)}

/* Theme group */
.sb-group{margin-bottom:4px}
.sb-theme{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;cursor:pointer;
  font-size:12px;font-weight:600;color:#9aa3b8;
  transition:all .18s;
  border-left:2px solid transparent;
}
.sb-theme:hover{color:#c9a84c;background:rgba(201,168,76,0.05)}
.sb-theme.open{color:#c9a84c;border-left-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06)}
.sb-theme-icon{font-size:14px;flex-shrink:0}
.sb-theme-label{flex:1;line-height:1.4}
.sb-chevron{font-size:9px;transition:transform .2s;flex-shrink:0;color:#c9a84c;opacity:.6}
.sb-theme.open .sb-chevron{transform:rotate(90deg)}

/* Sub-items */
.sb-items{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.sb-items.open{max-height:10000px}
.sb-sub-items{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.sb-sub-items.open{max-height:10000px}
.sb-item{
  display:block;padding:7px 14px 7px 36px;
  font-size:11.5px;color:#6b7280;cursor:pointer;
  transition:all .15s;line-height:1.4;
  border-left:2px solid transparent;
}
.sb-sub-items .sb-item{padding-left:48px}
.sb-item:hover{color:#c9a84c;background:rgba(201,168,76,0.04)}
.sb-item.active{color:#c9a84c;font-weight:600;background:rgba(201,168,76,0.08);border-left-color:#c9a84c}
.sb-item.disabled{opacity:0.35;pointer-events:none;font-style:italic}
.sb-item.subheader{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#c9a84c;opacity:0.8;cursor:pointer;padding:12px 14px 8px 24px;border-left:none;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.sb-item.subheader:hover{background:rgba(201,168,76,0.05)}
.sb-item.subheader .sb-chevron{transform:rotate(0deg);transition:transform .2s;color:#c9a84c}
.sb-item.subheader.open .sb-chevron{transform:rotate(90deg)}

/* ══ TOGGLE BUTTON ══ */
.sb-toggle{
  position:absolute;top:50%;left:240px;transform:translateY(-50%);
  width:18px;height:48px;background:#0d1828;border:1px solid rgba(201,168,76,0.2);
  border-left:none;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#c9a84c;z-index:50;transition:left .3s;
}
.sb-toggle:hover{background:rgba(201,168,76,0.12)}
.sidebar.collapsed~.sb-toggle{left:0}

/* ══ MAIN CONTENT ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;gap:16px;
}
.welcome-icon{font-size:48px;opacity:.4}
.welcome-title{font-family:'Cinzel',serif;font-size:16px;color:#c9a84c;font-weight:600;opacity:.7}
.welcome-hint{font-size:12px;color:#3a4560;line-height:1.6}

/* Content panel */
.content{
  flex:1;overflow-y:auto;padding:20px 24px 40px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent;
  animation:fadeIn .25s ease;
}
.content-inner{
  max-width:720px;margin:0 auto;
}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.content.hidden{display:none}
.welcome.hidden{display:none}

/* ══ CONTENT ELEMENTS ══ */
.c-source{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#c9a84c;opacity:.5;font-family:'Cinzel',serif;margin-bottom:4px;text-align:center}
.c-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#e8e2d0;line-height:1.3;margin-bottom:6px;text-align:center}
.c-subtitle{font-size:13px;color:#9aa3b8;font-style:italic;line-height:1.6;margin-bottom:16px;text-align:center}
.c-divider{height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.25),transparent);margin-bottom:18px}

/* Intro */
.c-intro{
  font-size:var(--inv-fr-size,14.5px);color:#9aa3b8;font-style:italic;line-height:1.7;
  padding:12px 16px;border-left:2px solid rgba(201,168,76,0.3);
  background:rgba(201,168,76,0.03);border-radius:0 8px 8px 0;margin-bottom:18px;
  text-align:justify;hyphens:auto;
}
/* Salawat */
.c-salawat{
  text-align:center;padding:8px;margin:6px 0;
  font-size:11px;color:#c9a84c;opacity:.45;letter-spacing:.1em;
  text-transform:uppercase;font-family:'Cinzel',serif;
}
/* Verse */
.c-verse{display:flex;gap:12px;margin-bottom:12px;padding:11px 13px;border-radius:9px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);transition:background .2s}
.c-verse:hover{background:rgba(201,168,76,0.04);border-color:rgba(201,168,76,0.1)}
.c-vnum{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:#c9a84c;margin-top:2px}
.c-vtext{font-size:var(--inv-fr-size,13.5px);line-height:1.82;color:#cec6b0;text-align:justify;hyphens:auto}
/* Instruction */
.c-instruction{font-size:12px;color:#c9a84c;font-weight:600;margin:14px 0 8px;padding:6px 12px;background:rgba(201,168,76,0.06);border-radius:6px;border:1px solid rgba(201,168,76,0.15)}
/* Prose */
.c-prose p{font-size:var(--inv-fr-size,15px);line-height:1.85;color:#cec6b0;margin-bottom:14px;text-align:justify;hyphens:auto}
.c-prose p:last-child{margin-bottom:0}

/* Ziyara style — slightly more solemn */
.c-zv{display:flex;gap:12px;margin-bottom:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.015);border-left:2px solid rgba(201,168,76,0.2)}
.c-zv-text{font-size:var(--inv-fr-size,13.5px);line-height:1.82;color:#cec6b0}

/* Trilingual verse (Arabic + transliteration + French) */
.c-tri{margin-bottom:14px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);transition:background .2s}
.c-tri:hover{background:rgba(201,168,76,0.04);border-color:rgba(201,168,76,0.1)}
.c-tri-ar{font-family:'Amiri Quran',serif;font-weight:400;font-size:var(--inv-ar-size,1.25rem);color:#c9a84c;direction:rtl;text-align:right;line-height:2;margin-bottom:6px}
.c-tri-tr{font-size:0.78rem;color:#9aa3b8;font-style:italic;line-height:1.6;margin-bottom:6px;padding-left:2px}
.c-tri-fr{font-size:var(--inv-fr-size,0.88rem);color:#cec6b0;line-height:1.75;text-align:justify;hyphens:auto}

.c-zv-ar{font-family:'Amiri',serif,sans-serif;font-size:var(--inv-ar-size,14px);color:#c9a84c;opacity:.75;direction:rtl;margin-top:4px;font-style:italic}
/* ── Font size controls ── */
.inv-fc{display:none;justify-content:flex-end;padding:8px 16px 0;gap:6px}
.inv-fc.show{display:flex}
.inv-fc .fc-grp{display:flex;align-items:center;gap:2px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:8px;padding:2px 4px}
.inv-fc .fc-label{font-size:10px;color:#c9a84c;opacity:0.6;padding:0 4px;min-width:16px;text-align:center}
.inv-fc .fc-label.ar-l{font-family:'Amiri',serif;font-size:14px}
.inv-fc .fc-btn{background:none;border:none;color:#c9a84c;font-size:15px;cursor:pointer;padding:3px 6px;border-radius:4px;line-height:1;transition:background .15s}
.inv-fc .fc-btn:hover{background:rgba(201,168,76,0.18)}
</style>

      title: 'Ibn al-Khiyaratayn',
      subtitle: 'Le fils des deux excellents',
      prose: true,
      body: [
        {t:'intro',tx:'QUATRIEME IMAM<br>Ali Al-Sajjad Ben Al-Hossein<br>Que la Paix soit avec lui'},
        'Nom : Ali Al-Sajjad Ben Al-Hossein Ben Abi Tâleb, que la Paix soit avec lui.',
        'Position : Quatrième Imam successeur au Prophète Mohammed (pslf).',
        'Nom du père : Al-Hossein Ben Abi Tâleb (s)',
        'Nom de la mère : Dame Chah Zanân, fille du roi persan Yazdagurd.',
        'Nom familier : Abû Mohammed.',
        'Noms honorifiques : Zaïn Al-Abidin ; Sayyidu \'s-Sajidin ; Al-Sajjad.',
        'Lieu et date de naissance : Médine, le 5 Cha\'aban de l\'an 38 de l\'Hégire-06.01.659 après le Prophète Jésus, fils de Marie (s).',
        'Date de décès : Mort empoisonné le 25 Muharram de l\'an 94/95 de l\'Hégire-31.10.712 ou 20.10.713 après le Prophète Jésus, fils de Marie (s).',
        'Lieu des funérailles : Médine la Sainte, Arabie.',
        '« Ali ibn Al-Hossein est né à Médine selon les sources les plus crédibles en l\'an 38/658-659. Il était trop jeune pour se souvenir de son grand-père Ali qui fut assassiné en l\'an 40/661. Cependant il fut élevé entre son oncle Al-Hassan et son père Al-Hossein, les petits-enfants bien-aimés du Prophète (pslf). De nombreuses sources mentionnent que sa mère était Shahrbanu, la fille de Yazdigird, le deuxième monarque sassanide de la Perse, ce qui le faisait surnommer « Ibn Al-Khiyaratayn », le fils des « deux excellents », c\'est-à-dire d\'une part en tant que membre des Quraïches arabes et membre des Persans non arabes.',
        'Selon certains rapports historiques, sa mère fut acquise alors qu\'elle était captive de guerre dans la ville de Médine, durant le Califat de Omar, et celui-ci était désireux de la vendre. Cependant, Ali suggéra qu\'il soit offert à la captive de choisir son mari parmi les Musulmans. Il (s) proposa aussi que la dot soit payée sur les fonds du Trésor public. Omar accepta la proposition. Elle porta son choix sur Al-Hossein, second fils de Ali. Il est connu aussi qu\'elle mourut jeune, après avoir donné naissance à son fils unique Ali ». The psalms of Islam - Les psaumes de l\'Islam - Al-Sahîfat Al-Sajjâdiyya - Imam Zayn Al-Abidin - éd.: FICPW - Qom - R. I. d\'Iran - édition bilingue : arabe-anglais - trad. : W. C. Chittick - 1987 - p. 15 de l\'introduction - Adapté de l\'anglais au français par nous.'
      ]
    },

    'intro-appui': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Un appui certain',
      subtitle: null,
      prose: true,
      body: [
        'Dieu est Le Révélateur des Saints Versets excellents par l\'intermédiaire de Ses Prophètes. IL a donné à l\'homme intérieur les fondements de son élévation pour que l\'homme extérieur se comporte spirituellement et socialement comme un humain.',
        'Puis, pour LE glorifier, LE contempler, LE louer, IL a ouvert le Cycle de la Guidance des Douze Imams Supérieurs Infaillibles (s) desquels l\'Imam Ali Zayn Al-Abidin (s) est sans nul doute le maître de l\'Invocation.',
        'Toutes choses de la vie immédiate-Dounia contribuent à faire regarder vers le bas. Par contre, les Invocations de l\'Imam Ali Zayn Al-Abidin (s) font regarder vers le Haut.',
        'Elles lèvent une partie du voile qui dérobe à la vue la lumière. Avec les Invocations de l\'Imam de la prosternation il est accordé de lever le voile. Alors, il s\'y découvre que la grâce surabonde dans les œuvres pieuses de l\'Imam (s).',
        'C\'est sur l\'appui de telles Invocations, compléments indispensables des obligations cultuelles, que nous pouvons nous présenter avec confiance et sérénité face aux joies et aux difficultés de la vie immédiate du monde d\'ici-bas car les Invocations de l\'Imam (s) portent à la réflexion, à la méditation, aux pensées nobles, aux regards vers le Haut, le Très-Haut.',
        'Elles donnent à la journée à vivre le bon commencement et la tranquillité dont nous avons besoin pour bien passer la nuit. Les Invocations inspirées à l\'Imam (s) sont comme le parfum de la rose qui se dilue dans l\'air qui l\'enveloppe. Elles parfument les jours et les nuits du Croyant et de la Croyante, pour leur bonheur et leur satisfaction.',
        'Elles déposent en douceur la lumière continuelle dans le regard de l\'homme intérieur pour qu\'il parcourt avec aisance la voie de l\'espérance. Elles mettent des paroles d\'amour pour Dieu, exalté soit-IL, pour Ses Prophètes, pour Ses Successeurs, pour Ses Créatures, sur les lèvres soumises et inspirées de la présence de la Souveraine Grandeur, de l\'Éternelle Bonté, de l\'Incontournable Vérité.'
      ]
    },

    'intro-coeurs': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Les cœurs comblés de la Haute spiritualité',
      subtitle: null,
      prose: true,
      body: [
        'Ô Imam Ali Zayn Al-Abidin (s), fils d\'Imam, petit-fils d\'Imam, arrière-petit-fils de Prophète, qui, par la volonté du Créateur et la coopération de l\'Intelligence religieuse avez donné aux Croyants et aux Croyantes les remèdes salutaires de leurs maux : que vos invocations restent attachées pour toujours à la Foi, qu\'elles permettent de ne jamais se séparer ni d\'oublier votre famille Ahlu Beyti Rassoul Allah (s), qu\'elles règnent parmi les Croyants et les Croyantes dans tous les siècles des siècles : « Les principaux thèmes du recueil des Psaumes peuvent être énumérés selon une série de postulats venant s\'appuyer sur les qualités positives de l\'être humain, en les rattachant aussi au sens profond du postulat de la Reconnaissance de l\'Unicité :',
        'Il n\'y a de Bonté qu\'en DIEU !<br>Il n\'y a pas de repentir sans la Grâce de DIEU !<br>Il n\'y a de gratitude que par DIEU !<br>Il n\'y a pas de patience sans l\'aide de DIEU<br>Il n\'y a pas d\'affection excepté par l\'initiative de DIEU !',
        'Alors que les sentiments négatifs proviennent de l\'homme lui-même :',
        'Il n\'y a de mal intentionné qu\'en nous-mêmes !<br>Il n\'y a de vanité que par nous-mêmes !<br>Il n\'y a d\'impatience que par notre propre ego !<br>Il n\'y a d\'ignorance que par nous-mêmes !<br>Il n\'y a de haine qu\'en nous-mêmes ! ». The psalms of Islam - Les Psaumes de l\'Islam - Al-Sahîfât Al-Sajjâdiyya - Imam Zayn Al-Abidin - éd. : FICPW - Qom - R. I. d\'Iran - édition bilingue : arabe-anglais - trad. : W. C. Chittick - 1987 - p. 28-29 de l\'Introduction - Adapté de l\'anglais au français par nous.',
        'Quel bonheur, Ô Imam Ali Zayn Al-Abidin (s), et quel avantage pour nous de lire votre recueil de Psaumes, Al-Sahîfât Al-Sajjâdiyya, et d\'en nourrir l\'homme intérieur !',
        'L\'amour qui s\'en dégage porte sans cesse au désir de les installer durablement dans les cœurs et de les communiquer aux autres d\'une manière intime et secrète, humble et profonde, ardente et vive pour que les âmes qui soupirent après Allah Azza wa J\'jal-Dieu, L\'Inaccessible, Le Majestueux, soient spirituellement comblées, secourues et fortifiées par les douceurs de vos propos qui triomphent des cœurs les plus insensibles.',
        'Ô Mon Dieu ! Faites que nous conservions dans nos cœurs le souvenir des invocations de l\'un de vos Amis rapprochés et intimes ; que rien ne nous sépare d\'elles dans la vie immédiate du monde d\'ici-bas ; et que ce qui fut laissé par Votre Ami rapproché soit pour les âmes un remède pour l\'éternité.',
        'L\'Imam Ali Zayn Al-Abidin (s) a été reconnu durant son temps comme celui en qui était la vie. En lui la vie était la lumière de la Guidance des hommes mais les ténèbres des détracteurs de sa famille purifiée ne l\'ont pas comprise ni reçue.',
        'Il (s) fait partie des « Douze » pour rendre témoignage à la lumière à travers ses invocations afin que nous soyons pourvus encore davantage de bons propos à faire dire à la langue. Il (s) a habité parmi les hommes plein de vérité et de grâce, et nous pouvons voir sa gloire dans ses œuvres, toutes orientées à partir d\'ici-bas vers le Très-Haut : « Il passait son temps à prier ou à instruire les Musulmans aux sciences religieuses, refusant tout contact inutile avec le monde extérieur. Cette attitude fut suivie pendant près de trente cinq ans par l\'Imam Sadjâd qui, ainsi, instruisit directement ou indirectement des groupes innombrables de Croyants à la Vérité Islamique. Rien que les prières que l\'Imam récitait, tourné vers son Seigneur et se confiant à LUI, constituent une somme complète de connaissances islamiques ». Introduction à la connaissance de l\'Islam - Allameh Seyyed Mohammed Hossein Tabâtabâï - éd. : L\'Organisation pour la Propagande Islamique - Téhéran - R-I. d\'Iran, 1985, p. 96.',
        'L\'Imam Ali Zayn Al-Abidin (s) a donc offert ses augustes invocations pour honorer l\'ineffable besoin de protection et d\'élévation spirituelle. Pour nous enseigner les propos qui remercient Allah Subhanahu wa Ta\'ala-Dieu, Transcendant et Exalté, de toutes les grâces dont IL nous comble sans cesse, et pour en obtenir des faveurs nouvelles renouvelées à chaque instant.'
      ]
    },

    'intro-elevation': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'L\'IMAM de l\'élévation intérieure et extérieure',
      subtitle: null,
      prose: true,
      body: [
        'Les persécutions qu\'il (s) aura à subir, bien loin d\'affaiblir sa foi et celle de ses disciples, resserreront les liens entre lui (s) et les gens. Ils s\'attacheront sans cesse davantage à l\'Imam persécuté descendant de la Famille purifiée du Prophète Mohammed (pslf). Les bienfaits de ses Invocations se feront très vite ressentir dans les cœurs en brisant les liens de leur esclavage et de leur soumission au diktat des tyrans au pouvoir, jaloux de la félicité et de la docilité mises dans les cœurs par les bonnes et belles paroles de l\'Imam (s).',
        'L\'arrière-petit-fils du Prophète Mohammed (pslf) allait devenir le centre de la vie de son temps, suppléant à l\'impuissance des Croyants et des Croyantes face à la cruauté des gens de l\'Ignorance-Jahilyyah. Sa vie ne sera qu\'une suite continuelle de bienfaits, une suite continuelle d\'actions de grâce, éclatants témoignages de sa plus vive reconnaissance des complaisances à son égard de la part de Allah Tabaraka wa Ta\'ala-Dieu, Béni et Exalté, et de Son Messager, le vénéré Mohammed (pslf). L\'univers est rempli de ses invocations, partout dans le Monde d\'aujourd\'hui elles sont lues, méditées, enseignées, apprises.',
        'De toutes les méthodes tracées par les maîtres de la vie spirituelle pour nourrir l\'homme intérieur pendant son voyage dans le monde d\'ici-bas, il n\'en est pas, après les Saints Versets du Coran Elevé, après les Saints propos de la Sunna du Prophète Mohammed (pslf), après les paroles et pensées de Amir Al-Mu\'minin Ali Ibn Abi Tâleb (s), de plus utiles que le souvenir des Invocations de l\'Imam Ali Zayn Al-Abidin (s) et la méditation de ses diverses recommandations spirituelles.',
        'En effet, elles viennent compléter dans le monde d\'ici-bas, et dans un même esprit, la Sainte Ecriture coranique qui nous vient du Monde d\'en Haut et les glorieux propos du Saint Prophète Mohammed (pslf) et de Sa Famille purifiée. Elles ont été écrites pour nous rappeler tous les souvenirs des bienfaits divins, pour réveiller dans les âmes les sentiments dont nous serions animés si nous avions sous les yeux le spectacle des douleurs et du martyre qui furent imposés à la Famille purifiée de « Mes Ahlul Beyt ».',
        'Il est indubitable que le moyen le plus pur d\'obtenir ce résultat au sein de notre mémoire islamique, c\'est de chercher dans les invocations de l\'Imam Ali Zayn Al-Abidin (s), les signes de l\'histoire qu\'elles retracent, et de suivre, pour ainsi dire, pas à pas, le texte silencieux pour y découvrir une partie de l\'Histoire Sainte Islamique.',
        'Histoire qui révèle aussi que l\'Imam (s), loin de tirer vengeance de la perversité de ses ennemis, priait pour eux afin de détourner d\'au-dessus de leurs têtes les fléaux de la Justice divine. Son cœur leur était ouvert selon la Tradition prophétique et celle de ses prédécesseurs.',
        'Voilà encore, pour les âmes, un Imam modèle à copier. Un exemple à suivre, un maître spirituel dont nous nous devons d\'être des disciples dans l\'imitation de sa patience, de sa douceur, de sa retenue, de sa charité, de son esprit entièrement dévoué à la Cause du Parti de Dieu, exalté soit-IL.',
        'Parti de Dieu qui est aussi celui du Prophète Mohammed (pslf) et des Douze Imams Supérieurs Infaillibles (s) : « L\'essentiel est constitué par le lien de dévotion et de fidèle amour (wilâya) pour les Imams qui sont la face révélée de Dieu, Sa lumière, Sa main, Sa langue, Son œil parmi les créatures ; à cette dévotion intense fait pendant l\'inimitié déclarée envers les ennemis des Imams, car ils en sont l\'antithèse, les manifestations des forces démoniaques, autrement dit la face apparente, la main, la langue et l\'œil du Diable.',
        'L\'enseignement est, lui, fondé sur la méditation de l\'intégralité de ce qui a été transmis par les Gens de la Demeure prophétique (ahlu bayti n-nubuwwa), et la pratique est modelée sur leur pratique, axée par la relation de recours (tawassul) aux Quatorze Infaillibles (le Prophète, sa fille et les Douze Imams) et par la visite (ziyâra) faite à leurs sanctuaires ou accomplie à distance (avec une insistance particulière sur certaines ziyâra telle que les ziyârât Amin Allâh, Ashûrâ et Djâmi\'a) ; on y insiste aussi beaucoup sur la lecture et la méditation du Coran et des invocations (du\'â\') et entretiens intimes (munâdjât) rapportés des Infaillibles ». C. Bonaud dans : L\'Imam Khomeiny, un gnostique méconnu du 20e siècle - C. Bonaud - Docteur en sciences religieuses - éd. : Al-Bouraq - Librairie de l\'Orient - Beyrouth - Liban - Paris - France - 1997, p. 91.'
      ]
    },

    'intro-resistance': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Les moyens de la résistance spirituelle',
      subtitle: null,
      prose: true,
      body: [
        'L\'Imam Ali Zayn Al-Abidin (s) déposa entre les nombreuses mains de l\'humanité les textes qui élèvent le sens profond des droits religieux, ouverture à la résistance à opposer à l\'usurpation du Droit à la Succession accordé par Allah Azza wa J\'jal-Dieu, L\'Inaccessible et Le Majestueux, aux Douze Imams Supérieurs Infaillibles (s) héritiers de la famille mohammadienne-abrahamite.',
        'Nous pouvons dire que le recueil des Psaumes de l\'Imam (s) est le guide divin de la résistance à l\'oppression politique et intellectuelle. Il est l\'un des fondements spirituels de la discussion religieuse animatrice de la pensée libre, sereine et assurée.'
      ]
    },

    'intro-depart': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '... pour partir d\'ici-bas vers Le Plus-Haut',
      subtitle: null,
      prose: true,
      body: [
        'C\'est dans la Culture Islamique authentique que fut rappelée la notion des besoins vitaux de la créature humaine, de ses droits à tout ce qui élève, de son obligation à refuser tout ce qui l\'abaisse et de la sagesse de toujours privilégier, en premier, la voie du Mouvement islamique Justice-A\'dala et Paix-Salam : « L\'Imam As-Sajjâd réalisa que la mission de réforme qui lui incombait différait de celle de son père, Al-Hossein (s). C\'est ce que laisse comprendre cette discussion qu\'il eut avec \'Ibâd Al-Basrî, un jour qu\'ils se sont rencontrés en pèlerinage à La Sainte Mecque. Ce dernier accoste l\'Imam et s\'adresse à lui en ces termes : « Tu as délaissé la lutte (Al-jihâd) et ses difficultés pour venir en pèlerinage, qui est abordable et Allah [Dieu] a acheté des croyants, leurs personnes et leurs biens en échange du Paradis. Ils combattent dans le sentier de Dieu : ils tuent et se font tuer ». - L\'Imam lui répondit : « Lis ce qui vient après : Ils sont ceux qui se repentent, qui adorent, qui louent, qui parcourent la terre, qui s\'inclinent, qui se prosternent, qui commandent le convenable et interdisent le blâmable et qui observent les lois de Dieu... Annonce la bonne nouvelle aux Croyants ». (Coran 9/111-112)',
        'Puis il ajouta : « Si ceux-là se manifestent, la lutte n\'est préférable en rien ». Biographie des Imams - Aux Sources de la Sagesse. éd. : ARCS - Lyon - France, vol. 4 - N° 14, 1997, p. 69.',
        'L\'Imam Ali Zayn Al-Abidin (s) à travers ses Invocations, rappelle pour tous les temps : que nous ne pouvons pas nous arrêter là où nous sommes ; que notre passé islamique nous demande d\'avancer d\'une marche décisive et certaine ; que ce que nous avons acquis de nos savants, érudits, théologiens de l\'École Ahlul Beyt, c\'est un stimulant pour arriver d\'ici-bas au plus Haut, car notre essence est trop essentielle pour accepter d\'être écrasée par la Jahiliyyah-Ignorance.',
        'L\'Imam Ali Zayn Al-Abidin (s) sera celui faisant comprendre que le moteur de l\'élévation se trouve avant tout dans l\'éducation consciencieuse des droits et des devoirs de soi puis de toutes les créatures de Allah Subhanahu wa Ta\'ala-Dieu, Transcendant et Exalté. Ces vérités, la Culture Islamique authentique nous les rappelle sans cesse pour que nous restions éveillés et protégés du sommeil de l\'Ignorance.',
        'Pour que nous soyons sans cesse sérieusement résolus à nous instruire, pour nous rendre dignes de notre dignité, de notre liberté, de nos droits et devoirs au sein de notre Religion Immuable nommée par Dieu : Islam-Soumission.'
      ]
    },

    'intro-gardien': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Gardien de l\'édifice de la croyance et de la foi',
      subtitle: null,
      prose: true,
      body: [
        'L\'inspiration d\'origine divine de l\'Imam Ali Zayn Al-Abidin (s) est destinée à favoriser l\'éducation spirituelle de tous car il est reconnu de tous que les invocations font partie de l\'effort glorieux sur soi-même-jihad Al-akbar, pour s\'approcher de la connaissance de Allah Tabaraka wa Ta\'ala-Dieu, Béni et Exalté : « Du\'â-invocations sont très proches du dhikr-souvenirs de Dieu, à un tel point qu\'il est parfois difficile d\'établir la différence entre les unes et les autres. Le sens du terme signifie : « demander à ... - supplier... - invoquer... ». Le Coran recommande l\'invocation dans plusieurs de ses versets dont les suivants par exemple.',
        '« Invoquez votre Seigneur, humblement et en secret ; IL n\'aime pas les transgresseurs ». (Coran 7/55)',
        '« Dis : « Invoquez DIEU, ou bien : invoquez le Miséricordieux. Quel que soit le nom sous lequel vous L\'invoquez, les plus beaux noms Lui appartiennent ». (Coran 17/110)',
        '« Invoquez DIEU en LUI rendant un Culte pur en dépit des incrédules » ; « Votre Seigneur a dit : « Invoquez-Moi et Je vous exaucerai. Ceux qui, par orgueil, refusent de M\'adorer entreront bientôt humiliés dans la Géhenne ». (Coran 40/14)',
        '« Je suis proche, en vérité. Quand mes serviteurs t\'interrogent à mon sujet : Je réponds à l\'appel de celui qui M\'invoque, quand il M\'invoque. Qu\'ils répondent donc à Mon appel ; qu\'ils croient en Moi. Peut-être seront-ils bien dirigés ». (Coran 2/186)',
        'Il y a également un bon nombre de hadiths-propos, aussi bien dans l\'école chiite que dans les écoles sunnites, concernant les bienfaits des invocations.',
        'Le Prophète nous a transmis que Dieu dit : « Ô ! mes serviteurs, exceptés ceux que Je dirige, tous les autres sont égarés, demandez-Moi donc votre Guidance, et Je vous guiderai. Excepté ceux que J\'enrichis tous les autres sont pauvres, demandez-Moi donc la richesse et Je vous comblerai. Excepté ceux que Je libère, tous les autres sont des pécheurs, demandez-Moi donc de vous pardonner et Je vous pardonnerai ». The Psalms of Islam - Les Psaumes de l\'Islam - Précité - p. 24-25 de l\'Introduction - Adapté de l\'anglais au français par nous.',
        'L\'Imam Ali Zayn Al-Abidin (s) avait appris de ses prédécesseurs que ceux qui s\'étaient emparés des affaires musulmanes après le Sublime retour à Son Créateur de l\'âme de son grand-père, le Prophète Mohammed (pslf), n\'avaient pas apprécié la portée du Message révélé. Très vite ils avaient cessé de s\'en inspirer pour retourner aux principes de la Jahiliyyah-Ignorance. Incapables qu\'ils étaient de s\'ouvrir aux recommandations divines : « En somme, la plupart des prescriptions de Dieu le Très-Haut correspondent aux exigences de la Fitra [nature première], c\'est-à-dire qu\'elles sont liées à l\'enlèvement des voiles qui la recouvrent et à la revivification de ses exigences, la visée fondamentale et l\'objectif sublime étant la connaissance et l\'arrivée au seuil de Dieu le Très-Haut.',
        'Tout cela fait partie des grâces providentielles du Très-Haut envers Ses serviteurs afin de les délivrer de la prison de la nature et de les ramener au gîte des rapprochés et au séjour des purifiés. Les devoirs religieux sont donc des bontés divines et des remèdes seigneuriaux pour soigner les esprits malades et les cœurs souffrants, et les Prophètes sont les médecins des âmes et les éducateurs des esprits : ils les font sortir des ténèbres vers la Lumière et de la déficience vers la Perfection ». L\'Imam Khomeiny, un gnostique méconnu du 20e siècle - C. Bonaud - Docteur en sciences religieuses - éd. : Al- Bouraq - Librairie de l\'Orient - Beyrouth - Liban - Paris - France - 1997 - p. 141.'
      ]
    },

    'intro-changement': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Changement spirituel et social',
      subtitle: null,
      prose: true,
      body: [
        'Nombreux étaient ceux qui se rassemblaient autour de l\'Imam Ali Zayn Al-Abidin (s) pour écouter, réfléchir, apprendre des leçons faites sur la science, sur l\'histoire, sur l\'éthique, sur la justice, sur le Vrai et le Faux, sur les sujets toujours actuels.',
        'Ces réunions autour du Savoir et de la Connaissance étaient la preuve d\'un changement spirituel, intellectuel, moral et social auquel il ne pouvait être assigné de limites dans le temps, et dont l\'humanité est restée en droit de tout attendre. La preuve aussi de la révocation des consensus de la dégradation de l\'être humain considéré comme un « sujet-esclave » et non comme un « homme-libre ».'
      ]
    },

    'intro-opinion': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'L\'étroitesse de l\'opinion personnelle',
      subtitle: null,
      prose: true,
      body: [
        'L\'Imam Ali Zayn Al-Abidin (s) ne recherchait ni ne voulait occuper aucune des places que donne la ferveur populaire investi qu\'il (s) était de la Guidance. Il (s) attirait autour de lui (s) des gens pour être écouté comme un ami qui parle franchement, sans flatterie, sans préjugés.',
        'Il (s) avait appris auprès de son père l\'Imam Al-Hossein (s) que l\'égoïsme du « moi je » reste pour beaucoup d\'individus une formidable barrière qui empêche d\'avancer, d\'éveiller la pensée qui reste sans savoir la fin qu\'elle doit poursuivre surtout si elle se fie aux conclusions erronées de l\'opinion personnelle. Toutefois, en donnant son enseignement sur l\'élévation de l\'âme, des sentiments du cœur, des idées de l\'intellect, en parlant de changement et de progrès des mentalités, l\'Imam Ali Zayn Al-Abidin (s) savait que tout cela ne pouvait se réaliser en un clin d\'œil tel le rêveur qui veut régénérer le monde en un jour. Alors que le Cycle de la Révélation : Prophétie s\'étend sur des millénaires et une multitude de 124 000 Prophètes, et que le Cycle de la Guidance : Imamat a été institué par Allah Azza wa J\'jal-Dieu, L\'Inaccessible et Le Majestueux, pour une durée méconnue des êtres humains.'
      ]
    },

    'intro-bourgeon': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Faire éclore le bourgeon de l\'homme intérieur',
      subtitle: null,
      prose: true,
      body: [
        'L\'Imam Ali Zayn Al-Abidin (s) a démontré aux puissants de son temps que les principes islamiques quand ils sont bien enseignés et bien établis dans l\'âme, répondent à tous les besoins et combattent tous les maux de l\'Ignorance. Ils donnent aux Croyants et aux Croyantes la force de résister à l\'adversité. Ils leur inspirent le respect de la dignité d\'eux-mêmes en premier et de celle des autres. Ils adoucissent les mœurs. Ils animent les facultés intellectuelles. Ils ouvrent la voie qui mène aux jardins du « Salam de l\'Islam » préservant ainsi des excès dans lesquels s\'engouffrent trop facilement les esprits ignorants aveuglés par les erreurs et les préjugés d\'une mauvaise interprétation des Saints Versets coraniques et de la Tradition prophétique.',
        'Tant il est vrai que les plus grandes prétentions des conclusions de l\'opinion personnelle paraissent des ténèbres en comparaison des connaissances que nous pouvons acquérir auprès de nos savants musulmans, érudits, théologiens, élevés dans le savoir et la science des Douze Imams Supérieurs Infaillibles (s) héritiers de la famille mohammadienne-abrahamite.',
        'Il est vrai aussi que les gens au pouvoir à l\'époque de l\'Imam Ali Zayn Al-Abidin (s) regardaient avec envie sa grande activité spirituelle. Nombreux étaient ceux qui se pressaient autour de lui (s) en quête d\'un propos éclairé de la lumière du savoir coranique et des connaissances islamiques hérités du Prophète Mohammed (pslf) par les « Douze » sources du véritable enseignement de l\'être humain.',
        'Enseignement consistant dans le développement des grandes pensées spirituelles. Celles qui se rattachent à la connaissance de Allah Tabaraka wa Ta\'ala-Dieu, Béni et Exalté, à Ses desseins englobant les deux cycles. Primo, celui de la Révélation : Prophétie qui se prolonge, secundo, dans celui de la Guidance : Imamat. Ce dernier devenant ainsi le gardien de la Vérité, trésor de l\'Intelligence sans laquelle la pauvreté spirituelle demeure inculte, sans connaissance de Dieu, des Livres révélés, des Prophètes, des Anges, du Jour de la Résurrection, et sans aperçu du droit, de la justice, du devoir, de l\'amour, du sacrifice, de la perfection spirituelle telle qu\'elle s\'est manifestée dans tous les Prophètes. Notamment chez ceux nommés les Grands : Noé, Abraham, Moïse, Jésus, Mohammed. Paix et salutations sur tous les Prophètes, sur la Famille d\'Abraham, sur la Mère de Jésus, la pure et Sainte Marie, sur la Famille purifiée de Mohammed.'
      ]
    },

    'intro-douze': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Les « Douze » plus élevés après le Prophète Mohammed',
      subtitle: null,
      prose: true,
      body: [
        {t:'intro',tx:'Que la Paix et les Bénédictions de Dieu soient sur le Prophète et sur sa Famille sanctifiée'},
        'L\'Imam Ali Zayn Al-Abidin (s), l\'Imam de son temps, avait échappé au massacre et à la tuerie de la tragédie de Karbala par la Volonté de Allah Subhanahu wa Ta\'ala-Dieu, Transcendant et Exalté. Parce que Allah l\'avait inclus dans les « Douze » chargés d\'élever l\'humanité jusqu\'à la prédominance souveraine de la Justice pour rendre à l\'être humain tout ce qui lui a été confisqué par l\'injustice de l\'Ignorance. Ainsi, Allah Azza wa J\'jal-Dieu, L\'Inaccessible et Le Majestueux, en instituant le Collège des Douze Imams Supérieurs Infaillibles (s) nous a orientés vers la seule source capable d\'enseigner et de développer l\'innéité de croyance monothéiste et de belle et bonne sociabilité dans une solide et vraie connaissance de la Religion Immuable donnée par Allah-Dieu, Exalté soit-IL, dans l\'unité de Son Souffle de la vie.'
      ]
    },

    'intro-parure': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '« Parure des dévots »',
      subtitle: null,
      prose: true,
      body: [
        'Donc, Il y a une quinzaine de siècles que l\'Imam Ali Zayn Al-Abidin (s) fut consacré à l\'enseignement de la spiritualité monothéiste de l\'humanité. Cet événement ne fera pas de bruit dans l\'Histoire car il se traduira par des œuvres à lire, à apprendre, à répéter, à enseigner aux enfants. Elles sont connues sous le nom des Invocations de l\'Imam de la Prosternation : Imam As-Sadjad.',
        'Ce sont des œuvres silencieuses faites pour satisfaire la vie intérieure. Elles méritent une attention tout à fait particulière. C\'est pour cela que les partisans de la ligne islamique de l\'Imam Ali (s) se les rappellent comme le commencement d\'heureuses influences pour la vie spirituelle. En outre, ce n\'est pas un événement isolé. Il fait partie des « Douze » du Cycle de la Guidance : Imamat qui ne s\'arrêtera pas de si tôt car il a été institué par Dieu, exalté soit-IL, pour durer.',
        'Depuis le Sublime retour vers son Seigneur de l\'âme de l\'Imam Ali Zayn Al-Abidin (s), Imam de bien pour la spiritualité de l\'humanité, nous avons toujours désiré apprendre, retenir, transmettre ses œuvres que les Croyants et les Croyantes respectent pour leur grandeur entièrement orientée à partir d\'ici-bas vers le Haut, Le Très-Haut.',
        'C\'est afin de combler nos besoins, d\'éveiller et d\'instruire notre spiritualité que l\'Imam (s) nous a gratifiés de ce qui adoucit nos peines et nos épreuves, de ce qui nous fait agir continuellement les uns sur les autres pour notre bien commun : « Le livre de prières transmises des Imams de la Famille du Prophète, qui est à juste titre le plus célèbre et le plus prisé, est celui qui réunit celles de l\'Imam Ali b. Al-Hossein as-Sadjâd, encore connu sous le surnom de «Parure des dévots »... Ce Recueil de l\'Imam Sadjâd (Sahifa sadjdjâdiyya) ou Psaumes de la famille de Mohammed (zabûr Âli Mohammed) est le seul ensemble qui ait été transmis tel quel de l\'un des Imams ; il a par la suite été complété par des compilations d\'autres prières du même Imam, réunies par des savants chiites à diverses époques, ce qui donna lieu à l\'édition d\'un second, troisième, quatrième et cinquième recueil, le tout étant maintenant réuni en une édition accompagnée d\'une étude des chaînes de transmissions et de nombreux index et annotations ». L\'Imam Khomeiny, un gnostique méconnu du 20e siècle - C. Bonaud - Docteur en sciences religieuses - éd. : Al-Bouraq - Librairie de l\'Orient - Beyrouth - Liban - Paris - France - 1997, p. 105.',
        'Donc les invocations de l\'Imam Ali Zayn Al-Abidin (s) nous sont parvenues comme autant de preuves de sa large participation à la spiritualisation de l\'humanité et à l\'esprit dévoué à la Cause de Dieu, exalté soit-IL, qu\'il (s) apporta dans l\'exécution de sa tâche de quatrième Imam.',
        'Son projet était le même que celui qui anima son père, l\'Imam Hossein (s) qui l\'avait lui-même reçu de son frère l\'Imam Al-Hassan (s), qui l\'avait lui-même reçu de leur père l\'Imam Ali (s), qui l\'avait lui-même reçu de son beau-père le Prophète Mohammed (pslf). Il consistait dans la prospérité spirituelle, intellectuelle, morale et sociale de l\'humanité éveillée à sa modernité par le processus islamique de sa libération de l\'emprise de l\'impérialisme de l\'Ignorance sur la pensée humaine.',
        'Le fait que son cœur était totalement dans son œuvre dictée par la volonté de Dieu, Exalté soit-IL, a fait qu\'il (s) ne la considérait pas comme la tâche d\'un jour, ou de quelques années, mais de sa vie entière, sachant que le relais serait pris par son successeur et ainsi de suite jusqu\'au Douzième Imam Al-Mahdi (s), que Dieu hâte son retour aux regards.'
      ]
    },

    'intro-ame': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Élever l\'âme, rabaisser l\'ego',
      subtitle: null,
      prose: true,
      body: [
        'L\'influence des œuvres de l\'Imam Ali Zayn Al-Abidin (s) ne s\'est pas bornée à la cité de Médine ni même aux territoires musulmans de son époque, ses invocations parvinrent dans le Monde entier, et y firent naître des élévations de la spiritualité. Sa compagnie fut recherchée par les hommes vertueux et distingués. Son ample savoir coranique ainsi que ses connaissances islamiques lui assurèrent une attention pleine d\'un respect profond de la part de ses auditeurs.',
        'C\'est ainsi que son influence se fait sentir aujourd\'hui encore partout où il y a un sincère partisan de « Mes Ahlul Beyt », son nom, uni comme il l\'est au Ministère des « Douze Solidaires Infaillibles » est du petit nombre de ceux qui sont passés à la postérité. En effet, pour inscrire son nom dans la mémoire de l\'humanité, il n\'y a pas eu de monument plus durable que le Cycle de la Révélation allié au Cycle de la Guidance.',
        'L\'Imam Ali Zayn Al-Abidin (s) avait reçu des Ahlul Beyt qui l\'avaient précédé, l\'humanisme propre à la Civilisation Islamique authentique. Elle le (s) façonnera en un homme érudit, pieux et craignant Dieu. Dans le cadre de sa famille, il acquerra les enseignements parmi tant d\'autres de l\'éthique, de la justice, de la piété islamique. Ce qui devait couronner ses nombreuses invocations. Elles représentent pour l\'entraînement de l\'âme à l\'élévation les principaux éléments de sa formation.',
        'En effet, il n\'y a point d\'acquisition de l\'âme dans la vie humaine, qu\'un homme ose entreprendre d\'enseigner ou d\'exercer, s\'il ne s\'est appliqué auparavant avec soin et avec étude pour bien apprendre et comprendre la profondeur des invocations laissées à l\'humanité par l\'Imam Ali Zayn Al-Abidin (s).',
        'A noter également, au premier siècle de l\'Histoire sainte islamique, que la seule école islamique capable d\'assurer l\'éducation et l\'instruction monothéiste pures était celle de « Mes Ahlul Beyt », puisque le Cycle de la Guidance : Imamat détient depuis le Sermon de Ghadir Khumm l\'ensemble du Savoir théologique et politique du Monothéisme : « Avec l\'Imam as-Sadjad (s) les invocations connurent leur siècle d\'or. Outre la signification spirituelle et culturelle, les invocations de l\'Imam as-Sadjad ont une portée sociale indéniable ; on y trouve une volonté de réforme évidente. Ces invocations furent plus tard compilées en un ouvrage qui s\'intitule As-Sâhîfa as-Sajjâdiyya. De plus, l\'Imam joua un rôle éducatif de taille, puisqu\'il rapporta les hadiths du Messager de Dieu (pslf) ». Biographie des Imams. Aux Sources de la Sagesse, éd.: ARCS-Lyon, Vol. 4 p. 72.',
        'Il (s) enseigne aux Croyants et aux non-croyants à prendre conscience de ce qui passe, à aimer ce qui dure éternellement, à oublier les petitesses du monde d\'ici-bas et à désirer la Lumière.',
        'Soulignons, ici, l\'importante influence exercée par les Psaumes de l\'Islam sur la littérature et la philosophie islamiques. Toutefois, cette adaptation à la langue française de As-Sâhîfa as-Sajjâdiyya n\'a pas pour but d\'en débattre, et nous laissons le débat entre les mains des éminents spécialistes musulmans de la littérature et de la philosophie islamiques. Il ne nous appartient pas d\'en dégager les grands thèmes mis en œuvre dans la gnose islamique.',
        'Nos modestes et humbles connaissances de la langue arabe et de la langue française nous laissent à peine espérer d\'avoir contribué à faire connaître un peu de la grande profondeur de la pensée de l\'Imam de la Prosternation, la Parure des dévots, le Quatrième Imam Successeur au Prophète Mohammed (pslf) : Ali Al-Sajjad Ben Al-Hossein Ben Abi Tâleb, que la Paix soit avec lui.',
        'Nom familier : Abu Mohammed<br>Noms honorifiques : Zaïn Al-Abidin ; Sayyidu \'s-Sajidin ; Al-Sajjad.'
      ]
    },

    'intro-avant': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Avant-propos',
      subtitle: "concernant la chaîne de transmetteurs de\nAl-Sahîfat al-Kâmilat al-Sajjâdiyya\nLe Livre de la Perfection d'Al-Sajjad.",
      prose: true,
      body: [
        '1. Le Vertueux Seyyed Najm al-Dînbahâ’ l-Sharaf Abû-l-Hassan Mohammed Ibn Ahmad Ibn Ali Ibn Mohammed Ibn Umar Ibn Yahyâ Al-Alawi Al-Hassanî<sup id="ref-3"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-3\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[3]</a></sup> que la Miséricorde de Dieu soit avec lui, nous a rapporté<sup id="ref-4"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-4\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[4]</a></sup> :',
        '2. Il a dit : Le Juste Cheikh Abû Abd Allâh Mohammed Ibn Ahmad Ibn Shahriyâr<sup id="ref-5"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-5\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[5]</a></sup>, trésorier de la Demeure du Trésor de notre maître Amir Al-Mu\'minin – Commandeur des Croyants, Ali Ibn Abi Tâleb, que la Paix soit avec lui, nous a dit dans le mois de Rabî 1 de l\'année 516 [mai-juin 1122 après Jésus, fils de Marie (s)] alors que Shahîfat était, lu, devant lui et que je faisais partie des auditeurs.',
        '3. Il a dit : Je l\'ai entendu [être lu] devant le Cheikh véridique Abu Mansûr Ibn Mohammed Ibn Mohammed Ibn Ahmad Al-Abd-al-Aziz Ukharî le Véridique<sup id="ref-6"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-6\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[6]</a></sup>, que la Miséricorde de Dieu soit avec lui, par Abû-l-Mufaddal Mohammed Ibn Abd Allâh Ibn Al-Muttalib Al-Shaybâni<sup id="ref-7"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-7\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[7]</a></sup>',
        '4. Il a dit : Il nous a été rapporté par Al-Sharîf Abû Abd Allâh Ja‘afar Ibn Mohammed Ibn Ja‘afar Ibn Al-Hassan Ibn Ja‘afar Ibn Al-Hassan Ibn Al-Hassan Ibn Amir Al-Mu\'minin Ali Ibn Taleb<sup id="ref-8"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-8\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[8]</a></sup>, que la Paix soit avec lui.',
        '5. Il a dit : Abd Allâh Ibn Umar Ibn Khattab al-Zayyât<sup id="ref-9"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-9\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[9]</a></sup> nous a rapporté dans l\'année 265 [878-9 après Jésus, fils de Marie (s)].',
        '6. Il a dit : Mon oncle maternel Ali Ibn Al Nu‘man Al-A ‘lam<sup id="ref-10"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-10\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[10]</a></sup> m\'a rapporté.',
        '7. Il m\'a dit : Umayr Ibn Mutawakkil Al-Thaqafî Al-Balkhi nous a rapporté de son père Mutawakkil Ibn Hârun.<sup id="ref-11"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-11\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[11]</a></sup>',
        '8. Il a dit : J\'ai rencontré Yahya Ibn Zayd Ibn Alî, que la Paix soit avec lui, alors qu\'il était en route vers le Khurasan après que son père eut trouvé la mort, je l\'ai congratulé<sup id="ref-12"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-12\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[12]</a></sup>.',
        '9. Il m\'a demandé : D\'où viens-tu ? Je lui ai répondu : Je rentre du Hadjdj – Pèlerinage à la Demeure de Dieu-Beyt Allah, à La Sainte Mecque',
        '10. Il m\'a questionné au sujet de sa maisonnée et des fils de son oncle paternel de Médine, puis il me demanda avec empressement des nouvelles de [l\'Imam] Ibn Ja‘afar Mohammed, que la Paix soit avec lui, je lui en ai fourni ainsi que sur les enfants, lui relatant aussi leur peine à propos de son père Zayd Ibn Ali, que la Paix soit avec lui.',
        '11. Il m\'a informé : Que son oncle paternel [Imam] Mohammed [Al-Bâquer] Ibn Ali, que la Paix soit avec lui, avait conseillé mon père de ne pas se révolter allant jusqu\'à lui décrire les conséquences d\'une telle intention et d\'un départ de Médine. As-tu rencontré le fils de mon oncle paternel Ja‘afar Ibn Mohammed, que la Paix soit avec lui ? Je lui ai répondu : oui.',
        '12. Il m\'a demandé : L\'as-tu entendu faire un commentaire au sujet de mon affaire ? Je lui ai répondu : oui.',
        '13. Il m\'a demandé : Qu\'a-t-il dit à mon sujet ? Dis-moi ! – Je lui ai répondu : Que je sois votre rançon ! Je ne veux pas vous offenser avec ce que j\'ai entendu de sa part.',
        '14. Alors, il m\'a dit : Crains-tu de m\'effrayer par la mort ? Dis-moi ce que tu as entendu ! – Je lui ai répondu ceci : Je l\'ai entendu dire que vous seriez assassiné et ensuite crucifié de la même manière que l\'a été votre père.',
        '15. Son visage changea d\'aspect et il déclama : Dieu fait obstacle à ce qu\'IL désire ! IL affermit ! C\'est avec Lui que se trouve la Mère du Livre<sup id="ref-13"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-13\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[13]</a></sup>. Ô Mutawakkil ! Dieu a trouvé en nous l\'appui de cette affaire, IL nous a accordé la connaissance et l\'épée. Ces éléments sont inscrits en nous alors que les fils de notre oncle paternel n\'ont été dotés que de la connaissance.',
        '16. Je lui ai dit : Que je sois votre rançon ! En vérité, j\'ai constaté que les gens avaient davantage d\'inclinaison pour le fils de votre oncle paternel, Ja‘afar, que la Paix soit avec lui, qu\'ils n\'en ont à votre égard et à celui de votre père.',
        '17. Il m\'a répondu : En vérité mon oncle paternel Mohammed Ibn Ali et son fils Ja‘afar, que la Paix soit avec eux, appellent les gens à vivre alors que nous les appelons à mourir',
        '18.-19. Je lui ai demandé : Ô descendant du Messager de Dieu ! Ont-ils plus de connaissance que vous-même ? Il a regardé au sol durant un instant puis il a relevé la tête pour dire : Nous possédons tous la connaissance, et ils savent tout ce que nous savons mais nous ne savons pas tout ce qu\'ils savent. Puis, il me questionna à nouveau : As-tu pris des notes concernant les propos du fils de mon oncle paternel ? Je lui ai répondu : Oui.',
        '20. Veux-tu les porter à ma connaissance ? Alors, je lui ai remis des notes traitant de sciences diverses ainsi que le texte d\'une invocation qui m\'avait été dictée par Abu Abd Allâh, que la Paix soit avec lui. Il m\'avait confirmé que son père, Mohammed Ibn Alî, que la Paix soit avec eux, la lui avait dictée et qu\'il s\'agissait bien de l\'une des invocations de son père, Ali Ibn Al-Hossein, que la Paix soit avec eux, extraite de Al-Sahifat Al-Kamila<sup id="ref-14"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-14\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[14]</a></sup>.',
        '21. Yahyâ lui porta de l\'intérêt du début à la fin. Puis, il m\'a demandé : Accepterais-tu que j\'en fasse une copie ? Je lui ai répondu : Ô fils du Messager de Dieu ! Pourquoi me demandez-vous une autorisation sur ce qui provient de vous tous ?',
        '22. Il m\'a dit : Sûrement je te remettrai une sahifa des Psaumes de la Perfection, que mon père a sauvegardé de son père. Mon père à son tour m\'a demandé de la sauvegarder et de la cacher à ceux qui sont indignes d\'elle.',
        '23. Umayr a dit : Mon père [Mutawakkil] a dit : Alors je me suis mis droit devant lui, je l\'ai embrassé sur la tête et je lui ai dit : Par Dieu ! Ô fils du Messager de Dieu ! Je professe la Religion de Dieu à travers l\'affection et l\'obéissance que je témoigne à votre égard ! J\'aspire à ce qu\'IL m\'accorde Sa Faveur dans ma vie et après ma mort à travers votre amitié.',
        '24. Alors, il remit ma page de notes à un domestique qui l\'accompagnait en lui disant ceci : Prends copie de cette invocation dans une belle et claire calligraphie et remets-la moi. Peut-être je la mémoriserai d\'autant que je l\'avais demandée à Ja‘afar, que Dieu le protège, et il me l\'avait toujours cachée.',
        '25. Mutawakkil déclara : Evidemment, j\'ai regretté ce que j\'avais fait et je ne savais plus comment agir. Abu Abd Allah m\'avait en effet ordonné de ne pas les remettre à n\'importe qui.',
        '26. Puis, il demanda qu\'on lui amène une boîte de laquelle il sortit un parchemin-sahifa fermé et scellé<sup id="ref-15"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-15\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[15]</a></sup>. Il porta son regard sur le sceau, il l\'embrassa et se mit à pleurer. Ensuite il le rompit. Il déroula le parchemin-sahifa, l\'appliqua sur ses yeux et le passa sur son visage.',
        '27. Il dit alors : Par Dieu ! Ô Mutawakkil ! N\'étaient les propos que tu as dit concernant le fils de mon oncle paternel – que je sois sa rançon et son martyr – je ne te remettrais pas ceci et je le conserverais avec beaucoup d\'attention.',
        '28. Mais je sais que son propos est la vérité qu\'il détient de ses ascendants et qu\'ainsi il est véridique. Aussi je crains qu\'une telle connaissance tombe entre les mains des Umayyades, qu\'ils la cachent et l\'entreposent dans leurs coffres pour eux-mêmes.',
        '29. Donc prends-la, sauvegarde-la pour moi, et respecte-la. Lorsque Dieu en aura fini avec mon affaire et l\'affaire de ces gens, qu\'IL en aura fini avec ce qu\'IL veut d\'eux, elle sera un pacte entre toi et moi en provenance des fils de mon oncle paternel, Mohammed et Ibrahim<sup id="ref-16"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-16\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[16]</a></sup>, les deux fils de Abd Allâh Ibn Al-Hassan Ibn Al Hassan Ibn Ali, que la Paix soit avec eux. Ils continueront cette affaire après moi.',
        '30. Mutawakkil dit : Alors j\'ai pris le parchemin-sahifa. Lorsque Yahya Ibn Zayd fut tué, je suis allé à Médine pour rencontrer [Imam] Abu Abd Allah [Ja‘far As-Sâdeq], que la Paix soit avec lui. Je lui ai rapporté les propos de Yahya. Il se mit à pleurer avec une intense compassion.',
        '31. Il dit : Que Dieu étende sa Miséricorde sur le fils de mon oncle paternel.',
        '32. Qu\'IL le place en compagnie de ses parents et grands-parents ! Par Dieu ! Ô Mutawakkil ! Le seul fait qui m\'a poussé à lui remettre l\'invocation était la crainte qu\'il ressentait pour la sauvegarde du parchemin-sahifa de son père. Où est ce parchemin ? – Je lui ai répondu : il est ici. Il le déroula en disant : Par Dieu ! Ceci est l\'écriture de mon oncle paternel Zayd et l\'invocation de mon grand-père Ali Ibn Al-Hossein, que la Paix soit sur eux deux.',
        '33. Puis il dit à son fils : Debout, Ô Ismaël<sup id="ref-17"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-17\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[17]</a></sup>, et apporte les supplications que je t\'ai demandé de mémoriser et de sauvegarder. Donc, Ismaël se leva et il apporta un parchemin-sahîfa en tout point identique à celui que Yahya m\'avait remis.',
        '34. Abu Abd Allâh l\'embrassa et la posa sur ses yeux en disant : Ceci est l\'écriture de mon père sous la dictée de mon grand-père, que la Paix soit avec eux deux, j\'en ai été le témoin.',
        '35. J\'ai dit : Ô fils du Messager de Dieu ! Ne serait-il pas convenable pour moi de la comparer au parchemin en provenance de Zayd et de Yahya ? Il m\'accorda l\'autorisation de la comparaison en me disant : Je te considère digne de cela.',
        '36. J\'ai comparé et j\'ai constaté qu\'il s\'agissait bien d\'un seul et même sujet. Je n\'ai découvert aucune lettre qui soit différente ni dans l\'un ni dans l\'autre des parchemins-sahîfa.',
        '37. Aussi, j\'ai demandé la permission à Abu Abd Allâh de remettre le parchemin-sahîfa aux deux fils de Abd Allah Ibn Al-Hassan. Il me dit : Dieu vous ordonne de restituer les dépôts<sup id="ref-18"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-18\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[18]</a></sup>. D\'accord, tu peux les leur remettre.',
        '38. Lorsque j\'ai fait signe de bouger pour aller à leur rencontre, il me dit : Ne te déranges pas !',
        '39. Il envoya chercher Mohammed et Ibrahim qui nous rejoignirent. Il dit : C\'est là l\'Héritage du fils de votre oncle paternel Yahya, qu\'il détenait de son père. Il vous a choisi pour cela au lieu et place de ses propres frères. Toutefois, nous vous imposerons une condition concernant cet héritage.',
        '40. Ils dirent : Que la Miséricorde soit sur toi ! Dis-nous et tes recommandations seront acceptées.',
        '41. Il répondit : Ne quittez pas Médine accompagnés de ce parchemin-sahîfa !',
        '42. Ils demandèrent : Et pourquoi cela ?',
        '43. Il déclara : Le fils de votre oncle paternel a craint pour lui la même chose que je crains pour vous.',
        '44. Ils rétorquèrent : Il a craint pour lui seulement lorsqu\'il a appris qu\'il serait assassiné.',
        '45. Abu Abd Allâh, que la Paix soit sur lui, les avertit : Quant à vous ne vous croyez pas à l\'abri ! Par Dieu ! Je sais que vous vous révolterez comme il s\'est révolté, et vous serez tués comme il a été tué !',
        '46. Ils se levèrent en disant : Il n\'y a de force ni de puissance que par de Dieu, le Très-Haut, le Très Grand<sup id="ref-19"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-19\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[19]</a></sup>.',
        '47. Lorsqu\'ils se révoltèrent Abu Abd Allâh, que la Paix soit avec lui, me dit : Ô Mutawakkil ! Que t\'a dit Yahya ? En vérité mon oncle paternel Mohammed Ibn Alî et son fils Ja‘afar appellent les gens à la vie, et nous les appelons à la mort.',
        '48. J\'ai répondu : Oui, Dieu est Témoin que tu dis la vérité ! Le fils de ton oncle paternel Yahya m\'a bien dit cela.',
        '49. Il communiqua ceci : Que la miséricorde de Dieu soit avec Yahya ! Mon père a rapporté de son père qui le tenait de son grand-père qui le tenait de Ali, que la Paix soit sur lui, que le Messager de Dieu, que la Paix et les Bénédictions de Dieu soient avec lui, fut arrêté dans ses mouvements pour un instant alors qu\'il était en chair.',
        '50. Il eut la vision de quelques hommes bondissant sur la chaire tels des singes et faisant perdre aux gens leurs niveaux atteints.',
        '51. Alors, le Messager de Dieu, que la Paix et les Bénédictions de Dieu soient sur lui et sur les Gens de sa demeure, s\'assit, laissant apparaître sur son visage son inquiétude.',
        '52. Ensuite, l\'Archange Gabriel, que la Paix soit sur lui, vint à lui pour lui révéler ce verset : Nous n\'avons fait de la vision que Nous t\'avons montrée ainsi que l\'arbre maudit, mentionné dans le Coran, qu\'une tentation pour les hommes. Nous les menaçons, mais cela ne fait qu\'accroître leur grande rébellion<sup id="ref-20"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-20\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[20]</a></sup>.',
        '53. Il demanda : Ô Gabriel ! Cela aura-t-il lieu durant ma Mission et à mon époque ?',
        '54. Il répondit : Non, parce que le cours de l\'Islam se maintiendra avec ton émigration-Hégire mais il sera arrêté une dizaine d\'années après cet événement. Alors, à partir de là, il faudra attendre trente-cinq années avant que le cours reprenne vie pour une période d\'environ cinq années seulement. Elles déboucheront sur un courant porteur d\'erreurs et d\'installation de la dynastie des Pharaons.',
        '55. Il dit : Dieu a fait descendre à ce propos : Oui, Nous l\'avons fait descendre durant la Nuit du Décret ? Comment pourrais-tu savoir ce qu\'est la Nuit du Décret ? La Nuit du Décret est meilleure que mille mois ! <sup id="ref-21"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-21\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[21]</a></sup> période durant laquelle les Umayyades seront à la tête des affaires musulmanes, période aussi durant laquelle il n\'y aura pas de Nuit du Décret.',
        '56. Il ajouta : Donc, Dieu transmit ces nouvelles à Son Prophète Mohammed, que la Paix et les Bénédictions de Dieu soient sur lui et sur sa famille concernant la durée de la dynastie des Omayyades sur la communauté et qu\'à la fin de cette période leur règne sera déchu.',
        '57. Alors que les montagnes rivalisaient avec eux, ils s\'imposèrent à elles jusqu\'au moment où Dieu, Exalté soit-IL, donna la permission de la déchéance de leur dynastie ; durant cette période ils hissèrent la bannière de l\'inimitié et de la haine envers nous, les Gens de la Maison-Ahlul Beyt.',
        '58. Dieu confirma à Son Prophète tout ce qui arrivera aux Gens de sa Demeure, à propos des gens qui leur témoigneront leur affection, et ce qu\'il adviendra de leurs partisans durant les jours de la dynastie des Omayyades.',
        '59. Il confirma en disant que Dieu a fait descendre à leur propos : N\'as-tu pas vu ceux qui échangent les bienfaits de Dieu contre l\'incrédulité et qui établissent leur peuple dans la demeure de la perdition ; dans la Géhenne où ils brûleront ? Quel détestable lieu de séjour !<sup id="ref-22"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-22\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[22]</a></sup>',
        '60. La Grâce de Dieu est en Mohammed et dans les Gens de sa Demeure. L\'affection à leur égard c\'est la foi qui ouvre au Jardin, et l\'inimitié à leur égard c\'est de l\'incroyance et une hypocrisie qui ouvrent à l\'Enfer.',
        '61. Raison pour laquelle le Messager de Dieu, que la Paix et les Bénédictions de Dieu soient avec lui et sur Sa Famille, nous a confiés à Ali et aux Gens de sa Demeure.',
        '62. Il compléta en disant : Puis, Abu Abd Allâh, que la Paix soit avec lui, dit : Avant la parousie de notre Qa‘îm<sup id="ref-23"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-23\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[23]</a></sup> aucun d\'entre les Gens de la Demeure ne se sera soulevé ou aura eu le désir de se révolter pour repousser une injustice ou pour relever un droit sans que cela ne lui amène de la peine et sans que son soulèvement n\'augmente l\'adversité à notre égard et à l\'égard de nos partisans.',
        '63. Al-Mutawakkil ibn Harun dit : Puis, Abu Abd Allâh me dicta les invocations composées de soixante-quinze chapitres. J\'en ai égaré onze d\'entre elles et sauvegardé une soixantaine.',
        '64. Abi-l-Mufaddal nous<sup id="ref-24"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-24\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[24]</a></sup> a rapporté en disant : Mohammed Ibn Al-Hassan Ibn Ruzbih Abu Bakr Al-Mada‘ini<sup id="ref-25"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-25\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[25]</a></sup>, scribe vivant à Rahba, nous a relaté dans sa maison.',
        '65. Il dit : Mohammed Ibn Ahmad Ibn Muslim Al-Mutahhari<sup id="ref-26"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-26\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[26]</a></sup> m\'a rapporté.',
        '66. Me disant : Mon père m\'a transmis de Umayr Ibn Mutawakkil Al-Balkhi qui le tenait de son père Mutawakkil ibn Harûn.',
        '67. Il a dit : J\'ai rencontré Yahya Ibn Zayd Ibn Alî, que la Paix soit sur eux deux. Puis, il fit mention du hadith en entier concernant la vision du Prophète, que Dieu le bénisse ainsi que les Gens de sa Demeure dont la mention fut faite par Ja‘afar Ibn Mohammed qui le tenait de ses ascendants, que les Bénédictions de Dieu soient sur eux.',
        '68. Pour toute la version de Al-Mutahhari, les chapitres mis en avant sont les suivants : 1. Louange à Dieu – 2. Bénédictions sur Mohammed et sur les Gens de sa Maison – 3. Bénédictions sur les Serviteurs du Trône – 4. Bénédictions sur ceux qui témoignent des Prophètes – 5. Ses Invocations pour Lui-Même et pour Ses Amis Rapprochés. 6. Son Invocation pour l\'Aube et le Crépuscule – 7. Son Invocation lors des Tâches préoccupantes – 8. Son Invocation pour Son Abri sûr – 9. Son Invocation dans Son Désir – 10. Son Invocation à la Recherche du Refuge de Dieu – 11. Son Invocation pour les Bons Résultats – 12. Son Invocation pour la Confidence – 13. Son Invocation dans la Recherche des moyens d\'existence – 14. Son Invocation pour préserver des mauvaises actions – 15. Son Invocation pour la Guérison – 16. Son Invocation pour la Libération – 17. Son Invocation contre Satan – 18. Son Invocation dans les Périls – 19. Son Invocation dans la Demande de Pluie – 20. Son Invocation pour posséder des traits de caractères nobles – 21. Son Invocation lorsqu\'un fait est attristant – 22. Son Invocation dans les difficultés – 23. Son Invocation pour le Bien-être – 24. Son Invocation pour les Parents – 25. Son Invocation pour les Enfants – 26. Son Invocation pour les voisins et les amis – 27. Son Invocation pour les gens des frontières – 28. Son Invocation dans la fuite face au danger – 29. Son Invocation lorsque Ses provisions sont rationnées – 30. Son Invocation pour être aidé dans le remboursement des dettes – 31. Son Invocation pour le Repentir – 32. Son Invocation lors de la prière de la nuit – 33. Son Invocation lors de la demande du Meilleur – 34. Son Invocation lors de l\'affliction – 35. Son Invocation pour la Satisfaction de Son Décret – 36. Son Invocation lorsque l\'on entend le tonnerre – 37. Son Invocation en formulant des Remerciements – 38. Son Invocation lorsque l\'on demande le Pardon – 39. Son Invocation lorsque l\'on est à la recherche du Pardon – 40. Son Invocation lorsque le moment de la Mort est venu – 41. Son Invocation lorsque l\'on aspire à une protection – 42. Son Invocation lors de la lecture du Coran – 43. Son Invocation lorsque apparaît la nouvelle Lune – 44. Son Invocation au début du Mois de Ramadan – 45. Son Invocation pour saluer la fin du Mois de Ramadan – 46. Son Invocation lors de la rupture du jeûne ainsi que pour le vendredi – 47. Son Invocation pour le jour d\'Arafa – 48. Son Invocation pour le Jour du Sacrifice et pour le Vendredi – 49. Son Invocation pour repousser les ruses des ennemis – 50. Son Invocation dans la Crainte – 51. Son Invocation dans l\'Imploration et l\'Humiliation – 52. Son Invocation pour implorer Dieu – 53. Son Invocation dans l\'acte d\'humilité devant Le Glorieux, L\'Exalté – 54. Son Invocation pour éloigner les soucis.',
        '69. Les chapitres précédents sont attribués aux citations de Abu Abd Allah Al-Hassani, que la Miséricorde de Dieu soit sur lui.',
        '70. Abi Abd Allah Ja‘afar Ibn Mohammed Al-Hassani nous a relaté<sup id="ref-27"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-27\') && document.getElementById(\'note-27\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[27]</a></sup> ;',
        '71. ayant dit : Abd Allah Ibn Omar Ibn Khattab Al-Zayyat nous a rapporté ;',
        '72. ayant dit : Khali Ibn Nu‘man Al-A‘lam nous a rapporté ;',
        '73. ayant dit : Umayr Ibn Mutawakkil Al-Thaqafi Al-Balkhi nous a rapporté d\'après son père Mutawakkil Ibn Harun ;',
        '74. ayant dit : Mon maître véridique, Abou Abd Allah Ja‘afar Ibn Mohammed m\'a dicté ;',
        '75. ayant dit : Mon grand-père Ali Ibn Al-Hossein dicta à mon père Mohammed Ibn Ali – que la Paix soit sur eux – et j\'en fus témoin.',
        {t:'instruction', tx:'Notes:'},
        '<span id="note-3"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-3\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[3]</a></span> Le nom du Seyyed Najm Al-Dînbahâ’ Al-Sharaf Abu Al-Hassan Mohammed Ibn Ahmad Ibn Ali Ibn Mohammed Ibn Umar Ibn Yahya Al-Alawi Al-Hassani n\'est mentionné nulle part ailleurs hormis ce texte. Cependant, les exégètes n\'attribuent à cet état de chose aucune conséquence négative car le texte est bien Mutawatir-c\'est-à-dire une tradition transmise par de nombreux rapporteurs, ce qui porte à constater qu\'elle n\'a pu être inventée. En outre, il s\'agit là d\'une chaîne d\'autorisation et non d\'une chaîne de transmission, autrement dit, le texte lui-même nous est parvenu, certes, par divers canaux, mais l\'autorisation de l\'enseigner dans sa forme première fut confiée aux personnalités dont il est fait mention ci-après. Ajoutons, qu\'il n\'est pas raisonnable de penser que cette chaîne d\'autorisation soit délibérément forgée de toutes pièces, il eut fallu dans ce cas un faussaire de haut niveau.',
        '<span id="note-4"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-4\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[4]</a></span> Il y a une certaine confusion concernant l\'identité du « nous » en début de la chaîne d\'autorisation. Elle est créée du fait de la présence de deux savants mentionnée dans les diverses chaînes de transmission de Sahifa. Cheikh Baha\'î, l\'un des nombreux exégètes ayant travaillé sur le sujet de Sahifa, soutient que « nous » indique Ali Ibn Al-Sukûn – Ali Al-Hassan Ali Ibn Mohammed Ibn Mohammed Ibn Ali Ibn Mohammed Ibn Mohammed Ibn Sukûn Al-Hilli, décédé en 606/1209 –. Dans ses commentaires concernant Sahifa, Mir Dâmâd écrit qu\'il s\'agit de ‘Amid Al-Ru\'asa’ Hibat Allah Ibn Hâmid Ibn Ahmad Ibn Ayyûb Al-Hilli – décédé en l\'an 610/1213.1214 –. Pour appuyer cette affirmation, il fait état du manuscrit de Al-Shahid Al-Awwal pour l\'avoir collationné de celui de Ibn Al-Sukûn dont ‘Amid Al-Ru\'asa en fit certaines annotations en l\'an 603/1206.',
        '<span id="note-5"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-5\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[5]</a></span> Il fut le gendre de Cheikh Al-Ta\'ifa Abu Ja\'afar Al-Tusi – décédé en 460/1067.8. –. Il fut une personnalité officielle du Sanctuaire de Ali à Nadjaf.',
        '<span id="note-6"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-6\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[6]</a></span> Sayyed ‘Alikhan écrit à propos de Al-‘Ukbari que son nom ne semble pas apparaître dans les ouvrages biographiques des Chiites, alors que Al-Samani le mentionne dans Al-Ançab – ajoutant Ibn Al-Hossein à son nom après Ibn Ahmad –, et faisant état de l\'année 472/179.80. retenue pour son décès.',
        '<span id="note-7"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-7\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[7]</a></span> Sayyed ‘Alikhan mentionne quatre sources concernant Abi Al-Muffadal en tant que Muhaddith-Rapporteur de hadiths. Tout ce qui concerne ce sujet est relaté par : Najashi ; Scheikh Al-Ta\'îfa Al-Tusi ; Ibn Al-Ghada\'iri et Abi Dawoud.',
        '<span id="note-8"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-8\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[8]</a></span> Najashi en fait l\'éloge en tant que personne digne de confiance. Il fait mention de bon nombre d\'ouvrages rattachés à son autorité. Il décéda en 308/921, à plus de quatre-vingt-dix ans [Sayyed Alikhan].',
        '<span id="note-9"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-9\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[9]</a></span> Selon Sayyed Alikhan, rien n\'est connu de lui.',
        '<span id="note-10"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-10\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[10]</a></span> Najashi fait état d\'un personnage nommé Ali Ibn Al-Nu\'man Al-A\'lam Al-Nakha\'ï connu pour être un compagnon du huitième Imam Ali Al-Redha – décédé en l\'an 203/818 –.',
        '<span id="note-11"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-11\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[11]</a></span> Ni le nom de ‘Umayr Ibn Mutawakkil ni celui de son père Mutawakkil Ibn Harun n\'apparaissent dans les pages de l\'Histoire. Cependant, Najashi et Cheikh Al-Tusi nomment Al-Mutawakkil Ibn Umayr Ibn Al-Mutawakkil en tant que rapporteur de Sahifa d\'après Yahya Ibn Zayd. A partir de lui, ils font état d\'une chaîne d\'autorisation différente de celle mentionnée dans le présent texte. Tel le souligne Sha\'rani, compte tenu de leur ancienneté et de leur agrément, le nom qu\'ils avancent est à préférer au nom mentionné dans le présent texte.',
        '<span id="note-12"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-12\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[12]</a></span> Cela eut lieu probablement en l\'an 122/740. Tel il est su, après le décès du fils et successeur de Zayn Al-Abidin connu sous le nom de Mohammed Al-Baqir, le fils de celui-ci, Zayd, se souleva contre bablement Mutawakkil Ibn ‘Umayr – rencontra Yahya fils de Zayd peu de temps avant qu\'il ne soit tué alors qu\'il poursuivait le soulèvement de son père.',
        '<span id="note-13"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-13\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[13]</a></span> « Dieu efface ou confirme ce qu\'IL veut. La Mère du Livre se trouve auprès de Lui ». (Coran 13/39) En accord avec Sayyed Alikhan, Yahya, en faisant mention de ce verset, suggère que même s\'il s\'agit bien du Commandement de Dieu connu de As-Sâdeq, Dieu peut le modifier. C\'est là la doctrine chiite de bada’-modification apparente dans le Décret divin ou le Pouvoir de Dieu de modifier Son Décret à l\'encontre de Ses Créatures. [Voir aussi : Majma Al-Bahrayn – Scheikh Fakhr Al-Din Al-Tourayhi – 979-1085 de l\'Hégire – éd. : Maison Al-Bi\'itha ; Département des Etudes islamiques – Qom – République islamique d\'Iran – 1416 de l\'Hégire lunaire – Tome 1 – p. 125.126. Note des traducteurs de la version en langue française de Sahifa]. L\'Imam Ja‘afar cite, également, ce verset pour appuyer la possibilité de bada’.',
        '<span id="note-14"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-14\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[14]</a></span> L\'usage de l\'expression Al-Sahifat Al-Kamila laisse penser que les Sahifa furent nommées ainsi dès le début. Dans une explication de la terminologie de l\'expression en question, Sayyed Alikhan cite un passage extrait de Ma\'alim Al-Ulama de Ibn Shahrashub – décédé en l\'an 588/1192 –.',
        '<span id="note-15"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-15\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[15]</a></span> Dans les notes de sa traduction en Persan, Sha\'rani porte à notre connaissance que le terme Sahifa signifie un manuscrit enroulé autour d\'une tige métallique aux extrémités de laquelle il y avait des fermetures, et muni d\'un sceau de cire.',
        '<span id="note-16"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-16\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[16]</a></span> Mohammed est davantage connu sous le nom de Al-Nafs Al-Zakiyya. Il fut désigné comme étant le Mahdi par son père et nombreux furent ceux qui lui prêtèrent allégeance, y compris Al-Mansour qui plus tard devint le premier calife abbasside. Mohammed et Ibrahim se soulevèrent, appuyé par une grande partie de l\'opinion publique, lorsque les Abbassides tentèrent de leur imposer leur autorité. Mohammed, soutenu par les gens de Médine, fut tué lors d\'une rude bataille, en l\'an 145/762 ; quant à Ibrahim, soutenu par les Zaïdites et les groupes de Mu\'tazilites de Kufa et de Basra, il fut tué quelques mois plus tard.',
        '<span id="note-17"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-17\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[17]</a></span> Ismaël fut le fils aîné de l\'Imam Ja‘afar et son successeur désigné. Cependant, il décéda avant son père ce qui l\'amena a désigné son second fils Mussa à la charge d\'Imam après lui. Les Ismaéliens choisirent de suivre Ismaël et non Mussa, soutenant que leur point de vue était légitime d\'autant que l\'Imamat demeurait dans sa famille.',
        '<span id="note-18"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-18\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[18]</a></span> « Dieu vous ordonne de restituer les dépôts et de juger selon la justice, lorsque vous jugez entre les hommes ». (Coran 4/58)',
        '<span id="note-19"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-19\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[19]</a></span> Une invocation souvent répétée dans de nombreux hadiths.',
        '<span id="note-20"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-20\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[20]</a></span> Coran 17/60. – Les exégètes du Coran proposent trois interprétations concernant cette vision. A propos de la troisième, Baydawi écrit : « Il est également dit que le Prophète vit un groupe de Omayyades assiégeant sa chaire et bondissant dessus tels des singes. – Alors, il dit : C\'est-là leur participation à la vie immédiate de ce monde ; ils voulaient la détenir pour accepter l\'Islam ». D\'après cette interprétation, ce qui est sous-entendu par « qu\'une tentation pour les hommes » correspond bien à ce qui eut lieu durant leur époque [Anwar Al-Tanzil, commentaire du verset 60 de la sourate 17]. Le commentateur chiite Tabarsi propose aussi cette affirmation en tant que troisième possibilité s\'appuyant sur deux hadiths [Majma‘a Al-Bayan]. Sayyed Alikhan rapporte de Baydawi et d\'autres à des fins de soutenir cette interprétation ; alors que Ibn Abbas parmi d\'autres, en tant que personne d\'autorité concernant cet événement, propose pour ces « trois maudites » l\'unique référence rattachée aux Omayyades.',
        '<span id="note-21"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-21\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[21]</a></span> Coran 97/1 à 3 – Tarmidhi propose un hadith rattaché à Al-Hassan Ibn Ali soutenant que l\'interprétation des mille mois concerne bien les Omayyades [Tafseer de la sourate 97, verset 1].',
        '<span id="note-22"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-22\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[22]</a></span> Coran 14/28.29.',
        '<span id="note-23"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-23\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[23]</a></span> Le Douzième Imam, celui qui se « lèvera–qa’ïm » au nom de la Vérité et pour la Vérité, il culbutera les ennemis de la Vérité.',
        '<span id="note-24"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-24\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[24]</a></span> L\'auteur, ici, est Al-Ukbari, connu aussi pour avoir fait état d\'une autre chaîne de qui il reçut Sahifa de Abu Al-Mufaddal.',
