<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070c18;color:#e8e2d0;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}
.app{display:flex;height:100%}

/* ══ SIDEBAR ══ */
.sidebar{
  width:240px;flex-shrink:0;height:100%;
  background:#0a1020;border-right:1px solid rgba(201,168,76,0.12);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{width:0}
.sb-header{
  padding:16px 14px 12px;border-bottom:1px solid rgba(201,168,76,0.1);
  flex-shrink:0;
}
.sb-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#c9a84c;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.sb-sub{font-size:10px;color:#3a4560;margin-top:2px;white-space:nowrap}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15)}

/* Theme group */
.sb-group{margin-bottom:4px}
.sb-theme{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;cursor:pointer;
  font-size:12px;font-weight:600;color:#9aa3b8;
  transition:all .18s;
  border-left:2px solid transparent;
}
.sb-theme:hover{color:#c9a84c;background:rgba(201,168,76,0.05)}
.sb-theme.open{color:#c9a84c;border-left-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06)}
.sb-theme-icon{font-size:14px;flex-shrink:0}
.sb-theme-label{flex:1;line-height:1.4}
.sb-chevron{font-size:9px;transition:transform .2s;flex-shrink:0;color:#c9a84c;opacity:.6}
.sb-theme.open .sb-chevron{transform:rotate(90deg)}

/* Sub-items */
.sb-items{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.sb-items.open{max-height:10000px}
.sb-sub-items{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.sb-sub-items.open{max-height:10000px}
.sb-item{
  display:block;padding:7px 14px 7px 36px;
  font-size:11.5px;color:#6b7280;cursor:pointer;
  transition:all .15s;line-height:1.4;
  border-left:2px solid transparent;
}
.sb-sub-items .sb-item{padding-left:48px}
.sb-item:hover{color:#c9a84c;background:rgba(201,168,76,0.04)}
.sb-item.active{color:#c9a84c;font-weight:600;background:rgba(201,168,76,0.08);border-left-color:#c9a84c}
.sb-item.disabled{opacity:0.35;pointer-events:none;font-style:italic}
.sb-item.subheader{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#c9a84c;opacity:0.8;cursor:pointer;padding:12px 14px 8px 24px;border-left:none;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.sb-item.subheader:hover{background:rgba(201,168,76,0.05)}
.sb-item.subheader .sb-chevron{transform:rotate(0deg);transition:transform .2s;color:#c9a84c}
.sb-item.subheader.open .sb-chevron{transform:rotate(90deg)}

/* ══ TOGGLE BUTTON ══ */
.sb-toggle{
  position:absolute;top:50%;left:240px;transform:translateY(-50%);
  width:18px;height:48px;background:#0d1828;border:1px solid rgba(201,168,76,0.2);
  border-left:none;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#c9a84c;z-index:50;transition:left .3s;
}
.sb-toggle:hover{background:rgba(201,168,76,0.12)}
.sidebar.collapsed~.sb-toggle{left:0}

/* ══ MAIN CONTENT ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;gap:16px;
}
.welcome-icon{font-size:48px;opacity:.4}
.welcome-title{font-family:'Cinzel',serif;font-size:16px;color:#c9a84c;font-weight:600;opacity:.7}
.welcome-hint{font-size:12px;color:#3a4560;line-height:1.6}

/* Content panel */
.content{
  flex:1;overflow-y:auto;padding:20px 24px 40px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent;
  animation:fadeIn .25s ease;
}
.content-inner{
  max-width:1200px;margin:0 auto;
}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.content.hidden{display:none}
.welcome.hidden{display:none}

/* ══ CONTENT ELEMENTS ══ */
.c-source{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#c9a84c;opacity:.5;font-family:'Cinzel',serif;margin-bottom:4px;text-align:center}
.c-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#e8e2d0;line-height:1.3;margin-bottom:6px;text-align:center}
.c-subtitle{font-size:13px;color:#9aa3b8;font-style:italic;line-height:1.6;margin-bottom:16px;text-align:center}
.c-divider{height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.25),transparent);margin-bottom:18px}

/* Intro */
.c-intro{
  font-size:var(--inv-fr-size,14.5px);color:#9aa3b8;font-style:italic;line-height:1.7;
  padding:12px 16px;border-left:2px solid rgba(201,168,76,0.3);
  background:rgba(201,168,76,0.03);border-radius:0 8px 8px 0;margin-bottom:18px;
  text-align:justify;hyphens:auto;
}
/* Salawat */
.c-salawat{
  text-align:center;padding:8px;margin:6px 0;
  font-size:11px;color:#c9a84c;opacity:.45;letter-spacing:.1em;
  text-transform:uppercase;font-family:'Cinzel',serif;
}
/* Verse */
.c-verse{display:flex;gap:12px;margin-bottom:12px;padding:11px 13px;border-radius:9px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);transition:background .2s}
.c-verse:hover{background:rgba(201,168,76,0.04);border-color:rgba(201,168,76,0.1)}
.c-vnum{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:#c9a84c;margin-top:2px}
.c-vtext{font-size:var(--inv-fr-size,13.5px);line-height:1.82;color:#cec6b0;text-align:justify;hyphens:auto}
/* Instruction */
.c-instruction{font-size:12px;color:#c9a84c;font-weight:600;margin:14px 0 8px;padding:6px 12px;background:rgba(201,168,76,0.06);border-radius:6px;border:1px solid rgba(201,168,76,0.15)}
/* Prose */
.c-prose p{font-size:var(--inv-fr-size,15px);line-height:1.85;color:#cec6b0;margin-bottom:14px;text-align:justify;hyphens:auto}
.c-prose p:last-child{margin-bottom:0}

/* Ziyara style — slightly more solemn */
.c-zv{display:flex;gap:12px;margin-bottom:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.015);border-left:2px solid rgba(201,168,76,0.2)}
.c-zv-text{font-size:var(--inv-fr-size,13.5px);line-height:1.82;color:#cec6b0}

/* Trilingual verse (Arabic + transliteration + French) */
.c-tri{margin-bottom:14px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);transition:background .2s}
.c-tri:hover{background:rgba(201,168,76,0.04);border-color:rgba(201,168,76,0.1)}
.c-tri-ar{font-family:'Amiri Quran',serif;font-weight:400;font-size:var(--inv-ar-size,1.25rem);color:#c9a84c;direction:rtl;text-align:right;line-height:2;margin-bottom:6px}
.c-tri-tr{font-size:var(--inv-tr-size,1.1rem);color:#9aa3b8;font-style:italic;line-height:1.6;margin-bottom:6px;padding-left:2px}
.c-tri-fr{font-size:var(--inv-fr-size,0.88rem);color:#cec6b0;line-height:1.75;text-align:justify;hyphens:auto}

body:not(.show-ar) .c-tri-ar, body:not(.show-ar) .c-zv-ar { display: none !important; }
body:not(.show-tr) .c-tri-tr { display: none !important; }
body:not(.show-fr) .c-tri-fr, body:not(.show-fr) .c-zv-text, body:not(.show-fr) .c-verse, body:not(.show-fr) .c-prose, body:not(.show-fr) .c-intro { display: none !important; }

.c-zv-ar{font-family:'Amiri',serif,sans-serif;font-size:var(--inv-ar-size,14px);color:#c9a84c;opacity:.75;direction:rtl;margin-top:4px;font-style:italic}
/* ── Font size controls ── */
.inv-fc{display:none;justify-content:flex-end;padding:8px 16px 0;gap:6px}
.inv-fc.show{display:flex}
.inv-fc .fc-toggles{display:flex;gap:12px;margin-right:auto;align-items:center;font-size:12px;color:#9aa3b8}
.inv-fc .fc-toggles label{cursor:pointer;display:flex;align-items:center;gap:4px}
.inv-fc .fc-toggles input{cursor:pointer}
.inv-fc .fc-grp{display:flex;align-items:center;gap:2px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:8px;padding:2px 4px}
.inv-fc .fc-label{font-size:10px;color:#c9a84c;opacity:0.6;padding:0 4px;min-width:16px;text-align:center}
.inv-fc .fc-label.ar-l{font-family:'Amiri',serif;font-size:14px}
.inv-fc .fc-btn{background:none;border:none;color:#c9a84c;font-size:15px;cursor:pointer;padding:3px 6px;border-radius:4px;line-height:1;transition:background .15s}
.inv-fc .fc-btn:hover{background:rgba(201,168,76,0.18)}
</style>
</head>

      body: [

        {t:'tri', ar:'وَيَا مَنْ عِنْدَهُ كَيْلُ الطَّلِبَاتِ', tr:'wa yâ man ‘indahû naylu ațtalibâti', fr:'Ô Celui en qui réside la réponse à toutes les requêtes.'},
        {t:'tri', ar:'وَيَا مَنْ لاَ يَبِيعُ نِعَمَهُ بِالأَثْمَانِ', tr:'wa ya man lâ yabî’u ni’amahû bil-athmâni', fr:'Ô Celui dont on ne pourrait acheter Ses Faveurs'},

        {t:'tri', ar:'وَلَاَ تَحْمِلْنِي بِعَدْلِكَ عَلَى الإسْتِحْقَاقِ', tr:'wa lâ tahmilni bi’adlika ‘alâ alistinqâqi', fr:'Et De Grâce ! De par Ta Justice, ne me donne pas ce que je mérite vraiment (ce qui est véritablement mon dû)'},

        {t:'tri', ar:'وَلَاَ تُوَجِّهْنِي فِي حَاجَتِي هذِهِ وَغَيْرِهَا إِلَى سِوَاكَ', tr:'wa lâ tuwajjihni fi hâjatî hâdhihî wa ghayrihâ ilâ siwâka', fr:'dans cette requête et d’autres requêtes à venir, ne détourne pas mon visage vers d’autres directions, loin de Toi.'},

        {t:'tri', ar:'إِنَّكَ وَاسِعٌ كَرِيمٌ', tr:'innaka wâsi un karîmun', fr:'En vérité, Tu es Illimité, sans Bornes et Généreux !'},

      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '14. Contre l\'oppression',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation lorsque l\'on est opprimé ou victime d\'injustice',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا اعْتَدِي علَيْهِ أوْ رأى مِن الظّالِمِين ما لا يُحِبُّ', fr:'La quatorzième supplication: au moment des hostilités, ou bien quand on voit des choses qu’on n’aimerait pas déceler chez les malfaiteurs'},
        {t:'tri', ar:'يَا مَنْ لَا يَخْفَى عَلَيْهِ أَثْبَاءُ الْمُتَظَلُّمِينَ', tr:'yâ man lâ yakhfâ ‘alayhî ambấ u almutazallimîna', fr:'Ô Celui dont les nouvelles des chagrinés, ne Lui sont point cacheés!'},
        {t:'tri', ar:'وَيَا مَنْ لاَ يَحْتَاجُ فِي قَصَصِهِمْ إِلَى شَهَادَاتِ الشََّّاهِدِينَ', tr:'wa ya man lâ yahtâju fi qaşaşihim ilâ chahâdâti achchâhidîna', fr:'Ô Celui qui n’a pas besoin d’être au courant de leur état par le témoignage des témoins !'},
        {t:'tri', ar:'وَيَا مَنْ قَرُبَتْ نُصْرَتُهُ مِنَ الْمَظْلُومِينَ', tr:'wa ya man qarubat nuşratuhû mina almazlûmîna', fr:'Ô Celui dont l’aide est auprès de ceux qui ont subi l’oppression !'},
        {t:'tri', ar:'وَيَا مَنْ بَعُدَ عَوْنُهُ عَنِ الظَّالِمِينَ', tr:'wa ya man ba’uda ‘awnuhû ‘an azzâlimîna', fr:'Ô Celui dont l’aide est très éloignée des malfaiteurs !'},
        {t:'tri', ar:'قَدْ عَلِمْتَ يَا إِلَهِي', tr:'qad ‘alimta ya ilâhî', fr:'Tu sais très bien, Ô Dieu,'},
        {t:'tri', ar:'مَا نَالَنِي مِنْ (فَلَانِ بْن فَلَانٍ) مِمَّا حَظَرْتَ', tr:'mâ nâlanî min… mimmâ hazarta', fr:'comment [un tel fils d’un tel] m’a fait du tort,'},
        {t:'tri', ar:'وَانْتَهَكَهُ مِنِّي مِمَّا حَجَزْتَ عَلَيْهِ', tr:'wa intahakahû minni mimmâ hajazta ‘alayhi', fr:'et comment il a violé ce que Tu avais marqué par le sceau de l’interdiction,'},
        {t:'tri', ar:'بَطَراً فِي نِعْمَتِكَ عِنْدَهُ', tr:'bataran fi ni’matika ‘indahu', fr:'et ainsi, a montré son ingratitude envers les faveurs que Tu lui avais envoyé,'},
        {t:'tri', ar:'وَاغْتِرَاراً بِنَكِيرِكَ عَلَيْهِ', tr:'wa ightirâran binakîrika ‘alayhi', fr:'et son illusion erronée envers ce que Tu lui avais renié.'},
        {t:'tri', ar:'اللَّهُمَّ فَصَلٌ عَلَى مُحمَّدٍ وَآلِهِ', tr:'allâhumma faşalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu ! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَخُذْ ظَالِمِي وَعَدُوِّي عَنْ ظُلْمِي بِقُوَّتِكَ', tr:'wa khudh zâlimî wa ‘aduwwi ‘an zulmi biquwwatika', fr:'écarte mon ennemi malfaiteur de tout mal envers moi, de par Ta Force et de par Ton Pouvoir,'},
        {t:'tri', ar:'وَافْلُلْ حَدَّهُ عَنِّي بِقُدْرَتِكَ', tr:'waflul haddahû ‘annî biqudratika', fr:'épointe la lame de son épée envers moi,'},
        {t:'tri', ar:'وَاجْعَلْ لَهُ شُغْلاً فِيمَا يَلِيهِ', tr:'waj al lahû chughlan fimâ yalîhi', fr:'et envoie-lui une diversion'},
        {t:'tri', ar:'وعَجْزاً عَمَّا يُنَاوِيهِ', tr:'wa ‘ajzan ‘ammâ yunâwîhi', fr:'et l’inhabilité d’atteindre son ennemi !'},
        {t:'tri', ar:'اَللَّهُمَّ وَصَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma wa șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَلَاَ تُسَوِّغْ لَهُ ظُلْمِي', tr:'wa lâ tusawwigh lahû zulmî', fr:'Fais-en sorte que le malfaiteur ne puisse facilement me nuire,'},
        {t:'tri', ar:'وَأَحْسِنْ عَلَيْهِ عَوْنِي', tr:'wa ahsin ‘alayhî ‘awni', fr:'et donne-moi un bon secours contre lui,'},
        {t:'tri', ar:'وَاعْصِمْنِي مِنْ مِثْلِ أَفْعَالِهِ', tr:'wa i’șimnî min mithli af âlihi', fr:'et préserve-moi des actions qui lui ressemblent.'},
        {t:'tri', ar:'وَلَاَ تَجْعَلْنِي فِي مِثْلِ حَالِهِ', tr:'wa lâ taj’ alni fi mithli hâlihi', fr:'et ne me place jamais dans les situations auxquelles Il s’y trouve !'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَأَعِدْنِي عَلَيْهِ عَدْوَّى حَاضِرَةً', tr:'wa a’idnî ‘alayhî ‘adwan hâdiratan', fr:'Assiste-moi avec une assistance immèdiate'},
        {t:'tri', ar:'تَكُونُ مِنْ غَيْظِي بِهِ شِفَاءً', tr:'takünu min ghayzi bihî chifâ’an', fr:'qui puisse guèrrir ma rage contre lui,'},
        {t:'tri', ar:'وَمِنْ حَنَقِي عَلَيْهِ وَفَاءً', tr:'wa min hanaqi ‘alayhî wafâ’an', fr:'et rachète ma furie contre lui!'},
        {t:'tri', ar:'اللَّهُمَّ صَلّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!.'},
        {t:'tri', ar:'وَعَوِّضْنِي مِنْ ظُلْمِهِ لِي عَفْوَكَ', tr:'wa ‘awwidni min zulmihî lî ‘afwaka', fr:'Avec Ton Pardon, compense ses méfaits envers moi,'},
        {t:'tri', ar:'وَأَبْدِلْنِي بِسُوءِ صَنِيعِهِ بِي رَحْمَتَكَ', tr:'wa abdilni bisû’i sanî ihi bi rahmataka', fr:'et remplace son action démoniaque envers moi, par Ta Miséricorde,'},
        {t:'tri', ar:'فَكُلُّ مَكْرُوهِ جَلَلٌ دُونَ سَخَطِكَ', tr:'fakullu makrûhin jalalun dûna sakhațika', fr:'car toute chose détestée qui soit moins que Ton Courroux est légère,'},
        {t:'tri', ar:'وَكُلُّ مَرْزِئَةٍ سَوَاءٌ مَعَ مَوْجِدَتِكَ', tr:'wa kullu marzi’atin sawâ’un ma’a mawjidatika', fr:'et chaque désastre en comparaison avec Ta Rancoeur, est indifférence même'},
        {t:'tri', ar:'اللَّهُمَّ فَكَمَا كَرَّهْتَ إِلَيَّ أَنْ أُظْلَمَ', tr:'allâhumma fakamâ karrahta ilayya an uzlama', fr:'Ö Dieu! comme Tu m’as fait justement détester à supporter l’oppression et l’injustice,'},
        {t:'tri', ar:'فَقِنِي مِنْ أَنْ أَظْلِمَ', tr:'faqini min an azlima', fr:'de même, protège-moi de tout péché'},
        {t:'tri', ar:'اللَّهُمَّ لَاَ أَشكُو إِلَى أَحَدٍ سِوَاكَ', tr:'allâhumma lâ achkû ilâ ahadin siwâka', fr:'Ô Dieu! je ne porte ma complainte à personne d’autre que Toi'},
        {t:'tri', ar:'وَلَاَ أَسْتَعِينُ بِحَاكِمٍ غَيْرِكَ حَاشَاكَ', tr:'wa lâ asta ‘înu bihâkimin ghayrik hâchâka', fr:'et je ne demande de l’aide à aucun souverain que Toi! comment le pourrais-je! Par conséquent,'},
        {t:'tri', ar:'فَصَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'faşalli ‘alâ muhammadin wa âlihi', fr:'Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَصِلْ دُعَائِي بِالإِجَابَةِ', tr:'wa șil du ‘â’î bil- ijâbati', fr:'Joigne ma supplication à Ta Réponse,'},
        {t:'tri', ar:'وَاقْرِنْ شِكَايَتِي بِالتَّغيِيرِ', tr:'wagrin chikâyati bittaghyîri', fr:'et unis ma complainte avec un changement de situation !'},
        {t:'tri', ar:'اللَّهُمَّ لَا تَفْتِنِّي بِالْقَنُوطِ مِنْ إِنْصَافِكَ', tr:'allâhumma la taftinnî bilqunûți min inşâfika', fr:'Ô Dieu! ne me tente pas avec le sentiment de désespoir envers Ton juste Jugement (traitement),'},
        {t:'tri', ar:'وَلَاَ تَفْتِنْهُ بِالأَمْنِ مِنْ إِنْكَارِكَ', tr:'wa lâ taftinhû bil- amni min inkârika', fr:'et de même, ne tente pas l’ennemi qui me nuit avec un tel sentiment de sécurité, de sorte qu’il puisse oublier Ta Punition,'},
        {t:'tri', ar:'فَيُصِرَّ عَلَى ظُلْمِي', tr:'fayuşirra ‘alâ zulmî', fr:'et qu’il continue à me nuire'},
        {t:'tri', ar:'وَيُحَاصِرَنِي بِحَقِّي', tr:'wa yuhâşiranî bihaqqî', fr:'et me contraindre dans mes droits.'},
        {t:'tri', ar:'وَعَرِّفْهُ عَمَّا قَلِيلٍ مَا أَوْعَدْتَ الظَّالِمِينَ', tr:'wa ‘arrifhû ‘ammâ qalîlin mâ aw’adta azzâlimîna', fr:'Fais-lui comprendre rapidement ce que Tu as promis aux malfaiteurs,'},
        {t:'tri', ar:'وَعَرِّفْنِي مَا وَعَدْتَ مِنْ إِجَابَةِ الْمُضْطَرِّينَ', tr:'wa ‘arrifni mâ wa’adta min ijâbati almudțarrina', fr:'et laisse-moi reconnaître Ta Réponse promise aux oppressés et à ceux qui sont en détresse'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa alihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَوَفْقِنِي لِقَبُولِ مَا قَضَيْتَ لِي وَعَلَيَّ', tr:'wa waffiqni liqabûli mâ qadayta lî wa ‘alayya', fr:'Donne-moi du succès en acceptant Tes Décrets pour moi et contre moi,'},
        {t:'tri', ar:'وَرَضِّنِي بِمَا أَخَذْتَ لِي وَمِنِّي', tr:'wa raddini bimâ akhadhta lî wa minni', fr:'Rends-moi content de tout ce que Tu prends pour moi et de moi,'},
        {t:'tri', ar:'وَاهْدِنِي لِلَّتِي هِيَ أَقْوَمُ', tr:'wahdini lillati hiya aqwamu', fr:'Guide-moi vers le chemin le plus droit,'},
        {t:'tri', ar:'وَاسْتَعْمِلْنِي بِمَا هُوَ أَسْلَمُ', tr:'wasta’ milni bimâ huwa aslamu', fr:'et emploie-moi dans ce qui est le plus sécurisant'},
        {t:'tri', ar:'اللَّهُمَّ وَإِنْ كَائَتِ الْخِيَرَةُ لِي', tr:'allâhumma wa in kânat alkhiyaratu li', fr:'Ô Dieu! Si mon bien ultime réside dans le fait que le droit qui a été pris de moi,'},
        {t:'tri', ar:'عِنْدَكَ فِي تَأْخِيرِ الأَخْذِ لِي', tr:'indaka fi ta’khîri al-akhdhi lî', fr:'par celui qui m’a fait du mal, doit être retardé,'},
        {t:'tri', ar:'وَتَرْكِ الإِنْتِقَامِ مِمَّنْ ظَلَمَنِي', tr:'wa tarki alintiqâmi mimman zalamani', fr:'et que je dois m’abstenir de me venger'},
        {t:'tri', ar:'إِلَى يَوْمِ الْفَصْلِ وَمَجْمَعِ الْخَصْمِ', tr:'ilâ yawmi alfaşli wa majma’i alkhaşmi', fr:'contre lui jusqu’au jour du Dernier Jugement, et l’assemblement des disputant par conséquent'},
        {t:'tri', ar:'فَصَلٌ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'faşalli ‘alâ muhammadin wa âlihi', fr:'Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَأَيِّدْنِي مِنْكَ بِنِيَّةٍ صَادِقَةٍ وَصَبْرٍ دَائِمٍ', tr:'wa ayyidni minka biniyyatin şâdiqatin wa şabrin dâ’imin', fr:'et rends-moi puissant avec une vraie intention et une patience durable,'},
        {t:'tri', ar:'وَأَعِذْنِي مِنْ سُوءِ الرَّغْبَةِ وَهَلَعِ أَهْلِ الْحِرْصِ', tr:'wa a’idhnî min sû’i arraghbati wa hala’i ahli alhirşi', fr:'Donne-moi refuge contre tout mauvais désir,'},
        {t:'tri', ar:'وَصَوِّرْ فِي قَلْبِي مِثَالَ مَا ادَّخَرْتَ لِي مِنْ ثَوَابِكَ', tr:'wa şawwir fi qalbi mithâla mâ iddakharta lî min thawâbika', fr:'et forme l’image de Ta Récompense dans mon coeur, que Tu as mise de côté pour moi,'},
        {t:'tri', ar:'وَأَعْدَدْتَ لِخَصْمِي مِنْ جَزَائِكَ وَعِقَابِكَ', tr:'wa a’dadta likhaşmî min jazâ’ika wa’ iqâbika', fr:'et aussi le repaiment et la punition que Tu as préparés pour mon disputant !'},
        {t:'tri', ar:'وَاجْعَلْ ذَلِكَ سَيَباً لِقَنَاعَتِي بِمَا قَضَيْتَ', tr:'waj’al dhâlika sababan liqanâ’ ati bimâ qadayta', fr:'Fais-en sorte que ce soit la cause de mon contentement envers Ton Décret,'},
        {t:'tri', ar:'وَثِقَتِي بِمَا تَخَيَّرْتَ', tr:'wa thiqati bimâ takhayyarta', fr:'et la confiance que Tu as choisi pour moi!'},
        {t:'tri', ar:'آمِينَ رَبَّ الْعَالَمِينَ', tr:'âmîna rabba al’âlamîna', fr:'Amen, Ô Seigneur des mondes!'},
        {t:'tri', ar:'إِنَّكَ ذُو الْفَضْلِ الْعَظِيمِ', tr:'innaka dhû alfadli al’azîmi', fr:'Car en vérité Tu es la Grâce abondante'},
        {t:'tri', ar:'وَأَنْتَ عَلَى كُلَّ شَيءٍ قَدِيرٌ.', tr:'wa anta ‘alâ kulli chay’in qadîrun', fr:'et Tu es Puissant envers tout !'},
        {t:'salawat'},
      ]
    },


    's15': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '15. En cas de maladie',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation en cas de maladie ou d\'affliction',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا مرِض أوْ نزل بِهِ كرْبٌ أوْ بِلِيّةً', fr:'La quinzième supplication: au moment de la maladie, ou visité par la détresse ou l’affliction'},
        {t:'tri', ar:'اللَّهُمَّ لَكَ الْحَمْدُ', tr:'allâhumma laka alhamdu', fr:'Ô Dieu! à Toi appartient toute louange,'},
        {t:'tri', ar:'عَلَى مَا لَمْ أَزَلْ أَتَصَرَّفُ فِيهِ مِنْ سَلامَةِ بَدَنِي', tr:'alâ mâ lam azal ataşarrafu fihi min salâmati badanî', fr:'pour la bonne santé de mon corps, qui me permet de me mouvoir,'},
        {t:'tri', ar:'وَلَكَ الْحَمْدُ عَلَى مَا أَحْدَثْتَ بِي مِنْ عِلَّةٍ فِي جَسَدِي', tr:'wa laka alhamdu ‘alâ mâ ahdathta bi min ‘illatin fi jasadi', fr:'et à Toi appartient toute louange, pour les maux que tu as causés dans ma chair!'},
        {t:'tri', ar:'فَمَا أَدْرِي يَا إِلَهِي أَيُّ الْحَالَيْنِ أَحَقُّ بِالشُكْرِ لَكَ؟', tr:'famâ adri yâ ilâhî ayyu alhâlayni ahaqqu bichchukri laka', fr:'Car en vérité je ne sais lequel de ces états mérite le plus de reconnaissance de ma part pour Toi,'},
        {t:'tri', ar:'وَأَيُّ الْوَقْتَيْنِ أَوْلَى بِالْحَمْدِ لَكَ؟', tr:'wa ayyu alwaqtayni awlâ bilhamdi laka', fr:'et lequel de ces temps en vaut le plus pour ma louange envers Toi ?'},
        {t:'tri', ar:'أَوَقْتُ الصِّحَّةِ الَّتِي هَنَّأْتَنِي فِيهَا طَيِّبَاتِ رِزْقِكَ', tr:'awaqtu aşşihhati allatî hanna’tani fihâ tayyibâti rizqika', fr:'Le temps de la santé, dans lequel Tu me rends joyeux pour me délecter des choses agréables de Ta Provision,'},
        {t:'tri', ar:'وَنَشَّطْتَنِي بِهَا لا بْتِغَاءِ مَرْضَاتِكَ وَفَضْلِكَ', tr:'wa nachchattani bihâ li-ibtighấi mardâtika wa fadlika', fr:'par laquelle Tu me procures la joie de chercher les moyens de produire Ton Bon Plaisir et Ta Grâce,'},
        {t:'tri', ar:'وَقَوَّيتَنِي مَعَهَا عَلَى مَا وَفَقْتَنِي لَهُ مِنْ طَاعَتِكَ', tr:'wa qawwaytani ma’ahâ ‘alâ mâ waffaqtani lahû min tâ’ atika', fr:'et par laquelle Tu me donnes la force et la puissance nécessaires pour accomplir les actions d’obéissance que Tu m’as laissé accomplir avec succès ?'},
        {t:'tri', ar:'أَمْ وَقْتُ الْعِلَّةِ الَّتِي مَحَّصْتَنِي بِهَا', tr:'am waqtu al illati allati mahhaştani bihâ', fr:'Ou bien le temps de la maladie, dans lequel Tu m’as mis dans l’épreuve,'},
        {t:'tri', ar:'وَالنِّعَمِ الَّتِي أَثْحَفْتَنِي بِهَا', tr:'wanni’ ami allatî athaftani bihâ', fr:'et me noyas dans les faveurs.'},
        {t:'tri', ar:'تَخْفِيفاً لِمَا تَقُلَ عَلَى ظَهْرِي مِنَ الْخَطِيئَاتِ', tr:'takhfîfan limâ thaqula ‘alâ zahri mina alkhațf’âti', fr:'par l’allégement des offenses qui me pèsent sur les épaules (le dos),'},
        {t:'tri', ar:'وَتَطْهِيراً لِمَا الْغَمَسْتُ فِيهِ مِنَ السَّيِّئَاتِ', tr:'wa tathiran limâ inghamastu fihi mina assayyi’âti', fr:'par la purification des mauvaises actions dans lesquelles j’y étais tombé,'},
        {t:'tri', ar:'وَتَنْبِيهَا لِتَنَاولِ التَّوْبَةِ', tr:'wa tanbihan litanâwli attawbati', fr:'et par l’incitation au repentir,'},
        {t:'tri', ar:'وَتَذْكِيراً لِمَحْوِ الْحَوْبَةِ بِقَدِيمِ النِّعْمَةِ', tr:'wa tadhkiran limahwi alhawbati biqadîmi anni mati', fr:'et par le rappel à effacer les méfaits à l’aide des faveurs anciennes;'},
        {t:'tri', ar:'وَفِي خِلالِ ذَلِكَ مَا كَتَبَ لِيَ الْكَاتِبَانِ مِنْ زَكيٍّ الأَعْمَالِ', tr:'wa fi khilâli dhâlika mâ kataba lî alkâtibâni min zakyyi al-a’mâli', fr:'Et par tout cela, ce que les deux Écrivains inscrivent pour moi des actions irréprochables,'},
        {t:'tri', ar:'مَا لاَ قَلْبٌ فَكْرَ فِيهِ', tr:'mâ lâ qalbun fakkara fihi', fr:'qu’aucun coeur n’a pensé,'},
        {t:'tri', ar:'وَلَا لِسَانٌ نَطَقَ بِهِ', tr:'wa lâ lisânun națaqa bihi', fr:'et aucune langue n’a proféré'},
        {t:'tri', ar:'وَلَاَ جَارِحَةٌ تَكَلِّفَتْهُ', tr:'wa lâ jârihatun takallafat-hu', fr:'et aucun membre du corps ne les a accomplies,'},
        {t:'tri', ar:'بَلْ إفْضَالاً مِنْكَ عَلَيَّ', tr:'bal ifdâlan minka ‘alayya', fr:'et dont par Ta Grâce seule, ont été inscrites pour moi,'},
        {t:'tri', ar:'وَإِحْسَانا مِنْ صَنِيعِكَ إِلَيَّ', tr:'wa ihsânan min şanî’ika ilayya', fr:'et aussi de par le bénéfice de Ta Bienfaisance envers moi'},
        {t:'tri', ar:'اللَّهُمَّ فَصَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma faşalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَحَبِّبْ إِلَيَّ مَا رَضِيتَ لِي', tr:'wa habbib ilayya mâ radîta lî', fr:'Fais-moi aimer ce que Tu as approuvé pour Moi,'},
        {t:'tri', ar:'وَيَسِّرْ لِي مَا أَحْلَلْتَ بِي', tr:'wa yassir li mâ ahlalta bi', fr:'facilite pour moi, ce que Tu as envoyé à moi,'},
        {t:'tri', ar:'وَطَهِّرْنِي مِنْ دَنَسِ مَا أَسْلَفْتُ', tr:'wa tahhirni min danasi mâ aslaftu', fr:'Purifie-moi de toute action passée,'},
        {t:'tri', ar:'وَامْحُ عَنِي شَرَّ مَا قَدَّمْتُ', tr:'wamhû ‘anni charra mâ qaddamtu', fr:'efface le mal, de ce que j’ai commis auparavant,'},
        {t:'tri', ar:'وَأَوْجِدْنِي حَلَاوَةَ الْعَافِيَةِ', tr:'wa awjidni halâwata al’âfiyata', fr:'Laisse-moi trouver la douceur du bien-être,'},
        {t:'tri', ar:'وَأَذِقْنِي بَرْدَ السَّلاَمَةِ', tr:'wa adhiqni barda assalâmata', fr:'Laisse-moi savourer la fraîcheur de sécurité,'},
        {t:'tri', ar:'وَاجْعَلْ مَخْرَجِي عَنْ عِلْتِي إِلَى عَفْوِكَ', tr:'waj’al makhraji an ‘illati ilâ ‘afwika', fr:'et désigne-moi un chemin de délivrance pour moi, de ma maladie dans Ton Pardon,'},
        {t:'tri', ar:'وَمُتَحَوَّلِي عَنْ صَرْعَتِي إِلَى تَجَاوُزكَ', tr:'wa mutahawwali ‘an șar’ ati ilâ tajâwuzika', fr:'et une transformation de mon infirmité dans Ta Patience,'},
        {t:'tri', ar:'وَخَلَاَصِي مِنْ كَرْبِي إِلَى رَوْحِكَ', tr:'wa khalâşi min karbî ilâ rawhika', fr:'une évasion de ma détresse dans Ta Fraîcheur,'},
        {t:'tri', ar:'وَسَلَاَمَتِي مِنْ هذِهِ الشِّدَّةِ إِلَى فَرَجِكَ', tr:'wa salâmati min hâdhihi achchiddati ilâ farajika', fr:'et une sécurité de cette difficulté dans Ton Soulagement'},
        {t:'tri', ar:'إِنَّكَ الْمُتَفَضِّلُ بِالإِحْسَانِ', tr:'innaka almutafaddilu bil- ihsâni', fr:'Tu es Généreux dans Tes Bienfaits, gratuitement,'},
        {t:'tri', ar:'اَلْمُتَطَوِّلُ بِالإمْتِنَانِ', tr:'almutațawwilu bilimtinâni', fr:'toujours Gracieux dans la Bonté,'},
        {t:'tri', ar:'الْوَهَّابُ الْكَرِيمُ', tr:'alwahhâbu alkarimu', fr:'Le plus Généreux des Donateurs,'},
        {t:'tri', ar:'ذُو الْجَلاَلِ وَالإِكْرَامِ.', tr:'dhû aljalâli wal- ikrâmi', fr:'Possesseur de Majesté et de la Munificence !'},
        {t:'salawat'},
      ]
    },


    's16': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '16. Demande de pardon',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation pour le pardon des péchés et défauts',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا اسْتقال مِنْ ذُنُوبِهِ أَوْ تضرّع فِي طلبِ الْعفْوِ عنْ عُيُوبِهِ', fr:'La seizième supplication: quand Il demanda soulagement de ses péchés ou bien plaida (demanda) pardon pour ses défauts'},
        {t:'tri', ar:'اللَّهُمَّ يَا مَنْ بِرَحْمَتِهِ يَسْتَغِيثُ الْمُذْنِبُونَ', tr:'allâhumma yâ man birahmatihi yastaghîthu almudhnibûna', fr:'Ô Dieu! Ô Celui à qui les pécheurs demandent la Miséricorde !'},
        {t:'tri', ar:'وَيَا مَنْ إِلَى ذِكْرِ إِحْسَانِهِ يَفْزَعُ الْمُضْطَرُّونَ', tr:'wa ya man ilâ dhikri ihsânihî yafza u almudțarrûna', fr:'Ô Celui dont les misérables, en se souvenant de Son Bienfait, y prennent refuge !'},
        {t:'tri', ar:'وَيَا مَنْ لِخِيفَتِهِ يَنْتَحِبُ الْخَاطِئُونَ', tr:'wa ya man likhifatihî yantahibu alkhâți’ûna', fr:'Ô Celui dont la peur, fait pleurer les offenseurs !'},
        {t:'tri', ar:'يَا أُنْسَ كُلِّ مُسْتَوْحِشٍ غَرِيبِ', tr:'yâ unsa kulli mustawhichin gharibin', fr:'Ô Confort de n’importe quel étranger solitaire !'},
        {t:'tri', ar:'وَيَا فَرَجَ كُلّ مَكْرُوبٍ كَتِيب', tr:'wa yâ faraja kulli makrûbin ka’îbin', fr:'Ô Soulagement de tous ceux qui sont désespérés et découragés'},
        {t:'tri', ar:'وَيَا غَوْثَ كُلِّ مَخْذُولِ فَرِيد', tr:'wa yh hawthakuni makhdhûlin faridin', fr:'Ô Secours de n’importe quelle personne seule et abandonnée !'},
        {t:'tri', ar:'وَيَا عَضُدَ كُلَّ مُحْتَاجٍ طَرِيدٍ', tr:'wa yâ ‘aduda kulli muhtâjin țarîdin', fr:'Ô Support de toutes les personnes proscrites'},
        {t:'tri', ar:'أَنْتَ الَّذِي وَسِعْتَ كُلَّ شَيءٍ رَحْمَةً وَعِلْماً', tr:'anta alladhî wasi’ta kulla chay’in rahmatan wa ‘ilman', fr:'Tu es Celui qui embrasse tout dans Sa Miséricorde et Sa Connaissance'},
        {t:'tri', ar:'وَأَئْتَ الَّذِي جَعَلْتَ لِكُلِّ مَخْلُوقٍ فِي نِعَمِكَ سَهْماً', tr:'wa anta alladhi ja’alta likulli makhlûqin fi ni’amika sahman', fr:'Tu es Celui qui a désigné une part de Ses Faveurs, à chacune de Ses créatures !'},
        {t:'tri', ar:'وَأَنْتَ الَّذِي عَفْوُهُ أَعْلَى مِنْ عِقَابِهِ', tr:'wa anta alladhi ‘afwuhû a’lâ min ‘iqâbihi', fr:'Tu es Celui dont le Pardon est plus élevé que Sa Punition !'},
        {t:'tri', ar:'وَأَنْتَ الَّذِي تَسْعَى رَحْمَتُهُ أَمَامَ غَضَبِهِ', tr:'wa anta alladhi tas’â rahmatuhû amâma ghadabihi', fr:'Tu es Celui dont la Grâce et la Miséricorde courent toujours au devant de Son Courroux'},
        {t:'tri', ar:'وَأَنْتَ الَّذِي عَطَاؤُهُ أَكْثَرُ مِنْ مَنْعِهِ', tr:'wa anta alladhi ‘ațâ’uhû aktharu min man’ihi', fr:'Tu es Celui dont la Donation est plus grande que Son Refus de donner !'},
        {t:'tri', ar:'وَأَنْتَ الَّذِي اتَّسَعَ الْخَلَائِقُ كُلُّهُمْ فِي وُسْعِهِ', tr:'wa anta alladhi ittasa a alkhalâ’iqu kulluhum fi wus ihi', fr:'Tu es Celui qui, de par Sa Grâce, toutes les créatures se trouvent encerclées dans Sa Puissance'},
        {t:'tri', ar:'وَأَنْتَ الَّذِي لَا يَرْغَبُ فِي جَزَاءِ مَنْ أَعْطَاهُ', tr:'wa anta alladhi lâ yarghabu fi jaza’i man a’tâhu', fr:'Tu est Celui qui ne désire aucun paiement de celui à qui, la fait une donation'},
        {t:'tri', ar:'وَأَئْتَ الَّذِي لَاَ يُفْرِطُ فِي عِقَابِ مَنْ عَصَاهُ', tr:'wa anta alladhî lâ yufrițu fi ‘iqâbi man ‘aşâhu', fr:'Tu es Celui qui n’exagère point la Punition de celui qui Lui avait désobéi et moi,'},
        {t:'tri', ar:'وَأَنَا يَا إِلَهِي عَبْدُكَ الَّذِي أَمَرْتَهُ بِالدُّعَاءِ فَقَالَ:', tr:'wa ana ya ilâhî ‘abduka alladhî amartahû biddu a’i faqâla', fr:'Ô Seigneur! Je suis Ton humble serviteur, celui à qui Tu as commandé de proférer ses supplications, et qui T’a dit :'},
        {t:'tri', ar:'لَبَّيْكَ وَسَعْدَيْكَ', tr:'labbayka wa sa dayka', fr:'Je suis à Ton service et à Ta disposition! Me voilà ici,'},
        {t:'tri', ar:'هَا أَنَا ذَا يَا رَبِّ مَطْرُوحٌ بَيْنَ يَدَيْكَ', tr:'hã ana dhâ yâ rabbi mațrühun bayna yadayka', fr:'Doux Seigneur, à genoux devant Toi.'},
        {t:'tri', ar:'أَنَا الَّذِي أَوْقَرَتِ الْخَطَايَا ظَهْرَهُ', tr:'ana aladhi awqarat alkhațâya zahrahu', fr:'Je suis celui dont les offenses passées ont pesé lourdes'},
        {t:'tri', ar:'وَأَنَا الَّذِي أَفْنَتِ الذُّنُوبُ عُمُرَهُ', tr:'wa ana alladhi afnat adhdhunûbu ‘umurahu', fr:'Je suis celui dont les péchés commis dans la vie durant, l’ont consumé'},
        {t:'tri', ar:'وَأَنَا الَّذِي بِجَهْلِهِ عَصَاكَ', tr:'wa ana alladhi bijahlihi ‘aşâka', fr:'Je suis celui qui était désobéissant dans son ignorance,'},
        {t:'tri', ar:'وَلَمْ تَكُنْ أَهْلا مِنْهُ لِذَاكَ', tr:'wa lam takun ahlan minhû lidhâka', fr:'et que Tu ne méritais point une telle conduite de sa part'},
        {t:'tri', ar:'هَلْ أَنْتَ يَا إِلَهِي رَاحِمٌ مَنْ دَعَاكَ فَأْبْلِغَ فِي الدُّعَاءِ؟', tr:'hal anta ya ilâhî râhimun man da âka fa ublighu fiddu’ai', fr:'Mon Dieu! Sois Miséricordieux envers celui qui Te supplie, pour que je puisse produire ma supplication devant Toi'},
        {t:'tri', ar:'أَمْ أَنْتَ غَافِرٌ لِمَنْ بَكَاكَ فَأُسْرِعَ فِي الْبُكاءِ؟', tr:'am anta ghâfirun liman bakâka fa usr’u filbukâ’i', fr:'Pardonneras-tu celui qui pleure devant Toi, pour que je me dépêche de pleurer moi aussi ?'},
        {t:'tri', ar:'أَمْ أَنْتَ مُتجَاوزٌ عَمَّنْ عَفَّرَ لَكَ وجْهَهُ تَذَثُّلاَ؟', tr:'am anta mutjâwizun ‘amman ‘affara laka wajhahû tadhallulan', fr:'Montreras-tu de la Patience envers celui qui enfonce son visage dans la poussière, devant Toi, pour montrer sa bassesse ?'},
        {t:'tri', ar:'أَمْ أَنْتَ مُغْنِ مَنْ شَكَا إِلَيْكَ فَقْرَهُ تَوَكُّلاً؟', tr:'am anta mughnin man chakâ ilayka faqrahû tawakkulan', fr:'Libéreras-tu de tout besoin, celui qui se complaint de son vil besoin, et lui accorderas-Tu de la confiance ?'},
        {t:'tri', ar:'إِلَهِي لَا تُخَيِّبْ مَنْ لَاَ يَجِدُ مُعْطِياً غَيْرَكَ', tr:'ilâhî lâ tukhayyib man lâ yajidu mu’țiyan ghayraka', fr:'Ô Mon Dieu ! Ne désappointe pas celui qui ne connaît d’autre donateur que Toi,'},
        {t:'tri', ar:'وَلَاَ تَخْذُلْ مَنْ لاَ يَسْتَغْنِي عَنْكَ بأَحَدٍ دُونَكَ', tr:'wa lâ takhdhul man lâ yastaghnî ‘anka bi-ahadin dûnaka', fr:'et n’abandonne pas celui qui ne peut se libérer de son besoin de Toi, à quelqu’un de plus bas que Toi !'},
        {t:'tri', ar:'إِلَهِي فَصَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'ilâhî fașalli ‘alâ muhammadin wa âlihi', fr:'Mon Dieu! Bénis Mohammad et toute sa Famille'},
        {t:'tri', ar:'وَلَا تُعْرِضْ عَنِّي وَقَدْ أَقْبَلْتُ عَلَيْكَ', tr:'wa lâ tu rid ‘annî waqad aqbaltu ‘alayka', fr:'Ne Te ne détourne pas de moi, quand j’ai tourné mon visage vers Toi,'},
        {t:'tri', ar:'وَلَاَ تَحْرِمْنِي وَقَدْ رَغِبْتُ إِلَيْكَ', tr:'wa la tahrimni waqad raghibtu ilayka', fr:'ne me déprive de rien, quand je T’ai demandé de l’aide,'},
        {t:'tri', ar:'وَلَاَ تَجْبَهْنِي بِالرَّدِّ وَقَدِ اِنْتَصَبْتُ بَيْنَ يَدَيْكَ', tr:'wa lâ tajbahni birraddi waqad intașabtu bayna yadayka', fr:'et ne gifle pas ma joue avec le rejet (refus), quand je suis debout devant Toi!'},
        {t:'tri', ar:'أَنْتَ الَّذِي وَصَفْتَ نَفْسَكَ بِالرَّحْمَةِ', tr:'anta alladhi waşafta nafsaka birrahmati', fr:'Tu es Celui qui s’est décrit comme la Miséricorde même par conséquent,'},
        {t:'tri', ar:'فَصَلَّ عَلَى مُحَمَّدٍ وَآلِهِ وَارْحَمْنِي', tr:'faşalli ‘alâ muhammadin wa âlihiî warhamni', fr:'bénis Mohammad et toute sa Famille Aie pitié de moi!'},
        {t:'tri', ar:'وَأَنْتَ الَّذِي سَمَّيْتَ نَفْسَكَ بِالْعَفْوِ', tr:'wa anta alladhi sammayta nafsaka bil’afwi', fr:'Tu es Celui qui s’est nommé comme le Pardon même,'},
        {t:'tri', ar:'فَاعْفُ عَنِّي', tr:'fa’fu ‘anni', fr:'par conséquent pardonne-moi,'},
        {t:'tri', ar:'قَدْ تَرَى يَا إِلَهِي', tr:'qad tarâ yâ ilâhî', fr:'Tu as vu ô Dieu!'},
        {t:'tri', ar:'فَيْضَ دَمْعِي مِنْ خِيفَتِكَ', tr:'fayda dam’î min khifatika', fr:'le flot de mes larmes, de la peur que j’ai de Toi,'},
        {t:'tri', ar:'وَوَجِيبَ قَلْبِي مِنْ خَشْيَتِكَ', tr:'wa wajiba qalbi min khachyatika', fr:'le battement de mon coeur, de l’épouvante que j’éprouve envers Toi,'},
        {t:'tri', ar:'وَانْتِفَاضَ جَوَارِحِي مِنْ هَيْبَتِكَ', tr:'wantifâda jawârihi min haybatika', fr:'et de mes membres, frappé de terreur que je suis, par Toi'},
        {t:'tri', ar:'كُلَّ ذَلِكَ حَيَاءً مِنِّي بِسُوءِ عَمَلِي', tr:'kullu dhâlika hayâ’an minnî bisû’i amali', fr:'Tout ceci, surgit de la honte que j’éprouve de mes méfaits, devant Toi!'},
        {t:'tri', ar:'وَلِذَلِكَ حَمَدَ صَوْتِي عَنِ الْجَأْرِ إِلَيْكَ', tr:'wa lidhâlik khamada şawti ‘an aljâ’ri ilayka', fr:'Ainsi, ma voix est devenue silencieuse, je ne crie plus à Toi,'},
        {t:'tri', ar:'وَكَلّ لِسَانِي عَنْ مُنَاجَاتِكَ', tr:'wa kalla lisânî ‘an munâjâtika', fr:'et ma langue est devenue muette, et ne peut plus murmurer quoique ce soit dans la prière!'},
        {t:'tri', ar:'يَا إِلَهِي فَلَكَ الْحَمْدُ', tr:'ya ilâhî falaka alhamdu', fr:'Mon Dieu! Ainsi T’appartient toute louange'},
        {t:'tri', ar:'فَكَمْ مِنْ عَائِبَةٍ سَتَرْتَهَا عَلَيَّ فَلَمْ تَفْضَحْنِي', tr:'fakam min ‘â’ibatin satartahâ ‘alayya falam tafdahnî', fr:'Combien de mes défauts as-tu déjà couverts à mon insu, sans pour autant m’exposer!'},
        {t:'tri', ar:'وَكَمْ مِنْ ذَئْبٍ غَطَّيْتَهُ عَلَيَّ فَلَمْ تَشْهَرْنِي', tr:'wa kam min dhanbin ghattaytahû ‘alayya falam tach-harni', fr:'Combien de mes péchés as-tu déjà voilés à mon insu, sans pour autant me rendre insigne!'},
        {t:'tri', ar:'وَكَمْ مِنْ شَائِبَةٍ أَلْمَمْتُ بِهَا', tr:'wa kam min châ’ibatin almamtu bihâ', fr:'Combien de fautes ai-je commises,'},
        {t:'tri', ar:'فَلَمْ تَهْتِكْ عَنِّي سِتْرَهَا', tr:'falam tahtik ‘anni sitrahâ', fr:'et pourtant Tu ne mas jamais démasqué,'},
        {t:'tri', ar:'وَلَمْ تُقَلِّدْنِي مَكْرُوهَ شَنَارِهَا', tr:'wa lam tuqallidni makrûha chanârihâ', fr:'et ne m’as jamais mis la corde de leur détestable disgrâce au collet,'},
        {t:'tri', ar:'وَلَمْ تُبْدِ سَوْآتِهَا لِمَنْ يَلْتَمِسُ مَعَايِبِي', tr:'wa lam tubdi saw’âtihâ liman yaltamisu ma âyibî', fr:'ou bien mis en évidence leur déshonneur,'},
        {t:'tri', ar:'مِنْ جِيرَتِي وَحَسَدَةِ نِعْمَتِكَ عِنْدِي', tr:'min jirati wa hasadati ni’matika ‘indi', fr:'devant (mes voisins) les envieux qui sont toujours en train de me chercher des défauts,'},
        {t:'tri', ar:'ثُمَّ لَمْ يَنْهَنِي ذَلِكَ عَنْ أَنْ جَرَيْتُ إِلَى سُوءِ مَا عَهِدْتَ مِنِّي', tr:'thumma lam yanhanî dhâlika an an jaraytu ilâ sû’i mâ ‘ahidta minni', fr:'et à ceux qui envient Ta Faveur envers moi! Pourtant cela ne m’a pas empêché de commettre des méfaits!'},
        {t:'tri', ar:'فَمَنْ أَجْهَلُ مِنِّي يَا إِلَهِي بِرُشْدِهِ؟', tr:'faman ajhalu minnî ya ilâhi biruchdihi', fr:'Ainsi – Ô Dieu! – qui serait plus ignorant que moi, de sa bonne conduite?'},
        {t:'tri', ar:'وَمَنْ أَغْفَلُ مِنِّي عَنْ حَظِّهِ؟', tr:'wa man aghfalu minni ‘an hazzihi', fr:'Qui serait plus indifférent que moi, de sa bonne fortune?'},
        {t:'tri', ar:'وَمَنْ أَبْعَدُ مِنِّي مِنِ اسْتِصْلَاَحِ نَفْسِهِ؟', tr:'wa man ab’adu minnî min istişlâhî nafsihi', fr:'Qui serait plus éloigné que moi, de cette vérité incontestable qu’il devrait se corriger, pour se mettre dans le droit chemin?'},
        {t:'tri', ar:'حِينَ أُتْفِقُ مَا أجْرَيْتَ عَلَيَّ مِنْ رِزْقِكَ', tr:'hina unfiqu mâ ajrayta ‘alayya min rizqika', fr:'Car j’ai utilisé la provision que Tu m’avais délivré,'},
        {t:'tri', ar:'فِي مَا نَهَيْتَنِي عَنْهُ مِنْ مَعْصِيَتِكَ', tr:'fi mâ nahaytanî ‘anhû min ma’şiyatika', fr:'dans la désobéissance que Tu m’avais interdit'},
        {t:'tri', ar:'وَمَنْ أَبْعَدُ غَوْراً فِي الْبَاطِلِ', tr:'wa man ab’adu ghawran filbâțili', fr:'de montrer! Qui s’enfoncera plus profondément que moi,'},
        {t:'tri', ar:'وَأَشَدُّ إِقْدَاماً عَلَى السٌّوءِ مِنِّي؟', tr:'wa achaddu iqdâman ‘alâ assû’i minni', fr:'dans la fausseté, et se montre plus audacieuse dans le mal?'},
        {t:'tri', ar:'حِينَ أَقِفُ بَيْنَ دَعْوَتِكَ وَدَعْوَةِ الشَّيْطَان فَأَتَّبِعُ دَعْوَتَهُ', tr:'hîna aqifu bayna da’watika wa da wati achchaytâni fa attabi’ u da’watahû', fr:'Car j’hésite entre Ton Appel et l’appel de Satan, ensuite je suis son appel,'},
        {t:'tri', ar:'عَلَى غَيْرِ عَمَّى مِنِّي فِي مَعْرِفَةٍ بِهِ', tr:'alâ ghayri ‘aman minni fi ma rifatin bihi', fr:'sans être pour autant aveugle dans la connaissance que je possède de lui,'},
        {t:'tri', ar:'وَلَاَ نِسْيَانٍ مِنْ حِفْظِي لَهُ', tr:'wa lâ nisyânin min hifzi lahu', fr:'ou bien oublieux dans la mémoire que j’ai de lui,'},
        {t:'tri', ar:'وَأَنَا حِينَئِذٍ مُوقِنٌ بأَنَّ مُنْتَهَى دَعْوَتِكَ إِلَى الْجَنَّةِ', tr:'wa ana hîna’idhin mûqinun bi’anna muntahâ da’watika ilâ aljannati', fr:'tout en sachant avec certitude que Ton Appel se termine dans les jardins du Paradis'},
        {t:'tri', ar:'وَمُنْتَهَى دَعْوَتِهِ إِلَى النَّارِ', tr:'wa muntahâ da’watihî ilâ annâri', fr:'et l’appel à lui, au Feu (éternel)!'},
        {t:'tri', ar:'سُبْحَانَكَ! مَا أَعْجَبَ مَا أَشْهَدُ بِهِ عَلَى نَفْسِي', tr:'subhânaka mâ a jaba mâ ach- hadu bihî ‘alâ nafsî', fr:'Gloire à Toi! Comme cela paraît étrange que je puisse témoigner contre mon âme,'},
        {t:'tri', ar:'وَأُعَدِّدُهُ مِنْ مَكْتُومِ أَمْرِي!', tr:'wa u’addiduhû min maktûmi amri', fr:'et l’énumération de mes affaires cachées'},
        {t:'tri', ar:'وَأَعْجَبُ مِنْ ذَلِكَ أَنَاتُكَ عَنِّي', tr:'wa a jabu min dhâlika anâtuka ‘anni', fr:'et encore plus étrange, sont le manque de hâte chez Toi à me punir,'},
        {t:'tri', ar:'وَإِبْطَاؤُكَ عَنْ مُعَاجَلَتِي', tr:'wa ibtâ’uka ‘an mu âjalati', fr:'et la lenteur avec laquelle Tu veuilles T’occuper de moi!'},
        {t:'tri', ar:'وَلَيْسَ ذَلِكَ مِنْ كَرَمِي عَلَيْكَ', tr:'wa laysa dhâlika', fr:'Cela n’est pas dû au fait que je possède quelqu’honneur devant min karamî ‘alayka Toi,'},
        {t:'tri', ar:'بَلْ تَأَنياً مِنْكَ لِي', tr:'bal ta’anniyan minka li', fr:'mais parce que Tu attends patiemment pour moi,'},
        {t:'tri', ar:'وَتَفَضُّلا مِنْكَ عَلَيَّ', tr:'wa tafaddulan minka ‘alayya', fr:'et Te montres toujours plein de Clémence envers moi,'},
        {t:'tri', ar:'لأَنْ أَرْتَدِعَ عَنْ مَعْصِيَتِكَ الْمُسْخِطَةِ', tr:'li’an artadi’ a ‘an ma’şiyatika almuskhițati', fr:'pour que je puisse me retenir de Te désobéir,'},
        {t:'tri', ar:'وأُقْلِعَ عَنْ سَيِّئَاتِي الْمُخْلِقَةِ', tr:'wa uqli a ‘an sayyi’âti almukhliqati', fr:'de Te rendre Mécontent, et de m’abstenir des mauvaises actions qui me disgracient devant Toi,'},
        {t:'tri', ar:'وَلَأَنّ عَفْوَكَ عَنِي أَحَبُ إِلَيْكَ مِنْ عُقُوبَتِي', tr:'wa li’anna ‘afwaka ‘anni ahabbu ilayka min ‘uqûbati', fr:'et aussi parce que Tu aimes me pardonner, encore plus que de me punir'},
        {t:'tri', ar:'بَلْ أَنَا يَا إلَهِي أكَثْرُ ذُنُوباً', tr:'bal ana ya ilâhi akatharu dhunûban', fr:'Mais mon Dieu! Mes péchés sont plus nombreux,'},
        {t:'tri', ar:'وَأَقْبَحُ آثَاراً', tr:'wa aqbahû âthâran', fr:'mes pas sont plus disgracieux (laids)'},
        {t:'tri', ar:'وَأَشْنَعُ أَفْعَالاً', tr:'wa achna’u af’âlan', fr:'mes actions sont plus répugnantes,'},
        {t:'tri', ar:'وَأَشَدُّ فِي الْبَاطِلِ تَهَوُّراً', tr:'wa achaddu filbâțili tahawwuran', fr:'et je suis plus audacieuse en me dépêchant vers la fausseté,'},
        {t:'tri', ar:'وَأَضْعَفُ عِنْدَ طَاعَتِكَ تَيَقُّظًا', tr:'wa ad’afu ‘inda tâ ‘atika tayaqquzan', fr:'plus faible en me réveillant à Ton Obéissance,'},
        {t:'tri', ar:'وَأَقَلُّ لِوَعِيدِكَ انْتِبَاها وَارْتِقَاباً', tr:'wa aqallu liwa ‘îdika intibâhan wartiqâban', fr:'moins attentif et vigilant envers Tes Menaces,'},
        {t:'tri', ar:'مِنْ أَنْ أُحْصِيَ لَكَ عُيُوبِي', tr:'min an uhşiya laka ‘uyûbî', fr:'pour que je puisse énumérer pour Toi mes fautes,'},
        {t:'tri', ar:'أوْ أقْدِرَ عَلَى ذِكْرِ ذُنُوبِي', tr:'aw aqdira ‘alâ dhikri dhunûbî', fr:'ou bien avoir le pouvoir de Te compter mes péchés'},
        {t:'tri', ar:'وَإِنَّمَا أُوَبِّخُ بِهَذَا نَفْسِي', tr:'wa innamâ uwabbikhu bihadha nafsi', fr:'Je puis sulement me blâmer,'},
        {t:'tri', ar:'طَمَعاً فِي رَأْفَتِكَ', tr:'țama an fi ra’fatika', fr:'en désirant intensément Ta Bonté,'},
        {t:'tri', ar:'الَّتِي بِهَا صَلَاَحُ أَمْرِ الْمُذْنِبِينَ', tr:'allatî bihâ șalâhû amri almudhnibîna', fr:'avec laquelle les affaires des pécheurs se redressent,'},
        {t:'tri', ar:'وَرَجَاءَ لِرَحْمَتِكَ', tr:'wa rajâ’an lirahmatika', fr:'et espérer pour Ta Grâce et Ta Miséricorde,'},
        {t:'tri', ar:'الَّتِي بِهَا فَكَاكُ رِقَابِ الْخَاطِئِينَ', tr:'allati bihâ fakâku riqâbi alkhâți’îna', fr:'avec lesquelles les cous des offenseurs seront libérées'},
        {t:'tri', ar:'اللَّهُمَّ وَهَذِهِ رَقَبَتِي قَدْ أَرَقَّتْهَا الذُّنُوبُ', tr:'allâhumma wahâdhihî raqabati qad araqqat-hâ adhdhunûbu', fr:'Ô Dieu! Ceci est mon cou, esclave des péchés (innombrables)!'},
        {t:'tri', ar:'فَصَلَّ عَلَى مُحَمَّدٍ وَآلِهِ وَأَعْتِقْهَا بِعَفْوِكَ', tr:'faşalli ‘alâ muhammadin wa âlihiî wa a’tiqhâ bi’ afwika', fr:'Par conséquent, bénis Mohammad et toute sa Famille et libère-le de par Ton Pardon!'},
        {t:'tri', ar:'وَهَذَا ظَهْرِي قَدْ أَثْقَلَتْهُ الْخَطَايَا', tr:'wa hâdhâ zahri qad athqalat-hu alkhatâyâ', fr:'Ceci est mon dos, plié par les offenses!'},
        {t:'tri', ar:'فَصَلْ عَلَى مُحَمَّدٍ وَآلِهِ وَخَفَّفْ عَنْهُ بِمَنِّكَ', tr:'faşalli ‘alâ muhammadin wa âlihiî wa khaffif ‘anhu bimannika', fr:'Par conséquent, bénis Mohammad et toute sa Famille! et de par Ta Gentillesse et Ta Bonté, Allège-le de tout poids!'},
        {t:'tri', ar:'يَا إِلَهِي لَوْ بَكَيْتُ إِلَيْكَ حَتَّى تَسْقُطَ أَشْفَارُ عَيْنَيَّ', tr:'yâ ilâhî law bakaytu ilayka hattâ tasquța achfâru ‘aynayya', fr:'Mon Dieu ! même si je dois pleurer devant Toi jusqu’à ce que mes paupières tombent,'},
        {t:'tri', ar:'وَانْتَحَبْتُ حَتَّى يَنْقَطِعَ صَوْتِي', tr:'wantahabtu hattâ yanqați’a şawtî', fr:'attendre jusqu’à ce que ma voix se fatigue,'},
        {t:'tri', ar:'وَقُمْتُ لَكَ حَتَّى تَتَنَشَّرَ قَدَمَايَ', tr:'wa qumtu laka hattâ tatanachchara qadamâya', fr:'rester debout devant Toi,'},
        {t:'tri', ar:'وَرَكَعْتُ لَكَ حَتَّى يَنْخَلِعَ صُلْبِي', tr:'wa raka tu laka hattâ yankhali a şulbî', fr:'jusqu’à ce que mes pieds se gonflent, m’incliner devant Toi jusqu’à ce que mes os sortent de leur jointure,'},
        {t:'tri', ar:'وَسَجَدْتُ لَكَ حَتَّى تَتَفَقّاً حَدَقَتَايَ', tr:'wa sajadtu laka hattâ tatafaqqa’a hadaqatâya', fr:'me prosterner devant Toi jusqu’à ce que mes yeux sortent de leur cavités,'},
        {t:'tri', ar:'وَأَكَلْتُ ثُرَابَ الأَرْضِ طُولَ عُمْرِي', tr:'wa akaltu turâba al-ardi țûla ‘umrî', fr:'manger la poussière du sol pour toute ma vie,'},
        {t:'tri', ar:'وَشَرِبْتُ مَاءَ الرَّمَادِ آخِرَ دَهْرِي', tr:'wa charibtu mâ’a arramâdi âkhira dahri', fr:'boire de l’eau mélangée avec du cendre jusqu’à la fin de mes jours,'},
        {t:'tri', ar:'وَذَكَرْتُكَ فِي خِلاَلِ ذَلِكَ حَتَّى يَكِلَّ لِسَانِي', tr:'wa dhakartuka fi khilâli dhâlika hattâ yakilla lisânî', fr:'mentionner Ton Nom en faisant tout cela, jusqu’à ce que ma langue s’arrête de le prononcer,'},
        {t:'tri', ar:'ثُمَّ لَمْ أَرْفَعْ طَرْفِي إِلَى آفَاقِ السَّمَاءِ اسْتِحْيَاءً مِنْكَ', tr:'thumma lam arfa » » țarfi ila âfâqi assamâ’i istihyâ’an minka', fr:'et ne point lever mon regard vers le ciel et l’horizon, en ayant honte devant Toi,'},
        {t:'tri', ar:'مَا اسْتَوْجَبْتُ بِذَلِكَ مَحْوَ سَيِّئَةٍ وَاحِدَةٍ مِنْ سَيِّئَاتِي', tr:'mâ istawjabtu bidhâlika mahwa sayyi’atin wâhidatin min sayyi’âti', fr:'je ne mériterais pas pour autant l’effacement d’un seul de mes péchés (de mes mauvaises actions)'},
        {t:'tri', ar:'وَإِنْ كُنْتَ تَغْفِرُ لِي حِينَ أَسْتَوْجِبُ مَغْفِرَتَكَ', tr:'wa in kunta taghfiru lî hîna astawjibu maghfirataka', fr:'Et quand bien même je mériterai Ton Pardon,'},
        {t:'tri', ar:'وَتَعْفُو عَنِّي حِينَ أَسْتَحِقُّ عَفْوَكَ', tr:'wa ta fû ‘anni hîna astahiqqu ‘afwaka', fr:'et que Tu me pardonnerais, et que je mériterais Ton Absolution, et que Tu m’absolverais,'},
        {t:'tri', ar:'فَإِنَّ ذَلِكَ غَيْرُ وَاجِبِ لِي بِاسْتِحْقَاقٍ', tr:'fa inna dhâlika ghayru wâjibin lî bistihqâqin', fr:'pourtant je n’aurais aucun mérite et aucune voix dans tout cela,'},
        {t:'tri', ar:'وَلَاَ أَنَا أَهْلَ لَهُ بِاسْتِيجَابِ', tr:'wa lâ ana ahlun lahû bistijâbin', fr:'et je n’avalerais rien pour autant'},
        {t:'tri', ar:'إِذْ كَانَ جَزَائِي مِنْكَ فِي أَوَّلِ مَا عَصَيْتُكَ النَّارَ', tr:'idh kâna jazâ’î minka fi awwali mâ ‘aşaytuka annâra', fr:'Car mon paiement par Toi, du moment que je Te désobéis, n’est tien d’autre que le Feu (éternel) !'},
        {t:'tri', ar:'فَإِنْ تُعَذَبْنِي فَأَنْتَ غَيْرُ ظَالِمِ لِي', tr:'fa in tu adhdhibni fa anta ghayru zâlimin lî', fr:'Ainsi, si Tu me punis, Tu ne m’infliges aucun mal.'},
        {t:'tri', ar:'إِلَهِي فَإِذْ قَدْ تَغَمَّدْتَنِي بِسِتُرِكَ فَلَمْ تَفْضَحْنِي', tr:'ilâhi fa idh qad taghammadtani bisitrika falam tafdahni', fr:'Mon Dieu! Du moment que Tu me protégeas par Ta Protection, ne m’exposas pas,'},
        {t:'tri', ar:'وَتَأَنَيْتَنِي بكَرَمِكَ فَلَمْ تُعَاجِلْنِي', tr:'wa ta’annaytani bikaramika falam tu âjilni', fr:'et attendis patiemment pour moi avec Ta Générosité, et ne Te dépêchas point de me punir,'},
        {t:'tri', ar:'وَحَلُمْتَ عَنِّي بِتَفَضُّلِكَ فَلَمْ تُغَيِّرْ نِعْمَتَكَ عَلَيَّ', tr:'wa halumta ‘annî bitafaddulika falam tughayyir ni’ mataka ‘alayya', fr:'et me montras Ta Clémence avec Ta Grâce, et ne changeas point Ta Faveur envers moi,'},
        {t:'tri', ar:'وَلَمْ تُكَدِّرْ مَعْرُوفَكَ عِنْدِي', tr:'wa lam tukaddir ma rûfaka ‘indi', fr:'ou bien embrouiller Tes Bienfaits envers moi, en ce cas,'},
        {t:'tri', ar:'فَارْحَمْ طُولَ تَضَرُّعِي', tr:'farham tûla tadarru’î', fr:'Aie pitié de ma supplication,'},
        {t:'tri', ar:'وَشِدَّةَ مَسْكَنَتِي', tr:'wa chiddata maskanati', fr:'et aussi de mon intense misère'},
        {t:'tri', ar:'وَسُوءَ مَوْقِفِي', tr:'wa sû’a mawqifi', fr:'et de ma mauvaise situation'},
        {t:'tri', ar:'اَللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَقِنِي مِنَ الْمَعَاصِي', tr:'wa qini mina alma’âși', fr:'Protège-moi des actions de la désobéissance,'},
        {t:'tri', ar:'وَاسْتَعْمِلْنِي بِالطَّاعَةِ', tr:'wasta’ milni bițțâ ati', fr:'Emploie-moi dans lobéissance,'},
        {t:'tri', ar:'وَارْزُقْنِي حُسْنَ الإِنَابَةِ', tr:'warzuqni husna al- inâbati', fr:'Fais-en sorte que je puisse bien me tourner de nouveau vers Toi,'},
        {t:'tri', ar:'وَطَهِّرْنِي بِالتَّوْبَةِ', tr:'wa țahhirni bittawbati', fr:'Purifie-moi par le repentir, par ma préservation de tout péché,'},
        {t:'tri', ar:'وَأَيِّدْنِي بِالْعِصْمَةِ', tr:'wa ayyidni bil işmati', fr:'Mets-moi sur le droit chemin par mon bien-être,'},
        {t:'tri', ar:'وَاسْتَصْلِحْنِي بِالْعَافِيَةِ', tr:'wastaşlihni bil ‘âfiyati', fr:'Laisse-moi savourer Ta douceur de l’absolution,'},
        {t:'tri', ar:'وَأَذِقْنِي حَلاَوَةَ الْمَعْفِرَةِ', tr:'wa adhiqni halâwata almaghfirati', fr:'Transforme-moi en une Personne libérée Par Ta Grâce.'},
        {t:'tri', ar:'وَاجْعَلْنِي طَلِيقَ عَفْوِكَ وَعَتِيقَ رَحْمَتِكَ', tr:'waj’alni taliqa ‘afwik wa ‘atiqa rahmatika', fr:'l’esclave qui se libéra de par Ta Clémence,'},
        {t:'tri', ar:'وَاكْتُبْ لِي أَمَاناً مِنْ سَخَطِكَ', tr:'waktub lî amânan min sakhațika', fr:'et Inscris pour moi un sauf-conduit de Ton Courroux !'},
        {t:'tri', ar:'وَبَشِّرْنِي بِذَلِكَ فِي الْعَاجِلِ دُونَ الآجِلِ بُشْرَى أَعْرِفُهَا', tr:'wa bachchirni bidhâlika fil’âjili dûna al-âjili buchrâ a rifuhâ', fr:'Donne-moi les bonnes nouvelles de tout ceci dans l’immédiat et non dans le temps à venir, une bonne nouvelle que je puisse reconnaître'},
        {t:'tri', ar:'وَعَرِّفْنِي فِيهِ عَلَاَمَةً أَتَبَيَّنُهَا', tr:'wa ‘arrifni fihî ‘alâmatan atabayyanuhâ', fr:'et par un signe quelconque que je puisse voir clairement, fais-la moi connaître !'},
        {t:'tri', ar:'إِنَّ ذَلِكَ لا يَضِيقُ عَلَيْكَ فِي وُسْعِكَ', tr:'inna dhâlik lâ yadiqu ‘alayka fi wus’ika', fr:'Cela ne Te contraignera en aucune façon dans Ta profusion,'},
        {t:'tri', ar:'وَلَا يَتَكَأْدُكَ فِي قُدْرَتِكَ', tr:'wa lâ yataka’aduka fi qudratika', fr:'et ne Te sera pas difficile dans Ton Pouvoir,'},
        {t:'tri', ar:'وَلَا يَتَصَعَّدُكَ فِي أَنَاتِكَ', tr:'wa lâ yataşa ‘ aduka fi anâtika', fr:'et ne s’élèvera pas au-dessus de Ton manque de hâte,'},
        {t:'tri', ar:'وَلَا يَؤُدُكَ فِي جَزِيلِ هِبَاتِكَ', tr:'wa lâ ya’ûduka fi jazili hibâtika', fr:'ou bien ne Te fatiguera pas dans les dons grandioses,'},
        {t:'tri', ar:'اَلَّتِي دَلَّتْ عَلَيْهَا آيَاتُكَ', tr:'allati dallat ‘alayha âyâtuka', fr:'que Tu accordes, et qui pointent vers Tes Enseignes'},
        {t:'tri', ar:'إِنَّكَ تَفْعَلُ مَا تَشَاءُ', tr:'innaka taf alu mâ tachâ’u', fr:'En vérité Tu fais ce que Tu veux,'},
        {t:'tri', ar:'وَتَحْكُمُ مَا تُرِيدُ', tr:'wa tahkumu mâ turidu', fr:'Tu décrètes ce que Tu désires.'},
        {t:'tri', ar:'إِنَّكَ عَلَى كُلَّ شَيءٍ قَدِيرٌ.', tr:'innaka ‘alâ kulli chay’in qadîrun', fr:'Tu es Puissant sur toutes les choses.'},
        {t:'salawat'},
      ]
    },


    's17': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '17. Contre Satan',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation pour demander protection contre Satan',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا ذُكِر الشّيْطانُ فاسْتعاذ مِنْهُ ومِنْ عداوتِهِ وكيْدِهِ', fr:'La dix-septième supplication: quand il mentionne Satan et cherche refuge contre lui, contre son inimité et ses tromperies'},
        {t:'tri', ar:'اللَّهُمَّ إِنَّا تَعُوذُ بِكَ مِنْ نَزَغَاتِ الشَّيْطَانِ الرَّجِيمِ', tr:'allâhumma innâ na’ûdhu bika min nazaghâti achchaytâni arrajimi', fr:'Ô Dieu! Nous cherchons refuge en Toi des instigations du damné Satan,'},
        {t:'tri', ar:'وَكَيْدِهِ وَمَكَائِدِهِ', tr:'wa kaydihî wa makâ’idihi', fr:'de ses tromperies et de ses piéges,'},
        {t:'tri', ar:'وَمِنَ الثقَةِ بِأَمَانِيِّهِ وَمَوَاعِيدِهِ', tr:'wa mina aththiqati bi-amâniyyihi wa mawâ îdihi', fr:'de la confiance en ses faux espoirs, ses promesses,'},
        {t:'tri', ar:'وَغُرُورِهِ وَمَصَائِدِهِ', tr:'wa ghurûrihî wa maşâ’idihi', fr:'ses illusions trompeuses, ses piéges,'},
        {t:'tri', ar:'وَأَنْ يُطْمِعَ نَفْسَهُ فِي إِضْلَالِنَا عَنْ طَاعَتِكَ', tr:'wa an yutmi a nafsahû fi idlâlinâ ‘an tâ’ atika', fr:'de peur qu’il se mette à désirer ardemment de nous méconduire loin de Ton Obéissance,'},
        {t:'tri', ar:'وَامْتِهَانِنَا بِمَعْصِيَتِكَ', tr:'wamtihânina bima’şiyatika', fr:'et nous dégrader par la désobéissance envers Toi,'},
        {t:'tri', ar:'أَوْ أَنْ يَحْسُنَ عِنْدَنَا مَا حَسَّنَ لَنَا', tr:'aw an yahsuna ‘indanâ mâ hassana lanâ', fr:'de peur que nous attribuions de beau, ce qu’il nous a montrés comme beau,'},
        {t:'tri', ar:'أَوْ أَنْ يَثْقُلَ عَلَيْنَا مَا كَرَّهَ إِلَيْنَا', tr:'aw an yathqula ‘alaynâ mâ karraha ilayna', fr:'et ce qu’il nous a montrés comme détestable, comme quelque chose qui nous pèse sur le dos.'},
        {t:'tri', ar:'اللّهُمَّ اخْسَأُهُ عَنَّا بِعِبَادَتِكَ', tr:'allâhumma ikhsa’hu ‘annâ bi ibâdatika', fr:'Ô Dieu! à l’aide de notre adoration pour Toi,'},
        {t:'tri', ar:'وَاكْبِتْهُ بِدُءُوبِنَا فِي مَحَبَّتِكَ', tr:'wakbit-hû bidu’ûbinâ fi mahabbatika', fr:'éloigne-le de nous, à l’aide de notre persévérance en Ton Amour,'},
        {t:'tri', ar:'وَاجْعَلْ بَيْنَنَا وَبَيْنَهُ سِتْراً لَا يَهْتِكُهُ', tr:'waj’al baynanâ wa baynahû sitran lâ yahtikuhu', fr:'Rejette-le dans la poussière, et place un voile entre lui et nous, de sorte qu’il ne puisse l’enlever,'},
        {t:'tri', ar:'وَرَدْمًا مُصْمِتاً لَا يَفْتُقُهُ', tr:'wa radman muşmitan lâ yaftuquhu', fr:'et une solide barrière, pour qu’il ne puisse la déchirer'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَاشْغَلْهُ عَنَّا بِبَعْضِ أَعْدَائِكَ', tr:'wa achghalhû ‘annâ biba di a’dâ’ika', fr:'détourne l’attention de Satan de nous, avec quelques-uns de Tes ennemis,'},
        {t:'tri', ar:'وَاعْصِمْنَا مِنْهُ بِحُسْنِ رِعَايَتِكَ', tr:'wa ișimnâ minhû bihusni ri’âyatika', fr:'Préserve-nous de lui, de par Ta bonne Protection'},
        {t:'tri', ar:'وَاكْفِنَا خَتْرَهُ', tr:'wakfinâ khatrahu', fr:'Épargne-nous de ses tricheries,'},
        {t:'tri', ar:'وَوَلَّنَا ظَهْرَهُ', tr:'wa wallinâ zahrahu', fr:'Fais-lui tourner son dos de nous,'},
        {t:'tri', ar:'وَاقْطَعْ عَنَّا إِثْرَهُ', tr:'waqta’ ‘annâ ithrahu', fr:'et qu’aucune trace de ses pas ne reste pour nous!'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَأَمْتِعْنَا مِنَ الْهُدَى بِمِثْلِ ضَلاَلَتِهِ', tr:'wa amti nâ mina alhudâ bimithli dalâlatihi', fr:'Fais-nous savourer et aimer la bonne direction, autant que la mauvaise conduite de Satan nous paraît bien.'},
        {t:'tri', ar:'وَزوِّدْنَا مِنَ التَّقْوَى ضِدَّ غَوَايَتِهِ', tr:'wa zawwidnâ mina attaqwa didda ghiwâyatihi', fr:'Augmente notre piété contre la séduction,'},
        {t:'tri', ar:'وَاسْلُكْ بِنَا مِنَ التُّقَى خِلاَفَ سَبِيلِهِ مِنَ الرَّدَى', tr:'wasluk binâ mina attuqâ khilâfa sabîlihi mina arradâ', fr:'et fais-nous marcher avec une peur révérencielle en dehors du chemin de la ruine qu’il voudrait nous y conduire'},
        {t:'tri', ar:'اَللَّهُمَّ لاَ تَجْعَلْ لَهُ فِي قُلُوبِنَا مَدْخَلاً', tr:'allâhumma la taj al lahû fi qulûbinâ madkhalan', fr:'Ô Dieu! Ne lui procure aucune place d’entrée dans notre coeur,'},
        {t:'tri', ar:'وَلَاَ تُوطِنَنَّ لَهُ فِيمَا لَدَيْنَا مَنْزِلاً', tr:'wa lâ tûținanna lahû fîmâ ladaynâ manzilan', fr:'et ne le laisse point construire sa maison dans celle qui nous appartient'},
        {t:'tri', ar:'اَللَّهُمَّ وَمَا سَوَّلَ لَنَا مِنْ بَاطِلٍ فَعَرِّفْنَاهُ', tr:'allâhumma wa mâ sawwala lanâ min bâțilin fa ‘arrifnâhu', fr:'Ô Dieu! Fais-nous reconnaître la fausseté avec laquelle Il nous tente,'},
        {t:'tri', ar:'وَإِذَا عَرَّفْتَنَاهُ فَقِنَاهُ', tr:'wa idhâ ‘arraftanâhu faqinâhu', fr:'et quand Tu nous as faits reconnaître cela,'},
        {t:'tri', ar:'وَبَصِّّرْنَا مَا نُكَایِدُهُ بِهِ', tr:'wa başşirnâ mâ nukâyiduhû bihi', fr:'Protège-nous de cela; fais-nous voir ce qui pourrait nous permettre de le devancer et de le combattre,'},
        {t:'tri', ar:'وَأَلْهِمْنَا مَا نُعِدُّهُ لَهُ', tr:'wa alhimnâ mâ nu idduhû lahu', fr:'Inspire-nous avec toutes les choses utiles pour que nous soyons prêts au moment voulu,'},
        {t:'tri', ar:'وَأَيْقِظْنَا عَنْ سِنَةِ الْغَفْلَةِ بِالرُّكُونِ إِلَيْهِ', tr:'wa ayaiznâ ‘an sinati alghaflati birruküni ilayhi', fr:'réveille-nous de la stupeur (songe) qui nous le rend digne de confiance à nos yeux,'},
        {t:'tri', ar:'وَأَحْسِنْ بِتَوْفِيقِكَ عَوْنَنَا عَلَيْهِ', tr:'wa ahsin bitawfiqika ‘awnanâ ‘alayhi', fr:'et viens à notre secours avec Ton Aide victorieuse contre lui!'},
        {t:'tri', ar:'اَللَّهُمَّ وَأَشْرِب قُلُوبَنَا إِنْكَارَ عَمَلِهِ', tr:'allâhumma wa achrib qulübana inkâra ‘amalihi', fr:'Ô Dieu! Sature nos coeurs avec le rejet de ses travaux,'},
        {t:'tri', ar:'وَالْطُفْ لَنَا فِي نَقْضِ حِيَلِهِ', tr:'walțuf lanâ fi naqdi hiyalihi', fr:'et sois bon envers nous, en détruisant ses stratagèmes'},
        {t:'tri', ar:'اَللَّهُمَّ صَلٌّ مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَحَوِّلْ سُلْطَانَهُ عَنَّا', tr:'wa hawwil sultânahû ‘annâ', fr:'Détourne son autorité loin de nous,'},
        {t:'tri', ar:'وَاقْطَعْ رَجَاءَهُ مِنَّا', tr:'waqța’ rajâ’ahû minnâ', fr:'Coupe-lui tout espoir de nous atteindre,'},
        {t:'tri', ar:'وَادْرَأْهُ عَنِ الْوَلُوعِ بِنَا', tr:'wadra’hû ‘an alwlû i binâ', fr:'et Garde-le de nous désirer ardemment'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَاجْعَلْ آبَاءَنَا وَأُمَّهَاتِنَا وَأَوْلَادَنَا', tr:'waj’al âbâ’anâ wa ummahâtinâ wa awlâdanâ', fr:'Place nos pères, nos mères, nos enfants,'},
        {t:'tri', ar:'وَأَهَالِينَا وَذَوِي أَرْحَامِنَا وَقَرَابَاتِنَا', tr:'wa ahâlînâ wa dhawi arhâminâ wa qarâbâtinâ', fr:'nos femmes (époux), nos relatifs, nos parents,'},
        {t:'tri', ar:'وَجِيرَانَنَا مِنَ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ', tr:'wa jirânana min almu’minina walmu’minâti', fr:'et les fidèles parmi nos voisins, et nos amis, mâle et femelle,'},
        {t:'tri', ar:'مِنْهُ فِي حِرْزٍ حَارِزٍ', tr:'minhû fi hirzin hârizin', fr:'en sûreté dans une sanctuaire imprenable,'},
        {t:'tri', ar:'وَحِصْنٍ حَافِظٍ', tr:'wa hişnin hafizin', fr:'dans une forteresse surveillée,'},
        {t:'tri', ar:'وَكَهْفِ مَانِعِ', tr:'wa kahfin mâni in', fr:'dans une caverne défendue'},
        {t:'tri', ar:'وَأَلْبِسْهُمْ مِنْهُ جُنَناً وَاقِيَةً', tr:'wa albis-hum minhû junanan wâqiyatan', fr:'Enveloppe-les dans des boucliers protecteurs contre lui,'},
        {t:'tri', ar:'وَأَعْطِهِمْ عَلَيْهِ أَسْلِحَةً مَاضِيَة', tr:'wa a’tihim ‘alayhi aslihatan mâdiyatan', fr:'et donne-leur des armes qui le découperont'},
        {t:'tri', ar:'اللَّهُمَّ وَاعْمُمْ بِذَلِكَ مَنْ شَهِدَ لَكَ بِالرُّبوبِيَّةِ', tr:'allâhumma wa a’mum bidhâlika man chahida laka birrubübiyyati', fr:'Ô Dieu! Inclus dans cette prière, toute personne qui a témoigné que Tu es en vérité Dieu tout Puissant,'},
        {t:'tri', ar:'وَأَخْلَصَ لَكَ بِالْوَحْدَانِيَّةِ', tr:'wa akhlaşa laka bilwahdâniyyati', fr:'et s’est dévoué sincèrement à Ton Unité,'},
        {t:'tri', ar:'وَعَادَاهُ لَكَ بِحَقِيقَةِ الْعُبُودِيَّةِ', tr:'wa ‘âdâhû laka bihaqiqati al’ubûdiyyati', fr:'et qui a montré son animosité envers lui, par sa servitude envers Toi,'},
        {t:'tri', ar:'وَاسْتَظْهَرَ بِكَ عَلَيْهِ فِي', tr:'wastazhara bika ‘alayhi fi ma rifati', fr:'et demande Ton Aide contre les machinations de'},
        {t:'tri', ar:'مَعْرِفَةِ الْعُلُومِ الرَّبَّانِيَّةِ', tr:'al’ulûmi arrabbâniyyati', fr:'Satan, par la connaissance des Sciences Divines!'},
        {t:'tri', ar:'اللَّهُمَّ احْلُلْ مَا عَقَدَ', tr:'allâhumma uhlul mâ ‘ aqada', fr:'Ô Dieu! Dénoue tout ce qu’il a noué,'},
        {t:'tri', ar:'وَافْتُقْ مَا رَتَقَ', tr:'waftuq mâ rataqa', fr:'défais tout ce qu’il a cousu,'},
        {t:'tri', ar:'وَافْسَخْ مَا دَبَّرَ', tr:'wafsakh mâ dabbara', fr:'démets tout ce qu’il a conçu,'},
        {t:'tri', ar:'وَثَبِّطْهُ إِذَا عَزَمَ', tr:'wa thabbithu idhâ ‘azama', fr:'Décourage-le à chaque fois qu’il forge une idée,'},
        {t:'tri', ar:'وَانْقُضْ مَا أَبْرَمَ', tr:'wanqud mâ abrama', fr:'et détruis tout ce qu’il a établi!'},
        {t:'tri', ar:'اللَّهُمَّ وَاهْزِمْ جُنْدَهُ', tr:'allâhumma wahzim jundahu', fr:'Ô Dieu! Abats ses troupes,'},
        {t:'tri', ar:'وَأَبْطِلْ كَيْدَهُ', tr:'wa abțil kaydahu', fr:'rends nul toutes ses tromperies,'},
        {t:'tri', ar:'وَاهْدِمْ كَهْفَهُ', tr:'wahdim kahfahu', fr:'anéantis son refuge,'},
        {t:'tri', ar:'وَأَرْغِمْ أَئْفَهُ', tr:'wa arghim anfahu', fr:'et frotte son nez contre la poussière,'},
        {t:'tri', ar:'اللَّهُمَّ اجْعَلْنَا فِي نَظْمِ أَعْدَائِهِ', tr:'i nazmi a dâ’ih', fr:'Ô Dieu! Range-nous dans les rangs de ses ennemis,'},
        {t:'tri', ar:'وَاعْزِلْنَا عَنْ عِدَادِ أَوْلِيَائِهِ', tr:'wa zilna an ‘idâdi awliyâ’ihi', fr:'et enlève-nous des nombres de ses amis,'},
        {t:'tri', ar:'لاَ تُطِيعُ لَهُ إِذَا اسْتَهْوَانَا', tr:'lâ nuti’u lahû idhâ istahwânâ', fr:'pour que nous ne soyons point obligés de lui obéir quand il essaie de nous séduire,'},
        {t:'tri', ar:'وَلَاَ نَسْتَجيبُ لَهُ إِذَا دَعَانَا', tr:'wa lâ nastajibu lahû idhâ da’ânâ', fr:'et lui répondre quand il nous appelle à lui'},
        {t:'tri', ar:'نَأْمُرُ بِمُنَاوَاتِهِ مَنْ أَطَاعَ أَمْرَنَا', tr:'na’muru bimunâwâtihi man ațâ a amranâ', fr:'Nous commandons à toutes les personnes qui obéissent à nos commandes,'},
        {t:'tri', ar:'وَنَعِظُ عَنْ مُتَابَعَتِهِ مَنِ اتَّبَعَ زَجْرَنَا', tr:'wa na’izu ‘an mutâba » » atihi man ittaba’a zajranâ', fr:'d’être son ennemi juré, et nous admonestons toutes les personnes qui suivent notre interdiction de ne pas le suivre!'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ خَاتَمِ النَّبِيِّينَ', tr:'allâhumma șalli ‘alâ muhammadin khâtami annabiyyina', fr:'Ô Dieu! Bénis Mohammad – le Sceau des Prophètes'},
        {t:'tri', ar:'وَسَيِّدِ الْمُرْسَلِينَ', tr:'wa sayyidi almursalina', fr:'et Seigneur des émissaires –'},
        {t:'tri', ar:'وَعَلَى أَهْلِ بَيْتِهِ الطَّيِّبِينَ الطَّاهِرِينَ', tr:'wa ‘alâ ahli baytihi attayyibîna attâhirîna', fr:'et tous les membres de sa Famille, qui sont purs et bons!'},
        {t:'tri', ar:'وَأَعِذْنَا وَأَهَالِينَا وَإِخْوَانَنَا', tr:'wa a’idhnâ wa ahâlînâ wa ikhwânanâ', fr:'Abrite et procure un refuge pour nous, nos Familles, nos frères,'},
        {t:'tri', ar:'وَجَمِيعَ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ مِمَّا اسْتَعَذْنَا مِنْهُ', tr:'wa jamî’a almu’minîna walmu’minâti mimmâ ista’adhnâ minhu', fr:'et tous les fidèles mâle et femelle, contre ce que nous cherchons de refuge,'},
        {t:'tri', ar:'وَأَجِرْنَا مِمَّا اسْتَجَرْنَا بِكَ مِنْ خَوْفِهِ', tr:'wa ajirnâ mimmâ istajarnâ bika min khawfihi', fr:'et accorde-nous (un refuge) une sanctuaire en Toi'},
        {t:'tri', ar:'وَاسْمَعْ لَنَا مَا دَعَوْنَا بِهِ', tr:'wasma » » lanâ mâ da’awnâ bihi', fr:'Entends la supplication que nous Te faisons,'},
        {t:'tri', ar:'وأَعْطِنَا مَا أَغْفَلْنَاهُ', tr:'wa a’tinâ mâ aghfalnâhu', fr:'Accorde-nous tout ce qui jusqu’ici, nous avait été indifférents,'},
        {t:'tri', ar:'وَاحْفَظْ لَنَا مَا نَسِينَاهُ', tr:'wahfaz lanâ mâ nasînâhu', fr:'et sauvegarde pour nous, ce que nous avions oublié par tout cela,'},
        {t:'tri', ar:'وَصَيِّرْنَا بِذَلِكَ فِي دَرَجَاتِ الصَّالِحِينَ', tr:'wa sayyirna bidhâlika fi darajâti aşşâlihîna', fr:'Amène-nous dans les rangs des vertueux,'},
        {t:'tri', ar:'وَمَرَاتِبِ الْمُؤْمِنِينَ', tr:'wa marâtibi almu’minîna', fr:'et dans les degrés des fidèles!'},
        {t:'tri', ar:'آمِينَ رَبَّ الْعَالَمِينَ.', tr:'âmîna rabba al’âlamina', fr:'Amen, Seigneur des mondes!'},
        {t:'salawat'},
      ]
    },


    's18': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '18. Contre le danger',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation contre le mal et pour le bien-être',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السّلامُ إِذا دُفِع عنْهُ ما يحذرُ أوْ عُجِّل لهُ مطْلبُهُ', fr:'La dix-huitième supplication: quand les périls étaient passés, ou bien les requêtes étaient rapidement exaucées'},
        {t:'tri', ar:'اللَّهُمَّ لَكَ الْحَمْدُ عَلَى حُسْنِ قَضَائِكَ', tr:'allâhumma laka alhamdu ‘alâ husni qadâ’ika', fr:'Ô Dieu! à Toi appartient toute louange pour Ton excellent Accomplissement,'},
        {t:'tri', ar:'وَبِمَا صَرَفْتَ عَنِّي مِنْ بَلاَئِكَ', tr:'wa bimâ șarafta ‘annî min balâ’ika', fr:'et pour le malheur (calamité) que Tu as détourné de ma personne'},
        {t:'tri', ar:'فَلَا تَجْعَلْ حَظِّي مِنْ رَحْمَتِكَ', tr:'falâ taj’al hazzi min rahmatika', fr:'Mais ne fais pas en sorte que ma part de Ta Grâce,'},
        {t:'tri', ar:'مَا عَجَّلْتَ لِي مِنْ عَافِيَتِكَ', tr:'mâ ‘ajjalta lî min ‘ âfiyatika', fr:'soit ce bien-être que Tu m’as si rapidement'},
        {t:'tri', ar:'فَأَكُونَ قَدْ شَقِيتُ بِمَا أَحْبَبْتُ', tr:'fa akûna qad chaqîtu bimâ ahbabtu', fr:'accordè de peur de devenir malheureux de ce que j’aime dans ce monde,'},
        {t:'tri', ar:'وَسَعِدَ غَيْرِي بِمَا كَرِهْتُ', tr:'wa sa ‘ida ghayri bimâ karihtu', fr:'et qu’une autre personne s’accapare de la félicité par ce que je n’aime pas!'},
        {t:'tri', ar:'وَإِنْ يَكُنْ مَا ظَلِلْتُ فِيهِ', tr:'wa in yakun mâ zaliltu fîhî', fr:'Si ce bien-être dans lequel'},
        {t:'tri', ar:'أَوْ بِتُّ فِيهِ مِنْ هَذِهِ الْعَافِيَةِ', tr:'aw bittu fihi min hâdhihi al’âfiyati', fr:'j’y passe le jour ou la nuit,'},
        {t:'tri', ar:'بَيْنَ يَدَيْ بَلاَءِ لا يَنْقَطِعُ', tr:'bayna yaday balâ’in lâ yanqați’ u', fr:'devrait précéder un quelconque malheur qui ne cessera jamais,'},
        {t:'tri', ar:'وَوِزْرٍ لاَ يَرْتَفِعُ', tr:'wa wizrin lâ yartafi’u', fr:'et un lourd fardeau qui ne passera jamais,'},
        {t:'tri', ar:'فَقَدِّمْ لِي مَا أَخَرْتَ', tr:'faqaddim lî mâ akhkharta', fr:'en ce cas, devance ce que Tu avais retardé pour moi,'},
        {t:'tri', ar:'وَأَخِّرْ عَنِّي مَا قَدَّمْتَ', tr:'wa akhkhir ‘anni mâ qaddamta', fr:'et retarde ce que Tu avais devancé!'},
        {t:'tri', ar:'فَغَيْرُ كَثِيرٍ مَا عَاقِبَتُهُ الْفَنَاءُ', tr:'faghayru kathîrin mâ ‘âqibatuhu alfanâ’u', fr:'Car ce qui se termine dans l’annihilation n’est pas grand,'},
        {t:'tri', ar:'وَغَيْرُ قَلِيلٍ مَا عَاقِبَتُهُ الْبَقَاءُ', tr:'wa ghayru qalîlin mâ ‘âqibatuhu albaqâ’u', fr:'et ce qui se termine dans la subsidence, n’est pas insignifiant.'},
        {t:'tri', ar:'وَصَلّ عَلَى مُحَمَّدٍ وَآلِهِ.', tr:'wa șalli ‘alâ muhammadin wa âlihi', fr:'Bénis Mohammad et toute sa Famille!'},
        {t:'salawat'},
      ]
    },


    's19': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '19. Demande de pluie',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation pour la pluie pendant la sécheresse',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ عِنْد الإسْتِسْقاءِ بعْد الْجدْبِ', fr:'La dix-neuvième supplication: demande d’eau pendant la sécheresse'},
        {t:'tri', ar:'اللَّهُمَّ إسْقِنَا الْغَيْثَ', tr:'allâhumma isqina alghaytha', fr:'Ô Dieu! Irrigue-nous à satiété,'},
        {t:'tri', ar:'وَانْشُرْ عَلَيْنَا رَحْمَتَكَ', tr:'wanchur ‘alayna rahmataka', fr:'avec l’eau de la pluie, déploie Ta Grâce sur nous,'},
        {t:'tri', ar:'بِغَيْثِكَ الْمُغْدِقِ مِنَ السَّحَابِ الْمُنْسَاقِ', tr:'bighaythika almughdiqi mina assahâbi almunsâqi', fr:'par Ta pluie abondante que Tu fais verser des nuages passants (ambulants),'},
        {t:'tri', ar:'لِنَبَاتِ أَرْضِكَ الْمُوفِقِ فِي جَمِيعِ الآفَاقِ', tr:'linabâti ardika almûfiqi fi jamî i al-âfâqi', fr:'de sorte que Ta bonne terre, puisse croître dans tous les horizons!'},
        {t:'tri', ar:'وَامْنُنْ عَلَى عِبَادِكَ بِإينَاعِ الثَّمَرَةِ', tr:'wamnun ‘alâ ‘ibâdika bi-înâ i aththamarati', fr:'Montre de la bonté envers Tes serviteurs, par les fruits mûrs,'},
        {t:'tri', ar:'وَأَخْي بِلاَدَكَ بِبُلُوغِ الزَّهْرَةِ', tr:'wa ahyi bilâdaka bibulüghi azzahrati', fr:'et ranime Ton pays par l’épanouissement des fleurs,'},
        {t:'tri', ar:'وَأَشْهِدْ مَلاَئِكَتَكَ الْكِرَامَ السَّفَرَةَ', tr:'wa ach-hid malâ’ikataka alkirâma assafarata', fr:'et laisse Tes Anges – ces nobles Scribes –'},
        {t:'tri', ar:'بِسَقِّيٍ مِنْكَ نَافِعٍ', tr:'bisaqyin minka nâfi in', fr:'d’être les témoins d’une pluie bénéficiaire de Ta Part,'},
        {t:'tri', ar:'دَائِمٍ غُزْرُهُ', tr:'dâ’imin ghuzruhu', fr:'qui sera durable dans sa profusion,'},
        {t:'tri', ar:'وَاسِعِ دِرَرُهُ', tr:'wâsi ‘ in diraruhu', fr:'abondante dans son flot,'},
        {t:'tri', ar:'وَابِلٍ سَرِيعٍ عَاجِلٍ', tr:'wâbilin sarî’in ‘ajilin', fr:'lourde, rapide, prompte,'},
        {t:'tri', ar:'تُحْيِي بِهِ مَا قَدْ مَاتَ وَتَرُدُّ بِهِ مَا قَدْ فَاتَ', tr:'tuhyî bihî mâ qad mâta wa taruddu bihî mâ qad fâta', fr:'par laquelle Tu ranimeras ce qui a disparu,'},
        {t:'tri', ar:'وَتُخْرِجُ بِهِ مَا هُوَ آتٍ', tr:'wa tukhriju bihî mâ huwa âtin', fr:'et feras pousser de la terre ce qui doit croître,'},
        {t:'tri', ar:'وَتُوَسِّعُ بِهِ فِي الأَقْوَاتِ', tr:'wa tuwassi’u bihî fil-aqwâti', fr:'et fourniras (pourvoiras) des aliments abondants,'},
        {t:'tri', ar:'سَحَاباً مُتَرَاكِماً', tr:'sahâban mutarâkiman', fr:'par l’aide des nuages pressés,'},
        {t:'tri', ar:'هَنِيئا مَرِيئا', tr:'hanî’an marí’an', fr:'complets, productifs,'},
        {t:'tri', ar:'طَبَقاً مُجَلْجَلاً', tr:'țabaqan mujaljalan', fr:'et dans des couches résonnantes,'},
        {t:'tri', ar:'غَيْرَ مُلِثٌ وَدْقُهُ', tr:'ghayra muliththin wadquhu', fr:'et dont la pluie sera comme une forte averse, sans qu’elle cesse,'},
        {t:'tri', ar:'وَلَاَ خُلَّبِ بَرْقُهُ', tr:'wa lâ khullabin barquhu', fr:'et dont les éclairs (des foudres) ne seront pas sans fruit'},
        {t:'tri', ar:'اللَّهُمَّ اسْقِنَا غَيْئاً مُغِيثا', tr:'allâhumma isqinâ ghaythan mughîthan', fr:'Ô Dieu! Donne-nous de l’eau à l’aide d’une pluie secourable, productive,'},
        {t:'tri', ar:'مَرِيعاً مُمْرِعاً', tr:'marî’an mumri an', fr:'fertilisante, largement répandue,'},
        {t:'tri', ar:'عَرِيضاً وَاسِعاً غَزِيراً', tr:'aridan wâsi an ghaziran', fr:'abondante, à profusion,'},
        {t:'tri', ar:'تَرُدُّ بِهِ النَّهِيضَ', tr:'taruddu bihi annahida', fr:'en vivifiant les plantes croissantes,'},
        {t:'tri', ar:'وَتَجْبُرُ بِهِ الْمَهِيضَ', tr:'wa tajburu bihi almahida', fr:'et en ranimant les plantes moites.'},
        {t:'tri', ar:'اللَّهُمَّ اسْقِنَا سَقْياً تُسِيلُ مِنْهُ الظِّرَابَ', tr:'allâhumma isqina saqyan tusîlu minhu azzirâbu', fr:'Ô Dieu! donne-nous de l’eau, à l’aide d’une pluie avec laquelle Tu feras verser (pleuvoir)'},
        {t:'tri', ar:'وَتَمْلأُ مِنْهُ الْجِبَابَ', tr:'wa tamla’u minhu aljibâba', fr:'de l’eau torrentielle des collines, remplir les puits,'},
        {t:'tri', ar:'وَتُفَجِّرُ بِهِ الأَنْهَارَ', tr:'wa tufajjiru bihi al- anhâra', fr:'inonder les rivières,'},
        {t:'tri', ar:'وَتُنْبِتُ بِهِ الأَشْجَارَ', tr:'wa tunbitu bihi al- achjâra', fr:'pousser les arbres,'},
        {t:'tri', ar:'وَتُرْخِصُ بِهِ الأَسْعَارَ', tr:'wa turkhișu bihi al- as’âra', fr:'et qui soit enveloppante et abondante,'},
        {t:'tri', ar:'فِي جَمِيعِ الْأَمْصَارِ', tr:'fi jamî’i al-amșâri', fr:'En tout regions'},
        {t:'tri', ar:'وَتُنْعِشُ بِهِ الْبَهَائِمَ وَالْخَلْقَ', tr:'wa tun ‘ichu bihi albahâ’ima walkhalqa', fr:'pour fortifier les bêtes et les créatures,'},
        {t:'tri', ar:'وَتُكْمِلُ لَنَا بِهِ طَيِّبَاتِ الرِّزْقِ', tr:'wa tukmilu lanâ bihî tayyibâti arrizqi', fr:'et nous rendre agréables toutes les provisions,'},
        {t:'tri', ar:'وَتُنْبِتُ لَنَا بِهِ الزَّرْعَ', tr:'wa tunbitu lana bihi azzar a', fr:'nous faire pousser nos plantes dans les champs,'},
        {t:'tri', ar:'وَتُدِرُّ بِهِ الضَّرْعَ', tr:'wa tudirru bihi addar’a', fr:'nous faire abonder le lait des vaches,'},
        {t:'tri', ar:'وَتَزِيدُنَا بِهِ قُوَّةً إِلَى قُوَّتِنَا', tr:'wa tazîdunâ bihî quwwatan ilâ quwwatinâ', fr:'et nous rajouter encore plus de force'},
        {t:'tri', ar:'اللَّهُمَّ لاَ تَجْعَلْ ظِلَّهُ عَلَيْنَا سَمُومًا', tr:'allâhumma lâ taj’al zillahû ‘alaynâ samûman', fr:'Ô Dieu! ne fais pas de l’ombre d’un nuage,'},
        {t:'tri', ar:'وَلَا تَجْعَل بَرْدَهُ عَلَيْنَا حُسُوماً', tr:'wa lâ taj al bardahû ‘alaynâ husûman', fr:'un vent lourd et brûlant,'},
        {t:'tri', ar:'وَلَا تَجْعَلْ صَوْبَهُ عَلَيْنَا رُجُوماً', tr:'wa lâ taj’al şawbahû ‘alaynâ rujûman', fr:'ne fais pas en sorte que sa froideur nous soit tranchante,'},
        {t:'tri', ar:'وَلَا تَجْعَلْ مَاءَهُ عَلَيْنَا أُجَاجاً', tr:'wa lâ taj al mâ’ahû ‘alaynâ ujâjan', fr:'ne laisse pas son averse devenir une eau amère pour nous'},
        {t:'tri', ar:'اللَّهُمَّ صَلّ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ', tr:'allâhumma șalli ‘alâ muhammadin wâli muhammadin', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَارْزُقْنَا مِنْ بَرَكَاتِ السَّمَاوَاتِ وَالأَرْضِ', tr:'warzuqnâ min barakâti assamâwâti wal-ardi', fr:'et accorde-nous les bénédictions des Cieux et de la terre'},
        {t:'tri', ar:'إِنَّكَ عَلَى كُلِّ شَيءٍ قَدِيرٌ.', tr:'innaka ‘alâ kulli chay’in qadirun', fr:'Car en vérité, Tu es Le plus Puissant!'},
        {t:'salawat'},
      ]
    },


    's8': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '8. Invocation pour Son Abri sûr',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation pour chercher refuge auprès de Dieu',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الأسْتِعاذةِ مِن الْمَكارِهِ وسيِّئ الأخْلاقِ ومذامِّ الأفعالِ', fr:'La huitième supplication : en demandant refuge contre des choses détestables, des défauts moraux, et des actions reprochables'},
        {t:'tri', ar:'اللَّهُمَّ إِنِّي أَعُوذُ بِكَ', tr:'allâhumma innî a’ûdhu bika', fr:'Ô Dieu! je cherche refuge en Toi'},
        {t:'tri', ar:'مِنْ هَيَجَانِ الْحِرْصِ', tr:'min hayajâni alhirşi', fr:'de l’agitation du désir intense de l’avarice,'},
        {t:'tri', ar:'وَسَوْرَةِ الْغَضَبِ', tr:'wa sawrati alghadabi', fr:'de la violence du courroux,'},
        {t:'tri', ar:'وَغَلَبَةِ الْحَسَدِ', tr:'wa ghalabati alhasadi', fr:'de la domination de la jalousie,'},
        {t:'tri', ar:'وَضَعْفِ الصَّّبْرِ', tr:'wa da fi aşşabri', fr:'de la fragilité de la patience,'},
        {t:'tri', ar:'وَقِلَةِ الْقَنَاعَةِ', tr:'wa gillati alqanâ ati', fr:'du manque de sobriété,'},
        {t:'tri', ar:'وَشَكَاسَةِ الْخُلُقِ', tr:'wa chakâsati alkhuluqi', fr:'du caractère maussade'},
        {t:'tri', ar:'وَإِلْحَاحِ الشَّهْوَةِ', tr:'wa ilhâhl achchahwati', fr:'de l’urgence de la passion,'},
        {t:'tri', ar:'وَمَلَكَةِ الْحَمِيَّةِ', tr:'wa malakati alhamiyyati', fr:'de la disposition envers la véhémence,'},
        {t:'tri', ar:'وَمُتَابَعَةِ الْهَوَى', tr:'wa mutâba ‘ati alhawâ', fr:'de l’action de suivre le caprice.'},
        {t:'tri', ar:'وَمُخَالَفَةِ الْهُدَى', tr:'wa mukhâlafati alhudâ', fr:'de l’opposition contre la juste direction (la bonne voie),'},
        {t:'tri', ar:'وَسِنَةِ الْغَفْلَةِ', tr:'wa sinati alghaflati', fr:'du sommeil de la négligence,'},
        {t:'tri', ar:'وَتَعَاطِي الْكُلْفَةِ', tr:'wa ta âți alkulfati', fr:'de l’exagération du labeur,'},
        {t:'tri', ar:'وَإِيثَارِ الْبَاطِلِ عَلَى الْحَقِّ', tr:'wa îthâri albâțili ‘alâ alhaqqi', fr:'de la préférence de la fausseté envers la vérité,'},
        {t:'tri', ar:'وَالإِصْرَارِ عَلَى الْمَأْثَمِ', tr:'wal-işrâri ‘alâ alma’thami', fr:'de la persistance dans le pèchè,'},
        {t:'tri', ar:'وَاسْتِصْغَارِ الْمَعْصِيَةِ', tr:'wa istişghâri alma’şiyati', fr:'de la minimisation de la désobéissance,'},
        {t:'tri', ar:'وَاسْتِكْبَارِ الطَّاعَةِ', tr:'wastikbâri ațțâ’ ati', fr:'de l’agrandissement exagéré de l’obéissance,'},
        {t:'tri', ar:'وَمُبَاهَاةِ الْمُكْثِرِينَ', tr:'wa mubâhâti almukthirina', fr:'de la rivalité avec les riches,'},
        {t:'tri', ar:'وَالإِزْرَاءِ بِالْمُقِلِّينَ', tr:'wal-izrâ’i bilmuqillina', fr:'du mépris pour les pauvres,'},
        {t:'tri', ar:'وَسُوء الْوَلايَةِ لِمَنْ تَحْتَ أَيْدِينَا', tr:'wa sû’i alwilâyati liman tahta aydîna', fr:'de la négligence envers les subalternes,'},
        {t:'tri', ar:'وَتَرْكِ الشُكْرِ لِمَنِ اصْطَنَعَ الْعَارِفَةَ عِنْدَنَا', tr:'wa tarki achchukri liman iștana’a al’ârifata ‘indanâ', fr:'du manque de gratitude envers ceux qui nous ont faits'},
        {t:'tri', ar:'أَوْ أَنْ نَعْضُدَ ظَالِما', tr:'aw an na duda zâliman', fr:'du bien, du fait d’aider un malfaiteur,'},
        {t:'tri', ar:'أَوْ نَخْذُلَ مَلْهُوفا', tr:'aw nakhdhula malhûfan', fr:'d’abandonner quelqu’un qui demande du secours,'},
        {t:'tri', ar:'أَوْ تَرُومَ مَا لَيْسَ لَنَا بِحَقِّ', tr:'aw narûma mâ laysa lanâ bihaqqin', fr:'de vouloir ce qui n’est point par droit notre dû,'},
        {t:'tri', ar:'أَوْ تَقُولَ فِي الْعِلْمِ بِغَيْرِ عِلْمِ', tr:'aw naqûla fi al’ilmi bighayri ‘ilmin', fr:'et de parler d’un savoir (connaissance), sans savoir.'},
        {t:'tri', ar:'وَنَعوذُ بِكَ أَنْ تَنْطَوِيَ عَلَى غِشِّ أَحَدٍ', tr:'wa na’ûdhu bika an nanțawiya ‘alâ ghichchi ahadin', fr:'Nous cherchons refuge en Toi, pour ne pas nourrir la trahison contre quelqu’un,'},
        {t:'tri', ar:'وَأَنْ نُعْجِبَ بِأَعْمَالِنَا', tr:'wa an nu jiba bi-a’mâlinâ', fr:'pour ne pas être satisfait de nos actions,'},
        {t:'tri', ar:'وَنَمُدَّ فِي آمَالِنَا', tr:'wa namudda fi âmâlina', fr:'et d’allonger nos espérances.'},
        {t:'tri', ar:'وَنَعُوذُ بِكَ مِنْ سُوءِ السَّرِيرَةِ', tr:'wa na’ûdhu bika min súi assarirati', fr:'Nous cherchons refuge en Toi de toute malice et malveillance,'},
        {t:'tri', ar:'وَاحْتِقَارِ الصَّغِيرَةِ', tr:'wa ihtiqâri assaghirati', fr:'de négliger et rapetisser les péchés,'},
