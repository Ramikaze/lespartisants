        {t:'tri',ar:'إِلَهِي وَمَوْلَايَ أَجْرَيْتَ عَلَيَّ حُكْماً اتَّبَعْتُ فِيهِ هَوَى نَفْسِي وَلَمْ أَحْتَرِسْ فِيهِ مِنْ تَزْيِينِ عَدُوِّي،',tr:'Ilâhî wa mawlâya, ajrayta \'alayya hukmann attaba\'tu fîhi hawâ nafsî wa lam ahtaris fîhi min tazyîni \'aduwwiyî,',fr:'Mon Dieu et mon Maître, Tu m\'as instauré un règlement et au lieu de T\'obéir je n\'ai suivi que les passions de mon âme, je n\'ai pas pris garde aux embellissements de mon ennemi,'},
        {t:'tri',ar:'فَغَرَّنِي بِمَا أَهْوَى وَأَسْعَدَهُ عَلَى ذَلِكَ الْقَضَاءُ',tr:'fa-gharranî bimâ ahwâ wa as\'adahu \'alâ dhâlika al-qadâ\'u.',fr:'alors il m\'a trompé par ce que j\'ai désiré, le Décret arrêté l\'aidant en cela.'},
        {t:'tri',ar:'فَتَجَاوَزْتُ بِمَا جَرَى عَلَيَّ مِنْ ذَلِكَ بَعْضَ حُدُودِكَ، وَخَالَفْتُ بَعْضَ أَوَامِرِكَ،',tr:'Fa-tajâwaztu bimâ jarâ \'alayya min dhâlika ba\'da hudûdika, wa khâlaftu ba\'da awâmirika.',fr:'Alors j\'ai transgressé certaines de Tes Lois de ce que Tu m\'as instauré à ce propos, et j\'ai désobéi à certains de Tes Ordres.'},
        {t:'tri',ar:'فَلَكَ الْحُجَّةُ عَلَيَّ فِي جَمِيعِ ذَلِكَ، وَلَا حُجَّةَ لِي فِيمَا جَرَى عَلَيَّ فِيهِ قَضَاؤُكَ، وَأَلْزَمَنِي حُكْمُكَ وَبَلَاؤُكَ،',tr:'Falaka-l-hujjatu \'alayya fî jamî\'i dhâlika, wa lâ hujjata lî fîmâ jarâ \'alayya fîhi qadâ\'uka, wa alzamanî hukmuka wa balâ\'uka.',fr:'Alors Tu as l\'argument à mon encontre pour l\'ensemble de cela, et moi je n\'en ai aucun pour ma défense à propos de Ton Décret en cours, ainsi que Ton Jugement et Ton Épreuve que Tu m\'as imposés.'},
        {t:'tri',ar:'وَقَدْ أَتَيْتُكَ يَا إِلَهِي بَعْدَ تَقْصِيرِي وَإِسْرَافِي عَلَى نَفْسِي',tr:'Wa qad ataytuka yâ ilâhî ba\'da taqsîrî wa isrâfî \'alâ nafsî,',fr:'Je suis déjà venu à Toi, ô mon Dieu, après ma défaillance et mes excès,'},
        {t:'tri',ar:'مُعْتَذِراً نَادِماً مُنْكَسِراً مُسْتَقِيلاً مُسْتَغْفِراً مُنِيباً مُقِرّاً مُذْعِناً مُعْتَرِفاً،',tr:'mu\'tadhirann, nâdimann, mun-kasirann, mustaqîlann, mustagh-firann, munîbann, muqirrann, mudh\'inann, mu\'tarifann.',fr:'Te présentant les excuses, regrettant, abattu, demandant l\'absolution, implorant le pardon, me repentant, reconnaissant mes péchés, docile, me confessant à Toi.'},
        {t:'tri',ar:'لَا أَجِدُ مَفَرّاً مِمَّا كَانَ مِنِّي وَلَا مَفْزَعاً أَتَوَجَّهُ إِلَيْهِ فِي أَمْرِي، غَيْرَ قَبُولِكَ عُذْرِي وَإِدْخَالِكَ إِيَّايَ فِي سَعَةِ مِنْ رَحْمَتِكَ،',tr:'Lâ ajidu mafarrann mimmâ kâna minnî wa lâ mafza\'ann atawajjahu ilayhi fî amrî, ghayra qabûlika \'udhrî wa idkhâlika iyyâya fî sa\'atinn rahmatika.',fr:'Je ne trouve aucun lieu où fuir de ce que j\'ai fait, ni d\'abri vers où me diriger, en dehors de Ton acceptation de mes excuses et mon admission dans l\'étendue de Ta Miséricorde.'},
        {t:'tri',ar:'اللَّهُمَّ فَاقْبَلْ عُذْرِي وَارْحَمْ شِدَّةَ ضُرِّي، وَفُكَّنِي مِنْ شَدِّ وَثَاقِي،',tr:'Allâhumma, fa-qbal \'udhrî wa-rham shiddata durrî, wa fukkanî min shaddi wathâqî.',fr:'Alors, mon Dieu, accepte mes excuses, aie pitié de la gravité de mon dommage, délivre-moi de la lourdeur de mes chaînes !'},
        {t:'tri',ar:'يَا رَبِّ ارْحَمْ ضَعْفَ بَدَنِي وَرِقَّةَ جِلْدِي وَدِقَّةَ عَظْمِي،',tr:'Yâ rabbi, arham da\'fa badanî wa riqqata jildî wa diqqata \'azhmî.',fr:'Ô Seigneur, aie pitié de la faiblesse de mon corps, de la délicatesse de ma peau, de la finesse de mes os !'},
        {t:'tri',ar:'يَا مَنْ بَدَأَ خَلْقِي وَذِكْرِي وَتَرْبِيَتِي وَبِرِّي وَتَغْذِيَتِي، هَبْنِي لِابْتِدَاءِ كَرَمِكَ وَسَالِفِ بِرِّكَ بِي،',tr:'Yâ man bada\'a khalqî wa dhikrî wa tarbiyatî wa birrî wa taghdhiyatî, habnî li-ibtidâ\'i karamika wa sâlifi birrika bî.',fr:'Ô Celui qui est à l\'origine de ma création, de mon éducation, du dévouement envers moi et de ma nourriture, continue de me pourvoir, par la Grâce de Ta Générosité initiale et de Ta Bienveillance préalable à mon égard.'},
        {t:'tri',ar:'يَا إِلَهِي وَسَيِّدِي وَرَبِّي، أَتُرَاكَ مُعَذِّبِي بِنَارِكَ بَعْدَ تَوْحِيدِكَ،',tr:'Yâ ilâhî, wa sayyidî, wa rabbî, a turâka mu\'adhdhibî bi-nârika ba\'da tawhîdika,',fr:'Ô mon Dieu, mon Maître et mon Seigneur, est-ce que Tu me verrais être châtié par Ton Feu après que j\'eus proclamé Ton Unicité,'},
        {t:'tri',ar:'وَبَعْدَمَا انْطَوَى عَلَيْهِ قَلْبِي مِنْ مَعْرِفَتِكَ، لَهِجَ بِهِ لِسَانِي مِنْ ذِكْرِكَ، وَاعْتَقَدَهُ ضَمِيرِي مِنْ حُبِّكَ،',tr:'wa ba\'damâ-ntawâ \'alayhi qalbî min ma\'rifatika, lahija bihi lisânî min dhikrika wa-\'taqadahu damîrî min hubbika,',fr:'que mon cœur se fut empli de Ta Connaissance, que ma langue se fut attachée à T\'évoquer et que ma conscience se fut convaincue de Ton Amour,'},
        {t:'tri',ar:'وَبَعْدَ صِدْقِ اعْتِرَافِي وَدُعَائِي خَاضِعاً لِرُبُوبِيَّتِكَ،',tr:'wa ba\'da sidqi a\'tirâfi wa du\'â\'î khâdi\'ann li-rubûbiyyatika.',fr:'et après la sincérité de la reconnaissance de mes péchés et de mes invocations, me soumettant à Ta Seigneurie ?!'},
        {t:'tri',ar:'هَيْهَاتَ أَنْتَ أَكْرَمُ مِنْ أَنْ تُضَيِّعَ مَنْ رَبَّيْتَهُ، أَوْ تُبْعِدَ مَنْ أَدْنَيْتَهُ،',tr:'Hayhâta, anta akramu min an tudayyi\'a man rabbaytahu aw tuba\'\'\'ida man adnaytahu,',fr:'Non ! Jamais ! Tu es plus Généreux que cela, pour abandonner celui que Tu as élevé ou pour éloigner celui que Tu as rapproché,'},
        {t:'tri',ar:'أَوْ تُشَرِّدَ مَنْ آوَيْتَهُ، أَوْ تُسَلِّمَ إِلَى الْبَلَاءِ مَنْ كَفَيْتَهُ وَرَحِمْتَهُ،',tr:'aw tusharrida man âwaytahu aw tusallima ilâ-l-balâ\'i man kafaytahu wa rahimtahu.',fr:'ou pour chasser celui que Tu as abrité, ou pour livrer quelqu\'un au malheur dont Tu l\'avais épargné, à qui Tu as fait miséricorde !'},
        {t:'tri',ar:'وَلَيْتَ شِعْرِي يَا سَيِّدِي وَإِلَهِي وَمَوْلَايَ،',tr:'Wa layta shi\'rî, yâ sayyidî, wa ilâhî, wa mawlâya,',fr:'Ô si je savais, ô mon Maître, mon Dieu, mon Souverain,'},
        {t:'tri',ar:'أَتُسَلِّطُ النَّارَ عَلَى وُجُوهٍ خَرَّتْ لِعَظَمَتِكَ سَاجِدَةً، وَعَلَى أَلْسُنٍ نَطَقَتْ بِتَوْحِيدِكَ صَادِقَةً، وَبِشُكْرِكَ مَادِحَةً،',tr:'a tusallitu-n-nâra \'alâ ujûhinn kharrat li-\'azhamatika sâjida-tann, wa \'alâ alsuninn nataqat bi-tawhîdika sâdiqatann wa bi-shukrika mâdihatann,',fr:'est-ce que Tu donnerais le pouvoir au Feu de s\'emparer de visages qui sont tombés prosternés devant Ta Grandeur, de langues qui ont parlé de Ton Unicité en toute sincérité et qui T\'ont remercié en Te louant,'},
        {t:'tri',ar:'وَعَلَى قُلُوبٍ اعْتَرَفَتْ بِإِلَهِيَّتِكَ مُحَقِّقَةً، وَعَلَى ضَمَائِرَ حَوَتْ مِنَ الْعِلْمِ بِكَ حَتَّى صَارَتْ خَاشِعَةً،',tr:'wa \'alâ qulûbinn a\'tarafat bi-ilâhiyyatika muhaqqiqatann, wa \'alâ damâ\'ira hawat mina-l-\'ilmi bika hattâ sârat khâ-shi\'atann,',fr:'de cœurs qui ont reconnu Ta Divinité avec certitude, de consciences qui se sont imprégnées de Ta Connaissance au point de devenir humbles,'},
        {t:'tri',ar:'وَعَلَى جَوَارِحَ سَعَتْ إِلَى أَوْطَانِ تَعَبُّدِكَ طَائِعَةً، وَأَشَارَتْ بِاسْتِغْفَارِكَ مُذْعِنَةً،',tr:'wa \'alâ jawâriha sa\'at ilâ awtâni ta\'abbudika tâ\'i\'atann, wa ashârat bi-stighfârika mudh\'inatann ?!',fr:'de membres qui se sont rendus aux lieux où l\'on T\'adore par obéissance à Toi, et qui ont indiqué la demande de Ton Pardon en toute docilité ?!'},
        {t:'tri',ar:'مَا هَكَذَا الظَّنُّ بِكَ، وَلَا أُخْبِرْنَا بِفَضْلِكَ عَنْكَ يَا كَرِيمُ،',tr:'Mâ hakadhâ azh-zhannu bika, wa lâ ukhbirnâ bi-fadlika \'anka yâ karîmu.',fr:'Non ! Ce n\'est pas l\'opinion que nous avons de Toi, ni ce qui nous a été indiqué par Ta Faveur sur Toi, ô très Généreux !'},
        {t:'tri',ar:'يَا رَبِّ، وَأَنْتَ تَعْلَمُ ضَعْفِي عَنْ قَلِيلٍ مِنْ بَلَاءِ الدُّنْيَا وَعُقُوبَاتِهَا، وَمَا يَجْرِي فِيهَا مِنَ الْمَكَارِهِ عَلَى أَهْلِهَا،',tr:'Yâ rabbi, wa anta ta\'lamu da\'fî \'an qalîlinn min balâ\'i-d-dunyâ wa \'uqûbâtihâ, wa mâ yajrî fîhâ mina-l-makârihi \'alâ ahlihâ,',fr:'Ô mon Seigneur, Tu connais ma faiblesse devant le peu d\'épreuves de ce monde et de ses châtiments, devant les adversités qui arrivent à ses habitants,'},
        {t:'tri',ar:'عَلَى أَنَّ ذَلِكَ بَلَاءٌ وَمَكْرُوهٌ، قَلِيلٌ مَكْثُهُ، يَسِيرٌ بَقَاؤُهُ، قَصِيرٌ مُدَّتُهُ،',tr:'\'alâ anna dhalika balâ\'unn wa makrûhunn, qalîlunn makthu-hu, yasîrunn baqâ\'uhu, qasîrunn muddatuhu.',fr:'alors que ce sont des épreuves et des adversités passagères, éphémères, de courte durée !'},
        {t:'tri',ar:'فَكَيْفَ احْتِمَالِي لِبَلَاءِ الْآخِرَةِ وَجَلِيلِ وُقُوعِ الْمَكَارِهِ فِيهَا،',tr:'Fa-kayfa ihtimâlî li-balâ\'i-l-âkhirati wa jalîli uqû\'i-l-makârihi fîhâ,',fr:'Alors, comment pourrais-je supporter les épreuves de l\'Au-delà, ses adversités grandioses,'},
        {t:'tri',ar:'وَهُوَ بَلَاءٌ تَطُولُ مُدَّتُهُ، وَيَدُومُ مَقَامُهُ، وَلَا يُخَفَّفُ عَنْ أَهْلِهِ،',tr:'wa huwa balâ\'unn tatûlu muddatuhu wa yadûmu ma-qâmuhu wa lâ yukhaffafu \'an ahlihi,',fr:'alors que ce sont des épreuves de longue durée, permanentes, qui ne sont pas allégées pour ses tenants,'},
        {t:'tri',ar:'لِأَنَّهُ لَا يَكُونُ إِلَّا عَنْ غَضَبِكَ وَانْتِقَامِكَ وَسَخَطِكَ، وَهَذَا مَا لَا تَقُومُ لَهُ السَّمَاوَاتُ وَالْأَرْضُ،',tr:'li-innahu lâ yakûnu illâ \'an ghadabika wa-ntiqâmika wa sakhatika, wa hadhâ mâ lâ taqûmu lahu as-samâwâtu wa-l-ardu;',fr:'parce qu\'elles ne proviennent que de Ta Colère, de Ta Vengeance et de Ton Courroux, et cela est ce que ni les cieux ni la terre ne peuvent supporter !'},
        {t:'tri',ar:'يَا سَيِّدِي فَكَيْفَ بِي وَأَنَا عَبْدُكَ الضَّعِيفُ الذَّلِيلُ، الْحَقِيرُ الْمِسْكِينُ،',tr:'Yâ sayyidî, fa-kayfa bî wa anâ \'abduka ad-da\'îfu adh-dhalîlu, al-haqîru, al-miskînu.',fr:'Alors, ô mon Maître, qu\'en serait-il de moi, moi qui suis Ton serviteur faible, vil, méprisable, misérable ?'},
        {t:'tri',ar:'يَا إِلَهِي وَرَبِّي وَسَيِّدِي وَمَوْلَايَ، لِأَيِّ الْأُمُورِ إِلَيْكَ أَشْكُو، وَلِمَا مِنْهَا أَضِجُّ وَأَبْكِي،',tr:'Yâ ilâhî wa rabbî wa sayyidî wa mawlâya, li-ayyi-l-umûri ilayka ashkû, wa lima minhâ adijju wa abkî.',fr:'Ô mon Dieu, mon Seigneur, mon Maître, mon Tuteur, de quelles choses me plaindre auprès de Toi, pour lesquelles je crierai et je pleurerai ?'},
        {t:'tri',ar:'لِأَلِيمِ الْعَذَابِ وَشِدَّتِهِ أَمْ لِطُولِ الْبَلَاءِ وَمُدَّتِهِ،',tr:'Li-alîmi-l-\'adhâbi wa shidda-tihi am li-tûli-l-balâ\'i wa muddatihi ?',fr:'De la douleur et de l\'intensité du châtiment ou de la permanence de l\'épreuve et de sa durée ?'},
        {t:'tri',ar:'فَلَئِنْ صَيَّرْتَنِي لِلْعُقُوبَاتِ مَعَ أَعْدَائِكَ، وَجَمَعْتَ بَيْنِي وَبَيْنَ أَهْلِ بَلَائِكَ،',tr:'Fa-la\'in sayyartanî li-l-\'uqûbâti ma\'a a\'dâ\'ika, wa jama\'ta baynî wa bayna ahli balâ\'ika,',fr:'Et si Tu m\'envoyais aux châtiments avec Tes ennemis, que Tu me mettais avec les tenants de Tes Épreuves,'},
        {t:'tri',ar:'وَفَرَّقْتَ بَيْنِي وَبَيْنَ أَحِبَّائِكَ وَأَوْلِيَائِكَ،',tr:'wa farraqta baynî wa bayna ahibbâ\'ika wa awliyâ\'ika,',fr:'et que Tu me séparais de Tes Bien-aimés et de Tes Proches-alliés,'},
        {t:'tri',ar:'فَهَبْنِي يَا إِلَهِي وَسَيِّدِي وَمَوْلَايَ وَرَبِّي صَبَرْتُ عَلَى عَذَابِكَ، فَكَيْفَ أَصْبِرُ عَلَى فِرَاقِكَ،',tr:'fa-habnî, yâ ilâhî wa sayyidî wa mawlâya wa rabbî, sabartu \'alâ \'adhâbika, fa-kayfa asbiru \'alâ firâqika ?',fr:'à supposer, ô mon Maître, que j\'endurerais Ton Châtiment, comment supporterais-je Ta Séparation ?'},
        {t:'tri',ar:'وَهَبْنِي صَبَرْتُ عَلَى حَرِّ نَارِكَ، فَكَيْفَ أَصْبِرُ عَنِ النَّظَرِ إِلَى كَرَامَتِكَ، أَمْ كَيْفَ أَسْكُنُ فِي النَّارِ وَرَجَائِي عَفْوُكَ،',tr:'Wa-habnî sabartu \'alâ harri nârika fa-kayfa asbiru \'ani-n-nazhari ilâ karâmatika ? Am kayfa askunu fî-n-nâri wa rajâ\'î \'afuka ?',fr:'À supposer que j\'endurerais la chaleur de Ton feu, comment supporterais-je de ne pas voir Ta Noblesse ? Ou comment résiderais-je dans le Feu alors que mon espoir est Ton Pardon ?'},
        {t:'tri',ar:'فَبِعِزَّتِكَ يَا سَيِّدِي وَمَوْلَايَ أُقْسِمُ صَادِقاً، لَئِنْ تَرَكْتَنِي نَاطِقاً لَأَضِجَّنَّ إِلَيْكَ بَيْنَ أَهْلِهَا ضَجِيجَ الْآمِلِينَ،',tr:'Fa-bi-\'izzatika yâ sayyidî wa mawlâya uqsimu sâdiqann, la\'in taraktanî nâtiqann, la-adijjanna ilayka bayna ahlihâ dajîja-l-âmilîna,',fr:'Alors, par Ta Puissance, ô mon Maître, je jure en toute sincérité, que si Tu me laissais la parole, je hurlerais vers Toi parmi ses habitants, du vacarme de ceux qui ont espoir,'},
        {t:'tri',ar:'وَلَأَصْرُخَنَّ صُرَاخَ الْمُسْتَصْرِخِينَ، وَلَأَبْكِيَنَّ عَلَيْكَ بُكَاءَ الْفَاقِدِينَ، وَلَأُنَادِيَنَّكَ أَيْنَ كُنْتَ',tr:'wa la-asrukhanna surâkha-l-mustasrikhîna, wa la-abkiyanna \'alayka bukâ\'a-l-fâqidîna, wa la-unâdiyannaka ayna kunta.',fr:'je crierais du cri de ceux qui appellent au secours, je pleurerais sur Toi des pleurs de ceux qui pleurent sur leurs disparus et je T\'appellerais : « Où es-Tu ? ».'},
        {t:'tri',ar:'يَا وَلِيَّ الْمُؤْمِنِينَ، يَا غَايَةَ آمَالِ الْعَارِفِينَ، يَا غِيَاثَ الْمُسْتَغِيثِينَ، يَا حَبِيبَ قُلُوبِ الصَّادِقِينَ، وَيَا إِلَهَ الْعَالَمِينَ،',tr:'Yâ waliyya-l-mu\'minîna, yâ ghâyata âmâli-l-\'ârifîna, yâ ghiyâtha-l-mustaghîthîna, yâ habîba qulûbi-s-sâdiqîna, wa yâ ilâha-l-\'âlamîna,',fr:'Ô Maître des croyants, ô But des espoirs de ceux qui savent, ô Secours de ceux qui appellent à l\'aide, ô Bien-aimé des cœurs des Sincères, ô Dieu des mondes,'},
        {t:'tri',ar:'أَفَتُرَاكَ سُبْحَانَكَ يَا إِلَهِي وَبِحَمْدِكَ تَسْمَعُ فِيهَا صَوْتَ عَبْدٍ مُسْلِمٍ سُجِنَ فِيهَا بِمُخَالَفَتِهِ،',tr:'a-fa-turâka, subhânaka yâ ilâhî wa bi-hamdika, tasma\'u fîhâ sawta \'abdinn musliminn sujina fîhâ bi-mukhâlafatihi,',fr:'est-ce que Tu Te vois – que Tu sois Glorifié – entendre la voix d\'un serviteur soumis, enfermé en Enfer pour T\'avoir désobéi,'},
        {t:'tri',ar:'وَذَاقَ طَعْمَ عَذَابِهَا بِمَعْصِيَتِهِ، وَحُبِسَ بَيْنَ أَطْبَاقِهَا بِجُرْمِهِ وَجَرِيرَتِهِ،',tr:'wa dhâqa ta\'ma \'adhâbihâ bi-ma\'siyatihi, wa habusa bay-na atbâqihâ bi-jurmihi wa jarîratihi,',fr:'goûtant à ses châtiments à cause de ses actes de désobéissance, détenu dans des étages de l\'Enfer à cause de ses crimes et de ses délits,'},
        {t:'tri',ar:'وَهُوَ يَضِجُّ إِلَيْكَ ضَجِيجَ مُؤَمِّلٍ لِرَحْمَتِكَ، وَيُنَادِيكَ بِلِسَانِ أَهْلِ تَوْحِيدِكَ، وَيَتَوَسَّلُ إِلَيْكَ بِرُبُوبِيَّتِكَ، يَا مَوْلَايَ',tr:'wa huwa yadijju ilayka dajîja mu\'ammilinn li-rahmatika, wa yunâdîka bi-lisâni ahli tawhîdika, wa yatawassalu ilayka bi-rubûbiyyatika, yâ mawlâya.',fr:'qui hurlerait vers Toi du vacarme de celui qui a espoir en Ta Miséricorde, qui T\'appellerait de la langue des gens de Ton Unicité, qui chercherait à s\'approcher de Toi par Ta Seigneurie, ô mon Maître ?!'},
        {t:'tri',ar:'فَكَيْفَ يَبْقَى فِي الْعَذَابِ وَهُوَ يَرْجُو مَا سَلَفَ مِنْ حِلْمِكَ،',tr:'Fa-kayfa yabqâ fî-l-\'adhâbi wa huwa yarjû mâ salafa min hilmika.',fr:'Il resterait dans les châtiments alors qu\'il a espoir en Ta Mansuétude préalable ?!'},
        {t:'tri',ar:'أَمْ كَيْفَ تُؤْلِمُهُ النَّارُ وَهُوَ يَأْمُلُ فَضْلَكَ وَرَحْمَتَكَ،',tr:'Am kayfa tu\'limuhu an-nâru wa huwa yâ\'mulu fadlaka wa rahmataka.',fr:'Le feu le ferait souffrir alors qu\'il espère en Ta Faveur et en Ta Miséricorde ?!'},
        {t:'tri',ar:'أَمْ كَيْفَ يُحْرِقُهُ لَهِيبُهَا وَأَنْتَ تَسْمَعُ صَوْتَهُ وَتَرَى مَكَانَهُ،',tr:'Am kayfa yuhriquhu lahîbuhâ wa anta tasma\'u sawtahu wa tarâ makânahu.',fr:'Les flammes le brûleraient alors que Tu entends sa voix et que Tu vois son emplacement ?!'},
        {t:'tri',ar:'أَمْ كَيْفَ يَشْتَمِلُ عَلَيْهِ زَفِيرُهَا وَأَنْتَ تَعْلَمُ ضَعْفَهُ،',tr:'Am kayfa yashtamilu \'alayhi zafîruhâ wa anta ta\'lamu da\'fahu.',fr:'Les crépitements du feu le cerneraient alors que Tu connais sa faiblesse ?!'},
        {t:'tri',ar:'أَمْ كَيْفَ يَتَقَلْقَلُ بَيْنَ أَطْبَاقِهَا وَأَنْتَ تَعْلَمُ صِدْقَهُ،',tr:'Am kayfa yataqalqalu bayna atbâqihâ wa anta ta\'lamu sidqahu.',fr:'Il serait ballotté entre ses étages alors que Tu connais sa sincérité ?!'},
        {t:'tri',ar:'أَمْ كَيْفَ تَزْجُرُهُ زَبَانِيَتُهَا وَهُوَ يُنَادِيكَ يَا رَبَّاهُ،',tr:'Am kayfa tazjuruhu zabâni-yatuhâ wa huwa yunâdîka yâ rabbâhu.',fr:'Les sbires le rabroueraient-ils alors qu\'il T\'appelle : « Ô mon Seigneur ! » ?!'},
        {t:'tri',ar:'أَمْ كَيْفَ يَرْجُو فَضْلَكَ فِي عِتْقِهِ مِنْهَا فَتَتْرُكَهُ فِيهَا،',tr:'Am kayfa yarjû fadlaka fî \'itqihi minhâ fa-tatrukahu fîhâ.',fr:'Ou Tu le laisserais en enfer alors qu\'il espère en Ta Grâce pour être libéré de là ?!'},
        {t:'tri',ar:'هَيْهَاتَ مَا ذَلِكَ الظَّنُّ بِكَ وَلَا الْمَعْرُوفُ مِنْ فَضْلِكَ، وَلَا مُشْبِهٌ لِمَا عَامَلْتَ بِهِ الْمُوَحِّدِينَ مِنْ بِرِّكَ وَإِحْسَانِكَ،',tr:'Hayhâta mâ dhalika-zh-zhannu bika wa lâ al-ma\'rûfu min fadlika, wa lâ mushbihunn limâ \'âmalta bihi-l-muwahhidîna min birrika wa ihsânika.',fr:'Non ! Loin de cela ! Ce n\'est pas l\'opinion que l\'on a de Toi ni de ce qui est connu de Ta Faveur, ni ne ressemble à la Bonté avec lesquelles Tu T\'es comporté avec les monothéistes !'},
        {t:'tri',ar:'فَبِالْيَقِينِ أَقْطَعُ، لَوْ لَا مَا حَكَمْتَ بِهِ مِنْ تَعْذِيبِ جَاحِدِيكَ، وَقَضَيْتَ بِهِ مِنْ إِخْلَادِ مُعَانِدِيكَ،',tr:'Fa-bi-l-yaqîni aqta\'u, law lâ mâ hakamta bihi min ta\'dhîbi jâhidîka, wa qadayta bihi min ikhlâdi mu\'ânidîka,',fr:'Aussi, j\'affirme avec certitude que, si Tu n\'avais pas décidé de châtier les renégats, ni décrété pour ceux qui s\'entêtent l\'éternité dans l\'Enfer,'},
        {t:'tri',ar:'لَجَعَلْتَ النَّارَ كُلَّهَا بَرْداً وَسَلَاماً، وَمَا كَانَتْ لِأَحَدٍ فِيهَا مَقَرّاً وَلَا مُقَاماً',tr:'la-ja\'alta an-nâra kullahâ bardann wa salâmann, wa mâ kânat li-ahadinn fîhâ maqarrann wa lâ muqâmann.',fr:'Tu aurais rendu le Feu frais et paisible et personne n\'y aurait trouvé demeure ni station.'},
        {t:'tri',ar:'لَكِنَّكَ تَقَدَّسَتْ أَسْمَاؤُكَ أَقْسَمْتَ أَنْ تَمْلَأَهَا مِنَ الْكَافِرِينَ، مِنَ الْجِنَّةِ وَالنَّاسِ أَجْمَعِينَ، وَأَنْ تُخَلِّدَ فِيهَا الْمُعَانِدِينَ،',tr:'Lakinnaka taqaddasat asmâ\'-uka aqsamta an tamla\'ahâ mina-l-kâfirîna, mina-l-jinnati wa-n-nâsi ajma\'îna, wa an tukhallida fîhâ-l-mu\'ânidîna.',fr:'Mais Toi, que Tes Noms soient sanctifiés, Tu as juré de le remplir des incroyants de l\'ensemble des djinns et des gens, et d\'y laisser ceux qui s\'entêtent dans la désobéissance.'},
        {t:'tri',ar:'وَأَنْتَ جَلَّ ثَنَاؤُكَ قُلْتَ مُبْتَدِئاً، وَتَطَوَّلْتَ بِالْإِنْعَامِ مُتَكَرِّماً،',tr:'wa anta, jalla thanâ\'uka, qulta mubtadi\'ann, wa tatawwalta bi-l-in\'âmi mutakarrimann,',fr:'Et Toi, que Ta Louange soit magnifiée, Tu as dit préalablement et Tu as favorisé le croyant en l\'honorant :'},
        {t:'tri',ar:'﴿ أَفَمَنْ كَانَ مُؤْمِناً كَمَنْ كَانَ فَاسِقاً لَا يَسْتَوُونَ ﴾.',tr:'A-fa-man kâna mu\'minann kaman kâna fâsiqann lâ yasta\'ûna.',fr:'« Le croyant serait-il semblable au pervers ? Ils ne s\'équivalent pas ! » (32:18)'},
        {t:'tri',ar:'إِلَهِي وَسَيِّدِي، فَأَسْأَلُكَ بِالْقُدْرَةِ الَّتِي قَدَّرْتَهَا، وَبِالْقَضِيَّةِ الَّتِي حَتَمْتَهَا وَحَكَمْتَهَا، وَغَلَبْتَ مَنْ عَلَيْهِ أَجْرَيْتَهَا،',tr:'Ilâhî wa sayyidî, fa-as\'aluka bi-l-qudrati al-latî qaddartahâ, wa bi-l-qadiyyati al-latî hatamtahâ wa hakamtahâ wa ghalabta man \'alayhi ajraytahâ,',fr:'Mon Dieu et mon Maître, je Te demande, par la Puissance dont Tu as donné la mesure, et par la Question que Tu as imposée et statuée,'},
        {t:'tri',ar:'أَنْ تَهَبَ لِي فِي هَذِهِ اللَّيْلَةِ وَفِي هَذِهِ السَّاعَةِ، كُلَّ جُرْمٍ أَجْرَمْتُهُ، وَكُلَّ ذَنْبٍ أَذْنَبْتُهُ، وَكُلَّ قَبِيحٍ أَسْرَرْتُهُ،',tr:'an tahaba lî fî hadhihi-l-laylati wa fî hadhihi-s-sâ\'ati, kulla jurminn ajramtuhu, wa kulla dhanbinn adhnabtuhu, wa kulla qabîhinn asrartuhu,',fr:'de me pardonner, en cette nuit et en cette heure, tout crime que j\'ai commis, tout péché que j\'ai fait, toute chose détestable que j\'ai tenue secrète,'},
        {t:'tri',ar:'وَكُلَّ جَهْلٍ عَمِلْتُهُ، كَتَمْتُهُ أَوْ أَعْلَنْتُهُ، أَخْفَيْتُهُ أَوْ أَظْهَرْتُهُ،',tr:'wa kulla jahlinn \'amiltuhu, katamtuhu aw a\'lantuhu akh-faytuhu aw azhhartuhu,',fr:'tout acte que j\'ai effectué par ignorance, que j\'ai dissimulé ou que j\'ai divulgué, que j\'ai caché ou que j\'ai mis en évidence,'},
        {t:'tri',ar:'وَكُلَّ سَيِّئَةٍ أَمَرْتَ بِإِثْبَاتِهَا الْكِرَامَ الْكَاتِبِينَ،',tr:'wa kulla sayyi\'atinn amarta bi-ithbâtihâ al-kirâma-l-kâtibîna,',fr:'toute mauvaise action pour laquelle Tu demandes l\'attestation des nobles scribes,'},
        {t:'tri',ar:'الَّذِينَ وَكَّلْتَهُمْ بِحِفْظِ مَا يَكُونُ مِنِّي، وَجَعَلْتَهُمْ شُهُوداً عَلَيَّ مَعَ جَوَارِحِي،',tr:'al-ladhîna wakkaltahum bi-hifzhi mâ yakûnu minnî, wa ja\'altahum shuhûdann \'alayya ma\'a jawârihî,',fr:'que Tu avais chargés d\'enregistrer tout ce qui provient de moi, et que Tu avais placés comme témoins avec mes membres, à mon encontre,'},
        {t:'tri',ar:'وَكُنْتَ أَنْتَ الرَّقِيبَ عَلَيَّ مِنْ وَرَائِهِمْ، وَالشَّاهِدَ لِمَا خَفِيَ عَنْهُمْ، وَبِرَحْمَتِكَ أَخْفَيْتَهُ، وَبِفَضْلِكَ سَتَرْتَهُ،',tr:'wa kunta anta-r-raqîba \'alayya min warâ\'ihim, wa-sh-shâhida lima khafiya \'anhum wa bi-rahmatika akhfaytahu, wa bi-fadlika satartahu.',fr:'alors que Toi, Tu m\'observais derrière eux, et Tu étais le Témoin de ce qui leur était dissimulé, de ce que Tu avais caché par Ta Miséricorde, de ce que Tu avais gardé secret par Ta Faveur.'},
        {t:'tri',ar:'وَأَنْ تُوَفِّرَ حَظِّي مِنْ كُلِّ خَيْرٍ تُنْزِلُهُ أَوْ إِحْسَانٍ تُفْضِلُهُ',tr:'wa an tuwaffira hazhzhî min kulli khayrinn tunziluhu aw ihsâninn tufdiluhu,',fr:'Et je Te demande de m\'accorder généreusement ma part de tout Bien que Tu fais descendre, de tout bienfait dont Tu fais Grâce,'},
        {t:'tri',ar:'أَوْ بِرٍّ تَنْشُرُهُ، أَوْ رِزْقٍ تَبْسُطُهُ، أَوْ ذَنْبٍ تَغْفِرُهُ، أَوْ خَطَأٍ تَسْتُرُهُ',tr:'aw birrinn tanshiruhu aw rizqinn tabsituhu aw dhanbinn taghfiruhu aw khata\'inn tas-turuhu,',fr:'de toute Bonté que Tu répands, de toute Ressource que Tu étends, de tout péché que Tu pardonnes ou de toute faute que Tu dissimules,'},
        {t:'tri',ar:'يَا رَبِّ يَا رَبِّ يَا رَبِّ، يَا إِلَهِي وَسَيِّدِي وَمَوْلَايَ وَمَالِكَ رِقِّي،',tr:'yâ rabbi, yâ rabbi, yâ rabbi, yâ ilâhî, wa sayyidî, wa mawlâya, wa mâlika riqqî.',fr:'ô mon Seigneur, ô mon Seigneur, ô mon Seigneur, ô mon Dieu, ô mon Souverain, ô mon Maître et Détenteur de ma servitude.'},
        {t:'tri',ar:'يَا مَنْ بِيَدِهِ نَاصِيَتِي، يَا عَلِيماً بِضُرِّي وَمَسْكَنَتِي، يَا خَبِيراً بِفَقْرِي وَفَاقَتِي، يَا رَبِّ يَا رَبِّ يَا رَبِّ،',tr:'Yâ man bi-yadihi nâsiyatî, yâ \'alîmann bi-durrî wa maskanatî, yâ khabîrann bi-faqrî wa fâqatî, yâ rabbi, yâ rabbi, yâ rabbi,',fr:'Ô Celui qui a entre Ses Mains mon toupet, ô Celui qui connaît ma misère et mon indigence, ô Celui qui est au courant de ma pauvreté et de mon dénuement, ô mon Seigneur,'},
        {t:'tri',ar:'أَسْأَلُكَ بِحَقِّكَ وَقُدْسِكَ وَأَعْظَمِ صِفَاتِكَ وَأَسْمَائِكَ،',tr:'as\'aluka bi-haqqika wa qud-sika wa a\'zhami sifâtika wa asmâ\'ika,',fr:'je Te demande, par la Grâce de Ton Droit, de Ta Sainteté et du plus grandiose de Tes Attributs et de Tes Noms,'},
        {t:'tri',ar:'أَنْ تَجْعَلَ أَوْقَاتِي فِي اللَّيْلِ وَالنَّهَارِ بِذِكْرِكَ مَعْمُورَةً، وَبِخِدْمَتِكَ مَوْصُولَةً،',tr:'an taj\'ala awqâtî fî-l-layli wa-n-nahâri, bi-dhikrika ma\'mû-ratann, wa bi-khidmatika mawsûlatann,',fr:'de faire en sorte que je passe tout mon temps, le jour et la nuit, à T\'évoquer et à Te servir de façon ininterrompue,'},
        {t:'tri',ar:'وَأَعْمَالِي عِنْدَكَ مَقْبُولَةً، حَتَّى تَكُونَ أَعْمَالِي وَأَوْرَادِي كُلُّهَا وِرْداً وَاحِداً، وَحَالِي فِي خِدْمَتِكَ سَرْمَداً،',tr:'wa a\'mâlî \'indaka maqbûla-tann, hattâ takûna a\'mâlî wa awrâdî kulluhâ wirdann wâhidann, wa hâlî fî khidmatika sarmadann.',fr:'que mes actes soient agréés par Toi, afin que tous mes actes et toutes mes invocations deviennent une seule invocation, et que je sois perpétuellement à Ton Service.'},
        {t:'tri',ar:'يَا سَيِّدِي يَا مَنْ عَلَيْهِ مُعَوَّلِي، يَا مَنْ إِلَيْهِ شَكَوْتُ أَحْوَالِي، يَا رَبِّ يَا رَبِّ يَا رَبِّ،',tr:'Yâ sayyidî, yâ man \'alayhi mu\'awwalî, yâ man ilayhi shakawtu ahwâlî, yâ rabbi, yâ rabbi, yâ rabbi,',fr:'Ô mon Maître, ô Celui sur qui je compte, ô Celui à qui je me plains de mes états, ô mon Seigneur,'},
        {t:'tri',ar:'قَوِّ عَلَى خِدْمَتِكَ جَوَارِحِي، وَاشْدُدْ عَلَى الْعَزِيمَةِ جَوَانِحِي،',tr:'qawwi \'alâ khidmatika jawârihî, wa-shdud \'alâ-l-\'azîmati jawânihî,',fr:'renforce mes membres à Ton Service et raffermis la détermination de mon cœur,'},
        {t:'tri',ar:'وَهَبْ لِيَ الْجِدَّ فِي خَشْيَتِكَ، وَالدَّوَامَ فِي الاتِّصَالِ بِخِدْمَتِكَ،',tr:'wa hab liya-l-jidda fî khashyatika, wa-d-dawâma fî-l-ittisâli bi-khidmatika,',fr:'accorde-moi de Te craindre avec sérieux et de Te servir en permanence, sans discontinuité,'},
        {t:'tri',ar:'حَتَّى أَسْرَحَ إِلَيْكَ فِي مَيَادِينِ السَّابِقِينَ، وَأُسْرِعَ إِلَيْكَ فِي الْمُبَادِرِينَ',tr:'hattâ asraha ilayka fî mayâdîni-s-sâbiqîna, wa usri\'a ilayka fî-l-mubâdirîna,',fr:'afin que je me rende vers Toi dans les domaines des prédécesseurs, que je me précipite vers Toi parmi ceux qui prennent les initiatives,'},
        {t:'tri',ar:'وَأَشْتَاقَ إِلَى قُرْبِكَ فِي الْمُشْتَاقِينَ، وَأَدْنُوَ مِنْكَ دُنُوَّ الْمُخْلِصِينَ،',tr:'wa-shtâqa ilâ qurbika fî-l-mushtâqîna, wa adnuwa minka dunuwwa-l-mukhlisîna,',fr:'que je désire ardemment Ta Proximité parmi ceux à qui Tu manques, que je me rapproche de Toi du rapprochement des sincères,'},
        {t:'tri',ar:'وَأَخَافَكَ مَخَافَةَ الْمُوقِنِينَ، وَأَجْتَمِعَ فِي جِوَارِكَ مَعَ الْمُؤْمِنِينَ.',tr:'wa akhâfaka makhâfata-l-mûqinîna, wa ajtami\'a fî jiwâ-rika ma\'a-l-mu\'minîna.',fr:'que je Te craigne de la peur de ceux qui ont atteint la certitude, que je rejoigne les croyants dans Ton Voisinage.'},
        {t:'tri',ar:'اللَّهُمَّ وَمَنْ أَرَادَنِي بِسُوءٍ فَأَرِدْهُ، وَمَنْ كَادَنِي فَكِدْهُ،',tr:'Allâhumma, wa man arâdanî bi-sû\'inn fa-arid\'hu, wa man kâdanî fa-kid\'hu,',fr:'Ô mon Dieu, mène à la perte celui qui me veut du mal, use de Tes Stratagèmes contre celui qui veut ruser contre moi,'},
        {t:'tri',ar:'وَاجْعَلْنِي مِنْ أَحْسَنِ عَبِيدِكَ نَصِيباً عِنْدَكَ، وَأَقْرَبِهِمْ مَنْزِلَةً مِنْكَ، وَأَخَصِّهِمْ زُلْفَةً لَدَيْكَ،',tr:'wa-j\'alnî min ahsani \'abîdika nasîbann \'indaka, wa aqrabihim manzilatann minka, akhassihim zulfatann ladayka,',fr:'fais que je sois, parmi Tes serviteurs, celui qui a la meilleure part auprès de Toi, la plus proche demeure et la plus particulière proximité,'},
        {t:'tri',ar:'فَإِنَّهُ لَا يُنَالُ ذَلِكَ إِلَّا بِفَضْلِكَ،',tr:'fa-innahu lâ yunâlu dhâlika illâ bi-fadlika.',fr:'car cela ne peut être obtenu que par Ta Faveur !'},
        {t:'tri',ar:'وَجُدْ لِي بِجُودِكَ، وَاعْطِفْ عَلَيَّ بِمَجْدِكَ، وَاحْفَظْنِي بِرَحْمَتِكَ،',tr:'Wa jud lî bi-jûdika, wa-\'tif \'alayya bi-majdika, wa-hfazhnî bi-rahmatika,',fr:'Sois Généreux à mon égard, éprouve de la compassion par Ta Gloire, protège-moi par Ta Miséricorde,'},
        {t:'tri',ar:'وَاجْعَلْ لِسَانِي بِذِكْرِكَ لَهِجاً، وَقَلْبِي بِحُبِّكَ مُتَيَّماً،',tr:'wa-j\'al lisânî bi-dhikrika lahijann, wa qalbî bi-hubbika mutayyamann,',fr:'fais que ma langue T\'évoque constamment, que mon cœur soit passionné par Ton Amour,'},
        {t:'tri',ar:'وَمُنَّ عَلَيَّ بِحُسْنِ إِجَابَتِكَ، وَأَقِلْنِي عَثْرَتِي وَاغْفِرْ زَلَّتِي،',tr:'wa munna \'alayya bi-husni ijâbatika, wa aqilnî \'athratî wa-ghfir zallatî,',fr:'accorde-moi une bonne réponse de Ta Part, atténue mes fautes et pardonne mes faux-pas,'},
        {t:'tri',ar:'فَإِنَّكَ قَضَيْتَ عَلَى عِبَادِكَ بِعِبَادَتِكَ، وَأَمَرْتَهُمْ بِدُعَائِكَ، وَضَمِنْتَ لَهُمُ الْإِجَابَةَ،',tr:'fa-innaka qadayta \'alâ \'ibâdika bi-\'ibâdatika, wa amartahum bi-du\'â\'ika, wa daminta lahumu al-ijâbata.',fr:'car Tu as imposé à Tes serviteurs de T\'adorer, Tu leur as ordonné de T\'invoquer et Tu leur as assuré de répondre !'},
        {t:'tri',ar:'فَإِلَيْكَ يَا رَبِّ نَصَبْتُ وَجْهِي، وَإِلَيْكَ يَا رَبِّ مَدَدْتُ يَدِي،',tr:'Fa-ilayka yâ rabbi nasabtu wajhî, wa ilayka yâ rabbi madadtu yadî.',fr:'Alors, c\'est vers Toi, ô mon Seigneur, que je tourne mon visage, c\'est vers Toi que je tends les mains !'},
        {t:'tri',ar:'فَبِعِزَّتِكَ اسْتَجِبْ لِي دُعَائِي وَبَلِّغْنِي مُنَايَ، وَلَا تَقْطَعْ مِنْ فَضْلِكَ رَجَائِي، وَاكْفِنِي شَرَّ الْجِنِّ وَالْإِنْسِ مِنْ أَعْدَائِي،',tr:'Fa-bi-\'izzatika-stajib lî du\'â\'î wa ballighnî munâya, wa lâ taqta\' min fadlika rajâ\'î, wa-kfinî sharra-l-jinna wa-l-insi min a\'dâ\'î.',fr:'Aussi, par Ta Puissance, exauce ma demande et réalise mon souhait, ne me fais pas perdre espoir en Tes Faveurs, et préserve-moi du mal de mes ennemis !'},
        {t:'tri',ar:'يَا سَرِيعَ الرِّضَا، اغْفِرْ لِمَنْ لَا يَمْلِكُ إِلَّا الدُّعَاءَ، فَإِنَّكَ فَعَّالٌ لِمَا تَشَاءُ،',tr:'Yâ sarî\'a-r-ridâ, ighfir li-man lâ yamliku illâ-d-du\'â\'a, fa-innaka fa\'\'\'âlunn limâ tashâ\'u.',fr:'Ô Celui qui donne rapidement satisfaction, pardonne à celui qui ne possède que l\'invocation, car Tu fais ce que Tu veux !'},
        {t:'tri',ar:'يَا مَنِ اسْمُهُ دَوَاءٌ، وَذِكْرُهُ شِفَاءٌ، وَطَاعَتُهُ غِنًى، ارْحَمْ مَنْ رَأْسُ مَالِهِ الرَّجَاءُ، وَسِلَاحُهُ الْبُكَاءُ،',tr:'Yâ mani-smuhu dawâ\'unn, wa dhikruhu shifâ\'unnn wa tâ\'atuhu ghinann, irham man ra\'su mâlihi ar-rajâ\'u wa silâhuhu al-bukâ\'u.',fr:'Ô Celui dont le Nom est Remède, le Souvenir Guérison, à qui l\'obéissance est Richesse, fais miséricorde à celui qui n\'a pour capital que l\'espoir et pour arme que les pleurs !'},
        {t:'tri',ar:'يَا سَابِغَ النِّعَمِ، يَا دَافِعَ النِّقَمِ، يَا نُورَ الْمُسْتَوْحِشِينَ فِي الظُّلَمِ، يَا عَالِماً لَا يُعَلَّمُ،',tr:'Yâ sâbigha-n-ni\'ami, yâ dâfi\'a-n-niqami, yâ nûra-l-mustawhishîna fî-zh-zhulami, yâ \'âlimann lâ yu\'allamu,',fr:'Ô Celui qui répand les bienfaits et qui repousse les châtiments, ô Lumière de ceux qui sont esseulés dans les ténèbres, ô Savant sans avoir appris,'},
        {t:'tri',ar:'صَلِّ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ، وَافْعَلْ بِي مَا أَنْتَ أَهْلُهُ،',tr:'salli \'alâ Muhammadinn wa âli Muhammadinn, wa-f\'al bî mâ anta ahluhu.',fr:'prie sur Mohammed et sur la famille de Mohammed, et fais de moi ce dont Tu es Digne !'},
        {t:'tri',ar:'وَصَلَّى اللَّهُ عَلَى رَسُولِهِ وَالْأَئِمَّةِ الْمَيَامِينِ مِنْ آلِهِ وَسَلَّمَ تَسْلِيماً كَثِيراً.',tr:'Wa sallâ-llâhu \'alâ rasûlihi wa-l-a\'immati-l-mayâmîna min âlihi, wa sallama taslîmann kathîrann.',fr:'Que Dieu prie sur Son Messager et les Imams Bien-heureux de sa famille, et salue de beaucoup de saluts de paix !'}
      ]
    },

    tawassul: {
      source: 'Du\'ā classiques',
      title: 'Du\'ā at-Tawassul',
      subtitle: 'L\'invocation d\'intercession (at-Tawassul) par les 14 Infaillibles. On y demande à chacun d\'eux d\'intercéder auprès de Dieu pour la satisfaction de nos besoins.',
      body: [
        {t:'intro',tx:'At-Tawassul signifie chercher un recours auprès d\'une personne ayant un statut élevé auprès de Dieu, afin de s\'approcher de Lui et satisfaire un besoin. Ce concept est fondé sur le verset coranique : « Ô les croyants ! Craignez Allah, cherchez le moyen de vous rapprocher de Lui » (5:35). L\'invocation la plus complète à ce propos est ce texte nommé Du\'ā at-Tawassul.'},
        {t:'tri',ar:'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ',tr:'Bism-illâh-ir-Rahmân-ir-Rahîm',fr:'Au nom de Dieu, le Tout Miséricordieux, le Très Miséricordieux.'},
        {t:'tri',ar:'اللَّهُمَّ إِنِّي أَسْأَلُكَ وَأَتَوَجَّهُ إِلَيْكَ بِنَبِيِّكَ نَبِيِّ الرَّحْمَةِ مُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَآلِهِ',tr:'Allâhumma innî as\'aluka wa atawajjahu ilayka bi-Nabiyyika, Nabiyy-ir-Rahmati Muhammadin sallâ-llâhu \'alayhi wa Âlihi.',fr:'Ô mon Dieu ! Je Te demande et je me dirige vers Toi par Ton Prophète, le Prophète de la Miséricorde, Muhammad, que la paix de Dieu soit sur lui et sur sa famille.'},
        {t:'tri',ar:'يَا أَبَا الْقَاسِمِ، يَا رَسُولَ اللَّهِ، يَا إِمَامَ الرَّحْمَةِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ-l-Qâsim, yâ Rasûl-Allâh, yâ Imâm-ar-Rahmati, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Abâ-l-Qâsim, ô Messager de Dieu, ô Imam de la Miséricorde, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا الْحَسَنِ، يَا أَمِيرَ الْمُؤْمِنِينَ، يَا عَلِيَّ بْنَ أَبِي طَالِبٍ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ-l-Hasan, yâ Amîr-al-Mu\'minîn, yâ \'Aliyy-abna Abî Tâlib, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Abâ-l-Hasan, ô Commandeur des Croyants, ô Ali fils d\'Abî Tâlib, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا فَاطِمَةُ الزَّهْرَاءُ، يَا بِنْتَ مُحَمَّدٍ، يَا قُرَّةَ عَيْنِ الرَّسُولِ، يَا سَيِّدَتَنَا وَمَوْلَاتَنَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكِ إِلَى اللَّهِ، وَقَدَّمْنَاكِ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهَةً عِنْدَ اللَّهِ، اشْفَعِي لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Fâtimatu-z-Zahrâ\', yâ binta Muhammadin, yâ qurrata \'ayni-r-Rasûl, yâ sayyidatanâ wa mawlâtanâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ biki ilâ-llâh, wa qaddamnâki bayna yaday hâjâtinâ, yâ wajîhatan \'inda-llâh, ishfa\'î lanâ \'inda-llâh!',fr:'Ô Fatima la Resplendissante, ô fille de Muhammad, ô prunelle de l\'œil du Messager, ô notre Maîtresse et notre Tutrice ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mise en avant pour solliciter la satisfaction de nos besoins. Ô honorée auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا مُحَمَّدٍ، يَا حَسَنَ بْنَ عَلِيٍّ، أَيُّهَا الْمُجْتَبَى، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ Muhammadin, yâ Hasana-bna \'Aliyy, ayyuhâ-l-Mujtabâ, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Père de Muhammad, ô Hasan fils de Ali, ô l\'Élu, ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا عَبْدِ اللَّهِ، يَا حُسَيْنَ بْنَ عَلِيٍّ، أَيُّهَا الشَّهِيدُ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ \'Abdillâh, yâ Husayna-bna \'Aliyy, ayyuhâ-sh-Shahîd, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Abâ Abdillâh, ô Husayn fils de Ali, ô le Martyr, ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا الْحَسَنِ، يَا عَلِيَّ بْنَ الْحُسَيْنِ، يَا زَيْنَ الْعَابِدِينَ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ-l-Hasan, yâ \'Aliyy-abna-l-Husayn, yâ Zayn-al-\'Âbidîn, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Abâ-l-Hasan, ô Ali fils de Husayn, ô Ornement des adorateurs, ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا جَعْفَرٍ، يَا مُحَمَّدَ بْنَ عَلِيٍّ، أَيُّهَا الْبَاقِرُ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ Ja\'far, yâ Muhammada-bna \'Aliyy, ayyuhâ-l-Bâqir, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Père de Ja\'far, ô Muhammad fils de Ali, ô al-Bâqir (celui qui fend la science), ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا عَبْدِ اللَّهِ، يَا جَعْفَرَ بْنَ مُحَمَّدٍ، أَيُّهَا الصَّادِقُ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ \'Abdillâh, yâ Ja\'fara-bna Muhammad, ayyuhâ-s-Sâdiq, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Père de Abdillâh, ô Ja\'far fils de Muhammad, ô le Véridique, ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا الْحَسَنِ، يَا مُوسَى بْنَ جَعْفَرٍ، أَيُّهَا الْكَاظِمُ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ-l-Hasan, yâ Mûsâ-bna Ja\'far, ayyuhâ-l-Kâzim, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Abâ-l-Hasan, ô Mûsâ fils de Ja\'far, ô al-Kâzim (celui qui se contient), ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا الْحَسَنِ، يَا عَلِيَّ بْنَ مُوسَى، أَيُّهَا الرِّضَا، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ-l-Hasan, yâ \'Aliyy-abna Mûsâ, ayyuhâ-r-Ridâ, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Abâ-l-Hasan, ô Ali fils de Mûsâ, ô ar-Ridâ (celui en qui réside la Complaisance divine), ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا جَعْفَرٍ، يَا مُحَمَّدَ بْنَ عَلِيٍّ، أَيُّهَا التَّقِيُّ الْجَوَادُ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ Ja\'far, yâ Muhammada-bna \'Aliyy, ayyuhâ-t-Taqiyyu-l-Jawâd, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Père de Ja\'far, ô Muhammad fils de Ali, ô le Pieux et le Généreux (at-Taqî al-Jawâd), ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا الْحَسَنِ، يَا عَلِيَّ بْنَ مُحَمَّدٍ، أَيُّهَا الْهَادِي النَّقِيُّ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ-l-Hasan, yâ \'Aliyy-abna Muhammad, ayyuhâ-l-Hâdî-n-Naqiyy, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Abâ-l-Hasan, ô Ali fils de Muhammad, ô le Guide Pur (al-Hâdî an-Naqî), ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا أَبَا مُحَمَّدٍ، يَا حَسَنَ بْنَ عَلِيٍّ، أَيُّهَا الزَّكِيُّ الْعَسْكَرِيُّ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Abâ Muhammad, yâ Hasana-bna \'Aliyy, ayyuhâ-z-Zakiyyu-l-\'Askariyy, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Père de Muhammad, ô Hasan fils de Ali, ô l\'Intègre de l\'armée (az-Zakî al-\'Askarî), ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'tri',ar:'يَا وَصِيَّ الْحَسَنِ وَالْخَلَفَ الْحُجَّةَ، أَيُّهَا الْقَائِمُ الْمُنْتَظَرُ الْمَهْدِيُّ، يَا ابْنَ رَسُولِ اللَّهِ، يَا حُجَّةَ اللَّهِ عَلَى خَلْقِهِ، يَا سَيِّدَنَا وَمَوْلَانَا! إِنَّا تَوَجَّهْنَا وَاسْتَشْفَعْنَا وَتَوَسَّلْنَا بِكَ إِلَى اللَّهِ، وَقَدَّمْنَاكَ بَيْنَ يَدَيْ حَاجَاتِنَا، يَا وَجِيهاً عِنْدَ اللَّهِ، اشْفَعْ لَنَا عِنْدَ اللَّهِ!',tr:'Yâ Wasiyy-al-Hasan wa-l-Khalaf-al-Hujjata, ayyuhâ-l-Qâ\'im-ul-Muntazar-ul-Mahdiyy, yâ bna Rasûl-illâh, yâ Hujjat-Allâh \'alâ khalqihi, yâ sayyidanâ wa mawlânâ! Innâ tawajjahnâ wa-stashfa\'nâ wa tawassalnâ bika ilâ-llâh, wa qaddamnâka bayna yaday hâjâtinâ, yâ wajîhan \'inda-llâh, ishfa\' lanâ \'inda-llâh!',fr:'Ô Successeur de Hasan et Successeur-Preuve, ô le Résurrecteur Attendu, le Mahdî, ô fils du Messager de Dieu, ô Preuve de Dieu sur Sa création, ô notre Maître et notre Tuteur ! Par ta position élevée nous nous sommes dirigés vers Dieu, nous avons demandé ton intercession et nous t\'avons mis en avant pour solliciter la satisfaction de nos besoins. Ô honoré auprès de Dieu, intercède pour nous auprès de Dieu !'},
        {t:'intro',tx:'Après la lecture de ce du\'ā, exprimez vos vœux et vos demandes. Puis concluez avec cette imploration :'},
        {t:'tri',ar:'يَا سَادَتِي وَمَوَالِيَّ إِنِّي تَوَجَّهْتُ بِكُمْ أَئِمَّتِي وَعُدَّتِي لِيَوْمِ فَقْرِي وَحَاجَتِي إِلَى اللَّهِ، وَتَوَسَّلْتُ بِكُمْ إِلَى اللَّهِ، وَاسْتَشْفَعْتُ بِكُمْ إِلَى اللَّهِ، فَاشْفَعُوا لِي عِنْدَ اللَّهِ، وَاسْتَنْقِذُونِي مِنْ ذُنُوبِي عِنْدَ اللَّهِ،',tr:'Yâ Sâdatî wa Mawâliyya! Innî tawajjahtu bikum a\'immatî wa \'uddatî li-yawmi faqrî wa hâjatî ilâ-llâh, wa tawassaltu bikum ilâ-llâh, wa-stashfa\'tu bikum ilâ-llâh, fa-shfa\'û lî \'inda-llâh, wa-stanqidhûnî min dhunûbî \'inda-llâh,',fr:'Ô mes Maîtres, ô mes Tuteurs ! Je me suis dirigé vers Dieu par vous, mes Imams et ma provision pour le Jour de ma pauvreté et de mon besoin. J\'ai imploré Dieu par vous et j\'ai cherché votre intercession auprès de Dieu. Intercédez pour moi auprès de Dieu et sauvez-moi de mes péchés auprès de Dieu.'},
        {t:'tri',ar:'فَإِنَّكُمْ وَسِيلَتِي إِلَى اللَّهِ، وَبِحُبِّكُمْ وَبِقُرْبِكُمْ أَرْجُو نَجَاةً مِنَ اللَّهِ، فَكُونُوا عِنْدَ اللَّهِ رَجَائِي، يَا سَادَتِي يَا أَوْلِيَاءَ اللَّهِ، صَلَّى اللَّهُ عَلَيْهِمْ أَجْمَعِينَ، وَلَعَنَ اللَّهُ أَعْدَاءَ اللَّهِ ظَالِمِيهِمْ مِنَ الْأَوَّلِينَ وَالْآخِرِينَ، آمِينَ رَبَّ الْعَالَمِينَ.',tr:'Fa-innakum wasîlatî ilâ-llâh, wa bi-hubbikum wa bi-qurbikum arjû najâtan min-Allâh, fa-kûnû \'inda-llâh rajâ\'î, yâ sâdatî yâ awliyâ\'-Allâh. Sallâ-llâhu \'alayhim ajma\'îna wa la\'ana-llâhu a\'dâ\'-Allâh zhâlimîhim min-al-awwalîna wa-l-âkhirîna, âmîna Rabb-al-\'âlamîn.',fr:'Car vous êtes mon moyen (wasîla) vers Dieu, et c\'est par mon amour pour vous et ma proximité avec vous que j\'espère le salut de Dieu ! Soyez mon espoir auprès de Dieu, ô mes Maîtres, ô Proches-alliés de Dieu. Que Dieu prie sur eux tous et maudisse les ennemis de Dieu qui les ont opprimés, parmi les premiers et les derniers. Amen, Seigneur des mondes !'}
      ]
    },

    inv7: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '7. Tâches préoccupantes',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Pour des tâches préoccupantes, l\'infortune et les moments de détresse',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ إِذا عرضتْ لهُ مُصِمّةً، أوْ نزلتْ بِهِ مُلِمَةً، وعِنْد الْكرْبِ', fr:'La septième supplication : au moment de se retrouver avec un devoir inquiétant, ou quand un malheur survient au temps de détresse'},
        {t:'tri', ar:'يَا مَنْ تُحَلَّ بِهِ عُقَدُ الْمَكَارِهِ', tr:'yâ man tuhallu bihî ‘uqadu almakârihi', fr:'Ô Celui par lequel les noeuds des choses déliées sont ouverts'},
        {t:'tri', ar:'وَيَا مَنْ يُفْئَأُ بِهِ حَدُّ الشَّدَائِدِ', tr:'wayâ man yuftha’u bihi haddu achchadâ’idi', fr:'Celui par lequel la lame tranchante des souffrances est émoussée'},
        {t:'tri', ar:'وَيَا مَنْ يُلْتَمَسُ مِنْهُ الْمَخْرَجُ إِلَى رَوْحِ الْفَرَجِ', tr:'waya man yultamasu minhu almakhraju ilâ rûhi alfaraji', fr:'O Celui auquel est supplié une issue pour la fraîcheur du soulagement !'},
        {t:'tri', ar:'ذَلَّتْ لِقُدْرَتِكَ الصِّّعَابُ', tr:'dhallat liqudratika aşş’iâbu', fr:'Les affaires intraitables se soumettent à Ton Pouvoir,'},
        {t:'tri', ar:'وَتَسَبَّبَتْ بِلُطْفِكَ الأَسْبَابُ', tr:'wa tasabbabat biluțfika al-asbâbu', fr:'les moyens se préparent par Ta Gentillesse,'},
        {t:'tri', ar:'وَجَرَى بِقُدْرَتِكَ الْقَضَاءُ', tr:'wa jarâ biqudratika alqadấ’u', fr:'le décret s’effectue de par Ton Pouvoir,'},
        {t:'tri', ar:'وَمَضَتْ عَلَى إِرَادَتِكَ الأَشْيَاءُ', tr:'wa madat ‘alâ irâdatika al-achyâ’u', fr:'et toutes les choses s’accomplissent en accordance avec Ta Volonté.'},
        {t:'tri', ar:'فَهِيَ بِمَشِيَّتِكَ دُونَ قَوْلِكَ مُؤْتَمِرَةٌ', tr:'fahiya suivent Ta Commande bimachi’atika dûna qawlika mu tamiratun', fr:'Par Ton Désir, ils sans pour autant utiliser Ta Parole,'},
        {t:'tri', ar:'وَبِإِرَادَتِكَ دُونَ نَهْبِكَ مُنْزَجِرَةٌ', tr:'wa bi’irâdatika düna nahyika munzajiratun', fr:'et par Ta Volonté, ils écoutent Tes Interdictions sans Ta Prohibition.'},
        {t:'tri', ar:'أَئْتَ الْمَدْعُوُّ لِلْمُهِمَّاتِ', tr:'anta almuad’uwwu lilmuhimmâti', fr:'C’est Toi que les gens, dans leur infortune appellent'},
        {t:'tri', ar:'وَأَنْتَ الْمَفْزَعُ فِي الْمُلِمَّاتِ', tr:'wa anta almafza’u filmulimmâti', fr:'et supplient; aucun malheur'},
        {t:'tri', ar:'لاَ يَنْدَفِعُ مِنْهَا إلاَّا مَا دَقَعْتَ', tr:'lâ yandaf iu minhâ illâ mâ dafa’ta', fr:'ne serait réprimé à moins que ce soit Toi qui le réprimes,'},
        {t:'tri', ar:'وَلَا يَنْكَشِفُ مِنْهَا إِلاَّا مَا كَشَفْتَ', tr:'walâ yankachifu minhâ illâ mâ kachafta', fr:'et aucun malheur ne serait supprimé à moins que ce ne soit Toi qui le supprimes !'},
        {t:'tri', ar:'وَقَدْ نَزَلَ بِي يَا رَبِّ مَا قَدْ تَكَأْدَنِي ثِقْلُهُ', tr:'waqad nazala bi ya rabbi mâ qad taka’adani thiqluhû', fr:'Ô Seigneur! En ma personne est advenu un malheur dont le poids m’étouffe et me pèse;'},
        {t:'tri', ar:'وَأَلَمَّ بِي مَا قَدْ بَهَظَنِي حَمْلُهُ', tr:'wa alamma bî mâ qad bahazani hamluhü', fr:'quelque chose m’est arrivée dont je dois supporter le fardeau et qui oppresse !'},
        {t:'tri', ar:'وَبِقُدْرَتِكَ أَوْرَدْتَهُ عَلَيَّ', tr:'wa biqudratika awradtahû ‘alayya', fr:'C’est Toi qui l’as rabattu sur moi,'},
        {t:'tri', ar:'وَبِسُلْطَانِكَ وَجَّهْتَهُ إِلَيَّ', tr:'wa bisulțânika wajjahtahû ilayya', fr:'de par Ton Pouvoir, et c’est par Ton Authorité que Tu l’as provoqué pour moi.'},
        {t:'tri', ar:'فَلَا مُصْدِرَ لِمَا أَوْرَدْتَ', tr:'falâ muşdira ilâ awradta', fr:'Personne ne peut renvoyer ce que Tu as voulu,'},
        {t:'tri', ar:'وَلَا صَارِفَ لِمَا وَجَّهْتَ', tr:'walâ șârifa limâ wajjahta', fr:'personne ne peut détourner ce que Tu as envoyé,'},
        {t:'tri', ar:'وَلَا فَاتِحَ لِمَا أَغْلَقْتَ', tr:'walâ fâtiha limâ aghlaqta', fr:'personne ne peut ouvrir ce que Tu as fermé,'},
        {t:'tri', ar:'وَلَا مُغْلِقَ لِمَا فَتَحْتَ', tr:'walâ mughliqa limâ fatahta', fr:'personne ne peut freiner ce que Tu as ouvert,'},
        {t:'tri', ar:'وَلَا مُيَسِّرَ لِمَا عَسَّرْتَ', tr:'walâ muyassira limâ ‘assarta', fr:'personne ne peut faciliter ce que Tu as rendu difficile,'},
        {t:'tri', ar:'وَلَا نَاصِرَ لِمَنْ خَذَلْتَ', tr:'walâ nâșira liman khadhalta', fr:'personne ne peut secourir celui que Tu as abandonné.'},
        {t:'tri', ar:'فَصَلٌ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'faşalli ‘alâ muhammadin wa- âlihî', fr:'Ô Dieu! Par conséquent bénis Mohammad et toute sa Famille'},
        {t:'tri', ar:'وَافْتَحْ لِي يَا رَبِّ بَابَ الْفَرَجِ بِطَوْلِكَ', tr:'waftah lî yâ rabbi bâba alfaraji bițawlika', fr:'Seigneur! Ouvre-moi la porte du soulagement, de par Ta Grâce'},
        {t:'tri', ar:'وَاكْسِرْ عَنِّي سُلْطَانَ الْهَمِّ بِحَوْلِكَ', tr:'waksir ‘anni sultâna alhammi bihawlika', fr:'Et par Ton Pouvoir, brise le despotisme de l’inquiétude pour moi,'},
        {t:'tri', ar:'وَأَنِلْنِي حُسْنَ النَّظَرِ فِيمَا شَكَوْتُ', tr:'wa anilni husna annazari fimâ chakawtu', fr:'confère la beauté de Ton Regard sur ma complainte,'},
        {t:'tri', ar:'وَأَذِفْنِي حَلَاوَةَ الصُّنْعِ فِيمَا سَأَلْتُ', tr:'wa adhiqni halâwata aşşun’i fîmâ sa’altu', fr:'Laisse-moi savourer la douceur du bienfait et l’exaucement de ce que je T’ais humblement supplié'},
        {t:'tri', ar:'وَهَبْ لِي مِنْ لَدُنْكَ رَحْمَةً وَفَرَجاً هَنِيئا', tr:'wahab li min ladunka rahmatan wafarajan haní’an', fr:'Donne-moi de Ta Part, la Miséricorde et un agréable soulagement,'},
        {t:'tri', ar:'وَاجْعَلْ لِي مِنْ عِنْدِكَ مَخْرجًا وَحِيّاً', tr:'waj’al lî min ‘indika makhrajan wahayyan', fr:'et désigne-moi un moyen rapide de sauvegarde des méfaits, de par Ta Grâce !'},
        {t:'tri', ar:'وَلَاَ تَشْغَلْنِي بِالإِهْتِمَامِ عَنْ تَعَاهُدِ فُرُوضِكَ', tr:'walâ tuchghilni bilihtimâmi ‘an ta’âhudi furûdika', fr:'Ne me distrais point de l’observement de Tes Obligations, par l’inquiètude,'},
        {t:'tri', ar:'وَاسْتِعْمَالِ سُنَّتِكَ', tr:'wast’ imâli sunnatika', fr:'et d’agir en accordance avec Tes Prescriptions.'},
        {t:'tri', ar:'فَقَدْ ضِقْتُ لِمَا نَزَلَ بِي يَا رَبِّ ذَرْعاً', tr:'faqad diqtu lima nazala bi ya rabbi dhar’an', fr:'Ô Seigneur! Ma capacité est arrivée à sa limite! Par ce qui m’est arrivé,'},
        {t:'tri', ar:'وَامْتَلأتُ بِحَمْلِ مَا حَدَثَ عَلَيَّ هَمّاً', tr:'wamtala tu bihamli mâ hadatha ‘alayya hamman', fr:'et je suis plein d’inquiétude pour supporter le fardeau de ce qui m’est advenu, pendant que Tu es Le Seul,'},
        {t:'tri', ar:'وَأَنْتَ الْقَادِرُ عَلَى كَشْفِ مَا مُنِيتُ بِهِ', tr:'wa anta alqâdiru ‘alâ kachfi mâ munitu bihi', fr:'qui as le Pouvoir d’enlever ce qui m’a affligé,'},
        {t:'tri', ar:'وَدَفْعٍ مَا وَقَعْتُ فِيهِ', tr:'wa daf’i mâ waqa’tu fihi', fr:'et de repousser ce dans lequel j’y suis tombé.'},
        {t:'tri', ar:'فَافْعَلْ بِي ذَلِكَ', tr:'faf’al bi dhâlika', fr:'Par conséquent, accomplis ce geste pour moi,'},
        {t:'tri', ar:'وَإِنْ لَمْ أَسْتَوْجِبْهُ مِنْكَ', tr:'wa in lam astajwibhu minka', fr:'même si je ne mérite point cela de Toi,'},
        {t:'tri', ar:'يَا ذَا الْعَرْشِ الْعَظِيمِ.', tr:'yâ dhal’archi al’azîmi', fr:'Ô Possesseur du Trône Puissant !'},
        {t:'salawat'},
      ]
    },

    s50: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '50. Son Invocation dans la crainte',
      subtitle: 'Que la Paix soit sur lui',
      body: [
        {t:'salawat'},
        {t:'v',n:1, tx:'Ô mon Dieu ! Tu m\'as créé pur de tout péché ; nourri lorsque j\'étais enfant ; et pourvu à suffisance.'},
        {t:'v',n:2, tx:'Ô mon Dieu ! J\'ai trouvé dans Le Livre que Tu as fait descendre et par qui Tu donnes des bonnes nouvelles à Tes Serviteurs ce que Tu dis : <em>Ô Mes Serviteurs ! Ô vous qui avez commis des excès à votre propre détriment, ne désespérez pas de la Miséricorde de Dieu. Dieu pardonne tous les péchés</em><sup id="ref-258"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-258\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[258]</a></sup>, mais, en fait, ils m\'ont précédé en ce que Tu connais – et Tu le connais davantage que moi – ! Ô quelle honte ce que Ton Livre énumère contre moi !<sup id="ref-259"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-259\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[259]</a></sup>'},
        {t:'v',n:3, tx:'Si n\'était les situations pour lesquelles j\'attends avec espoir Ton Pardon qui enveloppe toute chose, j\'eus désespéré de tout ! Au cas où une personne eut pu s\'éloigner de son Seigneur en fuyant, je me serais senti le plus obligé à m\'éloigner de Toi par la fuite ! Toutefois, ni sur terre ni dans les cieux, aucun secret ne peut T\'échapper, pas même ce que Tu en rapportes<sup id="ref-260"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-260\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[260]</a></sup>. Tu suffis en tant que Celui Qui rétribue ! Tu suffis en tant que Comptable de tout !<sup id="ref-261"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-261\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[261]</a></sup>'},
        {t:'v',n:4, tx:'Ô mon Dieu ! En toute certitude, Tu m\'eus réclamé si je m\'étais enfui et saisi si j\'avais battu en retraite. Aussi, me voici entre Tes Mains, soumis, humilié, mortifié. Si Tu me châties, je le mérite et, ce sera là, ô Seigneur ! pure justice de Ta Part. Si Tu me pardonnes, déjà auparavant, Ton Pardon me fut accordé et Tu me couvris de Ta Prospérité.'},
        {t:'v',n:5, tx:'Aussi, je T\'implore, ô mon Dieu ! par Tes Attributs bien fondés<sup id="ref-262"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-262\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[262]</a></sup>, et par Ta Splendeur cachée par les Voiles ! Si Tu n\'avais fait preuve de Clémence envers cette âme inquiète, envers ces os inutiles et désintégrés, incapable qu\'elle est d\'endurer l\'ardeur de Ton Soleil, comment peut-elle endurer l\'ardeur de Ton Feu ? Elle ne peut endurer le bruit de Ton Tonnerre, comment peut-elle endurer le bruit de Ta Colère ?'},
        {t:'v',n:6, tx:'Aussi, fais preuve de miséricorde à mon égard, ô Dieu ! car je suis un homme indigne et ma prérogative est insignifiante. Me châtier n\'ajoutera pas même le poids d\'un atome à Ton Royaume. Par contre, si mon châtiment ajouterait à Ton Royaume, alors, je T\'implorerais à des fins de patience à le subir et je le subirais par amour de Toi ; malgré tout, Ton Autorité, ô mon Dieu ! est plus puissante et Ton Royaume plus durable pour que l\'obéissance de ceux qui obéissent en ajoutent ou que la désobéissance des fauteurs en diminue !'},
        {t:'v',n:7, tx:'Aussi, fais preuve de miséricorde à mon égard, ô Le Plus Miséricordieux de ceux qui font miséricorde ! Sois tolérant à mon égard ! Ô Le Détenteur de la Majesté et de Magnificence ! Et, reviens vers moi, car Tu es Celui Qui revient sans cesse, Tu es Le Miséricordieux !<sup id="ref-263"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'note-263\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[263]</a></sup>'},
        {t:'salawat'},
        {t:'instruction', tx:'Notes de bas de page :'},
        {t:'intro', tx:'<span id="note-258"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-258\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[258]</a></span> Coran 39/53'},
        {t:'intro', tx:'<span id="note-259"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-259\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[259]</a></span> Il s\'agit ici du Livre des Comptes présenté au Jour du Jugement, dont il est mention, par exemple, dans la Sourate 18/49 : « <em>Le Livre sera posé : Tu verras alors les coupables anxieux au sujet de son contenu. Ils diront : Malheur à nous ! Pourquoi ce Livre ne laisse-t-il rien, de petit ou de grand, sans le compter. – Ils trouveront, présent devant eux, tout ce qu\'ils auront fait.</em> »'},
        {t:'intro', tx:'<span id="note-260"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-260\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[260]</a></span> Ici, il est fait allusion à certains Verset coraniques tel celui-ci : « <em>Mon Seigneur connaît le mystère incommensurable : le poids d\'un atome ne Lui échappe ni dans les cieux, ni sur la terre ; il n\'y a rien de plus petit ou de plus grand que cela qui ne soit inscrit dans un Livre explicite, afin de récompenser ceux qui auront cru et qui auront accompli des œuvres bonnes.</em> » (Coran 34/3)'},
        {t:'intro', tx:'<span id="note-261"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-261\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[261]</a></span> Ici, il est fait allusion au Coran : « <em>Mais Dieu suffit pour tenir le compte de tout.</em> » (Coran 4/6 et 33/39)'},
        {t:'intro', tx:'<span id="note-262"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-262\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[262]</a></span> Ici, il est fait référence à une supplication du Prophète (pslf) : « Je T\'implore par chacun de Tes Noms par lesquels Tu T\'es nommé, par lesquels Tu as instruit chacune de Tes Créatures, que Tu as fait descendre dans Ton Livre et que Tu as gardé pour Toi-Même dans la connaissance du Mystère. » [Ahmad, 1/391, 402]'},
        {t:'intro', tx:'<span id="note-263"><a style="cursor:pointer; color:#c9a84c;" onclick="document.getElementById(\'ref-263\').scrollIntoView({behavior:\'smooth\', block:\'center\'})">[263]</a></span> Coran 2/128'},
      ]
    },

    dimanche: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '62. Invocation du Dimanche',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'بِسْمِ اللّٰهِ الَّذِى لَاأَرْجُو إِلّا فَضْلَهُ، وَلَا أَخْشىٰ إِلّا عَدْلَهُ، وَلَا أَعْتَمِدُ إِلّا قَوْلَهُ، وَلَا أُمْسِكُ إِلّا بِحَبْلِهِ', tr:'Bi-smi-llâhi-l-ladhî lâ arjuwa illâ fadlahu, wa lâ akhshâ illâ ‘adlahu, wa lâ a‘tamidu illâ qawlahu, wa lâ umsiku illâ bi-hablihi', fr:"Au Nom de Dieu ! Celui de Qui je n'attends que La Grâce ; de Qui je ne crains que Sa Justice ; ne prenant appui que sur Sa Parole ; ne me rattachant qu'à Son Lien !"},
        {t:'tri', ar:'بِكَ أَسْتَجِيرُ يَا ذَا الْعَفْوِ وَالرِّضْوانِ مِنَ الظُّلْمِ وَالْعُدْوانِ، وَمِنْ غِيَرِ الزَّمانِ، وَتَواتُرِ الْأَحْزانِ، وَطَوارِقِ الْحَدَثانِ وَمِنِ انْقِضَاءِ الْمُدَّةِ قَبْلَ التَّأَهُّبِ وَالْعُدَّةِ', tr:'bika astajîru yâ dhâ-l-‘afwi wa-r-ridwâni mina-zh-zhulmi wa-l-‘udwâni, wa min ghiyari-z-zamâni, wa tawâturi al-ahzâni, wa tawâriqi-l-hadathâni wa mina-nqidâ’i-l-muddati qabla-t-ta’ahhubi wa-l-‘uddati', fr:"En Toi, je cherche refuge — Ô Le Possesseur du Pardon et de La Satisfaction —, contre l'injustice et la tyrannie ; contre les vicissitudes du temps ; contre la succession des peines ; contre les calamités du destin ; contre l'échéance de mon terme survenant sans y être préparé et sans détenir des provisions."},
        {t:'tri', ar:'وَ إِيَّاكَ أَسْتَرْشِدُ لِمَا فِيهِ الصَّلَاحُ وَالْإِصْلاحُ، وَبِكَ أَسْتَعِينُ فِيَما يَقْتَرِنُ بِهِ النَّجَاحُ وَ الإِنْجَاحُ وَ إِيَّاكَ أَرْغَبُ فِى لِبَاسِ الْعافِيَةِ وَتَمامِها وَ شُمُولِ السَّلَامَةِ وَدَوامِهَا', tr:'wa iyyâka astarshidu limâ fîhi-s-salâhu wa-l-islâhu, wa bika asta’înu fîmâ yaqtarinu bihi-n-najâhu wa-l-injâhu wa iyyâka arghabu fi libâsi-l-‘âfiyati wa tamâmihâ, wa shumûli-ssalâmati wa dawâmihâ', fr:"En Toi, je cherche la Guidance vers ce qui est vertueux et ce qui élève."},
        {t:'tri', ar:'وَأَعُوذُ بِكَ يَا رَبِّ مِنْ هَمَزاتِ الشَّيَاطِينِ، وَ أَحْتَرِزُ بِسُلْطانِكَ مِنْ جَوْرِ السَّلَاطِينِ فَتَقَبَّلْ مَا كَانَ مِنْ صَلَاتِى وَصَوْمِى', tr:'Wa a‘ûdhu bika yâ rabbi min hamazâti-sh-shayâtîni, wa ahtarizu bi-sultânika min jawri-s-salâtîni Fa-taqabbal mâ kâna min salâtî wa sawmî', fr:"En Toi, je cherche le secours par qui s'opère le succès et la prospérité."},
        {t:'tri', ar:'وَاجْعَلْ غَدِى وَمَا بَعْدَهُ أَفْضَلَ مِنْ سَاعَتِى وَيَوْمِى وَأَعِزَّنِى فِى عَشِيرَتِى وَقَوْمِى، وَاحْفَظْنِى فِى يَقْظَتِى وَنَوْمِى فَأَنْتَ اللّٰهُ خَيْرٌ حَافِظاً، وَأَنْتَ أَرْحَمُ الرَّاحِمِينَ', tr:'wa-j‘al ghadî wa mâ ba’dahu afdala min sâ‘atî wa yawmî wa a’izzanî fî ‘ashîratî wa qawmî, wa-hfazhnî fî yaqazhatî wa nawmî fa-anta-llâhu khayrunn hâfizhann wa anta arhamu-r- râhimîna', fr:"C'est Toi que j'implore de me vêtir de la parure du bien-être, de sa plénitude, et d'être recouvert totalement du Salut et de sa continuité. Je cherche refuge auprès de Toi, ô mon Seigneur, contre les séductions des démons ; je me place sous la protection de Ta Souveraineté contre la tyrannie des puissants. Aussi, agrée mes prières et mes jeûnes passés ; fasse que mon lendemain et ce qui viendra après soient meilleurs que ce qui fait mon heure présente et mon aujourd'hui ! Fasse que je sois honoré parmi mon clan et mon peuple ; protège-moi dans mon état d'éveil et de sommeil ! Car, Tu es L'Excellent Gardien et Tu es Le Plus Miséricordieux de ceux qui font miséricorde !"},
        {t:'tri', ar:'اللّٰهُمَّ إِنِّى أَبْرَأُ إِلَيْكَ فِى يَوْمِى هٰذَا وَمَا بَعْدَهُ مِنَ الْآحادِ، مِنَ الشِّرْكِ وَالْإِلْحَادِ وَأُخْلِصُ لَكَ دُعَائِى تَعَرُّضاً لِلْإِجَابَةِ، وَأُقِيمُ عَلَىٰ طَاعَتِكَ رَجَاءً لِلْإِثَابَةِ', tr:' wa ukhlisu laka du‘â’î ta‘ar-rudann li-l-ijâbati. wa uqîmu ‘alâ tâ‘atika rajâ’ann li-l-ithâbati', fr:"Ô mon Dieu ! Je me déclare innocent face à Toi, en ce jour qui est le mien et pour tous les dimanches qui le suivront, d'associationnisme et d'athéisme ; je consacre en toute sincérité mon invocation à Toi ; je demeure dans l'attente d'être exaucé."},
        {t:'tri', ar:'فَصَلِّ عَلَىٰ مُحَمَّدٍ خَيْرِ خَلْقِكَ، الدَّاعِى إِلَىٰ حَقِّكَ وَأَعِزَّنِى بِعِزِّكَ الَّذِى لَايُضَامُ، وَاحْفَظْنِى بِعَيْنِكَ الَّتِى لَاتَنَامُ وَاخْتِمْ بِالانْقِطَاعِ إِلَيْكَ أَمْرِى، وَبِالْمَغْفِرَةِ عُمْرِى، إِنَّكَ أَنْتَ الْغَفُورُ الرَّحِيمُ', tr:'Fa-salli ‘alâ Muhammadinn khayri khalqika, ad-dâ‘î ilâ haqqika wa a’izzanî bi-‘izzika-l-ladhî lâ yudâmu wa-hfazhnî bi-‘aynika-llatî lâ tanâmu wa-khtim bi-l-inqitâ‘i ilayka amrî,jwa bi-l-maghfirati ‘umrî, innaka anta-l-ghafûru ar-rahîmu', fr:"Aussi, bénis Mohammed et les Gens de la Famille de Mohammed, l'Excellent de parmi Tes créatures, celui qui appelle à Ta Vérité ; rends-moi puissant par Ta Puissance, qui est hors d'atteinte de toute défaillance ; protège-moi par Ton Œil qui ne sommeille jamais ; scelle ma destinée par ma dévotion envers Toi et ma vie par Ton Pardon. En vérité, Tu es Celui Qui pardonne, Le Très Miséricordieux !"},
        {t:'salawat'},
      ]
    },

    lundi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '63. Invocation du Lundi',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'الْحَمْدُ لِلّٰهِ الَّذِى لَمْ يُشْهِدْ أَحَداً حِينَ فَطَرَ السَّمَاوَاتِ وَالأَرْضَ وَلَا اتَّخَذَ مُعِيناً حِينَ بَرَأَ النَّسَمَات ،', tr:'Al-hamdu li-llâhi al-ladhî lam yush’hid ahadann, hîna fatara-ssamâwâti wa-l-arda wa lâ attakhadha mu’înann hîna bara’a an-nasamâti,', fr:"Louange à Dieu ! Celui Qui n'a pris personne à témoin lorsqu'IL a créé les cieux et la terre ; Qui n'a pris aucun assistant lorsqu'IL a fait exister les âmes !"},
        {t:'tri', ar:'لَمْ يُشَارَكْ فِى الْإِلٰهِيَّةِ، وَلَمْ يُظاهَرْ فِى الْوَحْدَانِيَّةِ', tr:'wa lam yushârak fî-l-ilahiyyati, wa lam yuzhâhar fî-l-wahdâniyyati', fr:"IL n'a pas d'associé avec Sa Divinité ; IL n'a pas d'équivalent dans Son Unicité !"},
        {t:'tri', ar:'كَلَّتِ الأَلْسُنُ عَنْ غَايَةِ صِفَتِهِ، وَالْعُقُولُ عَنْ كُنْهِ مَعْرِفَتِهِ وَتَوَاضَعَتِ الْجَبابِرَةُ لِهَيْبَتِهِ، وَعَنَتِ الْوُجُوهُ لِخَشْيَتِهِ، وَانْقَادَ كُلُّ عَظِيمٍ لِعَظَمَتِهِ', tr:'Kallati-l-alsunu ‘an ghâyati sifatihi, wa-l-‘uqûlu ‘an kunuhi ma’rifatihi wa tawâda‘ati-l-jabâbiratu li-haybatihi wa ‘anati-l-ujûhu likhashyatihi, wa-nqâda kullu ‘azhîminn li-‘azhamatihi', fr:"Les langues demeurent muettes pour Le décrire ; les intellects sont impuissants à saisir la connaissance de Son Essence ; les oppresseurs se font modestes face à Sa Majesté ; les visages s'humilient par crainte de Lui ; toutes choses puissantes se résignent face à Sa Toute-Puissance !"},
        {t:'tri', ar:'فَلَكَ الْحَمْدُ مُتَواتِراً مُتَّسِقاً، وَمُتَوالِياً مُسْتَوْسِقاً', tr:'Fa-laka-l-hamdu mutawâtirann muttasiqann wa mutawâliyann, mustawsiqann,', fr:"À Toi La Louange répétée et ininterrompue, harmonieuse, continue et faite avec discipline."},
        {t:'tri', ar:'وَصَلَوَاتُهُ عَلَىٰ رَسُو لِهِ أَبَداً، وَسَلامُهُ دَائِماً سَرْمَداً', tr:'wa salawâ-tuhu ‘alâ rasûlihi abadann, wa salâmuhu dâ’imann sarmadann', fr:"Que Ses Bénédictions soient éternellement sur Son Messager ; que Sa Paix soit à jamais sur lui."},
        {t:'tri', ar:'اللّٰهُمَّ اجْعَلْ أَوَّلَ يَوْمِى هٰذَا صَلاحاً، وَأَوْسَطَهُ فَلاحاً، وَآخِرَهُ نَجَاحاً وَأَعُوذُ بِكَ مِنْ يَوْمٍ أَوَّلُهُ فَزَعٌ، وَأَوْسَطُهُ جَزَعٌ، وَآخِرُهُ وَجَعٌ', tr:'Allâhumma, aj’al awwala yawmî hâdhâ salâhann, wa awsatahu falâhann wa âkhirahu najâhann wa a‘ûdhu bika min yawminn awwaluhu faza‘unn, wa aw-satuhu jaza’unn wa âkhirahu waja‘unn', fr:"Ô mon Dieu ! Fasse que le début de ce jour qui est le mien soit marqué de la félicité ; et que sa fin soit marquée par le succès. Je cherche refuge auprès de Toi contre un jour dont le début est marqué par la frayeur ; dont le milieu est marqué par l'inquiétude ; et dont la fin est marquée par la douleur !"},
        {t:'tri', ar:'اللّٰهُمَّ إِنِّى أَسْتَغْفِرُكَ لِكُلِّ نَذْرٍ نَذَرْتُهُ، وَكُلِّ وَعْدٍ وَعَدْتُهُ، وَكُلِّ عَهْدِ عَاهَدْتُهُ ثُمَّ لَمْ أَفِ بِهِ', tr:'Allâhumma, innî astaghfiruka li-kulli nadhrinn nadhartuhu, wa kulli wa’dinn wa’adtuhu, wa kulli ‘ahdinn ‘âhadtuhu, thumma lam afi bihi', fr:"Ô mon Dieu ! J'implore Ton Pardon pour tout vœu que j'ai formulé, pour toute promesse que j'ai faite, pour tout engagement que j'ai pris et que je n'ai pas respectés envers Toi."},
        {t:'tri', ar:'وَأَسْأَلُكَ فِى مَظَالِمِ عِبَادِكَ عِنْدِى فَأَيُّما عَبْدٍ مِنْ عَبِيدِكَ أَوْ أَمَةٍ مِنْ إِمَائِكَ كَانَتْ لَهُ قِبَلِى مَظْلِمَةٌ ظَلَمْتُهَا إِيَّاهُ، فِى نَفْسِهِ، أَوْ فِى عِرْضِهِ، أَوْ فِى مَالِهِ، أَوْ فِى أَهْلِهِ وَ وَلَدِهِ أَوْ غِيبَةٌ اغْتَبْتُهُ بِهَا، أَوْ تَحَامُلٌ عَلَيْهِ بِمَيْلٍ أَوْ هَوَىً، أَوْ أَنَفَةٍ أَوْ حَمِيَّةٍ أَوْ رِيَاءٍ أَوْ عَصَبِيَّةٍ غَائِباً كَانَ أَوْ شَاهِداً، وَ حَيّاً كَانَ أَوْ مَيِّتاً فَقَصُرَتْ يَدِى، وَضَاقَ وُسْعِى عَنْ رَدِّهَا إِلَيْهِ وَالتَّحَلُّلِ مِنْهُ', tr:'wa as’aluka fi mazhâlimi ‘ibâdika ‘indî fa-ayyumâ ‘abdinn min ‘abîdika aw amatinn min imâ’ika kânat lahu qibalî mazhlamatunn zhalamtuhâ iyyâhu, fî nafsihi, aw fî ‘ irdihi aw fî mâlihi, aw fî ahlihi wa waladihi aw ghaybatunn aghtabtuhu bihâ, aw tahâmulunn ‘alayhi, bimaylinn aw hawânn aw anafatinn aw hamiyyatinn aw riyâ’inn aw ‘asabiyyatinn ghâ’ibann kâna aw shâhidann, wa hayyann kâna aw maytann faqasurat yadî wa dâqa us‘î ‘an raddihâ ilayhi wa-t-tahalluli minhu', fr:"Je T'implore de me pardonner les injustices commises envers Tes Serviteurs ; au cas où il y aurait un serviteur de parmi Tes Serviteurs ou une servante de parmi Tes Servantes ayant déposé une plainte contre moi pour avoir manqué de respect à sa personne, à sa renommée, à ses biens, à son épouse et à ses enfants, ou pour avoir fait preuve de médisance à son égard, ou pour l'avoir traité avec partialité, ou passion, ou arrogance, ou emportement, ou hypocrisie, ou sectarisme que ce soit en son absence ou en sa présence, de son vivant ou après sa mort, car ce sont des injustices que ma main est incapable de réparer, et mon pouvoir trop faible à dédommager ou à annuler ma redevance envers lui."},
        {t:'tri', ar:'فَأَسْأَلُكَ يَا مَنْ يَمْلِكُ الْحَاجَاتِ، وَهِىَ مُسْتَجِيبَةٌ لِمَشِيَّتِهِ، وَمُسْرِعَةٌ إِلَىٰ إِرادَتِهِ أَنْ تُصَلِّىَ عَلَىٰ مُحَمَّدٍ وَآلِ مُحَمَّدٍ وَأَنْ تُرْضِيَهُ عَنِّى بِمَا شِئْتَ، وَتَهَبَ لِى مِنْ عِنْدِكَ رَحْمَةً إِنَّهُ لَاتَنْقُصُكَ الْمَغْفِرَةُ، وَلَا تَضُرُّكَ الْمَوْهِبَةُ، يَا أَرْحَمَ الرَّاحِمِينَ', tr:'fa-as’aluka, yâ man yamliku-l-hâjâti, wa hiya mustajîbatunn limashî’atihi wa musri’atunn ilâ irâdatihi an tusaliya ‘alâ Muhammadinn wa âli Muhammadinn wa an turdiyahu ‘annî bimâ shi’ta wa tahaba lî min ‘indika rahmatann innahu lâ tanqusuka-l-maghfiratu wa lâ tadurruka-l-mawhibatu, yâ arhama ar-râhimîna', fr:"Je T'implore ! Ô Celui Qui détient toutes les réponses aux requêtes, exaucées par Sa Volonté et se précipitant vers Sa Décision, de bénir Mohammed et les Gens de la Famille de Mohammed, rends-le satisfait de moi de la façon dont Tu décideras, et accorde-moi une Miséricorde venant de Toi ! Pardonner, ne diminue en rien en Toi ; accorder n'est pas un manque pour Toi ! Ô Le Plus Miséricordieux de ceux qui font miséricorde !"},
        {t:'tri', ar:'اللّٰهُمَّ أَوْلِنِى فِى كُلِّ يَوْمِ اثْنَيْنِ نِعْمَتَيْنِ مِنْكَ ثِنْتَيْنِ سَعادَةً فِى أَوَّ لِهِ بِطَاعَتِكَ، وَنِعْمَةً فِى آخِرِهِ بِمَغْفِرَتِكَ، يَا مَنْ هُوَ الْإِلٰهُ، وَلَا يَغْفِرُ الذُّنُوبَ سِوَاهُ', tr:'Allâhumma, awlinî fî kulli yawmi ithnayni ni‘matayni minka thinatayni sa’âdatann fî awwalihi bi-tâ’atika, wa ni’matann fî âkhirihi bimaghfiratika, yâ man huwa-l-ilâhu wa lâ yaghfiru-dh-dhunûba siwâhu', fr:"Ô mon Dieu ! Accorde-moi en ce deuxième jour de la semaine deux faveurs venant de Toi : Le Bonheur de T'obéir dès son commencement ; et la Faveur de Ton Pardon à sa fin ! Ô Celui Qui est Dieu ! Aucun ne peut pardonner les actes coupables autre que Lui !"},
        {t:'salawat'},
      ]
    },

    mardi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '64. Invocation du Mardi',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'الْحَمْدُ لِلّٰهِ وَالْحَمْدُ حَقُّهُ كَمَا يَسْتَحِقُّهُ حَمْداً كَثِيراً وَأَعُوذُ بِهِ مِنْ شَرِّ نَفْسِى إِنَّ النَّفْسَ لَأَمَّارَةٌ بِالسُّوءِ إِلّا مَا رَحِمَ رَبِّى', tr:'Al-hamdu li-llâhi wa-l-hamdu haqquhu kamâ yastahiqquhu hamdann kathîrann wa a‘ûdhu bihi min sharri nafsî inna-n-nafsa la-ammâratunn bi-ssû’i illâ mâ rahima rabbi', fr:"Louange à Dieu ! La louange Lui est due, tel qu'Il en est digne. Une louange qui n'a pas de fin !"},
        {t:'tri', ar:'وَأَعُوذُ بِهِ مِنْ شَرِّ الشَّيْطَانِ الَّذِى يَزِيدُنِى ذَنْباً إِلَىٰ ذَنْبِى', tr:'Wa a‘ûdhu bihi min sharri-sh-shaytâni, al-ladhî yazîdunî dhanbann ilâ dhanbî', fr:"Je cherche refuge auprès de Lui contre le mal de mon âme. L'âme est instigatrice du mal à moins que mon Seigneur ne fasse miséricorde."},
        {t:'tri', ar:'وَأَحْتَرِزُ بِهِ مِنْ كُلِّ جَبَّارٍ فَاجِرٍ، وَسُلْطَانٍ جَائِرٍ، وَعَدُوٍّ قَاهِرٍ', tr:'wa ahtarizu bihi min kulli jabbârinn fâjirinn wa sultâninn jâ ’irinn wa ‘ aduwwinn qâhirinn', fr:"Je cherche refuge auprès de Lui contre le mal de Satan, qui se plaît à ajouter un acte coupable à mon acte coupable."},
        {t:'tri', ar:'اللّٰهُمَّ اجْعَلْنِى مِنْ جُنْدِكَ فَإِنَّ جُنْدَكَ هُمُ الْغَالِبُونَ وَاجْعَلْنِى مِنْ حِزْبِكَ فَإِنَّ حِزْبَكَ هُمُ الْمُفْلِحُونَ، وَاجْعَلْنِى مِنْ أَوْلِيَائِكَ', tr:'Allâhumma, aj‘alnî min jun- dika fa-inna jundaka humu-lghâlibûna wa-j‘alnî min hizbika fa-inna hizbaka humu-l-muflihûna, wa-j‘alnî min awliyâ’ika', fr:"Je cherche protection en Lui contre tout oppresseur pervers, contre tout souverain injuste et contre tout ennemi dominateur."},
        {t:'tri', ar:'فَإِنَّ أَوْلِياءَكَ لَاخَوْفٌ عَلَيْهِمْ وَلَا هُمْ يَحْزَنُونَ', tr:'fa-inna awliyâ’aka lâ khawfunn ‘alayhim wa lâ hum yahzanûna', fr:"Ô mon Dieu ! Fais que je sois au nombre de Tes armées, car Ton armée sera victorieuse ! Fais-moi entrer dans Ton parti, car dans Ton parti se trouvent les gagnants. Installe-moi parmi Tes amis, car Tes amis n'éprouveront plus aucune crainte et ne seront pas affligés."},
        {t:'tri', ar:'اللّٰهُمَّ أَصْلِحْ لِى دِينِى فَإِنَّهُ عِصْمَةُ أَمْرِى وَأَصْلِحْ لِى آخِرَتِى فَإِنَّها دَارُ مَقَرِّى، وَ إِلَيْهَا مِنْ مُجاوَرَةِ اللِّئَامِ مَفَرِّى وَاجْعَلِ الْحَيَاةَ زِيادَةً لِى فِى كُلِّ خَيْرٍ، وَالْوَفَاةَ رَاحَةً لِى مِنْ كُلِّ شَرٍّ', tr:'Allâhumma, aslih lî dînî fa-innahu ‘ismatu amrî wa aslih lî âkhiratî fa-innahâ dâru maqarrî, wa ilayhâ min mujâwarati-l-li’âmi mafarrî wa-j‘ali-l-hayâta ziyâdatann lî fî kulli khayrinn, wa-l-wafâta râhatann lî min kulli sharrinn', fr:"Ô mon Dieu ! Fais que ma religion soit parfaite pour moi, car elle est le lien protecteur de mon existence. Fais que ma vie ultime soit excellente, car elle est la demeure de mon repos éternel, le refuge qui me soustrait au voisinage des hommes médiocres ! Fais que l'existence soit pour moi une acquisition de tout ce qui est bien et que la mort soit pour moi un repos loin de tout ce qui est mal !"},
        {t:'tri', ar:'اللّٰهُمَّ صَلِّ عَلَىٰ مُحَمَّدٍ خاتَمِ النَّبِيِّينَ، وَتَمَامِ عِدَّةِ الْمُرْسَلِينَ وَعَلَىٰ آلِهِ الطَّيِّبِينَ الطَّاهِرِينَ، وَأَصْحَابِهِ الْمُنْتَجَبِينَ', tr:'Allâhumma, salli ‘alâ Muhammadinn khâtami-n-nabiyyîna, wa tamâmi ‘iddati-l-mursalîna wa ‘alâ âl ihi-t-tayyibîna- t-tâhirîna, wa as’hâbihi-l-muntajibîna', fr:"Ô mon Dieu ! Bénis Mohammed, le Sceau des Prophètes et l'achèvement du nombre de Tes Messagers, ainsi que les gens de sa famille, les très vertueux, les très purs, puis ses compagnons distingués. Accorde-moi, en ce troisième jour de la semaine, trois choses :"},
        {t:'tri', ar:'وَهَبْ لِى فِى الثُّلَثَاءِ ثَلَاثاً: لَاتَدَعْ لِى ذنْباً إِلّا غَفَرْتَهُ، وَلَا غَمّاً إِلّا أَذْهَبْتَهُ، وَلَا عَدُوّاً إِلّا دَفَعْتَهُ بِبِسْمِ اللّٰهِ خَيْرِ الأَسْمَاءِ، بِسْمِ اللّٰهِ رَبِّ الْأَرْضِ وَالسَّماءِ', tr:' Bi-bismi-llâhi khayri-l-asmâ’i, bismi-llâhi rabbi-l-ardi wa-ssamâ’i', fr:"Ne laisse aucun de mes actes coupables sans lui accorder Ton pardon, ni aucune affliction sans l'avoir dissipée, ni aucun ennemi sans l'avoir repoussé ! Tout cela réalisé au Nom de Dieu, le plus sublime des Noms. Au Nom de Dieu ! Seigneur de la Terre et du Ciel !"},
        {t:'tri', ar:'أَسْتَدْفِعُ كُلَّ مَكْرُوهٍ أَوَّلُهُ سَخَطُهُ، وَأَسْتَجْلِبُ كُلَّ مَحْبُوبٍ أَوَّلُهُ رِضَاهُ', tr:'astadfi‘u kulla makrûhinn awwaluhu sakhatuhu, wa astajlibu kulla mahbûbinn awwaluhu ridâhu', fr:"Je cherche à repousser loin de moi tout ce qui est malheur, dont le premier est Ton courroux ; je cherche à attirer à moi tout ce qui est aimé, dont le début est Ta satisfaction !"},
        {t:'tri', ar:'فَاخْتِمْ لِى مِنْكَ بِالْغُفْرانِ يَا وَلِىَّ الْإِحْسَانِ', tr:'Fa-khtim lî minka bi-l-ghufrâni yâ waliyya-l-ihsâni', fr:"Aussi, fais que Ton ultime bienfait envers moi soit Ton pardon ! Ô Maître de la bienveillance !"},
        {t:'salawat'},
      ]
    },

    mercredi: {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '65. Invocation du Mercredi',
      subtitle: null,
      body: [
        {t:'tri', ar:'بِسْمِ اللّهِ الرَّحْمنِ الرَّحِيمِ', tr:'Bi-smi-llâhi ar-rahmâni ar-rahîmi', fr:"Au Nom de Dieu, le Clément, le Très Miséricordieux"},
        {t:'salawat'},
        {t:'tri', ar:'الْحَمْدُ لِلّٰهِ الَّذِى جَعَلَ اللَّيْلَ لِباساً، وَالنَّوْمَ سُباتاً، وَجَعَلَ النَّهارَ نُشُوراً', tr:'Al-hamdu li-llâhi al-ladhî ja‘ala al-layla libâsann wa-n-nawma subâtann wa ja‘ala-n-nahâra nushûrann', fr:"Louange à Dieu ! C'est Lui Qui a établi pour vous la nuit comme un vêtement ; le sommeil comme un repos. Il a établi le jour comme une résurrection."},
