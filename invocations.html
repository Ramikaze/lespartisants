<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070c18;color:#e8e2d0;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}
.app{display:flex;height:100%}

/* ══ SIDEBAR ══ */
.sidebar{
  width:240px;flex-shrink:0;height:100%;
  background:#0a1020;border-right:1px solid rgba(201,168,76,0.12);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{width:0}
.sb-header{
  padding:16px 14px 12px;border-bottom:1px solid rgba(201,168,76,0.1);
  flex-shrink:0;
}
.sb-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#c9a84c;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.sb-sub{font-size:10px;color:#3a4560;margin-top:2px;white-space:nowrap}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15)}

/* Theme group */
.sb-group{margin-bottom:4px}
.sb-theme{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;cursor:pointer;
  font-size:12px;font-weight:600;color:#9aa3b8;
  transition:all .18s;
  border-left:2px solid transparent;
}
.sb-theme:hover{color:#c9a84c;background:rgba(201,168,76,0.05)}
.sb-theme.open{color:#c9a84c;border-left-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06)}
.sb-theme-icon{font-size:14px;flex-shrink:0}
.sb-theme-label{flex:1;line-height:1.4}
.sb-chevron{font-size:9px;transition:transform .2s;flex-shrink:0;color:#c9a84c;opacity:.6}
.sb-theme.open .sb-chevron{transform:rotate(90deg)}

/* Sub-items */
.sb-items{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.sb-items.open{max-height:10000px}
.sb-sub-items{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.sb-sub-items.open{max-height:10000px}
.sb-item{
  display:block;padding:7px 14px 7px 36px;
  font-size:11.5px;color:#6b7280;cursor:pointer;
  transition:all .15s;line-height:1.4;
  border-left:2px solid transparent;
}
.sb-sub-items .sb-item{padding-left:48px}
.sb-item:hover{color:#c9a84c;background:rgba(201,168,76,0.04)}
.sb-item.active{color:#c9a84c;font-weight:600;background:rgba(201,168,76,0.08);border-left-color:#c9a84c}
.sb-item.disabled{opacity:0.35;pointer-events:none;font-style:italic}
.sb-item.subheader{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#c9a84c;opacity:0.8;cursor:pointer;padding:12px 14px 8px 24px;border-left:none;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.sb-item.subheader:hover{background:rgba(201,168,76,0.05)}
.sb-item.subheader .sb-chevron{transform:rotate(0deg);transition:transform .2s;color:#c9a84c}
.sb-item.subheader.open .sb-chevron{transform:rotate(90deg)}

/* ══ TOGGLE BUTTON ══ */
.sb-toggle{
  position:absolute;top:50%;left:240px;transform:translateY(-50%);
  width:18px;height:48px;background:#0d1828;border:1px solid rgba(201,168,76,0.2);
  border-left:none;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#c9a84c;z-index:50;transition:left .3s;
}
.sb-toggle:hover{background:rgba(201,168,76,0.12)}
.sidebar.collapsed~.sb-toggle{left:0}

/* ══ MAIN CONTENT ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;gap:16px;
}
.welcome-icon{font-size:48px;opacity:.4}
.welcome-title{font-family:'Cinzel',serif;font-size:16px;color:#c9a84c;font-weight:600;opacity:.7}
.welcome-hint{font-size:12px;color:#3a4560;line-height:1.6}

/* Content panel */
.content{
  flex:1;overflow-y:auto;padding:20px 24px 40px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent;
  animation:fadeIn .25s ease;
}
.content-inner{
  max-width:1200px;margin:0 auto;
}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.content.hidden{display:none}
.welcome.hidden{display:none}

/* ══ CONTENT ELEMENTS ══ */
.c-source{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#c9a84c;opacity:.5;font-family:'Cinzel',serif;margin-bottom:4px;text-align:center}
.c-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#e8e2d0;line-height:1.3;margin-bottom:6px;text-align:center}
.c-subtitle{font-size:13px;color:#9aa3b8;font-style:italic;line-height:1.6;margin-bottom:16px;text-align:center}
.c-divider{height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.25),transparent);margin-bottom:18px}

/* Intro */
.c-intro{
  font-size:var(--inv-fr-size,14.5px);color:#9aa3b8;font-style:italic;line-height:1.7;
  padding:12px 16px;border-left:2px solid rgba(201,168,76,0.3);
  background:rgba(201,168,76,0.03);border-radius:0 8px 8px 0;margin-bottom:18px;
  text-align:justify;hyphens:auto;
}
/* Salawat */
.c-salawat{
  text-align:center;padding:8px;margin:6px 0;
  font-size:11px;color:#c9a84c;opacity:.45;letter-spacing:.1em;
  text-transform:uppercase;font-family:'Cinzel',serif;
}
/* Verse */
.c-verse{display:flex;gap:12px;margin-bottom:12px;padding:11px 13px;border-radius:9px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);transition:background .2s}
.c-verse:hover{background:rgba(201,168,76,0.04);border-color:rgba(201,168,76,0.1)}
.c-vnum{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:#c9a84c;margin-top:2px}
.c-vtext{font-size:var(--inv-fr-size,13.5px);line-height:1.82;color:#cec6b0;text-align:justify;hyphens:auto}
/* Instruction */
.c-instruction{font-size:12px;color:#c9a84c;font-weight:600;margin:14px 0 8px;padding:6px 12px;background:rgba(201,168,76,0.06);border-radius:6px;border:1px solid rgba(201,168,76,0.15)}
/* Prose */
.c-prose p{font-size:var(--inv-fr-size,15px);line-height:1.85;color:#cec6b0;margin-bottom:14px;text-align:justify;hyphens:auto}
.c-prose p:last-child{margin-bottom:0}

/* Ziyara style — slightly more solemn */
.c-zv{display:flex;gap:12px;margin-bottom:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.015);border-left:2px solid rgba(201,168,76,0.2)}
.c-zv-text{font-size:var(--inv-fr-size,13.5px);line-height:1.82;color:#cec6b0}

/* Trilingual verse (Arabic + transliteration + French) */
.c-tri{margin-bottom:14px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);transition:background .2s}
.c-tri:hover{background:rgba(201,168,76,0.04);border-color:rgba(201,168,76,0.1)}
.c-tri-ar{font-family:'Amiri Quran',serif;font-weight:400;font-size:var(--inv-ar-size,1.25rem);color:#c9a84c;direction:rtl;text-align:right;line-height:2;margin-bottom:6px}
.c-tri-tr{font-size:var(--inv-tr-size,1.1rem);color:#9aa3b8;font-style:italic;line-height:1.6;margin-bottom:6px;padding-left:2px}
.c-tri-fr{font-size:var(--inv-fr-size,0.88rem);color:#cec6b0;line-height:1.75;text-align:justify;hyphens:auto}

body:not(.show-ar) .c-tri-ar, body:not(.show-ar) .c-zv-ar { display: none !important; }
body:not(.show-tr) .c-tri-tr { display: none !important; }
body:not(.show-fr) .c-tri-fr, body:not(.show-fr) .c-zv-text, body:not(.show-fr) .c-verse, body:not(.show-fr) .c-prose, body:not(.show-fr) .c-intro { display: none !important; }

.c-zv-ar{font-family:'Amiri',serif,sans-serif;font-size:var(--inv-ar-size,14px);color:#c9a84c;opacity:.75;direction:rtl;margin-top:4px;font-style:italic}
/* ── Font size controls ── */
.inv-fc{display:none;justify-content:flex-end;padding:8px 16px 0;gap:6px}
.inv-fc.show{display:flex}
.inv-fc .fc-toggles{display:flex;gap:12px;margin-right:auto;align-items:center;font-size:12px;color:#9aa3b8}
.inv-fc .fc-toggles label{cursor:pointer;display:flex;align-items:center;gap:4px}
.inv-fc .fc-toggles input{cursor:pointer}
.inv-fc .fc-grp{display:flex;align-items:center;gap:2px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:8px;padding:2px 4px}
.inv-fc .fc-label{font-size:10px;color:#c9a84c;opacity:0.6;padding:0 4px;min-width:16px;text-align:center}
.inv-fc .fc-label.ar-l{font-family:'Amiri',serif;font-size:14px}
.inv-fc .fc-btn{background:none;border:none;color:#c9a84c;font-size:15px;cursor:pointer;padding:3px 6px;border-radius:4px;line-height:1;transition:background .15s}
.inv-fc .fc-btn:hover{background:rgba(201,168,76,0.18)}
</style>
</head>

      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الأسْتِعاذةِ مِن الْمَكارِهِ وسيِّئ الأخْلاقِ ومذامِّ الأفعالِ', fr:'La huitième supplication : en demandant refuge contre des choses détestables, des défauts moraux, et des actions reprochables'},
        {t:'tri', ar:'اللَّهُمَّ إِنِّي أَعُوذُ بِكَ', tr:'allâhumma innî a’ûdhu bika', fr:'Ô Dieu! je cherche refuge en Toi'},
        {t:'tri', ar:'مِنْ هَيَجَانِ الْحِرْصِ', tr:'min hayajâni alhirşi', fr:'de l’agitation du désir intense de l’avarice,'},
        {t:'tri', ar:'وَسَوْرَةِ الْغَضَبِ', tr:'wa sawrati alghadabi', fr:'de la violence du courroux,'},
        {t:'tri', ar:'وَغَلَبَةِ الْحَسَدِ', tr:'wa ghalabati alhasadi', fr:'de la domination de la jalousie,'},
        {t:'tri', ar:'وَضَعْفِ الصَّّبْرِ', tr:'wa da fi aşşabri', fr:'de la fragilité de la patience,'},
        {t:'tri', ar:'وَقِلَةِ الْقَنَاعَةِ', tr:'wa gillati alqanâ ati', fr:'du manque de sobriété,'},
        {t:'tri', ar:'وَشَكَاسَةِ الْخُلُقِ', tr:'wa chakâsati alkhuluqi', fr:'du caractère maussade'},
        {t:'tri', ar:'وَإِلْحَاحِ الشَّهْوَةِ', tr:'wa ilhâhl achchahwati', fr:'de l’urgence de la passion,'},
        {t:'tri', ar:'وَمَلَكَةِ الْحَمِيَّةِ', tr:'wa malakati alhamiyyati', fr:'de la disposition envers la véhémence,'},
        {t:'tri', ar:'وَمُتَابَعَةِ الْهَوَى', tr:'wa mutâba ‘ati alhawâ', fr:'de l’action de suivre le caprice.'},
        {t:'tri', ar:'وَمُخَالَفَةِ الْهُدَى', tr:'wa mukhâlafati alhudâ', fr:'de l’opposition contre la juste direction (la bonne voie),'},
        {t:'tri', ar:'وَسِنَةِ الْغَفْلَةِ', tr:'wa sinati alghaflati', fr:'du sommeil de la négligence,'},
        {t:'tri', ar:'وَتَعَاطِي الْكُلْفَةِ', tr:'wa ta âți alkulfati', fr:'de l’exagération du labeur,'},
        {t:'tri', ar:'وَإِيثَارِ الْبَاطِلِ عَلَى الْحَقِّ', tr:'wa îthâri albâțili ‘alâ alhaqqi', fr:'de la préférence de la fausseté envers la vérité,'},
        {t:'tri', ar:'وَالإِصْرَارِ عَلَى الْمَأْثَمِ', tr:'wal-işrâri ‘alâ alma’thami', fr:'de la persistance dans le pèchè,'},
        {t:'tri', ar:'وَاسْتِصْغَارِ الْمَعْصِيَةِ', tr:'wa istişghâri alma’şiyati', fr:'de la minimisation de la désobéissance,'},
        {t:'tri', ar:'وَاسْتِكْبَارِ الطَّاعَةِ', tr:'wastikbâri ațțâ’ ati', fr:'de l’agrandissement exagéré de l’obéissance,'},
        {t:'tri', ar:'وَمُبَاهَاةِ الْمُكْثِرِينَ', tr:'wa mubâhâti almukthirina', fr:'de la rivalité avec les riches,'},
        {t:'tri', ar:'وَالإِزْرَاءِ بِالْمُقِلِّينَ', tr:'wal-izrâ’i bilmuqillina', fr:'du mépris pour les pauvres,'},
        {t:'tri', ar:'وَسُوء الْوَلايَةِ لِمَنْ تَحْتَ أَيْدِينَا', tr:'wa sû’i alwilâyati liman tahta aydîna', fr:'de la négligence envers les subalternes,'},
        {t:'tri', ar:'وَتَرْكِ الشُكْرِ لِمَنِ اصْطَنَعَ الْعَارِفَةَ عِنْدَنَا', tr:'wa tarki achchukri liman iștana’a al’ârifata ‘indanâ', fr:'du manque de gratitude envers ceux qui nous ont faits'},
        {t:'tri', ar:'أَوْ أَنْ نَعْضُدَ ظَالِما', tr:'aw an na duda zâliman', fr:'du bien, du fait d’aider un malfaiteur,'},
        {t:'tri', ar:'أَوْ نَخْذُلَ مَلْهُوفا', tr:'aw nakhdhula malhûfan', fr:'d’abandonner quelqu’un qui demande du secours,'},
        {t:'tri', ar:'أَوْ تَرُومَ مَا لَيْسَ لَنَا بِحَقِّ', tr:'aw narûma mâ laysa lanâ bihaqqin', fr:'de vouloir ce qui n’est point par droit notre dû,'},
        {t:'tri', ar:'أَوْ تَقُولَ فِي الْعِلْمِ بِغَيْرِ عِلْمِ', tr:'aw naqûla fi al’ilmi bighayri ‘ilmin', fr:'et de parler d’un savoir (connaissance), sans savoir.'},
        {t:'tri', ar:'وَنَعوذُ بِكَ أَنْ تَنْطَوِيَ عَلَى غِشِّ أَحَدٍ', tr:'wa na’ûdhu bika an nanțawiya ‘alâ ghichchi ahadin', fr:'Nous cherchons refuge en Toi, pour ne pas nourrir la trahison contre quelqu’un,'},
        {t:'tri', ar:'وَأَنْ نُعْجِبَ بِأَعْمَالِنَا', tr:'wa an nu jiba bi-a’mâlinâ', fr:'pour ne pas être satisfait de nos actions,'},
        {t:'tri', ar:'وَنَمُدَّ فِي آمَالِنَا', tr:'wa namudda fi âmâlina', fr:'et d’allonger nos espérances.'},
        {t:'tri', ar:'وَنَعُوذُ بِكَ مِنْ سُوءِ السَّرِيرَةِ', tr:'wa na’ûdhu bika min súi assarirati', fr:'Nous cherchons refuge en Toi de toute malice et malveillance,'},
        {t:'tri', ar:'وَاحْتِقَارِ الصَّغِيرَةِ', tr:'wa ihtiqâri assaghirati', fr:'de négliger et rapetisser les péchés,'},
        {t:'tri', ar:'وَأَنْ يَسْتَحْوِذَ عَلَيْنَا الشَّيْطَانُ', tr:'wa an yastahwidha ‘alayna achchaytânu', fr:'du pouvoir de Satan à nous dominer,'},

        {t:'tri', ar:'أَوْ يَتَهَضَّمُنَا السُّلْطَانُ', tr:'aw yatahaddamuna assultanu', fr:'et du tyran qui nous oppresse.'},
        {t:'tri', ar:'وَنَعُوذُ بِكَ مِنْ تَنَاوُلِ الإِسْرَافِ', tr:'wa na’ûdhu bika min tanâwuli al-isrâfi', fr:'Nous cherchons refuge en Toi de ne point d’agir avec prodigalité,'},
        {t:'tri', ar:'وَمِنْ فِقْدَانِ الْكَفَافِ', tr:'wa min figdâni alkafâfi', fr:'et de même, de ne pas avoir suffisamment de subsistance.'},
        {t:'tri', ar:'وَنَعُوذُ بِكَ مِنْ شَمَائَةٍ الأَعْدَاءِ', tr:'wa na’ûdhu bika min chamâtati al- a ‘dâ’i', fr:'Nous cherchons refuge en Toi des réprimandes des ennemis,'},
        {t:'tri', ar:'وَمِنَ الْفَقْرِ إِلَى الأَكْفَاءِ', tr:'wa mina alfaqri ilâ al-akfa’i', fr:'et de sentir quelqu’indigence envers nos semblables,'},
        {t:'tri', ar:'وَمِنْ مَعِيشَةٍ فِي شِدَّةٍ', tr:'wa min ma’îchatin fi chiddatin', fr:'et de vivre dans la souffrance (rigueur)'},

        {t:'tri', ar:'وَنَعُوذُ بِكَ مِنَ الْحَسْرَةِ الْعُظْمَى', tr:'wa na’ûdhu bika mina alhasrati al’uzmâ', fr:'Nous cherchons refuge en Toi du remord le plus atroce,'},

    's9': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '9. Invocation dans Son Désir',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation pour le désir d\'implorer Dieu',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الأشْتِياقِ إِلى طلبِ الْمغْفِرةِ مِن اللّهِ جَلّ جَلالُهُ', fr:'La neuvième supplication: en désirant ardemment le Pardon de Dieu'},
        {t:'tri', ar:'اللَّهُمَّ صَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَصَيِّرْنَا إِلَى مَحْبُوبِكَ مِنَ التَّوْبَةِ', tr:'wa şayyirna ila mahbûbika mina attawbati', fr:'Fais-nous avancer vers le repentir que,'},
        {t:'tri', ar:'وَأَزِلْنَا عَنْ مَكْرُوهِكَ مِنَ الإِصْرَارِ', tr:'wa azilnâ ‘an makrûhika mina al-işrâri', fr:'Tu aimes (et approuves) tant, et fais-en sorte que nous laissions de côté la persistance que, Tu détestes tant !'},
        {t:'tri', ar:'اللَّهُمَّ وَمَتَى وَقَفْنَا بَيْنَ نَقْصَيْنِ فِي دِينٍ أَوْ دُنْيَا', tr:'allâhumma wamatâ waqafna bayna naqsayni fi dînin aw dunyan', fr:'Ô Dieu! quand nous faisons halte devant deux décrets, que ce soit dans la religion ou les affaires de ce monde,'},
        {t:'tri', ar:'فَأَوْقِعِ النَّقْصَ بِأَسْرَعِهِمَا قَنَاءً', tr:'fa awai’ annaqsa bi-asra ‘ihimâ fanâ’an', fr:'Fais-en sorte que Ton Décret tombe sur celui qui passe rapidement,'},
        {t:'tri', ar:'وَاجْعَلِ التَّوْبَةَ فِي أَطْوَلِهِمَا بَقَاءً', tr:'waj’al attawbata fi ațwalihimâ baqâ’an', fr:'et ralentis (radoucis-Toi) sur celui qui dure le plus !'},
        {t:'tri', ar:'وَإِذَا هَمَمْنَا بِهَمَّيْنِ', tr:'wa idhâ hamamnâ bihammayni', fr:'Quand nous doutons quant à accomplir deux choses,'},
        {t:'tri', ar:'يُرْضِيكَ أَحَدُهُمَا عَنَّا', tr:'yurdika ahaduhumâ ‘annâ', fr:'et dont l’une d’entre elles Te rend Satisfait de nous,'},
        {t:'tri', ar:'وَيُسخِطُكَ الآخَرُ عَلَيْنَا', tr:'wa yuskhițuka al- âkharu ‘alaynâ', fr:'et l’autre Te rend Mécontent de nous,'},
        {t:'tri', ar:'فَمِلْ بِنَا إِلَى مَا يُرْضِيكَ عَنَّا', tr:'famil binâ ilâ mâ yurdika ‘annâ', fr:'Incline-nous vers ce qui Te rend Satisfait,'},
        {t:'tri', ar:'وَأَوْهِنْ قُوَّتَنَا عَمَّا يُسْخِطُكَ عَلَيْنَا', tr:'wa awhin quwwatanâ ‘ammâ yuskhițuka ‘alaynâ', fr:'et affaiblis notre force envers ce qui Te rend Mécontent !'},
        {t:'tri', ar:'وَلَاَ تُخَلِّ فِي ذَلِكَ بَيْنَ نُفُوسِنَا وَاخْتِيَارِهَا', tr:'wa lâ tukhalli fi dhâlika bayna nufûsinâ wa ikhtiyârihâ', fr:'Ne délaisse pas nos âmes comme les seules à décider de cela,'},
        {t:'tri', ar:'فَإِنَّهَا مُخْتَارَةٌ لِلْبَاطِلِ إِلاَّا مَا وَفَّقْتَ', tr:'fa innahâ mukhtâratun lilbâțili illâ mâ waffaqta', fr:'car elles choisissent la fausseté, excepté pour celui à qui Tu accordes du succès,'},
        {t:'tri', ar:'أَمَّارَةٌ بالسُّوءِ إلاَّ مَا رَحِمْتَ', tr:'ammâratun bi assû’i illâ mâ rahimta', fr:'et elle commande à tout ce qui est mal, excepté pour celui à qui Tu accordes la Miséricorde !'},
        {t:'tri', ar:'اللَّهُمَّ وَإِنَّكَ مِنَ الضَّعْفِ خَلَقْتَنَا', tr:'allâhumma wa innaka mina adda fi khalaqtanâ', fr:'Ô Dieu! Tu nous créas fragiles, et nous formas avec la faiblesse'},
        {t:'tri', ar:'وَعَلَى الْوَهْنِ بَنَيْتَنَا', tr:'wa ‘alâ alwahni banaytana', fr:'et l’impuissance, et provoquas (entamas – inauguras) notre commencement'},
        {t:'tri', ar:'وَمِنْ مَاءِ مَهِينٍ ابْتَدَأْتَنَا', tr:'wa min mâ’in mahînin ibtada’tanâ', fr:'d’une eau insignifiante;'},
        {t:'tri', ar:'فَلَاَ حَوْلَ لَنَا إِلاَّ بِقُوَّتِكَ', tr:'falâ hawla lanâ illâ biquwwatika', fr:'nous n’avons aucune force, excepté par Ton Pouvoir,'},
        {t:'tri', ar:'وَلَا قُوَّةَ لَنَا إِلاَّا بِعَوْنِكَ', tr:'wa lâ quwwata lanâ illâ bi’awnika', fr:'et aucun pouvoir, excepté par Ton Aide.'},
        {t:'tri', ar:'فَأَيِّدْنَا بِتَوْفِيقِكَ', tr:'fa ayyidna bitawfiqika', fr:'Ainsi, confirme-nous, en nous donnant du succès,'},
        {t:'tri', ar:'وَسَدِّدْنَا بِتَسْدِيدِكَ', tr:'wa saddidnâ bitasdîdika', fr:'Affermis-nous dans le droit chemin,'},
        {t:'tri', ar:'وَأعْمِ أَبْصَارَ قُلُوبِنَا عَمَّا خَالَفَ مَحبَّتَكَ', tr:'wa a’mi absâra qulûbinâ ‘ammâ khâlafa mahabbataka', fr:'par la fermeté que Tu nous accordes, aveugle les yeux de nos coeurs vers tout ce qui est en opposition avec Ton Amour,'},
        {t:'tri', ar:'وَلَا تَجْعَلَ لِشَيءِ مِنْ جَوَارِحِنَا نُفُوذاً فِي مَعْصِيَتِكَ', tr:'wa lâ taj al lichay’in min jawârihinâ nufûdhan fi ma’şiyatika', fr:'et ne laisse à aucun de nos membres la possibilité de commettre une désobéissance.'},
        {t:'tri', ar:'اللَّهُمَّ فَصَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allahumma faşalli ‘alâ muhammadin wa âlihiî', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَاجْعَلْ هَمَسَاتِ قُلُوبِنَا', tr:'waj’al hamasâti qulûbinâ', fr:'et désigne toute chose de sorte que les murmures de nos coeurs,'},
        {t:'tri', ar:'وَحَرَكَاتِ أَعْضَائِنَا', tr:'wa harakâti a dâ’inâ', fr:'les mouvements de nos membres,'},
        {t:'tri', ar:'وَلَمَحَاتِ أَعْيُنِنَا', tr:'wa lamahâti a’yuninâ', fr:'les regards de nos yeux,'},
        {t:'tri', ar:'وَلَهَجَاتِ أَلْسِنَتِتنَا', tr:'wa lahajâti alsinatinâ', fr:'et les idiomes de nos langues,'},
        {t:'tri', ar:'فِي مُوجِبَاتِ ثَوَابِكَ', tr:'fi mûjibâti thawâbika', fr:'soient dignes de Ta Récompense,'},

        {t:'tri', ar:'وَلَاَ تَبْقَى لَنَا سَيِّئَةٌ نَسْتَوْجِبُ بِهَا عِقَابَكَ.', tr:'wa lâ tabqâ lanâ sayyi’atun nastawjibu bihâ ‘iqâbaka', fr:'ou bien qu’aucune mauvaise action ne reste avec nous, ni par laquelle nous puissions subir Ta Punition. ✦ Découvrez : Le Chiisme ! Le Coran en français Les clés du Paradis (Mafatih al Jinan) #text-309840903 { line-height: 0.95; } ✦ Toutes les supplications de la Sahîfa Sajjâdiyya ✦ Supplication 1 : Prière sur l’unicité de Dieu et sa louange ✦ Supplication 2 : Prière pour les bénédictions sur le prophète ✦ Supplication 3 : Prière pour les anges et les porteurs du trône ✦ Supplication 4 : Prière pour les fidèles des prophètes ✦ Supplication 5 : Prière pour lui-même, ses amis et ses proches ✦ Supplication 6 : Prière pour le matin et la nuit ✦ Supplication 7 : Prière pour les épreuves et la détresse ✦ Supplication 8 : Prière pour chercher refuge contre les épreuves ✦ Supplication 9 : Prière pour le pardon et la miséricorde de Dieu ✦ Supplication 10 : Prière pour se réfugier auprès de Dieu ✦ Supplication 11 : Prière pour une bonne fin ✦ Supplication 12 : Prière de confession et de demande de repentir ✦ Supplication 13 : Prière pour la satisfaction des besoins auprès de Dieu ✦ Supplication 14 : Prière pour les opprimés et contre les injustes ✦ Supplication 15 : Prière en cas de maladie ou d’affliction ✦ Supplication 16 : Prière pour le pardon des péchés et défauts ✦ Supplication 17 : Prière pour demander protection contre Satan ✦ Supplication 18 : Prière contre le mal et pour le bien-être ✦ Supplication 19 : Prière pour la pluie pendant la sécheresse ✦ Supplication 20 : Prière pour les nobles caractères ✦ Supplication 21 : Prière lors de la tristesse et de l’angoisse ✦ Supplication 22 : Prière dans les difficultés et les affaires troublées ✦ Supplication 23 : Prière pour le bien-être et remerciements à Dieu ✦ Supplication 24 : Prière pour les parents ✦ Supplication 25 : Prière des parents pour leurs enfants ✦ Supplication 26 :     's10': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '10. Invocation à la Recherche du Refuge de Dieu',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation pour chercher refuge auprès de Dieu',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي اللّجَإِ إِلى اللّهِ تعالى', fr:'La dixième supplication: en cherchant refuge et asile auprès de Dieu'},
        {t:'tri', ar:'اللَّهُمَّ إنْ تَشَأْ تَعْفُ عَنَّا فَبِفَضْلِكَ', tr:'allâhumma in tacha ta fu ‘annâ fabifadlika', fr:'Ô Dieu! Si Tu veux, Tu pourrais nous pardonner de par Ta Grâce,'},
        {t:'tri', ar:'وَإِنْ تَشَأْ تُعَذَبْنَا فَبِعَدْلِكَ', tr:'wa in tacha’ tu adhdhibnâ fabi’adlika', fr:'et si Tu veux, Tu nous châtieras de par Ta Justice.'},
        {t:'tri', ar:'فَسَهِّلْ لَنَا عَفْوَكَ بِمَنِّكَ', tr:'fasahhil lanâ ‘afwaka bimannika', fr:'Ainsi, adoucis nos chemins vers Ton Pardon, et que cela advienne de par Ta Bonté.'},
        {t:'tri', ar:'وَأَجِرْنَا مِنْ عَذَابِكَ بِتَجَاوُزِكَ', tr:'wa ajirnâ min ‘adhâbika bi tajâwuzika', fr:'et préserve-nous de Ton Châtiment, de par Ton Indulgence,'},
        {t:'tri', ar:'فَإِنَّهُ لاَ طَاقَةَ لَنَا بِعَدْلِكَ', tr:'fa innahû lâ tâqata lanâ bi’adlika', fr:'car aucun de nous ne pourrait endurer Ta Justice,'},
        {t:'tri', ar:'وَلَاَ نَجَاةَ لأَحَدٍ مِنَّا دُونَ عَفْوِكَ', tr:'wa la najâta li- ahadin minnâ dûna ‘afwika', fr:'et aucun de nous ne pourrait accéder à la délivrance et la survie, sans Ton Pardon !'},
        {t:'tri', ar:'يَا غَنِيَّ الأَغْنِيَاءِ', tr:'ya ghaniyya al- aghniyâ’i', fr:'Ô Le plus Riche des riches !'},
        {t:'tri', ar:'هَا نَحْنُ عِبَادُكَ بَيْنَ يَدَيْكَ', tr:'hâ nahnu ‘ibâduka bayna yadayka', fr:'Nous voilà, ici, comme Tes serviteurs, devant Toi.'},
        {t:'tri', ar:'وَأَنَا أَفْقَرُ الْفُقَرَاءِ إِلَيْكَ', tr:'wa ana afqaru alfuqarâ’i ilayka', fr:'Je suis le plus pauvre des pauvres.'},
        {t:'tri', ar:'فَاجْبُرْ فَاقَتَنَا بِوُسْعِكَ', tr:'fajbur fâqatanâ biwus’ika', fr:'Par conséquent, de par Ta Plénitude, redresse (répare) nos besoins,'},
        {t:'tri', ar:'وَلَاَ تَقْطَعْ رَجَاءنَا بِمَنْعِكَ', tr:'wa lâ taqta’ rajâ’anâ biman ‘ika', fr:'et de par Ton Refus, ne nous arrache point de nos espoirs,'},
        {t:'tri', ar:'فَتَكُونَ قَدْ أَشْقَيْتَ مَنِ اسْتَسْعَدَ بِكَ', tr:'fatakûna qad achqayta man istas’ada bika', fr:'à moins que Tu ne veuilles rendre malheureux celui qui a cherché le bonheur chez Toi,'},
        {t:'tri', ar:'وَحَرَمْتَ مَنِ اسْتَرْفَدَ فَضْلَكَ', tr:'wa haramta man istarfada fadlaka', fr:'et dépriver de Ton Aide, celui qui l’a cherché dans Ta Grâce !'},
        {t:'tri', ar:'فَإِلَى مَنْ حِينَئِذٍ مُنْقَلَبُنَا عَنْكَ؟', tr:'fa ilâ man hina’idhin munqalabuna ‘anka', fr:'Et puis, vers qui pourrions-nous nous tourner ?'},
        {t:'tri', ar:'وَإِلَى أَيْنَ مَذْهَبُنَا عَنْ بَابِكَ؟', tr:'wa ilâ ayna madh- habunâ ‘an bâbika', fr:'Où pourrions-nous nous en aller de Ta Porte ?'},
        {t:'tri', ar:'سُبْحَانَكَ نَحْنُ الْمُضْطَرُّونَ الَّذِينَ أَوْجَبْتَ إِجَابَتَهُمْ', tr:'subhânaka nahnu almudțarrûna alladhîna awjabta ijâbatahum', fr:'Gloire à Toi ! Nous sommes ceux qui sont en détresse, ceux dont les supplications doivent être obligatoirement écoutées par Toi:'},
        {t:'tri', ar:'وَأَهْلُ السُّوء الَّذِينَ وَعَدْتَ الْكَشْفَ عَنْهُمْ', tr:'wa ahlu assû’i alladhîna wa’adta alkachfa ‘anhum', fr:'les gens auxquels Tu as promis de leur enlever tout méfait !'},
        {t:'tri', ar:'وَأَشْبَهُ الأَشْيَاءِ بِمَشِيَّتِكَ', tr:'wa achbahu al- achya’i bimachi’atika', fr:'Et ce qui ressemble le plus à Ta Volonté,'},
        {t:'tri', ar:'وَأَوْلَى الأُمُورِ بِكَ فِي عَظَمَتِك', tr:'wa awla al-umûri bika fi ‘azamatika', fr:'et l’affaire qui a la plus de valeur pour Toi, dans Ta Grandeur et dans Ton Pouvoir,'},
        {t:'tri', ar:'رَحْمَةُ مَنِ اسْتَرْحَمَكَ', tr:'rahmatu man istarhamaka', fr:'c’est de montrer de la Clémence à celui qui T’en demande !'},
        {t:'tri', ar:'وَغَوْثُ مَنِ اسْتَغَاثَ بِكَ', tr:'wa ghawthu man istaghâtha bika', fr:'Et Secours à celui qui T’en demande !'},
        {t:'tri', ar:'فَارْحَمْ تَضَرُّعَنَا إِلَيْكَ', tr:'farham tadarru anâ ilayka', fr:'Ainsi, accorde-nous la Miséricorde à cause de nos plaidoiries envers Toi !'},
        {t:'tri', ar:'وَأَغْنِنَا إِذْ طَرَحْنَا أَنْفُسَنَا بَيْنَ يَدَيْكَ', tr:'wa aghninâ idh țarahnâ anfusana bayna yadayka', fr:'et libère-nous de tout besoin, quand nous nous jetons à terre devant Toi !'},
        {t:'tri', ar:'اللَّهُمَّ إِنَّ الشَّيْطَانَ قَدْ شَمِتَ بنَا', tr:'allâhumma inna achchaytâna qad chamita binâ', fr:'Ô Dieu ! Si nous suivons Satan en Te désobéissant,'},
        {t:'tri', ar:'إِذْ شَايَعْنَاهُ عَلَى مَعْصِيَتَكَ', tr:'idh châya nâhu ‘alâ ma’șiyataka', fr:'il se moquera de nous, par conséquent,'},
        {t:'tri', ar:'فَصَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'faşalli ‘alâ muhammadin wa âlihi', fr:'Bénis Mohammad et toute sa Famille,'},

        {t:'tri', ar:'وَرَغْبَتِنَا عَنْهُ إِلَيْكَ.', tr:'wa raghbatina ‘anhû ilayka', fr:'et Te supplions contre lui! ✦ Découvrez : Le Chiisme ! Le Coran en français Les clés du Paradis (Mafatih al Jinan) #text-1010743500 { line-height: 0.95; } ✦ Toutes les supplications de la Sahîfa Sajjâdiyya ✦ Supplication 1 : Prière sur l’unicité de Dieu et sa louange ✦ Supplication 2 : Prière pour les bénédictions sur le prophète ✦ Supplication 3 : Prière pour les anges et les porteurs du trône ✦ Supplication 4 : Prière pour les fidèles des prophètes ✦ Supplication 5 : Prière pour lui-même, ses amis et ses proches ✦ Supplication 6 : Prière pour le matin et la nuit ✦ Supplication 7 : Prière pour les épreuves et la détresse ✦ Supplication 8 : Prière pour chercher refuge contre les épreuves ✦ Supplication 9 : Prière pour le pardon et la miséricorde de Dieu ✦ Supplication 10 : Prière pour se réfugier auprès de Dieu ✦ Supplication 11 : Prière pour une bonne fin ✦ Supplication 12 : Prière de confession et de demande de repentir ✦ Supplication 13 : Prière pour la satisfaction des besoins auprès de Dieu ✦ Supplication 14 : Prière pour les opprimés et contre les injustes ✦ Supplication 15 : Prière en cas de maladie ou d’affliction ✦ Supplication 16 : Prière pour le pardon des péchés et défauts ✦ Supplication 17 : Prière pour demander protection contre Satan ✦ Supplication 18 : Prière contre le mal et pour le bien-être ✦ Supplication 19 : Prière pour la pluie pendant la sécheresse ✦ Supplication 20 : Prière pour les nobles caractères ✦ Supplication 21 : Prière lors de la tristesse et de l’angoisse ✦ Supplication 22 : Prière dans les difficultés et les affaires troublées ✦ Supplication 23 : Prière pour le bien-être et remerciements à Dieu ✦ Supplication 24 : Prière pour les parents ✦ Supplication 25 : Prière des parents pour leurs enfants ✦ Supplication 26 : Prière pour les voisins et les amis ✦ Supplication 27 : Prière pour les gardiens des frontières ✦ Supplication 28 : Prière pour chercher refuge auprès de Dieu ✦ Supplication 29 : Prière en cas de restriction de subsistance ✦ Supplication 30 : Prière pour l’aide à s’acquitter des dettes ✦ Supplication 31 : Prière pour le repentir sincère ✦ Supplication 32 : Prière après la Prière nocturne ✦ Supplication 33 : Prière pour demander le meilleur et le bien ✦ Supplication 34 : Prière face à la honte du péché et l’affliction ✦ Supplication 35 : Prière pour la satisfaction divine ✦ Supplication 36 : Prière en regardant les nuages et le tonnerre ✦ Supplication 37 : Prière pour avouer son incapacité à rendre grâce ✦ Supplication 38 : Prière pour les manquements envers autrui ✦ Supplication 39 : Prière pour le pardon et la grâce divine ✦ Supplication 40 : Prière au souvenir de la mort ✦ Supplication 41 : Prière pour la protection et la couverture des fautes ✦ Supplication 42 : Prière à la fin de la lecture du Coran ✦ Supplication 43 : Prière en regardant le croissant lunaire ✦ Supplication 44 : Prière à l’arrivée du mois de Ramadan ✦ Supplication 45 : Prière pour faire ses adieux au mois de Ramadan ✦ Supplication 46 : Prière après les prières de l’aïd et du vendredi ✦ Supplication 47 : Prière du jour d’Arafa ✦ Supplication 48 : Prière pour le jour de l’aïd al-adha et du vendredi ✦ Supplication 49 : Prière pour repousser les ennemis et leurs ruses ✦ Supplication 50 : Prière dans la crainte révérencielle de Dieu ✦ Supplication 51 : Prière de soumission et d’humilité devant Dieu ✦ Supplication 52 : Prière pour l’insistance dans les demandes à Dieu ✦ Supplication 53 : Prière pour manifester son humiliation devant Dieu ✦ Supplication 54 : Prière pour éloigner tristesse et inquiétudes ✍️ Rédigé par : Seyed Ali Mousavi ✦ Spécialiste en sciences islamiques et chiites depuis 2004, je partage réflexions, savoirs et perspectives sur Le Chiisme.Avec une plume inspirée et une vision éclairée, j\'invite chaque âme à explorer l\'islam et à cheminer vers un monde meilleur. #text-1704823515 { line-height: 1.45; } Votre ad     's11': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '11. Invocation pour les Bons Résultats',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation pour obtenir une fin heureuse',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ بِخواقِمِ الْخَيْرِ', fr:'La onzième supplication: pour recevoir une bonne fin de vie, et pour que toute chose se termine bien'},
        {t:'tri', ar:'يَا مَنْ ذِكْرُهُ شَرَفٌ لِلذَّاكِرِينَ', tr:'ya man dhikruhû charafun lidhdhâkirina', fr:'Ô Celui dont la prononciation de Son Nom, offre Honneur à ceux qui Le prononcent!'},
        {t:'tri', ar:'وَيَا مَنْ شُكْرُهُ فَوْزٌ لِلشَّاكِرِينَ', tr:'wa ya man chukruhû fawzun lichchâkirîna', fr:'Ô Celui dont le remerciement amène triomphe à ceux qui Le remercient !'},
        {t:'tri', ar:'وَيَا مَنْ طَاعَتُهُ نَجَاةٌ لِلْمُطِيعِينَ', tr:'wa ya man tâ’ atuhû najâtun lilmuți ‘îna', fr:'Ô Celui, dont l’obéissance amène délivrance pour les obéissants !'},
        {t:'tri', ar:'صَلِّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'șalli ‘alâ muhammadin wa âlihii', fr:'Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَاشْغَلْ قُلُوبَنَا بِذِكْرِكَ عَنْ كُلّ ذِكْرٍ', tr:'wa achghil qulubana bidhikrika ‘an kulli dhikrin', fr:'et occupe nos coeurs par notre rappel de Toi, par toutes sortes de souvenirs;'},
        {t:'tri', ar:'وَأَلْسِنَتَنَا بِشُكْرِكَ عَنْ كُلِّ شُكْرٍ', tr:'wa alsinatanâ bichukrika ‘an kulli chukrin', fr:'nos langues par notre gratitude envers Toi, et par touts sortes d’actions de reconnaissance'},
        {t:'tri', ar:'وَجَوَارِحَنَا بِطَاعَتِكَ عَنْ كُلِّ طَاعَةٍ', tr:'wa jawârihanâ bițâ atika ‘an kulli tâ atin', fr:'et de remerciement; nos membres par notre obéissance de Toi par toutes sortes d’actions d’obéissance !'},
        {t:'tri', ar:'فَإِنْ قَدَّرْتَ لَنَا فَرَاغا مِنْ شُغْلٍ', tr:'fa in qaddarta lanâ farâghan min chughlin', fr:'Si Tu as décidé de par Ta Providence, une récréation pour nos occupations,'},
        {t:'tri', ar:'فَاجْعَلْهُ فَرَاغَ سَلَاَمَةٍ', tr:'faj alhû farâgha salâmatin', fr:'fais-nous en une oisiveté sans danger,'},
        {t:'tri', ar:'لاَ تُدْرِكُنَا فِيهِ تَبِعَةٌ', tr:'lâ tudrikunâ fihi tabi’atun', fr:'et dont aucune mauvaise conséquence ne la suive,'},
        {t:'tri', ar:'وَلَا تَلْحَقُنَا فِيهِ سَأْمَةٌ', tr:'wa lâ talhaqunâ fihi sa’matun', fr:'et dont aucune fatigue ne nous frappe !'},
        {t:'tri', ar:'حَتَّى يَنْصَرِفَ عَنَّا كُتَّابُ السَّيِّئَاتِ', tr:'hattâ yanşarifa ‘annâ kuttâbu assayyi’âti', fr:'Après que les écrivains des mauvaises actions nous quittent,'},
        {t:'tri', ar:'صَحِيفَةٍ خَالِيَةٍ مِنْ ذِكْرِ سَيِّئَاتِنَا', tr:'bişahîfatin khâliyatin min dhikri sayyi’âtinâ', fr:'et s’en vont avec une page blanche, vide de toute mention de nos mauvaises actions,'},
        {t:'tri', ar:'وَيَتَولَّى كُتَّابُ الْحَسَنَاتِ عَنَّا', tr:'wa yatawlla kuttâbu alhasanâti ‘annâ', fr:'et de même, les écrivains des bonnes actions s’en retournent'},
        {t:'tri', ar:'مَسْرُورِينَ بِمَا كَتَبُوا مِنْ حَسَنَاتِنَا', tr:'masrûrina bimâ katabû min hasanâtina', fr:'touts contents de nos bonnes actions, qu’ils ont inscrites sur notre compte.'},
        {t:'tri', ar:'وَإِذَا انْقَضَتْ أَيَّامُ حَيَاتِنَا', tr:'wa idhâ inqadat ayyâmu hayâtinâ', fr:'Et quand les jours de notre vie auront été écoulés,'},
        {t:'tri', ar:'وَتَصَرَّمَتْ مُدَدُ أَعْمَارِنَا', tr:'wa taşarramat mudadu a’mârinâ', fr:'et la limite de sa durée aura été terminée,'},
        {t:'tri', ar:'وَاسْتَحْضَرَتْنَا دَعْوَتُكَ', tr:'wastahdaratnâ da’watuka', fr:'et Ton Appel, qui doit survenir'},
        {t:'tri', ar:'الَتِي لاَ بُدَّ مِنْهَا وَمِنْ إِجَابَتِهَا', tr:'allati lâ budda minhâ wa min ijâbatihâ', fr:'et être répondu nous convoque! Á ce moment,'},
        {t:'tri', ar:'فَصَلٌّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'faşalli ‘alâ muhammadin wa âlihi', fr:'Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَاجْعَلَ خِتَامَ مَا تُحْصِي عَلَيْنَا كَتَبَةُ أَعْمَالِنَا تَوْبَةً مَقْبُولَةً', tr:'waj’al khitâma mâ tuhșî ‘alaynâ katabatu a’mâlinâ tawbatan maqbûlatan', fr:'et transforme la conclusion de ce que les Écrivains de nos actions comptent contre nous, comme un repentir accepté de Ta Part,'},
        {t:'tri', ar:'لاَ تُوقِفُنَا بَعْدَهَا عَلَى ذَئْبِ اجْتَرَ حْنَاهُ', tr:'lâ tûqifunâ ba’dahâ ‘alâ dhanbin ijtarahnâhu', fr:'de sorte qu’après cela Tu ne nous reproches, ni ne nous admonestes point pour les mauvaises actions'},
        {t:'tri', ar:'وَلَا مَعْصِيَةٍ اقْتَرَقْنَاهَا', tr:'wa lâ ma’șiyatin iqtarafnâhâ', fr:'et la désobéissance que nous commîmes.'},
        {t:'tri', ar:'وَلَاَ تَكْشِفْ عَنَّا سِتْراً سَتَرْتَهُ', tr:'wa lâ takchif ‘annâ sitran satartahû', fr:'Ne soulève point devant les témoins, le voile avec lequel Tu nous as couverts,'},
        {t:'tri', ar:'عَلَى رُءُوسِ الأَشْهَادِ يَوْمَ تَبْلُو أَخْبَارَ عِبَادِكَ', tr:'alâ ru’ûsi al-ach- hâdi yawma tablü akhbâra ‘ibâdika', fr:'le jour où les dossiers de tous Tes serviteurs seront lus'},
        {t:'tri', ar:'إِنَّكَ رَحِيمٌ بِمَنْ دَعَاكَ', tr:'innaka rahîmun biman da’âka', fr:'Car, en vérité Tu es Clément envers celui qui Te supplie,'},

ation 28 : Prière pour chercher refuge auprès de Dieu ✦ Supplication 29 : Prière en cas de restriction de subsistance ✦ Supplication 30 : Prière pour l’aide à s’acquitter des dettes ✦ Supplication 31 : Prière pour le repentir sincère ✦ Supplication 32 : Prière après la Prière nocturne ✦ Supplication 33 : Prière pour demander le meilleur et le bien ✦ Supplication 34 : Prière face à la honte du péché et l’affliction ✦ Supplication 35 : Prière pour la satisfaction divine ✦ Supplication 36 : Prière en regardant les nuages et le tonnerre ✦ Supplication 37 : Prière pour avouer son incapacité à rendre grâce ✦ Supplication 38 : Prière pour les manquements envers autrui ✦ Supplication 39 : Prière pour le pardon et la grâce divine ✦ Supplication 40 : Prière au souvenir de la mort ✦ Supplication 41 : Prière pour la protection et la couverture des fautes ✦ Supplication 42 : Prière à la fin de la lecture du Coran ✦ Supplication 43 : Prière en regardant le croissant lunaire ✦ Supplication 44 : Prière à l’arrivée du mois de Ramadan ✦ Supplication 45 : Prière pour faire ses adieux au mois de Ramadan ✦ Supplication 46 : Prière après les prières de l’aïd et du vendredi ✦ Supplication 47 : Prière du jour d’Arafa ✦ Supplication 48 : Prière pour le jour de l’aïd al-adha et du vendredi ✦ Supplication 49 : Prière pour repousser les ennemis et leurs ruses ✦ Supplication 50 : Prière dans la crainte révérencielle de Dieu ✦ Supplication 51 : Prière de soumission et d’humilité devant Dieu ✦ Supplication 52 : Prière pour l’insistance dans les demandes à Dieu ✦ Supplication 53 : Prière pour manifester son humiliation devant Dieu ✦ Supplication 54 : Prière pour éloigner tristesse et inquiétudes ✍️ Rédigé par : Seyed Ali Mousavi ✦ Spécialiste en sciences islamiques et chiites depuis 2004, je partage réflexions, savoirs et perspectives sur Le Chiisme.Avec une plume inspirée et une vision éclairée, j\'invite chaque âme à explorer l\'islam et à cheminer vers un monde meilleur. #text-1103460920 { line     's12': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '12. Invocation pour la Confidence',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Invocation de confession et de demande de repentir',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِنْ دُعائِهِ عليْهِ السَّلامُ فِي الأعْتِرافِ وطلبِ التّوْبةِ إلى اللّهِ تعالى', fr:'La douzième supplication: pendant la confession et le sincère repentir envers Dieu'},
        {t:'tri', ar:'اللَّهُمَّ إِنَّهُ يَحْجُبُنِي عَنْ مَسْأَلَتِكَ خِلاَلٌ ثَلَاث', tr:'allâhumma innahû yahjubuni ‘an mas’alatika khilâlun thalâthun', fr:'Ô Dieu! Trois caractéristiques (comportements) m’ont empêchés de Te faire une demande,'},
        {t:'tri', ar:'وَتَحْدُونِي عَلَيْهَا خَلَّةٌ وَاحِدَةٌ', tr:'wa tahdûni ‘alayhâ khallatun wâhidatun', fr:'pendant qu’une seule et unique qualité m’a poussé à la former. je suis empêché par un'},
        {t:'tri', ar:'يَحْجُبُنِي أَمْرٌ أَمَرْتَ بِهِ فَأَبْطَأْتُ عَنْهُ', tr:'yahjubuni amrun amarta bihi fa abța’tu ‘anhu', fr:'ordre que Tu as commandè, et dont j’ai été bien lent à accomplir,'},
        {t:'tri', ar:'وَنَهْيٌ نَهَيْتَنِي عَنْهُ فَأَسْرَعْتُ إِلَيْهِ', tr:'wa nahyun nahaytani ‘anhû fa asra’tu ilayhi', fr:'Une interdiction que Tu as interdite, et dont je me suis dépêché,'},
        {t:'tri', ar:'وَنِعْمَةٌ أَنْعَمْتَ بِهَا عَلَيَّ فَقَصَّرْتُ فِي شُكْرِهَا', tr:'wa ni’matun an’amta bihâ ‘alayya faqaşşartu fi chukrihâ', fr:'et une faveur par laquelle Tu m’as favorisé, et dont j’ai manqué de montrer ma gratitude.'},
        {t:'tri', ar:'وَيَحْدُونِي عَلَى مَسْأَلَتِكَ', tr:'wa yahdûnî ‘alâ mas’alatika', fr:'Je suis poussé à le faire,'},
        {t:'tri', ar:'تَفَضُّلُكَ عَلَى مَنْ أَقْبَلَ بِوَجْهِهِ إِلَيْكَ', tr:'tafadduluka ‘alâ man aqbala biwajhihi ilayka', fr:'de par Ta Grâce gratuite pour celui qui tourne son visage vers Toi,'},
        {t:'tri', ar:'وَوَفَدَ بِحُسْنِ ظَنِّهِ إِلَيْكَ', tr:'wa wafada bihusni zannihî ilayka', fr:'et vient vers Toi avec optimisme,'},
        {t:'tri', ar:'إِذْ جَمِيعُ إِحْسَانِكَ تَفَضٌّلْ', tr:'idh jamî u ihsânika tafaddulun', fr:'car tous Tes Bienfaits sont une Grâce gratuite!'},
        {t:'tri', ar:'وَإِذْ كُلُّ نِعَمِكَ ابْتِدَاءٌ', tr:'wa idh kullu ni’amika ibtidâ’un', fr:'Toutes Tes Faveurs, sont préalables à la demande faite!'},
        {t:'tri', ar:'فَهَا أَنَا ذَا يَا إِلَهي وَاقِفٌ بِبَابِ عِزِّكَ', tr:'fahâ ana dhâ yâ ilâhî wâqifun bibâbi ‘izzika', fr:'Ainsi, me voilà ici mon Dieu! debout, devant les portes de Ta Suprématie,'},
        {t:'tri', ar:'وقُوفَ الْمُسْتَسْلِمِ الذَّلِيلِ', tr:'wuqûfa almustaslimi adhdhalili', fr:'comme une personne vile et basse,'},
        {t:'tri', ar:'وَسَائِلُكَ عَلَى الْحَيَاءِ مِنِّي', tr:'wa sâ’iluka ‘alâ alhaya’i minni', fr:'comme une personne soumise et misérable, et qui Te demande dans sa honte,'},
        {t:'tri', ar:'سُؤَالَ الْبَائِسِ الْمُعِيلِ', tr:'su’âla albâ’isi almu ‘îli', fr:'comme une personne pauvre et destituée qui invite la pitié,'},
        {t:'tri', ar:'مُقِرُّ لَكَ بِأَنِّي لَمْ أَسْتَسْلِمْ وَقْتَ إِحْسَانِكَ', tr:'muqirrun laka bi’anni lam astaslim waqta ihsânika', fr:'en T’admettant qu’au temps de Ton Bienfait, je n’avais pas cédé comme il faut,'},
        {t:'tri', ar:'إِلاَّ بِالإِقْلَاعِ عَنْ عِصْيَانِكَ', tr:'illâ bil-iqlâ i ‘an ‘ işyânika', fr:'sauf par l’abstinence à Ta désobéissance,'},
        {t:'tri', ar:'وَلَمْ أَخْلُ فِي الْحَالاَتِ كُلِّهَا مِنِ امْتِنَانِكَ', tr:'wa lam akhlu filhâlâti kullihâ min imtinânika', fr:'et dans aucun de mes états, n’étais-je jamais sans Ta Bonté.'},
        {t:'tri', ar:'فَهَلْ يَنْفَعُنِي يَا إِلَهِي إِقْرَارِي عِنْدَكَ بِسُوءِ مَا اكْتَسَبْتُ؟', tr:'fahal yanfa ‘unî yâ ilâhî iqrârî ‘indaka bisû’i maktasabtu', fr:'Profiterais-je mon Dieu, en Te confessant au mal que j’ai commis?'},
        {t:'tri', ar:'وَهَلْ يُنْجِينِي مِنْكَ اعْتِرَافِي لَكَ بِقَبِيحِ مَا ارْتَكَبْتُ؟', tr:'wahal yunjini minka i’tirâfi laka biqabîhî mâ irtakabtu', fr:'Serais-je sauvé (en sûreté) de Ton Courroux après mon aveu à la laideur de ce que je commise?'},
        {t:'tri', ar:'أَمْ أَوْجَبْتَ لِي فِي مَقَامِي هَذَا سُخْطَكَ؟', tr:'am awjabta lî fi maqâmî hâdhâ sukhțaka', fr:'Ou bien est ce que Tu m’imposeras Ta Colère dans ma situation actuelle?'},
        {t:'tri', ar:'أَمْ لَزِمَنِي فِي وَقْتِ دُعَائِي مَقْتُكَ؟', tr:'am lazimani fi waqti du ‘âi maqtuka', fr:'Est-ce que Ta haine contre moi, restera inflexible et ferme, dans le temps où je suis en train de faire mes supplications?'},
        {t:'tri', ar:'سُبْحَائَكَ لاَ أَيْأَسُ مِنْكَ', tr:'subhânaka lâ ay’asu minka', fr:'Gloire à Toi! non seulement je ne me désespère pas de Toi,'},
        {t:'tri', ar:'وَقَدْ فَتَحْتَ لِي بَابَ التَّوْبَةِ إِلَيْكَ', tr:'waqad fatahta li bâba attawbati ilayka', fr:'car Tu as ouvert la porte du repentir envers Toi-même mais'},
        {t:'tri', ar:'بَلْ أَقُولُ مَقَالَ الْعَبْدِ الذَّلِيلِ الظَالِمِ لِنَفْسِهِ', tr:'bal aqûlu maqâla al’abdi adhdhalîli azzâlimi linafsihi', fr:'aussi je prononce les paroles d’un serviteur vil et misérable, qui s’est endommagé,'},
        {t:'tri', ar:'الْمُسْتَخِفَ بِحُرْمَةِ رَبَّهِ', tr:'almustakhiffi bihurmati rabbihi', fr:'et a dédaigné l’inviolabilité de son Seigneur,'},
        {t:'tri', ar:'الَّذِي عَظُمَتْ ذُنُوبُهُ فَجَلْتْ', tr:'alladhî ‘azumat dhunûbuhû fajallat', fr:'et dont les péchés commis sont atroces et grands,'},
        {t:'tri', ar:'وَأَدْبَرَتْ أَيَّامُهُ فَوَلَّتْ', tr:'wa adbarat ayyâmuhû fawallat', fr:'et dont les jours de sa vie ont écoulé rapidement,'},
        {t:'tri', ar:'حَتَّى إِذَا رَأى مُدَّةَ الْعَمَلِ قَدِ انْقَضَتْ', tr:'hattâ idhâ ra’a muddata al’amali qad inqadat', fr:'en un clin d’œil, jusqu’au moment où il voit le terme de ses méfaits, arriver, expirer,'},
        {t:'tri', ar:'وَغَايَةَ الْعُمُرِ قَدِ انْتَهَتْ', tr:'wa ghâyata al’umuri qad intahat', fr:'et la limite de la durée de sa vie, atteinte,'},
        {t:'tri', ar:'وَأَيْقَنَ أَنَّهُ لاَ مَحِيصَ لَهُ مِنْكَ', tr:'wa ayqana annahû lâ mahîșa lahû minka', fr:'et qui sait avec certitude qu’il ne pourra jamais s’enfuir,'},
        {t:'tri', ar:'وَلَاَ مَهْرَبَ لَهُ عَنْكَ', tr:'wa lâ mahraba lahû ‘anka', fr:'et trouver un refuge contre Toi.'},
        {t:'tri', ar:'تَلَقَّاكَ بِالإِنَابَةِ', tr:'talaqqâka bil-inâbati', fr:'Alors, il lève son visage tourmenté vers Toi,'},
        {t:'tri', ar:'وَأَخْلَصَ لَكَ التَّوْبَةَ', tr:'wa akhlaşa laka attawbata', fr:'se repent sincèrement à Toi,'},
        {t:'tri', ar:'فَقَامَ إِلَيْكَ بِقَلْبٍ طَاهِرٍ نَقِيٌّ', tr:'faqâma ilayka biqalbin tâhirin naqiyyin', fr:'se met debout devant Toi, a avec un coeur pur et purifié,'},
        {t:'tri', ar:'ثُمَّ دَعَاكَ بِصَوْتٍ حَائِلٍ خَفِيٌ', tr:'thumma da ‘âka bişawtin hâ’ilin khafiyyin', fr:'et ensuite d’une voix faible et basse, Te supplie.'},
        {t:'tri', ar:'قَدْ تَطَأْطَأَ لَكَ فَانْحَنَى', tr:'qad tața’ta’a laka fanhanâ', fr:'Il se courbe devant Toi, avec sa tête baissée,'},
        {t:'tri', ar:'وَنَكْسَ رَأْسَهُ فَائْثَنَى', tr:'wa nakkasa ra’sahû fanthanâ', fr:'pendant que la peur de Toi, lui fait trembler ses pieds,'},
        {t:'tri', ar:'قَدْ أرْعَشَتْ خَشْيَتُهُ رِجْلَيْهِ', tr:'qad ar achat khachyatuhü rijlayhi', fr:'et des larmes lui font noyer ses joues.'},
        {t:'tri', ar:'وَغَرَّقَتْ دُمُوعُهُ خَدَّيْهِ', tr:'wa gharraqat dumû uhû khaddayhi', fr:'Et à ce moment,'},
        {t:'tri', ar:'يَدْعُوكَ بِيَا أَرْحَمَ الرَّاحِمِينَ', tr:'yad’ ûka biyâ arhama arrâhimina', fr:'Il Te supplie: Ô Le plus Miséricordieux des miséricordieux!'},
        {t:'tri', ar:'وَيَا أَرْحَمَ مَنِ انْتَابَهُ الْمُسْتَرْحِمُونَ', tr:'wa ya arhama man intabahu almustarhimûna', fr:'Le plus Miséricordieux parmi ceux que les gens, en quête de miséricorde, continuent à se tourner vers eux!'},

    's1': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '1. Louange à Dieu',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Sa louange et l\'unicité de Dieu',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وَكَانَ مِنْ دُعَائِهِ عَلَيْهِ السَّلَامُ إِذَا ابْتَدَأَ بِالدُّعَاءِ بَدَأَ بِالتَّحمِیدِ لِلَّهِ عَزَّ وَجَلَّ وَالثَّنَاءِ عَلَيْهِ فَقَالَ:', fr:'Et parmi ses invocations — que la paix soit sur lui — lorsqu’il commençait une supplication, il débutait par la louange à Dieu, Majesté et Gloire à Lui, et par les éloges envers Lui. Il disait :'},
        {t:'tri', ar:'الْـحَمْدُ لِلَّهِ', tr:'alḥamdu lillāhi', fr:'Toute louange appartient à Dieu'},
        {t:'tri', ar:'الأَوَّلِ بِلَا أَوَّلٍ كَانَ قَبْلَهُ', tr:'al-awwali bilā awwalin kāna qablahu', fr:'Le Premier, sans qu’aucun premier n’ait existé avant Lui,'},
        {t:'tri', ar:'وَالآخِرِ بِلَا آخِرٍ يَكُونُ بَعْدَهُ', tr:'wal-ākhiri bilā ākhirin yakūnu ba`dahu', fr:'et le Dernier, sans qu’aucun dernier ne subsiste après Lui ;'},
        {t:'tri', ar:'الَّذِي قَصُرَتْ عَنْ رُؤْيَتِهِ أَبْصَارُ النَّاظِرِينَ', tr:'allaḏī qaṣurat `an ru’yatihi abṣāru annāẓirīna', fr:'Lui dont la vision échappe aux regards de ceux qui contemplent,'},
        {t:'tri', ar:'وَعَجَزَتْ عَنْ نَعْتِهِ أَوْهَامُ الْوَاصِفِينَ', tr:'wa `ajazat `an na`tihi awhāmu alwāṣifīna', fr:'et dont la description dépasse les imaginations de ceux qui veulent Le décrire.'},
        {t:'tri', ar:'ابْتَدَعَ بِقُدْرَتِهِ الْخَلْقَ ابْتِدَاعًا', tr:'Ibtada`a biqudratihi alkhālqa ibtidā`an', fr:'Il a fait surgir la création par Sa puissance, surgissement absolu,'},
        {t:'tri', ar:'وَ اخْتَرَعَهُمْ عَلَى مَشِيَّتِهِ اخْتِرَاعاً', tr:'wa ikhtara`ahum `alā machiyyatihi ikhtirā`an', fr:'et Il les a façonnés selon Sa volonté, façonnement parfait.'},
        {t:'tri', ar:'ثُمَّ سَلَكَ بِهِمْ طَرِيقَ إِرَادَتِهِ', tr:'thumma salaka bihim ṭarīqa irādatihi', fr:'Puis Il les a engagés sur le chemin de Son vouloir,'},
        {t:'tri', ar:'وَبَعَثَهُمْ فِي سَبِيلِ مَحَبَّتِهِ', tr:'wa ba`athahum fī sabīli maḥabbatihi', fr:'et Il les a mandatés dans la voie de Son amour,'},
        {t:'tri', ar:'لَا يَمْلِكُونَ تَأْخِيرًا عَمَّا قَدَّمَهُمْ إِلَيْهِ', tr:'lā yamlikūna ta’khīran `ammā qaddamahum ilayhi', fr:'sans qu’ils puissent retarder ce vers quoi Il les a fait avancer,'},
        {t:'tri', ar:'وَلَا يَسْتَطِيعُونَ تَقَدُّمًا إِلَى مَا أَخَّرَهُمْ عَنْهُ', tr:'wa lā yastaṭī`ūna taqadduman ilā mā akhkharahum `anhu', fr:'ni avancer vers ce dont Il les a fait reculer.'},
        {t:'tri', ar:'وَجَعَلَ لِكُلِّ رُوحٍ مِنْهُمْ قُوتًا مَعْلُومًا', tr:'wa ja`ala likulli rūḥin minhum qūtan ma`lūman', fr:'Et Il a assigné à chaque âme parmi eux une subsistance déterminée,'},
        {t:'tri', ar:'مَقْسُومًا مِنْ رِزْقِهِ', tr:'maqṣūman min rizqihi', fr:'partagée pour elle à partir de Sa propre provision ;'},
        {t:'tri', ar:'لَا يَنْقُصُ مَنْ زَادَهُ نَاقِصٌ', tr:'lā yanquṣu man zādahū nāqiṣun', fr:'nul accroissement qu’Il accorde ne peut être amoindri par celui qui tente de le diminuer,'},
        {t:'tri', ar:'وَلَا يَزِيدُ مَنْ نَقَصَ مِنْهُمْ زَائِدٌ', tr:'wa lā yazīdu man naqaṣa minhum zā’idun', fr:'Et nul parmi eux, à qui une part a été réduite, ne peut y ajouter le moindre surplus.'},
        {t:'tri', ar:'ثُمَّ ضَرَبَ لَهُ فِي الْـحَيَاةِ أَجَلًا مَوْقُوتًا', tr:'thumma ḍaraba lahū filḥayāti ajalan mawqūtan', fr:'Puis Il a fixé pour chaque être vivant un terme précis,'},
        {t:'tri', ar:'وَنَصَبَ لَهُ أَمَدًا مَحْدُودًا', tr:'wa naṣaba lahū amadan maḥdūdan', fr:'et Il lui a établi une limite définie,'},
        {t:'tri', ar:'يَتَخَطَّأُ إِلَيْهِ بِأَيَّامِ عُمُرِهِ', tr:'yatakhaṭṭā ilayhi bi ayyāmi `umurihi', fr:'vers laquelle il chemine à travers les jours de sa vie,'},
        {t:'tri', ar:'وَيَرْهَقُهُ بِأَعْوَامِ دَهْرِهِ', tr:'wa yarḥaquhū bi a`wāmi dahrihi', fr:'et qui le presse à travers les années de son existence.'},
        {t:'tri', ar:'حَتَّى إِذَا بَلَغَ أَقْصَى أَثَرِهِ', tr:'ḥattā idhā balagha aqṣā atharihi', fr:'Jusqu’à ce que, lorsqu’il atteint l’extrémité de son parcours,'},
        {t:'tri', ar:'وَاسْتَوْعَبَ حِسَابَ عُمُرِهِ', tr:'wastaw`aba ḥisāba `umurihi', fr:'et qu’il a épuisé le compte de sa durée de vie,'},
        {t:'tri', ar:'قَبَضَهُ إِلَىٰ مَا نَدَبَهُ إِلَيْهِ', tr:'qabaḍahū ilā mā nadabahu ilayhi', fr:'Il le saisit et le ramène vers ce à quoi Il l’avait convié :'},
        {t:'tri', ar:'مِن مَوْفُورِ ثَوَابِهِ أَوْ مَحْذُورِ عِقَابِهِ', tr:'min mawfūri thawābihi aw maḥḏhūri `iqābihi', fr:'(vers) l’abondance de Sa récompense, ou la crainte de Son châtiment.'},
        {t:'tri', ar:'لِيَجْزِيَ الَّذِينَ أَسَاؤوا بِمَا عَمِلُوا', tr:'liyajziya allaḏhīna asā’ū bimā `amilū', fr:'Afin qu’Il rétribue ceux qui ont mal agi selon ce qu’ils ont accompli,'},
        {t:'tri', ar:'وَيَجْزِيَ الَّذِينَ أَحْسَنُوا بِالْحُسْنَىٰ', tr:'wa yajziya allaḏhīna aḥsanū bilḥusnā', fr:'et qu’Il récompense ceux qui ont fait le bien par la plus excellente récompense.'},
        {t:'tri', ar:'عَدْلًا مِنْهُ', tr:'`adlan minhu', fr:'C’est là une justice venant de Lui ;'},
        {t:'tri', ar:'تَقَدَّسَتْ أَسْمَاؤُهُ', tr:'taqaddasat asmā’uhu', fr:'sanctifiés soient Ses noms,'},
        {t:'tri', ar:'وَتَظَاهَرَتْ آلَاؤُهُ', tr:'wa taẓāharat ālā’uhu', fr:'magnifiées soient Ses faveurs.'},
        {t:'tri', ar:'لَا يُسْأَلُ عَمَّا يَفْعَلُ وَهُمْ يُسْأَلُونَ', tr:'lā yus’alu `ammā yaf`alu wahum yus’alūna', fr:'On ne L’interroge pas sur ce qu’Il fait, tandis qu’eux seront interrogés.'},
        {t:'tri', ar:'وَالْـحَمْدُ لِلَّهِ الَّذِي لَوْ حَبَسَ عَنْ عِبَادِهِ مَعْرِفَةَ حَمْدِهِ', tr:'walḥamdu lillāhi allaḏī law ḥabasa `an `ibādihi ma`rifata ḥamdihi', fr:'Louange à Dieu qui, s’Il avait retenu de Ses serviteurs la connaissance de Sa louange'},
        {t:'tri', ar:'عَلَىٰ مَا أَبْلَاهُمْ مِنْ مِنَنِهِ الْمُتَتَابِعَةِ', tr:'`alā mā ablāhum min minanihi almutatābi`ati', fr:'pour les bienfaits continus dont Il les comble,'},
        {t:'tri', ar:'وَأَسْبَغَ عَلَيْهِمْ مِنْ نِعَمِهِ الْمُتَظَاهِرَةِ', tr:'wa asbagha `alayhim min ni`amihi almutaẓāhirati', fr:'et pour les grâces abondantes dont Il les enveloppe,'},
        {t:'tri', ar:'لَتَصَرَّفُوا فِي مِنَنِهِ فَلَمْ يَحْمَدُوهُ', tr:'lataṣarrafū fī minanihi falam yaḥmidūhu', fr:'ils se seraient alors comportés dans Ses bienfaits sans Le louer,'},
        {t:'tri', ar:'وَتَوَسَّعُوا فِي رِزْقِهِ فَلَمْ يَشْكُرُوهُ', tr:'wa tawassa`ū fī rizqihi falam yashkurūhu', fr:'et ils se seraient largement servis de Sa subsistance sans Lui témoigner leur gratitude.'},
        {t:'tri', ar:'وَلَوْ كَانُوا كَذٰلِكَ لَخَرَجُوا مِنْ حُدُودِ الْإِنسَانِيَّةِ إِلَىٰ حَدِّ الْبَهِيمِيَّةِ', tr:'wa law kānū kaḏālika lakharajū min ḥudūdi al-insāniyyati ilā ḥaddi albahīmiyyati', fr:'Et s’il en avait été ainsi, ils seraient sortis des limites de l’humanité pour tomber au rang de la bestialité,'},
        {t:'tri', ar:'فَكَانُوا كَمَا وَصَفَ فِي مُحْكَمِ كِتَابِهِ', tr:'fakānū kamā waṣafa fī muḥkami kitābihi', fr:'devenant tels qu’Il les a décrits dans Son Livre parfaitement établi :'},
        {t:'tri', ar:'إِنْ هُمْ إِلَّا كَالْأَنْعَامِ بَلْ هُمْ أَضَلُّ سَبِيلًا', tr:'in hum illā kal-an`āmi bal hum aḍallu sabīlan', fr:'« Ils ne sont que comme des bêtes ; non, ils sont même plus égarés encore dans leur voie. »'},
        {t:'tri', ar:'وَالْـحَمْدُ لِلَّهِ عَلَىٰ مَا عَرَّفَنَا مِنْ نَفْسِهِ', tr:'walḥamdu lillāhi `alā mā `arrafanā min nafsihi', fr:'Louange à Dieu pour ce qu’Il nous a fait connaître de Lui-même,'},
        {t:'tri', ar:'وَأَلْهَمَنَا مِنْ شُكْرِهِ', tr:'wa alhamanā min chukrihi', fr:'pour ce qu’Il nous a inspiré de Sa gratitude,'},
        {t:'tri', ar:'وَفَتَحَ لَنَا مِنْ أَبْوَابِ الْعِلْمِ بِرُبُوبِيَّتِهِ', tr:'wa fataḥa lanā min abwābi al-`ilmi birubūbiyyatihi', fr:'pour ce qu’Il nous a ouvert des portes de la connaissance de Sa seigneurie,'},
        {t:'tri', ar:'وَدَلَّنَا عَلَيْهِ مِنَ الْإِخْلَاصِ لَهُ فِي تَوْحِيدِهِ', tr:'wa dallanā `alayhi mina al-ikhlāṣi lahū fī tawḥīdihi', fr:'et pour ce par quoi Il nous a guidés vers Lui : la pureté sincère du cœur envers Lui dans Son unicité'},
        {t:'tri', ar:'وَجَنَّبَنَا مِنَ الْإِلْـحَادِ وَالشَّكِّ فِي أَمْرِهِ', tr:'wa jannabanā mina al-ilḥādi wacchakki fī amrihi', fr:'et pour ce dont Il nous a préservés : l’athéisme et le doute au sujet de Son ordre.'},
        {t:'tri', ar:'حَمْدًا نُعَمَّرُ بِهِ فِيمَنْ حَمِدَهُ مِنْ خَلْقِهِ', tr:'ḥamdan nu`ammaru bihī fī man ḥamidahū min khalqihi', fr:'Louange par laquelle nous soyons comptés parmi ceux qui L’ont loué parmi Sa création,'},
        {t:'tri', ar:'وَنَسْبِقُ بِهِ مَنْ سَبَقَ إِلَىٰ رِضَاهُ وَعَفْوِهِ', tr:'wa nasbiqu bihī man sabaqa ilā riḍāhu wa `afwihi', fr:'et par laquelle nous devançons ceux qui ont été les premiers à obtenir Sa satisfaction et Son pardon ;'},
        {t:'tri', ar:'حَمْدًا يُضِيءُ لَنَا بِهِ ظُلُمَاتِ الْبَرْزَخِ', tr:'ḥamdan yuḍī’u lanā bihī ẓulumāti al-barzakhi', fr:'louange qui illumine pour nous les ténèbres du Barzakh (le monde intermédiaire après la mort),'},
        {t:'tri', ar:'وَيُسَهِّلُ عَلَيْنَا بِهِ سَبِيلَ الْمَبْعَثِ', tr:'wa yusahhilu `alaynā bihī sabīla al-mab`athi', fr:'qui nous facilite la voie du rassemblement après la résurrection,'},
        {t:'tri', ar:'وَيُشَرِّفُ بِهِ مَنَازِلَنَا عِندَ مَوَاقِفِ الْأَشْهَادِ', tr:'wa yucharrifu bihī manāzilanā `inda mawāqifi al-achhādi', fr:'et qui ennoblit nos demeures lors des stations où seront présents les témoins,'},
        {t:'tri', ar:'يَوْمَ تُجْزَىٰ كُلُّ نَفْسٍ بِمَا كَسَبَتْ وَهُمْ لَا يُظْلَمُونَ', tr:'yawma tujzā kullu nafsin bimā kasabat wa hum lā yuzlamūna', fr:'“le Jour où chaque âme sera rétribuée pour ce qu’elle aura acquis, et nul ne subira d’injustice”'},
        {t:'tri', ar:'يَوْمَ لَا يُغْنِي مَوْلًى عَن مَوْلًى شَيْـئًا وَلَا هُمْ يُنصَرُونَ', tr:'yawma lā yughni mawlan `an mawlan chay’an wa lā hum yunṣarūna', fr:'“le Jour où aucun allié ne pourra secourir un allié en quoi que ce soit, et où nul ne sera secouru.”'},
        {t:'tri', ar:'حَمْدًا يَرْتَفِعُ مِنَّا إِلَىٰ أَعْلَی عِلِّيِّينَ', tr:'ḥamdan yartaﬁ`u minnā ilā a `lâ `illiyyīna', fr:'Louange qui s’élève de nous jusqu’au plus haut des ‘Illiyyîn (degrés de l’existence),'},
        {t:'tri', ar:'فِي كِتَـٰبٍ مَّرْقُومٍ يَشْهَدُهُ الْمُقَرَّبُونَ', tr:'fī kitābin marqūmin yachhaduhu almuqarrabūna', fr:'“dans un Livre inscrit, auquel témoignent les rapprochés.”'},
        {t:'tri', ar:'حَمْدًا تَقَرُّ بِهِ عُيُونُنَا إِذَا بَرِقَتِ الْأَبْصَـٰارُ', tr:'ḥamdan taqarru bihī `uyūnunā idhā bariqat al-abṣāru', fr:'Louange par laquelle nos yeux seront apaisés lorsque les regards seront foudroyés,'},
        {t:'tri', ar:'وَتَبْيَضُّ بِهِ وُجُوهُنَا إِذَا اسْوَدَّتِ الْأَبْشَارُ', tr:'wa tabyaḍḍu bihī wujūhunā idhā iswaddat al-abchāru', fr:'et par laquelle nos visages blanchiront lorsque les visages des hommes noirciront.'},
        {t:'tri', ar:'حَمْدًا نُعْتَقُ بِهِ مِنْ أَلِيمِ نَارِ اللَّهِ', tr:'ḥamdan nu`taqu bihī min alīmi nāri allāhi', fr:'Louange par laquelle nous serons affranchis du feu douloureux de Dieu,'},
        {t:'tri', ar:'إِلَىٰ كَرِيمِ جِوَارِ اللَّهِ', tr:'ilā karīmi jiwāri allāhi', fr:'pour être conduits vers la noble proximité de Dieu.'},
        {t:'tri', ar:'حَمْدًا نُزَاحِمُ بِهِ مَلَائِكَتَهُ الْمُقَرَّبِينَ', tr:'ḥamdan nuzāḥimu bihī malā’ikatahu almuqarrabīna', fr:'Louange par laquelle nous côtoierons Ses anges rapprochés,'},
        {t:'tri', ar:'وَنُضَّامُّ بِهِ أَنْبِيَاءَهُ الْمُرْسَلِينَ', tr:'wa nuḍḍammu bihī anbiyā’ahu almursalīna', fr:'et nous serons adjoints à Ses prophètes envoyés,'},
        {t:'tri', ar:'فِي دَارِ الْمُقَامَةِ الَّتِي لَا تَزُولُ', tr:'fī dāri almuqāmati allatī lā tazūlu', fr:'dans la Demeure de permanence qui ne disparaît jamais,'},
        {t:'tri', ar:'وَمَحَلِّ كَرَامَتِهِ الَّتِي لَا تَحُولُ', tr:'wa maḥalli karāmatihi allatī lā taḥūlu', fr:'et dans le lieu de Sa générosité qui ne change jamais.'},
        {t:'tri', ar:'وَالْحَمْدُ لِلَّهِ الَّذِي اخْتَارَ لَنَا مَحَاسِنَ الْخَلْقِ', tr:'walḥamdu lillāhi allaḏī ikhtāra lanā maḥāsina alkhalqi', fr:'Louange à Dieu qui a choisi pour nous les plus nobles aspects de la création,'},
        {t:'tri', ar:'وَأَجْرَىٰ عَلَيْنَا طَيِّبَاتِ الرِّزْقِ', tr:'wa ajrā `alaynā ṭayyibāti arrizqi', fr:'et qui a fait couler sur nous la subsistance la plus pure,'},
        {t:'tri', ar:'وَجَعَلَ لَنَا الْفَضِيلَةَ بِالْمَلَكَةِ عَلَىٰ جَمِيعِ الْخَلْقِ', tr:'wa ja`ala lanā alfaḍīlata bilmalkati `alā jamī`i alkhalqi', fr:'et qui nous a accordé la supériorité par la maîtrise (qu’Il nous a donnée) sur toute Sa création ;'},
        {t:'tri', ar:'فَكُلُّ خَلِيقَتِهِ مُنْقَادَةٌ لَنَا بِقُدْرَتِهِ', tr:'fakullu khalīqatihī munqādatun lanā biqudratihī', fr:'toute Sa créature se soumet donc à nous par Sa puissance,'},
        {t:'tri', ar:'وَصَائِرَةٌ إِلَىٰ طَاعَتِنَا بِعِزَّتِهِ', tr:'wa ṣā’iratun ilā ṭā‘atinā bi`izzatihī', fr:'et s’oriente vers notre obéissance par Sa majesté.'},
        {t:'tri', ar:'وَالْحَمْدُ لِلَّهِ الَّذِي أَغْلَقَ عَنَّا بَابَ الْحَاجَةِ إِلَّا إِلَيْهِ', tr:'walḥamdu lillāhi allaḏī aghlaqa `annā bāba alḥājati illā ilayhī', fr:'Et louange à Dieu qui a fermé pour nous la porte du besoin envers quiconque autre que Lui ;'},
        {t:'tri', ar:'فَكَيْفَ نُطِيقُ حَمْدَهُ؟', tr:'fakayfa nuṭīqu ḥamdahū', fr:'Comment pourrions-nous supporter de Le louer comme Il le mérite ?'},
        {t:'tri', ar:'أَمْ مَتَىٰ نُؤَدِّي شُكْرَهُ لَا، مَتَىٰ', tr:'am matā nu’addī chukrahū lā matā?', fr:'Ou quand pourrions-nous Lui rendre pleinement grâce ? Non… jamais !'},
        {t:'tri', ar:'وَالْحَمْدُ لِلَّهِ الَّذِي رَكَّبَ فِينَا آلَاتِ الْبَسْطِ', tr:'walḥamdu lillāhi allaḏī rakkaba fīnā ʾālāti albasṭi', fr:'Louange à Dieu qui a façonné en nous les instruments de l’expansion (du mouvement),'},
        {t:'tri', ar:'وَجَعَلَ لَنَا أَدَوَاتِ الْقَبْضِ', tr:'wa jaʿala lanā adawāti alqabḍi', fr:'qui nous a donné les outils de la contraction,'},
        {t:'tri', ar:'وَمَتَّعَنَا بِأَرْوَاحِ الْحَيَاةِ', tr:'wa mattaʿanā bi arwāḥi alḥayāti', fr:'qui nous a fait jouir des esprits de la vie,'},
        {t:'tri', ar:'وَأَثْبَتَ فِينَا جَوَارِحَ الْأَعْمَالِ', tr:'wa athbata fīnā jawāriḥa al-aʿmāli', fr:'qui a fixé en nous les membres des actions,'},
        {t:'tri', ar:'وَغَذَّانَا بِطَيِّبَاتِ الرِّزْقِ', tr:'wa ghadhdhānā biṭayyibāti arrizqi', fr:'qui nous a nourris de la subsistance la plus pure,'},
        {t:'tri', ar:'وَأَغْنَانَا بِفَضْلِهِ', tr:'wa aghnānā bifaḍlihī', fr:'qui nous a enrichis par Sa grâce,'},
        {t:'tri', ar:'وَأَقْنَانَا بِمَنِّهِ', tr:'wa aqnānā bimannihī', fr:'et qui nous a rassasiés par Sa bonté.'},
        {t:'tri', ar:'ثُمَّ أَمَرَنَا لِيَخْتَبِرَ طَاعَتَنَا', tr:'thumma amaranā liyakhtabira ṭā`atanā', fr:'Puis Il nous a ordonné, afin d’éprouver notre obéissance,'},
        {t:'tri', ar:'وَنَهَانَا لِيَبْتَلِيَ شُكْرَنَا', tr:'wa nahānā liyabtaliya chukranā', fr:'et Il nous a interdit, afin de mettre à l’épreuve notre gratitude ;'},
        {t:'tri', ar:'فَخَالَفْنَا عَنْ طَرِيقِ أَمْرِهِ', tr:'fakhālafnā `an ṭarīqi amrihī', fr:'mais nous nous sommes écartés de la voie de Son commandement,'},
        {t:'tri', ar:'وَرَكِبْنَا مُتُونَ زَجْرِهِ', tr:'wa rakibnā mutūna zajrihī', fr:'et nous avons chevauché les sommets de ce qu’Il nous avait interdit ;'},
        {t:'tri', ar:'فَلَمْ يَبْتَدِرْنَا بِعُقُوبَتِهِ', tr:'falam yabtadirnā bi`uqūbatihī', fr:'Pourtant, Il ne s’est pas précipité pour nous châtier,'},
        {t:'tri', ar:'وَلَمْ يُعَاجِلْنَا بِنِقِْمَتِهِ', tr:'wa lam yu`ājilnā biniqimatihī', fr:'et Il ne s’est pas empressé de nous infliger Sa réprobation ;'},
        {t:'tri', ar:'بَلْ تَأَنَّانَا بِرَحْمَتِهِ تَكَرُّمًا', tr:'bal ta’annānā biraḥmatihī takarruman', fr:'bien au contraire, Il nous a traités avec indulgence par Sa miséricorde, par pure générosité,'},
        {t:'tri', ar:'وَانْتَظَرَ مُرَاجَعَتَنَا بِرَأْفَتِهِ حِلْمًا', tr:'wantazara murāja`atanā bira’fatihī ḥilman', fr:'et Il a attendu notre retour vers Lui, par Sa tendresse, avec patience.'},
        {t:'tri', ar:'وَالْحَمْدُ لِلَّهِ الَّذِي دَلَّنَا عَلَى التَّوْبَةِ', tr:'walḥamdu lillāhi allaḏī dallanā `alā attawbati', fr:'Et louange à Dieu qui nous a guidés vers le repentir,'},
        {t:'tri', ar:'الَّتِي لَمْ نُفِدْهَا إِلَّا مِنْ فَضْلِهِ', tr:'allatī lam nufid-hā illā min faḍlihi', fr:'(repentir) que nous n’avons obtenu que par Sa faveur ;'},
        {t:'tri', ar:'فَلَوْ لَمْ نَعْتَدِدْ مِنْ فَضْلِهِ إِلَّا بِهَا', tr:'falaw lam na`tadid min faḍlihi illā bihā', fr:'et si nous ne comptions parmi Ses faveurs que celle-ci,'},
        {t:'tri', ar:'لَقَدْ حَسُنَ بَلَاؤُهُ عِندَنَا', tr:'laqad ḥasuna balā’uhu `indanā', fr:'alors certes, Son bienfait envers nous serait grand,'},
        {t:'tri', ar:'وَجَلَّ إِحْسَانُهُ إِلَيْنَا', tr:'wa jalla iḥsānuḥū ilaynā', fr:'Sa bienveillance envers nous serait immense,'},
        {t:'tri', ar:'وَجَسُمَ فَضْلُهُ عَلَيْنَا', tr:'wa jasuma faḍluḥū `alaynā', fr:'et Sa grâce sur nous serait considérable.'},
        {t:'tri', ar:'فَمَا هَكَذَا كَانَتْ سُنَّتُهُ فِي التَّوْبَةِ لِمَنْ كَانَ قَبْلَنَا', tr:'famā hākadhā kānat sunnatuhu fī attawbati liman kāna qablanā', fr:'Car telle n’était pas Sa manière d’accorder le repentir à ceux qui furent avant nous ;'},
        {t:'tri', ar:'لَقَدْ وَضَعَ عَنَّا مَا لاَ طَاقَةَ لَنَا بِهِ', tr:'laqad waḍa`a `annā mā lā ṭāqata lanā bihi', fr:'Il a allégé pour nous ce que nous n’avions pas la force de porter,'},
        {t:'tri', ar:'وَلَمْ يُكَلِّفْنَا إِلَّا وُسْعًا', tr:'wa lam yukallifnā illā wus`an', fr:'et Il ne nous a imposé que ce qui est dans notre capacité ;'},
        {t:'tri', ar:'وَلَمْ يُجَشِّمْنَا إِلَّا يُسْرًا', tr:'wa lam yujachchimnā illā yusran', fr:'Il ne nous a chargés que de ce qui est aisé,'},
        {t:'tri', ar:'وَلَمْ يَدَعْ لِأَحَدٍ مِنَّا حُجَّةً وَلَا عُذْراً', tr:'wa lam yada` li aḥadin minnā ḥujjatan wa lā `udhran', fr:'et Il n’a laissé à aucun d’entre nous ni argument ni excuse.'},
        {t:'tri', ar:'فَالْهَالِكُ مِنَّا مَنْ هَلَكَ عَلَيْهِ', tr:'falhāliku minnā man halaka `alayhi', fr:'Ainsi, est voué à la perdition parmi nous celui qui périt malgré cela,'},
        {t:'tri', ar:'وَالسَّعِيدُ مِنَّا مَنْ رَغِبَ إِلَيْهِ', tr:'wassa`idu minnā man raghība ilayhi', fr:'et est heureux parmi nous celui qui se tourne vers Lui.'},
        {t:'tri', ar:'وَالْـحَمْدُ لِلَّهِ بِكُلِّ مَا حَمِدَهُ بِهِ أَدْنَى مَلَائِكَتِهِ إِلَيْهِ', tr:'walḥamdu lillāhi bikulli mā ḥamidahū bihī adnâ malā’ikatihi ilayhi', fr:'Et louange à Dieu pour tout ce par quoi L’ont loué les plus proches de Ses anges,'},
        {t:'tri', ar:'وَأَكْرَمُ خَلِيقَتِهِ عَلَيْهِ', tr:'wa akramu khalīqatihi `alayhi', fr:'et les plus nobles parmi Ses créatures,'},
        {t:'tri', ar:'وَأَرْضَى حَامِدِيهِ لَدَيْهِ', tr:'wa arḍā ḥāmidīhi ladayhi', fr:'et les plus agréés de ceux qui Le louent auprès de Lui ;'},
        {t:'tri', ar:'حَمْدًا يَفْضُلُ سَائِرَ الْـحَمْدِ', tr:'ḥamdan yafḍulu sā’ira alḥamdi', fr:'Une louange qui surpasse toute autre louange,'},
        {t:'tri', ar:'كَفَضْلِ رَبِّنَا عَلَى جَمِيعِ خَلْقِهِ', tr:'kafaḍli rabbina `alā jamī`i khalqihi', fr:'tout comme la supériorité de notre Seigneur s’étend sur toute Sa création.'},
        {t:'tri', ar:'ثُمَّ لَهُ الْـحَمْدُ مَكَانَ كُلِّ نِعْمَةٍ لَهُ عَلَيْنَا', tr:'thumma lahū alḥamdu makāna kulli ni`matin lahū `alaynā', fr:'Puis à Lui la louange à la place de chaque bienfait qu’Il nous a accordé,'},
        {t:'tri', ar:'وَعَلَى جَمِيعِ عِبَادِهِ الْمَاضِينَ وَالْبَاقِينَ', tr:'wa `alā jamī`i `ibādihi almāḍīna walbāqīna', fr:'et (à la place de chaque bienfait qu’Il a accordé) à tous Ses serviteurs, passés et présents,'},
        {t:'tri', ar:'عَدَدَ مَا أَحَاطَ بِهِ عِلْمُهُ مِنْ جَمِيعِ الْأَشْيَاءِ', tr:'`adada mā aḥāṭa bihī `ilmuhū min jamī`i al-ashyā’i', fr:'autant de fois que Son savoir englobe l’ensemble de toutes choses,'},
        {t:'tri', ar:'وَمَكَانَ كُلِّ وَاحِدَةٍ مِنْهَا', tr:'wa makāna kulli wāḥidatin minhā', fr:'et à la place de chacune d’elles,'},
        {t:'tri', ar:'عَدَدُهَا أَضْعَافًا مُضَاعَفَةً', tr:'`adaduhā aḍ`āfan muḍā`afatan', fr:'en un nombre multiplié de multiples,'},
        {t:'tri', ar:'أَبَداً سَرْمَداً إِلَى يَوْمِ الْقِيَامَةِ', tr:'abadan sarmadan ilā yawmi alqiyāmati', fr:'éternellement pour l’Éternité, jusqu’au Jour de la Résurrection.'},
        {t:'tri', ar:'حَمْدًا لَا مُنْتَهی لِحَدِّهِ', tr:'ḥamdan lā yantahī li ḥaddin', fr:'Louange dont nul terme ne limite l’étendue,'},
        {t:'tri', ar:'وَلَا حِسَابَ لِعَدَدِهِ', tr:'wa lā ḥisāba li `adadihi', fr:'dont nul calcul ne peut dénombrer,'},
        {t:'tri', ar:'وَلَا مَبْلَغَ لِغَايَتِهِ', tr:'wa lā mablagha lighāyatihi', fr:'dont aucune mesure n’atteint la finalité,'},
        {t:'tri', ar:'وَلَا انْقِطَاعَ لِأَمَدِهِ', tr:'wa lā inqiṭā`a li-amadihi', fr:'et dont la durée n’a point d’interruption.'},
        {t:'tri', ar:'حَمْدًا يَكُونُ وُصْلَةً إِلَى طَاعَتِهِ وَعَفْوِهِ', tr:'ḥamdan yakūnu wuṣlatan ilā ṭā`atihi wa `afwihi', fr:'Louange qui soit un lien nous conduisant à Son obéissance et à Son pardon,'},
        {t:'tri', ar:'وَسَبَباً إِلَى رِضْوَانِهِ', tr:'wa sababan ilā riḍwānihi', fr:'une cause nous menant à Sa satisfaction,'},
        {t:'tri', ar:'وَذَرِيعَةً إِلَى مَغْفِرَتِهِ', tr:'wa dharī`atan ilā maghfiratihi', fr:'un moyen nous faisant parvenir à Son absolution,'},
        {t:'tri', ar:'وَطَرِيقًا إِلَى جَنَّتِهِ', tr:'wa ṭarīqan ilā jannatihi', fr:'un chemin qui nous mène à Son Paradis,'},
        {t:'tri', ar:'وَخَفِيرًا مِنْ نَقِمَتِهِ', tr:'wa khafīran min naqimatihi', fr:'une protection contre Sa réprobation,'},
        {t:'tri', ar:'وَأَمْنًا مِنْ غَضَبِهِ', tr:'wa amnan min ghaḍabihi', fr:'une sécurité contre Sa colère,'},
        {t:'tri', ar:'وَظَهِيرًا عَلَى طَاعَتِهِ', tr:'wa ẓahīran `alā ṭā`atihi', fr:'un soutien pour accomplir Son obéissance,'},
        {t:'tri', ar:'وَحَاجِزًا عَنْ مَعْصِيَتِهِ', tr:'wa ḥājizan `an ma`ṣiyatihi', fr:'une barrière contre Sa désobéissance,'},
        {t:'tri', ar:'وَعَوْنًا عَلَى تَأْدِيَةِ حَقِّهِ وَوَظَائِفِهِ', tr:'wa `awnan `alā ta’diyati ḥaqqihi wa waẓā’ifihi', fr:'et une aide pour remplir Son droit et Ses obligations.'},
        {t:'tri', ar:'حَمْدًا نَسْعَدُ بِهِ فِي السُّعَدَاءِ مِنْ أَوْلِيَائِهِ', tr:'ḥamdan nas`adu bihī fī assu`adā’i min awliyā’ihi', fr:'Louange par laquelle nous soyons heureux parmi les bienheureux de Ses alliés,'},
        {t:'tri', ar:'وَنَصِيرُ بِهِ فِي نَظْمِ الشُّهَدَاءِ بِسُيُوفِ أَعْدَائِهِ', tr:'wa naṣīru bihī fī naẓmi achchuhadā’i bisuyūfi a`dā’ihi', fr:'et par laquelle nous soyons rangés parmi les martyrs, tombés sous les épées de Ses ennemis.'},

    's2': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '2. Bénédictions sur le Prophète ﷺ',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Bénédictions sur le Prophète ﷺ et sa Famille',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وَكان مِن دُعائِهِ عليهِ السلامُ بعد هذا التَحميدِ في الصَلاةِ على رَسُولِ اللهِ صَلّى اللهُ عليهِ وآلِهِ:', fr:'Parmi ses invocations (a), après cette louange, figurait la prière sur le Messager de Dieu (s) et sa sainte Famille (a) :'},
        {t:'tri', ar:'وَالْحَمْدُ لِلّٰهِ الَّذِي مَنَّ عَلَيْنَا بِمُحَمَّدٍ نَبِيِّهِ', tr:'walḥamdu lillâhi alladhî manna `alaynâ bimuḥammadin nabiyyihî', fr:'Louange à Dieu qui nous a comblés de Sa grâce en nous accordant Muhammad, Son Prophète,'},
        {t:'tri', ar:'صَلَّى اللهُ عَلَيهِ وَآلِهِ', tr:'ṣallâ allâhû `alayhî wa âlihî', fr:'que Dieu prie sur lui et sur sa sainte Famille,'},
        {t:'tri', ar:'دُونَ الْأُمَمِ الْمَاضِيَةِ وَالْقُرُونِ السَّالِفَةِ', tr:'dûna al-umami almâḍiyati walqurûni assâlifati', fr:'à l’exclusion des communautés passées et des générations révolues,'},
        {t:'tri', ar:'بِقُدْرَتِهِ الَّتِي لَا تَعْجِزُ عَنْ شَيْءٍ وَإِنْ عَظُمَ', tr:'biqudratihi allatî lâ tâjizu an chay’in wa in `aẓuma', fr:'par Sa puissance, qui n’est impuissante devant rien, fût-ce immense,'},
        {t:'tri', ar:'وَلَا يَفُوتُهَا شَيْءٌ وَإِنْ لَطُفَ', tr:'wa lâ yafûtuhâ chay’un wa in laṭufa', fr:'et à laquelle rien n’échappe, fût-ce infime,'},
        {t:'tri', ar:'فَخَتَمَ بِنَا عَلَى جَمِيعِ مَنْ ذَرَأَ', tr:'fakhatama binâ alâ jamîi man dhara’a', fr:'ainsi, Il a fait de nous le terme de tous ceux qu’Il a créés,'},
        {t:'tri', ar:'و وجَعَلَنَا شُهَدَاءَ عَلَى مَنْ جَحَدَ', tr:'wa jaalanâ chuhadâ’a alâ man jaḥada', fr:'et Il nous a établis témoins contre ceux qui ont renié,'},
        {t:'tri', ar:'وَكَثَّرَنَا بِمَنِّهِ عَلَى مَنْ قَلَّ', tr:'wa kaththaranâ bimannihî `alâ man qalla', fr:'et, par Sa grâce, Il nous a rendus nombreux face à ceux qui étaient peu nombreux.'},
        {t:'tri', ar:'اللَّهُمَّ فَصَلِّ عَلَى مُحَمَّدٍ', tr:'allâhumma faṣalli `alâ muḥammadin', fr:'Ô Dieu, prie donc sur Muhammad,'},
        {t:'tri', ar:'أَمِينِكَ عَلَى وَحْيِكَ', tr:'amînika `alâ waḥyika', fr:'Ton dépositaire de Ta Révélation,'},
        {t:'tri', ar:'وَنَجِيبِكَ مِنْ خَلْقِكَ', tr:'wa najîbika min khalqika', fr:'Ton élu parmi Tes créatures,'},
        {t:'tri', ar:'وَصَفِيِّكَ مِنْ عِبَادِكَ', tr:'wa ṣafiyyika min `ibâdika', fr:'Ton pur choisi parmi Tes serviteurs,'},
        {t:'tri', ar:'وَإِمَامِ الرَّحْمَةِ', tr:'wa imâmi arraḥmati', fr:'l’Imam de la miséricorde,'},
        {t:'tri', ar:'وَقَائِدِ الْخَيْرِ', tr:'wa qâ’idi alkhayri', fr:'le guide du bien,'},
        {t:'tri', ar:'وَمِفْتَاحِ الْبَرَكَةِ', tr:'wa miftâḥi albarakati', fr:'et la clef de la bénédiction.'},
        {t:'tri', ar:'كَمَا نَصَبَ لِأَمْرِكَ نَفْسَهُ', tr:'kamâ naṣaba li’amrika nafsahu', fr:'Comme il a consacré sa propre personne à Ton ordre,'},
        {t:'tri', ar:'وَعَرَّضَ فِيكَ لِلْمَكْرُوهِ بَدَنَهُ', tr:'wa `arraḍa fîka lilmakrûhi badanahu', fr:'et exposé son corps, pour Toi, à ce qui est pénible,'},
        {t:'tri', ar:'وَكَاشَفَ فِي الدُّعَاءِ إِلَيْكَ حَامَّتَهُ', tr:'wa kâchafa fi addu`â’i ilayka ḥâmmatahu', fr:'et offert sans détour sa tête dans l’invocation dirigée vers Toi,'},
        {t:'tri', ar:'وَحَارَبَ فِي رِضَاكَ أُسْرَتَهُ', tr:'wa ḥâraba fî riḍâka usratahu', fr:'et combattu sa propre famille pour obtenir Ton agrément,'},
        {t:'tri', ar:'وَقَطَعَ فِي إِحْيَاءِ دِينِكَ رَحِمَهُ', tr:'wa qaṭa`a fî ihyâ’i dînika raḥimahu', fr:'et rompu ses liens de parenté pour faire revivre Ta religion,'},
        {t:'tri', ar:'وَأَقْصَى الْأَدْنَينَ عَلَى جُحُودِهِمْ', tr:'wa aqṣâ al-adnayna `alâ juḥûdihim', fr:'et éloigné les plus proches en raison de leur négation,'},
        {t:'tri', ar:'وَقَرَّبَ الْأَقْصَيْنَ عَلَى اسْتِجَابَتِهِمْ لَكَ', tr:'wa qarraba al-aqṣayna `alâ istijâbatihim laka', fr:'et rapproché les plus éloignés pour avoir répondu à Ton appel,'},
        {t:'tri', ar:'وَوَالَى فِيكَ الْأَبْعَدِينَ', tr:'wa wâlâ fîka al-ab`adîna', fr:'et pris pour alliés, pour Toi, les plus lointains,'},
        {t:'tri', ar:'وَعَادَى فِيكَ الْأَقْرَبِينَ', tr:'wa `âdâ fîka al-aqrabîna', fr:'et pris pour ennemis, pour Toi, les plus proches,'},
        {t:'tri', ar:'وَأَدْأَبَ نَفْسَهُ فِي تَبْلِيغِ رِسَالَتِكَ', tr:'wa ad’aba nafsahû fî tablîghi risâlatika', fr:'et il s’est appliqué (l’âme) sans relâche à transmettre Ton message,'},
        {t:'tri', ar:'وَأَتْعَبَهَا بِالدُّعَاءِ إِلَى مِلَّتِكَ', tr:'wa atabahâ bidduâ’i ilâ millatika', fr:'et l’a épuisée en appelant à Ta voie religieuse,'},
        {t:'tri', ar:'وَشَغَلَهَا بِالنُّصْحِ لِأَهْلِ دَعْوَتِكَ', tr:'wa chaghalahâ binnuṣḥî li-ahli da`watika', fr:'et l’a occupée à conseiller sincèrement les gens de Ton appel,'},
        {t:'tri', ar:'وَهَاجَرَ إِلَى بِلَادِ الْغُرْبَةِ', tr:'wa hâjara ilâ bilâdi alghurbati', fr:'et il a émigré vers des terres d’exil,'},
        {t:'tri', ar:'وَمَحَلِّ النَّأْيِ عَنْ مَوْطِنِ رَحْلِهِ', tr:'wa maḥalli anna‘yi `an mawṭini raḥlihi', fr:'et des lieux d’éloignement loin de la demeure de son séjour,'},
        {t:'tri', ar:'وَمَوْضِعِ رِجْلِهِ', tr:'wa mawḍi`i rijlihi', fr:'et de l’endroit où reposaient ses pas,'},
        {t:'tri', ar:'وَمَسْقَطِ رَأْسِهِ', tr:'wa masqaṭi ra‘sihi', fr:'et du lieu où il reposait sa tête,'},
        {t:'tri', ar:'وَمَأْنَسِ نَفْسِهِ', tr:'wa ma‘nasi nafsihî', fr:'et du lieu de réconfort de son âme.'},
        {t:'tri', ar:'إِرَادَةً مِنْهُ لِإِعْزَازِ دِينِكَ', tr:'irâdatan minhû li-i`zâzi dînika', fr:'par volonté de sa part de rendre Ta religion puissante,'},
        {t:'tri', ar:'وَاسْتِنْصَاراً عَلَى أَهْلِ الْكُفْرِ بِكَ', tr:'wastinṣâran `alâ ahli alkufri bika', fr:'et pour obtenir secours contre les gens de l’impiété envers Toi,'},
        {t:'tri', ar:'حَتَّى اسْتَتَبَّ لَهُ مَا حَاوَلَ فِي أَعْدَائِكَ', tr:'ḥattâ istatabba lahû mâ ḥâwala fî a`dâ‘ika', fr:'jusqu’à ce que s’affermisse pour lui ce qu’il avait entrepris contre Tes ennemis,'},
        {t:'tri', ar:'وَاسْتَتَمَّ لَهُ مَا دَبَّرَ فِي أَوْلِيَائِكَ', tr:'wastatamma lahû mâ dabbara fî awliyâ‘ika', fr:'et que s’accomplisse pour lui ce qu’il avait conçu en faveur de Tes alliés,'},
        {t:'tri', ar:'فَنَهَدَ إِلَيْهِمْ مُسْتَفْتِحاً بِعَوْنِكَ', tr:'fanahada ilayhim mustaftiḥan bi`awnika', fr:'alors il se leva contre eux en ouvrant la voie par Ton assistance,'},
        {t:'tri', ar:'وَمُتَقَوِّياً عَلَى ضَعْفِهِ بِنَصْرِكَ', tr:'wa mutaqawwiyan alâ ḍafihî binaṣrika', fr:'et fortifiant sa faiblesse par Ton secours,'},
        {t:'tri', ar:'فَغَزَاهُمْ فِي عُقْرِ دِيَارِهِمْ', tr:'faghazâhum fî `uqri diyârihim', fr:'Il les attaqua au cœur même de leurs demeures,'},
        {t:'tri', ar:'وَهَجَمَ عَلَيْهِمْ فِي بُحْبُوحَةِ قَرَارِهِمْ', tr:'wa hajama `alayhim fî buḥbûḥati qarârihim', fr:'et fondit sur eux au centre de leur lieu d’établissement,'},
        {t:'tri', ar:'حَتَّى ظَهَرَ أَمْرُكَ وَعَلَتْ كَلِمَتُكَ', tr:'ḥattâ ẓahara amruka wa `alat kalimatuka', fr:'jusqu’à ce que Ton ordre apparaisse et que Ta parole s’élève,'},
        {t:'tri', ar:'وَلَوْ كَرِهَ الْمُشْرِكُونَ', tr:'wa law kariha almuchrikûna', fr:'même si les associateurs s’y opposaient.'},
        {t:'tri', ar:'اللَّهُمَّ فَارْفَعْهُ بِمَا كَدَحَ فِيكَ', tr:'allâhumma farfa`hû bimâ kadaḥa fîka', fr:'Ô Allah, élève-le, par ce qu’il a peiné pour Toi,'},
        {t:'tri', ar:'إِلَى الدَّرَجَةِ الْعُلْيَا مِنْ جَنَّتِكَ', tr:'ilâ addarajati al`ulyâ min jannatika', fr:'jusqu’au degré le plus élevé de Ton Paradis,'},
        {t:'tri', ar:'حَتَّى لَا يُسَاوَى فِي مَنْزِلَةٍ', tr:'ḥattâ lâ yusâwâ fî manzilatin', fr:'de sorte qu’il ne soit égalé dans aucune demeure,'},
        {t:'tri', ar:'وَلَا يُكَافَأَ فِي مَرْتَبَةٍ', tr:'wa lâ yukâfa’a fî martabatin', fr:'ni compensé dans aucun rang,'},
        {t:'tri', ar:'وَلَا يُوَازِيهِ لَدَيْكَ مَلَكٌ مُقَرَّبٌ', tr:'wa lâ yuwâziyahû ladayka malakun muqarrabun', fr:'et qu’aucun ange rapproché ne lui soit comparable auprès de Toi,'},
