    's3': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '3. Bénédictions sur les Serviteurs du Trône',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Bénédictions sur les Porteurs du Trône et tout ange rapproché',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِن دُعائِهِ عليهِ السَّلامُ فِي الصّلاةِ على حملةِ العرشِ وكُلُّ ملكِ مُقرّبٍ', fr:'La troisième supplication: Et parmi ses invocations (que la paix soit sur lui) figure celle par laquelle il priait pour les Porteurs du Trône et pour tout ange rapproché :'},
        {t:'tri', ar:'اللَّهُمَّ وَ حَمَلَةُ عَرْشِكَ الَّذِينَ لَا يَفْتُرُونَ مِنْ تَسْبِيحِكَ', tr:'allâhumma wa hamalatu `archika alladhîna lâ yafturûna min tasbîhika', fr:'Ô Allah, et [bénis] les Porteurs de Ton Trône, ceux qui ne se lassent point de Te glorifier'},
        {t:'tri', ar:'وَلَا يَسْأَمُونَ مِنْ تَقْدِيسِكَ', tr:'wa lâ yas’amûna min taqdîsika', fr:'qui ne se fatiguent point de Te sanctifier'},
        {t:'tri', ar:'وَلَا يَسْتَحْسِرُونَ مِنْ عِبَادَتِكَ', tr:'wa lâ yastahsirûna min `ibâdatika', fr:'qui ne s’épuisent point dans Ton adoration'},
        {t:'tri', ar:'وَلَا يُؤْثِرُونَ التَّقْصِيرَ عَلَى الْجِدِّ فِي أَمْرِكَ', tr:'wa lâ yu’thirûna attaqşîra `alâ aljiddi fî amrika', fr:'qui ne préfèrent pas la négligence à l’effort dans Ton commandement'},
        {t:'tri', ar:'وَلَا يَغْفُلُونَ عَنِ الْوَلَهِ إِلَيْكَ', tr:'wa lâ yaghfulûna `an alwalahî ilayka', fr:'et qui ne se détournent point de l’ardeur passionnée qu’ils Te portent'},
        {t:'tri', ar:'وَإِسْرَافِيلُ صَاحِبُ الصُّورِ', tr:'wa isrâfîlu şâhibu aşşûri', fr:'Et Isrâfîl, le détenteur du Cor,'},
        {t:'tri', ar:'الشَّاخِصُ الَّذِي يَنْتَظِرُ مِنْكَ الْإِذْنَ وَحُلُولَ الْأَمْرِ', tr:'achchâkhişu alladhî yantaziru minka al-idhna wa hulûla al-amri', fr:'celui qui se tient attentif, attendant de Toi la permission et la descente de l’ordre'},
        {t:'tri', ar:'فَيُنَبِّهُ بِالنَّفْخَةِ صَرْعَى رَهَائِنِ الْقُبُورِ', tr:'fayunabbihu binnafkhati şar`â rahâ’ini alqubûri', fr:'afin qu’il éveille, par le souffle, les gisants retenus en gage dans leurs tombes'},
        {t:'tri', ar:'وَمِيكَائِيلُ ذُو الْجَاهِ عِنْدَكَ', tr:'wa mîkâ’îlu dhû aljâhi `indaka', fr:'Et Michel ! celui qui jouit auprès de Toi d’un rang éminent'},
        {t:'tri', ar:'وَالْمَكَانِ الرَّفِيعِ مِنْ طَاعَتِكَ', tr:'walmakâni arrafîi min tâatika', fr:'et d’une haute station dans Ton obéissance.'},
        {t:'tri', ar:'وَجِبْرِيلُ الْأَمِينُ عَلَى وَحْيِكَ', tr:'wa jibrîlu al-amînu `alâ wahyika', fr:'Et Gabriel ! le dépositaire fidèle de Ta révélation'},
        {t:'tri', ar:'الْمُطَاعُ فِي أَهْلِ سَمَاوَاتِكَ', tr:'almutâ`u fî ahli samâwâtika', fr:'celui qui est obéi parmi les habitants de Tes cieux,'},
        {t:'tri', ar:'الْمَكِينُ لَدَيْكَ', tr:'almakînu ladayka', fr:'celui qui possède une position ferme auprès de Toi,'},
        {t:'tri', ar:'الْمُقَرَّبُ عِنْدَكَ', tr:'almuqarrabu `indaka', fr:'celui qui est rapproché de Toi.'},
        {t:'tri', ar:'وَالرُّوحُ الَّذِي هُوَ عَلَى مَلَائِكَةِ الْحُجُبِ', tr:'warrûhu alladhî huwa `alâ malâ’ikati alhujubi', fr:'Et l’Esprit qui préside aux anges des Voiles'},
        {t:'tri', ar:'وَالرُّوحُ الَّذِي هُوَ مِنْ أَمْرِكَ', tr:'warrûhu alladhî huwa min amrika', fr:'et l’Esprit qui procède de Ton commandement.'},
        {t:'tri', ar:'اللَّهُمَّ فَصَلِّ عَلَيْهِمْ', tr:'allâhumma faşalli `alayhim', fr:'Ô Allah, prie sur eux,'},
        {t:'tri', ar:'وَعَلَى الْمَلَائِكَةِ الَّذِينَ مِنْ دُونِهِمْ', tr:'wa `alâ almalâ’ikati alladhîna min dûnihim', fr:'et sur les anges qui sont au-dessous d’eux'},
        {t:'tri', ar:'مِنْ سُكَّانِ سَمَاوَاتِكَ', tr:'min sukkâni samâwâtika', fr:'parmi les habitants de Tes cieux,'},
        {t:'tri', ar:'وَأَهْلِ الْأَمَانَةِ عَلَى رِسَالَاتِكَ', tr:'wa ahli al-amânati `alâ risâlâtika', fr:'et ceux qui sont dépositaires de Tes messages,'},
        {t:'tri', ar:'وَالَّذِينَ لَا تَدْخُلُهُمْ سَأْمَةٌ مِنْ دُؤُوبٍ', tr:'walladhîna lâ tadkhuluhum sa’matun min du’ûbin', fr:'ceux que n’atteint aucune lassitude dans leur application assidue,'},
        {t:'tri', ar:'وَلَا إِعْيَاءٌ مِنْ لُغُوبٍ وَلَا فُتُورٍ', tr:'wa lâ i`yâiun min lughûbin wa lâ futûrun', fr:'ni fatigue dans leur labeur, ni relâchement,'},
        {t:'tri', ar:'وَلَا تَشْغَلُهُمْ عَنْ تَسْبِيحِكَ الشَّهَوَاتُ', tr:'wa lâ tachghaluhum `an tasbîhika achchahawâti', fr:'ceux que les désirs ne distraient point de Te glorifier,'},
        {t:'tri', ar:'وَلَا يَقْطَعُهُمْ عَنْ تَعْظِيمِكَ سَهْوُ الْغَفَلَاتِ', tr:'wa lâ yaqtauhum an ta`zîmika sahwu alghafalâti', fr:'et que l’inattention de l’oubli ne détourne point de T’exalter'},
        {t:'tri', ar:'الْخُشَّعُ الْأَبْصَارِ فَلَا يَرُومُونَ النَّظَرَ إِلَيْكَ', tr:'alkhuchcha`u al-abşâri falâ yarûmûna annazara ilayka', fr:'Ceux dont les regards sont abaissés avec humilité, et qui n’aspirent point à porter leurs yeux vers Toi'},
        {t:'tri', ar:'النَّوَاكِسُ الْأَذْقَانِ الَّذِينَ قَدْ طَالَتْ رَغْبَتُهُمْ فِيمَا لَدَيْكَ', tr:'annawâkisu al-adhqâni alladhîna qad tâlat raghbatuhum fîmâ ladayka', fr:'ceux dont les mentons sont inclinés, dont l’ardent désir pour ce qui est auprès de Toi s’est prolongé'},
        {t:'tri', ar:'الْمُسْتَهْتَرُونَ بِذِكْرِ آلَائِكَ', tr:'almustahtarûna bidhikri âlâ’ika', fr:'ceux qui sont passionnément attachés au rappel de Tes bienfaits'},
        {t:'tri', ar:'وَالْمُتَوَاضِعُونَ دُونَ عَظَمَتِكَ وَجَلَالِ كِبْرِيَائِكَ', tr:'walmutawâdiuwna dûna azamatika wajalâli kibriyâ’ika', fr:'ceux qui s’humilient devant la majesté de Ta grandeur et l’éclat de Ta souveraineté'},
        {t:'tri', ar:'وَالَّذِينَ يَقُولُونَ إِذَا نَظَرُوا إِلَى جَهَنَّمَ تَزْفِرُ عَلَى أَهْلِ مَعْصِيَتِكَ', tr:'walladhîna yaqûlûna idhâ nazarû ilâ jahannama tazfiru alâ ahli maşiyatika', fr:'et ceux qui, lorsqu’ils voient la Géhenne exhaler ses souffles contre les gens de Ta désobéissance, disent :'},
        {t:'tri', ar:'سُبْحَانَكَ مَا عَبَدْنَاكَ حَقَّ عِبَادَتِكَ', tr:'subhânaka mâ abadnâka haqqa ibâdatika', fr:'« Gloire à Toi ! Nous ne T’avons pas adoré comme il sied à Ton adoration. »'},
        {t:'tri', ar:'فَصَلِّ عَلَيْهِمْ وَعَلَى الرَّوْحَانِيِّينَ مِنْ مَلَائِكَتِكَ', tr:'faşalli alayhim wa alâ arrawhâniyyîna min malâ’ikatika', fr:'Prie donc sur eux, ainsi que sur les spirituels parmi Tes anges'},
        {t:'tri', ar:'وَأَهْلِ الزُّلْفَةِ عِنْدَكَ', tr:'wa ahli azzulfati `indaka', fr:'et sur ceux qui jouissent de la proximité auprès de Toi'},
        {t:'tri', ar:'وَحُمَّالِ الْغَيْبِ إِلَى رُسُلِكَ', tr:'wa hummâli alghaybi ilâ rusulika', fr:'et sur les porteurs de l’invisible vers Tes messagers'},
        {t:'tri', ar:'وَالْمُؤْتَمَنِينَ عَلَى وَحْيِكَ', tr:'walmu’tamanîna `alâ wahyika', fr:'et sur ceux à qui est confiée Ta révélation,'},
        {t:'tri', ar:'وَقَبَائِلِ الْمَلَائِكَةِ الَّذِينَ اخْتَصَصْتَهُمْ لِنَفْسِكَ', tr:'wa qabâ’ili almalâ’ikati alladhîna ikhtaşaştahum linafsika', fr:'et sur les différentes légions d’anges que Tu as réservées pour Toi-même,'},
        {t:'tri', ar:'وَأَغْنَيْتَهُمْ عَنِ الطَّعَامِ وَالشَّرَابِ بِتَقْدِيسِكَ', tr:'wa aghnaytahum an attaâmi wa achcharâbi bitaqdîsika', fr:'que Tu as affranchies du besoin de nourriture et de boisson par la sanctification qui leur vient de Toi'},
        {t:'tri', ar:'وَأَسْكَنْتَهُمْ بُطُونَ أَطْبَاقِ سَمَاوَاتِكَ', tr:'wa askantahum butûna atbâqi samâwâtika', fr:'et que Tu as établies dans les profondeurs des sphères de Tes cieux.'},
        {t:'tri', ar:'وَالَّذِينَ عَلَى أَرْجَائِهَا إِذَا نَزَلَ الْأَمْرُ بِتَمَامِ وَعْدِكَ', tr:'walladhîna alâ arjâ’ihâ idhâ nazala al-amru bitamâmi wadika', fr:'Et ceux qui se tiennent aux confins des cieux lorsque descend l’ordre accomplissant Ta promesse'},
        {t:'tri', ar:'وَخُزَّانِ الْمَطَرِ وَزَوَاجِرِ السَّحَابِ', tr:'wa khuzzâni almaţari wa zawâjiri assahâbi', fr:'les gardiens des pluies et ceux qui poussent les nuages ;'},
        {t:'tri', ar:'وَالَّذِي بِصَوْتِ زَجْرِهِ يُسْمَعُ زَجَلُ الرُّعُودِ', tr:'walladhî bişawti zajrihî yusmau zajalu arruûdi', fr:'celui dont la voix de réprimande fait entendre le grondement des tonnerres'},
        {t:'tri', ar:'وَإِذَا سَبَحَتْ بِهِ حَفِيفَةُ السَّحَابِ الْتَمَعَتْ صَوَاعِقُ الْبُرُوقِ', tr:'wa idhâ sabahât bihî hafîfatu assahâbi iltamaat şawâiqu alburûqi', fr:'et lorsque les nuées légères se meuvent sous son impulsion, éclatent les foudres des éclairs'},
        {t:'tri', ar:'وَمُشَيِّعِي الثَّلْجِ وَالْبَرَدِ', tr:'wa muchayyi`î aththalji walbaradi', fr:'ceux qui escortent la neige et la grêle'},
        {t:'tri', ar:'وَالْهَابِطِينَ مَعَ قَطْرِ الْمَطَرِ إِذَا نَزَلَ', tr:'walhâbiţîna ma`a qaţri almaţari idhâ nazala', fr:'ceux qui descendent avec les gouttes de pluie lorsqu’elle tombe'},
        {t:'tri', ar:'وَالْقُوَّامِ عَلَى خَزَائِنِ الرِّيَاحِ', tr:'walquwwâmi `alâ khazâ’ini arriyâhi', fr:'ceux qui veillent sur les trésors des vents'},
        {t:'tri', ar:'وَالْمُوَكَّلِينَ بِالْجِبَالِ فَلَا تَزُولُ', tr:'walmuwakkalîna biljibâli falâ tazûlu', fr:'ceux qui sont chargés des montagnes afin qu’elles ne s’ébranlent point'},
        {t:'tri', ar:'وَالَّذِينَ عَرَّفْتَهُمْ مَثَاقِيلَ الْمِيَاهِ', tr:'walladhîna `arraftahum mathâqîla almiyâhi', fr:'ceux à qui Tu as fait connaître le poids des eaux'},
        {t:'tri', ar:'وَكَيْلَ مَا تَحْوِيهِ لَوَاعِجُ الْأَمْطَارِ وَعَوَالِجُهَا', tr:'wa kayla mâ tahwîhi lawâiju al-amţâri wa awâlijuhâ', fr:'et la mesure de ce que contiennent les averses ardentes et leurs masses accumulées'},
        {t:'tri', ar:'وَرُسُلِكَ مِنَ الْمَلَائِكَةِ إِلَى أَهْلِ الْأَرْضِ', tr:'wa rusulika mina almalâ’ikati ilâ ahli al-arđi', fr:'et Tes messagers parmi les anges vers les habitants de la terre'},
        {t:'tri', ar:'بِمَكْرُوهِ مَا يَنْزِلُ مِنَ الْبَلَاءِ وَمَحْبُوبِ الرَّخَاءِ', tr:'bimakrûhi mâ yanzilu mina albalâ’i wa mahbûbi arrakhâ’i', fr:'qu’il s’agisse de ce qui descend de l’épreuve redoutée ou de la prospérité aimée'},
        {t:'tri', ar:'وَالسَّفَرَةِ الْكِرَامِ الْبَرَرَةِ', tr:'wassafarati alkirâmi albararati', fr:'et les nobles scribes vertueux'},
        {t:'tri', ar:'وَالْحَفَظَةِ الْكِرَامِ الْكَاتِبِينَ', tr:'walhafawati alkirâmi alkâtibîna', fr:'les gardiens honorables qui consignent'},
        {t:'tri', ar:'وَمَلَكِ الْمَوْتِ وَأَعْوَانِهِ', tr:'wa malaki almawti wa a`wânihi', fr:'et l’Ange de la mort et ses auxiliaires'},
        {t:'tri', ar:'وَمُنْكَرٍ وَنَكِيرٍ', tr:'wa munkarin wa nakîrin', fr:'Munkar et Nakîr'},
        {t:'tri', ar:'وَرُومَانَ فَتَّانِ الْقُبُورِ', tr:'wa rûmâna fattâni alqubûri', fr:'et Rûmân, l’interrogateur des tombes'},
        {t:'tri', ar:'وَالطَّائِفِينَ بِالْبَيْتِ الْمَعْمُورِ', tr:'wattâ’ifîna bilbayti alma`mûri', fr:'et ceux qui circumambulent autour de la Maison peuplée'},
        {t:'tri', ar:'وَمَالِكٍ وَالْخَزَنَةِ', tr:'wa mâlikin walkhazanati', fr:'et Mâlik et les gardiens'},
        {t:'tri', ar:'وَرِضْوَانَ وَسَدَنَةِ الْجِنَانِ', tr:'wa ridwâna wa sadanati aljinâni', fr:'et Ridwân et les intendants des jardins'},
        {t:'tri', ar:'وَالَّذِينَ لَا يَعْصُونَ اللَّهَ مَا أَمَرَهُمْ', tr:'walladhîna lâ ya`şûna allâha mâ amarahum', fr:'Et ceux qui ne désobéissent point à Allah en ce qu’Il leur ordonne'},
        {t:'tri', ar:'وَيَفْعَلُونَ مَا يُؤْمَرُونَ', tr:'wa yaf`alûna mâ yu’marûna', fr:'et qui accomplissent ce qui leur est commandé'},
        {t:'tri', ar:'وَالَّذِينَ يَقُولُونَ لِأَهْلِ الْجَنَّةِ سَلَامٌ عَلَيْكُمْ بِمَا صَبَرْتُمْ', tr:'walladhîna yaqûlûna salâmun `alaykum bimâ şabartum', fr:'et ceux qui disent aux habitants du Paradis : « Paix sur vous pour ce que vous avez enduré…'},
        {t:'tri', ar:'فَنِعْمَ عُقْبَى الدَّارِ', tr:'fanima uqbâ addâri', fr:'combien excellente est la demeure ultime ! »'},
        {t:'tri', ar:'وَالزَّبَانِيَةِ الَّذِينَ إِذَا قِيلَ لَهُمْ خُذُوهُ فَغُلُّوهُ', tr:'wa azzabâniyati alladhîna idhâ qîla lahum khudhûhu faghullûhu', fr:'et les Zabâniya (gardiens de la Géhenne de Enfer) qui, lorsqu’il leur est dit : « Saisissez-le et enchaînez-le,'},
        {t:'tri', ar:'ثُمَّ الْجَحِيمَ صَلُّوهُ', tr:'thumma aljahîma şallûhu', fr:'puis précipitez-le dans la Fournaise »'},
        {t:'tri', ar:'ابْتَدَرُوهُ سِرَاعاً وَلَمْ يُنْظِرُوهُ', tr:'ibtadarûhu sirâ`an walam yunzîrûhu', fr:'se précipitent vers lui promptement et ne lui accordent aucun délai'},
        {t:'tri', ar:'وَمَنْ أَوْهَمْنَا ذِكْرَهُ وَلَمْ نَعْلَمْ مَكَانَهُ مِنْكَ', tr:'wa man awhamnâ dhikrahû wa lam na`lam makânahû minka', fr:'et ceux dont nous avons omis la mention sans connaître leur place auprès de Toi'},
        {t:'tri', ar:'وَبِأَيِّ أَمْرٍ وَكَّلْتَهُ', tr:'wa bi’ayyi amrin wakkaltahu', fr:'ni la mission à laquelle Tu les as affectés'},
        {t:'tri', ar:'وَسُكَّانِ الْهَوَاءِ وَالْأَرْضِ وَالْمَاءِ', tr:'wa sukkâni alhawâ’i wal-arđi walmâ’i', fr:'et les habitants de l’air, de la terre et de l’eau'},
        {t:'tri', ar:'وَمَنْ مِنْهُمْ عَلَى الْخَلْقِ', tr:'wa man minhum `alâ alkhalqi', fr:'et ceux d’entre eux qui sont chargés des créatures'},
        {t:'tri', ar:'فَصَلِّ عَلَيْهِمْ يَوْمَ تَأْتِي كُلُّ نَفْسٍ مَعَهَا سَائِقٌ وَشَهِيدٌ', tr:'faşalli alayhim yawma ta’tî kullu nafsin maahâ sâ’iqun wa chahîdun', fr:'prie sur eux « le jour où chaque âme viendra accompagnée d’un conducteur et d’un témoin »'},
        {t:'tri', ar:'وَصَلِّ عَلَيْهِمْ صَلَاةً تَزِيدُهُمْ كَرَامَةً عَلَى كَرَامَتِهِمْ', tr:'wa şalli alayhim şalâtan tazîduhum karâmatan alâ karâmatihim', fr:'et prie sur eux d’une prière qui ajoute à leur noblesse une noblesse nouvelle'},
        {t:'tri', ar:'وَطَهَارَةً عَلَى طَهَارَتِهِمْ', tr:'wa tahâratan `alâ tahâratihim', fr:'et à leur pureté une pureté accrue'},
        {t:'tri', ar:'اللَّهُمَّ وَإِذَا صَلَّيْتَ عَلَى مَلَائِكَتِكَ وَرُسُلِكَ', tr:'allâhumma wa idhâ şallayta `alâ malâ’ikatika wa rusulika', fr:'Ô Allah, lorsque Tu pries sur Tes anges et sur Tes messagers'},
        {t:'tri', ar:'وَبَلَّغْتَهُمْ صَلَاتَنَا عَلَيْهِمْ', tr:'wa ballaghtahum şalâtanâ `alayhim', fr:'et que Tu leur fais parvenir notre prière sur eux'},
        {t:'tri', ar:'فَصَلِّ عَلَيْنَا بِمَا فَتَحْتَ لَنَا مِنْ حُسْنِ الْقَوْلِ فِيهِمْ', tr:'faşalli `alayhim bimâ fatahta lanâ min husni alqawli fîhim', fr:'alors prie sur nous en raison des belles paroles que Tu nous as inspirées à leur sujet.'},
        {t:'tri', ar:'إِنَّكَ جَوَادٌ كَرِيمٌ', tr:'innaka jawâdun karîmun', fr:'Certes, Tu es Généreux, Très Noble. ✦ Découvrez : Le Chiisme ! Le Coran en français Les clés du Paradis (Mafatih al Jinan) #text-3575957102 { line-height: 0.95; } ✦ Toutes les supplications de la Sahîfa Sajjâdiyya ✦ Supplication 1 : Prière sur l’unicité de Dieu et sa louange ✦ Supplication 2 : Prière pour les bénédictions sur le prophète ✦ Supplication 3 : Prière pour les anges et les porteurs du trône ✦ Supplication 4 : Prière pour les fidèles des prophètes ✦ Supplication 5 : Prière pour lui-même, ses amis et ses proches ✦ Supplication 6 : Prière pour le matin et la nuit ✦ Supplication 7 : Prière pour les épreuves et la détresse ✦ Supplication 8 : Prière pour chercher refuge contre les épreuves ✦ Supplication 9 : Prière pour le pardon et la miséricorde de Dieu ✦ Supplication 10 : Prière pour se réfugier auprès de Dieu ✦ Supplication 11 : Prière pour une bonne fin ✦ Supplication 12 : Prière de confession et de demande de repentir ✦ Supplication 13 : Prière pour la satisfaction des besoins auprès de Dieu ✦ Supplication 14 : Prière pour les opprimés et contre les injustes ✦ Supplication 15 : Prière en cas de maladie ou d’affliction ✦ Supplication 16 : Prière pour le pardon des péchés et défauts ✦ Supplication 17 : Prière pour demander protection contre Satan ✦ Supplication 18 : Prière contre le mal et pour le bien-être ✦ Supplication 19 : Prière pour la pluie pendant la sécheresse ✦ Supplication 20 : Prière pour les nobles caractères ✦ Supplication 21 : Prière lors de la tristesse et de l’angoisse ✦ Supplication 22 : Prière dans les difficultés et les affaires troublées ✦ Supplication 23 : Prière pour le bien-être et remerciements à Dieu ✦ Supplication 24 : Prière pour les parents ✦ Supplication 25 : Prière des parents pour leurs enfants ✦ Supplication 26 : Prière pour les voisins et les amis ✦ Supplication 27 : Prière pour les gardiens des frontières ✦ Supplication 28 : Prière pour cherc     's4': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '4. Bénédictions sur les témoins des Prophètes',
      subtitle: 'As-Ṣaḥīfa as-Sajjādiyya — Prière pour les disciples des Messagers et ceux qui les ont crus',
      body: [
        {t:'salawat'},
        {t:'tri', ar:'وكان مِن دُعائِهِ عليهِ السَّلامُ فِي الصّلاةِ على أتباعِ الرَّسُلِ ومُصدّقِيهِم', fr:'La quatrième supplication: pour demander la bénédiction pour les disciples et les témoins (allemands) des Messagers'},
        {t:'tri', ar:'اللَّهُمَّ وَأَتْبَاعَ الرُّسُلِ', tr:'allāhumma wa atbāʿa ar-rusuli', fr:'Ô Dieu! Pour les disciples des messagers'},
        {t:'tri', ar:'وَمُصَدِّقِيهِمْ مِنْ أَهْلِ الْأَرْضِ بِالْغَيْبِ', tr:'wa muṣaddiqīhum min ahli al-arḍi bilghaybi', fr:'et ceux des habitants de la terre qui confirment leur authenticité du fond de leur cœur'},
        {t:'tri', ar:'عِنْدَ مُعَارَضَةِ الْمُعَانِدِينَ لَهُمْ بِالتَّكْذِيبِ', tr:'ʿinda muʿāraḍati al-muʿānidīna lahum bittakdhībi', fr:'pendant que des gens obstinés les démentent par leurs accusations mensongères'},
        {t:'tri', ar:'وَالِاشْتِيَاقِ إِلَى الْمُرْسَلِينَ بِحَقَائِقِ الْإِيمَانِ', tr:'wal-ishtiyāqi ilā al-mursalīna biḥaqāʾiqi al-īmāni', fr:'et qui désiraient ardemment de par leur foi pure et réelle, pour la venue des émissaires,'},
        {t:'tri', ar:'فِي كُلِّ دَهْرٍ وَزَمَانٍ', tr:'fī kulli dahrin wa zamānin', fr:'dans chaque ère et temps'},
        {t:'tri', ar:'أَرْسَلْتَ فِيهِ رَسُولًا', tr:'arsalta fīhi rasūlan', fr:'dans lesquels Tu envoyas un messager'},
        {t:'tri', ar:'وَأَقَمْتَ لِأَهْلِهِ دَلِيلًا', tr:'wa aqamta li-ahlihī dalīlan', fr:'et désignas pour les peuples un guide'},
        {t:'tri', ar:'مِنْ لَدُنْ آدَمَ إِلَى مُحَمَّدٍ', tr:'min ladun ādama ilā muḥammadin', fr:'dirigeant du temps d’Adam jusqu’à Mohammad,'},
        {t:'tri', ar:'صَلّى اللهُ عَلَيْهِ وَآلِهِ', tr:'ṣallā allāhū `alayhī wa ālihī', fr:'(que Dieu bénisse Lui et Sa Famille)'},
        {t:'tri', ar:'مِن أَئِمَّةِ الهُدى', tr:'min a’immati alhudā', fr:'les Imams du droit chemin'},
        {t:'tri', ar:'وَقَادَةِ أَهْلِ التُّقَى', tr:'wa qādati ahli attuqā', fr:'et les conducteurs de la Vertu et de la Piété'},
        {t:'tri', ar:'عَلَى جَمِيعِهِمُ السَّلَامُ', tr:'`alā jamî`ihim assalāmu', fr:'(que la à soit avec eux tous!)'},
        {t:'tri', ar:'فَاذْكُرْهُمْ مِنْكَ بِمَغْفِرَةٍ وَرِضْوَانٍ', tr:'fadhkurhum minka bimagfiratin wa riḍwānin', fr:'rappelle-toi d’eux avec Pardon et Satisfaction'},
        {t:'tri', ar:'اللّهُمَّ وَأَصْحَابُ مُحَمَّدٍ خَاصَّةً', tr:'allāhumma wa aṣḥābu muḥammadin khāṣṣatan', fr:'Ô Dieu! et quant aux compagnons de Mohammad spécifiquement ceux,'},
        {t:'tri', ar:'الَّذِينَ أَحْسَنُوا الصَّحَابَةَ', tr:'alladhīna aḥsanū aṣṣaḥābata', fr:'qui ont bien agi dans sa compagnie,'},
        {t:'tri', ar:'وَالَّذِينَ أَبْلَوُا الْبَلاءَ الْحَسَنَ فِي نَصْرِهِ', tr:'walladhīna ablaw albalā’a alḥasana fī naṣrihī', fr:'et ont bien passé leur examen en l’aidant comme il faut, dans leur soutien envers lui,'},
        {t:'tri', ar:'وَكَانَفُوهُ وَأَسْرَعُوا إِلَى وِفَادَتِهِ', tr:'wa kānafūhū wa asra`ū ilā wifādatihī', fr:'et réagirent convenablement envers lui,'},
        {t:'tri', ar:'وَسَابَقُوا إِلَى دَعْوَتِهِ', tr:'wa sābaqū ilā da`watihī', fr:'et se dépassèrent pour accepter son invitation;'},
        {t:'tri', ar:'وَاسْتَجَابُوا لَهُ حَيْثُ أَسْمَعَهُمْ حُجَجَ رِسَالَتِهِ', tr:'wastajābū lahū ḥaythu asma`ahum ḥujajata risālatihī', fr:'et quand Il leur fit entendre les arguments de son message pour annoncer sa parole, se précipitèrent à l’appuyer, pour déclarer leur allégeance,'},
        {t:'tri', ar:'وَفَارَقُوا الأَزْوَاجَ وَالأَوْلادَ فِي إِظْهَارِ كَلِمَتِهِ', tr:'wa fāraqū al-azwāja wal-awlāda fī iẓhāri kalimatihi', fr:'et qu’Ils restèrent séparés de leurs épouses et de leurs enfants, pour pouvoir manifester sa parole,'},
        {t:'tri', ar:'وَقَاتَلُوا الآبَاءَ وَالأَبْنَاءَ فِي تَثْبِيتِ نُبُوَّتِهِ', tr:'wa qātalū al-ābā’a wal-abnā’a fī tathbīti nubūwwatihī', fr:'et se battirent contre leurs pères et fils en essayant de consolider et de fortifier sa prophétie,'},
        {t:'tri', ar:'وَانْتَصَرُوا بِهِ', tr:'wantaṣarū bihi', fr:'et de par lui, atteignirent à la victoire;'},
        {t:'tri', ar:'وَمَنْ كَانُوا مُنْطَوِينَ عَلَى مَحَبَّتِهِ', tr:'wa man kānū munṭawīna `alā maḥabbatihī', fr:'Ceux qui sont enveloppés de leur affection pour lui,'},
        {t:'tri', ar:'يَرْجُونَ تِجَارَةً لَنْ تَبُورَ فِي مَوَدَّتِهِ', tr:'yarjūna tijāratan lan tabūra fī mawaddatihī', fr:'et pour l’amour de lui, espèrent un commerce qui ne se terminera pas en dégâts ou dommage'},
        {t:'tri', ar:'وَالَّذِينَ هَجَرَتْهُمُ الْعَشَائِرُ إِذْ تَعَلَّقُوا بِعُرْوَتِهِ', tr:'walladhīna hajarathumu al-`achā’iru idh ta`allaqū bi`urwatihī', fr:'Ceux qui furent délaissés par leur clan, quand Ils restèrent attachés à lui,'},
        {t:'tri', ar:'وَانْتَفَتْ مِنْهُمُ الْقَرَابَاتُ إِذْ سَكَنُوا فِي ظِلِّ قَرَابَتِهِ', tr:'wantafat minhumu alqarābātu idh sakanū fī ẓilli qarābatihī', fr:'et furent reniés par leurs parents et intimes, au temps qu’Ils se reposèrent auprès de lui dans l’ombre de sa personne;'},
        {t:'tri', ar:'فَلَا تَنْسَ لَهُمُ اللَّهُمَّ مَا تَرَكُوا لَكَ وَفِيكَ', tr:'falā tansa lahum allāhumma mā tarakū laka wa fīka', fr:'n’oublie pas, Ô Dieu! ce qu’Ils abandonnèrent pour Toi et par Toi,'},
        {t:'tri', ar:'وَأَرْضِهِمْ مِنْ رِضْوَانِكَ', tr:'wa arḍihim min riḍwānika', fr:'et fais-en sorte qu’Ils se réjouissent de Ton Bon Plaisir'},
        {t:'tri', ar:'وَبِمَا حَاشُوا الْخَلْقَ عَلَيْكَ', tr:'wa bimā ḥāshū alkhalqa `alayka', fr:'pour les créatures qu’Ils purent conduire vers Toi,'},
        {t:'tri', ar:'وَكانُوا مَعَ رَسُولِكَ دُعَاةً لَكَ إِلَيْكَ', tr:'wa kānū maʿa rasūlika duʿātan laka ilayka', fr:'et rassemblèrent pour Toi, pendant qu’Ils étaient dans la compagnie de Ton Messager.'},
        {t:'tri', ar:'وَاشْكُرْهُمْ عَلَى هِجْرَتِهِمْ فِيكَ دِيَارَ قَوْمِهِمْ', tr:'wachkurhum `alā hajrihim fīka diyāra qawmihim', fr:'Récompense-les pour leur exode vers Toi, et pour avoir quitté leur peuple pour l’amour de Toi,'},
        {t:'tri', ar:'وَخُرُوجِهِمْ مِنْ سَعَةِ الْمَعَاشِ إِلَى ضِيقِهِ', tr:'wa khurūjihim min saʿati almaʿāchi ilā ḍīqihi', fr:'et pour leur sortie d’une vie abondante, pour se rapprocher d’une vie difficile et sans aises,'},
        {t:'tri', ar:'وَمَنْ كَثَّرْتَ فِي إِعْزَازِ دِينِكَ مِنْ مَظْلُومِهِمْ', tr:'wa man kaththarta fī iʿzāzi dīnika min maẓlūmihim', fr:'et [montre-leur Ta Gratitude] envers ceux qui supportèrent des méfaits et dont Tu, multiplias leur nombre en exaltant Ta Religion'},
        {t:'tri', ar:'اللَّهُمَّ وَأَوْصِلْ إِلَى التَّابِعِينَ لَهُمْ بِإِحْسَانٍ', tr:'allāhumma wa awṣil ilā attābiʿīna lahum bi-iḥsānin', fr:'Ô Dieu ! Et à ceux qui ont bien agi en suivant les compagnons'},
        {t:'tri', ar:'الَّذِينَ يَقُولُونَ: رَبَّنَا اغْفِرْ لَنَا', tr:'alladhīna yaqūlūna: rabbanā ighfir lanā', fr:'qui disent: “Ô Dieu ! Pardonne-nous'},
        {t:'tri', ar:'وَلِإِخْوَانِنَا الَّذِينَ سَبَقُونَا بِالْإِيمَانِ', tr:'wa li-ikhwāninā alladhīna sabaqūnā bil-īmāni', fr:'et nos frères qui se dépêchèrent vers la foi au devant de nous.”'},
        {t:'tri', ar:'خَيْرَ جَزَائِكَ', tr:'khayra jazā’ika', fr:'accorde-leur Ta meilleure Récompense;'},
        {t:'tri', ar:'الَّذِينَ قَصَدُوا سَمْتَهُمْ', tr:'alladhīna qaṣadū samtahum', fr:'Et ceux qui marchèrent tout droit'},
        {t:'tri', ar:'وَتَّحَرَّوْا وِجْهَتَهُمْ', tr:'wa taharraw wijhatahum', fr:'dans la route des Compagnons du Prophète'},
        {t:'tri', ar:'وَمَضَوْا عَلَى شَاكِلَتِهِمْ', tr:'wa madaw ‘alâ châkilatihim', fr:'et imitèrent leur course'},
        {t:'tri', ar:'لَمْ يَثْنِهِمْ رَيْبٌ فِي بَصِيرَتِهِمْ', tr:'lam yathnihim raybun fi başîratihim', fr:'leur chemin et poursuivirent leur manière.'},
        {t:'tri', ar:'وَلَمْ يَخْتَلِجْهُمْ شَكٌّ فِي قَفْوِ آثَارِهِمْ', tr:'wa lam yakhtalijhum chakkun fi qafwi âthârihim', fr:'Aucun doute, concernant leur sûre vision ne les dévia'},
        {t:'tri', ar:'وَالإِثْتِمَامِ بِهِدَايَةِ مَنَارِهِمْ', tr:'wa al-i’timâmi bihidâyati manârihim', fr:'et aucune incertitude ne les ébranla pour poursuivre leur chemin,'},
        {t:'tri', ar:'مُكَانِفِينَ وَمُوَازِرِينَ لَهُمْ', tr:'mukânifîna wa muwâzirina lahum', fr:'et être conduits par la direction de leur phare. En étant leurs assistants et supportant,'},
        {t:'tri', ar:'يَدِيُونَ بِدِينِهِمْ', tr:'yadînûna bidînihim', fr:'Ils professèrent leur religion,'},
        {t:'tri', ar:'وَيَهْتَدُونَ بِهَدْيِهِمْ', tr:'wa yahtadûna bihadyihim', fr:'obtinrent direction par leur direction,'},
        {t:'tri', ar:'يَتَّفِقُونَ عَلَيْهِمْ', tr:'yattafiqûna ‘alayhim', fr:'s’en vinrent à agréer avec eux,'},
        {t:'tri', ar:'وَلَا يَتَّهِمُونَهُمْ فِيمَا أَدَّوَا إِلَيْهِمْ', tr:'wa lâ yattahimûnahum fimâ addaw ilayhim', fr:'et jamais ne les accusèrent de ce qu’Ils leur transmirent'},
        {t:'tri', ar:'اللَّهُمَّ وَصَلِّ عَلَى التَّابِعِينَ', tr:'allâhumma wașalli ‘alâ attâbi’ îna', fr:'Ô Dieu! bénis les disciples'},
        {t:'tri', ar:'مِنْ يَوْمِنَا هَذَا إِلَى يَوْمِ الدِّينِ', tr:'min yawminâ hâdhâ ilâ yawmi addîni', fr:'de notre jour, jusqu’au Jour du Jugement'},
        {t:'tri', ar:'وَعَلَى أَزْوَاجِهِمْ وَعَلَى ذُرَّيَّاتِهِمْ', tr:'wa ‘alâ azwâjihim wa ‘alâ dhurriyyâtihim', fr:'Dernier, et leurs épouses, et leurs progénitures,'},
        {t:'tri', ar:'وَعَلَى مَنْ أَطَاعَكَ مِنْهُمْ', tr:'wa ‘alâ man ațâ aka minhum', fr:'et ceux parmi lesquels Obéissent,'},
        {t:'tri', ar:'صَلاَةً تَعْصِمُهُمْ بِهَا مِنْ مَعْصِيَتِكَ', tr:'şalâtan ta şimuhum bihâ min ma’şiyatika', fr:'avec une bénédiction avec laquelle Tu, les préwrveras de la désobéissance;'},
        {t:'tri', ar:'وَتَفْسَحُ لَهُمْ فِي رِيَاضِ جَنَّتِكَ', tr:'wa tafsahû lahum fi riyâdi jannatika', fr:'et réserve-leur une place dans les Jardins de Ton Paradis;'},
        {t:'tri', ar:'وَتَمْنَعُهُمْ بِهَا مِنْ كَيْدِ الشَّيْطَانِ', tr:'wa tamna uhum bihâ min kaydi achchaytâni', fr:'défends-les des ruses de Satan,'},
        {t:'tri', ar:'وَتُعِينُهُمْ بِهَا عَلَى مَا اسْتَعَانُوكَ عَلَيْهِ مِنْ بِرٍّ', tr:'wa tu’înuhum bihâ ‘alâ masta ‘ânûka ‘alayhî min birrin', fr:'Aide-les dans la piété dans laquelle Ils cherchent Ton Aide,'},
        {t:'tri', ar:'وَتَقِيهمْ طَوَارِقَ اللَّيْلِ وَالنَّهَارِ', tr:'wa taqihim țawâriqa allayli wannahâri', fr:'protège-les des évènements soudains qui arrivent pendant la nuit et le jour,'},
        {t:'tri', ar:'إلا طَارِقا يَطَرُقُ بِخَيْر', tr:'illâ târiqan yatruqu bikhayrin', fr:'excepté les évènements qui apportent la joie'},
        {t:'tri', ar:'وَتَبْعَثُهُمْ بِهَا عَلَى اعْتِقَادِ', tr:'wa tab’athuhum bihâ ‘alâ i’ tiqâdi', fr:'encourage-les à lier fermement le lien'},
        {t:'tri', ar:'حُسْنِ الرَّجَاءِ لَكَ وَالطَّمَعِ فِيمَا عِنْدَكَ', tr:'husni arraja’i laka watțama’i fîmâ ‘indaka', fr:'d’une bonne espérance en Toi, et ce qui réside auprès de Toi,'},
        {t:'tri', ar:'وَتَرْكِ التُّهْمَةِ فِيمَا تَحْوِيهِ أَيْدِي الْعِبَادِ', tr:'wa tarki attuhmati fîmâ tahwîhi aydi al’ibâdi', fr:'et empêche-les d’avoir de mauvaises idées envers Toi ou qu’Ils Accusent à propos de ce que les mains de Tes serviteurs retiennent.'},
        {t:'tri', ar:'لِتَرُدَّهُمْ إِلَى الرَّغْبَةِ إِلَيْكَ', tr:'litaruddahum ila arraghbati ilayka', fr:'là Ainsi, Tu pourras faire en sorte qu’Ils ne supplient que Toi,'},
        {t:'tri', ar:'وَالرَّهْبَةِ مِنْكَ', tr:'warrahbati minka', fr:'et n’aient peur que de Toi,'},
        {t:'tri', ar:'وَتُزَهِّدَهُمْ فِي سَعَةِ الْعَاجلِ', tr:'wa tuzahhidahum fi sa ati al’âjili', fr:'Incite-les à renoncer à la plénitude de l’immédiat,'},

        {t:'tri', ar:'وَيُولِجُ صَاحِبَهُ فِيهِ', tr:'wa yüliju şâhibahû fîhi', fr:'et fait en sorte que son compagnon entre en lui,'},
        {t:'tri', ar:'بِتَقْدِيرٍ مِنْهُ لِلْعِبَادِ', tr:'bitaqdîrin minhû lil ibâdi', fr:'comme un décret de Lui envers ses serviteurs,'},
        {t:'tri', ar:'فِيمَا يَغْذُوهُمْ بِهِ وَيُنْشِئُهُمْ عَلَيْهِ', tr:'fimâ yaghdhûhum bihî wa yunchi’uhum ‘alayhi', fr:'et par lequel Il les unit et avec lequel Il les fait croître.'},
        {t:'tri', ar:'فَخَلَقَ لَهُمُ اللَّيْلَ لِيَسْكُنُوا فِيهِ', tr:'fakhalaqa lahum allayla liyaskunû fihi', fr:'Il créa pour eux la nuit, pour qu’Ils puissent se reposer'},
        {t:'tri', ar:'مِنْ حَرَكَاتِ التَّعَبِ وَنَهَضَاتِ النَّصَب', tr:'min harakâti atta abi wa nahadâti annaşabi', fr:'des mouvements fatigants et des épuisements lassants,'},
        {t:'tri', ar:'وَجَعَلَهُ لِبَاساً لِيَلْبَسُوا مِنْ رَاحَتِهِ وَمَنَامِهِ', tr:'wa ja alahû libâsan liyalbasû min râhatihî wa manâmihi', fr:'et Il fit en sotie que ce soit comme un habit pour qu’Ils puissent s’en vêtir, dans leur aise et dans leur sommeil,'},
        {t:'tri', ar:'فَيَكُونَ ذَلِكَ لَهُمْ جَمَاماً وَقُوَّةً', tr:'fayakina dhâlika lahum jamâman wa quwwatan', fr:'pour que ce soit comme un rafraîchissement, et une force nouvelle pour eux,'},
        {t:'tri', ar:'وَلِيَنَالُوا بِهِ لَذَّةً وَشَهْوَةً', tr:'wa liyanâlû bihî ladhdhatan wa chahwatan', fr:'pour qu’Ils puissent atteindre au plaisir et à la passion.'},
        {t:'tri', ar:'وَخَلَقَ لَهُمُ النَّهَارَ مُبْصِراً', tr:'wa khalaqa lahum annahâra mubşiran', fr:'Il créa pour eux le jour, offrant la vision'},
        {t:'tri', ar:'لِيَبْتَغُوا فِيهِ مِنْ فَضْلِهِ', tr:'liyabtaghû fihî min fadlihi', fr:'pour qu’Ils puissent y chercher la Grâce,'},
        {t:'tri', ar:'وَلِيَتَسَبَّبُوَا إِلَى رِزْقِهِ', tr:'wa liyatasabbabû ilâ rizqihi', fr:'et y trouver les moyens d’arriver à Sa Provision,'},
        {t:'tri', ar:'وَيَسْرَحُوا فِي أَرْضِهِ', tr:'wa yasrahû fi ardihi', fr:'et parcourir librement dans Sa terre,'},
        {t:'tri', ar:'طَلَباً لِمَا فِيهِ نَيْلُ الْعَاجِلِ مِنْ دُنْيَاهُمْ', tr:'talaban limâ fîhi naylu al’âjili min dunyâhum', fr:'en cherchant ce qui les aidera à atteindre l’immédiat dans ce bas monde,'},
        {t:'tri', ar:'وَدَرَكُ الآجِلِ فِي أَخْرَاهُمْ', tr:'wa daraku al-âjili fi ukhrâhum', fr:'et d’atteindre une perception pour leur Dernier Jour.'},
        {t:'tri', ar:'بِكُلِّ ذَلِكَ يُصْلِحُ شَأْنَهُمْ', tr:'bikulli dhâlika yuşlihû châ’nahum', fr:'Par tout ceci, Il arrange leur situation,'},
        {t:'tri', ar:'وَيَبْلُو أَخْبَارَهُمْ', tr:'wa yablû akhbârahum', fr:'examine leur registre et dossier,'},
        {t:'tri', ar:'وَيَنْظُرُ كَيْفَ هُمْ فِي أَوْقَاتِ طَاعَتِهِ', tr:'wa yanzuru kayfa hum fi awgâti tâ atihi', fr:'et surveille leur état dans tous les temps bour leur obéissance envers Lui,'},
        {t:'tri', ar:'وَمَنَازِلِ قُرُوضِهِ', tr:'wa manâzili furûdihi', fr:'et les étapes pour accomplir Ses obligations,'},
        {t:'tri', ar:'وَمَوَاقِعِ أَحْكَامِهِ', tr:'wa mawâqi i ahkâmihi', fr:'et les occasions de Ses Ordres,'},
        {t:'tri', ar:'(لِيَجْزِيَ الَّذِينَ أَسَاءُوا بِمَا عَمِلُوا', tr:'liyajziya alladhina asâ’û bimâ ‘amilû', fr:'« Il pour qu’Il puisse repayer ceux qui ont Jà du mal avec la même monnaie,'},
        {t:'tri', ar:'وَيَجْزِيَ الَّذِينَ أَحْسَنُوا بِالْحُسْنَى)', tr:'wa yajzia alladhîna ahsanû bilhusnâ', fr:'et repayer ceux qui ont fait du bien avec la Bonté. »'},
        {t:'tri', ar:'اللَّهُمَّ فَلَكَ الْحَمْدُ عَلَى مَا فَلَقْتَ لَنَا مِنَ الإِصْبَاحِ', tr:'allâhumma falaka alhamdu ‘alâ mâ falaqta lanâ mina al-isbâhi', fr:'Ô Dieu ! Louange à Toi pour avoir fait apparaître la lumière du jour,'},
        {t:'tri', ar:'وَمَتَّعْتَنَا بِهِ مِنْ ضَوْءِ النَّهَارِ', tr:'wa matta »tanâ bihî min daw’i annahâri', fr:'en nous procurant la joie d’éprouver la splendeur et la clarté du jour,'},
        {t:'tri', ar:'وَبَصَّرْتَنَا مِنْ مَطَالِبِ الأَقْوَاتِ', tr:'wa başşartanâ min mațâlibi al-aqwâti', fr:'et en nous procurant la vision nécessaire pour notre subsistance,'},
        {t:'tri', ar:'وَوَقَيْتَنَا فِيهِ مِنْ طَوَارِقِ الآفَاتِ', tr:'wa waqaytana fihi min tawâriqi al- âfâti', fr:'et en nous protégeant des évènements ruineux et soudains'},
        {t:'tri', ar:'أَصْبَحْنَا وَأَصْبَحَتِ الأَشْيَاءُ كُلُّهَا بِجُمْلَتِهَا لَكَ', tr:'aşbahnâ wa aşbahat al-achyâ’u kulluhâ bijumlatihâ laka', fr:'Au matin, toutes les choses,'},
        {t:'tri', ar:'سَمَاؤُهَا وَأَرْضُهَا', tr:'samâ’uhâ wa arduhâ', fr:'Ton Ciel et Ta terre,'},
        {t:'tri', ar:'وَمَا بَثَنْتَ فِي كُلِّ وَاحِدٍ مِنْهُمَا', tr:'wa mâ bathathta fi kulli wâhidin minhumâ', fr:'se lèvent pour Toi, et tout ce que Tu as dispersé dans chacun d’eux,'},
        {t:'tri', ar:'سَاكِنُهُ وَمُتَحَرِّكُهُ', tr:'sâkinuhû wa mutaharrikuhu', fr:'ce qui est immobile et ce qui est mobile,'},
        {t:'tri', ar:'وَمُقِيمُهُ وَشَاخِصُهُ', tr:'wa muqîmuhû wa châkhișuhu', fr:'ce qui est résident et ce qui est en mouvement,'},
        {t:'tri', ar:'وَمَا عَلَا فِي الْهَوَاءِ', tr:'wa mâ ‘alâ filhawa’i', fr:'ce qui est élevé vers le ciel,'},
        {t:'tri', ar:'وَمَا كَنَّ تَحْتَ الثَّرَی', tr:'wa mâ kanna tahta aththarâ', fr:'et ce qui est caché sous la terre !'},
        {t:'tri', ar:'أَصْبَحْنَا فِي قَبْضَتِكَ', tr:'aşbahnâ fi qabdatika', fr:'Au matin, nous nous levons dans Ta Poignée :'},
        {t:'tri', ar:'يَحْوِينَا مُلْكُكَ وَسُلْطَائُكَ', tr:'yahwinâ mulkuka wa sultânuka', fr:'Ton Royaume et Ton Autorité nous entourent,'},
        {t:'tri', ar:'وَتَضُمُّنَا مَشِيَّتُكَ', tr:'wa tadummuna machî’atuka', fr:'et Ta Volonté nous embrasse!'},
        {t:'tri', ar:'وَنَتَصَرَّفُ عَنْ أَمْرِكَ', tr:'wa nataşarrafu ‘an amrika', fr:'Nous agissons avec Ta Commande'},
        {t:'tri', ar:'وَتَتَقَلَّبُ فِي تَدْبِيرِكَ', tr:'wa nataqallabu fi tadbîrika', fr:'et nous nous tournons vers ce chemin-ci et ce chemin-là, de par Ta Direction.'},
        {t:'tri', ar:'لَيْسَ لَنَا مِنَ الأَمْرِ إِلا مَا قَضَيْتَ', tr:'laysa lanâ mina al- amri illâ mâ qadayta', fr:'Nous ne possédons rien des affaires excepté ce que Tu nous as décrétés,'},
        {t:'tri', ar:'وَلَا مِنَ الْخَيْرِ إِلاَّا مَا أَعْطَيْتَ', tr:'wa lâ mina alkhayri illâ mâ a tayta', fr:'et rien des biens, excepté ce que Tu nous donnés'},
        {t:'tri', ar:'وَهَذَا يَوْمٌ حَادِثٌ جَدِيدٌ', tr:'wa hadhâ yawmun hâdithun jadîdun', fr:'C’est un jour nouveau'},
        {t:'tri', ar:'وَهُوَ عَلَيْنَا شَاهِدٌ عَتِيدٌ', tr:'wa huwa ‘alaynâ châhidun ‘atîdun', fr:'et frais, qui agit comme un témoin présent sur nous.'},
        {t:'tri', ar:'إِنْ أَحْسَنَّا وَدَّعَنَا بِحَمْدِ', tr:'in ahsanna wadda’anâ bihamdin', fr:'Si nous agissons bien, il prendra congé de nous avec louange,'},
        {t:'tri', ar:'وَإِنْ أَسَأْنَا فَارَقَنَا بِذَمٍّ', tr:'wa in asa’nâ fâraqanâ bidhammin', fr:'et si nous agissons mal, il prendra congé de nous avec blâme,'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille!'},
        {t:'tri', ar:'وَارْزُقْنَا حُسْنَ مُصَاحَبَتِهِ وَاعْصِمْنَا مِنْ سُوءِ مُفَارَقَتِهِ', tr:'warzuqnâ husna muşâhabatihi wa’simnâ min sû’i mufâraqatihi', fr:'Accorde-nous la bonne et plaisante compagnie de ce jour, et préserve-nous contre une mauvaise séparation'},
        {t:'tri', ar:'بِارْتِكَابٍ جَرِيرَةٍ', tr:'birtikâbi jarîratin', fr:'en faisant un méfait,'},
        {t:'tri', ar:'أَوِ اقْتِرَافِ صَغِيرَةٍ أَوْ كَبِيرَةٍ', tr:'aw iqtirafi şaghiratin aw kabîratin', fr:'ou en commettant un péché grand ou petit !'},
        {t:'tri', ar:'وَأَجْزِلَ لَنَا فِيهِ مِنَ الْحَسَنَاتِ', tr:'wa ajzil lanâ fîhî mina alhasanâti', fr:'fais-en sorte que nos bonnes actions dans ce jour, soient abondantes.'},
        {t:'tri', ar:'وَأَخْلِنَا فِيهِ مِنَ السَّيِّئَاتِ', tr:'wa akhlinâ fihî mina assayyi’âti', fr:'Et purge- nous (libère-nous) de toutes les mauvaises actions,'},
        {t:'tri', ar:'وَامْلا لَنَا مَا بِينَ طَرَفَيْهِ حَمْداً وَشُكْراً', tr:'wamla’ lanâ mâ bayna tarafayhi hamdan wa chukran', fr:'et remplis pour nous ce qui reste entre ses deux côtés, avec des louanges, des actions de grâce,'},
        {t:'tri', ar:'وَأَجْراً وَذُخْراً', tr:'wa ajran wa dhukhran', fr:'une récompense, des économies,'},
        {t:'tri', ar:'وَفَضْلاً وَإِحْسَانا', tr:'wa fadlan wa ihsânan', fr:'largesse et bénéfice'},
        {t:'tri', ar:'اللَّهُمَّ يَسِّرْ عَلَى الْكِرَامِ الْكَاتِبِينَ مَؤُتَتَنَا', tr:'allâhumma yassir ‘alâ alkirâmi alkâtibîna ma’ûnatanâ', fr:'Ô Dieu! débarrasse les Nobles Écrivains de notre fardeau,'},
        {t:'tri', ar:'وَامْلاً لَنَا مِنْ حَسَنَاتِنَا صَحَائِفَنَا', tr:'wamla’ lanâ min hasanâtina şahâ’ifanâ', fr:'remplis nos pages pour nous avec nos bonnes actions,'},
        {t:'tri', ar:'وَلَاَ تُخْزِنَا عِنْدَهُمْ بِسُوءِ أَعْمَالِنَا', tr:'wa lâ tukhzinâ ‘indahum bisû’i a’mâlinâ', fr:'et ne nous dégrade pas devant eux avec nos mauvaises actions !'},
        {t:'tri', ar:'اللَّهُمَّ اجْعَلْ لَنَا فِي كُلِّ سَاعَةٍ', tr:'allâhumma ij’al lanâ fi kulli sâ’atin min sâ ‘âtihi', fr:'Ô Dieu! Pour chaque heure de ce jour,'},
        {t:'tri', ar:'مِنْ سَاعَاتِهِ حَظّا مِنْ عِبَادِكَ', tr:'hazzan min ‘ibâdatika', fr:'désigne-nous une part pour Ta servitude,'},
        {t:'tri', ar:'وَنَصِيباً مِنْ شُكْرِكَ', tr:'wa naşîban min chukrika', fr:'une portion de notre action de grâce envers Toi,'},
        {t:'tri', ar:'وَشَاهِدَ صِدْقٍ مِنْ مَلاَئِكَتِكَ', tr:'wa châhida șidqin min malâ’ikatika', fr:'et un témoin véridique et authentique parmi Tes Anges !'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa alihi', fr:'Ô Dieu ! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَاحْفَظْنَا مِنْ بَيْنِ أَيْدِينَا وَمِنْ خَلْفِنَا،', tr:'wahfaznâ min bayni aydînâ wa min khalfinâ', fr:'et sauvegarde-nous par devant et par derrière,'},
        {t:'tri', ar:'وَعَنْ أيْمَانِنَا وَعَنْ شَمَائِلِنَا،', tr:'wa ‘an aymâninâ wa ‘an chamâ’ilinâ', fr:'de nos mains droites ainsi que de nos mains gauches'},
        {t:'tri', ar:'وَمِنْ جَمِيعِ نَوَاحِينَا', tr:'wa min jamî’i nawâhînâ', fr:'et de tous côtés,'},
        {t:'tri', ar:'حِفْظاً عَاصِماً مِنْ مَعْصِيَتِكَ', tr:'hifzan ‘âşiman min ma’şiyatika', fr:'une sauvegarde nous préservant de la désobéissance envers Toi,'},
        {t:'tri', ar:'هَادياً إِلَى طَاعَتِكَ', tr:'hâdiyan ilâ țâ’ atika', fr:'et qui sera un guide pour Obéir,'},
        {t:'tri', ar:'مُسْتَعْمِلاً لِمَحَبَّتِكَ', tr:'musta’milan limahabbatika', fr:'et qui sera employé (utilisé) pour l’amour de Toi !'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma șalli ‘alâ muhammadin wa âlihi', fr:'Ô Dieu ! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَوَفْقْنَا فِي يَوْمِنَا هَذَا وَلَيْلَتِنَا هَذِهِ', tr:'wa waffiqnâ fi yawminâ hâdhâ wa laylatinâ hâdhihi', fr:'et donne-nous succès dans ce jour, dans cette nuit,'},
        {t:'tri', ar:'وَفِي جَمِيعِ أَيَّامِنَا لاسْتِعْمَالِ الْخَيْرِ', tr:'wa fi jamî i ayyâminâ listi’ mâli alkhayri', fr:'et dans tous nos jours, pour agir en bien,'},
        {t:'tri', ar:'وَهِجْرَانِ الشَّرِّ', tr:'wa hijrâni achcharri', fr:'pour rester éloigné du mal,'},
        {t:'tri', ar:'وَشُكْرِ النِّعَمِ', tr:'wa chukri anni’ ami', fr:'pour faire action de grâce pour les faveurs,'},
        {t:'tri', ar:'وَاتَّبَاعِ السُّنَنِ وَمُجَائَبَةِ الْبِدَعِ', tr:'wa ittibâ i assunani wa mujânabati albida i', fr:'suivre les normes (critères) des bonnes actions (bienfaits), éviter toute innovation,'},
        {t:'tri', ar:'وَالأَمْرِ بِالْمَعْرُوفِ', tr:'wal-amri bilma rûfi', fr:'commander un bon comportement,'},
        {t:'tri', ar:'وَالنَّهْيِ عَنِ الْمُنْكَرِ', tr:'wannahyi ‘ani almunkari', fr:'empêcher ce qui est désapprouvé,'},
        {t:'tri', ar:'وَحِيَاطَةِ الإِسْلَامِ', tr:'wa hiyâtati al- islâmi', fr:'défendre l’Islam,'},
        {t:'tri', ar:'وَائْتِقَاص الْبَاطِلِ وَإِذْلاَلِهِ', tr:'wa intiqâși albâțili wa idhlalihi', fr:'diminuer la fausseté et l’abattre,'},
        {t:'tri', ar:'وَنُصْرَةِ الْحَقِّ وَإِعْزَازِهِ', tr:'wa nuşrati alhaqqi wa i’zâzihi', fr:'aider la vérité et l’exalter,'},
        {t:'tri', ar:'وَإِرْشَادِ الضَّالَ', tr:'wa irchâdi addâlli', fr:'guider les mal-orientés,'},
        {t:'tri', ar:'وَمُعَاوَنَةِ الضَّعِيف', tr:'wa mu’âwanati adda ‘ifi', fr:'assister les faibles,'},
        {t:'tri', ar:'وَإِدْرَاكِ اللَّهِيفِ', tr:'wa idrâki allâhîfi', fr:'et secourir ceux qui ont des problèmes!'},
        {t:'tri', ar:'اللَّهُمَّ صَلَّ عَلَى مُحَمَّدٍ وَآلِهِ', tr:'allâhumma şalli ‘alâ muhammadin wa alihi', fr:'Ô Dieu! Bénis Mohammad et toute sa Famille !'},
        {t:'tri', ar:'وَاجْعَلْهُ أَيْمَنَ يَوْمٍ عَهِدْئَاهُ', tr:'waj’alhû aymana yawmin ‘ahidnâhu', fr:'fais de ce jour, le plus fortuné jour que nous ayons connu,'},
        {t:'tri', ar:'وَأَفْضَلَ صَاحِبٍ صَحَبْنَاهُ', tr:'wa afdala sâhibin şahibnâhu', fr:'le plus excellent compagnon que nous ayons accompagné,'},
        {t:'tri', ar:'وَخَيْرَ وَقْتِ ظَلِلْنَا فِيهِ', tr:'wa khayra waqtin zalilnâ fîhi', fr:'et le meilleur temps dans lequel nous nous soyons attardés !'},
        {t:'tri', ar:'وَاجْعَلْنَا مِنْ أَرْضَى مَنْ مَرَّ عَلَيْهِ اللَّيْلُ وَالنَّهَارُ', tr:'waj’alnâ min ardâ man marra ‘alayhi allaylu wa annahâru', fr:'Place-nous parmi les plus satisfaits de toutes Tes créatures que la nuit et le jour'},
        {t:'tri', ar:'مِنْ جُمْلَةِ خَلْقِكَ', tr:'min jumlati khalqika', fr:'ont dépassé d’à côté !'},
        {t:'tri', ar:'أَشْكَرَهُمْ لِمَا أَولَيْتَ مِنْ نعَمِكَ', tr:'achkarahum limâ awlayta min ni’amika', fr:'Les plus reconnaissants pour les faveurs que Tu as données,'},
        {t:'tri', ar:'وَأَقْوَمَهُمْ بِمَا شَرَعْتَ مِنْ شَرَائِعِكَ', tr:'wa aqwamahum bimâ chara ta min charâ’i ika', fr:'les plus fermes d’entre Tes serviteurs à accomplir les lois que Tu as instituées dans le « Shariyat »'},
        {t:'tri', ar:'وَأَوْقَفَهُمْ عَمَّا حَذَّرْتَ مِنْ نَهْيِكَ', tr:'wa awqafahum ‘ammâ hadhdharta min nahyika', fr:'et les plus inflexibles d’entre eux concernant les actions défendues et interdites contre lesquelles Tu nous as mis en garde (avertis) !'},
        {t:'tri', ar:'اللَّهُمَّ إِنِّي أُشْهِدُكَ وَكَفَى بِكَ شَهِيداً', tr:'allâhumma innî uch-hiduka wa kafa bika chahidan', fr:'Ô Dieu! je Te prends pour Témoin et Tu es un Témoin plus que Suffisant'},
        {t:'tri', ar:'وَأُشْهِدُ سَمَاءَكَ وَأَرْضَكَ', tr:'wa uch-hidu samâ’aka wa ardaka', fr:'et je prends Ton Ciel et Ta Terre pour témoins,'},
        {t:'tri', ar:'وَمَنْ أَسْكَنْتَهُمَا مِنْ مَلاَئِكَتِكَ وَسَائِرِ خَلْقِكَ', tr:'wa man askantahuma min malâ’ikatika wa sâ’iri khalqika', fr:'et Tes Anges et Tes autres créatures qui les y habitent'},
        {t:'tri', ar:'فِي يَوْمِي هَذَا', tr:'fi yawmi hâdhâ', fr:'dans ce jour,'},
        {t:'tri', ar:'وَسَاعَتِي هَذِه', tr:'wa sâ’ ati hâdhihi', fr:'dans cette heure,'},
        {t:'tri', ar:'وَلَيْلَتِي هَذِه', tr:'wa laylatî hâdhihi', fr:'dans cette nuit,'},
        {t:'tri', ar:'وَمُسْتَقَرِّي هَذَا', tr:'wa mustaqarri hâdhâ', fr:'et dans ce domicile de mon repos,'},
        {t:'tri', ar:'أَنِّي أَشْهَدُ أَنَّكَ أَنْتَ اللَّهُ', tr:'anni ach-hadu annaka anta allâhu', fr:'je témoigne que Tu es en vérité Dieu tout Puissant,'},
        {t:'tri', ar:'الَّذِي لَا إِلَهَ إلاَّ أَنْتَ', tr:'alladhî lâ ilâha illâ anta', fr:'et dont il m’y a d’autre Dieu à part Toi !'},
        {t:'tri', ar:'قَائِمٌ بِالْقِسْطِ', tr:'qâ’imun bilqisți', fr:'Supporteur de la justice,'},
        {t:'tri', ar:'عَدْلٌ فِي الْحُكْمِ', tr:'adlun filhukmi', fr:'Equitable dans les jugements,'},
        {t:'tri', ar:'رَءُوفٌ بِالْعِبَادِ', tr:'ra’ûfun bil’ibâdi', fr:'Clément envers Tes serviteurs,'},

        {t:'tri', ar:'رَحِيمٌ بِالْخَلْقِ', tr:'rahîmun bilkhalqi', fr:'Compatissant envers Tes créatures,'},
        {t:'tri', ar:'وَأَنّ مُحَمَّداً عَبْدُكَ وَرَسُولُكَ', tr:'wa anna muhammadan ‘abduka wa rasûluka', fr:'et dont Mohammad est le serviteur et le messager'},

    'intro-ibn': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Ibn al-Khiyaratayn',
      subtitle: 'Le fils des deux excellents',
      prose: true,
      body: [
        {t:'intro',tx:'QUATRIEME IMAM<br>Ali Al-Sajjad Ben Al-Hossein<br>Que la Paix soit avec lui'},
        'Nom : Ali Al-Sajjad Ben Al-Hossein Ben Abi Tâleb, que la Paix soit avec lui.',
        'Position : Quatrième Imam successeur au Prophète Mohammed (pslf).',
        'Nom du père : Al-Hossein Ben Abi Tâleb (s)',
        'Nom de la mère : Dame Chah Zanân, fille du roi persan Yazdagurd.',
        'Nom familier : Abû Mohammed.',
        'Noms honorifiques : Zaïn Al-Abidin ; Sayyidu \'s-Sajidin ; Al-Sajjad.',
        'Lieu et date de naissance : Médine, le 5 Cha\'aban de l\'an 38 de l\'Hégire-06.01.659 après le Prophète Jésus, fils de Marie (s).',
        'Date de décès : Mort empoisonné le 25 Muharram de l\'an 94/95 de l\'Hégire-31.10.712 ou 20.10.713 après le Prophète Jésus, fils de Marie (s).',
        'Lieu des funérailles : Médine la Sainte, Arabie.',
        '« Ali ibn Al-Hossein est né à Médine selon les sources les plus crédibles en l\'an 38/658-659. Il était trop jeune pour se souvenir de son grand-père Ali qui fut assassiné en l\'an 40/661. Cependant il fut élevé entre son oncle Al-Hassan et son père Al-Hossein, les petits-enfants bien-aimés du Prophète (pslf). De nombreuses sources mentionnent que sa mère était Shahrbanu, la fille de Yazdigird, le deuxième monarque sassanide de la Perse, ce qui le faisait surnommer « Ibn Al-Khiyaratayn », le fils des « deux excellents », c\'est-à-dire d\'une part en tant que membre des Quraïches arabes et membre des Persans non arabes.',
        'Selon certains rapports historiques, sa mère fut acquise alors qu\'elle était captive de guerre dans la ville de Médine, durant le Califat de Omar, et celui-ci était désireux de la vendre. Cependant, Ali suggéra qu\'il soit offert à la captive de choisir son mari parmi les Musulmans. Il (s) proposa aussi que la dot soit payée sur les fonds du Trésor public. Omar accepta la proposition. Elle porta son choix sur Al-Hossein, second fils de Ali. Il est connu aussi qu\'elle mourut jeune, après avoir donné naissance à son fils unique Ali ». The psalms of Islam - Les psaumes de l\'Islam - Al-Sahîfat Al-Sajjâdiyya - Imam Zayn Al-Abidin - éd.: FICPW - Qom - R. I. d\'Iran - édition bilingue : arabe-anglais - trad. : W. C. Chittick - 1987 - p. 15 de l\'introduction - Adapté de l\'anglais au français par nous.'
      ]
    },

    'intro-appui': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Un appui certain',
      subtitle: null,
      prose: true,
      body: [
        'Dieu est Le Révélateur des Saints Versets excellents par l\'intermédiaire de Ses Prophètes. IL a donné à l\'homme intérieur les fondements de son élévation pour que l\'homme extérieur se comporte spirituellement et socialement comme un humain.',
        'Puis, pour LE glorifier, LE contempler, LE louer, IL a ouvert le Cycle de la Guidance des Douze Imams Supérieurs Infaillibles (s) desquels l\'Imam Ali Zayn Al-Abidin (s) est sans nul doute le maître de l\'Invocation.',
        'Toutes choses de la vie immédiate-Dounia contribuent à faire regarder vers le bas. Par contre, les Invocations de l\'Imam Ali Zayn Al-Abidin (s) font regarder vers le Haut.',
        'Elles lèvent une partie du voile qui dérobe à la vue la lumière. Avec les Invocations de l\'Imam de la prosternation il est accordé de lever le voile. Alors, il s\'y découvre que la grâce surabonde dans les œuvres pieuses de l\'Imam (s).',
        'C\'est sur l\'appui de telles Invocations, compléments indispensables des obligations cultuelles, que nous pouvons nous présenter avec confiance et sérénité face aux joies et aux difficultés de la vie immédiate du monde d\'ici-bas car les Invocations de l\'Imam (s) portent à la réflexion, à la méditation, aux pensées nobles, aux regards vers le Haut, le Très-Haut.',
        'Elles donnent à la journée à vivre le bon commencement et la tranquillité dont nous avons besoin pour bien passer la nuit. Les Invocations inspirées à l\'Imam (s) sont comme le parfum de la rose qui se dilue dans l\'air qui l\'enveloppe. Elles parfument les jours et les nuits du Croyant et de la Croyante, pour leur bonheur et leur satisfaction.',
        'Elles déposent en douceur la lumière continuelle dans le regard de l\'homme intérieur pour qu\'il parcourt avec aisance la voie de l\'espérance. Elles mettent des paroles d\'amour pour Dieu, exalté soit-IL, pour Ses Prophètes, pour Ses Successeurs, pour Ses Créatures, sur les lèvres soumises et inspirées de la présence de la Souveraine Grandeur, de l\'Éternelle Bonté, de l\'Incontournable Vérité.'
      ]
    },

    'intro-coeurs': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Les cœurs comblés de la Haute spiritualité',
      subtitle: null,
      prose: true,
      body: [
        'Ô Imam Ali Zayn Al-Abidin (s), fils d\'Imam, petit-fils d\'Imam, arrière-petit-fils de Prophète, qui, par la volonté du Créateur et la coopération de l\'Intelligence religieuse avez donné aux Croyants et aux Croyantes les remèdes salutaires de leurs maux : que vos invocations restent attachées pour toujours à la Foi, qu\'elles permettent de ne jamais se séparer ni d\'oublier votre famille Ahlu Beyti Rassoul Allah (s), qu\'elles règnent parmi les Croyants et les Croyantes dans tous les siècles des siècles : « Les principaux thèmes du recueil des Psaumes peuvent être énumérés selon une série de postulats venant s\'appuyer sur les qualités positives de l\'être humain, en les rattachant aussi au sens profond du postulat de la Reconnaissance de l\'Unicité :',
        'Il n\'y a de Bonté qu\'en DIEU !<br>Il n\'y a pas de repentir sans la Grâce de DIEU !<br>Il n\'y a de gratitude que par DIEU !<br>Il n\'y a pas de patience sans l\'aide de DIEU<br>Il n\'y a pas d\'affection excepté par l\'initiative de DIEU !',
        'Alors que les sentiments négatifs proviennent de l\'homme lui-même :',
        'Il n\'y a de mal intentionné qu\'en nous-mêmes !<br>Il n\'y a de vanité que par nous-mêmes !<br>Il n\'y a d\'impatience que par notre propre ego !<br>Il n\'y a d\'ignorance que par nous-mêmes !<br>Il n\'y a de haine qu\'en nous-mêmes ! ». The psalms of Islam - Les Psaumes de l\'Islam - Al-Sahîfât Al-Sajjâdiyya - Imam Zayn Al-Abidin - éd. : FICPW - Qom - R. I. d\'Iran - édition bilingue : arabe-anglais - trad. : W. C. Chittick - 1987 - p. 28-29 de l\'Introduction - Adapté de l\'anglais au français par nous.',
        'Quel bonheur, Ô Imam Ali Zayn Al-Abidin (s), et quel avantage pour nous de lire votre recueil de Psaumes, Al-Sahîfât Al-Sajjâdiyya, et d\'en nourrir l\'homme intérieur !',
        'L\'amour qui s\'en dégage porte sans cesse au désir de les installer durablement dans les cœurs et de les communiquer aux autres d\'une manière intime et secrète, humble et profonde, ardente et vive pour que les âmes qui soupirent après Allah Azza wa J\'jal-Dieu, L\'Inaccessible, Le Majestueux, soient spirituellement comblées, secourues et fortifiées par les douceurs de vos propos qui triomphent des cœurs les plus insensibles.',
        'Ô Mon Dieu ! Faites que nous conservions dans nos cœurs le souvenir des invocations de l\'un de vos Amis rapprochés et intimes ; que rien ne nous sépare d\'elles dans la vie immédiate du monde d\'ici-bas ; et que ce qui fut laissé par Votre Ami rapproché soit pour les âmes un remède pour l\'éternité.',
        'L\'Imam Ali Zayn Al-Abidin (s) a été reconnu durant son temps comme celui en qui était la vie. En lui la vie était la lumière de la Guidance des hommes mais les ténèbres des détracteurs de sa famille purifiée ne l\'ont pas comprise ni reçue.',
        'Il (s) fait partie des « Douze » pour rendre témoignage à la lumière à travers ses invocations afin que nous soyons pourvus encore davantage de bons propos à faire dire à la langue. Il (s) a habité parmi les hommes plein de vérité et de grâce, et nous pouvons voir sa gloire dans ses œuvres, toutes orientées à partir d\'ici-bas vers le Très-Haut : « Il passait son temps à prier ou à instruire les Musulmans aux sciences religieuses, refusant tout contact inutile avec le monde extérieur. Cette attitude fut suivie pendant près de trente cinq ans par l\'Imam Sadjâd qui, ainsi, instruisit directement ou indirectement des groupes innombrables de Croyants à la Vérité Islamique. Rien que les prières que l\'Imam récitait, tourné vers son Seigneur et se confiant à LUI, constituent une somme complète de connaissances islamiques ». Introduction à la connaissance de l\'Islam - Allameh Seyyed Mohammed Hossein Tabâtabâï - éd. : L\'Organisation pour la Propagande Islamique - Téhéran - R-I. d\'Iran, 1985, p. 96.',
        'L\'Imam Ali Zayn Al-Abidin (s) a donc offert ses augustes invocations pour honorer l\'ineffable besoin de protection et d\'élévation spirituelle. Pour nous enseigner les propos qui remercient Allah Subhanahu wa Ta\'ala-Dieu, Transcendant et Exalté, de toutes les grâces dont IL nous comble sans cesse, et pour en obtenir des faveurs nouvelles renouvelées à chaque instant.'
      ]
    },

    'intro-elevation': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'L\'IMAM de l\'élévation intérieure et extérieure',
      subtitle: null,
      prose: true,
      body: [
        'Les persécutions qu\'il (s) aura à subir, bien loin d\'affaiblir sa foi et celle de ses disciples, resserreront les liens entre lui (s) et les gens. Ils s\'attacheront sans cesse davantage à l\'Imam persécuté descendant de la Famille purifiée du Prophète Mohammed (pslf). Les bienfaits de ses Invocations se feront très vite ressentir dans les cœurs en brisant les liens de leur esclavage et de leur soumission au diktat des tyrans au pouvoir, jaloux de la félicité et de la docilité mises dans les cœurs par les bonnes et belles paroles de l\'Imam (s).',
        'L\'arrière-petit-fils du Prophète Mohammed (pslf) allait devenir le centre de la vie de son temps, suppléant à l\'impuissance des Croyants et des Croyantes face à la cruauté des gens de l\'Ignorance-Jahilyyah. Sa vie ne sera qu\'une suite continuelle de bienfaits, une suite continuelle d\'actions de grâce, éclatants témoignages de sa plus vive reconnaissance des complaisances à son égard de la part de Allah Tabaraka wa Ta\'ala-Dieu, Béni et Exalté, et de Son Messager, le vénéré Mohammed (pslf). L\'univers est rempli de ses invocations, partout dans le Monde d\'aujourd\'hui elles sont lues, méditées, enseignées, apprises.',
        'De toutes les méthodes tracées par les maîtres de la vie spirituelle pour nourrir l\'homme intérieur pendant son voyage dans le monde d\'ici-bas, il n\'en est pas, après les Saints Versets du Coran Elevé, après les Saints propos de la Sunna du Prophète Mohammed (pslf), après les paroles et pensées de Amir Al-Mu\'minin Ali Ibn Abi Tâleb (s), de plus utiles que le souvenir des Invocations de l\'Imam Ali Zayn Al-Abidin (s) et la méditation de ses diverses recommandations spirituelles.',
        'En effet, elles viennent compléter dans le monde d\'ici-bas, et dans un même esprit, la Sainte Ecriture coranique qui nous vient du Monde d\'en Haut et les glorieux propos du Saint Prophète Mohammed (pslf) et de Sa Famille purifiée. Elles ont été écrites pour nous rappeler tous les souvenirs des bienfaits divins, pour réveiller dans les âmes les sentiments dont nous serions animés si nous avions sous les yeux le spectacle des douleurs et du martyre qui furent imposés à la Famille purifiée de « Mes Ahlul Beyt ».',
        'Il est indubitable que le moyen le plus pur d\'obtenir ce résultat au sein de notre mémoire islamique, c\'est de chercher dans les invocations de l\'Imam Ali Zayn Al-Abidin (s), les signes de l\'histoire qu\'elles retracent, et de suivre, pour ainsi dire, pas à pas, le texte silencieux pour y découvrir une partie de l\'Histoire Sainte Islamique.',
        'Histoire qui révèle aussi que l\'Imam (s), loin de tirer vengeance de la perversité de ses ennemis, priait pour eux afin de détourner d\'au-dessus de leurs têtes les fléaux de la Justice divine. Son cœur leur était ouvert selon la Tradition prophétique et celle de ses prédécesseurs.',
        'Voilà encore, pour les âmes, un Imam modèle à copier. Un exemple à suivre, un maître spirituel dont nous nous devons d\'être des disciples dans l\'imitation de sa patience, de sa douceur, de sa retenue, de sa charité, de son esprit entièrement dévoué à la Cause du Parti de Dieu, exalté soit-IL.',
        'Parti de Dieu qui est aussi celui du Prophète Mohammed (pslf) et des Douze Imams Supérieurs Infaillibles (s) : « L\'essentiel est constitué par le lien de dévotion et de fidèle amour (wilâya) pour les Imams qui sont la face révélée de Dieu, Sa lumière, Sa main, Sa langue, Son œil parmi les créatures ; à cette dévotion intense fait pendant l\'inimitié déclarée envers les ennemis des Imams, car ils en sont l\'antithèse, les manifestations des forces démoniaques, autrement dit la face apparente, la main, la langue et l\'œil du Diable.',
        'L\'enseignement est, lui, fondé sur la méditation de l\'intégralité de ce qui a été transmis par les Gens de la Demeure prophétique (ahlu bayti n-nubuwwa), et la pratique est modelée sur leur pratique, axée par la relation de recours (tawassul) aux Quatorze Infaillibles (le Prophète, sa fille et les Douze Imams) et par la visite (ziyâra) faite à leurs sanctuaires ou accomplie à distance (avec une insistance particulière sur certaines ziyâra telle que les ziyârât Amin Allâh, Ashûrâ et Djâmi\'a) ; on y insiste aussi beaucoup sur la lecture et la méditation du Coran et des invocations (du\'â\') et entretiens intimes (munâdjât) rapportés des Infaillibles ». C. Bonaud dans : L\'Imam Khomeiny, un gnostique méconnu du 20e siècle - C. Bonaud - Docteur en sciences religieuses - éd. : Al-Bouraq - Librairie de l\'Orient - Beyrouth - Liban - Paris - France - 1997, p. 91.'
      ]
    },

    'intro-resistance': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Les moyens de la résistance spirituelle',
      subtitle: null,
      prose: true,
      body: [
        'L\'Imam Ali Zayn Al-Abidin (s) déposa entre les nombreuses mains de l\'humanité les textes qui élèvent le sens profond des droits religieux, ouverture à la résistance à opposer à l\'usurpation du Droit à la Succession accordé par Allah Azza wa J\'jal-Dieu, L\'Inaccessible et Le Majestueux, aux Douze Imams Supérieurs Infaillibles (s) héritiers de la famille mohammadienne-abrahamite.',
        'Nous pouvons dire que le recueil des Psaumes de l\'Imam (s) est le guide divin de la résistance à l\'oppression politique et intellectuelle. Il est l\'un des fondements spirituels de la discussion religieuse animatrice de la pensée libre, sereine et assurée.'
      ]
    },

    'intro-depart': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '... pour partir d\'ici-bas vers Le Plus-Haut',
      subtitle: null,
      prose: true,
      body: [
        'C\'est dans la Culture Islamique authentique que fut rappelée la notion des besoins vitaux de la créature humaine, de ses droits à tout ce qui élève, de son obligation à refuser tout ce qui l\'abaisse et de la sagesse de toujours privilégier, en premier, la voie du Mouvement islamique Justice-A\'dala et Paix-Salam : « L\'Imam As-Sajjâd réalisa que la mission de réforme qui lui incombait différait de celle de son père, Al-Hossein (s). C\'est ce que laisse comprendre cette discussion qu\'il eut avec \'Ibâd Al-Basrî, un jour qu\'ils se sont rencontrés en pèlerinage à La Sainte Mecque. Ce dernier accoste l\'Imam et s\'adresse à lui en ces termes : « Tu as délaissé la lutte (Al-jihâd) et ses difficultés pour venir en pèlerinage, qui est abordable et Allah [Dieu] a acheté des croyants, leurs personnes et leurs biens en échange du Paradis. Ils combattent dans le sentier de Dieu : ils tuent et se font tuer ». - L\'Imam lui répondit : « Lis ce qui vient après : Ils sont ceux qui se repentent, qui adorent, qui louent, qui parcourent la terre, qui s\'inclinent, qui se prosternent, qui commandent le convenable et interdisent le blâmable et qui observent les lois de Dieu... Annonce la bonne nouvelle aux Croyants ». (Coran 9/111-112)',
        'Puis il ajouta : « Si ceux-là se manifestent, la lutte n\'est préférable en rien ». Biographie des Imams - Aux Sources de la Sagesse. éd. : ARCS - Lyon - France, vol. 4 - N° 14, 1997, p. 69.',
        'L\'Imam Ali Zayn Al-Abidin (s) à travers ses Invocations, rappelle pour tous les temps : que nous ne pouvons pas nous arrêter là où nous sommes ; que notre passé islamique nous demande d\'avancer d\'une marche décisive et certaine ; que ce que nous avons acquis de nos savants, érudits, théologiens de l\'École Ahlul Beyt, c\'est un stimulant pour arriver d\'ici-bas au plus Haut, car notre essence est trop essentielle pour accepter d\'être écrasée par la Jahiliyyah-Ignorance.',
        'L\'Imam Ali Zayn Al-Abidin (s) sera celui faisant comprendre que le moteur de l\'élévation se trouve avant tout dans l\'éducation consciencieuse des droits et des devoirs de soi puis de toutes les créatures de Allah Subhanahu wa Ta\'ala-Dieu, Transcendant et Exalté. Ces vérités, la Culture Islamique authentique nous les rappelle sans cesse pour que nous restions éveillés et protégés du sommeil de l\'Ignorance.',
        'Pour que nous soyons sans cesse sérieusement résolus à nous instruire, pour nous rendre dignes de notre dignité, de notre liberté, de nos droits et devoirs au sein de notre Religion Immuable nommée par Dieu : Islam-Soumission.'
      ]
    },

    'intro-gardien': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Gardien de l\'édifice de la croyance et de la foi',
      subtitle: null,
      prose: true,
      body: [
        'L\'inspiration d\'origine divine de l\'Imam Ali Zayn Al-Abidin (s) est destinée à favoriser l\'éducation spirituelle de tous car il est reconnu de tous que les invocations font partie de l\'effort glorieux sur soi-même-jihad Al-akbar, pour s\'approcher de la connaissance de Allah Tabaraka wa Ta\'ala-Dieu, Béni et Exalté : « Du\'â-invocations sont très proches du dhikr-souvenirs de Dieu, à un tel point qu\'il est parfois difficile d\'établir la différence entre les unes et les autres. Le sens du terme signifie : « demander à ... - supplier... - invoquer... ». Le Coran recommande l\'invocation dans plusieurs de ses versets dont les suivants par exemple.',
        '« Invoquez votre Seigneur, humblement et en secret ; IL n\'aime pas les transgresseurs ». (Coran 7/55)',
        '« Dis : « Invoquez DIEU, ou bien : invoquez le Miséricordieux. Quel que soit le nom sous lequel vous L\'invoquez, les plus beaux noms Lui appartiennent ». (Coran 17/110)',
        '« Invoquez DIEU en LUI rendant un Culte pur en dépit des incrédules » ; « Votre Seigneur a dit : « Invoquez-Moi et Je vous exaucerai. Ceux qui, par orgueil, refusent de M\'adorer entreront bientôt humiliés dans la Géhenne ». (Coran 40/14)',
        '« Je suis proche, en vérité. Quand mes serviteurs t\'interrogent à mon sujet : Je réponds à l\'appel de celui qui M\'invoque, quand il M\'invoque. Qu\'ils répondent donc à Mon appel ; qu\'ils croient en Moi. Peut-être seront-ils bien dirigés ». (Coran 2/186)',
        'Il y a également un bon nombre de hadiths-propos, aussi bien dans l\'école chiite que dans les écoles sunnites, concernant les bienfaits des invocations.',
        'Le Prophète nous a transmis que Dieu dit : « Ô ! mes serviteurs, exceptés ceux que Je dirige, tous les autres sont égarés, demandez-Moi donc votre Guidance, et Je vous guiderai. Excepté ceux que J\'enrichis tous les autres sont pauvres, demandez-Moi donc la richesse et Je vous comblerai. Excepté ceux que Je libère, tous les autres sont des pécheurs, demandez-Moi donc de vous pardonner et Je vous pardonnerai ». The Psalms of Islam - Les Psaumes de l\'Islam - Précité - p. 24-25 de l\'Introduction - Adapté de l\'anglais au français par nous.',
        'L\'Imam Ali Zayn Al-Abidin (s) avait appris de ses prédécesseurs que ceux qui s\'étaient emparés des affaires musulmanes après le Sublime retour à Son Créateur de l\'âme de son grand-père, le Prophète Mohammed (pslf), n\'avaient pas apprécié la portée du Message révélé. Très vite ils avaient cessé de s\'en inspirer pour retourner aux principes de la Jahiliyyah-Ignorance. Incapables qu\'ils étaient de s\'ouvrir aux recommandations divines : « En somme, la plupart des prescriptions de Dieu le Très-Haut correspondent aux exigences de la Fitra [nature première], c\'est-à-dire qu\'elles sont liées à l\'enlèvement des voiles qui la recouvrent et à la revivification de ses exigences, la visée fondamentale et l\'objectif sublime étant la connaissance et l\'arrivée au seuil de Dieu le Très-Haut.',
        'Tout cela fait partie des grâces providentielles du Très-Haut envers Ses serviteurs afin de les délivrer de la prison de la nature et de les ramener au gîte des rapprochés et au séjour des purifiés. Les devoirs religieux sont donc des bontés divines et des remèdes seigneuriaux pour soigner les esprits malades et les cœurs souffrants, et les Prophètes sont les médecins des âmes et les éducateurs des esprits : ils les font sortir des ténèbres vers la Lumière et de la déficience vers la Perfection ». L\'Imam Khomeiny, un gnostique méconnu du 20e siècle - C. Bonaud - Docteur en sciences religieuses - éd. : Al- Bouraq - Librairie de l\'Orient - Beyrouth - Liban - Paris - France - 1997 - p. 141.'
      ]
    },

    'intro-changement': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Changement spirituel et social',
      subtitle: null,
      prose: true,
      body: [
        'Nombreux étaient ceux qui se rassemblaient autour de l\'Imam Ali Zayn Al-Abidin (s) pour écouter, réfléchir, apprendre des leçons faites sur la science, sur l\'histoire, sur l\'éthique, sur la justice, sur le Vrai et le Faux, sur les sujets toujours actuels.',
        'Ces réunions autour du Savoir et de la Connaissance étaient la preuve d\'un changement spirituel, intellectuel, moral et social auquel il ne pouvait être assigné de limites dans le temps, et dont l\'humanité est restée en droit de tout attendre. La preuve aussi de la révocation des consensus de la dégradation de l\'être humain considéré comme un « sujet-esclave » et non comme un « homme-libre ».'
      ]
    },

    'intro-opinion': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'L\'étroitesse de l\'opinion personnelle',
      subtitle: null,
      prose: true,
      body: [
        'L\'Imam Ali Zayn Al-Abidin (s) ne recherchait ni ne voulait occuper aucune des places que donne la ferveur populaire investi qu\'il (s) était de la Guidance. Il (s) attirait autour de lui (s) des gens pour être écouté comme un ami qui parle franchement, sans flatterie, sans préjugés.',
        'Il (s) avait appris auprès de son père l\'Imam Al-Hossein (s) que l\'égoïsme du « moi je » reste pour beaucoup d\'individus une formidable barrière qui empêche d\'avancer, d\'éveiller la pensée qui reste sans savoir la fin qu\'elle doit poursuivre surtout si elle se fie aux conclusions erronées de l\'opinion personnelle. Toutefois, en donnant son enseignement sur l\'élévation de l\'âme, des sentiments du cœur, des idées de l\'intellect, en parlant de changement et de progrès des mentalités, l\'Imam Ali Zayn Al-Abidin (s) savait que tout cela ne pouvait se réaliser en un clin d\'œil tel le rêveur qui veut régénérer le monde en un jour. Alors que le Cycle de la Révélation : Prophétie s\'étend sur des millénaires et une multitude de 124 000 Prophètes, et que le Cycle de la Guidance : Imamat a été institué par Allah Azza wa J\'jal-Dieu, L\'Inaccessible et Le Majestueux, pour une durée méconnue des êtres humains.'
      ]
    },

    'intro-bourgeon': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Faire éclore le bourgeon de l\'homme intérieur',
      subtitle: null,
      prose: true,
      body: [
        'L\'Imam Ali Zayn Al-Abidin (s) a démontré aux puissants de son temps que les principes islamiques quand ils sont bien enseignés et bien établis dans l\'âme, répondent à tous les besoins et combattent tous les maux de l\'Ignorance. Ils donnent aux Croyants et aux Croyantes la force de résister à l\'adversité. Ils leur inspirent le respect de la dignité d\'eux-mêmes en premier et de celle des autres. Ils adoucissent les mœurs. Ils animent les facultés intellectuelles. Ils ouvrent la voie qui mène aux jardins du « Salam de l\'Islam » préservant ainsi des excès dans lesquels s\'engouffrent trop facilement les esprits ignorants aveuglés par les erreurs et les préjugés d\'une mauvaise interprétation des Saints Versets coraniques et de la Tradition prophétique.',
        'Tant il est vrai que les plus grandes prétentions des conclusions de l\'opinion personnelle paraissent des ténèbres en comparaison des connaissances que nous pouvons acquérir auprès de nos savants musulmans, érudits, théologiens, élevés dans le savoir et la science des Douze Imams Supérieurs Infaillibles (s) héritiers de la famille mohammadienne-abrahamite.',
        'Il est vrai aussi que les gens au pouvoir à l\'époque de l\'Imam Ali Zayn Al-Abidin (s) regardaient avec envie sa grande activité spirituelle. Nombreux étaient ceux qui se pressaient autour de lui (s) en quête d\'un propos éclairé de la lumière du savoir coranique et des connaissances islamiques hérités du Prophète Mohammed (pslf) par les « Douze » sources du véritable enseignement de l\'être humain.',
        'Enseignement consistant dans le développement des grandes pensées spirituelles. Celles qui se rattachent à la connaissance de Allah Tabaraka wa Ta\'ala-Dieu, Béni et Exalté, à Ses desseins englobant les deux cycles. Primo, celui de la Révélation : Prophétie qui se prolonge, secundo, dans celui de la Guidance : Imamat. Ce dernier devenant ainsi le gardien de la Vérité, trésor de l\'Intelligence sans laquelle la pauvreté spirituelle demeure inculte, sans connaissance de Dieu, des Livres révélés, des Prophètes, des Anges, du Jour de la Résurrection, et sans aperçu du droit, de la justice, du devoir, de l\'amour, du sacrifice, de la perfection spirituelle telle qu\'elle s\'est manifestée dans tous les Prophètes. Notamment chez ceux nommés les Grands : Noé, Abraham, Moïse, Jésus, Mohammed. Paix et salutations sur tous les Prophètes, sur la Famille d\'Abraham, sur la Mère de Jésus, la pure et Sainte Marie, sur la Famille purifiée de Mohammed.'
      ]
    },

    'intro-douze': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Les « Douze » plus élevés après le Prophète Mohammed',
      subtitle: null,
      prose: true,
      body: [
        {t:'intro',tx:'Que la Paix et les Bénédictions de Dieu soient sur le Prophète et sur sa Famille sanctifiée'},
        'L\'Imam Ali Zayn Al-Abidin (s), l\'Imam de son temps, avait échappé au massacre et à la tuerie de la tragédie de Karbala par la Volonté de Allah Subhanahu wa Ta\'ala-Dieu, Transcendant et Exalté. Parce que Allah l\'avait inclus dans les « Douze » chargés d\'élever l\'humanité jusqu\'à la prédominance souveraine de la Justice pour rendre à l\'être humain tout ce qui lui a été confisqué par l\'injustice de l\'Ignorance. Ainsi, Allah Azza wa J\'jal-Dieu, L\'Inaccessible et Le Majestueux, en instituant le Collège des Douze Imams Supérieurs Infaillibles (s) nous a orientés vers la seule source capable d\'enseigner et de développer l\'innéité de croyance monothéiste et de belle et bonne sociabilité dans une solide et vraie connaissance de la Religion Immuable donnée par Allah-Dieu, Exalté soit-IL, dans l\'unité de Son Souffle de la vie.'
      ]
    },

    'intro-parure': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: '« Parure des dévots »',
      subtitle: null,
      prose: true,
      body: [
        'Donc, Il y a une quinzaine de siècles que l\'Imam Ali Zayn Al-Abidin (s) fut consacré à l\'enseignement de la spiritualité monothéiste de l\'humanité. Cet événement ne fera pas de bruit dans l\'Histoire car il se traduira par des œuvres à lire, à apprendre, à répéter, à enseigner aux enfants. Elles sont connues sous le nom des Invocations de l\'Imam de la Prosternation : Imam As-Sadjad.',
        'Ce sont des œuvres silencieuses faites pour satisfaire la vie intérieure. Elles méritent une attention tout à fait particulière. C\'est pour cela que les partisans de la ligne islamique de l\'Imam Ali (s) se les rappellent comme le commencement d\'heureuses influences pour la vie spirituelle. En outre, ce n\'est pas un événement isolé. Il fait partie des « Douze » du Cycle de la Guidance : Imamat qui ne s\'arrêtera pas de si tôt car il a été institué par Dieu, exalté soit-IL, pour durer.',
        'Depuis le Sublime retour vers son Seigneur de l\'âme de l\'Imam Ali Zayn Al-Abidin (s), Imam de bien pour la spiritualité de l\'humanité, nous avons toujours désiré apprendre, retenir, transmettre ses œuvres que les Croyants et les Croyantes respectent pour leur grandeur entièrement orientée à partir d\'ici-bas vers le Haut, Le Très-Haut.',
        'C\'est afin de combler nos besoins, d\'éveiller et d\'instruire notre spiritualité que l\'Imam (s) nous a gratifiés de ce qui adoucit nos peines et nos épreuves, de ce qui nous fait agir continuellement les uns sur les autres pour notre bien commun : « Le livre de prières transmises des Imams de la Famille du Prophète, qui est à juste titre le plus célèbre et le plus prisé, est celui qui réunit celles de l\'Imam Ali b. Al-Hossein as-Sadjâd, encore connu sous le surnom de «Parure des dévots »... Ce Recueil de l\'Imam Sadjâd (Sahifa sadjdjâdiyya) ou Psaumes de la famille de Mohammed (zabûr Âli Mohammed) est le seul ensemble qui ait été transmis tel quel de l\'un des Imams ; il a par la suite été complété par des compilations d\'autres prières du même Imam, réunies par des savants chiites à diverses époques, ce qui donna lieu à l\'édition d\'un second, troisième, quatrième et cinquième recueil, le tout étant maintenant réuni en une édition accompagnée d\'une étude des chaînes de transmissions et de nombreux index et annotations ». L\'Imam Khomeiny, un gnostique méconnu du 20e siècle - C. Bonaud - Docteur en sciences religieuses - éd. : Al-Bouraq - Librairie de l\'Orient - Beyrouth - Liban - Paris - France - 1997, p. 105.',
        'Donc les invocations de l\'Imam Ali Zayn Al-Abidin (s) nous sont parvenues comme autant de preuves de sa large participation à la spiritualisation de l\'humanité et à l\'esprit dévoué à la Cause de Dieu, exalté soit-IL, qu\'il (s) apporta dans l\'exécution de sa tâche de quatrième Imam.',
        'Son projet était le même que celui qui anima son père, l\'Imam Hossein (s) qui l\'avait lui-même reçu de son frère l\'Imam Al-Hassan (s), qui l\'avait lui-même reçu de leur père l\'Imam Ali (s), qui l\'avait lui-même reçu de son beau-père le Prophète Mohammed (pslf). Il consistait dans la prospérité spirituelle, intellectuelle, morale et sociale de l\'humanité éveillée à sa modernité par le processus islamique de sa libération de l\'emprise de l\'impérialisme de l\'Ignorance sur la pensée humaine.',
        'Le fait que son cœur était totalement dans son œuvre dictée par la volonté de Dieu, Exalté soit-IL, a fait qu\'il (s) ne la considérait pas comme la tâche d\'un jour, ou de quelques années, mais de sa vie entière, sachant que le relais serait pris par son successeur et ainsi de suite jusqu\'au Douzième Imam Al-Mahdi (s), que Dieu hâte son retour aux regards.'
      ]
    },

    'intro-ame': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Élever l\'âme, rabaisser l\'ego',
      subtitle: null,
      prose: true,
      body: [
        'L\'influence des œuvres de l\'Imam Ali Zayn Al-Abidin (s) ne s\'est pas bornée à la cité de Médine ni même aux territoires musulmans de son époque, ses invocations parvinrent dans le Monde entier, et y firent naître des élévations de la spiritualité. Sa compagnie fut recherchée par les hommes vertueux et distingués. Son ample savoir coranique ainsi que ses connaissances islamiques lui assurèrent une attention pleine d\'un respect profond de la part de ses auditeurs.',
        'C\'est ainsi que son influence se fait sentir aujourd\'hui encore partout où il y a un sincère partisan de « Mes Ahlul Beyt », son nom, uni comme il l\'est au Ministère des « Douze Solidaires Infaillibles » est du petit nombre de ceux qui sont passés à la postérité. En effet, pour inscrire son nom dans la mémoire de l\'humanité, il n\'y a pas eu de monument plus durable que le Cycle de la Révélation allié au Cycle de la Guidance.',
        'L\'Imam Ali Zayn Al-Abidin (s) avait reçu des Ahlul Beyt qui l\'avaient précédé, l\'humanisme propre à la Civilisation Islamique authentique. Elle le (s) façonnera en un homme érudit, pieux et craignant Dieu. Dans le cadre de sa famille, il acquerra les enseignements parmi tant d\'autres de l\'éthique, de la justice, de la piété islamique. Ce qui devait couronner ses nombreuses invocations. Elles représentent pour l\'entraînement de l\'âme à l\'élévation les principaux éléments de sa formation.',
        'En effet, il n\'y a point d\'acquisition de l\'âme dans la vie humaine, qu\'un homme ose entreprendre d\'enseigner ou d\'exercer, s\'il ne s\'est appliqué auparavant avec soin et avec étude pour bien apprendre et comprendre la profondeur des invocations laissées à l\'humanité par l\'Imam Ali Zayn Al-Abidin (s).',
        'A noter également, au premier siècle de l\'Histoire sainte islamique, que la seule école islamique capable d\'assurer l\'éducation et l\'instruction monothéiste pures était celle de « Mes Ahlul Beyt », puisque le Cycle de la Guidance : Imamat détient depuis le Sermon de Ghadir Khumm l\'ensemble du Savoir théologique et politique du Monothéisme : « Avec l\'Imam as-Sadjad (s) les invocations connurent leur siècle d\'or. Outre la signification spirituelle et culturelle, les invocations de l\'Imam as-Sadjad ont une portée sociale indéniable ; on y trouve une volonté de réforme évidente. Ces invocations furent plus tard compilées en un ouvrage qui s\'intitule As-Sâhîfa as-Sajjâdiyya. De plus, l\'Imam joua un rôle éducatif de taille, puisqu\'il rapporta les hadiths du Messager de Dieu (pslf) ». Biographie des Imams. Aux Sources de la Sagesse, éd.: ARCS-Lyon, Vol. 4 p. 72.',
        'Il (s) enseigne aux Croyants et aux non-croyants à prendre conscience de ce qui passe, à aimer ce qui dure éternellement, à oublier les petitesses du monde d\'ici-bas et à désirer la Lumière.',
        'Soulignons, ici, l\'importante influence exercée par les Psaumes de l\'Islam sur la littérature et la philosophie islamiques. Toutefois, cette adaptation à la langue française de As-Sâhîfa as-Sajjâdiyya n\'a pas pour but d\'en débattre, et nous laissons le débat entre les mains des éminents spécialistes musulmans de la littérature et de la philosophie islamiques. Il ne nous appartient pas d\'en dégager les grands thèmes mis en œuvre dans la gnose islamique.',
        'Nos modestes et humbles connaissances de la langue arabe et de la langue française nous laissent à peine espérer d\'avoir contribué à faire connaître un peu de la grande profondeur de la pensée de l\'Imam de la Prosternation, la Parure des dévots, le Quatrième Imam Successeur au Prophète Mohammed (pslf) : Ali Al-Sajjad Ben Al-Hossein Ben Abi Tâleb, que la Paix soit avec lui.',
        'Nom familier : Abu Mohammed<br>Noms honorifiques : Zaïn Al-Abidin ; Sayyidu \'s-Sajidin ; Al-Sajjad.'
      ]
    },

    'intro-avant': {
      source: 'As-Ṣaḥīfa as-Sajjādiyya',
      title: 'Avant-propos',
      subtitle: "concernant la chaîne de transmetteurs de\nAl-Sahîfat al-Kâmilat al-Sajjâdiyya\nLe Livre de la Perfection d'Al-Sajjad.",
      prose: true,
      body: [
