// ══ BUILD SIDEBAR ══
var sbScroll = document.getElementById('sb-scroll');
var activeItemId = null;

DATA.themes.forEach(function(theme) {
  var group = document.createElement('div');
  group.className = 'sb-group';

  var themeBtn = document.createElement('div');
  themeBtn.className = 'sb-theme';
  themeBtn.innerHTML = '<span class="sb-theme-icon">'+theme.icon+'</span><span class="sb-theme-label">'+theme.label+'</span><span class="sb-chevron">›</span>';

  var itemsDiv = document.createElement('div');
  itemsDiv.className = 'sb-items';

  var currentContainer = itemsDiv;

  theme.items.forEach(function(item) {
    if (item.type === 'header') {
      var headerBtn = document.createElement('div');
      headerBtn.className = 'sb-item subheader';
      headerBtn.innerHTML = '<span class="sb-theme-label">' + item.label + '</span><span class="sb-chevron">›</span>';
      
      var subItemsDiv = document.createElement('div');
      subItemsDiv.className = 'sb-sub-items';
      
      headerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var isOpen = subItemsDiv.classList.contains('open');
        if (!isOpen) {
          subItemsDiv.classList.add('open');
          headerBtn.classList.add('open');
        } else {
          subItemsDiv.classList.remove('open');
          headerBtn.classList.remove('open');
        }
      });
      
      itemsDiv.appendChild(headerBtn);
      itemsDiv.appendChild(subItemsDiv);
      currentContainer = subItemsDiv;
    } else {
      var el = document.createElement('div');
      el.className = 'sb-item' + (item.disabled ? ' disabled' : '');
      el.textContent = (item.emoji || '') + ' ' + item.label;
      if (!item.disabled) {
        el.addEventListener('click', function() {
          document.querySelectorAll('.sb-item').forEach(function(i){ i.classList.remove('active'); });
          el.classList.add('active');
          showInvocation(item.id);
        });
      }
      currentContainer.appendChild(el);
    }
  });

  themeBtn.addEventListener('click', function() {
    var isOpen = itemsDiv.classList.contains('open');
    // Close all
    document.querySelectorAll('.sb-items').forEach(function(d){ d.classList.remove('open'); });
    document.querySelectorAll('.sb-theme').forEach(function(t){ t.classList.remove('open'); });
    if(!isOpen) {
      itemsDiv.classList.add('open');
      themeBtn.classList.add('open');
    }
  });

  group.appendChild(themeBtn);
  group.appendChild(itemsDiv);
  sbScroll.appendChild(group);
});

// ══ SIDEBAR TOGGLE ══
var sidebar = document.getElementById('sidebar');
var toggle = document.getElementById('sb-toggle');
var sidebarOpen = true;
toggle.addEventListener('click', function(){
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('collapsed', !sidebarOpen);
  toggle.textContent = sidebarOpen ? '‹' : '›';
  toggle.style.left = sidebarOpen ? '240px' : '0';
});

// ══ RENDER INVOCATION ══
// Font size controls
var _invAr = 1.55, _invFr = 1.25;
document.documentElement.style.setProperty('--inv-ar-size', _invAr + 'rem');
document.documentElement.style.setProperty('--inv-fr-size', _invFr + 'rem');
function invFs(type, dir) {
  var step = 0.1;
  if (type === 'ar') {
    _invAr = Math.min(3.0, Math.max(0.8, _invAr + dir * step));
    document.documentElement.style.setProperty('--inv-ar-size', _invAr + 'rem');
  } else {
    _invFr = Math.min(2.0, Math.max(0.6, _invFr + dir * step));
    document.documentElement.style.setProperty('--inv-fr-size', _invFr + 'rem');
  }
}

function showInvocation(id) {
  var data = DATA.invocations[id];
  if(!data) return;

  var welcome = document.getElementById('welcome');
  var content = document.getElementById('content');
  welcome.classList.add('hidden');
  content.classList.remove('hidden');
  document.getElementById('invFc').classList.add('show');

  var html = '<div class="content-inner">';
  html += '<div class="c-source">'+data.source+'</div>';
  html += '<div class="c-title">'+data.title+'</div>';
  if(data.subtitle) html += '<div class="c-subtitle">'+data.subtitle+'</div>';
  html += '<div class="c-divider"></div>';

  if(data.prose) {
    html += '<div class="c-prose">';
    data.body.forEach(function(p){
      if (typeof p === 'string') {
        html += '<p>'+p+'</p>';
      } else if (p.t === 'intro') {
        html += '<div class="c-intro">'+p.tx+'</div>';
      } else if (p.t === 'salawat') {
        html += '<div class="c-salawat">— Ṣalawāt —</div>';
      }
    });
    html += '</div>';
  } else {
    data.body.forEach(function(v){
      if(v.t === 'salawat') {
        html += '<div class="c-salawat">— Ṣalawāt —</div>';
      } else if(v.t === 'intro') {
        html += '<div class="c-intro">'+v.tx+'</div>';
      } else if(v.t === 'instruction') {
        html += '<div class="c-instruction">'+v.tx+'</div>';
      } else if(v.t === 'v') {
        html += '<div class="c-verse"><div class="c-vnum">'+v.n+'</div><div class="c-vtext">'+v.tx+'</div></div>';
      } else if(v.t === 'zv') {
        html += '<div class="c-zv"><div class="c-zv-text">'+v.tx+(v.ar?'<div class="c-zv-ar">'+v.ar+'</div>':'')+'</div></div>';
      } else if(v.t === 'tri') {
        html += '<div class="c-tri">';
        if(v.ar) html += '<div class="c-tri-ar">'+v.ar+'</div>';
        if(v.tr) html += '<div class="c-tri-tr">'+v.tr+'</div>';
        html += '<div class="c-tri-fr">'+v.fr+'</div>';
        html += '</div>';
      }
    });
  }

  html += '</div>'; // close content-inner
  content.innerHTML = html;
  content.scrollTop = 0;
  // Trigger animation
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = '';
}
</script>

<!-- Theme listener: receives theme from parent portal -->
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    var t = e.data.theme;
    document.documentElement.setAttribute('data-theme', t);
    document.body.setAttribute('data-theme', t === 'light' ? '' : 'dark');
    // Also try calling the module's own theme function
    try { if (typeof setTheme === 'function') setTheme(t); } catch(ex) {}
    try { if (typeof S !== 'undefined' && S.th !== undefined) { S.th = t === 'light' ? 'light' : 'dark'; document.body.setAttribute('data-theme', S.th); } } catch(ex) {}
    // Force canvas/render update
    try { window.dispatchEvent(new Event('resize')); } catch(ex) {}
  }
});
try {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.body.setAttribute('data-theme', '');
    try { if (typeof S !== 'undefined') { S.th = 'light'; document.body.setAttribute('data-theme', 'light'); } } catch(ex) {}
  }
} catch(e) {}
</script>

<!-- ══ Scroll-to-top ══ -->
<style>
.scroll-top-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;background:rgba(19,29,53,0.85);border:1px solid rgba(201,168,76,0.3);border-radius:50%;color:#c9a84c;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:all .3s ease;z-index:999;backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.scroll-top-btn.visible{opacity:1;pointer-events:all}
.scroll-top-btn:hover{background:rgba(201,168,76,0.2);border-color:#c9a84c;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4),0 0 12px rgba(201,168,76,0.15)}
.scroll-top-btn:active{transform:translateY(0)}
.scroll-top-btn svg{width:20px;height:20px}
[data-theme="light"] .scroll-top-btn{background:rgba(225,218,206,0.9)!important;border-color:rgba(122,92,36,0.25)!important;color:#7a5c24!important;box-shadow:0 4px 16px rgba(60,45,20,0.12)!important}
[data-theme="light"] .scroll-top-btn:hover{background:rgba(235,228,216,0.95)!important;border-color:#7a5c24!important;box-shadow:0 6px 20px rgba(60,45,20,0.18),0 0 12px rgba(122,92,36,0.1)!important}
</style>
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Retour en haut" title="Retour en haut">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script>
(function(){
  var btn=document.getElementById('scrollTopBtn');
  if(!btn) return;
  var scroller=document.querySelector('.content-area')||document.querySelector('.main-content')||document.querySelector('.main')||document.querySelector('.content')||null;
  var target=scroller||document.documentElement;
  var eventTarget=scroller||window;
  function check(){
    var st=scroller?scroller.scrollTop:(window.pageYOffset||document.documentElement.scrollTop);
    btn.classList.toggle('visible',st>250);
  }
  eventTarget.addEventListener('scroll',check,{passive:true});
  btn.addEventListener('click',function(){
    target.scrollTo({top:0,behavior:'smooth'});
  });
  check();
})();
</script>

<script>
// ── Global Search relay ───────────────────────────────────────────────
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'gs-navigate' && e.data.state) {
    if (typeof showInvocation === 'function') showInvocation(e.data.state);
  }
});
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    try { window.parent.postMessage({type:'gs-open'}, '*'); } catch(ex) {}
  }
});
</script>

</body>
</html>
